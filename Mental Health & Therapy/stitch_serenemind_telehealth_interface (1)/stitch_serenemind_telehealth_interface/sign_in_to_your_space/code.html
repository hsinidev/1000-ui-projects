                  "error": "#ba1a1a",
                  "surface-variant": "#d7e4ec",

                  "surface-container-lowest": "#ffffff",

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
    }
    body {
      background-color: #E0F2F1; /* Custom requested Soft Teal background override */
    }
    .soft-shadow {
      shadow-[0px_4px_20px_rgba(84,110,122,0.08)];
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Suppression Logic: Login pages do not render the Shared Global TopNavBar or SideNavBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-8 h-20 pointer-events-none">
<div class="flex items-center pointer-events-auto">
<span class="font-h1 text-primary text-2xl tracking-tighter select-none">SereneMind</span>
</div>
<div class="pointer-events-auto">
<button class="bg-error text-on-error px-6 py-2 rounded-full font-button text-button shadow-lg transition-transform hover:scale-95 active:scale-90 flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency_home</span>
        Panic Exit
      </button>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-section-gap">
<div class="w-full max-w-[480px]">
<!-- Centralized Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-10 shadow-[0px_4px_20px_rgba(84,110,122,0.08)]">
<div class="text-center mb-10">
<h1 class="font-h2 text-h2 text-primary mb-2">Welcome Back</h1>
<p class="font-body-md text-secondary">A space for your professional focus.</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<input class="w-full px-4 py-4 rounded-lg bg-[#F5F5F0] border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md" id="email" placeholder="therapist@serenemind.care" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-button text-button text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-4 rounded-lg bg-[#F5F5F0] border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full py-4 bg-primary text-on-primary rounded-lg font-button text-button shadow-md hover:bg-primary-container transition-all scale-100 active:scale-[0.98]" type="submit">
              Sign In to Practice
            </button>
</div>
</form>
<div class="mt-10 pt-8 border-t border-surface-variant text-center">
<p class="font-body-md text-secondary mb-4">New to SereneMind?</p>
<button class="w-full py-4 border border-primary text-primary rounded-lg font-button text-button hover:bg-primary-fixed transition-all">
            Request Practitioner Access
          </button>
</div>
</div>
<!-- Trust Indicators -->
<div class="mt-12 flex flex-col items-center gap-6 opacity-60">
<div class="flex items-center gap-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="font-label-caps text-label-caps">HIPAA COMPLIANT</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="font-label-caps text-label-caps">256-BIT ENCRYPTION</span>
</div>
</div>
<div class="max-w-[300px]">
<img alt="Clinical Assurance Illustration" class="w-full opacity-40 mix-blend-multiply" data-alt="A minimalist and calming abstract digital illustration of soft overlapping waves in shades of teal and sand. The image is clean, serene, and utilizes high-key lighting to evoke a sense of mental peace and professional safety. The visual style is modern and flat with subtle gradients that perfectly complement the soft minimalism of a high-end telehealth platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmQqNUQnuPDpFJFh7_pND7YS0J2zI4rSnF6bt2n0kay3zByxK4AR6CAF2stmbz6ikCx5-whTatmh3Y5mu2UVmk9bsffgvP204Ohc0JXgpbt2Gur-xBZ5tRXmGo-TVjAyVqkeJaFfrOyVgPxYmF0pX2T9uDwo-7mWNNPvkjaqlz0nxwIVW_fuvysN4QzNnE66oLJ0lV-AYS2DAezWbP7AJb4rKxYCF7H6NN8IXeHjRXcGzSEW7WxEzWHW3WO90J5Svl-0BoemqCgNY"/>
</div>
</div>
</div>
</main>
<!-- Footer Shell from JSON (Mandatory Transcription) -->
<footer class="w-full flex flex-col md:flex-row justify-between items-center px-12 gap-8 py-20 bg-white border-t border-[#F5F5F0]">
<div class="font-label-caps text-label-caps text-slate-400 tracking-widest uppercase">
      © 2024 SereneMind Telehealth. HIPAA Compliant.
    </div>
<div class="flex flex-wrap justify-center gap-8">
<a class="font-label-caps text-label-caps text-slate-400 uppercase tracking-widest hover:text-[#546E7A] underline decoration-teal-200 transition-all" href="#">Privacy Policy</a>
<a class="font-label-caps text-label-caps text-slate-400 uppercase tracking-widest hover:text-[#546E7A] underline decoration-teal-200 transition-all" href="#">Terms of Service</a>
<a class="font-label-caps text-label-caps text-slate-400 uppercase tracking-widest hover:text-[#546E7A] underline decoration-teal-200 transition-all" href="#">Crisis Resources</a>
<a class="font-label-caps text-label-caps text-slate-400 uppercase tracking-widest hover:text-[#546E7A] underline decoration-teal-200 transition-all" href="#">Clinical Governance</a>
</div>
</footer>
</body></html>
