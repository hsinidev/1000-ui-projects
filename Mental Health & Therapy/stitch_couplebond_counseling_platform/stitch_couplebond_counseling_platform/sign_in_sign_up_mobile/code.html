<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>CoupleBond - Begin Your Journey</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Noto+Serif:wght@600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary": "#5e5e5d",
                      "primary": "#570013",
                      "on-tertiary": "#ffffff",
                      "error": "#ba1a1a",
                      "surface-container": "#f5ece7",
                      "surface-bright": "#fff8f5",
                      "inverse-surface": "#34302c",
                      "secondary-fixed-dim": "#c7c6c4",
                      "on-surface": "#1e1b18",
                      "tertiary-fixed-dim": "#c7c6c5",
                      "tertiary-container": "#3c3d3d",
                      "on-tertiary-fixed": "#1a1c1c",
                      "on-secondary-fixed-variant": "#464746",
                      "secondary-container": "#e0dfdd",
                      "on-surface-variant": "#584141",
                      "on-secondary": "#ffffff",
                      "on-tertiary-container": "#a8a8a7",
                      "surface-tint": "#af2b3e",
                      "primary-container": "#800020",
                      "secondary-fixed": "#e3e2e0",
                      "surface-container-high": "#efe6e2",
                      "surface-dim": "#e1d8d4",
                      "surface-container-lowest": "#ffffff",
                      "on-error": "#ffffff",
                      "on-secondary-container": "#626361",
                      "surface-container-highest": "#e9e1dc",
                      "on-primary-container": "#ff828a",
                      "outline-variant": "#e0bfbf",
                      "on-background": "#1e1b18",
                      "on-tertiary-fixed-variant": "#464746",
                      "primary-fixed": "#ffdada",
                      "tertiary-fixed": "#e3e2e1",
                      "on-primary": "#ffffff",
                      "on-secondary-fixed": "#1b1c1b",
                      "surface-variant": "#e9e1dc",
                      "surface-container-low": "#fbf2ed",
                      "outline": "#8c7071",
                      "tertiary": "#262727",
                      "on-primary-fixed": "#40000b",
                      "inverse-primary": "#ffb3b5",
                      "inverse-on-surface": "#f8efea",
                      "primary-fixed-dim": "#ffb3b5",
                      "error-container": "#ffdad6",
                      "on-primary-fixed-variant": "#8e0f28",
                      "surface": "#fff8f5",
                      "on-error-container": "#93000a",
                      "background": "#fff8f5"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "xl": "80px",
                      "sm": "12px",
                      "base": "8px",
                      "xs": "4px",
                      "lg": "48px",
                      "md": "24px",
                      "split-gap": "0px"
              },
              "fontFamily": {
                      "h2": ["Noto Serif"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "label-caps": ["Inter"],
                      "h3": ["Noto Serif"],
                      "h1": ["Noto Serif"]
              },
              "fontSize": {
                      "h2": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}],
                      "h3": ["24px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                      "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fff8f5;
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface antialiased">
<!-- Auth Container -->
<main class="min-h-screen flex flex-col items-center px-md py-xl max-w-md mx-auto">
<!-- Brand Header Section -->
<header class="flex flex-col items-center mb-lg text-center">
<div class="mb-md">
<!-- Branding Logo Placeholder (CoupleBond) -->
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center text-on-tertiary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<h1 class="font-h1 text-h1 text-primary-container mb-xs">CoupleBond</h1>
<p class="font-h2 text-h2 text-secondary leading-tight">Begin Your Journey</p>
</header>
<!-- Auth Toggle (Tabs) -->
<div class="w-full flex mb-lg bg-surface-container rounded-lg p-1 border border-outline-variant">
<button class="flex-1 py-3 text-label-caps font-label-caps bg-white text-primary-container rounded shadow-sm">Sign In</button>
<button class="flex-1 py-3 text-label-caps font-label-caps text-secondary">Register</button>
</div>
<!-- Form Section -->
<section class="w-full space-y-md">
<div class="flex flex-col gap-sm">
<div class="relative">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-xs block" for="email">Email Address</label>
<input class="w-full border-0 border-b border-outline bg-transparent py-3 focus:ring-0 focus:border-primary-container transition-all outline-none font-body-md text-body-md" id="email" placeholder="name@example.com" type="email"/>
</div>
<div class="relative pt-4">
<div class="flex justify-between items-center mb-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="password">Password</label>
<a class="text-label-caps font-label-caps text-primary-container opacity-80" href="#">Forgot?</a>
</div>
<input class="w-full border-0 border-b border-outline bg-transparent py-3 focus:ring-0 focus:border-primary-container transition-all outline-none font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-tertiary py-4 rounded-xl font-label-caps text-body-lg uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all shadow-lg">
                    Sign In
                </button>
</div>
<!-- Social/Alternative Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-label-caps font-label-caps text-on-surface-variant">Or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Sign-in Buttons (Editorial Style) -->
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-2 border border-outline py-3 rounded-lg font-label-caps text-label-caps hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-lg">brand_awareness</span> Google
                </button>
<button class="flex items-center justify-center gap-2 border border-outline py-3 rounded-lg font-label-caps text-label-caps hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-lg">ios</span> Apple
                </button>
</div>
</section>
<!-- Split-Screen Themed Visual Element (Mobile Stacking) -->
<section class="mt-xl w-full">
<div class="rounded-xl overflow-hidden border border-outline-variant">
<div class="flex h-32">
<div class="w-1/2 bg-primary-container flex flex-col justify-end p-4">
<span class="font-label-caps text-white text-[10px] opacity-70">YOU</span>
<div class="w-8 h-1 bg-white mt-1 opacity-40"></div>
</div>
<div class="w-1/2 bg-surface-container flex flex-col justify-end p-4">
<span class="font-label-caps text-primary-container text-[10px] opacity-70">PARTNER</span>
<div class="w-8 h-1 bg-primary-container mt-1 opacity-40"></div>
</div>
</div>
<div class="bg-white p-4">
<p class="font-body-md text-body-md italic text-on-surface-variant text-center">"Healing is not a destination, but a shared path we walk together."</p>
</div>
</div>
</section>
<!-- Footer / FAQ Link -->
<footer class="mt-auto pt-xl w-full text-center">
<p class="font-label-caps text-label-caps text-on-surface-variant mb-4">
                New to CoupleBond? <a class="text-primary-container font-bold" href="#">Create Account</a>
</p>
<div class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm">help_outline</span>
<a class="font-label-caps text-label-caps text-secondary underline decoration-primary/30 underline-offset-4" href="#">Visit FAQ for help with your account</a>
</div>
</footer>
</main>
<!-- Background Decoration (Subtle Split Visual) -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-5">
<div class="absolute inset-y-0 left-0 w-1/2 bg-primary-container"></div>
<div class="absolute inset-y-0 right-0 w-1/2 bg-secondary"></div>
</div>
</body></html>
