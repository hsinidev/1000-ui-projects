<style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f9f9fd;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .lavender-gradient {
      background: linear-gradient(135deg, #e6e6fa 0%, #dcd0ff 100%);
    }
    .soft-shadow {
      box-shadow: 0 20px 40px -10px rgba(100, 88, 131, 0.08);
    }
    .input-recessed {
      background: rgba(237, 237, 241, 0.5);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      border: 1px solid rgba(255,255,255,0.8);

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-6 md:p-12 overflow-hidden">
<!-- Main Authentication Container -->
<main class="w-full max-w-[1200px] h-full max-h-[800px] glass-effect rounded-xl overflow-hidden flex flex-col md:flex-row soft-shadow">
<!-- Left Section: Visual & Quote -->
<section class="relative hidden md:flex md:w-1/2 h-full overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A tranquil, misty forest at sunrise with soft rays of light filtering through towering ancient trees. The scene is bathed in a calming palette of ethereal lavender morning fog and deep charcoal shadows of the bark. The visual style is organic and painterly, evoking a deep sense of serenity, stillness, and breathability in a high-key light mode aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCfNOKcfPg3zU9D5U8jdsZtOs8h-SKimBJIgGII6Aqp22HC5hfb4K6RdbtBGA076BEXMWOJcdfy_apu2e__j2Ct0qK1dhI86IHky6pr5vXSfMU3z97dYDthie_tDsZEcEiwZR9uOrjJshIf_d4KPIMS_XfH0cfP5psd1HuZdwoUw6JU6qzVoOHC6yQ3mUvPsJZ8fQ0L7UAMm3FB2haM4B6dMNQQNaxZc5s76mtllCA43k32g3-cxBYaiJxO5E7DHgoNqU-oWrZE938r')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-tertiary/40 to-transparent"></div>
<!-- Logo Overlay -->
<div class="absolute top-12 left-12 flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-white/30 backdrop-blur-md flex items-center justify-center border border-white/40">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'wght' 500;">self_care</span>
</div>
<span class="font-headline-md text-white tracking-tight">DeepBreath</span>
</div>
<!-- Quote Content -->
<div class="absolute bottom-16 left-12 right-12 z-10">
<div class="glass-effect p-8 rounded-lg max-w-sm">
<p class="font-body-lg text-on-tertiary-fixed italic leading-relaxed mb-4">
            "Quiet the mind, and the soul will speak. Your digital sanctuary is just a breath away."
          </p>
<div class="flex items-center gap-2">
<div class="h-[1px] w-8 bg-on-tertiary-fixed-variant/40"></div>
<span class="font-label-sm uppercase tracking-widest text-on-tertiary-fixed-variant">Morning Meditation</span>
</div>
</div>
</div>
</section>
<!-- Right Section: Form -->
<section class="w-full md:w-1/2 h-full bg-white/60 flex flex-col justify-center px-8 py-12 md:px-20 relative">
<!-- Mobile Logo -->
<div class="md:hidden flex items-center gap-2 mb-12">
<span class="material-symbols-outlined text-purple-600">self_care</span>
<span class="font-headline-md text-slate-800">DeepBreath</span>
</div>
<!-- Form Header -->
<div class="mb-10">
<h1 class="font-headline-lg text-on-surface mb-2">Welcome back</h1>
<p class="font-body-md text-on-surface-variant">Find your center. Sign in to continue your journey.</p>
</div>
<!-- Form Elements -->
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant ml-2" for="email">Email address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full h-14 pl-12 pr-4 rounded-full input-recessed focus:ring-2 focus:ring-primary-fixed focus:border-transparent transition-all outline-none font-body-md" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-2">
<label class="font-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-tertiary hover:text-on-tertiary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full h-14 pl-12 pr-4 rounded-full input-recessed focus:ring-2 focus:ring-primary-fixed focus:border-transparent transition-all outline-none font-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 lavender-gradient rounded-full font-label-md text-on-tertiary-fixed shadow-sm hover:shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
          Enter Sanctuary
          <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Social Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-sm text-outline-variant uppercase">Or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-12 rounded-full border border-outline-variant/20 hover:bg-surface-container-low transition-colors font-label-md text-on-surface-variant" type="button">
<img alt="Google" class="w-5 h-5 opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPABcZtwlCWvL8CQFe2yN4s2g8f4hL_zoi4qoEZ4eqfAzrb0xLTsu8UnVeGMrX7OGXpSc8JAyiiTR6cfqfnjQlskp4OIK6bltK_W8oe8b804DvP5gKBS1VLQdqEELi7_1_FZius__iFpll5VcAbsTdbapAnThIRoGK4Y-DHj80UOUQ-xkJ6Ed2QmwERmb6dHsRwdm3FCa-Uq3TkHU1rMmkfoOsMKR6Uxv_jgXT2d4QAP5q7GPFbAxmrImZwZelOJEa7jf0B8icI-Tm"/>
            Google
          </button>
<button class="flex items-center justify-center gap-3 h-12 rounded-full border border-outline-variant/20 hover:bg-surface-container-low transition-colors font-label-md text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-on-surface-variant">ios</span>
            Apple
          </button>
</div>
</form>
<!-- Footer Action -->
<p class="mt-12 text-center font-body-md text-on-surface-variant">
        New here? 
        <a class="font-label-md text-tertiary hover:underline underline-offset-4 decoration-2" href="#">Create an account</a>
</p>
<!-- Background Organic Shapes -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/20 rounded-full blur-[80px] pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-tertiary-container/30 rounded-full blur-[80px] pointer-events-none"></div>
</section>
</main>
<!-- Decorative External Shapes -->
<div class="fixed top-20 left-[10%] w-32 h-32 bg-secondary-container/20 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-20 right-[15%] w-48 h-48 bg-primary-container/20 rounded-full blur-3xl -z-10"></div>
