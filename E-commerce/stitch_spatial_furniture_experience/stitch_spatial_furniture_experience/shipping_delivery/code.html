<header class="bg-white/90 dark:bg-neutral-950/90 backdrop-blur-md text-neutral-900 dark:text-neutral-50 docked full-width top-0 z-50 border-b border-neutral-100 dark:border-neutral-800 flex justify-between items-center w-full px-8 py-4 sticky">

</div>
<h1 class="font-serif text-xl tracking-[0.3em] font-light text-neutral-900 dark:text-neutral-50">MUEBLE</h1>
<div class="flex items-center">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</div>
</header>
<main class="flex-grow w-full max-w-lg mx-auto px-6 pt-10 pb-32">

<span class="material-symbols-outlined text-[12px] text-neutral-300" data-icon="chevron_right">chevron_right</span>
</div>
<div class="flex items-center space-x-2">

</div>
<div class="flex items-center">

</div>

<label class="absolute left-0 -top-3.5 text-neutral-400 font-label-caps text-[10px] transition-all peer-placeholder-shown:text-body-md peer-placeholder-shown:top-3 peer-placeholder-shown:text-neutral-500 peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:text-primary uppercase" for="email">Email Address</label>
</div>

<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary px-0 py-3 outline-none transition-colors font-body-md text-body-md peer placeholder-transparent" id="phone" placeholder="Phone Number" type="tel"/>

</div>
</div>
</section>
<section class="mb-12">

<div class="grid grid-cols-2 gap-gutter">
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary px-0 py-3 outline-none transition-colors font-body-md text-body-md peer placeholder-transparent" id="fname" placeholder="First Name" type="text"/>
<label class="absolute left-0 -top-3.5 text-neutral-400 font-label-caps text-[10px] transition-all peer-placeholder-shown:text-body-md peer-placeholder-shown:top-3 peer-placeholder-shown:text-neutral-500 peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:text-primary uppercase" for="fname">First Name</label>
</div>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary px-0 py-3 outline-none transition-colors font-body-md text-body-md peer placeholder-transparent" id="lname" placeholder="Last Name" type="text"/>
<label class="absolute left-0 -top-3.5 text-neutral-400 font-label-caps text-[10px] transition-all peer-placeholder-shown:text-body-md peer-placeholder-shown:top-3 peer-placeholder-shown:text-neutral-500 peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:text-primary uppercase" for="lname">Last Name</label>
</div>
</div>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary px-0 py-3 outline-none transition-colors font-body-md text-body-md peer placeholder-transparent" id="address" placeholder="Street Address" type="text"/>

</div>

<label class="absolute left-0 -top-3.5 text-neutral-400 font-label-caps text-[10px] transition-all peer-placeholder-shown:text-body-md peer-placeholder-shown:top-3 peer-placeholder-shown:text-neutral-500 peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:text-primary uppercase" for="apt">Apt, Suite (Optional)</label>
</div>
<div class="grid grid-cols-2 gap-gutter">
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary px-0 py-3 outline-none transition-colors font-body-md text-body-md peer placeholder-transparent" id="city" placeholder="City" type="text"/>
<label class="absolute left-0 -top-3.5 text-neutral-400 font-label-caps text-[10px] transition-all peer-placeholder-shown:text-body-md peer-placeholder-shown:top-3 peer-placeholder-shown:text-neutral-500 peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:text-primary uppercase" for="city">City</label>
</div>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary px-0 py-3 outline-none transition-colors font-body-md text-body-md peer placeholder-transparent" id="zip" placeholder="ZIP Code" type="text"/>
<label class="absolute left-0 -top-3.5 text-neutral-400 font-label-caps text-[10px] transition-all peer-placeholder-shown:text-body-md peer-placeholder-shown:top-3 peer-placeholder-shown:text-neutral-500 peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:text-primary uppercase" for="zip">ZIP Code</label>
</div>
</div>
</div>

<p class="text-secondary text-sm font-body-md">3-5 business days. White glove service included for large items.</p>
</div>
<span class="font-label-caps text-label-caps text-primary ml-auto">FREE</span>
</div>
</section>
<div class="fixed bottom-0 left-0 w-full bg-white px-6 pb-10 pt-6 border-t border-neutral-100 z-40">
<div class="flex justify-between items-center mb-6">
<span class="font-label-caps text-label-caps text-neutral-500 uppercase">Order Total</span>
<span class="font-headline-md text-headline-md">$2,450.00</span>
</div>
<button class="w-full bg-primary text-on-primary py-5 rounded-[4px] font-label-caps text-label-caps tracking-widest uppercase hover:opacity-90 transition-opacity">
                Continue to Payment
