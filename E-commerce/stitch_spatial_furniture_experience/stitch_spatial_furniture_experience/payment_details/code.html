<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                  "surface-container-highest": "#e5e2de",
                  "inverse-on-surface": "#f3f0ec",
                  "on-primary": "#ffffff",
                  "surface-bright": "#fcf9f5",
                  "primary-container": "#1c1b1b",
                  "error-container": "#ffdad6",
                  "on-surface-variant": "#444748",
                  "secondary": "#5f5e5c",
                  "secondary-fixed-dim": "#c8c6c3",
                  "tertiary-fixed": "#e6e2dc",
                  "surface-container-low": "#f6f3ef",
                  "error": "#ba1a1a",
                  "on-surface": "#1c1c1a",

          "spacing": {
                  "section-gap": "128px",

                  "gutter": "32px",
                  "container-max": "1440px",
                  "unit": "8px"

          "fontFamily": {

                  "body-lg": ["Manrope"],

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen">
<!-- TopAppBar Anchor -->
<header class="bg-white/90 dark:bg-neutral-950/90 backdrop-blur-md text-neutral-900 dark:text-neutral-50 docked full-width top-0 z-50 border-b border-neutral-100 dark:border-neutral-800 flex justify-between items-center w-full px-8 py-4 sticky">
<div class="flex items-center gap-4">
<button class="hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
<h1 class="font-serif text-xl tracking-[0.3em] font-light text-neutral-900 dark:text-neutral-50">MUEBLE</h1>
<div class="flex items-center gap-4">
<button class="hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto px-6 py-8 pb-32">
<!-- Progress Indicator -->
<nav class="flex justify-between items-center mb-12 px-2">
<div class="flex flex-col items-center gap-2">
<span class="font-label-caps text-label-caps text-on-surface-variant">BAG</span>
<div class="h-[1px] w-8 bg-on-surface-variant/30"></div>
</div>
<div class="flex flex-col items-center gap-2">
<span class="font-label-caps text-label-caps text-on-surface-variant">SHIPPING</span>
<div class="h-[1px] w-8 bg-on-surface-variant/30"></div>
</div>
<div class="flex flex-col items-center gap-2">
<span class="font-label-caps text-label-caps text-primary border-b-2 border-primary pb-1">PAYMENT</span>
</div>
</nav>
<!-- Header Section -->
<section class="mb-10">
<h2 class="font-headline-md text-headline-md mb-2">Payment Method</h2>
<p class="text-on-surface-variant text-body-md">All transactions are secure and encrypted.</p>
</section>
<!-- Order Summary Toggle (Condensed) -->
<div class="bg-surface-container-low p-6 mb-10 rounded-lg border border-outline-variant/20">
<div class="flex justify-between items-center mb-4">
<span class="font-label-caps text-label-caps text-on-surface-variant">ORDER SUMMARY</span>
<span class="font-body-md font-bold">$2,450.00</span>
</div>
<div class="flex gap-4 overflow-x-auto hide-scrollbar">
<div class="min-w-[80px] h-[80px] bg-white rounded overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A minimalist architectural chair made of dark scorched oak wood, set against a pristine white wall with soft morning light casting a delicate shadow. The aesthetic is high-end, focusing on the texture and form of the furniture, mirroring a luxury boutique experience. The lighting is diffused and bright, emphasizing clean lines and sophisticated material quality." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBR598HuNmk2u7gr35sHI3M3W_WElm9ysUcB_ZzzhgsFCvEuztGPwtRorsv5_4loghWr_cQ6eAaTHiRx8FfG_I1Hw_iMjxJ8OCCmLpCOyDXl7nfa1Gy6OCTrakGpHZbsC6gOI3g1zrrf482m8jnVrSkuzROZJ47uSirJQWJ6cwu2NSp6HFLf20k9a9oEZwAJRM1mmxdoU3UZU7Af-jmsgNvDTjhcEMI6Ee7zPvwz7iKy-t0fCrqmdpJzSoAkj6PeEh4TS6E8BdTvLG1"/>
</div>
<div class="min-w-[80px] h-[80px] bg-white rounded overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A luxury velvet accent pillow in a deep charcoal gray color, resting on a light beige textured fabric sofa. The setting is a bright, minimalist living room with floor-to-ceiling windows and soft, natural ambient lighting. The atmosphere is calm and curated, showcasing tactile richness and high-fidelity detail through professional photography in a modern gallery style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-M35VOmJFbOCNrT_xIgY3z3ZiIWFsvEZgz9vYOd2AgGxDL9abtO0FhyJfGxJJsWBgD88roBCcGsn8IDvK_ObEkH-HIkKG3dRrodF7-UlwhLa29m-la6XF6gvxN-dgqj6BjsIk2YkGffO-zC1INWjkTxZlj0qBiD4TK1g3hVOmfzxaq7_mY0DFL_v4HZPZ2SSmg4lsBjY2iI8Doz57GSYunezNprL2-xwGFXZ8c7xVnA9QIHC5_fZdJJ48Ff25Ipwoy31-i5ThC004"/>
</div>
</div>
</div>
<!-- Payment Options Selection -->
<div class="space-y-4">
<!-- Apple Pay -->
<button class="w-full flex justify-between items-center p-5 border border-outline-variant rounded-lg hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">contactless</span>
<span class="font-body-md font-medium">Apple Pay</span>
</div>
<span class="material-symbols-outlined text-outline-variant">radio_button_unchecked</span>
</button>
<!-- Bank Transfer -->
<button class="w-full flex justify-between items-center p-5 border border-outline-variant rounded-lg hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">account_balance</span>
<span class="font-body-md font-medium">Bank Transfer</span>
</div>
<span class="material-symbols-outlined text-outline-variant">radio_button_unchecked</span>
</button>
<!-- Credit Card (Selected State) -->
<div class="border-2 border-primary rounded-lg p-5 bg-white shadow-[0_8px_32px_rgba(0,0,0,0.04)]">
<div class="flex justify-between items-center mb-8">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">credit_card</span>
<span class="font-body-md font-bold">Credit Card</span>
</div>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
</div>
<form class="space-y-6">
<div class="relative">
<label class="font-label-caps text-label-caps text-on-surface-variant absolute -top-2.5 left-3 bg-white px-2">CARDHOLDER NAME</label>
<input class="w-full border border-outline-variant rounded p-4 pt-5 font-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none" type="text" value="ADRIANNA STERLING"/>
</div>
<div class="relative">
<label class="font-label-caps text-label-caps text-on-surface-variant absolute -top-2.5 left-3 bg-white px-2">CARD NUMBER</label>
<div class="relative">
<input class="w-full border border-outline-variant rounded p-4 pt-5 font-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none" placeholder="**** **** **** 4421" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-2 opacity-60">
<span class="material-symbols-outlined">network_check</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<label class="font-label-caps text-label-caps text-on-surface-variant absolute -top-2.5 left-3 bg-white px-2">EXPIRY</label>
<input class="w-full border border-outline-variant rounded p-4 pt-5 font-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none" placeholder="MM/YY" type="text"/>
</div>
<div class="relative">
<label class="font-label-caps text-label-caps text-on-surface-variant absolute -top-2.5 left-3 bg-white px-2">CVC</label>
<input class="w-full border border-outline-variant rounded p-4 pt-5 font-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none" placeholder="***" type="password"/>
</div>
</div>
<div class="flex items-center gap-3 pt-2">
<input checked="" class="w-5 h-5 border-outline-variant text-primary focus:ring-0 rounded-sm" type="checkbox"/>
<span class="text-body-md text-on-surface-variant">Save card details for future purchases</span>
</div>
</form>
</div>
</div>
</main>
<!-- Sticky CTA Button -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-xl border-t border-neutral-100 z-40">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary text-white py-5 rounded font-label-caps text-label-caps tracking-widest hover:opacity-90 transition-all active:scale-[0.98]">
        REVIEW ORDER
      </button>
<p class="text-center mt-4 text-on-surface-variant text-[10px] tracking-widest font-label-caps">YOUR DATA IS PROTECTED BY 256-BIT SSL ENCRYPTION</p>
</div>
</div>
<!-- BottomNavBar Anchor (Hidden as per "Destination Rule" for Transactional flows) -->
<!-- Contextual FAB Suppression (Hiding as per task instructions for Checkout screens) -->
</body></html>
