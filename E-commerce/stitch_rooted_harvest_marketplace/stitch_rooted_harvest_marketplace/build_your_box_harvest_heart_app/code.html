<!DOCTYPE html>

<style>

      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

      display: none;
    }
    .hand-drawn-border {
      border-radius: 40px 35px 45px 38px / 35px 42px 35px 45px;
    }
    .hand-drawn-line {
      height: 2px;
      background: currentColor;
      width: 40px;
      border-radius: 100% 0% 100% 0% / 100% 0% 100% 0%;

      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface font-body-md selection:bg-primary-container selection:text-white">
<!-- Shared Component: TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-[#F5F5F0] dark:bg-stone-900 border-b border-[#D8D8C0] dark:border-stone-800">
<button class="text-[#2D4739] dark:text-[#4A6B58] hover:opacity-80 transition-opacity Active: scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-serif italic font-bold text-[#2D4739] dark:text-[#A8B5A1] text-xl">Harvest &amp; Heart</h1>
<button class="text-[#2D4739] dark:text-[#4A6B58] hover:opacity-80 transition-opacity Active: scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
</header>
<main class="pt-20 pb-40 px-4 max-w-lg mx-auto">
<!-- Step Indicator -->
<div class="flex items-center justify-between mb-8 px-2">
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-h3 text-sm">1</div>
<span class="text-[10px] font-label-sm uppercase tracking-wider text-primary">Size</span>
</div>
<div class="flex-grow h-[1px] bg-outline-variant mx-2 mb-4"></div>
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-h3 text-sm">2</div>
<span class="text-[10px] font-label-sm uppercase tracking-wider text-on-surface-variant">Frequency</span>
</div>
<div class="flex-grow h-[1px] bg-outline-variant mx-2 mb-4"></div>
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-h3 text-sm">3</div>
<span class="text-[10px] font-label-sm uppercase tracking-wider text-on-surface-variant">Taste</span>
</div>
</div>
<!-- Section 1: Box Size -->
<section class="mb-12">
<div class="flex items-center gap-2 mb-4">
<h2 class="font-h2 text-h3 text-primary">Select your harvest</h2>
<div class="hand-drawn-line text-secondary"></div>
</div>
<p class="text-on-surface-variant mb-6 font-body-md">Choose the perfect amount of fresh, seasonal produce for your household.</p>
<div class="space-y-4">
<!-- Size Card: Small -->
<label class="relative block cursor-pointer group">
<input checked="" class="sr-only peer" name="box-size" type="radio"/>
<div class="p-4 bg-surface-container-low rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-container shadow-sm transition-all flex items-center gap-4">
<div class="w-20 h-20 rounded-lg overflow-hidden bg-surface-variant shrink-0">
<img class="w-full h-full object-cover" data-alt="A small rustic wooden crate filled with a curated selection of vibrant local vegetables like heirloom carrots, kale, and radishes. The lighting is soft morning sun, emphasizing the earthy textures of the produce against a neutral oatmeal background. The style is clean, tactile, and minimalist." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZTxfV0zzJ4hEuJc3hq2RDLEy42lHgFa0mFu2tGC1wqdkpoVF-x1QV1hm70PYKzbTIZs4iPYR0TZxO1FisCt99b7Fy3Es91Ac86TsA_Zpfwc6_mUgX6vi7BtMOf0nJeDvwjiA5ghS434gCsibLJzqoUXeKIZhSKvjYDSahUR4h45fDABoHRv-C-QS8woINWRSQezOhD-0Y5N3mKMQHDghx5t_37YuzgiHgbXjYeztobOfXw_jvmKl0Omea3Raq5ejoibI8tli6adw"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<h3 class="font-h3 text-lg text-primary">The Sprout Box</h3>
<span class="font-h3 text-primary">$32</span>
</div>
<p class="text-sm text-on-surface-variant font-body-md">Perfect for 1-2 people. 6-8 seasonal items.</p>
</div>
<div class="peer-checked:opacity-100 opacity-0 absolute top-4 right-4">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Size Card: Medium -->
<label class="relative block cursor-pointer group">
<input class="sr-only peer" name="box-size" type="radio"/>
<div class="p-4 bg-surface-container-low rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-container shadow-sm transition-all flex items-center gap-4">
<div class="w-20 h-20 rounded-lg overflow-hidden bg-surface-variant shrink-0">
<img class="w-full h-full object-cover" data-alt="A medium-sized artisanal crate overflowing with a variety of colorful farm-fresh vegetables including broccoli, bell peppers, and leafy greens. Set on a rustic wooden surface with natural light casting soft shadows. The aesthetic is sophisticated and honest, capturing the essence of a high-end farmer's market." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCoXpeh7yf17I8jQ5O3TyOUDdxDDVBQsu1qQH1aXsm8H4stC3znKmdVIgY7YX9-1Cl4OFUNp2birQN5JppzqvR4RSZpuorHK0Votb7hHCTyOPb3JXeuIsok4ynqC-ZwxTlUYeJeIFF-djc7LlUIKAOKHdsCoAG5YiMbJU3lFxGmbnBIm0BlLWAiMdFCFcs0Yc9wY3DsiR21_Pj5Ji1FYP2CA23f07lFa6ahqA7NaWPo4xdQg8F4EGXSjFOpAQco6UTwpQZgpuzmbQc"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<h3 class="font-h3 text-lg text-primary">The Garden Box</h3>
<span class="font-h3 text-primary">$48</span>
</div>
<p class="text-sm text-on-surface-variant font-body-md">Best for 3-4 people. 10-12 seasonal items.</p>
</div>
</div>
</label>
<!-- Size Card: Large -->
<label class="relative block cursor-pointer group">
<input class="sr-only peer" name="box-size" type="radio"/>
<div class="p-4 bg-surface-container-low rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-container shadow-sm transition-all flex items-center gap-4">
<div class="w-20 h-20 rounded-lg overflow-hidden bg-surface-variant shrink-0">
<img class="w-full h-full object-cover" data-alt="A large, bountiful harvest display featuring a wide array of organic vegetables and a small bundle of fresh herbs. The arrangement is organic and unclipped, breaking the visual grid. Warm, earthy tones dominate the scene, suggesting a deep connection to the land and sustainable farming practices." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0vPkiIqiLZD5REMoFCOYo7KKtE3PMc09FdQMAI2-8_kNTm6NZpTmEh3RUeN3aOLi2H2CDdH7yX4xnmLBi9Cgwa69-MUTLKfNgTvxo6XX-FBG662aqR71vYb5Zn06o8eWoAkK9A42o6sB_WOEX1DX8BZfIpd5ftBXsa_iSeYOLRd7ndQio7xdHY9vira6LzOuPJi5ih-eWYBbx-5jKRB8QeLwvpb8SA4yKMJdenvfisobNwF2ewKbZmihdXj0mfTKCS12i0izC-q8"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<h3 class="font-h3 text-lg text-primary">The Harvest Box</h3>
<span class="font-h3 text-primary">$65</span>
</div>
<p class="text-sm text-on-surface-variant font-body-md">For the foodies. 15+ seasonal items &amp; bonus herbs.</p>
</div>
</div>
</label>
</div>
</section>
<!-- Section 2: Frequency -->
<section class="mb-12">
<div class="flex items-center gap-2 mb-4">
<h2 class="font-h2 text-h3 text-primary">How often?</h2>
<div class="hand-drawn-line text-secondary"></div>
</div>
<div class="grid grid-cols-3 gap-3">
<label class="cursor-pointer group">
<input checked="" class="sr-only peer" name="freq" type="radio"/>
<div class="text-center py-4 px-2 rounded-xl bg-surface-container-low border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary peer-checked:text-white transition-all">
<span class="block font-label-sm uppercase tracking-widest text-[10px] mb-1">Every</span>
<span class="block font-h3 text-lg">Week</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="sr-only peer" name="freq" type="radio"/>
<div class="text-center py-4 px-2 rounded-xl bg-surface-container-low border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary peer-checked:text-white transition-all">
<span class="block font-label-sm uppercase tracking-widest text-[10px] mb-1">Every</span>
<span class="block font-h3 text-lg">2 Weeks</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="sr-only peer" name="freq" type="radio"/>
<div class="text-center py-4 px-2 rounded-xl bg-surface-container-low border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary peer-checked:text-white transition-all">
<span class="block font-label-sm uppercase tracking-widest text-[10px] mb-1">Every</span>
<span class="block font-h3 text-lg">Month</span>
</div>
</label>
</div>
</section>
<!-- Section 3: Taste Preferences -->
<section class="mb-8">
<div class="flex items-center gap-2 mb-4">
<h2 class="font-h2 text-h3 text-primary">Your palate</h2>
<div class="hand-drawn-line text-secondary"></div>
</div>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest peer-checked:bg-secondary-container peer-checked:border-on-secondary-container text-on-surface-variant peer-checked:text-on-secondary-container font-label-sm text-sm transition-all hand-drawn-border">
            Always Root Veggies
          </div>
</label>
<label class="cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest peer-checked:bg-secondary-container peer-checked:border-on-secondary-container text-on-surface-variant peer-checked:text-on-secondary-container font-label-sm text-sm transition-all hand-drawn-border">
            Love Leafy Greens
          </div>
</label>
<label class="cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest peer-checked:bg-secondary-container peer-checked:border-on-secondary-container text-on-surface-variant peer-checked:text-on-secondary-container font-label-sm text-sm transition-all hand-drawn-border">
            No Mushrooms
          </div>
</label>
<label class="cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest peer-checked:bg-secondary-container peer-checked:border-on-secondary-container text-on-surface-variant peer-checked:text-on-secondary-container font-label-sm text-sm transition-all hand-drawn-border">
            Surprise Me
          </div>
</label>
</div>
</section>
<!-- Persistent Action Area -->
<div class="fixed bottom-[96px] left-0 w-full px-4 pb-4 z-40">
<div class="max-w-lg mx-auto bg-surface-container-high/90 backdrop-blur-md p-4 rounded-2xl shadow-lg border border-white/20">
<div class="flex justify-between items-center mb-4">
<div>
<p class="text-[10px] font-label-sm uppercase tracking-widest text-on-surface-variant">Estimated Total</p>
<p class="font-h2 text-2xl text-primary">$32.00 <span class="text-xs font-body-md text-on-surface-variant">/ box</span></p>
</div>
<div class="text-right">
<span class="text-[10px] font-label-sm uppercase tracking-widest text-on-surface-variant">Frequency</span>
<p class="font-h3 text-sm text-primary">Weekly</p>
</div>
</div>
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-h3 text-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all">
<span>Add to Subscription</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Shared Component: BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#F5F5F0] dark:bg-stone-950 rounded-t-2xl border-t border-[#D8D8C0] dark:border-stone-800 shadow-[0_-4px_12px_rgba(45,71,57,0.06)]">
<!-- Active State Logic: Mapping to Shop/Storefront as subscription start -->
<a class="flex flex-col items-center justify-center bg-[#2D4739] text-[#F5F5F0] rounded-xl px-4 py-1.5 transition-transform duration-200 Active: translate-y-0.5" href="#">
<span class="material-symbols-outlined" data-icon="storefront" style="font-variation-settings: 'FILL' 1;">storefront</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Shop</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6B705C] dark:text-[#8A8D7C] px-4 py-1.5 hover:bg-[#E8E8D0] dark:hover:bg-stone-800 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Recipes</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6B705C] dark:text-[#8A8D7C] px-4 py-1.5 hover:bg-[#E8E8D0] dark:hover:bg-stone-800 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Orders</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6B705C] dark:text-[#8A8D7C] px-4 py-1.5 hover:bg-[#E8E8D0] dark:hover:bg-stone-800 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
</body></html>
