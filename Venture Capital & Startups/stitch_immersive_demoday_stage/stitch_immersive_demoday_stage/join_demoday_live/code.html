<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .glass-panel {
            background: rgba(21, 32, 49, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(198, 198, 205, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .ghost-border {
            border-image: linear-gradient(to bottom, rgba(198, 198, 205, 0.2), rgba(198, 198, 205, 0.05)) 1;
        }
        .amber-glow {
            box-shadow: 0 0 20px rgba(255, 185, 95, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#909097",
                        "on-primary": "#2a3043",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#585e73",
                        "on-tertiary-container": "#6a798d",
                        "inverse-on-surface": "#263143",
                        "surface-container-high": "#1f2a3c",
                        "surface-bright": "#2f3a4c",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed-variant": "#39485a",
                        "background": "#081425",
                        "surface-container-lowest": "#040e1f",
                        "on-secondary-fixed": "#2a1700",
                        "inverse-surface": "#d8e3fb",
                        "surface-variant": "#2a3548",
                        "tertiary-container": "#000713",
                        "outline-variant": "#46464c",
                        "on-tertiary-fixed": "#0d1c2d",
                        "surface-tint": "#c0c6de",
                        "surface-container-low": "#111c2d",
                        "on-secondary-container": "#5b3800",
                        "on-secondary-fixed-variant": "#653e00",
                        "on-surface": "#d8e3fb",
                        "surface-container-highest": "#2a3548",
                        "primary": "#c0c6de",
                        "on-background": "#d8e3fb",
                        "primary-fixed-dim": "#c0c6de",
                        "tertiary-fixed": "#d4e4fa",
                        "secondary-fixed": "#ffddb8",
                        "primary-fixed": "#dce1fb",
                        "error-container": "#93000a",
                        "on-primary-container": "#72778d",
                        "surface": "#081425",
                        "on-surface-variant": "#c6c6cd",
                        "secondary-container": "#ee9800",
                        "primary-container": "#020617",
                        "on-tertiary": "#233143",
                        "on-secondary": "#472a00",
                        "on-error": "#690005",
                        "secondary": "#ffb95f",
                        "on-primary-fixed-variant": "#40465a",
                        "secondary-fixed-dim": "#ffb95f",
                        "tertiary-fixed-dim": "#b9c8de",
                        "tertiary": "#b9c8de",
                        "surface-dim": "#081425",
                        "surface-container": "#152031",
                        "on-primary-fixed": "#151b2d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "16px",
                        "base": "4px",
                        "lg": "24px",
                        "gutter": "12px",
                        "xs": "4px",
                        "md": "16px",
                        "xl": "40px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "h3": ["Space Grotesk"],
                        "status": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "h2": ["Space Grotesk"],
                        "h1": ["Space Grotesk"],
                        "label-caps": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "h3": ["18px", {"lineHeight": "1.2", "letterSpacing": "0em", "fontWeight": "600"}],
                        "status": ["11px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                        "h2": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h1": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-lg min-h-screen relative overflow-hidden flex items-center justify-center p-md">
<!-- Cinematic Background Hero -->
<div class="absolute inset-0 z-0">
<img alt="Futuristic Tech Keynote Stage" class="w-full h-full object-cover opacity-40 mix-blend-screen" data-alt="A sprawling futuristic tech keynote stage at a massive convention center. The stage features sharp geometric LED panels emitting a deep midnight blue glow with vibrant amber light streaks cutting through the haze. High-tech digital interfaces and floating holographic data visualizations are projected into the air, creating a high-stakes visionary atmosphere. The lighting is cinematic and moody, emphasizing a professional yet electric energy." src="https://lh3.googleusercontent.com/aida-public/AB6AXuApoutvwuJUuoQF5kipHQFMD7HomamvxpCseqIOym3LsTRj5FiV5iI9_JvXGOw6D-znCtgp7GlaY94NxV23AasLi7w2XQZeyJhqgCSGNr7AaBk3cd4ih2WavvqlP_qQVSJc-1RvAsJTNCyVh0GbWsr0_PMyRfvRjjBCGrDIq9VLuWefXgYRlSCt8D9QTrd4Busc5vbrFfVzn4Ie1ZT5sFokg5xmWRd_Q-E_uR4qctysz9OoB_w5MYRREo82kokKHDL8no-m18s3ecE"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/50"></div>
</div>
<!-- Branding Overlay -->
<div class="absolute top-xl left-xl z-20">
<h1 class="font-h1 text-secondary tracking-tighter uppercase mb-xs">DEMODAY LIVE</h1>
<p class="font-status text-on-surface-variant uppercase tracking-widest">Invest in the Future. Now.</p>
</div>
<!-- Auth Card -->
<main class="w-full max-w-[480px] z-10 animate-fade-in">
<div class="glass-panel rounded-xl overflow-hidden flex flex-col p-lg">
<!-- Tabs -->
<div class="flex items-center gap-lg border-b border-white/10 mb-lg">
<button class="font-h3 text-secondary pb-md border-b-2 border-secondary transition-all">Login</button>
<button class="font-h3 text-on-surface-variant hover:text-on-surface pb-md transition-all">Create Account</button>
</div>
<!-- Form Content -->
<div class="space-y-lg">
<div class="space-y-md">
<div class="space-y-base">
<label class="font-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-white/10 rounded-lg px-md py-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 transition-all font-body-sm text-on-surface" id="email" placeholder="name@company.com" type="email"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary">alternate_email</span>
</div>
</div>
<div class="space-y-base">
<label class="font-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-white/10 rounded-lg px-md py-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 transition-all font-body-sm text-on-surface" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary">lock</span>
</div>
</div>
</div>
<!-- Role Selection -->
<div class="space-y-md">
<p class="font-label-caps text-on-surface-variant uppercase">Select Your Role</p>
<div class="grid grid-cols-2 gap-md">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio" value="investor"/>
<div class="flex flex-col items-center justify-center gap-sm p-md rounded-lg border border-white/10 bg-white/5 peer-checked:border-secondary peer-checked:bg-secondary/10 peer-checked:text-secondary transition-all group">
<span class="material-symbols-outlined" data-weight="fill">monetization_on</span>
<span class="font-status uppercase">Investor</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="founder"/>
<div class="flex flex-col items-center justify-center gap-sm p-md rounded-lg border border-white/10 bg-white/5 peer-checked:border-secondary peer-checked:bg-secondary/10 peer-checked:text-secondary transition-all group">
<span class="material-symbols-outlined" data-weight="fill">rocket_launch</span>
<span class="font-status uppercase">Founder</span>
</div>
</label>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-md bg-secondary text-on-secondary font-h3 rounded-lg amber-glow hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-sm uppercase tracking-tight">
                    Secure Entrance
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Footer Links -->
<div class="flex items-center justify-between pt-md">
<button class="font-body-sm text-on-surface-variant hover:text-secondary transition-colors underline-offset-4 decoration-secondary/30 hover:underline">Forgot password?</button>
<div class="flex items-center gap-xs">
<span class="font-body-sm text-on-surface-variant">Secure by</span>
<span class="font-status text-on-surface tracking-widest">PITCH_LOCK</span>
</div>
</div>
</div>
</div>
</main>
<!-- Support Floating Link -->
<div class="absolute bottom-xl right-xl z-20 flex items-center gap-md">
<a class="flex items-center gap-xs font-status text-on-surface-variant hover:text-secondary transition-colors uppercase tracking-widest" href="#">
<span class="material-symbols-outlined text-sm">help</span>
            Need Help?
        </a>
<div class="w-[1px] h-4 bg-white/10"></div>
<a class="flex items-center gap-xs font-status text-on-surface-variant hover:text-secondary transition-colors uppercase tracking-widest" href="#">
            Privacy Policy
        </a>
</div>
</body></html>
