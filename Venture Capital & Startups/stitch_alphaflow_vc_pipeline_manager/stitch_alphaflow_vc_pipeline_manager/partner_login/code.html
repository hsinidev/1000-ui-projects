<style>
      .glass-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(113, 121, 115, 0.2);
      }
      .forest-gradient {
        background: radial-gradient(circle at top right, #013220, #001b0f);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>

<body class="bg-primary m-0 p-0 font-body-md text-on-surface antialiased">
<!-- Auth Layout Wrapper -->
<div class="min-h-screen flex items-center justify-center relative overflow-hidden forest-gradient px-4">
<!-- Abstract Background Detail -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary-fixed rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-on-primary-container rounded-full blur-[120px]"></div>
</div>
<!-- Main Auth Container -->
<main class="relative z-10 w-full max-w-md">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container mb-6 shadow-lg">
<span class="material-symbols-outlined text-primary-fixed text-4xl" data-icon="lock">lock</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-white mb-2 tracking-tight">AlphaFlow</h1>
<p class="font-body-md text-on-primary-container uppercase tracking-[0.2em] text-sm">Institutional Gateway</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-card-padding shadow-2xl">
<div class="mb-8">
<h2 class="font-headline-md text-headline-md text-primary mb-1">Welcome back</h2>
<p class="font-body-md text-on-surface-variant">Access your secure terminal</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Professional Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-2 focus:ring-on-primary-fixed-variant focus:border-transparent transition-all outline-none" id="email" name="email" placeholder="name@firm.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<a class="font-label-sm text-label-sm text-on-primary-container hover:text-primary transition-colors" href="#">Forgot credentials?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="key">key</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-2 focus:ring-on-primary-fixed-variant focus:border-transparent transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me & MFA Hint -->
<div class="flex items-center space-x-2">
<input class="w-4 h-4 text-primary-container border-outline-variant rounded focus:ring-primary-container" id="remember" name="remember" type="checkbox"/>
<label class="font-label-sm text-label-sm text-on-surface-variant" for="remember">Remember this workstation for 30 days</label>
</div>
<!-- CTA Button -->
<button class="w-full py-4 bg-primary text-white rounded-lg font-label-md text-label-md hover:bg-primary-container transition-all active:scale-[0.98] shadow-md flex items-center justify-center group" type="submit">
                        Enter Terminal
                        <span class="material-symbols-outlined ml-2 text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-outline-variant/30 flex justify-between items-center text-label-sm font-label-sm">
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined text-sm mr-1" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
                        AES-256 Encrypted
                    </div>
<div class="space-x-4">
<a class="text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
<a class="text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy</a>
</div>
</div>
</div>
<!-- Global Footer / Disclaimer -->
<div class="mt-12 text-center">
<p class="font-label-sm text-label-sm text-on-primary-container/60 max-w-xs mx-auto leading-relaxed">
                    Authorized access only. All activities on this institutional platform are logged and monitored for compliance.
                </p>

<img alt="Compliance Partner 2" class="h-5 object-contain" data-alt="A high-end, silver-foiled minimalist logo for a cybersecurity firm specialized in venture capital security. The image captures the logo under soft, professional studio lighting, emphasizing its metallic texture and sophisticated design. The background is a blurred, dark emerald texture." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCT0MvpoQGjeu6gvITUQ55HYGII8iQ8GPbjP6uUwJykJYxvD-6g2otCCoDoLTPuZNbRCMSf2s71Q5wWWABotDsSBBxTSh79qSzWXrhk6SgLSvGJN31eAvokvH-w6iE0RjP3IOmzDrOQHf-j4xp8s17B_TzmTBtKw3XG6gJf_HYBwQZmuPYMp7KxntbZENj3aI59_O8u_4orpP8jvXyxs7h6OVVt1RGv1utbhZBT8RTy0x7BuFtiFe3kDoLjokWIqHc5_yXtf8ZJTkA"/>
</div>
</div>
