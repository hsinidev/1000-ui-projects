<style>

      background: radial-gradient(circle, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
    }
    .scan-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, #008378, transparent);
      box-shadow: 0 0 15px #008378;
    }
    .receipt-mask {
      clip-path: polygon(0% 0%, 0% 100%, 10% 100%, 10% 20%, 90% 20%, 90% 80%, 10% 80%, 10% 100%, 100% 100%, 100% 0%);
    }
  </style>
<style>
    body {

<body class="bg-background text-on-surface font-body-base antialiased min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation (Contextual Suppression Logic applied, but TopAppBar is usually present in SpendWise for branding) -->
<header class="w-full top-0 sticky bg-white dark:bg-slate-900 shadow-sm border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 h-14 z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant">
<img alt="User" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSEdng0erP9yZGbQgiAiYp4EohLdm44839PwCPjy7g8LC16Nq8Zr9dbePy0Nh9ajtdFAnG4nxZo8ndsbaqfHg7ildaSHZu2yYWB0ZcQVBaShZZrXiKbI4ULzN4uTnR93DOKXFtB0vIThdMITnefI1sjTMk4CE3vqNRB6BAOJL7vHjtEAaXmGJMicvaRB9ZKSzF6mtuoh7AcE6qi8X0kLS-8zGFXhDrW_AbPqeSa1BzC2yejGb3bCezWhZgDXyNQq6p2O64q1m7XJHK"/>

<span class="text-xl font-bold text-teal-600 dark:text-teal-400 tracking-tight">SpendWise</span>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors p-2 rounded-lg">notifications</button>
</div>
</header>
<!-- Camera Viewfinder Section -->

<!-- Mock Camera Stream Background -->
<div class="absolute inset-0 z-0">

</div>
<!-- Scanner Overlays -->
<div class="absolute inset-0 z-10 camera-overlay pointer-events-none flex flex-col items-center justify-center">
<!-- Technical Corners -->
<div class="w-[280px] h-[450px] border-2 border-white/30 relative">
<!-- Top Left -->
<div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<!-- Top Right -->
<div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<!-- Bottom Left -->
<div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<!-- Bottom Right -->
<div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<!-- Text Detection Boxes (AI OCR Simulation) -->
<div class="absolute top-[20%] left-[15%] w-24 h-4 bg-primary/20 border border-primary/40 rounded-sm"></div>
<div class="absolute top-[28%] left-[15%] w-32 h-4 bg-primary/20 border border-primary/40 rounded-sm"></div>
<div class="absolute top-[36%] left-[15%] w-16 h-4 bg-primary/20 border border-primary/40 rounded-sm"></div>
<div class="absolute bottom-[10%] right-[10%] w-20 h-6 bg-primary/30 border border-primary/60 rounded-sm"></div>
<!-- Scanning Line Animation Simulation -->
<div class="scan-line absolute top-[10%] w-full"></div>
</div>
<!-- OCR Status Badge -->
<div class="mt-8 bg-black/50 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2 border border-white/10">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-white font-label-caps text-[10px]">AI DETECTING TEXT...</span>
</div>
</div>
<!-- Camera Controls (Floating) -->
<div class="absolute bottom-32 left-0 right-0 z-20 flex justify-center items-center gap-12">
<button class="w-10 h-10 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-white hover:bg-white/20 transition-all">
<span class="material-symbols-outlined">flash_on</span>
</button>
<button class="group relative flex items-center justify-center p-1 rounded-full border-4 border-white active:scale-95 transition-transform duration-150">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center shadow-lg group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-white text-3xl">center_focus_strong</span>
</div>
</button>
<button class="w-10 h-10 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-white hover:bg-white/20 transition-all">
<span class="material-symbols-outlined">image</span>
</button>
</div>

<h3 class="font-label-caps text-on-surface-variant uppercase">Recent Scans</h3>
<button class="text-teal-600 font-body-sm font-semibold">View All</button>
</div>
<div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">

<div class="flex-shrink-0 w-20 h-24 rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 overflow-hidden group cursor-pointer active:scale-95 transition-transform">
<img class="w-full h-full object-cover opacity-80" data-alt="A close-up high-resolution scan of a crumpled Starbucks receipt on a neutral gray surface. The digital rendering shows high-density details including clear text extraction and teal bounding boxes around the price total. Professional fintech aesthetic with balanced lighting and soft shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrPM6dMxFyhRgUvRfqkgw4Xyv1ojKr6mPT4uxc5H9oQfW53bac-t5ZgjdxKq9q-0uJyRsWxYozeov0OU8Qx7KB7L0NSmJNvwCLC-8I4z_WTU5hk4VHe1_dwiy0Bb7sUFE8krjF9O4Yt086H7UeOC2QGPPe8SSVMWmoRZihbtLR7zzioWLg2O9wKSEcUE0uQai165nSNh18gDNUK6apuASPtaWR9VLwdAGMlkTf4cVQrH04tgrZU8hZX3cpcILmmysfoY6OAWyc3AvY"/>
<div class="absolute bottom-0 w-full bg-primary/90 py-1 text-center">
<span class="text-[9px] text-white font-bold">$12.45</span>
</div>
</div>
<!-- Scan Card 2 -->
<div class="flex-shrink-0 w-20 h-24 rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 overflow-hidden group cursor-pointer active:scale-95 transition-transform">
<img class="w-full h-full object-cover opacity-80" data-alt="A digital scan of a grocery receipt with clear black font on white paper. The UI overlay highlights the date and merchant name with subtle teal rectangles. The composition is clean, organized, and fits the modular bento box design language of SpendWise." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB8Clg4WJzcwi2qZkc_nZuQx0gMsv86VXlq0a3wSRAZKJQRvBtoNaRO65VemOYyqp35SsBaj7rEqhKkTCXeoJn9U4IyQU87XaHT8xDBYsFg6vY3BN5wv0UIh1lMprWJoIrN8bgPoyrj3XsP5aaQFfRrFvAWWSce1iCmH-Fvrl9Hx_UvQHkBfZYcZdqtg5Q-9N35bMWEJ4Txg5H7sBWnri3UD5LnFm013n_5fmMmJzOSkrlwC6EcEjTwvC57jkzzEwcDXhZSaGrJRyUS"/>
<div class="absolute bottom-0 w-full bg-primary/90 py-1 text-center">
<span class="text-[9px] text-white font-bold">$84.20</span>
</div>
</div>

<img class="w-full h-full object-cover opacity-80" data-alt="A flat-lay scan of a technical repair receipt on a wood grain background, processed through a clean digital filter. The AI-OCR has tagged the document with a teal 'Verified' badge. The lighting is diffused and bright, creating a high-end corporate fintech feel." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOEvrPpiKFeJEhYqr-9SCy7FKJWQcicqTRcvkx6dKx7Ldxl0G6uwWo6UilYIar-qDrjGgGZK1sejQsTxkGFyJ-c3PzbhzHYCNONre7LEfnWHOImHIQJoH_IJGxrwwUb__c-HYE1Nn8jAccU71Bq5lPRYu3_2aS_ozPIT0YTyOMk04LcSyelIX6gXNdI8RbEjl-2k_p4kT5hb0Rau5whPOZcf7tD4-6652t53g8Fot5dyCyfdtgH80n-273Ttq4nb9CU0iTm06SoiYy"/>
<div class="absolute bottom-0 w-full bg-primary/90 py-1 text-center">
<span class="text-[9px] text-white font-bold">$210.00</span>
</div>
</div>
<!-- Placeholder/New -->
<div class="flex-shrink-0 w-20 h-24 rounded-lg border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center text-slate-400 gap-1">

<span class="text-[8px] font-bold uppercase">Import</span>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 w-full z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 shadow-[0_-2px_10px_rgba(15,23,42,0.05)] flex justify-around items-center h-16 px-2 pb-safe">
<!-- Overview Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="text-[11px] font-medium tracking-wide uppercase">Overview</span>
</a>
<!-- Scan Tab (Active) -->
<a class="flex flex-col items-center justify-center text-teal-600 dark:text-teal-400 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="center_focus_strong" style="font-variation-settings: 'FILL' 1;">center_focus_strong</span>
<span class="text-[11px] font-medium tracking-wide uppercase">Scan</span>
</a>
<!-- SaaS Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="subscriptions">subscriptions</span>
<span class="text-[11px] font-medium tracking-wide uppercase">SaaS</span>
</a>
<!-- Approvals Tab -->

<span class="material-symbols-outlined" data-icon="fact_check">fact_check</span>
