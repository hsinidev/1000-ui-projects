<div class="w-32 h-32 rounded-full glass-panel flex items-center justify-center border border-white/10 glow-effect">
<span class="material-symbols-outlined text-6xl text-primary-container" data-icon="face" style="font-variation-settings: 'wght' 200;">face</span>
</div>

<div class="absolute top-0 left-0 w-32 h-32 rounded-full border border-primary-container/10 scale-150 opacity-20"></div>
</div>
<h1 class="font-headline-xl text-headline-xl text-center mb-xs text-white">

            </h1>
<p class="font-body-md text-body-md text-on-surface-variant/60 tracking-wide text-center">

            </p>
</div>

<button class="w-full py-md px-lg rounded-xl glass-panel text-on-surface font-label-sm uppercase tracking-widest border border-white/5 hover:bg-white/5 transition-all active:scale-[0.98]">
                Enter Passcode

<div class="mt-md flex flex-col items-center gap-xs">

</div>
</div>
</div>

<span class="text-[10px] font-mono tracking-[0.5em] uppercase text-zinc-500">Encrypted_Session_Active</span>

</div>
