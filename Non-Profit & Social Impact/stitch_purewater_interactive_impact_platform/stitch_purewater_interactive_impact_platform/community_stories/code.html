<body class="bg-surface text-on-surface antialiased overflow-hidden">

<p class="font-body-md text-body-md text-white/90 max-w-[85%]">Since the clean water well was built, Amara spends her mornings in the classroom instead of trekking for water.</p>

<div class="w-full space-y-4">
