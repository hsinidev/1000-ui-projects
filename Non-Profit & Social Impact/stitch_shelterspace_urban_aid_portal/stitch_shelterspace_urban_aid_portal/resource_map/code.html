<!DOCTYPE html>

                        "on-tertiary-container": "#2a2c2c",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#1e1b19",

                        "secondary": "#635d5b",
                        "surface-container-highest": "#eae0de",

<style>
        body { background-color: #fff8f6; font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-search { backdrop-filter: blur(8px); background: rgba(255, 248, 246, 0.9); }
        .map-container { height: calc(100vh - 128px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface h-16 flex justify-between items-center px-margin-mobile shadow-sm">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-primary" data-icon="menu">menu</span>
<h1 class="font-headline-md text-headline-md font-semibold text-primary">ShelterSpace</h1>
</div>
<button class="bg-primary text-on-primary px-4 py-2 rounded-full font-label-md text-label-md hover:bg-surface-container-low transition-colors active:scale-95 duration-100">
            Get Help Now
        </button>
</header>
<!-- Map Canvas (Main Content) -->
<main class="pt-16 pb-24 overflow-hidden relative map-container">
<!-- Search and Filters Layer -->
<div class="absolute top-4 left-0 w-full px-margin-mobile z-40 space-y-3">
<div class="glass-search flex items-center px-4 h-12 rounded-xl shadow-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant" placeholder="Search resources..." type="text"/>
<span class="material-symbols-outlined text-primary ml-2" data-icon="tune">tune</span>
</div>
<!-- Category Chips -->
<div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
<div class="flex-none bg-primary text-on-primary px-4 py-2 rounded-full flex items-center gap-2 font-label-md shadow-sm">
<span class="material-symbols-outlined text-[18px]" data-icon="food_bank">food_bank</span>
                    Food Banks
                </div>
<div class="flex-none bg-surface-container-highest text-on-surface-variant px-4 py-2 rounded-full flex items-center gap-2 font-label-md border border-outline-variant/20">
<span class="material-symbols-outlined text-[18px]" data-icon="home_emergency">emergency_home</span>
                    Shelters
                </div>
<div class="flex-none bg-surface-container-highest text-on-surface-variant px-4 py-2 rounded-full flex items-center gap-2 font-label-md border border-outline-variant/20">
<span class="material-symbols-outlined text-[18px]" data-icon="medical_services">medical_services</span>
                    Medical
                </div>
</div>
</div>
<!-- Interactive Map Background -->
<div class="absolute inset-0 z-0 bg-surface-dim overflow-hidden">
<img class="w-full h-full object-cover opacity-80 mix-blend-multiply grayscale-[0.2]" data-alt="A detailed, clean urban navigation map view of a modern city grid with soft, warm grey and terracotta colored markers indicating community service locations. The aesthetic is institutional yet compassionate, featuring minimalist street lines and clear typography in a light-mode color palette that matches the terracotta and warm-grey theme." data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDilFdCxd2hv8Q4iJip9hssjjAlIQ3b1ADpkFopaNlofuEvVRzlt-7Dsg8UPZ0qsIBgBMZkT6x873uXeEqt1URpGi8uLAEsl6SevpqaurfhHyhuCIKxLAUM3FIJogXj6vMWgBh9V8YAFxB5xSVtmTn98SL8md2GqQw5CzfeJyH9n-QG2M1T2r2fo8jfLZ9DJkF4ek2URtGDFeb6ZCAorNElWmj9U4oUnbTojqC0bBomEreqBqCz90WWB1qpOku89w8HVU0lk9CPGFw"/>
<!-- Map Markers (Visual Overlays) -->
<div class="absolute top-1/2 left-1/3 -translate-x-1/2 -translate-y-1/2">
<div class="bg-primary text-on-primary p-2 rounded-full shadow-lg flex items-center justify-center relative">
<span class="material-symbols-outlined" data-icon="food_bank">food_bank</span>
<div class="absolute -bottom-1 w-2 h-2 bg-primary rotate-45"></div>
</div>
</div>
<div class="absolute top-[40%] right-1/4">
<div class="bg-secondary text-on-secondary p-2 rounded-full shadow-lg flex items-center justify-center relative">
<span class="material-symbols-outlined" data-icon="medical_services">medical_services</span>
<div class="absolute -bottom-1 w-2 h-2 bg-secondary rotate-45"></div>
</div>
</div>
<div class="absolute bottom-1/3 left-1/2">
<div class="bg-primary-container text-on-primary-container p-2 rounded-full shadow-lg flex items-center justify-center relative">
<span class="material-symbols-outlined" data-icon="home_emergency">emergency_home</span>
<div class="absolute -bottom-1 w-2 h-2 bg-primary-container rotate-45"></div>
</div>
</div>
</div>
<!-- Floating Action Button for Emergency -->
<div class="absolute bottom-32 right-margin-mobile z-40">
<button class="w-14 h-14 bg-error text-on-error rounded-full shadow-xl flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="sos">sos</span>
</button>
</div>
<!-- Nearest Resource Bottom Sheet (Partial) -->
<div class="absolute bottom-0 left-0 w-full z-40 px-margin-mobile pb-6">
<div class="bg-surface rounded-xl shadow-2xl p-stack-md border border-outline-variant/10">
<div class="flex justify-between items-start mb-2">
<div class="flex gap-3">
<div class="w-12 h-12 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" data-icon="food_bank">food_bank</span>
</div>
<div>
<h3 class="font-label-md text-on-surface">Grace Community Kitchen</h3>
<p class="text-on-surface-variant font-label-sm">Hot Meals • Open Until 8:00 PM</p>
</div>
</div>
<div class="text-right">
<span class="text-primary font-label-md">0.4 mi</span>
</div>
</div>
<div class="flex gap-3 mt-4">
<button class="flex-1 bg-surface-container-highest text-primary font-label-md py-3 rounded-lg flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="phone">phone</span>
                        Call
                    </button>
<button class="flex-[2] bg-primary text-on-primary font-label-md py-3 rounded-lg flex items-center justify-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-[20px]" data-icon="near_me">near_me</span>
                        Navigate
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 pb-safe bg-surface-container dark:bg-surface-container-high shadow-[0_-4px_12px_0_rgba(0,0,0,0.04)] rounded-t-xl">
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1.5 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="font-label-sm text-label-sm">Map</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-all">
<span class="material-symbols-outlined" data-icon="campaign">campaign</span>
<span class="font-label-sm text-label-sm">Advocacy</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-all">
<span class="material-symbols-outlined" data-icon="history_edu">history_edu</span>
<span class="font-label-sm text-label-sm">Stories</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-all">
<span class="material-symbols-outlined" data-icon="volunteer_activism">volunteer_activism</span>
<span class="font-label-sm text-label-sm">Giving</span>
</div>
</nav>
</body></html>
