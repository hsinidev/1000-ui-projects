            "spacing": {

                    "stack-sm": "12px"
            },
            "fontFamily": {
                    "display-lg": ["Manrope"],
                    "body-md": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "body-lg": ["Manrope"]

            "fontSize": {
                    "display-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "300"}],

          },
        },
      }

<style>
        .neumorphic-raised {
            box-shadow: 8px 8px 16px #d1d0c8, -8px -8px 16px #ffffff;
        }
        .neumorphic-sunken {
            box-shadow: inset 6px 6px 12px #d1d0c8, inset -6px -6px 12px #ffffff;
        }
        .neumorphic-active {
            box-shadow: inset 4px 4px 8px #d1d0c8, inset -4px -4px 8px #ffffff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-0 md:p-stack-lg">
<main class="w-full max-w-7xl min-h-[921px] bg-surface rounded-3xl overflow-hidden flex flex-col md:flex-row neumorphic-raised">
<!-- Image Section (Architecture) -->
<section class="relative w-full md:w-1/2 min-h-[300px] md:min-h-full">
<img alt="Lumina Residence Exterior" class="absolute inset-0 w-full h-full object-cover" data-alt="A professional architectural photograph of the Lumina Residence, showcasing a sleek, modernist residential complex with floor-to-ceiling glass windows and organic stone textures. The scene is bathed in the warm, soft golden hour sunlight of a peaceful late afternoon, emphasizing the serene and exclusive atmosphere. Manicured minimalist gardens with soft green foliage surround the base. The overall aesthetic is clean, bright, and luxurious, mirroring the cream and soft sage palette of a high-end digital sanctuary." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCrPpIATqLwV8KsiVtjV8jZrzdnZUap14BEHEk8YFgYZ7nyWAmSxYGPAeZGreSu7OCQviJfJx9BojW_p2DuOYHNtkrYkbFPv1H4VP17kVHCMoByC-LEuKQXew5fo4FRDcw5PfTvcFUqtTDud2l-Ez79rQ1r1J8OPOaudBXl-bzdfXBg3t3zkMractEWGPu9MRrETu8l--Pw1TVt7poN9vFQG4-oejmnEQ6At0oAlQrjxJW-zKgcKMjnltS6cJu_quV9ecbtjvnDGGx3"/>
<!-- Overlay Content -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent flex flex-col justify-end p-stack-lg">
<div class="backdrop-blur-md bg-surface/10 p-stack-md rounded-2xl border border-white/20">
<h1 class="font-display-lg text-display-lg text-white mb-stack-sm">Aura-Living</h1>
<p class="font-body-md text-white/90">Experience a sanctuary of seamless luxury and technological tranquility. Welcome to your digital front door.</p>
</div>
</div>
</section>
<!-- Form Section -->
<section class="w-full md:w-1/2 bg-surface flex flex-col justify-center p-container-padding md:p-stack-lg">
<div class="max-w-md mx-auto w-full">
<!-- Logo & Header -->
<header class="mb-stack-lg text-center md:text-left">
<span class="font-display-lg text-display-lg text-primary block mb-2">Lumina Residence</span>
<p class="font-body-md text-on-surface-variant">Secure Resident Portal</p>
</header>
<!-- Toggle Switch (Neumorphic) -->
<div class="flex p-unit bg-surface-container-low rounded-xl neumorphic-sunken mb-stack-lg">
<button class="flex-1 py-3 px-4 font-label-sm text-label-sm rounded-lg transition-all neumorphic-raised bg-surface text-primary">
                        SIGN IN
                    </button>
<button class="flex-1 py-3 px-4 font-label-sm text-label-sm rounded-lg transition-all text-on-surface-variant hover:text-primary">
                        SIGN UP
                    </button>
</div>
<!-- Auth Form -->
<form class="space-y-stack-md">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-2">RESIDENT EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 neumorphic-sunken focus:ring-2 focus:ring-primary-container font-body-md text-on-surface" placeholder="resident@aura-living.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-2">
<label class="font-label-sm text-label-sm text-on-surface-variant">PASSWORD</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-12 neumorphic-sunken focus:ring-2 focus:ring-primary-container font-body-md text-on-surface" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center space-x-3 px-2">
<div class="w-6 h-6 rounded bg-surface-container-low neumorphic-sunken flex items-center justify-center cursor-pointer group">
<div class="w-3 h-3 bg-primary rounded-sm opacity-0 group-hover:opacity-40 transition-opacity"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Remember my device</span>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md py-4 rounded-xl neumorphic-raised hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center space-x-3 mt-stack-md" type="submit">
<span>Enter Sanctuary</span>
<span class="material-symbols-outlined" data-weight="fill">arrow_forward</span>
</button>
</form>
<!-- Social/Alternate Access -->
<div class="mt-stack-lg">
<div class="flex items-center space-x-4 mb-stack-md">
<div class="flex-1 h-[1px] bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline">OR ACCESS WITH</span>
<div class="flex-1 h-[1px] bg-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center space-x-2 py-3 bg-surface rounded-xl neumorphic-raised hover:bg-surface-container-low transition-colors">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBILn7P4GMxSkdhQINSxu6Hv7AgHMfmBceRTKiyBWhdlz4bPPaAceXHT2zv5puU8p0urTbbmasy91tiin7L-_8Gaibru42sXuZ34tDOgJyX4bhiAdyZ3mKrzlEk6YWf2AcdiCzRADtoKUgka-7QOdmBDwR7yrRB65wCBKUz1MnLWUSjgD9zrLtC_YgOBDMaFImAgN2yLTDlGxUUiGhbO-OFZWWJYbLFwD6Tf3Q_VCx--bzuFq7TtfFDWTAMNxNQOZtsBTlJANqdnMqa"/>
<span class="font-label-sm text-label-sm">GOOGLE</span>
</button>
<button class="flex items-center justify-center space-x-2 py-3 bg-surface rounded-xl neumorphic-raised hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-label-sm text-label-sm">APPLE ID</span>
</button>
</div>
</div>
<!-- Footer Support -->
<footer class="mt-stack-lg text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                        Need assistance? <a class="text-primary font-bold" href="#">Contact Concierge</a>
</p>
</footer>
</div>
</section>
</main>
<!-- Background Decoration for Soft-UI Depth -->
<div class="fixed -z-10 top-0 left-0 w-full h-full pointer-events-none opacity-40">
<div class="absolute top-[10%] left-[5%] w-96 h-96 bg-primary-fixed blur-[120px] rounded-full"></div>
<div class="absolute bottom-[10%] right-[5%] w-80 h-80 bg-secondary-fixed blur-[100px] rounded-full"></div>
</div>
</body></html>
