<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Manrope:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#444748",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#f2f0f0",
                    "tertiary-fixed": "#e6e2df",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#dbdad9",
                    "on-secondary-container": "#5f6161",
                    "tertiary-fixed-dim": "#cac6c4",
                    "primary-fixed-dim": "#c8c6c5",
                    "on-background": "#1b1c1c",
                    "on-surface": "#1b1c1c",
                    "inverse-surface": "#303031",
                    "primary": "#000000",
                    "surface-container-high": "#e9e8e7",
                    "primary-fixed": "#e5e2e1",
                    "secondary-fixed": "#e2e2e2",
                    "surface-container": "#efeded",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#858383",
                    "on-error": "#ffffff",
                    "tertiary": "#000000",
                    "outline": "#747878",
                    "inverse-primary": "#c8c6c5",
                    "error": "#ba1a1a",
                    "outline-variant": "#c4c7c7",
                    "surface-variant": "#e3e2e2",
                    "surface-container-low": "#f5f3f3",
                    "surface": "#fbf9f9",
                    "on-primary-fixed-variant": "#474746",
                    "surface-bright": "#fbf9f9",
                    "on-tertiary-container": "#868382",
                    "secondary-fixed-dim": "#c6c6c7",
                    "on-tertiary-fixed": "#1c1b1a",
                    "on-primary-fixed": "#1c1b1b",
                    "primary-container": "#1c1b1b",
                    "surface-container-highest": "#e3e2e2",
                    "on-primary": "#ffffff",
                    "background": "#fbf9f9",
                    "secondary-container": "#dcdddd",
                    "on-tertiary-fixed-variant": "#484645",
                    "on-secondary-fixed": "#1a1c1c",
                    "on-secondary-fixed-variant": "#454747",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#5d5f5f",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#1c1b1a",
                    "surface-tint": "#5f5e5e"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-max": "1440px",
                    "unit": "8px",
                    "section-gap": "128px",
                    "margin-edge": "64px",
                    "gutter": "32px"
            },
            "fontFamily": {
                    "headline-lg": ["Noto Serif"],
                    "body-lg": ["Manrope"],
                    "label-caps": ["Manrope"],
                    "headline-md": ["Noto Serif"],
                    "display-xl": ["Noto Serif"],
                    "body-md": ["Manrope"]
            },
            "fontSize": {
                    "headline-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "32px", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.15em", "fontWeight": "600"}],
                    "headline-md": ["32px", {"lineHeight": "40px", "fontWeight": "400"}],
                    "display-xl": ["72px", {"lineHeight": "80px", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-tertiary-fixed-dim selection:text-primary overflow-hidden">
<main class="flex h-screen w-full">
<!-- Visual Anchor: Left Side -->
<section class="hidden lg:flex lg:w-1/2 relative bg-primary overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Penthouse Interior" class="w-full h-full object-cover opacity-80" data-alt="A breathtaking view of a modern luxury penthouse interior at twilight. Floor-to-ceiling glass walls reveal a sprawling metropolitan skyline glowing with golden city lights. The interior features minimalist marble floors, a plush deep charcoal velvet sofa, and warm recessed architectural lighting. The atmosphere is serene and exclusive, emphasizing a minimalist-luxe aesthetic with high-contrast shadows and clean structural lines." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCpijHCJz8Oojr6OoUFQoItK87guiR1WUi9oJFspi20oBvxaDW-ZcdLkdAbKphOQOVku9JykE9dZOd5Ttb6O_6a42ehtF-xC0TGeFr_d_ZcNBInvGCRjdEGWRLoM7yYb7eNxuuFezFQ9C9o4OoeTJYXggEECLRt_ZewIu_nGnFU2yu2qgKB8wHou6D4Dx-rgxbTiVlXMBCn1UGAl_qr3bQIJtBQGBFJrAOdfBOXw0nemESd2gDmfYi_IuA-uDyiF5f2_T80585rLr4"/>
</div>
<!-- Brand Overlay -->
<div class="relative z-10 p-margin-edge flex flex-col justify-between h-full bg-gradient-to-t from-primary/60 to-transparent">
<div>
<h1 class="font-headline-lg text-headline-lg text-white tracking-tighter">SKYLINE ELITE</h1>
<p class="mt-unit font-label-caps text-label-caps text-white/70 uppercase tracking-widest">The Peak of Private Living</p>
</div>
<div class="max-w-md">
<p class="font-headline-md text-headline-md text-white mb-4">A sanctuary crafted for the discerning few.</p>
<div class="h-px w-24 bg-tertiary-fixed-dim"></div>
</div>
</div>
</section>
<!-- Authentication Canvas: Right Side -->
<section class="w-full lg:w-1/2 bg-surface flex flex-col justify-center items-center px-gutter lg:px-margin-edge relative">
<!-- Mobile Brand Visibility -->
<div class="absolute top-gutter left-gutter lg:hidden">
<span class="font-headline-md text-headline-md text-primary tracking-tighter">SKYLINE ELITE</span>
</div>
<div class="w-full max-w-md space-y-section-gap">
<!-- Header -->
<header class="space-y-4">
<h2 class="font-headline-lg text-headline-lg text-primary">Welcome back</h2>
<p class="font-body-md text-secondary">Enter your credentials to access your private collection.</p>
</header>
<!-- Form -->
<form class="space-y-12">
<div class="space-y-8">
<!-- Email Input -->
<div class="group relative">
<label class="font-label-caps text-label-caps text-on-surface-variant group-focus-within:text-tertiary-fixed-dim transition-colors" for="email">EMAIL ADDRESS</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-4 font-body-md text-primary focus:border-tertiary-fixed-dim transition-all placeholder:text-outline-variant/50" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password Input -->
<div class="group relative">
<div class="flex justify-between items-end mb-2">
<label class="font-label-caps text-label-caps text-on-surface-variant group-focus-within:text-tertiary-fixed-dim transition-colors" for="password">PASSWORD</label>
<a class="font-label-caps text-[10px] text-secondary hover:text-primary transition-colors" href="#">FORGOT?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-4 font-body-md text-primary focus:border-tertiary-fixed-dim transition-all placeholder:text-outline-variant/50" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="space-y-6">
<button class="w-full bg-primary text-white py-6 font-label-caps text-label-caps tracking-[0.2em] hover:bg-on-surface-variant transition-colors duration-300" type="submit">
                            SIGN IN
                        </button>
<div class="flex items-center gap-4">
<div class="h-px flex-1 bg-outline-variant/30"></div>
<span class="font-label-caps text-[10px] text-outline-variant">OR CONTINUE WITH</span>
<div class="h-px flex-1 bg-outline-variant/30"></div>
</div>
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center gap-2 border border-outline-variant/30 py-4 font-label-caps text-label-caps text-secondary hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="cloud">cloud</span> GOOGLE
                            </button>
<button class="flex items-center justify-center gap-2 border border-outline-variant/30 py-4 font-label-caps text-label-caps text-secondary hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="apple">ios</span> APPLE
                            </button>
</div>
</div>
</form>
<!-- Footer Link -->
<footer class="pt-8 flex flex-col gap-4">
<p class="font-body-md text-secondary text-center">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline decoration-tertiary-fixed-dim underline-offset-4" href="#">Inquire for Membership</a>
</p>
<div class="flex justify-center gap-6 pt-12">
<a class="font-label-caps text-[10px] text-outline-variant hover:text-secondary transition-colors" href="#">PRIVACY POLICY</a>
<a class="font-label-caps text-[10px] text-outline-variant hover:text-secondary transition-colors" href="#">TERMS OF SERVICE</a>
</div>
</footer>
</div>
</section>
</main>
<!-- Navigation suppression: This is a task-focused screen (Login), so global BottomNavBar/SideNav are suppressed per UI mandate -->
<!-- Discreet Close/Back Action -->
<a class="fixed top-gutter right-gutter z-50 flex items-center justify-center w-12 h-12 bg-white/10 backdrop-blur-md lg:bg-transparent border border-outline-variant/20 lg:border-none group" href="/">
<span class="material-symbols-outlined text-primary lg:text-secondary group-hover:text-primary transition-colors" data-icon="close">close</span>
</a>
</body></html>
