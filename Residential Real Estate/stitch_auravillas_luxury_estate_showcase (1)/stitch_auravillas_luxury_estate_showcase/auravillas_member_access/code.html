<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "on-secondary-fixed": "#0d1d2a",
                        "surface-bright": "#fcf9f8",
                        "on-tertiary-container": "#68695e",
                        "surface": "#fcf9f8",
                        "outline-variant": "#cec5ba",
                        "primary-container": "#f7e7ce",
                        "surface-container": "#f0eded",
                        "primary": "#685d4a",
                        "surface-container-highest": "#e4e2e1",
                        "inverse-primary": "#d3c5ad",
                        "secondary-container": "#d1e1f4",
                        "tertiary-container": "#eaeadb",
                        "surface-variant": "#e4e2e1",
                        "primary-fixed-dim": "#d3c5ad",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#556474",
                        "secondary-fixed-dim": "#b8c8da",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#5e5f54",
                        "on-primary-fixed-variant": "#4f4533",
                        "inverse-on-surface": "#f3f0f0",
                        "background": "#fcf9f8",
                        "surface-container-high": "#eae7e7",
                        "primary-fixed": "#f0e0c8",
                        "on-primary-fixed": "#221b0b",
                        "on-error-container": "#93000a",
                        "outline": "#7d766c",
                        "on-tertiary-fixed": "#1b1c14",
                        "on-primary-container": "#726753",
                        "surface-tint": "#685d4a",
                        "surface-container-low": "#f6f3f2",
                        "error": "#ba1a1a",
                        "inverse-surface": "#303030",
                        "tertiary-fixed": "#e3e3d5",
                        "on-surface-variant": "#4b463d",
                        "secondary": "#50606f",
                        "on-surface": "#1b1c1c",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-sm": "12px",
                        "margin-page": "80px",
                        "gutter": "24px",
                        "stack-md": "32px",
                        "section-gap": "160px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "h2": ["Noto Serif"],
                        "h1": ["Noto Serif"],
                        "body-lg": ["Inter"],
                        "h3": ["Noto Serif"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.15em", "fontWeight": "600"}],
                        "h2": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                        "h1": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "300"}],
                        "h3": ["32px", {"lineHeight": "1.3", "letterSpacing": "0em", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .auth-card {
            backdrop-filter: blur(12px);
            border: 0.5px solid rgba(125, 118, 108, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center overflow-x-hidden">
<!-- Top Navigation Bar (Suppressed but available for context if needed, per JSON we keep Brand Identity) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-6 bg-stone-50/80 backdrop-blur-md border-b border-slate-200/20">
<div class="font-serif text-xl tracking-[0.2em] text-slate-900">AuraVillas</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-slate-900 cursor-pointer">brightness_medium</span>
</div>
</header>
<!-- Background Element -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover opacity-20 filter grayscale-[20%]" data-alt="A sprawling, ultra-modern luxury villa at sunset, featuring clean architectural lines and expansive floor-to-ceiling glass walls. The warm evening light casts a soft golden glow over the infinity pool and the minimalist ivory-colored stone terrace. The atmosphere is one of profound serenity and high-end exclusivity, reflecting a quiet luxury aesthetic with a palette of cream, slate, and warm champagne tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOcto3pccAWzw9JqjNvkAgLmHbBFDeBdch5mRki-JGQQ2x9nMTqPWlTVogxf1aEZzfguZda3-GgjsSvdR7UA1zTkqwKRgkHyAk-cLMsmTCWWyEl8q5yR1IfqIGOdi70wHcKE6p47tllOTxw5FWRVV0MQTpJJsN9da5yZXhMPXxjnzHrkHzbl5z7I3Q0BUP0j2zmDMAS_QhxEHweCCH_7XNEtEJ_Zs11iv8bODpUJw5PHHZ_rKlaJyonLA9VyGv5p6DQkroQ7IFY3A"/>
</div>
<!-- Centralized Auth Canvas -->
<main class="relative z-10 w-full max-w-lg px-gutter py-section-gap">
<div class="auth-card bg-surface-container-lowest/90 p-12 shadow-sm rounded-none border border-outline-variant/30">
<!-- Branding/Identity -->
<div class="text-center mb-stack-md">
<span class="font-label-caps text-label-caps text-primary tracking-[0.3em] uppercase block mb-4">The Inner Circle</span>
<h1 class="font-h2 text-h3 text-on-surface mb-2">Member Portal</h1>
<p class="font-body-md text-on-surface-variant max-w-xs mx-auto">Access your curated selection of architectural masterpieces.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-stack-md">
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-primary block uppercase" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline/30 px-0 py-2 focus:ring-0 focus:border-primary-container transition-all font-body-md placeholder:text-surface-dim" id="email" placeholder="email@address.com" type="email"/>
</div>
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-primary block uppercase" for="password">Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline/30 px-0 py-2 focus:ring-0 focus:border-primary-container transition-all font-body-md placeholder:text-surface-dim" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex justify-between items-center py-4">
<a class="font-label-caps text-[10px] text-on-surface-variant hover:text-primary transition-colors uppercase border-b border-transparent hover:border-primary" href="#">Forgot Credentials?</a>
</div>
<button class="w-full bg-secondary text-on-secondary font-label-caps py-4 tracking-widest uppercase hover:bg-primary transition-all duration-500 shadow-sm" type="submit">
                    Enter Portal
                </button>
</form>
<!-- Secondary Actions & Transition -->
<div class="mt-12 pt-8 border-t border-outline-variant/20 text-center">
<p class="font-body-md text-on-surface-variant mb-4">Do not have an invitation?</p>
<button class="font-label-caps text-label-caps text-primary border border-primary px-8 py-3 hover:bg-primary-container/20 transition-all uppercase">
                    Request Account
                </button>
</div>
</div>
<!-- Aesthetic Footnote -->
<div class="mt-8 text-center">
<p class="font-label-caps text-[10px] text-on-surface-variant/60 tracking-[0.2em] uppercase">
                Privacy &amp; Discretion Guaranteed
            </p>
</div>
</main>
<!-- Abstract Image Inset (Editorial Touch) -->
<div class="fixed bottom-margin-page right-margin-page w-48 h-64 z-20 hidden lg:block overflow-hidden shadow-xl border border-white/40">
<img class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700" data-alt="Close-up detail of high-end architectural materials, showing the intersection of light-colored travertine stone and a brushed champagne metal frame. Soft, directional light creates elegant shadows that highlight the textures and precision of the craftsmanship. The composition is highly minimalist and editorial, focusing on the tactile quality of a luxury villa's interior design." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvhQH0JMydLMUi-RNM8g3r9CVcnp2UIjnhv24XcCPzpO-XZ-7FDUG83galM9vayAxRygcbqih2q6KE1b_akJ7OMFP8hFtn421Ubqd1EznNvSYZ7MPozYYVE3TFaMoTTHxTDQqmTHBj4QbUpeQTxMY55kWErHxF414KpDSNO-t3y9QXSqfeIEc8ee8NKn6F_ecFfVXhkcqXyodyHuSirsU8Nz3ZWi9M3P2_YW87gvGVLnkhIFXa8Icn2BUcZsm9qSrP1RcrXWBR-fc"/>
</div>
<!-- Bottom Ornamentation (Suppressed Nav for Transactional focus) -->
<footer class="fixed bottom-0 w-full py-6 flex justify-center items-center z-10 pointer-events-none">
<div class="w-px h-12 bg-outline/20"></div>
</footer>
</body></html>
