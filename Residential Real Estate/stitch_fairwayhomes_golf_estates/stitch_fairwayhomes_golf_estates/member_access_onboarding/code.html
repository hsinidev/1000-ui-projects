<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500;600;700&amp;family=Work+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#ebefe8",
                    "on-primary-fixed": "#00210e",
                    "tertiary-fixed-dim": "#ffb2b7",
                    "tertiary": "#812c37",
                    "surface-dim": "#d7dbd4",
                    "on-error": "#ffffff",
                    "secondary": "#465f88",
                    "on-primary-fixed-variant": "#00522a",
                    "secondary-fixed-dim": "#aec7f6",
                    "surface": "#f6fbf3",
                    "on-surface-variant": "#3f4940",
                    "secondary-container": "#b6d0ff",
                    "primary-container": "#00703c",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#94f0af",
                    "primary-fixed": "#9af6b5",
                    "secondary-fixed": "#d6e3ff",
                    "on-background": "#181d18",
                    "primary-fixed-dim": "#7eda9a",
                    "tertiary-fixed": "#ffdadb",
                    "on-secondary-fixed-variant": "#2d476f",
                    "on-surface": "#181d18",
                    "surface-container-highest": "#dfe4dc",
                    "primary": "#00552c",
                    "surface-container-low": "#f0f5ed",
                    "on-secondary-container": "#3f5881",
                    "surface-tint": "#006d3a",
                    "tertiary-container": "#9f434d",
                    "outline-variant": "#becabd",
                    "on-tertiary-fixed": "#40000d",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#001b3d",
                    "inverse-surface": "#2d322d",
                    "surface-variant": "#dfe4dc",
                    "background": "#f6fbf3",
                    "surface-bright": "#f6fbf3",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#7d2934",
                    "outline": "#6f7a6f",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#7eda9a",
                    "on-tertiary-container": "#ffd2d3",
                    "inverse-on-surface": "#edf2ea",
                    "surface-container-high": "#e5eae2"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "section-padding": "80px",
                    "margin": "64px",
                    "unit": "8px",
                    "container-max": "1280px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "headline-sm": ["Noto Serif"],
                    "body-lg": ["Work Sans"],
                    "label-caps": ["Work Sans"],
                    "body-md": ["Work Sans"],
                    "headline-md": ["Noto Serif"],
                    "display-lg": ["Noto Serif"]
            },
            "fontSize": {
                    "headline-sm": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-md": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f6fbf3;
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface selection:bg-primary-container selection:text-white">
<!-- Authentication Shell -->
<main class="min-h-screen flex overflow-hidden">
<!-- Left Side: Lifestyle Image Section -->
<section class="hidden lg:block lg:w-1/2 relative bg-primary">
<div class="absolute inset-0 z-10 bg-gradient-to-t from-primary/60 to-transparent"></div>
<img class="absolute inset-0 w-full h-full object-cover" data-alt="A breathtaking panoramic view of a lush, manicured championship golf course at dawn. The rising sun casts a warm, golden glow over rolling emerald fairways and misty water hazards. Tall, stately pine trees line the perimeter, silhouetted against a soft pastel sky of pinks and oranges. The image captures the serene and exclusive atmosphere of high-end luxury living, utilizing a vibrant palette of deep heritage greens and golden light." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAG1CByf-MirsAMtutRkwx6ARmm_5Cuqi43egvJStvN6vXXazB-JnZSJIaYwKThwgif7Ur2Lx9Rq7gz5NT3neTunmzZB4_0A7qTWD-uJJFsmb3QwfgchAHbvjgAQfw1dR4hyitqrj_Y0Wh_Kh2QAvXIxNy5mXC9UcuVEI6jLX-B-0Nc0VMyVI13ZmvSZl_0gExKM1PCLVf8DvH34npwr3ol8pcZGrbvwW3P0jYst5Or5LD4anIEFCYMFDPjY4zwVIrPdS_sbP0pwA"/>
<div class="absolute bottom-16 left-16 z-20 max-w-lg">
<div class="bg-white/10 backdrop-blur-md p-8 border border-white/20 rounded-lg">
<h2 class="font-display-lg text-display-lg text-white mb-4">The Standard of Excellence.</h2>
<p class="font-body-lg text-body-lg text-white/90">Experience a lifestyle defined by precision, heritage, and the quiet luxury of world-class amenities.</p>
</div>
</div>
</section>
<!-- Right Side: Authentication Form Section -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-gutter md:p-margin bg-surface">
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="mb-12 text-center lg:text-left">
<span class="text-2xl font-bold tracking-tighter text-primary block mb-2">FairwayHomes</span>
<h1 class="font-headline-md text-headline-md text-on-surface">Member Portal</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Welcome back to the club.</p>
</div>
<!-- Form Section -->
<form class="space-y-8">
<!-- Member ID Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest" for="member_id">Member ID</label>
<div class="relative group">
<input class="w-full bg-transparent border-b border-outline py-3 px-0 focus:border-primary focus:ring-0 transition-colors duration-300 placeholder:text-outline-variant" id="member_id" name="member_id" placeholder="Enter your credentials" required="" type="text"/>
<span class="absolute right-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant group-focus-within:text-primary">person</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest" for="password">Password</label>
<a class="font-label-caps text-[10px] text-primary hover:underline uppercase tracking-wider" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full bg-transparent border-b border-outline py-3 px-0 focus:border-primary focus:ring-0 transition-colors duration-300 placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<span class="absolute right-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant group-focus-within:text-primary">lock</span>
</div>
</div>
<!-- Options -->
<div class="flex items-center space-x-2 py-2">
<input class="w-4 h-4 rounded-sm border-outline text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-md text-sm text-on-surface-variant" for="remember">Remember me on this device</label>
</div>
<!-- Actions -->
<div class="pt-4 space-y-4">
<button class="w-full bg-primary text-white py-4 px-8 font-label-caps text-label-caps uppercase tracking-[0.2em] rounded-lg hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all shadow-sm" type="submit">
                            Sign In
                        </button>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant"></div></div>
<div class="relative flex justify-center text-xs uppercase tracking-tighter"><span class="bg-surface px-4 text-on-surface-variant font-label-caps">Or</span></div>
</div>
<button class="w-full border border-secondary text-secondary py-4 px-8 font-label-caps text-label-caps uppercase tracking-[0.2em] rounded-lg hover:bg-secondary-container/10 active:scale-[0.98] transition-all" type="button">
                            Request Access
                        </button>
</div>
</form>
<!-- Footer-style Links -->
<div class="mt-16 flex flex-col md:flex-row justify-between items-center text-[10px] uppercase tracking-widest text-outline font-label-caps space-y-4 md:space-y-0">
<span>© 2024 FairwayHomes</span>
<div class="flex space-x-6">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Legal</a>
<a class="hover:text-primary transition-colors" href="#">Concierge</a>
</div>
</div>
</div>
</section>
</main>
<!-- Footer Suppression Logic: The transactional login screen minimizes global distractions to focus on authentication. -->
</body></html>
