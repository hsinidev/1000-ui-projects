<style>.glass-panel {
    background: rgba(43, 27, 23, 0.7);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 183, 123, 0.1)
    }
.copper-input {
    background: transparent;
    border-bottom: 1px solid rgba(255, 183, 123, 0.4);
    transition: all 0.3s ease
    }
.copper-input:focus {
    outline: none;
    border-bottom-color: #ffb77b;
    background: rgba(84, 11, 14, 0.05)
    }
.polished-copper-btn {
    background: linear-gradient(135deg, #7a4100 0%, #ffb77b 50%, #7a4100 100%);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2)
    }
.dark-walnut-scrim {
    background: linear-gradient(to bottom, rgba(15, 15, 15, 0.6), rgba(15, 15, 15, 0.9))
    }
.bg-auth {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBzAI8xXX2UdGe5t0XNJGuEoWnzdmbzgWuxZeqd1EMCFIdEQd_dH6JfrDp5z9qvq2fBP1rLbLanWCy5vU8kB_QGS-GOO2iqg-XkrDjReRq-7txFSQjE3oRRGZYwPQEvARGozDSwNWDION86kZCMFrSnjTRWYvzTbJFYW5nc79TIiNOHakbhXn8u3BDFDzGJr22LS7P6pLD7VN12dfWkrlLJcKO0IYsjeH9q5BWOSGPNieJbQwubtQWtWF63AUMwJJoxv46AQQ7-uU4);
    background-size: cover;
    background-position: center
    }</style>

<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- Auth Background Canvas -->
<div class="fixed inset-0 bg-auth z-0" data-alt="A high-contrast, macro photograph of a crystal wine glass reflecting deep burgundy wine, set against a dark polished walnut wood texture. The lighting is cinematic and moody, with warm copper glints highlighting the rim of the glass and the grain of the wood. The atmosphere is one of extreme luxury, privacy, and artisanal excellence, utilizing a palette of ink black, deep mahogany, and metallic copper tones.">
<div class="absolute inset-0 dark-walnut-scrim"></div>
</div>
<!-- Main Auth Container -->
<main class="relative z-10 flex min-h-screen items-center justify-center px-margin">
<div class="max-w-[480px] w-full flex flex-col items-center">
<!-- Brand Anchor -->
<div class="mb-stack-lg text-center">
<h1 class="font-display-md text-display-md text-primary tracking-tighter mb-unit">Epicurean Club</h1>
<p class="font-label-lg text-label-lg uppercase tracking-widest text-tertiary-fixed-dim">Pursue Artisanal Excellence</p>
</div>
<!-- Auth Card -->
<div class="glass-panel w-full p-stack-lg rounded-lg shadow-2xl">
<!-- Toggle Navigation -->
<div class="flex w-full mb-stack-md border-b border-outline-variant/20">
<button class="flex-1 pb-stack-sm font-label-lg text-label-lg text-primary border-b-2 border-primary transition-all duration-300">
                        EXISTING MEMBER
                    </button>
<button class="flex-1 pb-stack-sm font-label-lg text-label-lg text-on-surface-variant hover:text-on-surface transition-all duration-300">
                        APPLY FOR MEMBERSHIP
                    </button>
</div>
<!-- Form Section -->
<form class="space-y-stack-md">
<div class="space-y-unit">
<label class="font-label-sm text-label-sm uppercase text-secondary-fixed-dim tracking-widest px-2">Member Identifier</label>
<input class="copper-input w-full p-4 font-body-md text-on-surface placeholder:text-on-surface-variant/30" placeholder="email@artisan.com" type="email"/>
</div>
<div class="space-y-unit">
<div class="flex justify-between items-center px-2">
<label class="font-label-sm text-label-sm uppercase text-secondary-fixed-dim tracking-widest">Secret Key</label>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">FORGOTTEN?</a>
</div>
<input class="copper-input w-full p-4 font-body-md text-on-surface placeholder:text-on-surface-variant/30" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center gap-stack-sm px-2 py-unit">
<input class="w-4 h-4 rounded bg-surface-variant border-outline text-primary focus:ring-primary ring-offset-background" id="remember" type="checkbox"/>
<label class="font-label-sm text-label-sm text-on-surface-variant" for="remember">MAINTAIN DISCREET ACCESS</label>
</div>
<div class="pt-stack-sm">
<button class="polished-copper-btn w-full py-4 rounded-lg font-headline-md text-headline-md text-on-primary-fixed uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                            Enter The Vault
                        </button>
</div>
</form>
<!-- Footer of Card -->
<div class="mt-stack-md text-center pt-stack-sm border-t border-outline-variant/10">
<p class="font-label-sm text-label-sm text-on-surface-variant/60 italic">
                        Access is strictly limited to verified patrons and vineyard partners.
                    </p>
</div>
</div>
<!-- Signature Sommelier Badge (Contextual) -->
<div class="mt-stack-md flex items-center gap-unit bg-primary-container/30 border border-secondary-fixed-dim/20 px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-primary text-[18px]" data-weight="fill">verified</span>
<span class="font-label-sm text-label-sm text-tertiary-fixed-dim uppercase tracking-widest">Sommelier Verified Portal</span>
</div>
</div>
</main>
<!-- Content-specific Decorative Element -->
<div class="fixed bottom-margin right-margin z-20 pointer-events-none opacity-40 md:opacity-100">
<div class="flex flex-col items-end border-r border-primary-fixed-dim/30 pr-stack-sm">
<span class="font-display-lg text-display-lg text-primary-fixed-dim/10 leading-none">2024</span>
<span class="font-label-lg text-label-lg text-on-surface-variant tracking-[0.3em] uppercase">Vintage</span>
</div>
</div>
</body></html>
