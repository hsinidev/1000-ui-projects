<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;700&amp;family=Manrope:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "secondary-fixed": "#e5e2e1",
                  "secondary-container": "#474746",
                  "on-secondary": "#313030",
                  "surface-dim": "#121414",
                  "surface": "#121414",
                  "surface-container": "#1f2020",
                  "on-primary-fixed-variant": "#534528",
                  "on-tertiary-container": "#555453",
                  "on-primary-container": "#615234",
                  "on-background": "#e3e2e2",
                  "error": "#ffb4ab",
                  "background": "#121414",
                  "on-tertiary-fixed": "#1c1b1b",
                  "primary": "#f8e2ba",
                  "outline-variant": "#4c463c",
                  "surface-container-high": "#292a2a",
                  "tertiary-fixed-dim": "#c9c6c5",
                  "surface-container-low": "#1b1c1c",
                  "on-tertiary-fixed-variant": "#474646",
                  "surface-container-lowest": "#0d0e0f",
                  "primary-container": "#dbc6a0",
                  "inverse-surface": "#e3e2e2",
                  "tertiary-fixed": "#e5e2e1",
                  "inverse-primary": "#6c5c3d",
                  "on-surface-variant": "#cfc5b8",
                  "on-secondary-container": "#b7b5b4",
                  "on-tertiary": "#313030",
                  "on-error": "#690005",
                  "primary-fixed-dim": "#d9c49e",
                  "error-container": "#93000a",
                  "on-primary": "#3b2f14",
                  "surface-variant": "#343535",
                  "tertiary": "#e7e4e3",
                  "outline": "#989084",
                  "secondary": "#c8c6c5",
                  "on-secondary-fixed": "#1c1b1b",
                  "secondary-fixed-dim": "#c8c6c5",
                  "surface-container-highest": "#343535",
                  "on-secondary-fixed-variant": "#474746",
                  "surface-bright": "#383939",
                  "primary-fixed": "#f6e0b8",
                  "on-surface": "#e3e2e2",
                  "surface-tint": "#d9c49e",
                  "on-error-container": "#ffdad6",
                  "tertiary-container": "#cbc8c7",
                  "on-primary-fixed": "#251a03",
                  "inverse-on-surface": "#2f3031"
          },
          "borderRadius": {
                  "DEFAULT": "0.125rem",
                  "lg": "0.25rem",
                  "xl": "0.5rem",
                  "full": "0.75rem"
          },
          "spacing": {
                  "unit": "8px",
                  "margin-edge": "64px",
                  "section-gap": "120px",
                  "gutter": "24px",
                  "container-max": "1440px"
          },
          "fontFamily": {
                  "display": ["Noto Serif"],
                  "body-lg": ["Manrope"],
                  "headline-md": ["Noto Serif"],
                  "label-caps": ["Manrope"],
                  "headline-lg": ["Noto Serif"],
                  "body-md": ["Manrope"]
          },
          "fontSize": {
                  "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                  "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                  "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                  "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "700"}],
                  "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "400"}],
                  "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      background: rgba(26, 26, 26, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .input-stealth {
      background: transparent;
      border: none;
      border-bottom: 1px solid #4c463c;
      padding-left: 0;
      padding-right: 0;
      transition: border-color 0.3s ease;
    }
    .input-stealth:focus {
      outline: none;
      box-shadow: none;
      border-bottom: 1px solid #f8e2ba;
    }
    .btn-gold {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-gold:hover {
      box-shadow: 0 0 20px rgba(248, 226, 186, 0.2);
      transform: translateY(-1px);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden">
<main class="flex h-screen w-full">
<!-- Left Section: Visual Impact -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-r from-black/60 to-transparent z-10"></div>
<img alt="ZenithAir Luxury Cabin" class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" data-alt="An ultra-luxury private jet cabin interior during a golden hour sunset flight. The space features plush cream leather seats, polished dark wood accents, and champagne gold metallic trim. Warm, cinematic sunlight streams through the oval windows, creating a serene and exclusive executive atmosphere. The style is sophisticated and high-end, utilizing a palette of deep blacks, rich tans, and glowing gold highlights." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxqy7McHRYh_e2rvYmIrRv8WFPkVpK-TdWU8cpcK2lxCgCFQrprBatLOa1LwpAr3A_6xEORSUonK_6unWRsrwZiR6suauiweLR1olTrH5OIJ-ko_IsfyJ2w4rLBii-4vsMAYonFeVK4iOjMmLOnNlBmrRKm0b5qnOKAy6YTQTVXJKbVdmrR38r2jvC0FNQnj1qkbi1RLPFg-2EUkdAv5B3XqcPyhxI68N73ZNRAlCaRSyiLALF-hz6Xsm_7K24nwk7piKTdQaHlOQM"/>
<!-- Branding Overlay -->
<div class="relative z-20 flex flex-col justify-between p-margin-edge h-full">
<div>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-[0.2em]">ZENITHAIR</h1>
</div>
<div class="max-w-md">
<p class="font-display text-display text-primary leading-tight mb-4">Elevate your perspective.</p>
<p class="font-body-lg text-body-lg text-on-surface-variant opacity-80">Experience the pinnacle of private aviation where every detail is curated for the executive traveler.</p>
</div>
</div>
</section>
<!-- Right Section: Interactive Portal -->
<section class="w-full lg:w-1/2 bg-surface-container-lowest flex items-center justify-center p-8 lg:p-margin-edge">
<div class="w-full max-w-md space-y-12">
<!-- Tab Toggle -->
<div class="flex space-x-8 border-b border-white/5">
<button class="pb-4 font-label-caps text-label-caps text-primary border-b-2 border-primary tracking-widest uppercase transition-all">
            Member Access
          </button>
<button class="pb-4 font-label-caps text-label-caps text-on-surface-variant/40 hover:text-on-surface-variant transition-all tracking-widest uppercase">
            Join the Fleet
          </button>
</div>
<!-- Heading Area -->
<header>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please authenticate to access your concierge dashboard.</p>
</header>
<!-- Form -->
<form class="space-y-10">
<div class="relative group">
<label class="font-label-caps text-label-caps text-on-surface-variant/60 block mb-1 group-focus-within:text-primary transition-colors" for="email">Digital Identity / Email</label>
<input class="w-full input-stealth text-on-surface font-body-md py-3 placeholder:text-on-surface-variant/20" id="email" placeholder="executive@zenithair.com" type="email"/>
</div>
<div class="relative group">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant/60 block mb-1 group-focus-within:text-primary transition-colors" for="password">Access Key / Password</label>
<a class="font-label-caps text-label-caps text-primary/60 hover:text-primary mb-1" href="#">Forgot?</a>
</div>
<input class="w-full input-stealth text-on-surface font-body-md py-3 placeholder:text-on-surface-variant/20" id="password" placeholder="••••••••••••" type="password"/>
</div>
<div class="flex items-center space-x-3">
<input class="w-4 h-4 rounded-sm border-outline-variant bg-transparent text-primary focus:ring-primary focus:ring-offset-surface" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant select-none" for="remember">Maintain session for 30 days</label>
</div>
<div class="pt-4 flex flex-col gap-4">
<button class="w-full py-5 bg-primary text-on-primary font-label-caps text-label-caps tracking-[0.2em] rounded-sm btn-gold uppercase" type="submit">
              Authenticate
            </button>
<button class="w-full py-5 border border-primary/30 text-primary font-label-caps text-label-caps tracking-[0.2em] rounded-sm hover:bg-primary/5 transition-all uppercase flex items-center justify-center gap-3" type="button">
<span class="material-symbols-outlined text-[18px]">fingerprint</span>
              Biometric Sign-in
            </button>
</div>
</form>
<!-- Footer Help -->
<footer class="pt-8 border-t border-white/5">
<div class="flex justify-between items-center text-on-surface-variant/40">
<p class="font-label-caps text-[10px] tracking-widest">ENCRYPTED END-TO-END</p>
<div class="flex gap-4">
<a class="hover:text-primary transition-colors" href="#"><span class="material-symbols-outlined text-[20px]">help_center</span></a>
<a class="hover:text-primary transition-colors" href="#"><span class="material-symbols-outlined text-[20px]">language</span></a>
</div>
</div>
</footer>
</div>
</section>
</main>
<!-- Contextual Notification for Success/State (Optional Visual) -->
<div class="fixed bottom-margin-edge right-margin-edge z-50 pointer-events-none">
<div class="glass-effect px-6 py-4 rounded-xl flex items-center space-x-4 border-l-4 border-primary">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<p class="font-label-caps text-label-caps text-primary tracking-widest">SYSTEMS READY</p>
</div>
</div>
</body></html>
