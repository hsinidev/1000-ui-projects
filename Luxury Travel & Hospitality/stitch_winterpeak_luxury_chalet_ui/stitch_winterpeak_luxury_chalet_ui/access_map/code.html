<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Serif:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#5c5f62",
                    "on-secondary-container": "#606366",

                    "on-tertiary-container": "#5d687c",

                    "on-primary-fixed-variant": "#374954",
                    "surface-variant": "#e0e3e5",
                    "on-primary-fixed": "#0a1e28",
                    "surface-tint": "#4e616d",
                    "error-container": "#ffdad6",
                    "surface": "#f7f9fb",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#e0e3e5",
                    "on-primary-container": "#576a76",
                    "on-tertiary-fixed-variant": "#3c475a",
                    "error": "#ba1a1a",
                    "tertiary-fixed": "#d8e3fa",
                    "surface-dim": "#d8dadc",
                    "primary-fixed": "#d1e5f3",
                    "on-secondary-fixed-variant": "#44474a",
                    "background": "#f7f9fb",
                    "surface-container-low": "#f2f4f6",
                    "primary-container": "#d6eaf8",
                    "surface-bright": "#f7f9fb",
                    "inverse-on-surface": "#eff1f3",
                    "inverse-primary": "#b6c9d7",
                    "primary": "#4e616d",
                    "outline": "#73787b",

                    "on-error-container": "#93000a",

                    "surface-container-high": "#e6e8ea",
                    "surface-container": "#eceef0",
                    "on-tertiary": "#ffffff",
                    "primary-fixed-dim": "#b6c9d7",
                    "on-surface-variant": "#43474b",
                    "on-background": "#191c1e",
                    "secondary-container": "#dee0e4",
                    "inverse-surface": "#2d3133",

            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "unit": "8px",
                    "container-max": "1280px",
                    "gutter": "24px",
                    "margin-desktop": "64px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "headline-xl": ["Noto Serif"],
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Noto Serif"],
                    "headline-lg": ["Noto Serif"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-xl": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "400"}]
            }
          },
        },
      }

<style>
        .frost-glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .map-gradient {
            background: linear-gradient(to bottom, rgba(247, 249, 251, 0) 60%, rgba(247, 249, 251, 1) 100%);
        }
        .shuttle-btn-gradient {
            background: linear-gradient(135deg, rgba(224, 226, 230, 0.4) 0%, rgba(182, 201, 215, 0.4) 100%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 bg-surface/30 dark:bg-surface-dim/30 backdrop-blur-xl border-b border-white/20 dark:border-white/10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="ac_unit">ac_unit</span>
<h1 class="font-headline-md text-headline-md tracking-widest text-primary dark:text-primary-fixed uppercase">WinterPeak</h1>
</div>
<button class="font-label-sm text-label-sm text-primary dark:text-primary-fixed border border-primary/20 px-4 py-1 rounded-full hover:bg-white/20 transition-colors active:scale-95 duration-150">
            SHUTTLE
        </button>
</header>
<!-- Map Viewport -->
<main class="relative w-full h-[751px] overflow-hidden">
<!-- Interactive Map Mockup -->
<div class="absolute inset-0 w-full h-full bg-surface-dim">
<img class="w-full h-full object-cover grayscale-[20%] contrast-[90%]" data-alt="A highly detailed topographic mountain map overlaying a serene winter landscape. The scene shows crisp snow-covered peaks under a soft, overcast alpine sky. Trails are marked with subtle, elegant lines in silver and ice blue. The lighting is high-key and cold, reflecting a prestigious light-mode aesthetic with minimal, professional cartography details that evoke a sense of exclusive mountain living." data-location="Val d'Isère" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFtiF7aURqW0RQMGVbbxEOStvxyFfmAOFQyGHDij07FhuGBjfv_AM2mrpTQ79y0QjCFqHb4iL1NeV9I0cTbe3tvGyr_HgMDdVfrZJvxhQ6UOFxXTcC32QVa2VciUfH34rFHWhxmDew8bL5i40kS88UJiQOQHxCARdU8IGhykxg5tT7kz1GOcUa0Vji9RTuV79aRIAyRQWVpu82Tn4-IZPTTMjFqSmcMYh7Q7qW-vaa1z1TBlmFrFwEGZclbsZzs_EwiTZOCZWztAk"/>
<div class="absolute inset-0 map-gradient"></div>
</div>
<!-- Map Markers -->
<!-- Chalet Location -->
<div class="absolute top-[45%] left-[40%] flex flex-col items-center">
<div class="frost-glass p-2 rounded-xl shadow-2xl flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="cottage" style="font-variation-settings: 'FILL' 1;">cottage</span>
<span class="font-label-sm text-primary">Chalet 402</span>
</div>
<div class="w-1 h-8 bg-primary/40 blur-[1px]"></div>
</div>
<!-- Lift Points -->
<div class="absolute top-[30%] left-[65%]">
<div class="w-8 h-8 rounded-full frost-glass flex items-center justify-center border-white/50 shadow-lg">
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="local_activity">local_activity</span>
</div>
</div>
<div class="absolute top-[60%] left-[25%]">
<div class="w-8 h-8 rounded-full frost-glass flex items-center justify-center border-white/50 shadow-lg">
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="local_activity">local_activity</span>
</div>
</div>
<!-- Shuttle Overlay Button -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 w-[calc(100%-32px)] max-w-md">
<button class="w-full shuttle-btn-gradient backdrop-blur-md rounded-2xl py-5 px-6 flex items-center justify-between group active:scale-95 transition-all duration-200">
<div class="flex items-center gap-4">
<div class="bg-white/40 p-3 rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="airport_shuttle">airport_shuttle</span>
</div>
<div class="text-left">
<p class="font-label-sm text-secondary uppercase tracking-widest text-[10px]">On-Demand Service</p>
<p class="font-headline-md text-primary text-lg">Request a Shuttle</p>
</div>
</div>
<span class="material-symbols-outlined text-primary group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Trail Legend Float -->
<div class="absolute top-24 right-4 flex flex-col gap-2">
<div class="frost-glass px-3 py-2 rounded-lg flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-[#4e616d]"></div>
<span class="font-label-sm text-primary text-[10px]">EXPERT</span>
</div>
<div class="frost-glass px-3 py-2 rounded-lg flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-[#b6c9d7]"></div>
<span class="font-label-sm text-primary text-[10px]">INTERMEDIATE</span>
</div>
<div class="frost-glass px-3 py-2 rounded-lg flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-white"></div>
<span class="font-label-sm text-primary text-[10px]">EASY</span>
</div>
</div>
</main>
<!-- Info Section (Bento Style) -->
<section class="px-margin-mobile mt-[-40px] relative z-10 grid grid-cols-2 gap-4">
<div class="col-span-2 frost-glass p-6 rounded-2xl border-white/40 bg-white/60">
<h2 class="font-headline-md text-primary mb-2">Peak Conditions</h2>
<div class="flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="cloudy_snowing">cloudy_snowing</span>
<span class="font-body-md text-secondary">Light Snow</span>
</div>
<div class="text-right">
<span class="font-headline-lg text-primary">-4°C</span>
</div>
</div>
</div>
<div class="frost-glass p-4 rounded-2xl border-white/40 bg-white/60 flex flex-col gap-2">
<span class="material-symbols-outlined text-primary" data-icon="downhill_skiing">downhill_skiing</span>
<p class="font-label-sm text-secondary uppercase text-[10px]">Open Trails</p>
<p class="font-headline-md text-primary">42 / 48</p>
</div>
<div class="frost-glass p-4 rounded-2xl border-white/40 bg-white/60 flex flex-col gap-2">
<span class="material-symbols-outlined text-primary" data-icon="height">height</span>
<p class="font-label-sm text-secondary uppercase text-[10px]">Base Depth</p>
<p class="font-headline-md text-primary">185cm</p>
</div>
</section>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-surface/20 dark:bg-surface-dim/20 backdrop-blur-2xl border-t border-white/30 dark:border-white/10 shadow-xl rounded-t-xl">
<a class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim opacity-70 hover:opacity-100 transition-opacity active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="spa">spa</span>
<span class="font-label-sm text-label-sm uppercase tracking-tighter mt-1">Amenities</span>
</a>
<a class="flex flex-col items-center justify-center bg-white/40 dark:bg-white/10 text-on-surface dark:text-on-primary-fixed rounded-full px-4 py-1 border border-white/40 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-sm text-label-sm uppercase tracking-tighter mt-1">Map</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim opacity-70 hover:opacity-100 transition-opacity active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="font-label-sm text-label-sm uppercase tracking-tighter mt-1">Booking</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim opacity-70 hover:opacity-100 transition-opacity active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="collections">collections</span>
<span class="font-label-sm text-label-sm uppercase tracking-tighter mt-1">Gallery</span>
</a>
</nav>
</body></html>
