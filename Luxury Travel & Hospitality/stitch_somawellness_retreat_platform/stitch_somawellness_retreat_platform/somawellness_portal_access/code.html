<!DOCTYPE html>

<html lang="en"><head>

                    "primary-fixed-dim": "#cec7a2",

            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-page": "64px",
                    "gutter": "32px",
                    "section-gap": "120px",
                    "unit": "8px",
                    "container-max": "1280px"
            },
            "fontFamily": {
                    "label-sm": ["Manrope"],
                    "headline-lg": ["Noto Serif"],
                    "body-lg": ["Manrope"],
                    "headline-md": ["Noto Serif"],
                    "body-md": ["Manrope"],
                    "headline-xl": ["Noto Serif"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "300"}],
                    "headline-md": ["24px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "400"}],

          },
        },
      }

<style>
        .breath-indicator {
            width: 40px;
            height: 40px;
            background-color: #635f40;
            border-radius: 50%;
            opacity: 0.2;
            display: inline-block;
        }
        .form-underline {
            border-bottom: 1px solid #7a776c;
            background: transparent;
            transition: border-color 0.3s ease;
        }
        .form-underline:focus {
            outline: none;
            border-bottom: 2px solid #635f40;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-hidden">
<main class="flex h-screen w-full overflow-hidden">
<!-- Left Side: Peaceful Nature Image -->
<section class="hidden md:flex md:w-1/2 relative bg-surface-container overflow-hidden">
<img alt="SomaWellness Sanctuary" class="absolute inset-0 w-full h-full object-cover" data-alt="A serene landscape of rolling hills shrouded in soft morning mist at dawn, featuring a single ancient oak tree and distant mountains. The color palette is composed of muted sage greens, pale woods, and soft ivory, creating a sense of quiet luxury and restorative calm. The lighting is ethereal and diffused, emphasizing a minimalist and purist aesthetic consistent with a high-end wellness retreat." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwPuNhSD2jl34v_VjbsRzKk_cckyo3nSIhwX6QQgpfkhUCoNJHlsjyOUq8AP0MQXcJCEFVDsLSw7U7MKhrQpcVGgfnneqdOM1QQp5P1luRioyUiCf_77Kqye6zWH-6W7R9zdSbrbdOJFCShPpaG5we3bjjKFjtD_gq4vNxbEh0eiYLubM5Er406yFcaHr0Hgj8NFpaBNAHDmrRRE0Iv4BeU7HXUNPeKny-vSXPPrPCkN-atgdcgk-fp342oUTjPbdaTPdb_fuF9I7w"/>
<div class="absolute inset-0 bg-primary/10 mix-blend-overlay"></div>
<div class="relative z-10 m-margin-page flex flex-col justify-between h-full">
<div class="text-white">
<span class="font-headline-lg text-headline-lg tracking-tighter">SomaWellness</span>
</div>
<div class="max-w-md">
<h2 class="font-headline-xl text-headline-xl text-white mb-6">A sanctuary for the modern soul.</h2>
<p class="font-body-lg text-body-lg text-white opacity-90">Return to your center through intentional programs designed for restorative clarity and deep rest.</p>
</div>
</div>
</section>
<!-- Right Side: Clean Minimalist Form -->
<section class="w-full md:w-1/2 h-full flex flex-col bg-background px-margin-page py-12 overflow-y-auto">
<!-- Mobile Header -->
<header class="md:hidden flex justify-between items-center mb-16">
<span class="font-headline-lg text-headline-lg text-primary tracking-tighter">SomaWellness</span>
<div class="breath-indicator"></div>
</header>
<!-- Content Container -->
<div class="flex-1 flex flex-col justify-center max-w-sm mx-auto w-full">
<!-- Toggle Form State -->
<div class="mb-section-gap">
<div class="flex items-center gap-8 mb-12">
<button class="font-headline-md text-headline-md text-primary pb-2 border-b-2 border-primary">Sign In</button>
<button class="font-headline-md text-headline-md text-on-surface-variant hover:text-primary transition-colors pb-2">Create Account</button>
</div>
<!-- Intro Text -->
<div class="space-y-4 mb-12">
<p class="font-body-md text-body-md text-on-surface-variant">Welcome back to your space of intentionality.</p>
</div>
<!-- Form -->
<form class="space-y-10">
<div class="relative">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-2" for="email">EMAIL ADDRESS</label>
<input class="w-full form-underline py-4 font-body-md text-on-surface" id="email" placeholder="your@email.com" type="email"/>
</div>
<div class="relative">
<div class="flex justify-between items-center mb-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" href="#">FORGOT?</a>
</div>
<input class="w-full form-underline py-4 font-body-md text-on-surface" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="pt-8">
<button class="w-full bg-primary text-on-primary py-5 px-8 font-label-sm text-label-sm tracking-[0.2em] uppercase hover:opacity-90 transition-opacity" type="submit">
                                Enter Sanctuary
                            </button>
</div>
</form>
<!-- Alternative Options -->
<div class="mt-12 pt-12 border-t border-outline/10 space-y-6">
<p class="font-label-sm text-label-sm text-on-surface-variant text-center">CONTINUE WITH</p>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-4 border border-outline/20 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]">account_circle</span>
<span class="font-label-sm text-label-sm">GOOGLE</span>
</button>
<button class="flex items-center justify-center gap-3 py-4 border border-outline/20 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]">cloud</span>
<span class="font-label-sm text-label-sm">APPLE</span>
</button>
</div>
</div>
</div>
<!-- Footer Links (Transactional Minimalist Version) -->
<footer class="mt-auto pt-8 flex justify-between border-t border-outline/10">
<span class="font-label-sm text-label-sm text-outline">© 2024 SOMAWELLNESS</span>
<div class="flex gap-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">PRIVACY</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">TERMS</a>
</div>
</footer>
</div>
<!-- Decorative Breath Element (Floating) -->
<div class="hidden md:block absolute bottom-12 right-12">
<div class="breath-indicator animate-pulse"></div>
</div>
</section>
</main>
</body></html>
