<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Noto+Serif:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#1c1b1b",
                    "surface-bright": "#fcf9f8",
                    "on-background": "#1c1b1b",
                    "outline": "#737784",
                    "surface-container": "#f0eded",
                    "surface-container-high": "#eae7e7",
                    "surface-container-highest": "#e5e2e1",
                    "on-secondary-container": "#706439",
                    "secondary": "#6a5e33",
                    "secondary-fixed-dim": "#d6c692",
                    "tertiary": "#353737",
                    "primary-fixed": "#dae2ff",
                    "on-tertiary-container": "#bdbebe",
                    "inverse-primary": "#b1c5ff",
                    "tertiary-fixed": "#e2e2e2",
                    "inverse-surface": "#313030",
                    "primary": "#00327d",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "on-error-container": "#93000a",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "primary-container": "#0047ab",
                    "on-secondary-fixed-variant": "#51461e",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#f3f0ef",
                    "surface-variant": "#e5e2e1",
                    "surface-tint": "#2559bd",
                    "background": "#fcf9f8",
                    "secondary-container": "#f3e2ac",
                    "on-surface-variant": "#434653",
                    "secondary-fixed": "#f3e2ac",
                    "surface-container-low": "#f6f3f2",
                    "primary-fixed-dim": "#b1c5ff",
                    "on-tertiary": "#ffffff",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#001946",
                    "on-tertiary-fixed-variant": "#454747",
                    "surface-dim": "#dcd9d9",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-secondary-fixed": "#231b00",
                    "tertiary-container": "#4b4d4e",
                    "on-primary-container": "#a5bdff",
                    "on-primary-fixed-variant": "#00419e",
                    "surface": "#fcf9f8",
                    "error": "#ba1a1a",
                    "outline-variant": "#c3c6d5"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-page": "64px",
                    "gutter": "24px",
                    "container-max": "1440px",
                    "section-gap": "120px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "h2": ["Noto Serif"],
                    "body-lg": ["Inter"],
                    "h1": ["Noto Serif"],
                    "h3": ["Noto Serif"],
                    "label-caps": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                    "h2": ["36px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                    "h1": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                    "h3": ["28px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-bottom-color: #00327d !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md antialiased overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 flex items-center justify-between px-6 h-20">
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant">menu</span>
</div>
<div class="font-h3 text-h3 text-primary italic">AzureEscape</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-primary">account_circle</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Hero Context -->
<section class="mb-10 text-center">
<h1 class="font-h2 text-h2 text-primary mb-2">Secure Your Escape</h1>
<p class="font-body-md text-on-surface-variant">Configure your stay at one of our curated Mediterranean sanctuaries.</p>
</section>
<!-- Booking Form Container -->
<div class="bg-surface-container-lowest p-8 shadow-sm rounded-lg border border-outline-variant/10">
<form class="space-y-8">
<!-- Villa Selection -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest block">Select Villa</label>
<div class="relative group">
<select class="w-full bg-transparent border-0 border-b border-secondary-fixed-dim py-3 pr-8 text-on-surface font-body-lg focus:ring-0 appearance-none cursor-pointer">
<option>Villa Mykonos Blue</option>
<option>Santorini Sunsets Estate</option>
<option>The Cretan Sanctuary</option>
<option>Amalfi Coast Retreat</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-3 text-secondary-fixed-dim pointer-events-none">expand_more</span>
</div>
</div>
<!-- Date Selection Grid -->
<div class="grid grid-cols-2 gap-6">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest block">Arrival</label>
<input class="w-full bg-transparent border-0 border-b border-secondary-fixed-dim py-3 text-on-surface font-body-lg focus:ring-0" type="date"/>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest block">Departure</label>
<input class="w-full bg-transparent border-0 border-b border-secondary-fixed-dim py-3 text-on-surface font-body-lg focus:ring-0" type="date"/>
</div>
</div>
<!-- Guest Count -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest block">Guest Count</label>
<div class="flex items-center justify-between border-b border-secondary-fixed-dim py-1">
<span class="text-on-surface font-body-lg">Total Guests</span>
<div class="flex items-center space-x-4">
<button class="w-8 h-8 rounded-full border border-secondary-fixed-dim flex items-center justify-center text-primary" type="button">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="font-body-lg text-primary font-semibold">2</span>
<button class="w-8 h-8 rounded-full border border-secondary-fixed-dim flex items-center justify-center text-primary" type="button">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
</div>
<!-- Custom Requests -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest block">Custom Requests</label>
<textarea class="w-full bg-surface-container-low border-0 border-b border-secondary-fixed-dim p-4 text-on-surface font-body-md focus:ring-0 placeholder:text-outline/50" placeholder="e.g. Private chef, helicopter transfers, or specific dietary requirements..." rows="3"></textarea>
</div>
<!-- Summary Preview Image -->
<div class="relative w-full aspect-[16/9] rounded-lg overflow-hidden bg-surface-container my-4">
<img class="w-full h-full object-cover" data-alt="A luxurious minimalist villa interior with white-washed walls and clean lines. Large floor-to-ceiling windows reveal a serene turquoise Mediterranean sea view at sunset. The lighting is warm and golden, reflecting off high-end marble surfaces. Cobalt blue accents in the decor harmonize with the crisp architectural aesthetic of Mediterranean chic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCA450gUt0S66n9tsG43ojKUl1Pnagopz6KJi7VvSfBze18xNctEy9MOO885AnMXrjUKwvzgRExwgJwswj4Bdi1_nc6fvO7WUNcCqKUgIusRGs-2MaXlJ6a1jsSlcxnxd-PG4pXN6YUuoOqxBVYGTY1Kgii2K94le4IPQ-UqmW0VTurKLf4qzNwxgi-FUgOnd7f6fPIqn7hPd-CbQsJyuQRVtZkWMZT31q40hpsD1uv0LwLq-86l3DPU0zwAp5jtgnlENAEqvuwzplA"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent flex items-end p-4">
<p class="text-white font-h3 text-lg italic">Villa Mykonos Blue</p>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary py-5 rounded-lg flex items-center justify-center space-x-3 text-on-primary hover:bg-primary-container transition-colors duration-300" type="submit">
<span class="font-h3 text-xl font-normal">Submit Inquiry</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center font-label-caps text-[10px] text-outline uppercase tracking-widest">A luxury consultant will respond within 4 hours</p>
</form>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-surface shadow-[0_-4px_20px_0_rgba(0,50,125,0.05)] flex justify-around items-center h-20 px-6">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors px-4 py-2 rounded-xl" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-label-caps text-label-caps mt-1">Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-bold hover:bg-surface-container-low transition-colors px-4 py-2 rounded-xl" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">mail</span>
<span class="font-label-caps text-label-caps mt-1">Seamless Inquiry</span>
</a>
</nav>
</body></html>
