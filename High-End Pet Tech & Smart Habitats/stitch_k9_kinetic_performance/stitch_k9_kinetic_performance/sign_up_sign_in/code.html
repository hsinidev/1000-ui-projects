<style>
        .carbon-pattern {
            background-color: #131313;
            background-image: linear-gradient(45deg, #1a1a1a 25%, transparent 25%), linear-gradient(-45deg, #1a1a1a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1a1a1a 75%), linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);

<body class="bg-background text-on-background min-h-screen selection:bg-primary selection:text-on-primary">
<main class="flex min-h-screen flex-col md:flex-row">
<!-- Left Side: High-Energy Visuals -->
<section class="relative w-full md:w-1/2 min-h-[409px] md:min-h-screen overflow-hidden">
<div class="absolute inset-0 z-0 bg-cover bg-center grayscale contrast-125 brightness-75 scale-105" data-alt="A high-intensity action shot of a powerful Belgian Malinois K9 in full sprint on a high-performance mechanical treadmill. The dog's muscles are rippling with exertion, captured in a dramatic cinematic style with high contrast and sharp focus. The lighting is cold and industrial, with deep shadows and metallic glints reflecting off the racing equipment. The overall aesthetic is aggressive, mechanical, and professional, dominated by a dark charcoal and slate palette with subtle red highlights." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDhBq5z5s4DjTIx1Yegu5ok-lvosB56_HkGRylFHb7T5pDwW6hdIz3Yi_E5Ow2TetLJ3Kr6o0dA4hJHZDDF5HkHGtTFgCYMH_SGy6ht22O8wd0nV3Q4Y5yafWUbebbUmTJ3P5bFC9R_0Dg2XbFLpAqNWrriqxoGnO-Z57PoG0n1_umiY-hXZTXVo2KiL2m_ziEpwTC4jqwJK67kGVoL_Vl28AwHTFCsKw3DvSo-DkzzYmPK0MQOu9eWGrboah71ij9DvaMNN3UYzSA')">
</div>
<!-- HUD Overlay -->
<div class="absolute inset-0 z-10 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<div class="absolute top-margin left-margin z-20">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-4xl">speed</span>
<h1 class="font-headline-lg text-headline-lg uppercase italic font-black tracking-tighter">K9 KINETIC</h1>
</div>
</div>
<div class="absolute bottom-margin left-margin z-20 flex flex-col gap-unit max-w-sm">
<span class="font-label-caps text-label-caps text-primary bg-on-primary-container/20 px-2 py-1 w-fit">STATUS: OPTIMIZING</span>
<p class="font-headline-xl text-headline-xl uppercase italic leading-none">PEAK PERFORMANCE <br/>ENGINEERED.</p>
</div>
</section>
<!-- Right Side: Auth Form -->
<section class="w-full md:w-1/2 flex items-center justify-center bg-surface p-margin md:p-12 carbon-pattern">
<div class="w-full max-w-md bg-surface-container/90 backdrop-blur-sm border border-outline-variant p-8 shadow-2xl relative overflow-hidden">
<!-- Decorative Corner Accent -->
<div class="absolute top-0 right-0 w-16 h-16 border-t-2 border-r-2 border-primary-container opacity-50"></div>
<header class="mb-8">
<h2 class="font-headline-lg text-headline-lg uppercase italic mb-2 tracking-tight">OPERATOR ACCESS</h2>
<p class="font-body-md text-on-surface-variant">Initialize biometric and facility verification to proceed.</p>
</header>
<form class="space-y-6">
<!-- Facility ID -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="facility">FACILITY_ID / UNIT</label>
<div class="relative">
<span class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined">factory</span>
</span>
<input class="w-full bg-surface-container-lowest border-b border-outline-variant focus:border-primary-container focus:ring-0 text-on-surface font-body-md py-3 pl-8 transition-colors placeholder:text-surface-variant uppercase" id="facility" placeholder="K9-ALPHA-01" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">OPERATOR_EMAIL</label>
<div class="relative">
<span class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined">alternate_email</span>
</span>
<input class="w-full bg-surface-container-lowest border-b border-outline-variant focus:border-primary-container focus:ring-0 text-on-surface font-body-md py-3 pl-8 transition-colors placeholder:text-surface-variant" id="email" placeholder="OPERATOR@K9KINETIC.COM" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">ACCESS_KEY</label>
<div class="relative">
<span class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined">lock</span>
</span>
<input class="w-full bg-surface-container-lowest border-b border-outline-variant focus:border-primary-container focus:ring-0 text-on-surface font-body-md py-3 pl-8 transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded-none border-outline-variant bg-surface-container-lowest text-primary-container focus:ring-offset-background focus:ring-primary-container" type="checkbox"/>
<span class="font-label-caps text-[10px] text-on-surface-variant group-hover:text-on-surface transition-colors">RETAIN SESSION</span>
</label>
<a class="font-label-caps text-[10px] text-primary-container hover:underline italic" href="#">FORGOT_KEY?</a>
</div>
<!-- Primary Action -->
<button class="w-full py-4 bg-primary-container text-on-primary font-headline-lg text-headline-lg uppercase italic font-black btn-clip-path hover:bg-white transition-colors active:scale-95 duration-150" type="submit">
                        INITIALIZE_SESSION
                    </button>
<!-- Secondary/Toggle -->
<div class="pt-4 text-center border-t border-outline-variant/30">
<p class="font-label-caps text-[10px] text-on-surface-variant mb-4">NEW UNIT REGISTRATION REQUIRED?</p>
<button class="w-full py-3 border-2 border-primary-container text-primary-container font-label-caps text-label-caps uppercase italic hover:bg-primary-container hover:text-on-primary transition-all active:scale-95" type="button">
                            ENROLL_NEW_FACILITY
                        </button>
</div>
</form>
<!-- System Metadata -->
<footer class="mt-8 flex justify-between items-center opacity-30">
<span class="font-label-caps text-[8px] tracking-[0.2em]">VER: 4.0.8-ALPHA</span>
<span class="font-label-caps text-[8px] tracking-[0.2em]">ENCRYPTION: AES-256</span>
</footer>
</div>
</section>
</main>
