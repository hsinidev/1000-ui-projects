<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&amp;family=Inter:wght@400;500&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e0e3e5",
                    "inverse-surface": "#2d3133",
                    "on-surface-variant": "#44464e",
                    "on-secondary-fixed": "#241a00",
                    "on-background": "#191c1e",
                    "surface": "#f7f9fb",
                    "on-surface": "#191c1e",
                    "surface-dim": "#d8dadc",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#42474f",
                    "surface-container": "#eceef0",
                    "on-secondary-fixed-variant": "#574500",
                    "outline-variant": "#c5c6cf",
                    "inverse-on-surface": "#eff1f3",
                    "surface-bright": "#f7f9fb",
                    "on-primary-container": "#7687b2",
                    "tertiary-container": "#1b2128",
                    "outline": "#75777f",
                    "tertiary-fixed-dim": "#c1c7d0",
                    "background": "#f7f9fb",
                    "primary-fixed-dim": "#b4c6f4",
                    "on-tertiary-container": "#838891",
                    "primary-container": "#0a1f44",
                    "surface-tint": "#4c5e86",
                    "on-error": "#ffffff",
                    "inverse-primary": "#b4c6f4",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#d9e2ff",
                    "tertiary-fixed": "#dee3ed",
                    "secondary-fixed": "#ffe088",
                    "on-tertiary-fixed": "#161c23",
                    "secondary-container": "#fed65b",
                    "secondary": "#735c00",
                    "on-primary-fixed": "#041a3f",
                    "tertiary": "#050910",
                    "on-secondary-container": "#745c00",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f2f4f6",
                    "on-secondary": "#ffffff",
                    "primary": "#00081e",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#34466d",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#e9c349",
                    "surface-container-high": "#e6e8ea",
                    "surface-container-highest": "#e0e3e5",
                    "on-tertiary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "24px",
                    "margin": "48px",
                    "container-max": "1280px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "data-readout": ["Space Grotesk"],
                    "h3": ["Montserrat"],
                    "h1": ["Montserrat"],
                    "body-md": ["Inter"],
                    "label-caps": ["Space Grotesk"],
                    "h2": ["Montserrat"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "data-readout": ["20px", {"lineHeight": "1.0", "fontWeight": "500"}],
                    "h3": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "h1": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600"}],
                    "h2": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .dark .glass-panel {
            background: rgba(10, 31, 68, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .inner-glow {
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .pulse-red {
            animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface antialiased overflow-x-hidden">
<!-- Top Navigation Shell -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter py-4 bg-primary/90 backdrop-blur-xl border-b border-white/10 shadow-xl shadow-primary/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary-container" data-icon="shield_with_heart">shield_with_heart</span>
<h1 class="font-h3 text-h3 font-bold tracking-tight text-secondary-container">AERO-KENNEL</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-secondary-container text-2xl" data-icon="notifications_active">notifications_active</span>
</button>
</header>
<main class="pt-20 pb-32 min-h-screen container mx-auto px-4 max-w-md">
<!-- Live Feed Container -->
<section class="relative aspect-[9/16] w-full rounded-xl overflow-hidden bg-primary border-2 border-white/5 shadow-2xl">
<!-- Main Video Feed Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-80" data-alt="A high-definition interior view of a luxury aerospace pet kennel featuring a golden retriever comfortably resting on a plush memory foam bed. The lighting is soft and clinical with subtle blue LED accent strips along the curved cabin walls. The atmosphere is quiet, sterile, and premium, reflecting a high-tech logistics environment for elite pet transport." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB30E6_HYWuPLuUu8EYRUiFhm3FzRT7dGRk_TSLa8QDZv6x36VKhFo3qf0sAvCXdzvRNS5z4hycvw25E4GTGNG5JmH62HvEhswLjm8DhXJP_ws8py3TwTzPF-1OB653kQywIcpJvr6djRbUGwTCm93PKrgOx9YOvZNLqBsbe2ykhw8-7-MTT5TuF5VLUGIGyL3Zlgti4vyHDC89L-jB8qbxnUAn6s725_VzxjviGmEJLZf_Rj0my3SgUcBefp-VRkDlWCjsg5-s_SIv"/>
</div>
<!-- Overlay HUD -->
<div class="absolute inset-0 z-10 p-4 flex flex-col justify-between pointer-events-none">
<!-- Top Status Bar -->
<div class="flex justify-between items-start pointer-events-auto">
<div class="flex items-center gap-2 bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10">
<div class="w-2 h-2 bg-error rounded-full pulse-red"></div>
<span class="font-label-caps text-label-caps text-white">LIVE • HD</span>
</div>
<div class="glass-panel px-3 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
<span class="material-symbols-outlined text-white text-sm" data-icon="thermostat">thermostat</span>
<span class="font-data-readout text-white text-sm">72°F</span>
</div>
</div>
<!-- 360 Control Interface (Center Layer) -->
<div class="flex-1 flex items-center justify-center pointer-events-none">
<div class="w-48 h-48 border-2 border-white/20 rounded-full flex items-center justify-center relative pointer-events-auto">
<div class="absolute inset-0 bg-white/5 backdrop-blur-[2px] rounded-full"></div>
<div class="grid grid-cols-3 grid-rows-3 gap-2 p-4 w-full h-full">
<div class="col-start-2 flex items-center justify-center">
<button class="p-2 text-white/60 hover:text-white transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="keyboard_arrow_up">keyboard_arrow_up</span>
</button>
</div>
<div class="row-start-2 flex items-center justify-center">
<button class="p-2 text-white/60 hover:text-white transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="keyboard_arrow_left">keyboard_arrow_left</span>
</button>
</div>
<div class="row-start-2 col-start-2 flex items-center justify-center">
<div class="w-10 h-10 border border-secondary-container/50 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-secondary-container text-xs" data-icon="circle" style="font-variation-settings: 'FILL' 1;">circle</span>
</div>
</div>
<div class="row-start-2 col-start-3 flex items-center justify-center">
<button class="p-2 text-white/60 hover:text-white transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="keyboard_arrow_right">keyboard_arrow_right</span>
</button>
</div>
<div class="row-start-3 col-start-2 flex items-center justify-center">
<button class="p-2 text-white/60 hover:text-white transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</button>
</div>
</div>
<div class="absolute -bottom-8 left-1/2 -translate-x-1/2">
<span class="font-label-caps text-label-caps text-white/80 whitespace-nowrap">CABIN-VIEW 360</span>
</div>
</div>
</div>
<!-- Bottom Controls Overlay -->
<div class="space-y-4 pointer-events-auto">
<div class="flex justify-between items-end">
<!-- Listen Toggle -->
<div class="flex flex-col items-center gap-2">
<button class="w-12 h-12 glass-panel rounded-full flex items-center justify-center border border-white/20 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" data-icon="volume_up">volume_up</span>
</button>
<span class="font-label-caps text-[10px] text-white">LISTEN</span>
</div>
<!-- Main Talk Button -->
<div class="relative group">
<div class="absolute -inset-4 bg-secondary-container/20 rounded-full blur-xl group-active:bg-secondary-container/40 transition-colors"></div>
<button class="w-20 h-20 bg-secondary-container rounded-full flex flex-col items-center justify-center shadow-2xl active:scale-90 transition-transform border-4 border-primary inner-glow">
<span class="material-symbols-outlined text-primary text-3xl mb-1" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-label-caps text-[10px] text-primary font-bold">TALK</span>
</button>
</div>
<!-- Record Toggle -->
<div class="flex flex-col items-center gap-2">
<button class="w-12 h-12 glass-panel rounded-full flex items-center justify-center border border-white/20 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-error" data-icon="videocam">videocam</span>
</button>
<span class="font-label-caps text-[10px] text-white">REC</span>
</div>
</div>
</div>
</div>
</section>
<!-- Monitoring Stats Card -->
<div class="mt-6 glass-panel rounded-xl p-6 border-t-2 border-secondary-container">
<h2 class="font-h2 text-h3 text-primary mb-4">Luna's Environment</h2>
<div class="grid grid-cols-2 gap-4">
<div class="p-4 bg-white rounded-lg border border-surface-variant flex flex-col">
<span class="font-label-caps text-on-surface-variant mb-1">OXYGEN</span>
<div class="flex items-baseline gap-2">
<span class="font-data-readout text-h3 text-primary">21.4</span>
<span class="font-label-caps text-on-surface-variant">%</span>
</div>
<div class="mt-2 w-full bg-surface-variant h-1 rounded-full overflow-hidden">
<div class="bg-secondary-container h-full w-4/5"></div>
</div>
</div>
<div class="p-4 bg-white rounded-lg border border-surface-variant flex flex-col">
<span class="font-label-caps text-on-surface-variant mb-1">HUMIDITY</span>
<div class="flex items-baseline gap-2">
<span class="font-data-readout text-h3 text-primary">45</span>
<span class="font-label-caps text-on-surface-variant">%</span>
</div>
<div class="mt-2 w-full bg-surface-variant h-1 rounded-full overflow-hidden">
<div class="bg-secondary-container h-full w-1/2"></div>
</div>
</div>
</div>
</div>
<!-- System Alerts -->
<div class="mt-4 flex items-center gap-3 p-4 bg-secondary-container/10 border border-secondary-container/20 rounded-xl">
<span class="material-symbols-outlined text-secondary-container" data-icon="info">info</span>
<p class="font-body-md text-sm text-primary font-medium">Auto-cooling system engaged. Target: 70°F</p>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe bg-primary shadow-[0_-4px_20px_rgba(0,0,0,0.3)] border-t border-white/10 h-20 rounded-t-xl">
<div class="flex flex-col items-center justify-center text-surface-variant/60 p-2 hover:text-secondary-container/80">
<span class="material-symbols-outlined" data-icon="space_dashboard">space_dashboard</span>
<span class="font-label-caps text-label-caps">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary-container bg-primary-container/50 rounded-xl p-2 transition-all border-t-2 border-secondary-container scale-90">
<span class="material-symbols-outlined" data-icon="videocam">videocam</span>
<span class="font-label-caps text-label-caps">Camera</span>
</div>
<div class="flex flex-col items-center justify-center text-surface-variant/60 p-2 hover:text-secondary-container/80">
<span class="material-symbols-outlined" data-icon="flight_takeoff">flight_takeoff</span>
<span class="font-label-caps text-label-caps">Itinerary</span>
</div>
<div class="flex flex-col items-center justify-center text-surface-variant/60 p-2 hover:text-secondary-container/80">
<span class="material-symbols-outlined" data-icon="mic">mic</span>
<span class="font-label-caps text-label-caps">Audio</span>
</div>
</nav>
</body></html>
