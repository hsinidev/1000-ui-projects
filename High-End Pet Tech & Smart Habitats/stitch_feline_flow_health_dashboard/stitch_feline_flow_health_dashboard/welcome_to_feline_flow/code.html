<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Feline-Flow | Clinical Serenity</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed": "#e2e2e2",
                      "on-primary-fixed-variant": "#444655",
                      "surface-container": "#edeeef",
                      "primary-container": "#e6e6fa",
                      "surface-dim": "#d9dadb",
                      "on-tertiary-fixed": "#1a1c1c",
                      "on-error-container": "#93000a",
                      "surface-container-highest": "#e1e3e4",
                      "secondary-fixed-dim": "#c6c6c6",
                      "secondary-container": "#e0dfdf",
                      "surface-bright": "#f8f9fa",
                      "on-surface-variant": "#46464c",
                      "primary-fixed-dim": "#c5c5d8",
                      "tertiary-fixed-dim": "#c6c6c7",
                      "secondary-fixed": "#e3e2e2",
                      "on-tertiary-container": "#666868",
                      "on-primary": "#ffffff",
                      "inverse-surface": "#2e3132",
                      "tertiary-container": "#e8e8e8",
                      "surface-container-low": "#f3f4f5",
                      "on-tertiary": "#ffffff",
                      "primary-fixed": "#e1e1f5",
                      "surface-container-high": "#e7e8e9",
                      "surface-variant": "#e1e3e4",
                      "on-error": "#ffffff",
                      "background": "#f8f9fa",
                      "on-primary-fixed": "#191b29",
                      "inverse-on-surface": "#f0f1f2",
                      "surface": "#f8f9fa",
                      "on-tertiary-fixed-variant": "#454747",
                      "on-secondary": "#ffffff",
                      "error": "#ba1a1a",
                      "on-surface": "#191c1d",
                      "on-secondary-fixed-variant": "#464747",
                      "error-container": "#ffdad6",
                      "outline-variant": "#c7c5cc",
                      "on-secondary-fixed": "#1a1c1c",
                      "tertiary": "#5d5f5f",
                      "secondary": "#5d5e5f",
                      "primary": "#5c5d6e",
                      "surface-tint": "#5c5d6e",
                      "surface-container-lowest": "#ffffff",
                      "inverse-primary": "#c5c5d8",
                      "outline": "#77767d",
                      "on-secondary-container": "#626363",
                      "on-primary-container": "#656677",
                      "on-background": "#191c1d"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-padding": "40px",
                      "section-gap": "64px",
                      "gutter": "24px",
                      "unit": "8px"
              },
              "fontFamily": {
                      "display-lg": ["Inter"],
                      "headline-md": ["Inter"],
                      "label-caps": ["Inter"],
                      "body-base": ["Inter"]
              },
              "fontSize": {
                      "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "300"}],
                      "headline-md": ["24px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                      "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600"}],
                      "body-base": ["16px", {"lineHeight": "1.6", "letterSpacing": "0.015em", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
<style>
        .neumorphic-lift {
            box-shadow: 12px 12px 24px #e0e3e8, -12px -12px 24px #ffffff;
        }
        .neumorphic-recess {
            box-shadow: inset 4px 4px 8px #e0e3e8, inset -4px -4px 8px #ffffff;
        }
        .neumorphic-pill {
            box-shadow: 6px 6px 12px #e0e3e8, -6px -6px 12px #ffffff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-base overflow-hidden">
<!-- Brand Header Anchor -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center h-20 px-container-padding">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-headline-md" data-icon="pets">pets</span>
<h1 class="font-headline-md text-headline-md font-medium tracking-tight text-primary">Feline-Flow</h1>
</div>
</header>
<main class="flex h-screen w-full pt-20">
<!-- Left Side: Serene Visual -->
<section class="hidden lg:flex w-1/2 h-full p-container-padding items-center justify-center">
<div class="relative w-full h-full rounded-xl overflow-hidden neumorphic-lift border-[12px] border-surface">
<img alt="Serene cat in modern habitat" class="absolute inset-0 w-full h-full object-cover grayscale-[20%]" data-alt="A serene domestic cat resting within a high-tech, minimalist white habitat designed with soft curves and integrated medical-grade monitoring equipment. The lighting is ethereal and soft-focus, emphasizing the clinical yet peaceful atmosphere of the space. The color palette consists of pristine silk whites, metallic silvers, and very subtle lavender glows. The composition is clean and expansive, evoking a sense of technological superior care and domestic tranquility." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0q7Ceq-LiNAUUzmWXFJ7WzMqFkOQ1eLFIBtiV-QSVSMTpuPlnjes-A7wQbhK6P0Ox0fSKSwuQ1vARB8WsIJWHr6SmFGnwtkQJn-ULrKKuwN-JypYi7gqs_7OwE28p1Ozz3xErGqnO0Z5yKYGWMzb4rjZ23G_8uR8XjbB-HbTxU-N-mhQ8dsFaiPBx2cushfpRMhWgJxu-SaSoqBoe9Weo2m_RPPLKsGZMIfXo4A60oL74gltI8zatStENL9ACdYNUb2FM4ntufyui"/>
<div class="absolute inset-0 bg-gradient-to-tr from-primary/10 to-transparent"></div>
<div class="absolute bottom-12 left-12 max-w-md">
<h2 class="font-display-lg text-display-lg text-white drop-shadow-md">Breathable serenity.</h2>
<p class="text-on-primary font-body-base mt-4 opacity-90">Experience the world's first medical-grade environmental controller for your feline companion.</p>
</div>
</div>
</section>
<!-- Right Side: Auth Forms -->
<section class="flex-1 flex items-center justify-center p-container-padding overflow-y-auto">
<div class="w-full max-w-md space-y-section-gap">
<!-- Toggle Switch -->
<div class="flex justify-center">
<div class="bg-surface-container-low p-2 rounded-full flex gap-2 neumorphic-recess">
<button class="px-6 py-2 rounded-full font-label-caps text-label-caps bg-primary-container text-on-primary-container neumorphic-pill transition-all">Sign In</button>
<button class="px-6 py-2 rounded-full font-label-caps text-label-caps text-on-surface-variant hover:bg-surface-container transition-all">Create Account</button>
</div>
</div>
<!-- Form Section -->
<div class="space-y-8">
<div class="text-center">
<h3 class="font-headline-md text-headline-md text-primary mb-2">Welcome Back</h3>
<p class="text-on-surface-variant font-body-base">Syncing your companion's vitals.</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-4">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-6 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full h-16 pl-14 pr-6 bg-surface-bright border-none rounded-full neumorphic-recess focus:ring-2 focus:ring-primary-container text-body-base placeholder:text-outline-variant" placeholder="companion@felineflow.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-4">Access Key</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-6 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-16 pl-14 pr-14 bg-surface-bright border-none rounded-full neumorphic-recess focus:ring-2 focus:ring-primary-container text-body-base placeholder:text-outline-variant" placeholder="••••••••••••" type="password"/>
<button class="absolute right-6 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between px-4">
<label class="flex items-center gap-2 cursor-pointer">
<input class="w-5 h-5 rounded border-none bg-surface-bright neumorphic-recess text-primary focus:ring-offset-0 focus:ring-primary" type="checkbox"/>
<span class="font-label-caps text-label-caps text-on-surface-variant">Remember Me</span>
</label>
<a class="font-label-caps text-label-caps text-primary hover:underline" href="#">Forgot?</a>
</div>
<button class="w-full h-16 bg-primary-container text-on-primary-container rounded-full font-headline-md text-headline-md neumorphic-lift hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                            Initialize Session
                            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social/Alt Login -->
<div class="space-y-6">
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant opacity-30"></div>
<span class="font-label-caps text-label-caps text-outline-variant">Or Secure Connect</span>
<div class="h-[1px] flex-1 bg-outline-variant opacity-30"></div>
</div>
<div class="flex justify-center gap-6">
<button class="w-14 h-14 rounded-full flex items-center justify-center bg-surface-bright neumorphic-lift hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="fingerprint">fingerprint</span>
</button>
<button class="w-14 h-14 rounded-full flex items-center justify-center bg-surface-bright neumorphic-lift hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="face">face</span>
</button>
<button class="w-14 h-14 rounded-full flex items-center justify-center bg-surface-bright neumorphic-lift hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="google">google</span>
</button>
</div>
</div>
</div>
<footer class="text-center">
<p class="text-label-caps font-label-caps text-outline-variant uppercase tracking-[0.2em]">Medical-Grade Feline Care Interface</p>
</footer>
</div>
</section>
</main>
<!-- Status Indicator Decoration -->
<div class="fixed bottom-8 right-8 flex items-center gap-3 px-4 py-2 bg-surface neumorphic-lift rounded-full">
<div class="w-2 h-2 bg-primary rounded-full animate-pulse"></div>
<span class="text-label-caps font-label-caps text-on-surface-variant">Habitat Secure</span>
</div>
</body></html>
