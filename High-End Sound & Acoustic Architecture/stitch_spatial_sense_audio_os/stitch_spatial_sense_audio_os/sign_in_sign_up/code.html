<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=manrope:wght@300;400;500;600;700;800&amp;family=geist:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-sheen {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.02) 100%);
        }
        .silk-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .specular-highlight {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#1a1c1d",
                        "on-tertiary-fixed": "#0e1b34",
                        "error-container": "#93000a",
                        "on-secondary-container": "#b1b8cd",
                        "on-background": "#e5e2e1",
                        "surface-container-high": "#2a2a2a",
                        "on-primary-fixed-variant": "#454749",
                        "on-tertiary-fixed-variant": "#3b4662",
                        "on-secondary-fixed": "#141c2b",
                        "on-secondary": "#293041",
                        "primary-fixed-dim": "#c6c6c8",
                        "surface-container-highest": "#353434",
                        "inverse-on-surface": "#313030",
                        "error": "#ffb4ab",
                        "primary-fixed": "#e2e2e4",
                        "on-tertiary": "#24304a",
                        "surface-container-lowest": "#0e0e0e",
                        "inverse-primary": "#5d5e60",
                        "surface-container-low": "#1c1b1b",
                        "surface-dim": "#141313",
                        "on-surface": "#e5e2e1",
                        "on-error-container": "#ffdad6",
                        "outline": "#8f9194",
                        "surface-tint": "#c6c6c8",
                        "primary-container": "#e2e2e4",
                        "tertiary-container": "#d9e2ff",
                        "surface": "#141313",
                        "primary": "#ffffff",
                        "on-tertiary-container": "#586481",
                        "secondary-container": "#41495a",
                        "secondary": "#bfc6db",
                        "secondary-fixed-dim": "#bfc6db",
                        "on-error": "#690005",
                        "inverse-surface": "#e5e2e1",
                        "tertiary": "#ffffff",
                        "on-primary": "#2f3132",
                        "surface-variant": "#353434",
                        "outline-variant": "#44474a",
                        "background": "#141313",
                        "surface-bright": "#3a3939",
                        "on-secondary-fixed-variant": "#3f4758",
                        "tertiary-fixed-dim": "#bac6e7",
                        "secondary-fixed": "#dbe2f8",
                        "on-primary-container": "#636466",
                        "tertiary-fixed": "#d9e2ff",
                        "surface-container": "#201f1f",
                        "on-surface-variant": "#c5c7c9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "margin-desktop": "64px",
                        "margin-mobile": "24px",
                        "gutter": "24px",
                        "card-gap": "24px",
                        "margin-tablet": "40px"
                    },
                    "fontFamily": {
                        "headline-lg": ["manrope"],
                        "display-lg": ["manrope"],
                        "body-lg": ["manrope"],
                        "headline-md": ["manrope"],
                        "body-md": ["manrope"],
                        "label-sm": ["geist"],
                        "label-md": ["geist"],
                        "headline-lg-mobile": ["manrope"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "300"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-hidden flex items-center justify-center">
<!-- Ambient Background Background -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-tr from-[#0a0c10] via-[#141b2d] to-[#0a0c10]"></div>
<img class="w-full h-full object-cover mix-blend-overlay opacity-40 blur-3xl scale-110" data-alt="A luxurious background of flowing silk waves in deep midnight blue and charcoal tones. The lighting is ethereal and soft, creating a sense of acoustic serenity and high-end depth. Subtle cyan highlights glint off the edges of the dark liquid-like fabric, emphasizing a premium glassmorphic aesthetic with deep shadows and sophisticated textures." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBU9VbTLJMm0LmY6ST2Xvm9k7sHrXSfvED9jZJD4ujoC40m_4GBcFd2pVYI8Ts-S2rYFviRY9nDuumGtS1DJUwt2OEtE2Rn2dDBfSnYV-VJWN9zo51L9tAz4WMnxDNdU_DQSAGHmbpGWzy08GTA1K8UEaLzecINSQPM40EdXNUGet0vVBDj5L7voUjmoWGVGjPypXy8Sw7sO6LKkl-aJc9MND_T75OVk3UfIUlyDDOZrWp4QtKAxKi6owYaDA1GToVBivoqms0QaY"/>
<!-- Dynamic Gradient Orbs for Depth -->
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-secondary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-tertiary-container/5 rounded-full blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Brand Identity Component -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-surface/40 backdrop-blur-2xl rounded-2xl silk-border flex items-center justify-center mb-6 specular-highlight">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="graphic_eq">graphic_eq</span>
</div>
<h1 class="text-headline-lg font-headline-lg text-primary tracking-tighter">Spatial-Sense</h1>
<p class="text-on-surface-variant text-body-md mt-2">Elevate your acoustic environment</p>
</div>
<!-- Glassmorphic Auth Card -->
<div class="bg-surface-container-low/30 backdrop-blur-[40px] silk-border rounded-3xl p-8 shadow-2xl overflow-hidden glass-sheen relative">
<!-- Auth Tabs -->
<div class="flex p-1 bg-surface-container-highest/20 rounded-xl mb-8 silk-border">
<button class="flex-1 py-2.5 text-label-md font-label-md rounded-lg bg-white/10 text-primary shadow-sm transition-all">Sign In</button>
<button class="flex-1 py-2.5 text-label-md font-label-md rounded-lg text-on-surface-variant hover:text-primary transition-all">Create Account</button>
</div>
<!-- Form Content -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-label-sm font-label-sm text-on-surface-variant ml-1 uppercase">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest/40 border border-white/10 rounded-xl px-4 py-4 text-primary placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary/30 transition-all font-body-md" placeholder="name@luxury.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-label-sm font-label-sm text-on-surface-variant uppercase">Password</label>
<a class="text-label-sm font-label-sm text-secondary hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest/40 border border-white/10 rounded-xl px-4 py-4 text-primary placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary/30 transition-all font-body-md" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50" data-icon="lock">lock</span>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3 ml-1">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-white/10 bg-white/5 text-secondary focus:ring-0 focus:ring-offset-0" id="remember" type="checkbox"/>
</div>
<label class="text-label-md font-label-md text-on-surface-variant cursor-pointer" for="remember">Stay synced</label>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary text-on-primary font-label-md py-4 rounded-xl shadow-[0_0_30px_rgba(255,255,255,0.1)] hover:scale-[0.98] transition-all duration-200 specular-highlight active:scale-95" type="button">
                    Enter Dashboard
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
<div class="relative flex justify-center text-label-sm uppercase"><span class="bg-transparent px-4 text-on-surface-variant/50 backdrop-blur-sm">Or connect with</span></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-3 gap-4">
<button class="flex items-center justify-center py-3 bg-white/5 border border-white/5 rounded-xl hover:bg-white/10 transition-all group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="cloud">cloud</span>
</button>
<button class="flex items-center justify-center py-3 bg-white/5 border border-white/5 rounded-xl hover:bg-white/10 transition-all group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="token">token</span>
</button>
<button class="flex items-center justify-center py-3 bg-white/5 border border-white/5 rounded-xl hover:bg-white/10 transition-all group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="fingerprint">fingerprint</span>
</button>
</div>
</div>
<!-- Footer Help -->
<p class="text-center mt-8 text-on-surface-variant/60 text-label-md">
            Technical issues? <a class="text-secondary hover:underline decoration-secondary/30" href="#">Contact Audiophile Support</a>
</p>
</main>
<!-- Decorative Elements -->
<div class="fixed bottom-10 left-10 pointer-events-none opacity-20 hidden lg:block">
<div class="text-label-sm font-label-sm text-primary tracking-widest uppercase mb-2">Signal Status</div>
<div class="flex items-end gap-1 h-8">
<div class="w-1 bg-primary/40 h-1/2 rounded-full"></div>
<div class="w-1 bg-primary/60 h-3/4 rounded-full"></div>
<div class="w-1 bg-primary h-full rounded-full"></div>
<div class="w-1 bg-primary/70 h-2/3 rounded-full"></div>
<div class="w-1 bg-primary/30 h-1/4 rounded-full"></div>
</div>
</div>
<div class="fixed top-10 right-10 pointer-events-none opacity-20 hidden lg:block text-right">
<div class="text-label-sm font-label-sm text-primary tracking-widest uppercase mb-1">Active Zone</div>
<div class="text-body-lg font-body-lg text-primary">Master Living II</div>
</div>
</body></html>
