<div class="space-y-8">

<div class="flex justify-center gap-8 mb-4">
<button class="font-label-sm text-label-sm border-b-2 border-secondary pb-1 text-primary">SIGN IN</button>
<button class="font-label-sm text-label-sm border-b-2 border-transparent pb-1 text-on-surface-variant hover:text-secondary transition-colors">CREATE ACCOUNT</button>

<!-- Email Field -->
<div class="group">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-2 block" for="email">CLIENT EMAIL</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline focus:border-secondary focus:ring-0 transition-all font-body-md text-primary px-0 py-2" id="email" name="email" placeholder="master@atelier.com" type="email"/>
</div>
<!-- Password Field -->
<div class="group">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-2 block" for="password">CIPHER KEY</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline focus:border-secondary focus:ring-0 transition-all font-body-md text-primary px-0 py-2" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<!-- Commission ID Field (Specific to brand) -->
<div class="group">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-2 block" for="commission-id">COMMISSION ID (OPTIONAL)</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline focus:border-secondary focus:ring-0 transition-all font-body-md text-primary px-0 py-2" id="commission-id" name="commission-id" placeholder="LV-2024-081" type="text"/>
</div>

<div class="pt-6">
<button class="w-full bg-primary-container text-secondary-fixed py-4 font-label-sm text-label-sm uppercase tracking-widest border border-secondary/40 hover:shadow-lg transition-all transform hover:-translate-y-0.5 active:translate-y-0" type="submit">
