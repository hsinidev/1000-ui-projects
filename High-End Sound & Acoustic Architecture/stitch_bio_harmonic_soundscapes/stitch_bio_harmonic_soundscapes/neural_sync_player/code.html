<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(225, 225, 245, 0.5);
        }
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.98); }
        }
        .animate-pulse-subtle {
            animation: pulse-subtle 4s ease-in-out infinite;
        }
        .leaf-shadow {
            box-shadow: 0px 10px 40px -10px rgba(74, 93, 78, 0.12);
        }
        .bg-mesh-gradient {
            background: radial-gradient(at 0% 0%, #d3e8d5 0%, transparent 50%),
                        radial-gradient(at 100% 0%, #e1e1f5 0%, transparent 50%),
                        radial-gradient(at 50% 100%, #f9f9f9 0%, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen selection:bg-primary-fixed-dim">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl shadow-[0px_4px_20px_rgba(74,93,78,0.05)]">
<div class="flex justify-between items-center px-margin-mobile h-16 w-full">
<button class="text-primary hover:opacity-80 transition-opacity duration-300">
<span class="material-symbols-outlined" data-icon="waves">waves</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Serene Bio-Acoustics</h1>
<button class="text-primary hover:opacity-80 transition-opacity duration-300">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-margin-mobile flex flex-col items-center max-w-container-max mx-auto min-h-screen bg-mesh-gradient">
<!-- Neural-Sync Visualization Section -->
<section class="w-full flex flex-col items-center space-y-12 mb-16">
<div class="relative w-72 h-72 md:w-96 md:h-96 flex items-center justify-center">
<!-- Organic Waves Patterns -->
<div class="absolute inset-0 rounded-full bg-primary/5 animate-pulse-subtle" style="animation-delay: 0s;"></div>
<div class="absolute inset-4 rounded-full border border-secondary/20 animate-pulse-subtle" style="animation-delay: 1s;"></div>
<div class="absolute inset-12 rounded-full glass-card flex items-center justify-center leaf-shadow">
<div class="w-32 h-32 md:w-48 md:h-48 rounded-full bg-gradient-to-tr from-primary-container to-secondary-fixed flex items-center justify-center overflow-hidden">
<img alt="Neural abstraction" class="w-full h-full object-cover opacity-60 mix-blend-overlay" data-alt="A highly artistic close-up of microscopic biological structures resembling neurons or root systems, glowing with a soft lavender and moss green luminescence. The lighting is diffused and ethereal, creating a serene and grounded atmosphere. The aesthetic is clean and modern, evoking a high-end scientific laboratory within a lush, misty forest setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqXkx0wCu-iGayy-IeXvD7oU7grDcASo2xbrTncxC8eAlmPgGJVwHAP4SKIfkAPVsV_0wIpkRgzXXKGLtA1OfSF9TSgpecvg2axa7CCw_tBoKEHJK3g7etWiuSLYz6voo6f7uwOW_zbbonhADFjUV8X-GD_m2DuIgBhisbveFAcMPtTDlvAxX7UMjNkiZNXK9gaE6Kf94pHQBlgk1tcoU5wLR6CjxNFYJXKpNHJlK4T2yHgIdm9r322b27uxRKjMiGezT1NQM0h8g"/>
</div>
</div>
<!-- Interactive SVG Waves -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-40" viewbox="0 0 200 200">
<circle class="animate-pulse" cx="100" cy="100" fill="none" r="95" stroke="url(#wave-grad)" stroke-width="0.5"></circle>
<defs>
<lineargradient id="wave-grad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#506354"></stop>
<stop offset="100%" stop-color="#c5c5d8"></stop>
</lineargradient>
</defs>
</svg>
</div>
<div class="text-center space-y-2">
<span class="text-label-sm font-label-sm uppercase tracking-widest text-primary opacity-60">Session Active</span>
<h2 class="text-display-lg font-display-lg text-primary">Primordial Deep</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant max-w-md mx-auto">Synchronizing delta waves for deep neural restoration and cellular calm.</p>
</div>
</section>
<!-- Playback Controls -->
<section class="w-full max-w-xl glass-card rounded-3xl p-8 space-y-8 leaf-shadow mb-8">
<div class="flex justify-between items-center text-on-surface-variant">
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="shuffle">shuffle</span></button>
<div class="flex items-center space-x-8">
<button class="hover:scale-110 transition-transform"><span class="material-symbols-outlined text-4xl" data-icon="skip_previous">skip_previous</span></button>
<button class="w-20 h-20 bg-primary text-on-primary rounded-full flex items-center justify-center hover:scale-105 transition-all shadow-xl">
<span class="material-symbols-outlined text-5xl" data-icon="pause" data-weight="fill">pause</span>
</button>
<button class="hover:scale-110 transition-transform"><span class="material-symbols-outlined text-4xl" data-icon="skip_next">skip_next</span></button>
</div>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="repeat">repeat</span></button>
</div>
<!-- Audio Performance Loading Bar -->
<div class="space-y-3">
<div class="relative w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-2/3 bg-gradient-to-r from-primary to-secondary rounded-full"></div>
<!-- Circular Expansion Ripple as indicator -->
<div class="absolute top-1/2 left-[66%] -translate-y-1/2 -translate-x-1/2 w-4 h-4 bg-primary border-2 border-white rounded-full shadow-lg"></div>
</div>
<div class="flex justify-between text-label-sm font-label-sm text-on-surface-variant/60">
<span>12:45</span>
<span>24:00</span>
</div>
</div>
</section>
<!-- Session Triggers / Bento Grid -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-gutter w-full max-w-container-max">
<button class="glass-card p-6 rounded-2xl flex flex-col items-center text-center space-y-3 hover:bg-white/60 transition-all group">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="air">air</span>
</div>
<span class="text-label-sm font-label-sm text-primary">Air Flow</span>
</button>
<button class="glass-card p-6 rounded-2xl flex flex-col items-center text-center space-y-3 hover:bg-white/60 transition-all group">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="temp_preferences_eco">temp_preferences_eco</span>
</div>
<span class="text-label-sm font-label-sm text-primary">Bio-Heat</span>
</button>
<button class="glass-card p-6 rounded-2xl flex flex-col items-center text-center space-y-3 hover:bg-white/60 transition-all group">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="psychology">psychology</span>
</div>
<span class="text-label-sm font-label-sm text-primary">Focus Aid</span>
</button>
<button class="glass-card p-6 rounded-2xl flex flex-col items-center text-center space-y-3 hover:bg-white/60 transition-all group">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="bedtime">bedtime</span>
</div>
<span class="text-label-sm font-label-sm text-primary">Sleep Sync</span>
</button>
</div>
</main>

<!-- Library - Active -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 animate-pulse transition-all duration-500 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="library_music" data-weight="fill">library_music</span>
<span class="font-label-sm text-label-sm">Library</span>
</a>
<!-- Furniture -->
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:scale-105 transition-transform duration-300" href="#">
<span class="material-symbols-outlined" data-icon="weekend">weekend</span>
<span class="font-label-sm text-label-sm">Furniture</span>
</a>
<!-- Research -->

<span class="material-symbols-outlined" data-icon="article">article</span>
<span class="font-label-sm text-label-sm">Research</span>
</a>
<!-- Design -->
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:scale-105 transition-transform duration-300" href="#">
<span class="material-symbols-outlined" data-icon="graphic_eq">graphic_eq</span>
<span class="font-label-sm text-label-sm">Design</span>
</a>
</div>
</nav>
</body></html>
