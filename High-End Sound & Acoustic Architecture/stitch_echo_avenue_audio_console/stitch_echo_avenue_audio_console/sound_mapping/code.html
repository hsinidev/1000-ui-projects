<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Geist:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(42, 42, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid #3A3A3A;
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(223, 183, 255, 0.3);
        }
        .signal-ghost {
            opacity: 0.15;
            background: repeating-linear-gradient(90deg, #dfb7ff 0px, transparent 2px, transparent 40px);
        }
        body {
            background-color: #121212;
            color: #e5e2e1;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#dfb7ff",
                        "inverse-surface": "#e5e2e1",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#dfb7ff",
                        "on-secondary-fixed": "#1b1c1c",
                        "surface-bright": "#393939",
                        "on-tertiary": "#2f3131",
                        "on-surface-variant": "#d1c1d9",
                        "secondary-fixed": "#e4e2e1",
                        "on-primary-container": "#f7e5ff",
                        "inverse-primary": "#8c00e5",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed": "#2d004f",
                        "surface-container": "#201f1f",
                        "surface-dim": "#131313",
                        "on-surface": "#e5e2e1",
                        "primary": "#dfb7ff",
                        "inverse-on-surface": "#313030",
                        "primary-container": "#9d00ff",
                        "surface-container-low": "#1c1b1b",
                        "secondary-container": "#474746",
                        "secondary": "#c8c6c5",
                        "on-secondary": "#303030",
                        "tertiary-fixed": "#e2e2e2",
                        "on-background": "#e5e2e1",
                        "on-primary": "#4b007e",
                        "error-container": "#93000a",
                        "tertiary-container": "#696a6a",
                        "on-tertiary-fixed": "#1a1c1c",
                        "background": "#131313",
                        "on-tertiary-container": "#ebebeb",
                        "on-secondary-fixed-variant": "#474746",
                        "tertiary": "#c6c6c7",
                        "secondary-fixed-dim": "#c8c6c5",
                        "error": "#ffb4ab",
                        "primary-fixed": "#f1daff",
                        "outline": "#9a8ca2",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-primary-fixed-variant": "#6b00b0",
                        "on-secondary-container": "#b6b5b4",
                        "surface-variant": "#353534",
                        "surface-container-highest": "#353534",
                        "surface": "#131313",
                        "outline-variant": "#4e4356",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-lowest": "#0e0e0e"
                    },
                    "fontFamily": {
                        "headline-md": ["Space Grotesk"],
                        "metric-sm": ["JetBrains Mono"],
                        "body-lg": ["Geist"],
                        "display-lg": ["Space Grotesk"],
                        "body-md": ["Geist"],
                        "headline-lg": ["Space Grotesk"],
                        "metric-lg": ["JetBrains Mono"],
                        "label-caps": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "headline-md": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "metric-sm": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "display-lg": ["72px", {"lineHeight": "80px", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "metric-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-gutter h-20 bg-surface/80 backdrop-blur-xl dark:bg-surface/80 border-b border-outline-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<h1 class="font-label-caps text-label-caps tracking-widest text-primary">SONIC_PRECISION_v1.0</h1>
</div>
<div class="flex items-center gap-3">
<div class="flex flex-col items-end">
<span class="font-metric-sm text-metric-sm text-primary">98.4dB</span>
<span class="font-label-caps text-[10px] text-error flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" style="font-variation-settings: 'FILL' 1;">warning</span>
                    PEAK
                </span>
</div>
</div>
</header>
<main class="flex-grow pt-20 pb-16 relative overflow-hidden flex flex-col">
<!-- Mapping Canvas -->
<div class="absolute inset-0 bg-[#0e0e0e] z-0 overflow-hidden">
<!-- Stadium Layout Overlay -->
<svg class="absolute inset-0 w-full h-full opacity-30" viewbox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
<rect fill="none" height="600" stroke="#4e4356" stroke-width="1" width="300" x="50" y="100"></rect>
<path d="M50 400 Q200 400 350 400" fill="none" stroke="#4e4356"></path>
<circle cx="200" cy="400" fill="none" r="120" stroke="#4e4356"></circle>
</svg>
<!-- Sound Wave Heat Map (Vector Simulation) -->
<div class="absolute inset-0 flex items-center justify-center opacity-80 pointer-events-none">
<div class="w-[120%] h-[120%] bg-[radial-gradient(circle_at_50%_20%,_rgba(223,183,255,0.4)_0%,_rgba(140,0,229,0.1)_30%,_rgba(18,18,18,0)_70%)]"></div>
<!-- Interference Patterns -->
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 400 800">
<path class="opacity-20" d="M0 200 Q200 250 400 200" fill="none" stroke="#dfb7ff" stroke-width="0.5"></path>
<path class="opacity-40" d="M0 210 Q200 260 400 210" fill="none" stroke="#dfb7ff" stroke-width="1"></path>
<path class="opacity-60" d="M0 220 Q200 270 400 220" fill="none" stroke="#dfb7ff" stroke-width="2"></path>
<circle class="animate-pulse" cx="200" cy="150" fill="#dfb7ff" r="10"></circle>
</svg>
</div>
<!-- Clipping Alerts -->
<div class="absolute top-[25%] left-[20%] glass-panel px-2 py-1 flex items-center gap-1 border-error/50">
<span class="material-symbols-outlined text-error text-[16px]" style="font-variation-settings: 'FILL' 1;">error</span>
<span class="font-label-caps text-[10px] text-error">CLIPPING_STAGE_L</span>
</div>
</div>
<!-- Controls UI -->
<div class="relative z-10 flex flex-col h-full justify-between p-4 pointer-events-none">
<!-- Top Controls: Frequency Toggles -->
<div class="flex flex-col gap-2 pointer-events-auto">
<div class="flex gap-1 overflow-x-auto no-scrollbar">
<button class="px-4 py-2 bg-primary text-on-primary font-label-caps text-[10px] whitespace-nowrap">FULL_BAND</button>
<button class="px-4 py-2 glass-panel text-on-surface-variant font-label-caps text-[10px] whitespace-nowrap">SUB_BASS</button>
<button class="px-4 py-2 glass-panel text-on-surface-variant font-label-caps text-[10px] whitespace-nowrap">MID_HIGH</button>
<button class="px-4 py-2 glass-panel text-on-surface-variant font-label-caps text-[10px] whitespace-nowrap">VOCALS</button>
</div>
</div>
<!-- Bottom Controls: Zoom & Legend -->
<div class="flex flex-col gap-4">
<!-- Floating Zoom Controls -->
<div class="flex flex-col gap-1 w-fit pointer-events-auto">
<button class="w-10 h-10 glass-panel flex items-center justify-center text-primary">
<span class="material-symbols-outlined">add</span>
</button>
<button class="w-10 h-10 glass-panel flex items-center justify-center text-primary">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="w-10 h-10 glass-panel flex items-center justify-center text-primary">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
<!-- dB Legend -->
<div class="glass-panel p-3 pointer-events-auto">
<div class="flex justify-between items-center mb-2">
<span class="font-label-caps text-[10px] text-on-surface-variant">PRESSURE_MAP (dB)</span>
<span class="font-label-caps text-[10px] text-primary">LIVE_FEED</span>
</div>
<div class="h-2 w-full bg-gradient-to-r from-[#121212] via-[#8c00e5] to-[#dfb7ff] border border-outline-variant"></div>
<div class="flex justify-between mt-1">
<span class="font-metric-sm text-[10px] text-on-surface-variant">60</span>
<span class="font-metric-sm text-[10px] text-on-surface-variant">80</span>
<span class="font-metric-sm text-[10px] text-on-surface-variant">100</span>
<span class="font-metric-sm text-[10px] text-on-surface-variant">110</span>
<span class="font-metric-sm text-[10px] text-error">120+</span>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-16 bg-surface-container-highest border-t border-outline-variant">
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all">
<span class="material-symbols-outlined">view_in_ar</span>
<span class="font-label-caps text-label-caps">ARRAY</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all">
<span class="material-symbols-outlined">ev_station</span>
<span class="font-label-caps text-label-caps">POWER</span>
</div>
<div class="flex flex-col items-center justify-center text-on-primary bg-primary rounded-none px-4 py-2 shadow-[0_0_15px_rgba(223,183,255,0.4)] scale-95 duration-75">
<span class="material-symbols-outlined">map</span>
<span class="font-label-caps text-label-caps">MAP</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-primary transition-all">
<span class="material-symbols-outlined">engineering</span>
<span class="font-label-caps text-label-caps">STAFF</span>
</div>
</nav>
</body></html>
