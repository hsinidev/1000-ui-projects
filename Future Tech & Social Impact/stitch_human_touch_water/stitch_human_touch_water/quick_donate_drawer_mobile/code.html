<style>
        .hand-drawn-radius { border-radius: 4px 12px 4px 8px; }

            background-image: url("data:image/svg+xml,%3Csvg width='100' height='10' viewBox='0 0 100 10' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 7C20 4 45 3 97 5' stroke='%2396472E' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: bottom;
            padding-bottom: 4px;
        }
        .scribble-circle {
            position: relative;
        }
        .scribble-circle::after {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='40' viewBox='0 0 60 40' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 2C15 2 2 10 2 20C2 30 15 38 30 38C45 38 58 30 58 20C58 10 45 2 30 2' stroke='%2396472E' stroke-width='1.5' stroke-dasharray='4 2'/%3E%3C/svg%3E");

            pointer-events: none;
        }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden">
<!-- Background Content (Simulated Homepage) -->
<div class="fixed inset-0 z-0 brightness-[0.3] contrast-125 overflow-hidden">
<header class="flex justify-between items-center w-full px-6 py-4 border-b border-stone-200">
<h1 class="text-2xl font-headline-lg italic text-primary">ClearCurrent</h1>
<span class="material-symbols-outlined text-primary">menu</span>
</header>
<main class="p-8">
<h2 class="font-headline-xl mb-6">Restoring Hope Through Water.</h2>
<div class="w-full aspect-[4/5] bg-surface-variant hand-drawn-radius overflow-hidden">
<img alt="" class="w-full h-full object-cover grayscale-[0.2]" data-alt="A sun-drenched, high-quality photograph with film grain texture showing a close-up of a child's hands catching clear water from a rural pump. The lighting is warm and golden, evoking a sense of hope and purity. The overall aesthetic is nostalgic and tactile, matching the warm beige and deep water blue color palette of the humanitarian mission." src="https://lh3.googleusercontent.com/aida-public/AB6AXuByZ0suV5p5KlhtrWOSvyXnKB1phAEiiCTcOqCrOEKNQjTGCJwB30891YM5PfesvpgnJbE3H5qMtLspbXrFil8B-vWkyU-dBYuTVL2nyvLFj51-WM3ipdZWAIdu7JlsdsKodLJwojXeehi3qqxr-nEtcZjUPMoMUxuqjucqmVXhL460NM88xM070yX4xUZ3s49DIeuJoW1GtoepGvK8qMMg6eU4Ifi1Y4qLFH4OWk7CX84STE3hdWtoqaE67ReHCOww40z6vERdmilp"/>
</div>
</main>
</div>
<!-- Backdrop Overlay -->
<div class="fixed inset-0 bg-black/40 z-10 backdrop-blur-[2px]"></div>
<!-- Quick-Donate Drawer -->
<div class="fixed bottom-0 left-0 right-0 z-20 max-w-md mx-auto h-[795px] bg-surface-bright rounded-t-[32px] shadow-2xl flex flex-col overflow-hidden">
<!-- Drag Handle -->
<div class="w-full flex justify-center py-4">
<div class="w-12 h-1.5 bg-outline-variant rounded-full opacity-40"></div>
</div>
<div class="flex-1 overflow-y-auto px-6 pb-24">
<!-- Impact Visual -->
<div class="mb-6 relative">
<div class="hand-drawn-radius overflow-hidden h-40 border border-surface-variant shadow-sm">
<img alt="" class="w-full h-full object-cover" data-alt="A warm, intimate photo of a group of smiling villagers in a remote African community, gathered around a newly installed water well. The lighting is soft and natural, with sun-streaked textures that create a lived-in, authentic feel. The composition focuses on their genuine expressions of joy and communal celebration, presented in a filmic, editorial style that bridges the gap between data and human storytelling." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAT04Y7AiEwKMa5OPmCyWyDw4W-JI3Dgswe6g5blvNxObQh6rRxnBS3n9bt4PPR9oIB3f0nZipTAr87-YTBI_kejz43nG9euu--8RzW-d3IiyuLuzeCuwgK_kMoKdVCTFmKj7h975jISAaZb4HCt1_jddeFr1dCKt89Vn3arc4iQgl9fT8y10Tu_X8Tfbcp_BTVFvJMpkIE6Qb8ft_R1wujzrg365-RbYSw2ZDUGto-rS9jzXBIX1EcIWe1BpBCOVXG4C5kkyEIm7f-"/>
</div>
</div>
<!-- Headline -->
<div class="text-center mb-8">
<h3 class="font-headline-lg text-primary leading-tight mb-2">
                    Every contribution creates a <span class="scribble-underline italic">story of joy</span>
</h3>
<p class="text-on-surface-variant font-body-md opacity-80">Auro Water Stewardship Project</p>
</div>
<!-- Amount Selection -->
<div class="grid grid-cols-3 gap-3 mb-6">
<button class="py-4 border border-outline-variant rounded-xl font-headline-md text-primary hover:bg-surface-container transition-colors">$10</button>
<div class="scribble-circle flex justify-center">
<button class="w-full py-4 bg-secondary-container/20 border border-secondary rounded-xl font-headline-md text-secondary font-bold">$50</button>
</div>
<button class="py-4 border border-outline-variant rounded-xl font-headline-md text-primary hover:bg-surface-container transition-colors">$100</button>
</div>
<!-- Custom Input -->
<div class="mb-8">
<div class="relative group">
<span class="absolute left-0 bottom-3 text-headline-md text-primary">$</span>
<input class="w-full pl-6 py-3 border-b-2 border-primary bg-transparent focus:ring-0 focus:outline-none font-headline-md text-primary placeholder:text-outline-variant placeholder:font-body-md" placeholder="Other amount" type="text"/>
<label class="block text-label-sm text-primary-container mt-2">Provides clean water for a family of four</label>
</div>
</div>
<!-- Fast Payment Options -->
<div class="grid grid-cols-2 gap-4 mb-6">
<button class="flex items-center justify-center gap-2 py-3 bg-[#000000] text-white rounded-xl hover:opacity-90 transition-opacity">
<span class="font-medium">Apple Pay</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 border border-outline-variant bg-white rounded-xl hover:bg-surface-container transition-colors">
<span class="font-medium text-[#3c4043]">Google Pay</span>
</button>
</div>
<!-- Primary Action -->
<button class="w-full py-5 bg-secondary text-white font-label-sm uppercase tracking-widest hand-drawn-radius shadow-md active:scale-[0.98] transition-all">
                Complete Donation
            </button>
<p class="text-center text-[11px] text-on-surface-variant mt-4 opacity-60">
                100% of public donations go directly to water projects.
            </p>
</div>
</div>
<!-- Navigation Shell -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-[#F5F2ED] dark:bg-stone-900 flex justify-around items-center w-full px-2 py-3 pb-safe border-t border-stone-200 dark:border-stone-800">
<!-- Stories -->
<a class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-2 hover:bg-[#FDFBF7] transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="font-serif text-[11px] uppercase tracking-wider">Journal</span>
</a>
<!-- Impact/Map -->
<a class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-2 hover:bg-[#FDFBF7] transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="water_drop">water_drop</span>
<span class="font-serif text-[11px] uppercase tracking-wider">Impact</span>
</a>
<!-- Donate (Active) -->
<a class="flex flex-col items-center justify-center text-[#1B4D64] dark:text-cyan-200 bg-[#EAE4D9] dark:bg-stone-800 rounded-[4px_12px_4px_8px] px-4 py-2 scale-95 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="volunteer_activism" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
<span class="font-serif text-[11px] uppercase tracking-wider">Donate</span>
</a>
<!-- People -->
<a class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-2 hover:bg-[#FDFBF7] transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="group">group</span>
<span class="font-serif text-[11px] uppercase tracking-wider">People</span>
</a>
</nav>
</body></html>
