<header class="bg-black text-yellow-400 font-public-sans font-black uppercase tracking-tighter docked full-width top-0 border-b-4 border-white flex justify-between items-center w-full px-6 py-4 z-50">

<div class="flex gap-4">

</button>
<button class="active:scale-95 transition-transform hover:bg-yellow-400 hover:text-black p-2">

</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Success Container -->
<div class="w-full max-w-2xl bg-[#1A1A1A] border-4 border-yellow-400 p-8 flex flex-col items-center text-center">

<div class="relative mb-8">
<div class="w-24 h-24 bg-primary-container text-on-primary-container flex items-center justify-center rounded-full mb-4">
<span class="material-symbols-outlined text-5xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Main Heading -->
<h1 class="font-display-xl text-display-xl text-yellow-400 mb-stack-lg uppercase">
                EXPORT SUCCESSFUL
            </h1>
<!-- PDF Preview Card -->
<div class="w-full bg-black border-2 border-white p-6 mb-stack-lg flex items-center gap-6 text-left">
<div class="flex-shrink-0 bg-secondary-container p-4">
<span class="material-symbols-outlined text-white text-4xl" data-icon="picture_as_pdf">picture_as_pdf</span>
</div>
<div class="overflow-hidden">
<p class="font-label-bold text-label-bold text-yellow-400 truncate">FILE NAME:</p>
<p class="font-headline-md text-headline-md text-white truncate uppercase">RECOVERY_REPORT_882-09X.pdf</p>
</div>
</div>
<!-- Secondary Info -->
<div class="w-full text-left mb-10 border-l-8 border-yellow-400 pl-4 bg-white/5 py-4">
<p class="font-label-bold text-label-bold text-yellow-400 uppercase">STORAGE LOCATION</p>
<p class="font-body-lg text-body-lg text-white">System Data Root &gt; Reports &gt; 2024_Crisis_Exports</p>
</div>

<button class="w-full min-h-[56px] bg-yellow-400 text-black font-button-text text-button-text uppercase active:translate-y-1 transition-transform border-b-4 border-black">
                    OPEN PDF
                </button>
<button class="w-full min-h-[56px] border-2 border-white text-white font-button-text text-button-text uppercase hover:bg-white hover:text-black active:translate-y-1 transition-transform">
                    RETURN TO DASHBOARD
                </button>
</div>
</div>
