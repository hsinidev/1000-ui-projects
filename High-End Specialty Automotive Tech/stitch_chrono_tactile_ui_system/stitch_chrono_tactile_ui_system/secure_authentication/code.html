<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HOROLOGUE - Authentication Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#44474a",
                    "on-background": "#e5e2e1",
                    "on-primary": "#2c3134",
                    "on-tertiary-fixed": "#1c1b1b",
                    "tertiary-container": "#b9b7b7",
                    "inverse-primary": "#5a5f63",
                    "tertiary-fixed": "#e5e2e1",
                    "surface-container": "#201f1f",
                    "on-primary-fixed": "#181c1f",
                    "surface-container-lowest": "#0e0e0e",
                    "surface-tint": "#c3c7cb",
                    "primary": "#d0d4d8",
                    "surface-dim": "#131313",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "on-secondary-fixed-variant": "#6d3a00",
                    "outline": "#8e9194",
                    "on-tertiary": "#313030",
                    "on-secondary-container": "#ffb270",
                    "on-tertiary-container": "#494848",
                    "primary-container": "#b4b8bc",
                    "error": "#ffb4ab",
                    "surface-container-high": "#2a2a2a",
                    "secondary-container": "#7a4100",
                    "surface-container-low": "#1c1b1b",
                    "surface": "#131313",
                    "primary-fixed-dim": "#c3c7cb",
                    "on-tertiary-fixed-variant": "#474746",
                    "error-container": "#93000a",
                    "surface-variant": "#353534",
                    "on-surface": "#e5e2e1",
                    "on-error-container": "#ffdad6",
                    "surface-container-highest": "#353534",
                    "on-primary-container": "#44494c",
                    "on-secondary": "#4d2700",
                    "inverse-surface": "#e5e2e1",
                    "secondary-fixed": "#ffdcc2",
                    "on-error": "#690005",
                    "secondary-fixed-dim": "#ffb77b",
                    "primary-fixed": "#dfe3e7",
                    "on-surface-variant": "#c4c7ca",
                    "secondary": "#ffb77b",
                    "tertiary": "#d5d3d2",
                    "on-primary-fixed-variant": "#43474b",
                    "inverse-on-surface": "#313030",
                    "on-secondary-fixed": "#2e1500",
                    "surface-bright": "#3a3939",
                    "background": "#131313"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-desktop": "40px",
                    "component-gap": "12px",
                    "unit": "4px",
                    "gutter": "24px",
                    "margin-mobile": "16px"
            },
            "fontFamily": {
                    "headline-md": ["Hanken Grotesk"],
                    "headline-lg": ["Hanken Grotesk"],
                    "body-md": ["Hanken Grotesk"],
                    "label-caps": ["JetBrains Mono"],
                    "gauge-value": ["JetBrains Mono"],
                    "body-lg": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "headline-md": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "headline-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "gauge-value": ["42px", {"lineHeight": "1.0", "letterSpacing": "-0.05em", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .milled-surface {
            background: linear-gradient(145deg, #1e1e1e, #131313);
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.05), inset -1px -1px 2px rgba(0,0,0,0.5);
        }
        .copper-glow {
            box-shadow: 0 0 15px rgba(255, 183, 123, 0.2), inset 0 1px 1px rgba(255,255,255,0.3);
        }
        .tactile-button {
            background: linear-gradient(to bottom, #ffb77b, #7a4100);
            transition: all 0.1s ease-in-out;
        }
        .tactile-button:active {
            transform: scale(0.98);
            filter: brightness(0.8);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
        }
        .brushed-metal {
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 10px);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Hero Backdrop with V12 Engine -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="absolute inset-0 bg-black/60 z-10"></div>
<img class="w-full h-full object-cover blur-sm scale-105" data-alt="A cinematic, high-detail macro shot of a V12 engine core, showing intricate mechanical assemblies, machined titanium components, and brushed copper wires. The lighting is low-key and dramatic, with sharp highlights glinting off metallic surfaces. The background is softly blurred to create depth, focusing on the complex geometry of the engine's mechanical heart. The color palette is dominated by dark charcoals, industrial silvers, and warm copper accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4sEDHoA8WU4-wWtx22jhZAeholxtI30ext3SX39qrfS3TaTqvoanDxjyDzG98cDeQhJ4vPAWmQsltsot0XAAUW_jrJp4yDBobY5QhtIHxNLywkc6NdmVCMPvAoYErH7179gjO6LB2YShsJuN2NuwNXz52uoCFp7ufp2hlBPG0FXuR1kAlXcPYVCVW7kJJixo5T2ZB-5MqVdKdHRNiSP1Oj-DOUoKS8sINkRJfr5-c8cmNkPj_mDM17H3tj2K7Y-KtF1brYZuO5TI"/>
</div>
<!-- Top Bar (Minimalist for Auth) -->
<header class="relative z-20 flex justify-center items-center h-[80px] px-margin-desktop border-b border-outline-variant/30 bg-background/20 backdrop-blur-md">
<h1 class="font-label-caps text-label-caps tracking-[0.4em] text-secondary">HOROLOGUE</h1>
</header>
<!-- Main Content: Auth Portal -->
<main class="relative z-20 flex-1 flex items-center justify-center px-margin-mobile">
<div class="w-full max-w-[480px] bg-surface-container-lowest/90 backdrop-blur-xl rounded-lg p-10 border border-outline-variant/40 shadow-2xl relative overflow-hidden">
<!-- Machined Texture Overlay -->
<div class="absolute inset-0 brushed-metal pointer-events-none opacity-20"></div>
<div class="relative z-10">
<div class="flex flex-col items-center mb-10">
<span class="material-symbols-outlined text-secondary text-5xl mb-4" style="font-variation-settings: 'wght' 200;">lock_open</span>
<h2 class="font-headline-md text-headline-md text-center text-primary">PORTAL ACCESS</h2>
<p class="font-label-caps text-label-caps text-outline mt-2 tracking-widest">OWNER VERIFICATION REQUIRED</p>
</div>
<form class="space-y-8">
<!-- Serial Key Input (Recessed Style) -->
<div class="group">
<label class="font-label-caps text-label-caps text-primary mb-3 block opacity-80">SERIAL KEY / ARTISANAL ID</label>
<div class="relative milled-surface rounded-sm border border-secondary/30 group-focus-within:border-secondary transition-all">
<input class="w-full bg-transparent border-none text-secondary font-gauge-value text-xl px-4 py-3 focus:ring-0 placeholder:text-outline-variant" placeholder="HL-XXXX-XXXX" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-sm">verified_user</span>
</div>
</div>
<!-- Identity Input -->
<div class="group">
<label class="font-label-caps text-label-caps text-primary mb-3 block opacity-80">OWNER CREDENTIALS</label>
<div class="space-y-4">
<div class="relative milled-surface rounded-sm border border-outline-variant/50 group-focus-within:border-primary/50 transition-all">
<input class="w-full bg-transparent border-none text-on-surface font-label-caps text-xs px-4 py-4 focus:ring-0 placeholder:text-outline-variant/60" placeholder="EMAIL ADDRESS" type="email"/>
</div>
<div class="relative milled-surface rounded-sm border border-outline-variant/50 group-focus-within:border-primary/50 transition-all">
<input class="w-full bg-transparent border-none text-on-surface font-label-caps text-xs px-4 py-4 focus:ring-0 placeholder:text-outline-variant/60" placeholder="SECURITY PASSCODE" type="password"/>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full h-16 tactile-button copper-glow flex items-center justify-center space-x-3 group rounded-sm" type="submit">
<span class="font-label-caps text-label-caps text-on-secondary-fixed tracking-[0.2em] font-bold">INITIALIZE CORE</span>
<span class="material-symbols-outlined text-on-secondary-fixed group-hover:translate-x-1 transition-transform">power_settings_new</span>
</button>
</div>
<!-- Secondary Links -->
<div class="flex justify-between items-center pt-6 border-t border-outline-variant/20">
<a class="font-label-caps text-[10px] text-outline hover:text-secondary transition-colors tracking-tighter" href="#">FORGOT PASSCODE?</a>
<div class="flex space-x-4">
<button class="font-label-caps text-[10px] text-primary hover:underline tracking-tighter" type="button">REGISTER NEW CHASSIS</button>
</div>
</div>
</form>
</div>
</div>
</main>
<!-- Footer Stats (Engine Telemetry simulation) -->
<footer class="relative z-20 grid grid-cols-2 md:grid-cols-4 w-full h-auto py-8 px-margin-desktop bg-surface-container-lowest border-t border-outline-variant/30 gap-gutter">
<div class="flex flex-col">
<span class="font-label-caps text-[10px] text-outline mb-1">ENCRYPTION ENGINE</span>
<div class="flex items-center space-x-2">
<div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
<span class="font-gauge-value text-lg text-primary">AES-256</span>
</div>
</div>
<div class="flex flex-col">
<span class="font-label-caps text-[10px] text-outline mb-1">SYSTEM LATENCY</span>
<span class="font-gauge-value text-lg text-primary">0.004<span class="text-xs ml-1 text-outline">MS</span></span>
</div>
<div class="hidden md:flex flex-col">
<span class="font-label-caps text-[10px] text-outline mb-1">CORE TEMP</span>
<span class="font-gauge-value text-lg text-primary">32<span class="text-xs ml-1 text-outline">°C</span></span>
</div>
<div class="hidden md:flex flex-col">
<span class="font-label-caps text-[10px] text-outline mb-1">STATUS</span>
<span class="font-label-caps text-xs text-secondary">READY FOR IGNITION</span>
</div>
</footer>
<!-- Absolute Corner Decorations (Mechanical Details) -->
<div class="fixed top-0 left-0 p-4 z-30 opacity-40">
<div class="w-12 h-12 border-l border-t border-secondary"></div>
</div>
<div class="fixed bottom-0 right-0 p-4 z-30 opacity-40">
<div class="w-12 h-12 border-r border-b border-secondary"></div>
</div>
</body></html>
