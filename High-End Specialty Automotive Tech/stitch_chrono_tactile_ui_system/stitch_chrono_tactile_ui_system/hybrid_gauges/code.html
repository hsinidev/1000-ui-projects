<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HOROLOGUE - Instrument Cluster</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-background": "#e5e2e1",
                    "on-primary": "#2c3134",
                    "outline-variant": "#44474a",
                    "tertiary-container": "#b9b7b7",
                    "on-tertiary-fixed": "#1c1b1b",
                    "surface-tint": "#c3c7cb",
                    "primary": "#d0d4d8",
                    "surface-dim": "#131313",
                    "inverse-primary": "#5a5f63",
                    "surface-container": "#201f1f",
                    "on-primary-fixed": "#181c1f",
                    "tertiary-fixed": "#e5e2e1",
                    "surface-container-lowest": "#0e0e0e",
                    "on-tertiary": "#313030",
                    "on-secondary-container": "#ffb270",
                    "on-tertiary-container": "#494848",
                    "primary-container": "#b4b8bc",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "on-secondary-fixed-variant": "#6d3a00",
                    "outline": "#8e9194",
                    "surface-container-low": "#1c1b1b",
                    "primary-fixed-dim": "#c3c7cb",
                    "surface": "#131313",
                    "on-tertiary-fixed-variant": "#474746",
                    "error": "#ffb4ab",
                    "surface-container-high": "#2a2a2a",
                    "secondary-container": "#7a4100",
                    "on-primary-container": "#44494c",
                    "surface-container-highest": "#353534",
                    "on-secondary": "#4d2700",
                    "inverse-surface": "#e5e2e1",
                    "error-container": "#93000a",
                    "on-surface": "#e5e2e1",
                    "on-error-container": "#ffdad6",
                    "surface-variant": "#353534",
                    "on-surface-variant": "#c4c7ca",
                    "primary-fixed": "#dfe3e7",
                    "secondary-fixed-dim": "#ffb77b",
                    "secondary": "#ffb77b",
                    "on-error": "#690005",
                    "secondary-fixed": "#ffdcc2",
                    "inverse-on-surface": "#313030",
                    "on-secondary-fixed": "#2e1500",
                    "surface-bright": "#3a3939",
                    "background": "#131313",
                    "tertiary": "#d5d3d2",
                    "on-primary-fixed-variant": "#43474b"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-desktop": "40px",
                    "component-gap": "12px",
                    "gutter": "24px",
                    "unit": "4px",
                    "margin-mobile": "16px"
            },
            "fontFamily": {
                    "label-caps": ["JetBrains Mono"],
                    "gauge-value": ["JetBrains Mono"],
                    "headline-md": ["Hanken Grotesk"],
                    "headline-lg": ["Hanken Grotesk"],
                    "body-md": ["Hanken Grotesk"],
                    "body-lg": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "gauge-value": ["42px", {"lineHeight": "1.0", "letterSpacing": "-0.05em", "fontWeight": "500"}],
                    "headline-md": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "headline-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        .brushed-titanium {
            background: linear-gradient(135deg, #353534 0%, #201f1f 50%, #353534 100%);
            position: relative;
        }
        .brushed-titanium::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }
        .milled-inset {
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.8), inset -1px -1px 2px rgba(255,255,255,0.05);
        }
        .machined-edge {
            border: 1px solid #44474a;
            box-shadow: 0 0 0 1px #131313, 0 4px 10px rgba(0,0,0,0.5);
        }
        .copper-glow {
            text-shadow: 0 0 8px rgba(255, 183, 123, 0.4);
        }
        .knurled-texture {
            background-image: radial-gradient(#44474a 1px, transparent 0);
            background-size: 4px 4px;
        }
        .needle-pivot {
            background: radial-gradient(circle at 30% 30%, #ffb77b, #6d3a00);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="bg-surface-container-highest dark:bg-surface-container-highest text-on-surface dark:text-on-surface shadow-md border-b border-outline-variant flex justify-between items-center w-full px-margin-desktop h-[64px] docked full-width top-0 z-50">
<div class="font-label-caps text-label-caps tracking-[0.2em] text-secondary dark:text-secondary">HOROLOGUE</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-secondary font-bold font-label-caps text-label-caps hover:bg-surface-bright transition-colors px-3 py-2 rounded" href="#">DRIVE</a>
<a class="text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-bright transition-colors px-3 py-2 rounded" href="#">SYSTEMS</a>
<a class="text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-bright transition-colors px-3 py-2 rounded" href="#">TELEMETRY</a>
</nav>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface hover:bg-surface-bright p-2 rounded transition-colors" data-icon="settings">settings</button>
<button class="material-symbols-outlined text-on-surface hover:bg-surface-bright p-2 rounded transition-colors" data-icon="account_circle">account_circle</button>
<button class="material-symbols-outlined text-on-surface hover:bg-surface-bright p-2 rounded transition-colors" data-icon="tune">tune</button>
</div>
</header>
<!-- Main Instrument Canvas -->
<main class="flex-grow flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Dashboard Housing -->
<div class="w-full max-w-6xl grid grid-cols-12 gap-gutter relative z-10">
<!-- Side Gauge Left: Power Reserve -->
<div class="col-span-12 lg:col-span-3 flex flex-col justify-center gap-component-gap">
<div class="brushed-titanium machined-edge p-6 rounded-xl milled-inset aspect-square flex flex-col items-center justify-between">
<div class="w-full flex justify-between items-center">
<span class="font-label-caps text-label-caps text-outline">RESERVE</span>
<span class="material-symbols-outlined text-secondary text-sm" data-icon="bolt">bolt</span>
</div>
<div class="relative w-40 h-40 flex items-center justify-center">
<!-- Recessed Track -->
<div class="absolute inset-0 rounded-full border-4 border-surface-container-low milled-inset"></div>
<!-- Progress Arc (Simplified SVG) -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle cx="80" cy="80" fill="none" r="74" stroke="#7a4100" stroke-dasharray="465" stroke-dashoffset="120" stroke-width="4"></circle>
</svg>
<div class="flex flex-col items-center">
<span class="font-gauge-value text-gauge-value text-on-surface copper-glow">82</span>
<span class="font-label-caps text-[10px] text-outline">% kWh</span>
</div>
</div>
<div class="w-full h-1 bg-surface-container-low rounded-full overflow-hidden border border-outline-variant/20">
<div class="h-full bg-secondary w-[82%] shadow-[0_0_8px_#ffb77b]"></div>
</div>
</div>
<div class="bg-surface-container-low p-4 rounded border border-outline-variant/30 flex justify-between items-center">
<span class="font-label-caps text-label-caps text-outline">TEMP</span>
<span class="font-gauge-value text-2xl text-on-surface">32°C</span>
</div>
</div>
<!-- Central Speedometer Module -->
<div class="col-span-12 lg:col-span-6 flex flex-col items-center">
<div class="relative w-[480px] h-[480px] rounded-full machined-edge brushed-titanium flex items-center justify-center shadow-2xl overflow-hidden">
<!-- Inner Decorative Milled Ring -->
<div class="absolute inset-4 rounded-full border border-outline-variant/30 milled-inset"></div>
<!-- Numerals Layer -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative w-full h-full">
<!-- Circular arrangement of numerals (CSS manual placement) -->
<span class="absolute top-12 left-1/2 -translate-x-1/2 font-gauge-value text-2xl text-on-surface-variant">120</span>
<span class="absolute right-12 top-1/2 -translate-y-1/2 font-gauge-value text-2xl text-on-surface-variant">240</span>
<span class="absolute left-12 top-1/2 -translate-y-1/2 font-gauge-value text-2xl text-on-surface-variant">0</span>
<span class="absolute bottom-12 left-1/2 -translate-x-1/2 font-gauge-value text-2xl text-on-surface-variant">180</span>
</div>
</div>
<!-- Digital Core Inset -->
<div class="z-20 w-64 h-64 rounded-full bg-surface-container-lowest border-4 border-surface-container-highest flex flex-col items-center justify-center milled-inset relative">
<div class="absolute top-8 font-label-caps text-label-caps text-secondary opacity-60">SPEED km/h</div>
<div class="font-gauge-value text-[84px] text-on-surface leading-none copper-glow">074</div>
<div class="absolute bottom-8 px-3 py-1 bg-secondary-container/20 border border-secondary/30 rounded">
<span class="font-label-caps text-label-caps text-secondary">GEAR D4</span>
</div>
</div>
<!-- The Copper Needle -->
<div class="absolute inset-0 z-30 pointer-events-none origin-center rotate-[45deg] transition-transform duration-300">
<div class="absolute top-[40px] left-1/2 -translate-x-1/2 w-[3px] h-[200px] bg-secondary shadow-[0_0_10px_rgba(255,183,123,0.6)]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 rounded-full needle-pivot border border-white/10"></div>
</div>
<!-- Fine Tick Marks -->
<div class="absolute inset-0 opacity-40">
<svg class="w-full h-full" viewbox="0 0 100 100">
<circle class="text-outline-variant" cx="50" cy="50" fill="none" r="48" stroke="currentColor" stroke-dasharray="0.5 2.641" stroke-width="0.5"></circle>
</svg>
</div>
</div>
<!-- Chassis Status -->
<div class="mt-8 flex gap-component-gap">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded border border-outline-variant/30">
<span class="material-symbols-outlined text-secondary" data-icon="tire_repair" style="font-variation-settings: 'FILL' 1;">tire_repair</span>
<span class="font-label-caps text-label-caps">2.4 BAR</span>
</div>
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded border border-outline-variant/30">
<span class="material-symbols-outlined text-secondary" data-icon="settings_input_component" style="font-variation-settings: 'FILL' 1;">settings_input_component</span>
<span class="font-label-caps text-label-caps text-secondary">ACTIVE SUSP</span>
</div>
</div>
</div>
<!-- Side Gauge Right: Motor RPM / Torque -->
<div class="col-span-12 lg:col-span-3 flex flex-col justify-center gap-component-gap">
<div class="brushed-titanium machined-edge p-6 rounded-xl milled-inset aspect-square flex flex-col items-center justify-between">
<div class="w-full flex justify-between items-center">
<span class="font-label-caps text-label-caps text-outline">TORQUE</span>
<span class="material-symbols-outlined text-secondary text-sm" data-icon="monitoring">monitoring</span>
</div>
<div class="w-full h-full flex items-end justify-center gap-1 py-4">
<!-- Machined Bar Graph -->
<div class="w-3 bg-secondary h-[40%] rounded-t shadow-[0_0_8px_#ffb77b]"></div>
<div class="w-3 bg-secondary h-[55%] rounded-t shadow-[0_0_8px_#ffb77b]"></div>
<div class="w-3 bg-secondary h-[70%] rounded-t shadow-[0_0_8px_#ffb77b]"></div>
<div class="w-3 bg-secondary h-[60%] rounded-t shadow-[0_0_8px_#ffb77b]"></div>
<div class="w-3 bg-outline-variant h-[30%] rounded-t opacity-30"></div>
<div class="w-3 bg-outline-variant h-[20%] rounded-t opacity-30"></div>
<div class="w-3 bg-outline-variant h-[10%] rounded-t opacity-30"></div>
</div>
<div class="w-full flex justify-between items-center">
<div class="flex flex-col">
<span class="font-gauge-value text-2xl text-on-surface">450</span>
<span class="font-label-caps text-[10px] text-outline">NM peak</span>
</div>
<div class="text-right">
<span class="font-label-caps text-label-caps text-secondary">SPORT+</span>
</div>
</div>
</div>
<div class="bg-surface-container-low p-4 rounded border border-outline-variant/30 flex justify-between items-center">
<span class="font-label-caps text-label-caps text-outline">RANGE</span>
<span class="font-gauge-value text-2xl text-on-surface">312 KM</span>
</div>
</div>
</div>
<!-- Background Atmospheric Element -->
<div class="absolute bottom-0 left-0 w-full h-[307px] bg-gradient-to-t from-secondary/5 to-transparent pointer-events-none"></div>
</main>
<!-- Bottom Navigation Shell -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-[80px] px-margin-mobile md:px-margin-desktop bg-surface-container-lowest border-t border-outline-variant shadow-2xl">
<a class="flex flex-col items-center justify-center text-secondary border-t-2 border-secondary pt-2 h-full transition-all duration-200 brightness-125 scale-95" href="#">
<span class="material-symbols-outlined mb-1" data-icon="speed">speed</span>
<span class="font-label-caps text-label-caps">DRIVE</span>
</a>
<a class="flex flex-col items-center justify-center text-outline pt-2 h-full hover:text-primary transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="graphic_eq">graphic_eq</span>
<span class="font-label-caps text-label-caps">MEDIA</span>
</a>
<a class="flex flex-col items-center justify-center text-outline pt-2 h-full hover:text-primary transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="build_circle">build_circle</span>
<span class="font-label-caps text-label-caps">CHASSIS</span>
</a>
<a class="flex flex-col items-center justify-center text-outline pt-2 h-full hover:text-primary transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="history_edu">history_edu</span>
<span class="font-label-caps text-label-caps">HERITAGE</span>
</a>
<a class="flex flex-col items-center justify-center text-outline pt-2 h-full hover:text-primary transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label-caps text-label-caps">CRAFT</span>
</a>
</footer>
<!-- Texture Overlay for "Brushed" effect -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[100] mix-blend-overlay">
<div class="w-full h-full brushed-titanium"></div>
</div>
</body></html>
