<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#002021",
                    "surface-container": "#1d2020",
                    "surface-dim": "#111414",
                    "on-error-container": "#ffdad6",
                    "inverse-on-surface": "#2e3131",
                    "primary-container": "#004b4d",
                    "on-surface": "#e1e3e2",
                    "primary": "#96d1d3",
                    "on-secondary-fixed": "#191c1c",
                    "surface-bright": "#373a3a",
                    "surface-tint": "#96d1d3",
                    "primary-fixed-dim": "#96d1d3",
                    "on-error": "#690005",
                    "inverse-surface": "#e1e3e2",
                    "on-primary-container": "#7fbabc",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "inverse-primary": "#2a6769",
                    "on-surface": "#e1e3e2",
                    "on-surface-variant": "#bfc8c8",
                    "secondary-fixed": "#e1e3e2",
                    "error-container": "#93000a",
                    "on-primary": "#003738",
                    "on-background": "#e1e3e2",
                    "on-secondary": "#2e3131",
                    "secondary": "#c5c7c6",
                    "secondary-container": "#444747",
                    "surface-container-low": "#191c1c",
                    "tertiary-fixed": "#e2e2e2",
                    "on-primary-fixed-variant": "#084f51",
                    "primary-fixed": "#b1edef",
                    "outline": "#899292",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-secondary-container": "#b3b5b5",
                    "on-tertiary-container": "#afafb0",
                    "tertiary-container": "#414343",
                    "on-tertiary-fixed": "#1a1c1c",
                    "background": "#111414",
                    "tertiary": "#c6c6c7",
                    "secondary-fixed-dim": "#c5c7c6",
                    "error": "#ffb4ab",
                    "on-secondary-fixed-variant": "#444747",
                    "outline-variant": "#3f4849",
                    "surface-container-lowest": "#0c0f0f",
                    "surface-container-high": "#272a2a",
                    "surface-variant": "#323535",
                    "surface": "#111414",
                    "surface-container-highest": "#323535"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-max": "1440px",
                    "panel-padding": "20px",
                    "margin": "24px",
                    "gutter": "16px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "body-md": ["Hanken Grotesk"],
                    "display-lg": ["Hanken Grotesk"],
                    "label-caps": ["Hanken Grotesk"],
                    "title-sm": ["Hanken Grotesk"],
                    "headline-md": ["Hanken Grotesk"],
                    "mono-data": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "body-md": ["15px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "title-sm": ["18px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "mono-data": ["14px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(22, 27, 27, 0.7);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(150, 209, 211, 0.2);
            border-left: 1px solid rgba(150, 209, 211, 0.1);
        }
        .industrial-pattern {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(150, 209, 211, 0.03) 10px, rgba(150, 209, 211, 0.03) 11px);
        }
        .input-glow:focus-within {
            border-bottom-color: #96d1d3;
            box-shadow: 0 4px 12px -4px rgba(150, 209, 211, 0.3);
        }
    </style>
</head>
<body class="bg-surface-dim text-on-surface font-body-md selection:bg-primary/30 selection:text-primary">
<div class="relative min-h-screen w-full flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Luxury Amphibious Vehicle" class="w-full h-full object-cover opacity-60 scale-105" data-alt="A sleek, futuristic matte-black amphibious luxury vessel navigating through a calm harbor at twilight. The vehicle features brushed metallic accents and glowing teal running lights reflecting on the water's surface. The environment is a sophisticated naval base with industrial structures in the background under a deep indigo sky. The lighting is low-key and dramatic, emphasizing the high-end precision engineering and maritime elegance of Stellar-Marina." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDdlkuNHaYBEQkKbwrILTZPY-DnQNTh-RgAWi6frDVfCHQWYtgarABWiHUZqkg70-OEf2hAoVaL9S83CE7uyf1oSDNKwo2vclr64WqskYkjD52BIsNT6BgjQJ99VOjU3NjjbmJpaP9i7xDmYGuEieByirNoKhzz-n3JaxXIOn_bbS2woNMC1rK4KqlQLZU4oFh8QMhYLxCXqAqwQ5yGfVpHWJGTfnj-Er3qqXj2sTvb1Y82Xho-ZMdgzl0UhVrTZiqwlwFjWaGFsvk"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-dim via-transparent to-surface-dim/40"></div>
<div class="absolute inset-0 bg-surface-dim/30 backdrop-grayscale-[0.5]"></div>
</div>
<main class="relative z-10 w-full max-w-[480px] px-margin py-margin">
<div class="glass-panel flex flex-col p-8 industrial-pattern border border-outline-variant/30">
<header class="mb-10 text-center">
<div class="flex justify-center mb-6">
<div class="p-3 border border-primary/40 bg-primary/5">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="directions_boat">directions_boat</span>
</div>
</div>
<h1 class="font-headline-md text-headline-md font-bold tracking-tight text-on-surface mb-2">STELLAR-MARINA</h1>
<p class="font-label-caps text-label-caps tracking-widest text-primary uppercase">Operations Control Portal</p>
</header>
<div class="flex gap-1 mb-8 border-b border-outline-variant">
<button class="flex-1 pb-3 text-primary border-b-2 border-primary font-label-caps text-label-caps">SIGN IN</button>
<button class="flex-1 pb-3 text-on-surface-variant hover:text-on-surface transition-colors font-label-caps text-label-caps">SIGN UP</button>
</div>
<form class="space-y-6">
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block">OPERATOR EMAIL</label>
<div class="relative flex items-center border-b border-outline-variant bg-surface-container-lowest/50 input-glow transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant px-3 text-[20px]" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-md py-3 placeholder:text-outline/50" placeholder="operator@stellar-marina.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block">ACCESS CODE</label>
<div class="relative flex items-center border-b border-outline-variant bg-surface-container-lowest/50 input-glow transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant px-3 text-[20px]" data-icon="lock_open">lock_open</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-md py-3 placeholder:text-outline/50" placeholder="••••••••••••" type="password"/>
</div>
</div>
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block">VEHICLE REGISTRATION ID</label>
<div class="relative flex items-center border-b border-outline-variant bg-surface-container-lowest/50 input-glow transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant px-3 text-[20px]" data-icon="badge">badge</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-mono-data text-mono-data py-3 placeholder:text-outline/50" placeholder="SM-NAV-00X-B" type="text"/>
</div>
</div>
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="w-4 h-4 border border-outline group-hover:border-primary transition-colors flex items-center justify-center bg-surface-container-low">
<div class="w-2 h-2 bg-primary hidden group-hover:block opacity-50"></div>
</div>
<span class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-wider">Keep Logged In</span>
</label>
<a class="font-label-caps text-[10px] text-primary hover:underline uppercase tracking-wider" href="#">Recovery Key?</a>
</div>
<div class="pt-4 space-y-4">
<button class="w-full bg-primary hover:bg-primary-fixed transition-all py-4 px-6 text-on-primary font-label-caps text-label-caps tracking-widest active:scale-[0.98] duration-150" type="submit">
                            AUTHORIZE ACCESS
                        </button>
<button class="w-full border border-primary hover:bg-primary/5 transition-all py-4 px-6 text-primary font-label-caps text-label-caps tracking-widest" type="button">
                            SYSTEM CHECK
                        </button>
</div>
</form>
<footer class="mt-10 pt-6 border-t border-outline-variant/30 flex flex-col items-center gap-4">
<div class="flex gap-6">
<div class="flex items-center gap-2">
<div class="w-2 h-2 bg-[#4CAF50] rounded-sm"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">SECURE NODE: ACTIVE</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2 h-2 bg-primary rounded-sm opacity-50"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">v2.4.0-STABLE</span>
</div>
</div>
<p class="font-label-caps text-[9px] text-outline text-center leading-relaxed max-w-[280px]">
                        Access restricted to authorized Stellar-Marina personnel. Unauthorized entry attempts are logged and reported to Fleet Command.
                    </p>
</footer>
</div>
</main>
<div class="fixed bottom-margin right-margin z-20 flex gap-4">
<button class="p-4 glass-panel border border-outline-variant/50 hover:bg-surface-variant/30 transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="help_center">help_center</span>
</button>
<button class="px-6 glass-panel border border-error/30 hover:bg-error-container/20 transition-colors flex items-center gap-3 group">
<span class="material-symbols-outlined text-error" data-icon="emergency_home">emergency_home</span>
<span class="font-label-caps text-label-caps text-error">EMERGENCY LOCKDOWN</span>
</button>
</div>
</div>
</body></html>
