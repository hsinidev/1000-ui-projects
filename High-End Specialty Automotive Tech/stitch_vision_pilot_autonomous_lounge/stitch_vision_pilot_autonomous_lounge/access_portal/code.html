<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @font-face {
            font-family: 'Metropolis';
            src: url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Metropolis', sans-serif;
            background-color: #F4EBD9; /* Custom Sand Tone from Design System Primary Container */
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-variant": "#e2e2e2",
                      "surface-container-low": "#f3f3f4",
                      "on-surface": "#1a1c1c",
                      "on-secondary-container": "#74240c",
                      "inverse-on-surface": "#f0f1f1",
                      "outline": "#7b776d",
                      "error": "#ba1a1a",
                      "tertiary-container": "#e4ecff",
                      "primary-container": "#f4ebd9",
                      "on-tertiary-fixed": "#001b3d",
                      "on-error-container": "#93000a",
                      "surface": "#f9f9f9",
                      "primary-fixed": "#eae2d0",
                      "primary": "#645e50",
                      "on-tertiary-container": "#526b95",
                      "surface-container-lowest": "#ffffff",
                      "background": "#f9f9f9",
                      "surface-tint": "#645e50",
                      "error-container": "#ffdad6",
                      "on-secondary": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "on-surface-variant": "#4a463e",
                      "secondary-fixed": "#ffdbd1",
                      "tertiary-fixed": "#d6e3ff",
                      "tertiary-fixed-dim": "#aec7f6",
                      "tertiary": "#465f88",
                      "surface-dim": "#dadada",
                      "secondary-container": "#fd8c6b",
                      "on-primary": "#ffffff",
                      "surface-container-high": "#e8e8e8",
                      "secondary": "#9d4228",
                      "surface-container-highest": "#e2e2e2",
                      "on-primary-fixed-variant": "#4b4639",
                      "on-primary-fixed": "#1f1b10",
                      "on-error": "#ffffff",
                      "inverse-surface": "#2f3131",
                      "outline-variant": "#ccc6bb",
                      "on-secondary-fixed-variant": "#7e2c13",
                      "secondary-fixed-dim": "#ffb5a0",
                      "on-primary-container": "#706a5b",
                      "on-secondary-fixed": "#3b0900",
                      "on-background": "#1a1c1c",
                      "surface-container": "#eeeeee",
                      "on-tertiary-fixed-variant": "#2d476f",
                      "inverse-primary": "#cec6b5",
                      "surface-bright": "#f9f9f9",
                      "primary-fixed-dim": "#cec6b5"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter-grid": "32px",
                      "stack-sm": "12px",
                      "stack-md": "24px",
                      "unit": "8px",
                      "padding-card": "24px",
                      "stack-lg": "48px",
                      "margin-page": "64px"
              },
              "fontFamily": {
                      "headline-sm": ["Metropolis"],
                      "display-md": ["Metropolis"],
                      "body-md": ["Metropolis"],
                      "label-caps": ["Metropolis"],
                      "headline-lg": ["Metropolis"],
                      "display-lg": ["Metropolis"],
                      "body-lg": ["Metropolis"]
              },
              "fontSize": {
                      "headline-sm": ["20px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "600"}],
                      "display-md": ["36px", {"lineHeight": "1.2", "letterSpacing": "0.04em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                      "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.15em", "fontWeight": "700"}],
                      "headline-lg": ["24px", {"lineHeight": "1.3", "letterSpacing": "0.03em", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}]
              }
            },
          },
        }
      </script>
</head>
<body class="bg-primary-container min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- TopAppBar Fragment (Supressed main Nav, only Brand Identity) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-page py-stack-md backdrop-blur-xl bg-surface/30">
<div class="font-display-md text-display-md uppercase tracking-[0.2em] text-tertiary">
            VISION-PILOT
        </div>
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-tertiary cursor-pointer hover:bg-surface-container-high/50 p-2 rounded-full transition-colors">help_outline</span>
<div class="h-10 w-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-outline-variant">
<span class="material-symbols-outlined text-tertiary">person_outline</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full h-screen flex items-center justify-center p-margin-page">
<!-- Architectural Glassmorphism Container -->
<div class="relative w-full max-w-6xl h-[750px] bg-surface/40 backdrop-blur-3xl rounded-[32px] overflow-hidden shadow-[0_40px_100px_rgba(0,0,0,0.1)] flex border border-white/20">
<!-- Left Side: Brand Imagery & Narrative -->
<div class="hidden md:flex w-1/2 relative overflow-hidden group">
<img alt="Lounge Interior" class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" data-alt="A luxurious minimalist lounge interior with sand-toned architectural panels and soft daylight filtering through floor-to-ceiling windows. The aesthetic is high-end and serene, featuring smooth organic shapes and a palette of warm beiges, soft creams, and deep navy accents. The lighting is diffused and atmospheric, creating a sense of calm and exclusive privacy within a future-forward autonomous vehicle cabin. High-contrast textures and soft-focus backgrounds emphasize a premium, architectural-chic atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcTtYwVDcGw_i3FDFrP_3XGRwEynDOo1CNd76Ud50BifibKcE1V-Rn3ozcIeqyLzcNV0v6bl_cfIucdo4-w51HWsD0h_jjK8leXAspO3eLu4mV6R-wFXS9ikt9AxYybjv0hW34vCgPjxgrEsIp0JXxN63hsz2PRW_OgWPZijqvMYZXUuH0loGJDfToqnJ0nZEbVSs_KxGZIfuhUZ6k16cxOpsh0yKWRzSTuYysLqIh67tvMcJXEFp0Z6R3bOh9DuwKN0B1hvYf7w"/>
<!-- Overlay content -->
<div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent flex flex-col justify-end p-12 text-white">
<div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl border border-white/20 max-w-sm">
<h2 class="font-display-md text-display-md mb-4 leading-tight">Elevate Your Journey.</h2>
<p class="font-body-md text-body-md opacity-90">Experience the tranquility of Level 4 autonomy. Your mobile lounge awaits your arrival.</p>
</div>
</div>
</div>
<!-- Right Side: Access Portal Form -->
<div class="w-full md:w-1/2 flex flex-col p-16 justify-center bg-surface-container-lowest/80">
<div class="max-w-sm mx-auto w-full">
<!-- Header Section -->
<div class="mb-10">
<h1 class="font-display-md text-display-md text-on-surface mb-2">ACCESS PORTAL</h1>
<p class="font-body-md text-body-md text-outline">Authenticate to enter your mobile sanctuary.</p>
</div>
<!-- Unified Form -->
<form class="space-y-stack-md">
<div class="relative group">
<input class="w-full bg-transparent border-b-2 border-outline-variant focus:border-secondary py-4 px-1 outline-none font-body-md text-body-md transition-all peer placeholder-transparent" id="email" placeholder="Email Address" type="email"/>
<label class="absolute left-1 -top-2 text-label-caps font-label-caps text-secondary uppercase transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-outline peer-placeholder-shown:font-normal peer-focus:-top-2 peer-focus:text-secondary peer-focus:font-bold" for="email">
                                EMAIL ADDRESS
                            </label>
</div>
<div class="relative group">
<input class="w-full bg-transparent border-b-2 border-outline-variant focus:border-secondary py-4 px-1 outline-none font-body-md text-body-md transition-all peer placeholder-transparent" id="password" placeholder="Security Key" type="password"/>
<label class="absolute left-1 -top-2 text-label-caps font-label-caps text-secondary uppercase transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-outline peer-placeholder-shown:font-normal peer-focus:-top-2 peer-focus:text-secondary peer-focus:font-bold" for="password">
                                SECURITY KEY
                            </label>
<span class="material-symbols-outlined absolute right-1 top-4 text-outline cursor-pointer hover:text-primary transition-colors">visibility_off</span>
</div>
<div class="pt-stack-md flex flex-col gap-stack-md">
<!-- Primary CTA: Terracotta Button -->
<button class="w-full bg-secondary text-white py-4 rounded-lg font-label-caps text-label-caps tracking-widest hover:bg-secondary/90 active:scale-[0.98] transition-all shadow-lg shadow-secondary/20" type="button">
                                INITIALIZE SESSION
                            </button>
<!-- Secondary CTA -->
<button class="w-full border border-outline-variant text-primary py-4 rounded-lg font-label-caps text-label-caps tracking-widest hover:bg-surface-variant transition-all" type="button">
                                CREATE AN ACCOUNT
                            </button>
</div>
</form>
<!-- Social/Alternative Logic -->
<div class="mt-stack-lg">
<div class="flex items-center gap-4 mb-stack-md">
<div class="h-[1px] bg-outline-variant flex-1"></div>
<span class="font-label-caps text-label-caps text-outline opacity-50">OR CONNECT VIA</span>
<div class="h-[1px] bg-outline-variant flex-1"></div>
</div>
<div class="grid grid-cols-2 gap-stack-sm">
<button class="flex items-center justify-center gap-2 border border-outline-variant py-3 rounded-lg hover:bg-surface-variant transition-all cursor-pointer">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
<span class="font-label-caps text-[10px] tracking-wider text-primary">BIOMETRIC</span>
</button>
<button class="flex items-center justify-center gap-2 border border-outline-variant py-3 rounded-lg hover:bg-surface-variant transition-all cursor-pointer">
<span class="material-symbols-outlined text-primary">key</span>
<span class="font-label-caps text-[10px] tracking-wider text-primary">PASSKEY</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-12 text-center">
<a class="font-label-caps text-[11px] text-outline hover:text-secondary transition-colors underline underline-offset-4" href="#">RECOVER ACCESS PRIVILEGES</a>
</div>
</div>
</div>
</div>
<!-- Ambient Design Element: Floating Glass Planes -->
<div class="absolute -top-20 -left-20 w-96 h-96 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -bottom-40 -right-40 w-[600px] h-[600px] bg-tertiary/5 rounded-full blur-[120px] pointer-events-none"></div>
</main>
<!-- Suppressed BottomNavBar as it is a transactional page -->
<!-- Reference only: style_shell_layout: fixed bottom-0 w-full z-50 flex justify-around items-center px-margin-page pb-10 pt-4 -->
</body></html>
