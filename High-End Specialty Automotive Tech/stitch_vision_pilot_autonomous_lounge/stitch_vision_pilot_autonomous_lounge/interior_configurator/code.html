<body class="bg-primary-container text-on-surface min-h-screen">

<div class="flex items-center gap-unit cursor-pointer active:scale-95 duration-300">

</div>
<h1 class="font-display-md text-display-md uppercase tracking-[0.2em] text-tertiary">VISION-PILOT</h1>

<span class="material-symbols-outlined text-secondary">airline_seat_recline_extra</span>
<span class="font-label-caps text-label-caps text-secondary">LOUNGE MODE ACTIVE</span>
</div>
<div class="absolute bottom-10 right-10 flex flex-col gap-unit items-end">
<button class="glass-panel w-12 h-12 rounded-full flex items-center justify-center text-primary shadow-md hover:bg-surface transition-colors">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<button class="glass-panel w-12 h-12 rounded-full flex items-center justify-center text-primary shadow-md hover:bg-surface transition-colors">
<span class="material-symbols-outlined">3d_rotation</span>
</button>
</div>
</section>
<!-- Configuration Controls (Right Panel) -->
<section class="col-span-12 lg:col-span-4 flex flex-col gap-stack-lg">
<!-- Seating Configuration Card -->
<div class="bg-surface-container-lowest p-padding-card rounded-xl shadow-[0_40px_80px_rgba(0,0,0,0.05)] border border-outline-variant/30">
<header class="mb-stack-md flex justify-between items-center">
<h2 class="font-headline-lg text-headline-lg text-primary uppercase tracking-wider">Seating</h2>
<span class="material-symbols-outlined text-tertiary">chair</span>
</header>
<div class="grid grid-cols-2 gap-stack-sm">
<button class="flex flex-col items-center gap-stack-sm p-stack-md rounded-lg border-2 border-secondary text-secondary bg-secondary-fixed/20 transition-all duration-300">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">groups</span>
<span class="font-label-caps text-label-caps">FACE-TO-FACE</span>
</button>
<button class="flex flex-col items-center gap-stack-sm p-stack-md rounded-lg border-2 border-transparent text-primary hover:bg-surface-container-high transition-all duration-300">
<span class="material-symbols-outlined text-4xl">east</span>
<span class="font-label-caps text-label-caps">FORWARD</span>
</button>
</div>
</div>
<!-- Atmosphere Card -->

<h2 class="font-headline-lg text-headline-lg text-primary uppercase tracking-wider">Atmosphere</h2>
</header>

<div class="flex justify-between items-center mb-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant">LIGHTING INTENSITY</label>
<span class="font-body-md text-body-md text-secondary">72%</span>
</div>
<div class="relative h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="absolute h-full bg-secondary w-[72%]"></div>
<div class="absolute left-[72%] top-1/2 -translate-y-1/2 -translate-x-1/2 w-4 h-4 bg-white border-2 border-secondary rounded-full shadow-sm cursor-pointer"></div>
</div>
</div>
<!-- Temperature -->

<div class="flex justify-between items-center mb-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant">CLIMATE CONTROL</label>
<span class="font-body-md text-body-md text-secondary">22.5°C</span>
</div>
<div class="flex items-center justify-between gap-gutter-grid">
<button class="w-12 h-12 rounded-full border border-outline-variant flex items-center justify-center text-primary active:scale-90 transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="flex-1 text-center">
<span class="font-display-md text-display-md text-primary">Comfort</span>
</div>
<button class="w-12 h-12 rounded-full border border-outline-variant flex items-center justify-center text-primary active:scale-90 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</div>
<!-- Social Action Button -->
<button class="w-full py-stack-md bg-secondary text-on-secondary rounded-xl font-label-caps text-label-caps tracking-widest shadow-xl hover:brightness-110 active:scale-95 transition-all">

            </button>

</a>
<a class="flex flex-col items-center gap-unit text-tertiary/50 hover:text-tertiary transition-all scale-100 active:scale-90" href="#">
<span class="material-symbols-outlined">movie</span>

</a>
<a class="flex flex-col items-center gap-unit text-secondary after:content-[''] after:w-1 after:h-1 after:bg-secondary after:rounded-full after:mt-1 transition-all scale-100 active:scale-90" href="#">
