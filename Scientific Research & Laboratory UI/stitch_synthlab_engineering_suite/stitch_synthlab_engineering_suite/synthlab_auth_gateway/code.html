<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#adb4ce",
                    "surface-container-lowest": "#071105",
                    "surface-container": "#182214",
                    "tertiary-fixed": "#e0e3e5",
                    "on-primary-container": "#107100",
                    "surface-container-high": "#222d1e",
                    "on-secondary-fixed": "#131b2e",
                    "tertiary-container": "#dcdee0",
                    "surface-bright": "#323c2d",
                    "secondary-fixed-dim": "#bec6e0",
                    "primary": "#efffe3",
                    "on-surface-variant": "#baccb0",
                    "on-error-container": "#ffdad6",
                    "surface-variant": "#2d3828",
                    "on-error": "#690005",
                    "inverse-on-surface": "#293324",
                    "surface": "#0c1609",
                    "on-surface": "#dae6d0",
                    "error-container": "#93000a",
                    "surface-container-low": "#141e11",
                    "outline": "#85967c",
                    "on-tertiary-fixed-variant": "#444749",
                    "background": "#0c1609",
                    "on-primary": "#053900",
                    "inverse-primary": "#106e00",
                    "tertiary": "#f8fafc",
                    "error": "#ffb4ab",
                    "secondary": "#bec6e0",
                    "on-secondary": "#283044",
                    "on-tertiary-fixed": "#191c1e",
                    "on-primary-fixed-variant": "#095300",
                    "secondary-container": "#3f465c",
                    "surface-tint": "#2ae500",
                    "secondary-fixed": "#dae2fd",
                    "primary-container": "#39ff14",
                    "on-secondary-fixed-variant": "#3f465c",
                    "surface-dim": "#0c1609",
                    "tertiary-fixed-dim": "#c4c7c9",
                    "on-tertiary-container": "#5f6264",
                    "outline-variant": "#3c4b35",
                    "on-background": "#dae6d0",
                    "surface-container-highest": "#2d3828",
                    "on-primary-fixed": "#022100",
                    "inverse-surface": "#dae6d0",
                    "primary-fixed-dim": "#2ae500",
                    "primary-fixed": "#79ff5b",
                    "on-tertiary": "#2d3133"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "lg": "24px",
                    "sm": "8px",
                    "md": "16px",
                    "xl": "40px",
                    "margin-mobile": "20px",
                    "xs": "4px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-lg": ["Space Grotesk"],
                    "data-mono": ["Space Grotesk"],
                    "label-caps": ["Space Grotesk"],
                    "headline-md": ["Space Grotesk"],
                    "body-base": ["Inter"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "data-mono": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "body-base": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .biometric-ring {
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .glass-card {
            background: rgba(24, 34, 20, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-base min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Ambient Glows -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-surface-tint/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-container/5 rounded-full blur-[100px]"></div>
<!-- Main Auth Canvas -->
<main class="flex-grow flex items-center justify-center p-margin-mobile z-10">
<div class="w-full max-w-md">
<!-- Branding Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-surface-tint tracking-tight mb-xs">SynthLab</h1>
<p class="font-label-caps text-label-caps text-on-surface-variant opacity-70">GENOMIC AUTHENTICATION PROTOCOL</p>
</div>
<!-- Auth Container -->
<div class="glass-card border border-outline-variant/30 rounded-xl p-lg shadow-[0_8px_32px_rgba(0,0,0,0.5)]">
<!-- Toggle Segment -->
<div class="flex bg-surface-container-low rounded-lg p-1 mb-xl border border-outline-variant/20">
<button class="flex-1 py-sm font-label-caps text-label-caps text-primary bg-primary-container/10 rounded-md transition-all">SIGN IN</button>
<button class="flex-1 py-sm font-label-caps text-label-caps text-on-surface-variant opacity-60 hover:opacity-100 transition-all">REGISTER</button>
</div>
<!-- Biometric Visualizer -->
<div class="flex justify-center mb-xl relative">
<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Scanning Rings -->
<div class="absolute inset-0 border-2 border-surface-tint/20 rounded-full biometric-ring"></div>
<div class="absolute inset-2 border border-primary-container/10 rounded-full biometric-ring" style="animation-delay: 1s;"></div>
<div class="absolute inset-4 border-2 border-surface-tint/5 rounded-full biometric-ring" style="animation-delay: 2s;"></div>
<!-- Core Icon -->
<div class="bg-surface-container-high rounded-full w-20 h-20 flex items-center justify-center shadow-[0_0_20px_rgba(42,229,0,0.2)] border border-surface-tint/30">
<span class="material-symbols-outlined text-surface-tint text-4xl" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
</div>
<!-- Scanning Line -->
<div class="absolute top-0 left-0 w-full h-0.5 bg-surface-tint/40 shadow-[0_0_10px_rgba(42,229,0,0.8)] animate-[scan_4s_ease-in-out_infinite]"></div>
<style>
                            @keyframes scan {
                                0%, 100% { top: 10%; opacity: 0; }
                                50% { top: 90%; opacity: 1; }
                            }
                        </style>
</div>
</div>
<!-- Form Fields -->
<form class="space-y-lg">
<div class="group">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs ml-1">LAB ID</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant/50 focus:border-surface-tint focus:ring-0 text-on-surface font-data-mono py-sm px-0 transition-all placeholder:opacity-30" placeholder="SL-772-OMEGA" type="text"/>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant/40 text-sm">id_card</span>
</div>
</div>
<div class="group">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs ml-1">ENCRYPTED KEY</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant/50 focus:border-surface-tint focus:ring-0 text-on-surface font-data-mono py-sm px-0 transition-all placeholder:opacity-30" placeholder="••••••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant/40 text-sm">key</span>
</div>
</div>
<div class="flex items-center justify-between pt-sm">
<label class="flex items-center gap-sm cursor-pointer group">
<input class="rounded-sm bg-surface-container border-outline-variant text-surface-tint focus:ring-surface-tint" type="checkbox"/>
<span class="font-label-caps text-[10px] text-on-surface-variant group-hover:text-on-surface transition-colors">PERSIST SESSION</span>
</label>
<a class="font-label-caps text-[10px] text-surface-tint hover:underline decoration-surface-tint/30" href="#">FORGOT KEY?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-surface-container-high border-2 border-surface-tint text-surface-tint font-label-caps py-md rounded-lg active:scale-95 transition-all flex items-center justify-center gap-sm hover:shadow-[0_0_20px_rgba(42,229,0,0.15)] group">
                        ENTER PROTOCOL
                        <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward_ios</span>
</button>
</form>
</div>
<!-- Footer Specs -->
<div class="mt-xl flex flex-col items-center gap-sm">
<div class="h-1px w-16 bg-outline-variant/30"></div>
<div class="flex gap-lg opacity-40">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-xs">verified_user</span>
<span class="font-data-mono text-[10px]">AES-256</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-xs">hub</span>
<span class="font-data-mono text-[10px]">NODAL-V7</span>
</div>
</div>
</div>
</div>
</main>
<!-- Decorative Structural Elements -->
<div class="absolute top-0 right-0 p-lg pointer-events-none opacity-20">
<div class="border-t-2 border-r-2 border-surface-tint w-12 h-12"></div>
</div>
<div class="absolute bottom-0 left-0 p-lg pointer-events-none opacity-20">
<div class="border-b-2 border-l-2 border-surface-tint w-12 h-12"></div>
</div>
</body></html>
