<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#001e2f",
                    "surface-tint": "#9accf3",
                    "outline-variant": "#41484d",
                    "on-tertiary": "#68000b",
                    "surface-bright": "#39393a",
                    "on-tertiary-fixed": "#410004",
                    "on-surface": "#e5e2e3",
                    "on-secondary-fixed": "#1a1c1c",
                    "inverse-surface": "#e5e2e3",
                    "on-secondary-fixed-variant": "#464747",
                    "on-secondary": "#2f3131",
                    "on-primary": "#00344d",
                    "on-tertiary-container": "#b41120",
                    "tertiary-container": "#ffc4bf",
                    "on-surface-variant": "#c1c7ce",
                    "surface-container-highest": "#353436",
                    "surface-container-lowest": "#0e0e0f",
                    "secondary-container": "#484949",
                    "background": "#131314",
                    "on-tertiary-fixed-variant": "#930014",
                    "on-primary-fixed-variant": "#0c4b6c",
                    "on-background": "#e5e2e3",
                    "surface-variant": "#353436",
                    "surface-container-low": "#1b1b1c",
                    "error": "#ffb4ab",
                    "primary": "#e1f0ff",
                    "surface-container-high": "#2a2a2b",
                    "secondary-fixed": "#e3e2e2",
                    "surface": "#131314",
                    "on-primary-container": "#285f80",
                    "on-error-container": "#ffdad6",
                    "error-container": "#93000a",
                    "surface-container": "#1f1f20",
                    "tertiary": "#ffeae8",
                    "primary-fixed-dim": "#9accf3",
                    "outline": "#8b9198",
                    "secondary": "#c6c6c6",
                    "surface-dim": "#131314",
                    "on-secondary-container": "#b8b8b8",
                    "secondary-fixed-dim": "#c6c6c6",
                    "tertiary-fixed": "#ffdad7",
                    "inverse-on-surface": "#303031",
                    "tertiary-fixed-dim": "#ffb3ae",
                    "primary-fixed": "#c9e6ff",
                    "primary-container": "#a5d8ff",
                    "on-error": "#690005",
                    "inverse-primary": "#2e6385"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "lg": "24px",
                    "margin-mobile": "20px",
                    "md": "16px",
                    "gutter": "16px",
                    "xl": "40px",
                    "unit": "4px",
                    "sm": "8px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "h2": ["Space Grotesk"],
                    "label-caps": ["Inter"],
                    "h1": ["Space Grotesk"],
                    "data-display": ["Space Grotesk"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                    "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "data-display": ["48px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #131314;
            color: #e5e2e3;
            margin: 0;
            padding: 0;
        }
        .frost-card {
            background: rgba(27, 27, 28, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(227, 226, 222, 0.1);
            border-top: 1px solid rgba(227, 226, 222, 0.4);
        }
        .silver-edge {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
        }
        .metallic-gradient {
            background: linear-gradient(135deg, #e1f0ff 0%, #9accf3 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #9accf3, transparent);
            width: 100%;
            position: absolute;
            z-index: 10;
        }
        .inset-field {
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen overflow-hidden">
<!-- Background Layer: Macro Cryo-Tank Shot -->
<div class="fixed inset-0 z-0">
<img alt="" class="w-full h-full object-cover opacity-30 grayscale contrast-125" data-alt="A cinematic, high-detail macro photograph of industrial cryogenic storage cylinders in a dark, clinical bio-vault. The scene is illuminated by cool ice-blue neon strips reflecting off brushed stainless steel surfaces. A light mist or frost clings to the pipes, creating a cold, high-tech atmosphere with deep shadows and sharp metallic highlights. The visual style is clinical, immovable, and ultra-precise." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBk_NY6kEF7ieeDnbXD4pjtsmKIF4j6ierg2xcReWlMAzC_L5YZuLqkWpkg9qEWQG6rvCSP5TfzPrjULyU_BfWiTzhyOcuqD9ZpOmRMyqFdEQm1-ZSfc6rXQGsfL6-izOOqYBG81JCqSqu14byi2sEItbbAL3vf6GCgQj_8HOHRhBwplzjp4XU_ARDGW2vGajBIm1y55588HCaMJvxycv8rvOLV3BR8aPMl-pmF0vqlh14Iftq1RgNVwFoCy8-p9LNc9mrh20dVijo"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-background/60 to-background"></div>
</div>
<!-- UI Overlay: Top Bar (Simplified for Auth) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-lg h-16 bg-surface/40 backdrop-blur-xl border-b border-outline-variant/30">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-h2">ac_unit</span>
<h1 class="font-h1 text-h1 tracking-tighter text-primary-fixed">CRYO-VAULT MS</h1>
</div>
<div class="flex items-center gap-md">
<span class="font-label-caps text-on-surface-variant uppercase tracking-widest text-[10px]">Security Protocol v4.0.2</span>
<div class="h-2 w-2 rounded-full bg-surface-tint shadow-[0_0_8px_#9accf3]"></div>
</div>
</header>
<!-- Main Auth Container -->
<main class="relative z-10 w-full max-w-[480px] px-margin-mobile">
<!-- Centralized Authentication Card -->
<div class="frost-card p-xl rounded-xl silver-edge flex flex-col gap-lg shadow-2xl">
<div class="flex flex-col gap-xs text-center">
<h2 class="font-h2 text-h2 text-primary">SECURITY GATEWAY</h2>
<p class="font-body-md text-on-surface-variant opacity-70">AUTHORIZED PERSONNEL ACCESS ONLY</p>
</div>
<!-- Login Tabs Toggle -->
<div class="flex border-b border-outline-variant/30">
<button class="flex-1 py-md font-label-caps text-primary border-b-2 border-primary transition-colors">SIGN IN</button>
<button class="flex-1 py-md font-label-caps text-on-surface-variant opacity-60 hover:opacity-100 transition-colors">NEW REGISTRATION</button>
</div>
<!-- Form Content -->
<form class="flex flex-col gap-md">
<!-- Personnel ID Code -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-on-surface-variant uppercase tracking-wider text-[11px]">Personnel ID Code</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-surface-tint">id_card</span>
<input class="w-full bg-surface-container-lowest/80 border border-outline-variant/50 rounded-lg py-md pl-xl pr-md font-body-md text-on-surface focus:outline-none focus:border-surface-tint inset-field transition-all" placeholder="CV-XXXX-XXXX" type="text"/>
</div>
</div>
<!-- Clearance Selection -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-on-surface-variant uppercase tracking-wider text-[11px]">Security Clearance Level</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest/80 border border-outline-variant/50 rounded-lg py-md px-md font-body-md text-on-surface focus:outline-none focus:border-surface-tint appearance-none inset-field">
<option>Level 1 - Logistics</option>
<option>Level 2 - Research Technician</option>
<option>Level 3 - Senior Scientist</option>
<option>Level 4 - Command Operations</option>
<option>Level 5 - System Administrator</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant/50">expand_more</span>
</div>
</div>
<!-- Biometric Verification Placeholder -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-on-surface-variant uppercase tracking-wider text-[11px]">Biometric Scan Required</label>
<div class="relative h-32 rounded-lg border-2 border-dashed border-outline-variant/40 bg-surface-container-low/40 flex flex-col items-center justify-center gap-sm overflow-hidden group cursor-pointer hover:border-surface-tint/50 transition-all">
<div class="absolute inset-0 bg-surface-tint/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<!-- Scanline Effect -->
<div class="scan-line top-0 opacity-20 group-hover:animate-pulse"></div>
<span class="material-symbols-outlined text-4xl text-primary-fixed-dim/40 group-hover:text-primary-fixed transition-colors" data-weight="fill">fingerprint</span>
<span class="font-label-caps text-[10px] text-on-surface-variant tracking-[0.2em] uppercase">Place device on scanner</span>
</div>
</div>
<!-- Action Button -->
<button class="metallic-gradient w-full py-md rounded-lg font-label-caps text-on-primary-fixed tracking-widest text-sm hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-primary-container/20 mt-sm" type="submit">
                    AUTHORIZE ACCESS
                </button>
<div class="flex justify-between items-center px-xs">
<label class="flex items-center gap-sm cursor-pointer group">
<input class="rounded-sm border-outline-variant bg-surface-container text-primary-fixed-dim focus:ring-0" type="checkbox"/>
<span class="font-label-caps text-[10px] text-on-surface-variant group-hover:text-on-surface transition-colors">STAY LOGGED IN</span>
</label>
<a class="font-label-caps text-[10px] text-surface-tint hover:underline" href="#">FORGOT ACCESS CODE?</a>
</div>
</form>
</div>
<!-- Footer Info -->
<footer class="mt-lg flex flex-col items-center gap-xs">
<div class="flex items-center gap-sm opacity-50">
<span class="material-symbols-outlined text-sm">encrypted</span>
<p class="font-label-caps text-[9px] tracking-widest text-on-surface-variant">AES-256 QUANTUM-SHIELD ACTIVE</p>
</div>
</footer>
</main>
<!-- Side Decoration: Technical Grid Lines -->
<div class="fixed inset-0 pointer-events-none border-[1px] border-outline-variant/10 m-xl"></div>
<div class="fixed top-0 left-1/2 -translate-x-1/2 h-full w-[1px] bg-gradient-to-b from-transparent via-outline-variant/10 to-transparent"></div>
<div class="fixed left-0 top-1/2 -translate-y-1/2 w-full h-[1px] bg-gradient-to-r from-transparent via-outline-variant/10 to-transparent"></div>
</body></html>
