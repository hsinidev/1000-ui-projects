<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#191c1e",
                    "surface": "#f7f9fb",
                    "on-surface-variant": "#414754",
                    "secondary-fixed-dim": "#c6c6c6",
                    "primary": "#0059bb",
                    "tertiary-container": "#c64f00",
                    "surface-bright": "#f7f9fb",
                    "inverse-on-surface": "#eff1f3",
                    "on-error": "#ffffff",
                    "surface-variant": "#e0e3e5",
                    "on-error-container": "#93000a",
                    "on-primary-container": "#fefcff",
                    "on-secondary-fixed": "#1b1b1b",
                    "surface-container-high": "#e6e8ea",
                    "surface-container": "#eceef0",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#646464",
                    "tertiary-fixed": "#ffdbcc",
                    "surface-container-highest": "#e0e3e5",
                    "on-background": "#191c1e",
                    "outline-variant": "#c1c6d7",
                    "tertiary-fixed-dim": "#ffb695",
                    "on-tertiary-container": "#fffbff",
                    "on-tertiary": "#ffffff",
                    "primary-fixed": "#d8e2ff",
                    "primary-fixed-dim": "#adc7ff",
                    "inverse-surface": "#2d3133",
                    "on-primary-fixed": "#001a41",
                    "primary-container": "#0070ea",
                    "surface-tint": "#005bc0",
                    "secondary-fixed": "#e2e2e2",
                    "secondary-container": "#e2e2e2",
                    "on-primary-fixed-variant": "#004493",
                    "surface-dim": "#d8dadc",
                    "on-secondary-fixed-variant": "#474747",
                    "error": "#ba1a1a",
                    "tertiary": "#9e3d00",
                    "on-tertiary-fixed": "#351000",
                    "on-secondary": "#ffffff",
                    "secondary": "#5e5e5e",
                    "background": "#f7f9fb",
                    "on-tertiary-fixed-variant": "#7c2e00",
                    "outline": "#717786",
                    "surface-container-low": "#f2f4f6",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#adc7ff",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "container-margin": "32px",
                    "lg": "24px",
                    "md": "16px",
                    "sm": "8px",
                    "xl": "40px",
                    "xs": "4px",
                    "gutter": "20px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "display-xl": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "display-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "headline-lg": ["30px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .glass-dark {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hairline-border {
            border: 0.5px solid rgba(0, 89, 187, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen w-full select-none">
<!-- Top Navigation Anchor (Shared Component: TopAppBar) -->
<header class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-xl border-b border-on-surface/5 flex justify-between items-center h-16 px-container-margin shadow-sm">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="microscope">magnification_small</span>
<h1 class="font-headline-lg text-headline-lg font-bold tracking-tight text-on-surface">MicroVision</h1>
</div>
<div class="flex items-center gap-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-on-surface/5 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="notifications">notifications</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-on-surface/5 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<!-- Main Canvas Viewport (Microscopy Image) -->
<main class="relative h-screen w-full pt-16 pb-20 overflow-hidden">
<img alt="Pathology specimen slide" class="absolute inset-0 w-full h-full object-cover grayscale-[0.2] brightness-110" data-alt="A high-resolution microscopic view of a biological tissue sample, showing intricate cellular structures in shades of pink, purple, and violet. The lighting is crisp and clinical, revealing fine textures of cell nuclei and membranes. The image fills the entire frame as a background layer, providing a detailed environment for digital pathology annotation. The aesthetic is clean, scientific, and professional, mimicking the view through a high-precision digital microscope lens." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAb_5C_MfS6UVvzuCr3uq87xhu8mAvR9Ke0RgJX3cU_yjtu256_zfVYmPWUZfeBsxuWgafmQppvTmfmGqmxJBp2YI6-spAPCIDS-7ruKvIW3fsmiLl8UHVbkZ6wGTm0om3vvin7CHi6LnIbOX7McgHPUh0IwUrRAS-o6Gjq6k1qTkzQA9xjUlLUD4i16elVmeSKYGQS4gYGwQfHSss5jNTGYTWhrPTwKP5REviVH11khU1FB5GgyzsIJaMPdZ8MDXaKj_IJ45GpNLUm"/>
<!-- AI Overlay Layer (Mockup) -->
<div class="absolute inset-0 pointer-events-none mix-blend-multiply opacity-40">
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 100 100">
<path d="M 20 20 Q 25 25 30 20 T 40 20" fill="none" stroke="#0059bb" stroke-width="0.5"></path>
<circle cx="65" cy="45" fill="none" r="8" stroke="#0059bb" stroke-dasharray="1 1" stroke-width="0.3"></circle>
<rect fill="#0059bb" fill-opacity="0.1" height="18" stroke="#0059bb" stroke-width="0.2" width="12" x="15" y="60"></rect>
</svg>
</div>
<!-- Drawing HUD (Floating Glass Menu) -->
<div class="absolute left-md top-1/2 -translate-y-1/2 z-40 flex flex-col gap-sm">
<div class="glass-panel p-sm rounded-xl flex flex-col gap-xs shadow-xl">
<button class="w-12 h-12 flex flex-col items-center justify-center rounded-lg bg-on-surface text-surface active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="near_me">near_me</span>
</button>
<div class="h-px w-8 bg-on-surface/5 mx-auto"></div>
<button class="w-12 h-12 flex flex-col items-center justify-center rounded-lg text-on-surface hover:bg-on-surface/5 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="rectangle">rectangle</span>
</button>
<button class="w-12 h-12 flex flex-col items-center justify-center rounded-lg text-on-surface hover:bg-on-surface/5 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="gesture">gesture</span>
</button>
<button class="w-12 h-12 flex flex-col items-center justify-center rounded-lg text-on-surface hover:bg-on-surface/5 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="radio_button_checked">radio_button_checked</span>
</button>
<div class="h-px w-8 bg-on-surface/5 mx-auto"></div>
<button class="w-12 h-12 flex flex-col items-center justify-center rounded-lg text-error hover:bg-error/10 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
</div>
<!-- Zoom HUD & Status (Floating Bottom-Center) -->
<div class="absolute bottom-container-margin left-1/2 -translate-x-1/2 z-40 w-[calc(100%-64px)] max-w-md">
<div class="glass-panel px-lg py-md rounded-full shadow-2xl flex flex-col gap-sm">
<div class="flex items-center justify-between gap-md">
<span class="font-label-sm text-label-sm text-on-surface-variant w-12">40.0x</span>
<div class="flex-1 flex items-center gap-sm">
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container-highest/50 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="remove">remove</span>
</button>
<input class="flex-1 h-1 bg-primary/20 rounded-lg appearance-none cursor-pointer accent-primary" max="100" min="1" type="range" value="40"/>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container-highest/50 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
</button>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary text-on-primary shadow-lg">
<span class="material-symbols-outlined" data-icon="center_focus_strong">center_focus_strong</span>
</button>
</div>
</div>
</div>
<!-- AI Toggle (Top Right Overlay) -->
<div class="absolute right-md top-container-margin z-40">
<div class="glass-panel p-sm rounded-full flex items-center gap-sm pr-md border border-primary/20">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-[18px]" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-[10px] leading-none uppercase tracking-widest text-primary font-bold">AI-Overlay</span>
<span class="font-label-sm text-label-sm text-on-surface-variant font-medium">Active</span>
</div>
<label class="relative inline-flex items-center cursor-pointer ml-sm">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
<!-- Specimen Info Card (Heads-up Display Style) -->
<div class="absolute left-md top-container-margin z-40">
<div class="glass-dark p-md rounded-xl text-white max-w-[180px] shadow-2xl">
<div class="flex items-center gap-xs mb-xs">
<span class="w-2 h-2 rounded-full bg-green-400"></span>
<span class="font-label-sm text-[10px] tracking-widest uppercase opacity-80">Slide 8821-A</span>
</div>
<p class="font-headline-md text-[18px] font-bold leading-tight mb-1">Human Lymph Node</p>
<div class="flex justify-between items-center opacity-60 text-[12px]">
<span>H&amp;E Stain</span>
<span>1.2GB</span>
</div>
</div>
</div>
</main>
<!-- Navigation Shell (Shared Component: BottomNavBar) -->
<nav class="fixed bottom-0 left-0 w-full h-20 bg-surface-container-lowest/80 backdrop-blur-3xl border-t border-on-surface/5 flex justify-around items-center px-lg pb-safe z-50">
<button class="flex flex-col items-center justify-center text-primary font-bold active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="biotech" style="font-variation-settings: 'FILL' 1;">biotech</span>
<span class="font-label-sm text-label-sm">Viewer</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary hover:text-primary-container active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="description">description</span>
<span class="font-label-sm text-label-sm">Cases</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary hover:text-primary-container active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>
<span class="font-label-sm text-label-sm">Insights</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary hover:text-primary-container active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-label-sm text-label-sm">Profile</span>
</button>
</nav>
<!-- Focus Grid (Subtle UI Overlay) -->
<div class="fixed inset-0 pointer-events-none border-[1px] border-primary/5 z-10 m-lg"></div>
<div class="fixed inset-0 pointer-events-none flex justify-center items-center z-10 opacity-20">
<div class="w-8 h-8 border-t border-l border-primary"></div>
<div class="flex-1"></div>
<div class="w-8 h-8 border-t border-r border-primary"></div>
</div>
<div class="fixed inset-0 pointer-events-none flex justify-center items-center z-10 opacity-20">
<div class="w-8 h-8 border-b border-l border-primary self-end"></div>
<div class="flex-1"></div>
<div class="w-8 h-8 border-b border-r border-primary self-end"></div>
</div>
</body></html>
