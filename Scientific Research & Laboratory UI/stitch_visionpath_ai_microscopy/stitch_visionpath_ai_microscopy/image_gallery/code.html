<body class="bg-surface text-on-surface font-body-md min-h-screen pb-32">
<!-- TopAppBar -->

</div>
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-on-surface/5 transition-colors p-sm rounded-full" data-icon="notifications">notifications</button>
<div class="h-8 w-8 rounded-full bg-surface-container-high border border-outline-variant overflow-hidden">

</div>
</div>

<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="search">search</span>

</div>
<div class="flex gap-sm overflow-x-auto pb-sm no-scrollbar">
<button class="flex items-center gap-xs px-md py-2 bg-on-surface text-surface rounded-full font-label-sm whitespace-nowrap">
<span class="material-symbols-outlined text-[18px]" data-icon="filter_list">filter_list</span>
                    Case ID
                </button>
<button class="flex items-center gap-xs px-md py-2 glass-card text-on-surface border border-outline-variant rounded-full font-label-sm whitespace-nowrap">
                    Stain Type
                </button>
<button class="flex items-center gap-xs px-md py-2 glass-card text-on-surface border border-outline-variant rounded-full font-label-sm whitespace-nowrap">
                    Date
                </button>
<button class="flex items-center gap-xs px-md py-2 glass-card text-on-surface border border-outline-variant rounded-full font-label-sm whitespace-nowrap">
                    Status

</div>
</section>

</div>

</button>

</div>

</div>
<div class="p-sm">
<span class="font-label-sm text-on-secondary-container">#9910-B</span>

</div>
<div class="p-sm">

<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="font-label-md">New Scan</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full h-20 bg-surface-container-lowest/80 dark:bg-inverse-surface/80 backdrop-blur-3xl border-t border-on-surface/5 flex justify-around items-center px-lg pb-safe z-50 rounded-t-full shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<div class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-bold active:scale-90 transition-transform duration-200">

<div class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-primary-container active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="description">description</span>

<div class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-primary-container active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>

</div>
<div class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-primary-container active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-label-sm text-label-sm">Profile</span>
</div>
</nav>
