<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #161308;
            color: #eae2cf;
            margin: 0;
            padding: 0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hazard-pattern {
            background: repeating-linear-gradient(
                45deg,
                #ffd700,
                #ffd700 10px,
                #1A1A1A 10px,
                #1A1A1A 20px
            );
        }
        .led-glow-green {
            box-shadow: 0 0 8px 2px rgba(34, 197, 94, 0.5);
        }
        .led-glow-yellow {
            box-shadow: 0 0 8px 2px rgba(255, 215, 0, 0.5);
        }
        .grid-overlay {
            background-image: linear-gradient(#3D3D3D 1px, transparent 1px), linear-gradient(90deg, #3D3D3D 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#fff6df",
                        "tertiary-fixed": "#e2e2e2",
                        "surface-container": "#231f14",
                        "on-surface": "#eae2cf",
                        "surface-container-low": "#1f1b10",
                        "on-primary-container": "#705e00",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-tertiary": "#2f3131",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#544600",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-background": "#eae2cf",
                        "on-secondary-fixed": "#1b1c1c",
                        "surface-bright": "#3d392c",
                        "on-secondary": "#303030",
                        "primary-fixed-dim": "#e9c400",
                        "inverse-primary": "#705d00",
                        "on-primary-fixed": "#221b00",
                        "secondary-fixed": "#e4e2e1",
                        "error-container": "#93000a",
                        "surface-dim": "#161308",
                        "surface-tint": "#e9c400",
                        "on-primary": "#3a3000",
                        "surface-container-high": "#2e2a1e",
                        "inverse-on-surface": "#343024",
                        "tertiary": "#f6f6f6",
                        "primary-fixed": "#ffe16d",
                        "tertiary-container": "#d9dada",
                        "on-secondary-container": "#b6b5b4",
                        "on-tertiary-container": "#5e5f60",
                        "surface-container-lowest": "#110e05",
                        "secondary": "#c8c6c6",
                        "surface-container-highest": "#393528",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-surface-variant": "#d0c6ab",
                        "inverse-surface": "#eae2cf",
                        "outline": "#999077",
                        "background": "#161308",
                        "surface": "#161308",
                        "error": "#ffb4ab",
                        "outline-variant": "#4d4732",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#c8c6c6",
                        "primary-container": "#ffd700",
                        "on-secondary-fixed-variant": "#474747",
                        "secondary-container": "#474747",
                        "surface-variant": "#393528"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "lg": "48px",
                        "xs": "4px",
                        "sm": "12px",
                        "gutter": "16px",
                        "margin": "32px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "data-mono": ["Space Grotesk"],
                        "label-caps": ["Space Grotesk"],
                        "body-fixed": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "display-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "data-mono": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "body-fixed": ["16px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-20 pt-16">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-[#1A1A1A] border-b-2 border-[#3D3D3D]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#FFD700]" data-icon="security">security</span>
<h1 class="text-xl font-black text-[#FFD700] tracking-tighter font-['Space_Grotesk'] uppercase">AEGIS-IOT</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-high border border-outline-variant">
<div class="w-2 h-2 rounded-full bg-green-500 led-glow-green"></div>
<span class="text-label-caps font-label-caps text-on-surface-variant">SYSTEM NOMINAL</span>
</div>
<button class="hover:bg-[#3D3D3D] transition-colors p-2 rounded">
<span class="material-symbols-outlined text-white" data-icon="settings_input_component">settings_input_component</span>
</button>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative w-full h-[calc(100vh-128px)] overflow-hidden bg-[#161308]">
<!-- Technical Grid Background -->
<div class="absolute inset-0 grid-overlay opacity-20"></div>
<!-- Facility Floor Plan Representation -->
<div class="absolute inset-margin border-2 border-[#3D3D3D] bg-[#1A1A1A] overflow-hidden">
<img class="w-full h-full object-cover opacity-30 grayscale contrast-125" data-alt="A highly technical blueprint-style facility floor plan with glowing neon schematics superimposed over a dark industrial warehouse environment. The lighting is moody and focused, with deep charcoals and sharp highlights. The visual style is mission-critical and rugged, consistent with an advanced IoT monitoring interface for secure hardware deployment. The atmosphere is quiet, professional, and sophisticated." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRuoSGGqj8kKkffAYKvSozXfB_mIqA3kRsGAMgc7ZegvykjXxHAUm96OVMXMpa-_pmJnsM8CZrmSmfdpLZymfFqMwG_-PYIyugwSd9YLpMGLGkloVaPWXzwz5f8xIA8-0y4xq5l8RHNW2YZSsoR5QKlFj7YyHdSU6wL5tk8I4hzQOTE3MiA21wruXfDTWDusHB6_RmSsQlH9d7Rm9iQDMzuWrexzECcHSZj4E78rmEGYf_h3BziLGaQsUEg6vTr0QfTBcDsko-DcY"/>
<!-- SVG Overlay for Connection Paths -->
<svg class="absolute inset-0 w-full h-full pointer-events-none">
<!-- OT to IT Data Paths -->
<path d="M 200 300 Q 400 250 600 400" fill="none" opacity="0.6" stroke="#FFD700" stroke-dasharray="8 4" stroke-width="2"></path>
<path d="M 800 200 Q 900 400 700 600" fill="none" opacity="0.6" stroke="#FFD700" stroke-dasharray="8 4" stroke-width="2"></path>
<path d="M 400 700 Q 600 650 800 600" fill="none" opacity="0.6" stroke="#FFD700" stroke-dasharray="8 4" stroke-width="2"></path>
</svg>
<!-- Device Markers -->
<!-- Marker 1: OT Sensor -->
<button class="absolute top-[30%] left-[20%] group">
<div class="relative">
<div class="absolute -inset-4 border border-[#FFD700] rounded-full animate-ping opacity-20"></div>
<div class="w-10 h-10 bg-[#1A1A1A] border-2 border-[#FFD700] flex items-center justify-center group-hover:bg-[#FFD700] transition-colors">
<span class="material-symbols-outlined text-[#FFD700] group-hover:text-[#1A1A1A]" data-icon="router">router</span>
</div>
</div>
</button>
<!-- Marker 2: IT Hub -->
<button class="absolute top-[40%] left-[60%] group">
<div class="w-12 h-12 bg-[#1A1A1A] border-2 border-white flex items-center justify-center group-hover:bg-white transition-colors">
<span class="material-symbols-outlined text-white group-hover:text-[#1A1A1A]" data-icon="hub">hub</span>
</div>
</button>
<!-- Marker 3: PLC Control -->
<button class="absolute top-[60%] left-[70%] group">
<div class="relative">
<div class="w-10 h-10 bg-[#1A1A1A] border-2 border-[#FFD700] flex items-center justify-center group-hover:bg-[#FFD700] transition-colors">
<span class="material-symbols-outlined text-[#FFD700] group-hover:text-[#1A1A1A]" data-icon="memory">memory</span>
</div>
<div class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border border-[#1A1A1A] led-glow-yellow animate-pulse"></div>
</div>
</button>
<!-- Device Detail Overlay (Active State) -->
<div class="absolute bottom-md right-md w-80 bg-[#2E2E2E] border-2 border-[#FFD700] flex flex-col z-40">
<div class="hazard-pattern h-2 w-full"></div>
<div class="p-4 border-b border-[#3D3D3D] flex justify-between items-start">
<div>
<h3 class="font-headline-md text-headline-md text-white uppercase tracking-tight">PLC_UNIT_04</h3>
<p class="font-label-caps text-label-caps text-[#FFD700]">ZONE: PRODUCTION_B</p>
</div>
<button class="text-white hover:text-[#FFD700]">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<div class="p-4 space-y-4">
<div class="grid grid-cols-2 gap-2">
<div class="bg-[#1A1A1A] p-2 border border-[#3D3D3D]">
<span class="block font-label-caps text-[10px] text-outline">TEMP</span>
<span class="font-data-mono text-data-mono text-[#FFD700]">42.8°C</span>
</div>
<div class="bg-[#1A1A1A] p-2 border border-[#3D3D3D]">
<span class="block font-label-caps text-[10px] text-outline">LOAD</span>
<span class="font-data-mono text-data-mono text-[#FFD700]">88.2%</span>
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between font-label-caps text-[10px] text-white">
<span>UPTIME</span>
<span>142:22:04</span>
</div>
<div class="h-2 bg-[#1A1A1A] border border-[#3D3D3D] flex">
<div class="w-3/4 bg-[#FFD700] h-full"></div>
</div>
</div>
<button class="w-full py-2 bg-[#FFD700] text-[#1A1A1A] font-bold uppercase text-label-caps hover:brightness-90 transition-all">
                        DEPLOY PROTOCOL
                    </button>
</div>
</div>
</div>
<!-- Sidebar Map Controls -->
<div class="absolute left-lg top-lg flex flex-col gap-2 z-40">
<button class="w-10 h-10 bg-[#1A1A1A] border-2 border-[#3D3D3D] text-white hover:border-[#FFD700] flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="w-10 h-10 bg-[#1A1A1A] border-2 border-[#3D3D3D] text-white hover:border-[#FFD700] flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<div class="h-4"></div>
<button class="w-10 h-10 bg-[#FFD700] border-2 border-[#FFD700] text-[#1A1A1A] flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
<button class="w-10 h-10 bg-[#1A1A1A] border-2 border-[#3D3D3D] text-white hover:border-[#FFD700] flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
<!-- Legend Panel -->
<div class="absolute bottom-lg left-lg bg-[#1A1A1A]/90 border-2 border-[#3D3D3D] p-3 z-40 backdrop-blur-sm">
<h4 class="font-label-caps text-label-caps text-white border-b border-[#3D3D3D] pb-2 mb-3">MAP LEGEND</h4>
<div class="space-y-3">
<div class="flex items-center gap-3">
<div class="w-4 h-4 border border-[#FFD700] flex items-center justify-center">
<div class="w-2 h-2 bg-[#FFD700]"></div>
</div>
<span class="font-label-caps text-[10px] text-on-surface-variant">OT ENDPOINT</span>
</div>
<div class="flex items-center gap-3">
<div class="w-4 h-4 border border-white flex items-center justify-center">
<div class="w-2 h-2 bg-white"></div>
</div>
<span class="font-label-caps text-[10px] text-on-surface-variant">IT GATEWAY</span>
</div>
<div class="flex items-center gap-3">
<div class="w-6 h-[1px] bg-[#FFD700] border-t border-dashed border-[#FFD700]"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">DATA TUNNEL</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-16 bg-[#1A1A1A] border-t-2 border-[#3D3D3D]">
<a class="flex flex-col items-center justify-center text-white py-1 w-full h-full border-x border-transparent hover:bg-[#2E2E2E]" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase tracking-tight">FLEET</span>
</a>
<a class="flex flex-col items-center justify-center text-white py-1 w-full h-full border-x border-transparent hover:bg-[#2E2E2E]" href="#">
<span class="material-symbols-outlined" data-icon="warning">warning</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase tracking-tight">ALERTS</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#FFD700] text-[#1A1A1A] py-1 w-full h-full border-x border-[#1A1A1A] active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="hub" style="font-variation-settings: 'FILL' 1;">hub</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase tracking-tight">MAP</span>
</a>
<a class="flex flex-col items-center justify-center text-white py-1 w-full h-full border-x border-transparent hover:bg-[#2E2E2E]" href="#">
<span class="material-symbols-outlined" data-icon="system_update_alt">system_update_alt</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase tracking-tight">UPDATES</span>
</a>
</nav>
</body></html>
