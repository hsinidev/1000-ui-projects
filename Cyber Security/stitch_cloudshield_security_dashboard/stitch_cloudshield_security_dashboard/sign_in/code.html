<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CloudShield | Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#421871",
                        "surface-dim": "#101416",
                        "surface-bright": "#363a3c",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#282c5b",
                        "secondary": "#ffffff",
                        "surface-container-high": "#262b2d",
                        "background": "#101416",
                        "surface-container-low": "#181c1e",
                        "tertiary-fixed": "#e0e0ff",
                        "primary-fixed": "#eedbff",
                        "outline-variant": "#4b4450",
                        "on-surface-variant": "#cdc3d2",
                        "surface": "#101416",
                        "surface-tint": "#d9b9ff",
                        "surface-container-lowest": "#0b0f11",
                        "surface-container-highest": "#313538",
                        "primary-fixed-dim": "#d9b9ff",
                        "on-tertiary-fixed": "#131645",
                        "on-background": "#e0e3e6",
                        "on-secondary-container": "#007070",
                        "surface-container": "#1c2023",
                        "on-secondary": "#003737",
                        "surface-variant": "#313538",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#00dddd",
                        "secondary-fixed": "#00fbfb",
                        "on-primary-container": "#eddbff",
                        "primary-container": "#7851a9",
                        "inverse-primary": "#724ba3",
                        "tertiary-fixed-dim": "#bfc2fb",
                        "on-primary-fixed": "#2a0054",
                        "tertiary": "#bfc2fb",
                        "inverse-on-surface": "#2d3133",
                        "on-tertiary-container": "#dfdfff",
                        "on-primary-fixed-variant": "#593289",
                        "outline": "#968e9b",
                        "primary": "#d9b9ff",
                        "on-surface": "#e0e3e6",
                        "on-secondary-fixed-variant": "#004f4f",
                        "tertiary-container": "#5d6093",
                        "secondary-container": "#00fbfb",
                        "on-secondary-fixed": "#002020",
                        "on-error": "#690005",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed-variant": "#3f4273",
                        "inverse-surface": "#e0e3e6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "glass-padding": "24px",
                        "stack-lg": "32px",
                        "container-margin": "32px",
                        "unit": "8px",
                        "stack-md": "16px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Space Grotesk"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Space Grotesk"],
                        "code": ["monospace"],
                        "label-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "code": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #101416;
            background-image: radial-gradient(circle at 0% 0%, rgba(120, 81, 169, 0.15) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(0, 251, 251, 0.1) 0%, transparent 50%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-border-focus:focus-within {
            border-color: #00fbfb;
            box-shadow: 0 0 10px rgba(0, 251, 251, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-gutter overflow-hidden">
<!-- Auth Container -->
<main class="w-full max-w-[1100px] h-[700px] glass-card rounded-xl overflow-hidden flex shadow-[0_0_50px_rgba(0,0,0,0.5)]">
<!-- Left Side: Visual Branding -->
<section class="hidden lg:flex flex-1 relative items-center justify-center bg-slate-950/20 overflow-hidden border-r border-white/5">
<div class="absolute inset-0 z-0">
<img alt="Abstract Cloud Security" class="w-full h-full object-cover opacity-40 mix-blend-overlay" data-alt="A sophisticated 3D abstract visualization of a digital cloud infrastructure. Glowing interconnected nodes and crystalline structures float in a deep navy void. Beams of royal purple and cyan light pulse through geometric data pathways, creating a sense of secure, high-tech energy. The lighting is cinematic with deep shadows and vibrant neon accents, reflecting a fluid-tech security aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbyNRwDr1n-H5Ago5wCYYUGT8v_N9uYGHvAPKxg3AGhpUYVXS4yhBDxEutyKAyk_lmxvpYqOT2ekQvC5Abrr4omQmxvqDbKAstwcT3y6ze23ZvHN6le4_P34oOyaxG8467hZxGhSr1Bo8izJ9IDnEWDnrEMidZXS22c1eMsaQ6k9XHpC6QhjCNS7Tz4Dze7l5PPxAl-ChKofnB4eh93bTlWka5w58t6E3zKhVASPAyMM7ZZ1ZCMOFeSq1rxdSGt3VbbrhdoT66o491"/>
</div>
<!-- Branding Overlay -->
<div class="relative z-10 p-container-margin text-center">
<div class="mb-stack-lg inline-flex items-center justify-center p-6 rounded-full bg-primary-container/20 border border-primary/20 backdrop-blur-md">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<h1 class="font-headline-xl text-headline-xl bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary-container mb-stack-sm">
                    CloudShield
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto">
                    Advanced Cloud Security Posture Management for the modern enterprise.
                </p>
</div>
<!-- Floating Data Particles (Decorative) -->
<div class="absolute bottom-0 left-0 w-full p-stack-lg flex justify-between items-end opacity-50">
<div class="font-code text-code text-secondary-container flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary-container animate-pulse"></span>
                    SECURE_PROTOCOL_v4.2
                </div>
<div class="font-code text-code text-primary-fixed-dim">
                    EST_LATENCY: 14ms
                </div>
</div>
</section>
<!-- Right Side: Login Form -->
<section class="flex-1 flex flex-col items-center justify-center p-12 bg-surface-container-lowest/80">
<div class="w-full max-w-md">
<header class="mb-10">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Access your security dashboard</p>
</header>
<form class="space-y-stack-lg">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="email">Email Address</label>
<div class="relative group neon-border-focus rounded-lg transition-all duration-300">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-secondary-container transition-colors">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-high border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-0 focus:border-secondary-container outline-none transition-all" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary-container hover:text-secondary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group neon-border-focus rounded-lg transition-all duration-300">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-secondary-container transition-colors">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-surface-container-high border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-0 focus:border-secondary-container outline-none transition-all" id="password" name="password" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Stay Logged In -->
<div class="flex items-center">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container-high text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="ml-2 font-body-sm text-body-sm text-on-surface-variant" for="remember">Trust this device for 30 days</label>
</div>
<!-- Sign In Button -->
<button class="w-full py-4 rounded-lg bg-gradient-to-r from-primary-container to-tertiary-container text-white font-label-md text-label-md shadow-[0_4px_20px_rgba(120,81,169,0.3)] hover:shadow-[0_4px_25px_rgba(0,251,251,0.2)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-200" type="submit">
                        Sign In
                    </button>
</form>
<!-- Footer Links -->
<footer class="mt-10 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        New to CloudShield? 
                        <a class="font-label-md text-secondary-container hover:underline ml-1" href="#">Create an Account</a>
</p>
</footer>
<!-- SSO Options -->
<div class="mt-12">
<div class="relative mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-md">
<span class="px-4 bg-surface-container-lowest text-on-surface-variant">OR CONTINUE WITH</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 border border-outline-variant rounded-lg hover:bg-white/5 transition-colors font-label-md text-on-surface">
<span class="material-symbols-outlined text-[20px]">id_card</span>
                            SSO
                        </button>
<button class="flex items-center justify-center gap-2 py-3 border border-outline-variant rounded-lg hover:bg-white/5 transition-colors font-label-md text-on-surface">
<span class="material-symbols-outlined text-[20px]">domain</span>
                            Azure AD
                        </button>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Decorative Elements -->
<div class="fixed bottom-gutter left-gutter flex gap-stack-md opacity-30">
<div class="h-1 w-12 bg-primary rounded-full"></div>
<div class="h-1 w-8 bg-secondary-container rounded-full"></div>
<div class="h-1 w-4 bg-outline-variant rounded-full"></div>
</div>
<div class="fixed bottom-gutter right-gutter font-code text-[10px] text-on-surface-variant opacity-20 tracking-[4px] uppercase">
        Encrypted Session Protocol v.5.0
    </div>
</body></html>
