<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid #333333;
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 103, 0, 0.1);
            position: absolute;
            z-index: 10;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface": "#f8ddd2",
                      "surface-container": "#2b1c16",
                      "surface-bright": "#46352e",
                      "inverse-surface": "#f8ddd2",
                      "secondary-fixed-dim": "#c8c6c5",
                      "on-tertiary": "#2f3131",
                      "error": "#ffb4ab",
                      "primary": "#ffb595",
                      "secondary": "#c8c6c5",
                      "primary-container": "#ff6700",
                      "secondary-fixed": "#e5e2e1",
                      "on-tertiary-container": "#2e3030",
                      "surface-tint": "#ffb595",
                      "on-secondary": "#313030",
                      "secondary-container": "#474746",
                      "on-surface-variant": "#e3bfb1",
                      "on-tertiary-fixed": "#1a1c1c",
                      "on-secondary-fixed-variant": "#474746",
                      "tertiary-fixed-dim": "#c6c6c7",
                      "tertiary-container": "#969797",
                      "on-primary": "#571e00",
                      "tertiary-fixed": "#e2e2e2",
                      "on-tertiary-fixed-variant": "#454747",
                      "primary-fixed": "#ffdbcd",
                      "outline-variant": "#5a4136",
                      "on-background": "#f8ddd2",
                      "on-primary-container": "#561e00",
                      "on-secondary-container": "#b7b5b4",
                      "surface-container-highest": "#42312a",
                      "surface-dim": "#1d100a",
                      "surface-container-lowest": "#170b06",
                      "on-error": "#690005",
                      "surface-container-high": "#362620",
                      "surface": "#1d100a",
                      "on-error-container": "#ffdad6",
                      "background": "#1d100a",
                      "on-primary-fixed-variant": "#7c2e00",
                      "primary-fixed-dim": "#ffb595",
                      "error-container": "#93000a",
                      "inverse-on-surface": "#3d2d26",
                      "surface-container-low": "#261812",
                      "outline": "#aa8a7d",
                      "tertiary": "#c6c6c7",
                      "on-primary-fixed": "#351000",
                      "inverse-primary": "#a23f00",
                      "surface-variant": "#42312a",
                      "on-secondary-fixed": "#1c1b1b"
              },
              "borderRadius": {
                      "DEFAULT": "0px",
                      "lg": "0px",
                      "xl": "0px",
                      "full": "9999px"
              },
              "spacing": {
                      "xs": "4px",
                      "lg": "24px",
                      "container-padding": "24px",
                      "md": "16px",
                      "unit": "4px",
                      "sm": "8px",
                      "xl": "40px",
                      "gutter": "12px"
              },
              "fontFamily": {
                      "body-sm": ["Inter"],
                      "h3": ["Space Grotesk"],
                      "h1": ["Space Grotesk"],
                      "data-point": ["Inter"],
                      "body-md": ["Inter"],
                      "mono-label": ["Inter"],
                      "h2": ["Space Grotesk"]
              },
              "fontSize": {
                      "body-sm": ["12px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "h3": ["18px", {"lineHeight": "1.3", "fontWeight": "600"}],
                      "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "data-point": ["16px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "mono-label": ["11px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "h2": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}]
              }
            },
          },
        }
      </script>
</head>
<body class="bg-[#1A1A1A] text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Hero Visual -->
<div class="absolute inset-0 z-0">
<img alt="" class="w-full h-full object-cover opacity-20 grayscale brightness-50" data-alt="A high-tech server room background with glowing green and orange circuitry lights reflecting off sleek metallic surfaces. The atmosphere is cinematic and moody, emphasizing a dark industrial cybersecurity command center aesthetic. Soft atmospheric fog and technical data overlays suggest a high-security digital environment. The lighting is low-key, focusing on the intricate details of the network infrastructure." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFAd5zqE8M30YJ4-zCP2z3Ziq2N960oaDCQEKgkaD3gLbd7EnHnQmZgd2hPm4pVJR7dbAtQLTF0pwYggWKUK65s3qNkmgy7S-9AIHzbf2XqN-KavRSKs5eqECf7iknJasPfHGEenHKTA7F4TSQdZ0WpmXCPjn3ArZGP3iaMGdXZvUvpdLifYK-NNdI6KRqcqMy2KYsnZzWLbY7TVJFVJZBmb9fkUx1WgO8y7svXYXsA6fi9tTz5gxCmBUx-9mbYzgjmgKtqnWzvL-q"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#1A1A1A] via-transparent to-[#1A1A1A]"></div>
</div>
<!-- Top Branding Anchor -->
<header class="fixed top-0 left-0 w-full z-50 px-lg py-md flex items-center justify-between border-b border-neutral-800 bg-[#1A1A1A]/80 backdrop-blur-xl">
<div class="flex items-center gap-sm">
<div class="text-orange-600 font-black tracking-widest border-l-4 border-orange-600 pl-2 font-h3 uppercase">
                SOC_COMMAND_CENTER
            </div>
</div>
<div class="flex items-center gap-xs text-neutral-500 font-mono-label">
<span class="material-symbols-outlined text-[14px]">terminal</span>
<span>SYSTEM_V4.2.0</span>
</div>
</header>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-[440px] px-container-padding">
<!-- Login Card -->
<div class="glass-panel relative p-lg shadow-[0_0_40px_rgba(0,0,0,0.8)] border border-neutral-800">
<!-- Criticality Strip -->
<div class="absolute left-0 top-0 bottom-0 w-[4px] bg-orange-600"></div>
<!-- Header -->
<div class="mb-xl">
<div class="flex items-center justify-between mb-sm">
<h1 class="font-h1 text-on-surface uppercase tracking-tighter">AUTHENTICATE</h1>
<span class="material-symbols-outlined text-orange-600 text-3xl">security</span>
</div>
<p class="font-mono-label text-neutral-400 uppercase tracking-widest">Operator Access Protocol Required</p>
</div>
<!-- Form -->
<form action="#" class="space-y-lg">
<!-- Operator ID -->
<div class="space-y-xs">
<label class="font-mono-label text-neutral-500 flex items-center justify-between" for="operator-id">
<span>OPERATOR_ID</span>
<span class="text-xs opacity-50">REQUIRED</span>
</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-neutral-500 group-focus-within:text-orange-600">
<span class="material-symbols-outlined text-[18px]">badge</span>
</div>
<input class="w-full bg-[#111111] border border-neutral-800 text-on-surface py-md pl-xl pr-md font-mono-label focus:outline-none focus:border-orange-600 focus:ring-0 transition-colors placeholder:text-neutral-700" id="operator-id" name="operator-id" placeholder="OP-XXXX-XXXX" required="" type="text"/>
</div>
</div>
<!-- Passkey -->
<div class="space-y-xs">
<label class="font-mono-label text-neutral-500 flex items-center justify-between" for="passkey">
<span>PASSKEY_ENCRYPTED</span>
<span class="text-xs opacity-50 underline cursor-pointer hover:text-orange-400">RECOVER?</span>
</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-neutral-500 group-focus-within:text-orange-600">
<span class="material-symbols-outlined text-[18px]">key</span>
</div>
<input class="w-full bg-[#111111] border border-neutral-800 text-on-surface py-md pl-xl pr-md font-mono-label focus:outline-none focus:border-orange-600 focus:ring-0 transition-colors placeholder:text-neutral-700" id="passkey" name="passkey" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Terminal-style Checkbox -->
<div class="flex items-center">
<input class="w-4 h-4 rounded-none bg-[#111111] border-neutral-800 text-orange-600 focus:ring-offset-0 focus:ring-orange-600/50" id="persist" type="checkbox"/>
<label class="ml-sm font-body-sm text-neutral-400 select-none" for="persist">PERSIST_SESSION_FOR_24H</label>
</div>
<!-- Actions -->
<div class="space-y-md pt-md">
<button class="w-full bg-orange-600 hover:bg-orange-500 text-black font-h3 uppercase py-md transition-all active:scale-[0.98] flex items-center justify-center gap-sm group" type="submit">
<span>INITIALIZE_LOGIN</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">login</span>
</button>
<button class="w-full border border-neutral-800 hover:bg-neutral-800/50 text-on-surface font-mono-label uppercase py-md tracking-widest transition-colors flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined text-[16px]">fingerprint</span>
                        BIOMETRIC_LINK
                    </button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-xl pt-lg border-t border-neutral-800 text-center">
<p class="font-body-sm text-neutral-500">
                    UNAUTHORIZED? 
                    <a class="text-orange-600 font-bold hover:text-orange-400 underline decoration-2 underline-offset-4 ml-xs" href="#">REQUEST_ACCESS</a>
</p>
</div>
</div>
<!-- Security Footnote -->
<div class="mt-lg flex items-center justify-center gap-md opacity-40">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-xs">encrypted</span>
<span class="text-[10px] font-mono-label">AES-256</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-xs">location_on</span>
<span class="text-[10px] font-mono-label">IP_LOGGED</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-xs">verified_user</span>
<span class="text-[10px] font-mono-label">SOC_GUARD</span>
</div>
</div>
</main>
<!-- Decorative HUD Elements -->
<div class="fixed bottom-lg right-lg opacity-20 pointer-events-none hidden md:block">
<div class="font-mono-label text-right">
<div class="text-orange-600">COORD: 40.7128° N, 74.0060° W</div>
<div class="text-neutral-500">STATUS: VIGILANT</div>
<div class="text-neutral-500">LATENCY: 14MS</div>
</div>
</div>
<div class="fixed bottom-lg left-lg opacity-20 pointer-events-none hidden md:block">
<div class="w-32 h-1 bg-neutral-800 relative">
<div class="absolute inset-y-0 left-0 w-2/3 bg-orange-600"></div>
</div>
<div class="mt-xs font-mono-label text-[10px] text-neutral-500 uppercase tracking-tighter">SYSTEM_LOAD_64%</div>
</div>
</body></html>
