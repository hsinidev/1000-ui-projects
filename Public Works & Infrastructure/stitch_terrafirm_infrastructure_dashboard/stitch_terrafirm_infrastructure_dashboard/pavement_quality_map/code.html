<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;0,6..72,800;1,6..72,400&amp;family=Public+Sans:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-primary": "#402c18",
                  "tertiary-fixed-dim": "#e7c433",
                  "on-error-container": "#ffdad6",
                  "on-tertiary-fixed": "#221b00",
                  "outline-variant": "#4e453d",
                  "on-secondary": "#143535",
                  "on-surface-variant": "#d2c4ba",
                  "primary": "#e1c1a4",
                  "surface-container-lowest": "#0e0e0e",
                  "on-surface": "#e5e2e1",
                  "on-secondary-container": "#9dbfbe",
                  "primary-fixed": "#fedcbe",
                  "surface-tint": "#e1c1a4",
                  "on-primary-fixed-variant": "#59422c",
                  "on-primary-fixed": "#291806",
                  "surface-container": "#20201f",
                  "on-primary-container": "#bd9f83",
                  "secondary": "#abcdcd",
                  "outline": "#9b8f85",
                  "on-secondary-fixed-variant": "#2c4c4c",
                  "surface-variant": "#353535",
                  "surface-container-high": "#2a2a2a",
                  "on-secondary-fixed": "#002020",
                  "surface": "#131313",
                  "tertiary-container": "#c9a810",
                  "primary-fixed-dim": "#e1c1a4",
                  "primary-container": "#4b3621",
                  "inverse-on-surface": "#313030",
                  "tertiary-fixed": "#ffe174",
                  "surface-bright": "#393939",
                  "inverse-surface": "#e5e2e1",
                  "error-container": "#93000a",
                  "background": "#131313",
                  "surface-container-highest": "#353535",
                  "on-background": "#e5e2e1",
                  "secondary-fixed-dim": "#abcdcd",
                  "secondary-fixed": "#c6e9e9",
                  "error": "#ffb4ab",
                  "on-tertiary-container": "#4c3e00",
                  "surface-dim": "#131313",
                  "tertiary": "#e7c433",
                  "secondary-container": "#2e4e4e",
                  "on-error": "#690005",
                  "on-tertiary-fixed-variant": "#554500",
                  "inverse-primary": "#725a42",
                  "on-tertiary": "#3b2f00",
                  "surface-container-low": "#1c1b1b"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "gutter": "24px",
                  "container-max": "1440px",
                  "margin": "32px",
                  "stack-lg": "48px",
                  "stack-sm": "12px",
                  "unit": "8px",
                  "stack-md": "24px"
          },
          "fontFamily": {
                  "label-bold": ["Inter"],
                  "headline-xl": ["Newsreader"],
                  "headline-lg": ["Newsreader"],
                  "body-lg": ["Public Sans"],
                  "headline-md": ["Newsreader"],
                  "body-md": ["Public Sans"],
                  "label-sm": ["Inter"]
          },
          "fontSize": {
                  "label-bold": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                  "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                  "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                  "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                  "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                  "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                  "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "500"}]
          }
        },
      },
    }
  </script>
<style>
    .concrete-texture {
      background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
      background-size: 4px 4px;
    }
    .hazard-stripes {
      background: repeating-linear-gradient(
        45deg,
        #e7c433,
        #e7c433 10px,
        #131313 10px,
        #131313 20px
      );
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-gutter h-16 bg-surface dark:bg-surface-dim border-b-2 border-outline-variant fixed top-0 z-50">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary hover:bg-surface-container-highest transition-colors p-2 rounded">menu</button>
<div class="flex items-center gap-2">
<img alt="TerraFirm Logo" class="h-8 w-8 object-contain" data-alt="A rugged, industrial logo for a civil engineering firm called 'TerraFirm'. The icon combines a roadway perspective line with a gear or a structural bridge element. Flat vector style, bold lines, professional, slate grey and safety yellow colors, white background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4RhgKLRw4G02pqb9LpoPmMLQCjU0m3iEU-1K2I9xVatXQMEV2XBIxj2zC5IQdaOvaI7w0JWs6nI3tgc-KbpYFJs0LjpZZ_TX6hRhwsy4U9Da_k26HgznCCvmB1yjvtlTVdvCmmoMd_sZ0ChIYTwLOZMWicH20moigpu9RwKx8UKj7Y2u_K1OrLlwCml50Hq90fNcMhFmnFDpoxyZePWpjxzXXCWs_up1_DP8TijSIv9TrMBaYZR0PlwHn_IUQSq0ItqeHc8ZKg_I"/>
<h1 class="font-headline-md text-headline-md font-extrabold uppercase tracking-tighter text-tertiary dark:text-tertiary-fixed-dim">TerraFirm</h1>
</div>
</div>
<div class="flex items-center gap-stack-sm">
<span class="font-label-bold text-label-bold text-outline uppercase hidden md:block">Region: District 7</span>
<button class="material-symbols-outlined text-primary hover:bg-surface-container-highest transition-colors p-2 rounded">cloud_download</button>
</div>
</header>
<!-- Main Viewport -->
<main class="flex-grow relative mt-16 mb-20 overflow-hidden bg-surface-container-lowest">
<!-- Full Screen Map Canvas -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full concrete-texture bg-surface-container-low flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover opacity-60 mix-blend-luminosity grayscale" data-alt="A detailed, high-contrast aerial map view of an urban industrial grid with prominent roadway arteries and infrastructure. The map is stylized in deep charcoal and slate tones, with roadway segments highlighted in vibrant safety yellow, neon green, and caution red. The lighting is low-key and professional, emphasizing the structural integrity of the civil engineering layout." data-location="Chicago" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABhDtoEh76YCaLVfvhEOsgTA6RPXppONyFGtwr2fO_qZu0vGOfShR1l3W8nYrjY_2cpWV4icyHSh2_kYfEkY7s4qkCtb-xEb_ZPRcPOACvAlDfYT0RUeTkqxIbcddFOeWX9M4mDx50x_pfAWID26NKl5OrsPaM6kTIZghB7uJxBza4qGWiER7TVPI4cYar-Kj3xAos1AU2QHSmKpWTtK7qov0_Pn-l_aOfm0pSvp6EqtyskJ7VF_jehoayP1wCfZs1sbbKer9BsH4"/>
<!-- SVG Overlay for PQI Color Coding (Simulation) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-80" preserveaspectratio="xMidYMid slice" viewbox="0 0 1000 1000">
<path d="M100,200 L400,200 L400,500" fill="none" stroke="#ffb4ab" stroke-width="8"></path>
<path d="M400,200 L800,200" fill="none" stroke="#e7c433" stroke-width="8"></path>
<path d="M400,500 L900,500" fill="none" stroke="#4caf50" stroke-width="8"></path>
<path d="M100,600 L100,200" fill="none" stroke="#e7c433" stroke-width="8"></path>
</svg>
</div>
</div>
<!-- UI Overlays -->
<div class="absolute inset-0 z-10 pointer-events-none p-gutter flex flex-col justify-between">
<!-- Top Overlay: Search Bar -->
<div class="w-full max-w-xl mx-auto pointer-events-auto">
<div class="bg-surface border-2 border-outline flex items-center px-4 h-14 shadow-none">
<span class="material-symbols-outlined text-outline">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface font-label-bold uppercase placeholder:text-outline-variant" placeholder="SEARCH SPECIFIC ROUTES (E.G. I-90 WEST)" type="text"/>
<button class="material-symbols-outlined text-tertiary">tune</button>
</div>
</div>
<!-- Bottom Overlay: PQI Statistics & FAB -->
<div class="flex flex-col gap-stack-md pointer-events-auto">
<!-- FAB -->
<div class="flex justify-end">
<button class="bg-tertiary text-on-tertiary h-16 px-8 flex items-center gap-3 border-b-4 border-on-tertiary-fixed-variant active:scale-95 transition-all shadow-none">
<span class="material-symbols-outlined font-bold" style="font-variation-settings: 'FILL' 1;">add_road</span>
<span class="font-label-bold text-label-bold uppercase">Start Inspection</span>
</button>
</div>
<!-- PQI Statistics Card -->
<div class="bg-surface-container border-2 border-slate-600 p-6 flex flex-col md:flex-row gap-8 items-stretch md:items-center concrete-texture border-b-0">
<div class="flex flex-col gap-2">
<span class="font-label-bold text-label-bold text-tertiary uppercase">Network Health</span>
<div class="flex items-baseline gap-2">
<span class="font-headline-xl text-headline-xl">74.2</span>
<span class="font-label-bold text-label-bold text-outline">PQI AVG</span>
</div>
</div>
<!-- Segmented Progress Gauges -->
<div class="flex-grow grid grid-cols-1 md:grid-cols-3 gap-gutter">
<div class="flex flex-col gap-2">
<div class="flex justify-between font-label-sm text-label-sm uppercase">
<span>Critical (PCI &lt; 40)</span>
<span class="text-error">12%</span>
</div>
<div class="h-3 bg-surface-variant w-full overflow-hidden border border-outline-variant">
<div class="h-full bg-error" style="width: 12%"></div>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between font-label-sm text-label-sm uppercase">
<span>Fair (PCI 40-70)</span>
<span class="text-tertiary">34%</span>
</div>
<div class="h-3 bg-surface-variant w-full overflow-hidden border border-outline-variant">
<div class="h-full bg-tertiary" style="width: 34%"></div>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between font-label-sm text-label-sm uppercase">
<span>Optimal (PCI &gt; 70)</span>
<span class="text-secondary">54%</span>
</div>
<div class="h-3 bg-surface-variant w-full overflow-hidden border border-outline-variant">
<div class="h-full bg-secondary" style="width: 54%"></div>
</div>
</div>
</div>
<!-- Hazard Status Block -->
<div class="border-l-4 border-tertiary pl-6 py-2 flex flex-col justify-center">
<div class="flex items-center gap-2 mb-1">
<div class="w-3 h-3 hazard-stripes"></div>
<span class="font-label-bold text-label-bold text-on-surface uppercase">Active Alerts</span>
</div>
<p class="font-body-md text-on-surface-variant leading-tight">3 Deferred Maintenance <br/>Zones in District 7</p>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-stretch h-20 bg-surface-container-lowest dark:bg-surface-container-lowest border-t-4 border-outline z-50">
<a class="flex flex-col items-center justify-center bg-tertiary text-on-tertiary dark:bg-tertiary-fixed-dim dark:text-on-tertiary-fixed h-full border-x-2 border-outline scale-95 transition-all" href="#">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-bold text-label-bold uppercase">Map</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant opacity-70 hover:bg-surface-container-highest dark:hover:bg-surface-container-high" href="#">
<span class="material-symbols-outlined">assignment</span>
<span class="font-label-bold text-label-bold uppercase">Logs</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant opacity-70 hover:bg-surface-container-highest dark:hover:bg-surface-container-high" href="#">
<span class="material-symbols-outlined">engineering</span>
<span class="font-label-bold text-label-bold uppercase">Fleet</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant opacity-70 hover:bg-surface-container-highest dark:hover:bg-surface-container-high" href="#">
<span class="material-symbols-outlined">ac_unit</span>
<span class="font-label-bold text-label-bold uppercase">Ops</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant opacity-70 hover:bg-surface-container-highest dark:hover:bg-surface-container-high" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-bold text-label-bold uppercase">Profile</span>
</a>
</nav>
</body></html>
