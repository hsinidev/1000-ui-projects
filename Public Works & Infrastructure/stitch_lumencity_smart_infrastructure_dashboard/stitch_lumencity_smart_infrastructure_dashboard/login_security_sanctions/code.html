<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>

<style>.material-symbols-outlined {

    background: rgba(27, 28, 60, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1)
    }
.amber-glow {
    box-shadow: 0 0 4px #f8ad00, 0 0 15px rgba(248, 173, 0, 0.3)
    }
.amber-glow-focus:focus-within {
    box-shadow: 0 0 8px #f8ad00, 0 0 20px rgba(248, 173, 0, 0.4);
    border-color: #ffd086
    }
.city-bg {
    background: linear-gradient(to bottom, #0f1030, #1a1b41);
    position: relative;
    overflow: hidden
    }
.city-silhouette {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCnjWGLTsgx3pw1n0m99BjJRr5hDoVM2G2hpJ6YsKwDlAmkc89uNV8q4kdtY6Ro3j2Jv2uhCS7RIzYlTmXeiiLr97MobiXcn6FyI9xOIZIuFkEEYWD8Qi6tr6YCSz5Yg3BgJj73Tfk1zcNEbgdD6tY_645keR_MyWLt6pjUkJK5iRv9RwQW2jgwTYSaKKX8WIo0g6u16ZgJ9OjJPEfaeCEkinsiLQMeq0gHjj-jYMSUxZC0yPP4Ac58OtjTZ5iWIgvBJyckiBcIkf4);
    background-size: cover;
    background-position: center bottom;
    filter: brightness(0.2) saturate(0.5) contrast(1.2)
    }</style>

        extend: {
          "colors": {
                  "tertiary-fixed": "#e2e2e2",
                  "on-secondary": "#432c00",
                  "on-error-container": "#ffdad6",
                  "inverse-on-surface": "#2c2d4e",
                  "on-surface-variant": "#c8c5cf",
                  "primary": "#c2c2f2",
                  "inverse-surface": "#e1e0ff",
                  "on-surface": "#e1e0ff",
                  "tertiary-fixed-dim": "#c6c6c7",
                  "primary-fixed-dim": "#c2c2f2",
                  "on-background": "#e1e0ff",
                  "surface-dim": "#0f1030",
                  "on-secondary-container": "#664500",
                  "tertiary": "#c6c6c7",
                  "on-primary-container": "#8283af",
                  "on-error": "#690005",
                  "surface-container": "#1b1c3c",
                  "error-container": "#93000a",
                  "secondary-fixed": "#ffdead",
                  "primary-fixed": "#e1e0ff",
                  "surface-container-high": "#262748",
                  "surface-variant": "#303253",
                  "outline-variant": "#47464e",
                  "error": "#ffb4ab",
                  "inverse-primary": "#5a5b84",
                  "outline": "#918f99",
                  "surface": "#0f1030",
                  "on-primary-fixed-variant": "#42436b",
                  "surface-container-low": "#171838",
                  "secondary-fixed-dim": "#ffba3b",
                  "on-tertiary-fixed": "#1a1c1c",
                  "on-primary-fixed": "#16173d",
                  "on-tertiary-container": "#868788",
                  "surface-bright": "#353658",
                  "on-secondary-fixed-variant": "#604100",
                  "on-tertiary-fixed-variant": "#454747",
                  "on-secondary-fixed": "#281900",
                  "secondary-container": "#f8ad00",
                  "on-primary": "#2b2d53",

          "spacing": {
                  "sm": "8px",
                  "lg": "24px",
                  "unit": "8px",
                  "xxl": "64px",

          "fontFamily": {

      },

<body class="bg-background text-on-background min-h-screen flex items-center justify-center city-bg font-body-md">
<!-- Background Layers -->
<div class="absolute inset-0 z-0 city-silhouette" data-alt="A cinematic night view of a futuristic city skyline dominated by deep indigo and midnight blue tones. Glowing amber lights from skyscrapers and streetlights puncture the darkness, creating a luminous, electric atmosphere. The visual style is high-performance atmospheric modernism with a focus on urban intelligence and nocturnal safety. Soft bokeh effects and sharp architectural lines blend together in a high-tech aesthetic."></div>
<div class="absolute inset-0 z-10 bg-gradient-to-t from-background via-transparent to-transparent opacity-90"></div>
<!-- Content Wrapper -->
<main class="relative z-20 w-full max-w-[480px] px-gutter py-xl">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-secondary-container rounded-full flex items-center justify-center amber-glow mb-md">
<span class="material-symbols-outlined text-on-secondary text-display" data-icon="lightbulb" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<h1 class="font-display text-display text-secondary tracking-tight">LumenCity</h1>
<p class="font-body-md text-on-surface-variant mt-xs">Infrastructure Management Portal</p>
</div>
<!-- Auth Card -->
<section class="glass-card rounded-xl p-xl shadow-2xl flex flex-col gap-lg">
<!-- Toggle Header -->
<div class="flex items-center justify-between border-b border-white/10 pb-md">
<button class="font-display text-headline-md text-secondary border-b-2 border-secondary pb-xs">Sign In</button>
<button class="font-display text-headline-md text-on-surface-variant hover:text-secondary transition-colors pb-xs">Sign Up</button>
</div>
<!-- Social Auth Section -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm bg-surface-container-high border border-white/5 py-md px-md rounded-lg hover:bg-surface-variant transition-all active:scale-95">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5GmwOmuGENULbfwpnh2NGWhQmXKWKrhP_qmSPBdFZja4vgs64II75QiI0XFgwiK11fnjNhooTwaH8rtBeXejCuSei4m_JNKhJZeYZaxfY6rvWM6kNPw7InsKv4sJ708zo6BDH81qehMaJQEeWNxsA74ZxrgpZJIt9hf_iHW8YReqtFKMHVotrPDRtd1AGDc23Dz_-nxzd7-D6EbIO6ySfthFAzKwr8eE9FS8zmI80QLeLbLVaI3fSgmAVM44PlUad5Prqf2cEZHs"/>
<span class="font-label-caps text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-sm bg-surface-container-high border border-white/5 py-md px-md rounded-lg hover:bg-surface-variant transition-all active:scale-95">
<span class="material-symbols-outlined text-secondary" data-icon="apartment">apartment</span>
<span class="font-label-caps text-on-surface">CityID</span>
</button>
</div>
<div class="flex items-center gap-md">
<div class="h-px w-full bg-white/10"></div>
<span class="font-label-caps text-outline shrink-0 uppercase tracking-widest">or email</span>
<div class="h-px w-full bg-white/10"></div>
</div>
<!-- Email/Password Form -->
<form class="flex flex-col gap-lg">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-on-surface-variant ml-xs">Admin Email</label>
<div class="relative amber-glow-focus transition-all rounded-lg">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-md text-on-surface placeholder:text-outline focus:ring-0 focus:border-secondary transition-colors" placeholder="admin@lumencity.gov" type="email"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center ml-xs">
<label class="font-label-caps text-on-surface-variant">Access Password</label>
<a class="font-body-sm text-secondary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative amber-glow-focus transition-all rounded-lg">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-md text-on-surface placeholder:text-outline focus:ring-0 focus:border-secondary transition-colors" placeholder="••••••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
</div>
</div>
<div class="flex items-center gap-sm">
<input class="w-5 h-5 rounded bg-surface-container-low border-outline-variant text-secondary focus:ring-secondary/20" id="remember" type="checkbox"/>
<label class="font-body-sm text-on-surface-variant" for="remember">Remember this terminal session</label>
</div>
<button class="bg-secondary-container text-on-secondary font-display text-headline-md py-md rounded-lg amber-glow hover:opacity-90 active:scale-95 transition-all" type="submit">
          Authorize Access
        </button>
</form>
<!-- Security Sanction Notice -->
<div class="bg-error-container/20 border border-error/20 p-md rounded-lg flex gap-md items-start">
<span class="material-symbols-outlined text-error" data-icon="policy">policy</span>
<p class="font-body-sm text-on-error-container italic leading-tight">
          This is a secure municipal portal. Unauthorized access is monitored and subject to District 7 protocols.
        </p>
</div>
</section>
<!-- Footer Links -->
<footer class="mt-xl flex justify-center gap-xl">
<a class="font-label-caps text-outline hover:text-secondary transition-colors" href="#">System Privacy</a>
<a class="font-label-caps text-outline hover:text-secondary transition-colors" href="#">Operational Terms</a>
<a class="font-label-caps text-outline hover:text-secondary transition-colors" href="#">Contact Support</a>
</footer>
</main>
<!-- Decoration elements (amber dots representing city lights) -->
<div class="absolute top-1/4 left-10 w-2 h-2 bg-secondary rounded-full amber-glow opacity-40"></div>
<div class="absolute bottom-1/3 right-20 w-3 h-3 bg-secondary-fixed-dim rounded-full amber-glow opacity-30"></div>
<div class="absolute top-2/3 left-1/4 w-1 h-1 bg-secondary rounded-full amber-glow opacity-50"></div>
<div class="absolute top-1/2 right-1/4 w-2 h-2 bg-secondary-container rounded-full amber-glow opacity-20"></div>
</body></html>
