<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bubbly-shadow {
            box-shadow: 0 20px 40px -15px rgba(46, 186, 178, 0.15);
        }
        .van-bounce {
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1.1); }
            50% { transform: translateY(-5px) scale(1.1); }
        }
    </style>
<script id="tailwind-config">

                      "error": "#ba1a1a",

                      "on-primary": "#ffffff",
                      "primary-fixed": "#78f6ed",
                      "on-primary-fixed": "#00201e",
                      "tertiary-container": "#9aabaa",
                      "on-background": "#1a1c1c",
                      "outline": "#6c7a78",
                      "inverse-surface": "#2f3131",
                      "background": "#f9f9f9",
                      "error-container": "#ffdad6",
                      "on-tertiary-fixed": "#0e1e1e",
                      "secondary": "#78555b",
                      "on-primary-container": "#004541",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body-md text-on-background min-h-screen overflow-hidden flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 rounded-b-[32px] bg-white/80 backdrop-blur-md shadow-[0_20px_40px_-15px_rgba(46,186,178,0.12)] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border-[3px] border-[#FF85B2] p-0.5 overflow-hidden">
<img alt="Pet profile" class="w-full h-full object-cover rounded-full" data-alt="A close-up high-resolution portrait of a happy Golden Retriever puppy with a soft, fluffy coat, set against a bright white and soft teal studio background. The dog is looking directly at the camera with bright eyes and a slight tongue-out expression, capturing a cheerful and nurturing pet-care aesthetic. The lighting is soft and high-key to emphasize the clean, professional grooming vibe of the brand." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA16Waa882ETNv9Upyua5Z6C2HFXEbYDcTXSeulcbrgHUwqFbWAf_GAOoA6xJBcXg9le5tBv2wv2jOXyVXZcjxYIY6Hxo4vcHxHVbHxF-jN6zN2mHWYXuVtYsiIwJoNVHrGaaALwE-4QmnOyBwwlvpQxbt1l-DHr2z5s9E7ej3oZ7ABY1C6fYPp2aUMgxqfT5ipkK-YIb16IiAOucJ49q-zODitcTS9ACey5esure7xkGQEh3YMfwlIGooHLAXPwjDGf5MwJ5xkihEl"/>
</div>
</div>
<h1 class="text-[#2EBAB2] font-black text-2xl tracking-tighter">Splish Splash</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-50 transition-colors active:scale-95">
<span class="material-symbols-outlined text-[#2EBAB2]" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Map Canvas (Full Screen) -->
<main class="flex-grow relative mt-0">
<!-- Map Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover grayscale opacity-40" data-alt="A minimalist, stylized city map view with soft grey streets and pastel-colored blocks, representing an urban residential area. The perspective is top-down and clean, featuring rounded corner geometry for buildings and wide, airy roads. The overall color palette is muted and professional, using pale teals and soft whites to maintain the airy, stress-free grooming app aesthetic." data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCeRTDXpUvNFRso6_DehrUb-BFz3rDrJCNGo9MLSj1Dt9-pat6zAGmrwSUyAkX9d_qWJzw38sV2ntsRUTpFYkiFBe7NFglfj8_DfBn2As3GCOmY0VRGQA5-It9JfEMnZcJ1watEveZTL3AtMi0Us57WgQFyKVwtD53PdxaK3q6q8XDPxlHn-Tz8AsieMDAhuVeagepApw8oO3_1AJGFzZDvWC4Omdjx_4rAGM9RWunREHokxHjBFrA4z-2L8oqUJGMuCjvoogxxZeGb"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
<!-- Van and House Markers -->
<div class="absolute inset-0 z-10 p-margin flex flex-col justify-center items-center">
<!-- House (Destination) -->
<div class="absolute top-[30%] right-[25%] flex flex-col items-center">
<div class="bg-secondary-container w-14 h-14 rounded-full flex items-center justify-center bubbly-shadow border-4 border-white">
<span class="material-symbols-outlined text-[#FF85B2] text-3xl" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<div class="mt-2 bg-white px-3 py-1 rounded-full shadow-sm">
<span class="text-label-sm text-secondary">Your Home</span>
</div>
</div>
<!-- Path Line (Dotted) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 400 800">
<path d="M120 600 Q 150 450 300 320" fill="none" opacity="0.4" stroke="#2EBAB2" stroke-dasharray="8,8" stroke-linecap="round" stroke-width="4"></path>
</svg>
<!-- Van (Current Location) -->
<div class="absolute bottom-[35%] left-[20%] van-bounce flex flex-col items-center">
<div class="bg-primary-container w-16 h-16 rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(46,186,178,0.4)] border-4 border-white">
<span class="material-symbols-outlined text-white text-3xl" data-icon="local_shipping" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
<div class="mt-2 bg-primary-container text-white px-4 py-1.5 rounded-full shadow-lg">
<span class="text-label-md">Splish Van</span>
</div>
</div>
</div>
<!-- Floating Tracker Card -->
<div class="absolute bottom-32 left-margin right-margin z-20">
<div class="bg-white rounded-lg p-lg bubbly-shadow border border-slate-100 flex flex-col gap-md">
<div class="flex justify-between items-start">
<div class="flex gap-md items-center">
<div class="w-14 h-14 rounded-full bg-secondary-container p-0.5 border-2 border-white shadow-sm overflow-hidden">
<img alt="Sarah - The Groomer" class="w-full h-full object-cover rounded-full" data-alt="A warm and friendly professional headshot of a female pet groomer named Sarah, who has a kind smile and is dressed in a clean teal uniform. The background is a soft-focus pet grooming salon with warm, inviting lighting. Her expression is nurturing and trustworthy, perfectly aligning with the brand's friendly and professional identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgRRfXoPk19gOnwPRuwI1av3S9Wdh8sj-5FWrlzvY8W2vvbVZkBkqm7kABZEq8_7qWUNUHmDUkbYUSMTLA8QAmaoC427Iw_3q9D0h_e4dnsJef7eInz3Sf_CiGz6subtD3ThCFiyffpenFVdWdIeVugU7hagV1mdR4G5KRBVltGkyyaESPuFZkXrAUC6cSJjsgPfBXLtcox3nFuSnCU3ztiIMogyPFfhHbYnCPwhyXaZr5bEx8SCrS6FVru4eOhGQeGk_5gi5DS_5q"/>
</div>
<div>
<h3 class="text-headline-md text-on-surface">Sarah</h3>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-yellow-400 text-sm" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-label-md text-slate-500">4.9 • Certified Groomer</span>
</div>
</div>
</div>
<div class="text-right">
<span class="text-headline-lg text-[#2EBAB2] block">5 min</span>
<span class="text-label-sm text-slate-400 uppercase tracking-wider">Arrival</span>
</div>
</div>
<div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
<div class="h-full bg-[#2EBAB2] w-3/4 rounded-full relative">
<div class="absolute right-0 top-0 h-full w-4 bg-white/30 animate-pulse"></div>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-[#FF85B2] animate-ping"></div>
<span class="text-body-md text-slate-600">Washing the bubbles...</span>
</div>
<button class="bg-[#FDF2F7] text-[#FF85B2] px-sm py-xs rounded-full text-label-md font-bold hover:bg-secondary-container transition-all">
                        Call Sarah
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 m-4 rounded-[40px] z-50 bg-white/90 backdrop-blur-xl border-t border-slate-100 shadow-[0_-10px_30px_rgba(46,186,178,0.15)] flex justify-around items-center w-[calc(100%-2rem)] h-20 px-4 pb-safe">
<div class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-[#2EBAB2] transition-all">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_SANS'] font-semibold text-[11px]">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-[#2EBAB2] transition-all">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Plus_Jakarta_SANS'] font-semibold text-[11px]">Gallery</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#FDF2F7] text-[#FF85B2] rounded-full px-5 py-2 transition-all scale-110">
<span class="material-symbols-outlined" data-icon="local_shipping" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
<span class="font-['Plus_Jakarta_SANS'] font-semibold text-[11px]">Tracker</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-[#2EBAB2] transition-all">
<span class="material-symbols-outlined" data-icon="calendar_add_on">calendar_add_on</span>
<span class="font-['Plus_Jakarta_SANS'] font-semibold text-[11px]">Book</span>
</div>
</nav>
</body></html>
