<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#3c2f00",
                        "primary-fixed": "#ffe088",
                        "tertiary-fixed": "#e4e2e1",
                        "on-error-container": "#ffdad6",
                        "on-background": "#e5e2e1",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container": "#20201f",
                        "error-container": "#93000a",
                        "on-secondary": "#462a12",
                        "surface": "#131313",
                        "tertiary-fixed-dim": "#c8c6c6",
                        "tertiary-container": "#b4b2b2",
                        "surface-container-highest": "#353535",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary-container": "#454545",
                        "on-surface": "#e5e2e1",
                        "secondary-container": "#624228",
                        "surface-dim": "#131313",
                        "primary-container": "#d4af37",
                        "on-surface-variant": "#d0c5af",
                        "surface-tint": "#e9c349",
                        "on-tertiary-fixed": "#1b1c1c",
                        "inverse-surface": "#e5e2e1",
                        "on-secondary-container": "#dcb08e",
                        "on-primary-fixed-variant": "#574500",
                        "on-secondary-fixed-variant": "#5f4026",
                        "on-error": "#690005",
                        "surface-bright": "#393939",
                        "on-primary-fixed": "#241a00",
                        "secondary": "#ebbe9b",
                        "on-tertiary-fixed-variant": "#474747",
                        "surface-variant": "#353535",
                        "outline": "#99907c",
                        "error": "#ffb4ab",
                        "tertiary": "#d0cdcd",
                        "primary": "#f2ca50",
                        "on-tertiary": "#303030",
                        "inverse-primary": "#735c00",
                        "inverse-on-surface": "#313030",
                        "secondary-fixed": "#ffdcc2",
                        "background": "#131313",
                        "on-secondary-fixed": "#2d1602",
                        "primary-fixed-dim": "#e9c349",
                        "secondary-fixed-dim": "#ebbe9b",
                        "outline-variant": "#4d4635",
                        "on-primary-container": "#554300"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "80px",
                        "gutter": "16px",
                        "base": "8px",
                        "md": "24px",
                        "margin-mobile": "20px",
                        "sm": "12px",
                        "margin-desktop": "64px",
                        "xs": "4px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Playfair Display"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Playfair Display"],
                        "display-xl": ["Playfair Display"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}],
                        "headline-md": ["28px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-lg": ["40px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "display-xl": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .champagne-glow:hover {
            box-shadow: 0 0 20px 2px rgba(242, 202, 80, 0.4);
        }
        .input-underline-glow:focus-within .underline-bar {
            width: 100%;
            box-shadow: 0 4px 12px -2px rgba(242, 202, 80, 0.3);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden">
<!-- Split Screen Container -->
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Left Side: Visual Anchor -->
<section class="relative w-full md:w-1/2 lg:w-3/5 h-[409px] md:h-screen overflow-hidden">
<img alt="Luxury Penthouse Shelving" class="absolute inset-0 w-full h-full object-cover grayscale-[20%] contrast-125" data-alt="A cinematic, wide-angle shot of a high-end luxury penthouse interior at dusk. The focus is a bespoke modular shelving unit crafted from rich, warm oak wood with polished champagne gold metallic joints and supports. Soft, integrated LED strips cast a warm, atmospheric glow across the architectural lines. The background shows floor-to-ceiling windows overlooking a shimmering city skyline. The lighting is sophisticated and low-key, emphasizing structural precision and artisanal material quality." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPdf_zlMsDHLYS01JFg9qSCogzOQvUiP0ZK2Qrt0OgTTDdOPNgqOXwcrWOpNOmBVfoq1vyGLARSbqzXDOt2P6jOsd70IDlosw9Y1T92oTTXO2YLKKEXqTlLawFK2GPGdhJycewmGKNJ5C3lEbT0g0aoOsxZmVYFcjhaimQrlzKc--MUVbbTO1IJdRJNHj7TBByQNvz7QCN6YXeUr59E4st4ZJYhE3plrKRdLNs9SHD1J7rWZEtK5sj7DRvkpc8BFXrgI2-NKBtEDbM"/>
<!-- Tonal Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-surface/80 via-transparent to-transparent md:bg-gradient-to-r md:from-transparent md:to-surface/40"></div>
<!-- Brand Mark -->
<div class="absolute top-md left-margin-mobile md:left-margin-desktop z-10">
<span class="font-headline-lg text-headline-lg font-bold tracking-tighter text-primary">STUDIO-SHELF</span>
</div>
<!-- Contextual Quote / Technical Spec -->
<div class="absolute bottom-xl left-margin-mobile md:left-margin-desktop z-10 max-w-sm hidden md:block">
<p class="font-headline-md text-headline-md text-on-surface mb-xs italic">"Precision in every joint, warmth in every grain."</p>
<div class="h-px w-12 bg-primary mb-sm"></div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-[0.2em]">Model V-01 Architectural System</p>
</div>
</section>
<!-- Right Side: Interaction Canvas -->
<section class="w-full md:w-1/2 lg:w-2/5 min-h-[614px] md:min-h-screen bg-surface-container flex items-center justify-center p-margin-mobile md:p-margin-desktop relative">
<!-- Subtle Radial Glow in Background -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="w-full max-w-md relative z-10">
<!-- Tab Navigation -->
<div class="flex gap-lg mb-xl border-b border-outline-variant/30">
<button class="pb-base font-label-sm text-label-sm text-primary border-b-2 border-primary transition-all duration-300">
                        SIGN IN
                    </button>
<button class="pb-base font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-all duration-300">
                        SIGN UP
                    </button>
</div>
<!-- Form Header -->
<header class="mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Access your curated studio configuration.</p>
</header>
<!-- Authentication Form -->
<form class="space-y-lg">
<!-- Email Field -->
<div class="group relative input-underline-glow">
<label class="block font-label-sm text-label-sm text-outline mb-xs transition-colors group-focus-within:text-primary" for="email">EMAIL ADDRESS</label>
<input class="w-full bg-transparent border-none p-0 py-base text-on-surface placeholder:text-surface-variant focus:ring-0 font-body-lg text-body-lg" id="email" placeholder="architect@studio.com" type="email"/>
<div class="absolute bottom-0 left-0 h-[1px] w-full bg-outline-variant/50"></div>
<div class="absolute bottom-0 left-0 h-[1.5px] w-0 bg-primary transition-all duration-500 underline-bar"></div>
</div>
<!-- Password Field -->
<div class="group relative input-underline-glow">
<div class="flex justify-between items-end mb-xs">
<label class="block font-label-sm text-label-sm text-outline transition-colors group-focus-within:text-primary" for="password">PASSWORD</label>
<a class="font-label-sm text-[10px] text-on-surface-variant hover:text-primary transition-colors" href="#">FORGOT?</a>
</div>
<div class="relative">
<input class="w-full bg-transparent border-none p-0 py-base text-on-surface placeholder:text-surface-variant focus:ring-0 font-body-lg text-body-lg" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-outline text-sm cursor-pointer hover:text-primary transition-colors">visibility</span>
</div>
<div class="absolute bottom-0 left-0 h-[1px] w-full bg-outline-variant/50"></div>
<div class="absolute bottom-0 left-0 h-[1.5px] w-0 bg-primary transition-all duration-500 underline-bar"></div>
</div>
<!-- Actions -->
<div class="pt-md space-y-md">
<button class="w-full bg-primary text-on-primary font-label-sm text-label-sm py-md rounded-lg champagne-glow transition-all duration-300 flex items-center justify-center gap-base" type="submit">
                            ENTER STUDIO
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<button class="w-full bg-transparent border border-outline-variant text-on-surface font-label-sm text-label-sm py-md rounded-lg hover:bg-surface-variant/30 transition-all duration-300" type="button">
                            CONTINUE AS GUEST
                        </button>
</div>
</form>
<!-- Footer Note -->
<footer class="mt-xl text-center">
<p class="font-label-sm text-[11px] text-outline uppercase tracking-widest leading-loose">
                        By entering, you agree to our <a class="text-primary hover:underline" href="#">Structural Standards</a> <br/> &amp; <a class="text-primary hover:underline" href="#">Privacy Charter</a>.
                    </p>
</footer>
</div>
<!-- Aesthetic Accent: LED Line -->
<div class="absolute bottom-0 right-0 w-32 h-32 pointer-events-none">
<div class="absolute bottom-base right-base w-12 h-[1px] bg-primary/40"></div>
<div class="absolute bottom-base right-base h-12 w-[1px] bg-primary/40"></div>
<div class="absolute bottom-base right-base w-2 h-2 rounded-full bg-primary blur-[2px]"></div>
</div>
</section>
</main>
<!-- Global Layout Separation Logic (Subtle glow at edges) -->
<div class="fixed top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
<div class="fixed bottom-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</body></html>
