<!DOCTYPE html>

        }
        .inner-glow {
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md min-h-screen pb-32">

<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-highest border border-outline-variant/30">
<img alt="Executive Profile" class="w-full h-full object-cover" data-alt="A professional headshot of a senior male executive with a focused expression, wearing a tailored dark suit. The setting is a blurred, high-end corporate office with soft ambient lighting. The visual style is crisp and authoritative, aligning with a graphite and silver executive dashboard theme." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAo9UhcQX-9D9Y_4G_dsSOIznPBTvB17itH3WtzHRsBgge-BTi8mUa7X1hLRavec1xz5OpdkHGXV3MpPcTu02euNqL3kNp0ZvmuTCYeHqeW8dLxX_p8LMk0kjd8ILlUwpK1cp87UNSti0j5QZ4cCFDNsZEhaxnFSpfG_BftlN1_twc9f-6cu5Fp0inTJAESLa72gH6bg32GWM0-Vr8CDyYpLuvgTpMZogUoyogcOsrEr5Dyc6L_-NFR6xEq83-drTcyRJQarcQCvLlw"/>
</div>
</div>
<h1 class="font-display-xl text-headline-md tracking-tighter text-on-surface">COMMAND-WALL</h1>
<div class="flex items-center gap-xs text-primary transition-colors hover:bg-surface-container-highest/20 p-2 rounded cursor-pointer active:scale-95 duration-200">
<span class="material-symbols-outlined">signal_cellular_alt</span>
</div>
</header>
<main class="pt-20 px-gutter space-y-md">
<!-- Technical Health Indicators -->
<div class="flex justify-end items-center gap-sm">
<div class="glass-panel bento-border rounded-lg px-base py-xs flex items-center gap-xs">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">Live Stream</span>
</div>
<div class="glass-panel bento-border rounded-lg px-base py-xs flex items-center gap-xs">
<span class="material-symbols-outlined text-label-caps" style="font-size: 14px;">speed</span>
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">48ms</span>
</div>
</div>
<!-- Bento Grid Layout -->
<div class="grid grid-cols-2 gap-sm">
<!-- Main Video Feed (Spans 2 columns) -->
<section class="col-span-2 aspect-video bg-surface-container-high rounded-xl bento-border inner-glow relative overflow-hidden group">

<div class="absolute bottom-0 left-0 w-full p-md bg-gradient-to-t from-background to-transparent">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-weight="fill">person</span>
<h2 class="font-headline-md text-body-lg text-on-surface">Executive Boardroom Alpha</h2>
</div>
</div>
<div class="absolute top-sm right-sm flex gap-xs">
<div class="glass-panel px-base py-xs rounded text-label-caps text-on-surface border border-white/10 uppercase tracking-tighter">HD 1080P</div>
</div>
</section>
<!-- Shared Content Preview (1x1) -->
<section class="aspect-square bg-surface-container-high rounded-xl bento-border inner-glow relative overflow-hidden">
<div class="p-sm flex justify-between items-start">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">Shared Content</span>
<span class="material-symbols-outlined text-primary" data-weight="fill">settings_input_hdmi</span>
</div>
<div class="mt-xs px-sm">
<img alt="HDMI Content Preview" class="w-full h-32 object-cover rounded-lg border border-outline-variant/20" data-alt="A clean and professional data visualization dashboard displaying financial growth charts and analytical metrics. The colors are predominantly royal blue and silver against a dark graphite background. The aesthetic is sharp, technical, and executive, representing a live data stream shared during a mission-critical meeting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQ_yuzIiHubHBtQzY_I0EWW-NCL5plAR0k7ystuL3AUA0j6uz6YIHyKU5VaNVhsMFqywiiYFG2zwaUSRbb-coTM86GvvmW-WLW1BlooboPMwCld4Ac3fNQ1f792aqxBRXfOw_dprDURi5HwFhZleqbwgCr03wx2BUzXGfPCeqIQKCKObeckj_NB8pU2Kv7vIF6y-JfzanyIMpIcwuppELb80usPnUjpAYFh-Ro4NETFcZVzExjppee-3z8bKJijyuQp3nC1vj1tecB"/>
</div>
<div class="absolute bottom-sm left-sm right-sm">
<p class="font-label-caps text-label-caps text-on-surface-variant">HDMI IN: STRATEGY_Q4.PDF</p>
</div>
</section>
<!-- Participants Grid (1x1) -->
<section class="aspect-square bg-surface-container-high rounded-xl bento-border inner-glow p-sm flex flex-col justify-between">
<div>
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">Participants</span>
<div class="grid grid-cols-2 gap-xs mt-sm">
<div class="aspect-square rounded-lg bg-surface-container border border-outline-variant/30 flex items-center justify-center relative">
<img alt="Participant 1" class="w-full h-full object-cover rounded-lg opacity-60" data-alt="A professional close-up portrait of a businesswoman in her late 30s, looking directly at the camera with a confident smile. She is in a brightly lit, modern office environment. The image is clean and high-contrast, integrated perfectly into a sophisticated dark-themed UI." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBznAA_p9o6Dim8Pky70Yhz6UVBPRps6jx1-jqMZw1lYc1kH1VV-4Xbja4OJBCwR7bdaOlmDsEort9lCEYV2ZpNxPtp1etaQ8DOcLmMiq7NdU3uQK57jetPaCHPXFu0O6B43lctcFMNVPivJCqeJjB0m8u8SlKwCwjSikiZborTmZKsdAFQMumSCBf-H9poVdQ7i6fMqzDULer1GZnWRpRKPFNNUT8hshBH-Rfus185GoZM75HrkgQWkApV25WOtc_rRbizIgaxiGtb"/>
<div class="absolute bottom-xs right-xs w-2 h-2 rounded-full bg-primary ring-4 ring-surface-container"></div>
</div>
<div class="aspect-square rounded-lg bg-surface-container border border-outline-variant/30 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</div>
<div class="aspect-square rounded-lg bg-surface-container border border-outline-variant/30 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</div>
<div class="aspect-square rounded-lg bg-surface-container-highest border border-outline-variant/30 flex items-center justify-center">
<span class="text-label-caps font-label-caps text-on-surface">+8</span>
</div>
</div>
</div>
<button class="w-full py-xs rounded glass-panel border border-outline-variant/20 font-label-caps text-label-caps hover:bg-surface-container-highest/40 transition-colors uppercase">View All</button>
</section>
<!-- Executive Controls (Spans 2 columns) -->
<section class="col-span-2 grid grid-cols-2 gap-sm">
<button class="bg-primary-container text-primary font-label-caps text-label-caps py-lg rounded-xl flex flex-col items-center justify-center gap-xs border border-primary/20 active:scale-95 transition-all uppercase tracking-widest shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-headline-md" data-weight="fill">mic_off</span>
                    Mute All
                </button>
<button class="bg-error-container text-error font-label-caps text-label-caps py-lg rounded-xl flex flex-col items-center justify-center gap-xs border border-error/20 active:scale-95 transition-all uppercase tracking-widest shadow-lg shadow-error-container/20">
<span class="material-symbols-outlined text-headline-md" data-weight="fill">call_end</span>
                    End Meeting
                </button>
</section>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-margin py-base bg-surface/80 backdrop-blur-xl border-t border-outline-variant/10 shadow-xl rounded-t-xl">
<div class="flex flex-col items-center justify-center text-primary font-bold bg-primary-container/20 rounded-full py-1 px-4 active:scale-90 transition-transform duration-200 cursor-pointer">

</div>

</div>
<div class="flex flex-col items-center justify-center text-secondary opacity-60 hover:text-on-surface transition-all active:scale-90 transition-transform duration-200 cursor-pointer">
<span class="material-symbols-outlined">security</span>
<span class="font-label-caps text-label-caps mt-xs">Settings</span>
</div>
