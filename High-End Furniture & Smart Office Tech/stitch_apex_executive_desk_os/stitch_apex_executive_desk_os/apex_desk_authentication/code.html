<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #121317;
            color: #e2e2e7;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .milled-input {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.5);
        }
        .sky-blue-glow {
            box-shadow: 0 0 12px 0 rgba(0, 122, 255, 0.2);
        }
        .knurled-texture {
            background-image: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(142, 146, 147, 0.1) 2px, rgba(142, 146, 147, 0.1) 3px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#c8c6c5",
                        "on-error": "#690005",
                        "primary-container": "#121212",
                        "on-tertiary-container": "#0079fc",
                        "primary-fixed-dim": "#c8c6c5",
                        "tertiary-fixed-dim": "#adc6ff",
                        "background": "#121317",
                        "tertiary": "#adc6ff",
                        "secondary-fixed": "#e3e2e7",
                        "on-tertiary-fixed": "#001a41",
                        "secondary-container": "#46464b",
                        "secondary": "#c6c6cb",
                        "on-primary-fixed": "#1c1b1b",
                        "tertiary-fixed": "#d8e2ff",
                        "primary-fixed": "#e5e2e1",
                        "on-primary": "#313030",
                        "inverse-primary": "#5f5e5e",
                        "primary": "#c8c6c5",
                        "on-secondary": "#2f3034",
                        "surface-container-lowest": "#0c0e12",
                        "on-primary-fixed-variant": "#474646",
                        "surface-container-low": "#1a1c1f",
                        "on-secondary-container": "#b5b4ba",
                        "error-container": "#93000a",
                        "surface-container-high": "#282a2e",
                        "surface-container-highest": "#333539",
                        "on-tertiary": "#002e69",
                        "secondary-fixed-dim": "#c6c6cb",
                        "error": "#ffb4ab",
                        "inverse-surface": "#e2e2e7",
                        "on-surface-variant": "#c4c7c7",
                        "on-secondary-fixed": "#1a1b1f",
                        "surface-variant": "#333539",
                        "on-tertiary-fixed-variant": "#004493",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#121317",
                        "on-surface": "#e2e2e7",
                        "on-background": "#e2e2e7",
                        "surface": "#121317",
                        "outline-variant": "#444748",
                        "surface-container": "#1e2023",
                        "on-secondary-fixed-variant": "#46464b",
                        "outline": "#8e9192",
                        "tertiary-container": "#00112f",
                        "on-primary-container": "#7e7d7d",
                        "inverse-on-surface": "#2f3034",
                        "surface-bright": "#38393d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin": "32px",
                        "gutter": "16px",
                        "unit": "4px",
                        "control-gap": "8px",
                        "panel-padding": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "data-mono": ["JetBrains Mono"],
                        "display-xl": ["Inter"],
                        "body-md": ["Inter"],
                        "label-xs": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                        "data-mono": ["14px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "display-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                        "label-xs": ["11px", {"lineHeight": "1.0", "letterSpacing": "0.08em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="overflow-hidden">
<main class="flex h-screen w-full">
<!-- Visual Hardware Side (Left) -->
<section class="relative hidden md:flex md:w-1/2 lg:w-3/5 h-full overflow-hidden border-r border-outline-variant">
<img alt="Apex-Desk Hardware" class="absolute inset-0 w-full h-full object-cover grayscale opacity-60" data-alt="A high-fidelity close-up of a premium executive standing desk made of brushed aluminum and matte carbon fiber. The hardware is illuminated by a flowing liquid light effect in sky blue that ripples across the surface edges. The atmosphere is professional and moody, with deep matte black shadows and sharp metallic highlights. Soft blue ambient glows emanate from hidden LED channels within the desk's structure, emphasizing precision engineering." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFuqq9zh1awbAb8iUxDCgmSSefw9afeNnGwAE9HB-fess874uWI1T0CiY8p1cT8pD9uwK16F-DDXNR4We5NhoSCSp31BB3e2yrcgy_HLt6M6sZFfsOcqmQIYk-PU4OjhzC6ntRb3Il0hpa3lnuqAWfkCGTTr1CsRmdeCdLday-lG4fGV3lKcPnsHb3VBeCxQgInj1JUM9Qo8w0no-zNFf-8Rk0wRShWpvgWITHSbx9cDihV0UgcOQyWuWFiMnnZHzs8O5jLZC9BYfx"/>
<!-- Liquid Light Overlay Effect -->
<div class="absolute inset-0 bg-gradient-to-br from-transparent via-on-tertiary-container/10 to-on-tertiary-container/5 mix-blend-screen"></div>
<div class="relative z-10 p-margin flex flex-col justify-between h-full w-full">
<div>
<h1 class="font-headline-lg text-headline-lg font-bold text-on-surface tracking-tighter">APEX_CORE</h1>
<div class="mt-unit w-12 h-0.5 bg-on-tertiary-container"></div>
</div>
<div class="max-w-md">
<p class="font-data-mono text-data-mono text-on-tertiary-container mb-control-gap">SYSTEM STATUS: READY</p>
<h2 class="font-display-xl text-display-xl text-on-surface mb-panel-padding leading-tight">Master the flow of your workspace.</h2>
<div class="flex gap-gutter">
<div class="flex flex-col">
<span class="font-label-xs text-label-xs text-outline uppercase">PRECISION</span>
<span class="font-data-mono text-headline-lg text-on-surface">0.1mm</span>
</div>
<div class="w-px h-10 bg-outline-variant"></div>
<div class="flex flex-col">
<span class="font-label-xs text-label-xs text-outline uppercase">STABILITY</span>
<span class="font-data-mono text-headline-lg text-on-surface">99.9%</span>
</div>
</div>
</div>
</div>
<!-- Technical Knurling Decoration -->
<div class="absolute bottom-0 right-0 w-64 h-64 knurled-texture opacity-20 transform rotate-45 translate-x-32 translate-y-32"></div>
</section>
<!-- Authentication Form Side (Right) -->
<section class="w-full md:w-1/2 lg:w-2/5 h-full bg-surface-container-lowest flex flex-col justify-center px-margin md:px-24">
<div class="w-full max-w-sm mx-auto">
<header class="mb-margin">
<span class="font-label-xs text-label-xs text-on-tertiary-container uppercase tracking-[0.2em] mb-control-gap block">Identity Portal</span>
<h2 class="font-headline-lg text-headline-lg font-bold text-on-surface">Access Terminal</h2>
</header>
<form class="space-y-panel-padding" onsubmit="return false;">
<!-- Email Input -->
<div class="space-y-unit">
<label class="font-label-xs text-label-xs text-outline uppercase tracking-widest" for="email">Network Identifier</label>
<div class="relative">
<input class="w-full bg-primary-container border border-outline-variant text-on-surface font-data-mono text-body-md py-4 px-4 rounded-none focus:ring-1 focus:ring-on-tertiary-container focus:border-on-tertiary-container milled-input transition-all placeholder:opacity-30" id="email" placeholder="USER_ID@APEX.DOMAIN" type="email"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-sm" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-unit">
<div class="flex justify-between items-end">
<label class="font-label-xs text-label-xs text-outline uppercase tracking-widest" for="password">Security Key</label>
<a class="font-label-xs text-label-xs text-on-tertiary-container hover:underline" href="#">RECOVER KEY</a>
</div>
<div class="relative">
<input class="w-full bg-primary-container border border-outline-variant text-on-surface font-data-mono text-body-md py-4 px-4 rounded-none focus:ring-1 focus:ring-on-tertiary-container focus:border-on-tertiary-container milled-input transition-all placeholder:opacity-30" id="password" placeholder="••••••••••••" type="password"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-sm" data-icon="key">key</span>
</div>
</div>
<!-- Actions -->
<div class="pt-control-gap space-y-gutter">
<button class="w-full py-4 bg-on-tertiary-container text-primary-container font-label-xs text-label-xs font-bold uppercase tracking-widest sky-blue-glow hover:opacity-90 active:scale-[0.99] transition-all flex items-center justify-center gap-unit">
                            Initialize Session
                            <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="relative py-unit flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-xs text-label-xs text-outline">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Executive Access -->
<button class="w-full py-4 border border-outline-variant text-on-surface font-label-xs text-label-xs font-bold uppercase tracking-widest hover:bg-surface-container-high transition-colors flex items-center justify-center gap-unit group">
<span class="material-symbols-outlined text-sm text-on-tertiary-container" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
                            Executive Access
                            <span class="material-symbols-outlined text-sm opacity-0 group-hover:opacity-100 transition-opacity" data-icon="corporate_fare">corporate_fare</span>
</button>
</div>
</form>
<footer class="mt-margin pt-margin border-t border-outline-variant/30 flex flex-col gap-unit">
<p class="font-body-md text-sm text-outline text-center">
                        First deployment? <a class="text-on-surface font-bold hover:text-on-tertiary-container transition-colors" href="#">Register Unit</a>
</p>
<div class="flex justify-center gap-gutter mt-control-gap">
<span class="font-label-xs text-[9px] text-outline opacity-50 uppercase">v2.4.0-stable</span>
<span class="font-label-xs text-[9px] text-outline opacity-50 uppercase">Encrypt: AES-256</span>
</div>
</footer>
</div>
</section>
</main>
<!-- Floating Branding Elements -->
<div class="fixed top-margin right-margin md:right-auto md:left-margin pointer-events-none">
<div class="flex items-center gap-unit">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="token" style="font-variation-settings: 'FILL' 1;">token</span>
<span class="font-data-mono text-label-xs text-on-surface tracking-tighter uppercase font-bold">AERO_CORE OS</span>
</div>
</div>
</body></html>
