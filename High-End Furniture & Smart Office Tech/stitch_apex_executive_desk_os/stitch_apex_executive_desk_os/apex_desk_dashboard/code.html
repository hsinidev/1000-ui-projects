<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#313030",
                        "secondary-container": "#46464b",
                        "inverse-primary": "#5f5e5e",
                        "surface-bright": "#38393d",
                        "surface-container-high": "#282a2e",
                        "on-primary-fixed": "#1c1b1b",
                        "surface-container-lowest": "#0c0e12",
                        "on-tertiary-fixed": "#001a41",
                        "on-background": "#e2e2e7",
                        "outline": "#8e9192",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-container": "#0079fc",
                        "on-surface": "#e2e2e7",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#adc6ff",
                        "surface-dim": "#121317",
                        "background": "#121317",
                        "secondary-fixed": "#e3e2e7",
                        "surface-container-highest": "#333539",
                        "primary-fixed-dim": "#c8c6c5",
                        "on-surface-variant": "#c4c7c7",
                        "on-primary-container": "#7e7d7d",
                        "tertiary-fixed": "#d8e2ff",
                        "on-primary-fixed-variant": "#474646",
                        "surface": "#121317",
                        "on-error": "#690005",
                        "on-tertiary-fixed-variant": "#004493",
                        "tertiary-container": "#00112f",
                        "tertiary": "#adc6ff",
                        "on-tertiary": "#002e69",
                        "error-container": "#93000a",
                        "primary-container": "#121212",
                        "on-secondary": "#2f3034",
                        "on-secondary-fixed": "#1a1b1f",
                        "inverse-surface": "#e2e2e7",
                        "primary-fixed": "#e5e2e1",
                        "surface-tint": "#c8c6c5",
                        "surface-container": "#1e2023",
                        "surface-container-low": "#1a1c1f",
                        "primary": "#c8c6c5",
                        "outline-variant": "#444748",
                        "surface-variant": "#333539",
                        "secondary": "#c6c6cb",
                        "inverse-on-surface": "#2f3034",
                        "on-secondary-container": "#b5b4ba",
                        "on-secondary-fixed-variant": "#46464b",
                        "secondary-fixed-dim": "#c6c6cb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "control-gap": "8px",
                        "gutter": "16px",
                        "margin": "32px",
                        "panel-padding": "24px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-xs": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "data-mono": ["JetBrains Mono"],
                        "display-xl": ["Inter"]
                    },
                    "fontSize": {
                        "label-xs": ["11px", {"lineHeight": "1.0", "letterSpacing": "0.08em", "fontWeight": "700"}],
                        "headline-lg": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                        "data-mono": ["14px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "display-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .brushed-metal {
            background: linear-gradient(180deg, #1e2023 0%, #121317 100%);
            border-top: 1px solid #8e9192;
        }
        .knurled-texture {
            background-image: radial-gradient(#444748 0.5px, transparent 0.5px);
            background-size: 4px 4px;
        }
        .liquid-fill {
            background: linear-gradient(180deg, #0079fc 0%, #004493 100%);
            box-shadow: 0 0 20px rgba(0, 121, 252, 0.4);
        }
        .active-glow {
            box-shadow: 0 0 12px rgba(0, 121, 252, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md selection:bg-on-tertiary-container selection:text-white overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter h-16 bg-surface-container-lowest border-b border-outline">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">bluetooth_connected</span>
<h1 class="font-headline-lg text-headline-lg tracking-tight font-bold text-on-surface uppercase">APEX-DESK</h1>
</div>
<div class="flex items-center gap-4">
<span class="font-label-xs text-label-xs text-on-tertiary-container uppercase tracking-widest">Connected</span>
<button class="material-symbols-outlined text-on-surface hover:text-on-tertiary-container transition-colors">settings</button>
</div>
</header>
<main class="pt-20 pb-24 px-gutter flex flex-col gap-6">
<!-- Height Status Display -->
<section class="relative bg-surface-container-low rounded-xl p-panel-padding border border-outline-variant overflow-hidden">
<div class="flex justify-between items-end mb-8 relative z-10">
<div class="flex flex-col">
<span class="font-label-xs text-label-xs text-outline uppercase tracking-widest mb-1">Current Height</span>
<div class="flex items-baseline gap-1">
<span class="font-data-mono text-display-xl text-on-surface">110</span>
<span class="font-data-mono text-headline-lg text-outline">cm</span>
</div>
</div>
<div class="flex flex-col items-end">
<span class="font-label-xs text-label-xs text-on-tertiary-container uppercase tracking-widest mb-1">Target 110cm</span>
<span class="font-data-mono text-body-md text-outline">Transitioning...</span>
</div>
</div>
<!-- Liquid Progress Bar Container -->
<div class="relative h-24 bg-surface-container-highest rounded-lg border border-outline-variant overflow-hidden">
<div class="absolute inset-0 knurled-texture opacity-10"></div>
<!-- Liquid Fill Component -->
<div class="absolute bottom-0 left-0 w-full bg-on-tertiary-container liquid-fill" style="height: 72%;">
<div class="absolute top-0 left-0 w-full h-2 bg-white/20 blur-sm"></div>
</div>
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<span class="font-label-xs text-label-xs text-white/50 tracking-[0.3em] uppercase">System Optimized</span>
</div>
</div>
</section>
<!-- One-Tap Presets Grid -->
<section class="flex flex-col gap-4">
<h2 class="font-label-xs text-label-xs text-outline uppercase tracking-widest px-1">One-Tap Presets</h2>
<div class="grid grid-cols-3 gap-3">
<!-- Preset: Sit -->
<button class="brushed-metal flex flex-col items-center justify-center gap-3 py-6 rounded-xl border border-outline-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 0;">chair</span>
<span class="font-label-xs text-label-xs text-outline uppercase tracking-widest">Sit</span>
<span class="font-data-mono text-xs text-outline-variant">72cm</span>
</button>
<!-- Preset: Stand (Active State) -->
<button class="bg-tertiary-container/20 flex flex-col items-center justify-center gap-3 py-6 rounded-xl border border-on-tertiary-container active-glow active:scale-95 transition-all">
<span class="material-symbols-outlined text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">accessibility_new</span>
<span class="font-label-xs text-label-xs text-on-tertiary-container uppercase tracking-widest">Stand</span>
<span class="font-data-mono text-xs text-on-tertiary-container">110cm</span>
</button>
<!-- Preset: Focus -->
<button class="brushed-metal flex flex-col items-center justify-center gap-3 py-6 rounded-xl border border-outline-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 0;">center_focus_strong</span>
<span class="font-label-xs text-label-xs text-outline uppercase tracking-widest">Focus</span>
<span class="font-data-mono text-xs text-outline-variant">85cm</span>
</button>
</div>
</section>
<!-- Daily Activity Summary -->
<section class="bg-surface-container rounded-xl p-panel-padding border border-outline-variant">
<div class="flex items-center justify-between mb-6">
<h2 class="font-label-xs text-label-xs text-on-surface uppercase tracking-widest">Daily Activity</h2>
<span class="material-symbols-outlined text-outline text-sm">history</span>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1 p-4 bg-surface-container-low border border-outline-variant rounded-lg">
<span class="font-label-xs text-label-xs text-outline uppercase">Standing Time</span>
<div class="flex items-baseline gap-1">
<span class="font-data-mono text-headline-lg text-on-surface">4.2</span>
<span class="font-data-mono text-label-xs text-outline">hrs</span>
</div>
<div class="mt-2 h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-on-tertiary-container w-[70%]"></div>
</div>
</div>
<div class="flex flex-col gap-1 p-4 bg-surface-container-low border border-outline-variant rounded-lg">
<span class="font-label-xs text-label-xs text-outline uppercase">Burned</span>
<div class="flex items-baseline gap-1">
<span class="font-data-mono text-headline-lg text-on-surface">248</span>
<span class="font-data-mono text-label-xs text-outline">kcal</span>
</div>
<div class="mt-2 h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-on-tertiary-container w-[45%]"></div>
</div>
</div>
</div>
<!-- Activity Sparkline -->
<div class="mt-6 p-4 bg-surface-container-lowest border border-outline-variant rounded-lg h-24 relative overflow-hidden">
<div class="absolute top-2 left-4 font-label-xs text-[9px] text-outline uppercase">Real-time engagement</div>
<img class="w-full h-full object-cover opacity-40 mix-blend-screen" data-alt="A macro photography shot of a high-tech digital oscilloscope display showing a bright sky blue waveform against a pitch-black background. The lighting is dark and dramatic, emphasizing the precision and technical nature of the data. The overall aesthetic is minimalist and professional, consistent with a high-performance executive workspace dashboard." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAO8Qxih813H6P-8jAk90FUx_MvGz_fN5hFEUnQM_107vHMVfbHmGhncHLvB8zwiDWOxMK97FDYNEOUNz1xYjr8sgoObP7fS1yXPGBozmfxKMJMROp7rlmDOC5PG2rg2z-_0QpYlu4Ic4l7YR-JMsKHQ0n_6SCBv7RIvR5iZLbCMWhnRUtoPb9Jvo3iV-NFNxaam8eCs4aUhn2iektf7OM6JQKsRXRDlyRIRUmalAS6ELDD1KQiFCby-tasVmshSoej0SrvpBvEjE_g"/>
</div>
</section>
<!-- Fine Tuning Dial Simulation -->
<section class="flex flex-col items-center justify-center py-4">
<div class="w-48 h-48 rounded-full border-4 border-surface-container-highest flex items-center justify-center relative active:rotate-1 transition-transform">
<div class="absolute inset-0 rounded-full border border-outline-variant/30 knurled-texture"></div>
<div class="w-40 h-40 bg-surface-container rounded-full border border-outline-variant flex flex-col items-center justify-center shadow-inner z-10">
<span class="material-symbols-outlined text-on-tertiary-container mb-2">unfold_more</span>
<span class="font-label-xs text-label-xs text-outline uppercase">Fine Tune</span>
</div>
<!-- Needle -->
<div class="absolute top-2 left-1/2 -translate-x-1/2 w-1 h-4 bg-on-tertiary-container rounded-full z-20 active-glow"></div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface-container-lowest border-t border-outline">
<a class="flex flex-col items-center justify-center text-on-tertiary-container font-bold bg-tertiary-container/10 rounded-xl p-2 shadow-[0_0_12px_rgba(0,121,252,0.2)]" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-label-xs text-label-xs uppercase tracking-widest mt-1">Quick</span>
</a>
<a class="flex flex-col items-center justify-center text-outline p-2 hover:text-on-tertiary-container transition-all" href="#">
<span class="material-symbols-outlined">timer</span>
<span class="font-label-xs text-label-xs uppercase tracking-widest mt-1">Timer</span>
</a>
<a class="flex flex-col items-center justify-center text-outline p-2 hover:text-on-tertiary-container transition-all" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="font-label-xs text-label-xs uppercase tracking-widest mt-1">Stats</span>
</a>
<a class="flex flex-col items-center justify-center text-outline p-2 hover:text-on-tertiary-container transition-all" href="#">
<span class="material-symbols-outlined">lightbulb</span>
<span class="font-label-xs text-label-xs uppercase tracking-widest mt-1">Light</span>
</a>
</nav>
</body></html>
