<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
    }
    .glass-overlay {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .glow-available { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
    .glow-occupied { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
    .glow-reserved { box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
    .glow-primary { box-shadow: 0 0 15px rgba(185, 199, 228, 0.4); }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface/10 backdrop-blur-[20px] border-b border-white/10 h-20 flex justify-between items-center px-gutter">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary active:scale-95 transition-transform duration-200">menu</button>
<h1 class="font-h2 text-h2 text-primary tracking-tight">Zen-Room</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border border-white/20 active:scale-95 transition-transform duration-200">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRGiuy5AnOIy9s_MdgNW4q8WyUlHYGvmxBt4PYSlczHl9AwiyGdHZreu_V4n9cFv7OmPfJPiki7XGoGYjPM19FkmQTd5l7j56FGm8I5Q_wBVBFRx7Jq6SYH7KiPBLWUhJ2Xs_r45nmv7Ctiks-U_mIVDpA9ctG40RBl8TGiVQ5KJPzrq0YUvRcjs4QHUh-tH1Z-WoUdYXUgYAVpWqf_lnzpwRi1znvXbMdBoQuw3J-B4byAXq7jGCEe14JeWYnQHE-ZpELYa_zR4g"/>
</div>
</header>
<!-- Main Content Area -->
<main class="pt-24 px-gutter flex flex-col gap-6">
<!-- Floor Map Section -->
<section class="relative w-full aspect-[4/5] rounded-xl overflow-hidden glass-card">
<div class="absolute inset-0 z-0 bg-[#0a0a0c]">
<!-- Conceptual Office Floor Plan Image -->
<img class="w-full h-full object-cover opacity-40 mix-blend-screen" data-alt="A highly detailed architectural floor plan of a modern office space, rendered in a sleek dark mode aesthetic with glowing cyan lines and deep midnight blue tones. The layout features minimalist geometric shapes representing acoustic pods, meeting rooms, and collaborative zones. The lighting is low-key, emphasizing the high-tech, digital silence atmosphere of a premium workspace." data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkyBVyFi1N9Qbh41VBASU8poIicB6ANPxxgcRgyHNX_wWEBPONkwE45J7Xq8FCVmibJ2M92K86nnnuPG3sSvvUoLzhe_QmRnQzsVBw0UWwcCGC8X05jk4J7SUNStpdcFtaRzbdzGcvsTuaV-MXGvGooND4_wcozUzNWfZpR9gTXm7YW2aF85l7HKNPNOxZurEnv_Ruwx1U4wfAnpoasSBOuvkiegD8VtfC08psP3mREo5yxNjNPx3vfnITAYrHd3Zn75io5Bqy1gU"/>
</div>
<!-- Pod Status Markers (Interactive Live Map) -->
<!-- Available Pod -->
<button class="absolute top-[20%] left-[30%] w-8 h-8 rounded-full bg-green-500/80 border border-white/40 glow-available active:scale-90 transition-transform">
<span class="sr-only">Pod 01 Available</span>
</button>
<!-- Occupied Pod -->
<button class="absolute top-[45%] left-[60%] w-8 h-8 rounded-full bg-red-500/80 border border-white/40 glow-occupied active:scale-90 transition-transform">
<span class="sr-only">Pod 02 Occupied</span>
</button>
<!-- Reserved Pod -->
<button class="absolute top-[70%] left-[25%] w-8 h-8 rounded-full bg-amber-500/80 border border-white/40 glow-reserved active:scale-90 transition-transform">
<span class="sr-only">Pod 03 Reserved</span>
</button>
<!-- Legend Overlay -->
<div class="absolute bottom-4 left-4 glass-card p-3 rounded-lg flex flex-col gap-2">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-green-500 glow-available"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Available</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-red-500 glow-occupied"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Occupied</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-amber-500 glow-reserved"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Reserved</span>
</div>
</div>
</section>
<!-- Selected Pod Details (Glassmorphic Overlay Simulation) -->
<section class="glass-overlay p-6 rounded-xl flex flex-col gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
<div class="flex justify-between items-start">
<div>
<h2 class="font-h2 text-h2 text-primary">Pod 01 • Zen Focus</h2>
<span class="font-label-caps text-label-caps text-primary tracking-widest uppercase">Level 4 North Wing</span>
</div>
<div class="px-3 py-1 rounded-full bg-green-500/20 border border-green-500/40">
<span class="font-label-caps text-label-caps text-green-400">AVAILABLE</span>
</div>
</div>
<div class="flex gap-4">
<div class="flex-1 glass-card p-4 rounded-lg text-center">
<span class="material-symbols-outlined text-primary mb-1">ac_unit</span>
<p class="font-label-caps text-label-caps text-on-surface-variant">Temp</p>
<p class="font-h2 text-body-lg text-white">22°C</p>
</div>
<div class="flex-1 glass-card p-4 rounded-lg text-center">
<span class="material-symbols-outlined text-primary mb-1">volume_off</span>
<p class="font-label-caps text-label-caps text-on-surface-variant">Acoustics</p>
<p class="font-h2 text-body-lg text-white">40dB</p>
</div>
<div class="flex-1 glass-card p-4 rounded-lg text-center">
<span class="material-symbols-outlined text-primary mb-1">timer</span>
<p class="font-label-caps text-label-caps text-on-surface-variant">Min Stay</p>
<p class="font-h2 text-body-lg text-white">15m</p>
</div>
</div>
<button class="w-full bg-primary text-on-primary-fixed py-4 rounded-xl font-h2 text-body-lg font-bold glow-primary active:scale-95 transition-transform">
        Book Session
      </button>
</section>
<!-- Floor Insights (Secondary Bento Style) -->
<div class="grid grid-cols-2 gap-4">
<div class="glass-card p-4 rounded-xl flex flex-col justify-between h-32">
<span class="font-label-caps text-label-caps text-on-surface-variant">Air Quality</span>
<div class="flex items-end justify-between">
<span class="font-h2 text-h2 text-primary">98</span>
<span class="font-label-caps text-label-caps text-green-400 mb-2">EXCELLENT</span>
</div>
</div>
<div class="glass-card p-4 rounded-xl flex flex-col justify-between h-32">
<span class="font-label-caps text-label-caps text-on-surface-variant">Floor Activity</span>
<div class="flex items-end justify-between">
<span class="font-h2 text-h2 text-primary">Low</span>
<span class="material-symbols-outlined text-primary mb-2">signal_cellular_1_bar</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-background/80 backdrop-blur-[40px] border-t border-white/10 rounded-t-xl px-gutter py-4 flex justify-around items-center h-20">
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary/80 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">nest_remote_comfort_sensor</span>
<span class="font-label-caps text-label-caps mt-1">Breathe</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary/80 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">graphic_eq</span>
<span class="font-label-caps text-label-caps mt-1">Acoustic</span>
</a>
<a class="flex flex-col items-center justify-center text-primary drop-shadow-[0_0_15px_rgba(185,199,228,0.4)] transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-caps text-label-caps mt-1">Map</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary/80 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">key</span>
<span class="font-label-caps text-label-caps mt-1">Book</span>
</a>
</nav>
<!-- Contextual FAB (Restricted to Map/Home context) -->
<button class="fixed bottom-24 right-6 w-14 h-14 rounded-full bg-primary text-on-primary-fixed flex items-center justify-center glow-primary active:scale-90 transition-transform z-40">
<span class="material-symbols-outlined">add</span>
</button>
</body></html>
