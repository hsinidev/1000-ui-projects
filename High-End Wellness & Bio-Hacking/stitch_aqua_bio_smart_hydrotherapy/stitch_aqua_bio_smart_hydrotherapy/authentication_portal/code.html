<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background-color: #101415;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-silk-border {
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .liquid-bg {
      background: radial-gradient(circle at 50% 50%, #1d2022 0%, #101415 100%);
      position: relative;
    }
    .liquid-accent {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 227, 253, 0.05) 0%, rgba(0, 227, 253, 0) 70%);
      filter: blur(60px);
      z-index: 0;
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-variant": "#323537",
            "error-container": "#93000a",
            "secondary": "#bdf4ff",
            "surface-container-low": "#191c1e",
            "secondary-container": "#00e3fd",
            "surface-container": "#1d2022",
            "on-surface-variant": "#c5c6cd",
            "on-surface": "#e0e3e5",
            "secondary-fixed-dim": "#00daf3",
            "surface": "#101415",
            "outline": "#8f9097",
            "primary-fixed": "#d8e3fa",
            "on-error-container": "#ffdad6",
            "outline-variant": "#44474c",
            "on-tertiary": "#2f3131",
            "on-secondary": "#00363d",
            "on-secondary-container": "#00616d",
            "on-secondary-fixed": "#001f24",
            "tertiary-fixed-dim": "#c6c6c7",
            "surface-container-lowest": "#0b0f10",
            "error": "#ffb4ab",
            "surface-container-high": "#272a2c",
            "inverse-surface": "#e0e3e5",
            "on-primary-fixed-variant": "#3c475a",
            "on-primary-fixed": "#111c2c",
            "inverse-primary": "#545f72",
            "on-tertiary-fixed-variant": "#454747",
            "tertiary-container": "#0e1011",
            "inverse-on-surface": "#2d3133",
            "surface-tint": "#bcc7dd",
            "background": "#101415",
            "surface-bright": "#363a3b",
            "secondary-fixed": "#9cf0ff",
            "tertiary-fixed": "#e2e2e2",
            "on-tertiary-fixed": "#1a1c1c",
            "primary-container": "#051020",
            "on-error": "#690005",
            "surface-dim": "#101415",
            "surface-container-highest": "#323537",
            "primary-fixed-dim": "#bcc7dd",
            "primary": "#bcc7dd",
            "on-tertiary-container": "#7b7c7c",
            "on-primary": "#263142",
            "on-background": "#e0e3e5",
            "on-secondary-fixed-variant": "#004f58",
            "tertiary": "#c6c6c7",
            "on-primary-container": "#727d91"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "xs": "4px",
            "xl": "64px",
            "sm": "12px",
            "gutter": "20px",
            "base": "8px",
            "md": "24px",
            "margin": "32px",
            "lg": "40px"
          },
          "fontFamily": {
            "label-caps": ["Sora"],
            "display-lg": ["Sora"],
            "title-sm": ["Sora"],
            "body-rg": ["Sora"],
            "headline-md": ["Sora"]
          },
          "fontSize": {
            "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.15em", "fontWeight": "600"}],
            "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
            "title-sm": ["20px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500"}],
            "body-rg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0.03em", "fontWeight": "400"}],
            "headline-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "500"}]
          }
        },
      },
    }
  </script>
</head>
<body class="bg-background text-on-surface font-body-rg text-body-rg min-h-screen flex flex-col liquid-bg">
<!-- Background Decorative Elements -->
<div class="liquid-accent -top-20 -left-20"></div>
<div class="liquid-accent bottom-0 right-0 opacity-50"></div>
<!-- Header Anchor -->
<header class="w-full flex justify-center py-xl z-10">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary-container text-4xl" data-icon="water_lux">water_lux</span>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight uppercase">AURA</h1>
</div>
</header>
<!-- Main Auth Canvas -->
<main class="flex-grow flex items-center justify-center px-gutter z-10 -mt-16">
<div class="w-full max-w-md backdrop-blur-3xl bg-surface/40 glass-silk-border rounded-xl shadow-2xl p-lg flex flex-col gap-lg">
<!-- Toggle Control -->
<div class="flex bg-surface-container-low rounded-full p-1 glass-silk-border">
<button class="flex-1 py-base px-md rounded-full font-label-caps text-label-caps bg-secondary-container text-on-secondary-container shadow-[0_0_15px_rgba(0,227,253,0.3)] transition-all">Sign In</button>
<button class="flex-1 py-base px-md rounded-full font-label-caps text-label-caps text-on-surface-variant hover:text-on-surface transition-all">Sign Up</button>
</div>
<!-- Welcome Text -->
<div class="text-center space-y-xs">
<h2 class="font-headline-md text-headline-md text-on-surface">Secure Access</h2>
<p class="text-on-surface-variant font-body-rg opacity-80">Authenticate to initialize your AURA profile.</p>
</div>
<!-- Auth Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-secondary ml-1">System ID</label>
<div class="relative group">
<input class="w-full bg-surface-variant/20 border-0 border-b-2 border-outline-variant focus:border-secondary-container focus:ring-0 transition-all py-md px-base text-on-surface placeholder:text-outline/50 rounded-t-lg" placeholder="admin@aura-hydro.bio" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary-container" data-icon="fingerprint">fingerprint</span>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-secondary ml-1">Access Cipher</label>
<div class="relative group">
<input class="w-full bg-surface-variant/20 border-0 border-b-2 border-outline-variant focus:border-secondary-container focus:ring-0 transition-all py-md px-base text-on-surface placeholder:text-outline/50 rounded-t-lg" placeholder="••••••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary-container" data-icon="lock_open">lock_open</span>
</div>
</div>
<!-- Action Area -->
<div class="flex items-center justify-between pt-sm">
<label class="flex items-center gap-xs cursor-pointer group">
<div class="w-5 h-5 rounded glass-silk-border bg-surface-variant/30 flex items-center justify-center group-hover:bg-surface-variant/50 transition-all">
<div class="w-2 h-2 rounded-full bg-secondary-container opacity-0"></div>
</div>
<span class="font-label-caps text-[10px] text-on-surface-variant group-hover:text-on-surface">Keep Session Live</span>
</label>
<a class="font-label-caps text-[10px] text-secondary hover:text-secondary-container transition-all" href="#">Lost Encryption Key?</a>
</div>
<!-- Remote Start Primary Button -->
<button class="w-full mt-lg group relative overflow-hidden py-md px-xl rounded-full bg-secondary-container text-on-secondary-container font-label-caps text-label-caps shadow-[0_0_30px_rgba(0,227,253,0.2)] hover:shadow-[0_0_40px_rgba(0,227,253,0.4)] transition-all active:scale-[0.98]">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="power_settings_new">power_settings_new</span>
<span>Remote Initialize</span>
</div>
</button>
</form>
<!-- Footer Help -->
<p class="text-center font-label-caps text-[10px] text-on-surface-variant mt-sm">
        Biometric encryption secured by <span class="text-secondary">AURA Quantum Vault</span>.
      </p>
</div>
</main>
<!-- Abstract Visual Component (Bottom Right) -->
<div class="fixed bottom-margin right-margin hidden lg:block opacity-40">
<div class="w-64 h-64 rounded-full border border-secondary-container/20 flex items-center justify-center animate-pulse">
<div class="w-48 h-48 rounded-full border border-secondary-container/30 flex items-center justify-center">
<div class="w-32 h-32 rounded-full border border-secondary-container/40 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary-container text-4xl" data-icon="fluid_med">fluid_med</span>
</div>
</div>
</div>
</div>
<!-- Footer Navigation Shell (Transactional Filter: Minimally relevant) -->
<footer class="w-full py-md z-10">
<div class="flex justify-between items-center px-margin max-w-7xl mx-auto">
<div class="font-label-caps text-label-caps text-on-surface-variant opacity-50 uppercase">© 2024 AURA Hydro Systems.</div>
<div class="flex gap-lg">
<a class="text-on-surface-variant font-body-rg text-[12px] hover:text-secondary transition-colors" href="#">Technical Support</a>
<a class="text-on-surface-variant font-body-rg text-[12px] hover:text-secondary transition-colors" href="#">Privacy Policy</a>
</div>
</div>
</footer>
<!-- Visual Texture Injection -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[1]">
<img class="w-full h-full object-cover mix-blend-overlay" data-alt="A macro shot of shimmering liquid surfaces with deep blue and cyan highlights. The lighting is clinical and sharp, reflecting off geometric ripples and glass-like water droplets. The overall mood is high-tech, medical, and premium, perfectly matching the dark mode aesthetic of a luxury hydro-tech interface. The composition is abstract and focused on the fluid movement of water in a controlled environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD2OUNEhzXYopX9LvXGXARbJbl8dIWE_rffJh5EVXb9soH5JpSz2lPmfR7DdDOUV35lw1pjdUqwEl0sZsMm8tyNDS-WMpfjKP2_r5o0Pp2Q364ov_OyH4j9Lqj3eh6JkM9sIGflw_9_hm9waYGr5N2aiJTzniVRjFGvVNmRmEfBpqsRop6uPrb38ZEJ_TrTkysqB7LUMtB0eKR24g_hjE2bk296mJTiwI2D1jFWvfaAR1vYBFzfs8aJyG5cUfG_vqd0qo660MVNtTY"/>
</div>
</body></html>
