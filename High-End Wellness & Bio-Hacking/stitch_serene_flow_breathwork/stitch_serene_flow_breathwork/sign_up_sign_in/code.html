            flex-direction: column;

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        }

<p class="font-body-lg text-body-lg text-white/90 drop-shadow-sm">Finding clarity in every breath.</p>
</div>
</div>

<div class="w-full md:w-1/2 p-lg md:p-xl flex flex-col justify-center bg-surface/40">
<div class="max-w-sm mx-auto w-full">
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-sm leading-tight">Begin Your Journey to Inner Peace</h1>
<p class="font-body-md text-on-surface-variant mb-lg">Create your account to start your personalized breathing practice.</p>
<form class="space-y-md">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-tertiary uppercase tracking-widest" for="email">Email Address</label>
<input class="w-full bg-white/50 border-b border-outline-variant focus:border-primary focus:ring-0 transition-all py-sm px-xs font-body-md rounded-t-base" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-tertiary uppercase tracking-widest" for="password">Password</label>
<input class="w-full bg-white/50 border-b border-outline-variant focus:border-primary focus:ring-0 transition-all py-sm px-xs font-body-md rounded-t-base" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<button class="pill-button w-full py-md px-lg text-on-primary font-label-sm rounded-full shadow-sm mt-md uppercase tracking-widest" type="submit">
                            Sign Up
                        </button>
</form>
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>

</div>

</div>
<p class="mt-xl text-center font-body-md text-on-surface-variant">
