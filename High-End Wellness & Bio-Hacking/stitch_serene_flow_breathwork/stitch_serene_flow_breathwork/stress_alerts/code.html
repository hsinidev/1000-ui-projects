<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#071e27",
                    "on-background": "#071e27",
                    "surface": "#f3faff",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-error-container": "#93000a",
                    "surface-dim": "#c7dde9",
                    "surface-variant": "#cfe6f2",
                    "inverse-surface": "#1e333c",
                    "on-surface-variant": "#43474a",
                    "on-secondary-fixed": "#201924",
                    "on-primary-container": "#606f78",
                    "inverse-on-surface": "#dff4ff",
                    "surface-bright": "#f3faff",
                    "outline": "#73787b",
                    "tertiary-container": "#f0f0f0",
                    "outline-variant": "#c3c7cb",
                    "on-secondary-fixed-variant": "#4d4450",
                    "surface-container": "#dbf1fe",
                    "on-tertiary-fixed": "#1a1c1c",
                    "secondary-fixed": "#ecdeee",
                    "on-primary-fixed": "#0f1d25",
                    "secondary": "#655b68",
                    "secondary-container": "#ecdeee",
                    "inverse-primary": "#bac9d3",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#d6e5ef",
                    "tertiary-fixed": "#e2e2e2",
                    "tertiary": "#5d5f5f",
                    "primary-fixed-dim": "#bac9d3",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "background": "#f3faff",
                    "surface-tint": "#526069",
                    "on-error": "#ffffff",
                    "primary-container": "#e3f2fd",
                    "on-tertiary-container": "#6b6d6d",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#cfc2d2",
                    "surface-container-high": "#d5ecf8",
                    "surface-container-highest": "#cfe6f2",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#e6f6ff",
                    "on-secondary-container": "#6b616e",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "primary": "#526069",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#3b4951"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "24px",
                    "gutter": "16px",
                    "xs": "4px",
                    "sm": "12px",
                    "xl": "80px",
                    "base": "8px",
                    "container-margin": "32px",
                    "lg": "48px"
            },
            "fontFamily": {
                    "headline-xl": ["Quicksand"],
                    "headline-md": ["Quicksand"],
                    "body-lg": ["Quicksand"],
                    "body-md": ["Quicksand"],
                    "label-sm": ["Quicksand"],
                    "headline-lg": ["Quicksand"]
            },
            "fontSize": {
                    "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "300"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .breath-orb {
            box-shadow: 0 0 60px 10px rgba(227, 242, 253, 0.6);
        }
        .hrv-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 0;
        }
        .lavender-gradient {
            background: linear-gradient(135deg, #f3faff 0%, #ecdeee 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface lavender-gradient min-h-screen selection:bg-primary-fixed">
<header class="bg-white/80 dark:bg-surface/80 backdrop-blur-xl text-primary dark:text-primary-fixed fixed top-0 left-0 w-full z-50 border-b border-white/50 dark:border-white/10 shadow-[0_15px_40px_rgba(227,242,253,0.4)]">
<div class="flex justify-between items-center w-full px-container-margin h-20">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">Breath-Work</h1>
</div>
<div class="flex items-center">
<button class="hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</div>
</header>
<main class="pt-28 pb-32 px-gutter max-w-2xl mx-auto flex flex-col items-center">
<div class="text-center space-y-4 mb-lg">
<div class="inline-flex items-center px-4 py-1.5 rounded-full bg-secondary-container text-on-secondary-container text-label-sm font-label-sm mb-4">
<span class="material-symbols-outlined text-[16px] mr-2" style="font-variation-settings: 'FILL' 1;">warning</span>
                STRESS DETECTED
            </div>
<h2 class="font-headline-xl text-headline-xl text-on-background px-4">
                Time for a moment of peace?
            </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">
                Your heart rate variability suggests you're under pressure. Let's take a beat together.
            </p>
</div>
<div class="w-full relative flex justify-center mb-xl">
<div class="w-64 h-64 rounded-full bg-white/40 flex items-center justify-center breath-orb relative">
<div class="w-48 h-48 rounded-full bg-primary-container/60 blur-xl absolute animate-pulse"></div>
<div class="w-40 h-40 rounded-full glass flex flex-col items-center justify-center text-center relative z-10">
<span class="material-symbols-outlined text-primary text-4xl mb-1">air</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-primary-container">Breath</span>
</div>
</div>
</div>
<div class="w-full glass rounded-lg p-md shadow-[0_15px_40px_rgba(227,242,253,0.4)] mb-lg">
<div class="flex justify-between items-center mb-md">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">HRV Analysis</span>
<span class="font-headline-md text-headline-md text-on-surface">Fluctuating</span>
</div>
<div class="text-right">
<span class="font-headline-md text-headline-md text-error">72 ms</span>
<div class="flex items-center justify-end text-error text-label-sm">
<span class="material-symbols-outlined text-sm">trending_down</span>
<span>-12%</span>
</div>
</div>
</div>
<div class="h-32 w-full relative">
<svg class="w-full h-full overflow-visible" viewbox="0 0 400 100">
<path class="hrv-path" d="M0,50 Q25,30 50,70 T100,40 T150,80 T200,30 T250,60 T300,20 T350,90 T400,50" fill="none" stroke="url(#gradient)" stroke-linecap="round" stroke-width="3"></path>
<defs>
<lineargradient id="gradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" stop-color="#526069"></stop>
<stop offset="100%" stop-color="#ba1a1a"></stop>
</lineargradient>
</defs>
</svg>
<div class="absolute bottom-0 left-0 w-full flex justify-between px-2 py-1 border-t border-outline-variant/20">
<span class="text-[10px] text-on-surface-variant/40">10:00 AM</span>
<span class="text-[10px] text-on-surface-variant/40">Now</span>
</div>
</div>
</div>
<button class="w-full py-md px-xl rounded-full bg-gradient-to-r from-primary to-secondary text-white font-headline-md text-headline-md shadow-xl hover:scale-[1.02] active:scale-95 transition-all duration-300">
            3-Minute Rescue Breath
        </button>
<div class="mt-md flex gap-sm">
<button class="flex-1 py-sm px-md rounded-full border border-outline-variant text-on-surface-variant font-label-sm text-label-sm hover:bg-surface-container transition-colors">
                Dismiss
            </button>
<button class="flex-1 py-sm px-md rounded-full border border-outline-variant text-on-surface-variant font-label-sm text-label-sm hover:bg-surface-container transition-colors">
                View Insights
            </button>
</div>
</main>
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/80 dark:bg-surface-container/80 backdrop-blur-2xl shadow-[0_-10px_30px_rgba(227,242,253,0.3)]">
<div class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors active:scale-95 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-headline-md">air</span>
<span class="font-label-sm text-label-sm">Breath</span>
</div>
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-2 scale-105 shadow-md active:scale-95 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-headline-md" style="font-variation-settings: 'FILL' 1;">self_improvement</span>
<span class="font-label-sm text-label-sm">Sessions</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors active:scale-95 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-headline-md">monitoring</span>
<span class="font-label-sm text-label-sm">Stats</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors active:scale-95 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-headline-md">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</div>
</footer>
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-primary-fixed/20 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-fixed/20 blur-[100px]"></div>
</div>
</body></html>
