<!DOCTYPE html>

<html class="light" lang="en"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .breath-circle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            position: relative;
        }
        .breath-glow {
            position: absolute;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(227, 242, 253, 0.8) 0%, rgba(227, 242, 253, 0) 70%);
            filter: blur(40px);
        }
        .breath-circle {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 40px rgba(227, 242, 253, 0.4);
            position: relative;
            z-index: 10;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen font-body-md text-on-surface overflow-x-hidden">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-surface/80 backdrop-blur-xl flex justify-between items-center w-full px-container-margin h-20 fixed top-0 z-50 border-b border-white/50 shadow-[0_15px_40px_rgba(227,242,253,0.4)]">
<button class="hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary">menu</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">Breath-Work</h1>
<button class="hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary">notifications</span>
</button>
</header>
<main class="pt-24 pb-32 px-gutter space-y-lg flex flex-col items-center">
<!-- Subtle Background Pulse (Visual only via styling) -->
<div class="fixed top-1/4 left-1/2 -translate-x-1/2 -z-10 w-[600px] h-[600px] rounded-full bg-gradient-to-br from-primary-container/30 to-surface-container-low/20 blur-[100px]"></div>
<!-- Greeting Section -->
<section class="w-full text-center space-y-xs">
<p class="font-label-sm text-label-sm text-on-surface-variant/60 uppercase tracking-widest">CURRENT STATE</p>
<h2 class="font-headline-lg text-headline-lg text-primary">Calm</h2>
</section>
<!-- The Breath Circle Component -->
<section class="breath-circle-container w-full">
<div class="breath-glow"></div>
<div class="breath-circle">
<div class="text-center">
<span class="material-symbols-outlined text-primary text-5xl opacity-40">air</span>
<p class="font-label-sm text-label-sm text-primary-fixed-variant mt-2 uppercase">Inhale</p>
</div>
</div>
<!-- Progress Ring Overlay -->
<svg class="absolute w-[280px] h-[280px] -rotate-90 pointer-events-none">
<circle cx="140" cy="140" fill="none" r="135" stroke="rgba(255,255,255,0.2)" stroke-width="2"></circle>
<circle class="text-primary" cx="140" cy="140" fill="none" r="135" stroke="currentColor" stroke-dasharray="848" stroke-dashoffset="300" stroke-linecap="round" stroke-width="3"></circle>
</svg>
</section>
<!-- Metric Cards Grid -->
<section class="grid grid-cols-2 gap-gutter w-full max-w-md">
<div class="glass-card rounded-lg p-md space-y-sm flex flex-col items-center justify-center text-center shadow-[0_15px_40px_rgba(227,242,253,0.4)]">
<span class="material-symbols-outlined text-primary">blood_pressure</span>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant/60">O2 LEVEL</p>
<p class="font-headline-md text-headline-md text-on-surface">98%</p>
</div>
</div>
<div class="glass-card rounded-lg p-md space-y-sm flex flex-col items-center justify-center text-center shadow-[0_15px_40px_rgba(227,242,253,0.4)]">
<span class="material-symbols-outlined text-primary">co2</span>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant/60">CO2 LEVEL</p>
<p class="font-headline-md text-headline-md text-on-surface">42 mmHg</p>
</div>
</div>
</section>
<!-- Action Card -->
<section class="w-full max-w-md">
<div class="glass-card rounded-lg p-md flex items-center justify-between shadow-[0_15px_40px_rgba(227,242,253,0.4)]">
<div class="flex items-center space-y-xs">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center mr-md">
<span class="material-symbols-outlined text-primary">timer</span>
</div>
<div class="flex flex-col">
<p class="font-body-md text-body-md font-semibold text-on-surface">Deep Sleep Prep</p>
<p class="font-label-sm text-label-sm text-on-surface-variant/60">12 min session</p>
</div>
</div>
<button class="bg-primary-container text-primary rounded-full p-sm hover:opacity-80 transition-all active:scale-95">
<span class="material-symbols-outlined">play_arrow</span>
</button>
</div>
</section>
<!-- Subtle Image Display -->
<section class="w-full max-w-md rounded-lg overflow-hidden glass-card shadow-lg">
<img alt="Peaceful Landscape" class="w-full h-32 object-cover opacity-60 grayscale hover:grayscale-0 transition-all duration-700" data-alt="A tranquil and misty mountain range at dawn with soft ethereal clouds rolling through the valleys. The lighting is cold, soft, and high-key, emphasizing a peaceful and light-mode aesthetic. The composition is minimalist with vast negative space, perfectly reflecting a serene wellness environment. The atmosphere is quiet, clinical, and calming, aligning with a brand built on the concept of air and breathing." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAk_SGYW_ixe1ft3rm8IwrHjdI7P5RtHcoKapMINNs5wlIV9Or2XDz_iGZbjRgWjxexpciJh8xxOsBrerx0RZBJ9fdb7qdUp92A_EARj41W1p0DCRzlciPSvV08BBTJ-lwByGlkFAblJleTAsr2yif99Gww7ShjfJqhDX3bxpmVUriIJMpQqyFG_YkgLEwCd-rfznNcquWExdSlfsGXdXrfKK7_p6J7APxu3brroZNBGv9DAETUA0hwDnG9yrNSoHIcPtQh0vQdDg"/>
<div class="p-md">
<p class="font-label-sm text-label-sm text-primary mb-xs uppercase tracking-tighter">Pro Tip</p>
<p class="font-body-md text-body-md text-on-surface">Keep your posture upright to allow maximum lung expansion.</p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/80 dark:bg-surface-container/80 backdrop-blur-2xl shadow-[0_-10px_30px_rgba(227,242,253,0.3)] rounded-t-lg">
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-2 scale-105 shadow-md active:scale-95 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">air</span>
<span class="font-label-sm text-label-sm">Breath</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors active:scale-95 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined">self_improvement</span>
<span class="font-label-sm text-label-sm">Sessions</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors active:scale-95 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined">monitoring</span>
<span class="font-label-sm text-label-sm">Stats</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors active:scale-95 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</nav>
</body></html>
