<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #131313;
            color: #e5e2e1;
            overflow-x: hidden;
        }
        .neural-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: flow 10s linear infinite;
        }
        @keyframes flow {
            to { stroke-dashoffset: 0; }
        }
        .glass-card {
            backdrop-filter: blur(16px);
            background: rgba(22, 23, 61, 0.4);
            border: 1px solid rgba(191, 243, 101, 0.1);
        }
        .active-surface {
            backdrop-filter: blur(16px);
            background: rgba(22, 23, 61, 0.6);
            border: 1px solid rgba(191, 243, 101, 0.2);
        }
        .mint-glow {
            box-shadow: 0 0 15px rgba(191, 243, 101, 0.3);
        }
        .brain-perspective {
            perspective: 1000px;
            transform: rotateX(15deg) rotateY(-5deg);
        }
    </style>

            darkMode: "class",

                extend: {
                    "colors": {

                        "surface-container-lowest": "#0e0e0e",

                        "surface-variant": "#353534",
                        "error-container": "#93000a",
                        "secondary": "#c2c2f2",
                        "outline": "#8d937e",
                        "primary-fixed": "#bff365",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#c3c9b2",
                        "on-surface": "#e5e2e1",
                        "secondary-fixed-dim": "#c2c2f2",
                        "surface": "#131313",
                        "primary-container": "#bef264",
                        "on-error": "#690005",
                        "surface-dim": "#131313",
                        "tertiary-fixed": "#e2dfff",

                        "xl": "0.5rem",

                        "lg": "24px",
                        "margin": "32px",
                        "md": "16px",

                        "xs": "4px",

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- Background Neural Path Layer -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-20">
<svg class="w-full h-full" viewbox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
<path class="neural-path" d="M -50 100 Q 150 150 200 400 T 450 700" fill="none" stroke="#BEF264" stroke-width="0.5"></path>
<path class="neural-path" d="M 450 50 Q 250 200 200 400 T -50 650" fill="none" stroke="#BEF264" stroke-width="0.5" style="animation-delay: -2s;"></path>
<path class="neural-path" d="M 100 -50 Q 150 300 200 400 T 300 850" fill="none" stroke="#BEF264" stroke-width="0.5" style="animation-delay: -5s;"></path>
</svg>
</div>
<!-- Top Navigation -->
<header class="flex justify-between items-center px-gutter py-md w-full sticky top-0 z-50 bg-surface-container/40 backdrop-blur-md border-b border-outline-variant/20">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary-fixed" style="font-variation-settings: 'FILL' 1;">sensors</span>
<span class="font-h2 text-h2 font-bold tracking-tighter text-primary-fixed">NEURO-FLOW</span>
</div>
<div class="px-sm py-xs bg-primary-container/10 border border-primary-fixed/20 rounded-lg">
<span class="font-label-caps text-label-caps text-primary-fixed uppercase">SYNC: OPTIMAL</span>
</div>
</header>
<main class="relative z-10 px-gutter mt-md">
<!-- Live EEG Waves Section -->
<section class="grid grid-cols-1 gap-md">
<div class="glass-card rounded-xl p-md">
<div class="flex justify-between items-center border-b border-white/10 pb-sm mb-md">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">LIVE EEG TELEMETRY</span>
<span class="font-label-caps text-label-caps text-primary-fixed">8.42 HZ</span>
</div>
<div class="space-y-md">
<!-- Alpha Wave -->
<div class="relative h-12 w-full flex items-center">
<span class="absolute left-0 font-label-caps text-[10px] text-on-secondary-container/60 uppercase">ALPHA</span>
<svg class="w-full h-8" preserveaspectratio="none" viewbox="0 0 300 40">
<path d="M0 20 Q 15 5 30 20 T 60 20 T 90 20 T 120 20 T 150 20 T 180 20 T 210 20 T 240 20 T 270 20 T 300 20" fill="none" stroke="#BEF264" stroke-width="1.5"></path>
</svg>
</div>
<!-- Beta Wave -->
<div class="relative h-12 w-full flex items-center">
<span class="absolute left-0 font-label-caps text-[10px] text-on-secondary-container/60 uppercase">BETA</span>
<svg class="w-full h-10" preserveaspectratio="none" viewbox="0 0 300 40">
<path d="M0 20 L 5 10 L 10 30 L 15 15 L 20 25 L 25 10 L 30 30 L 35 15 L 40 25 L 45 10 L 50 30 L 55 15 L 60 25 L 65 10 L 70 30 L 75 15 L 80 25 L 85 10 L 90 30 L 95 15 L 100 25 L 105 10 L 110 30 L 115 15 L 120 25 L 125 10 L 130 30 L 135 15 L 140 25 L 145 10 L 150 30 L 155 15 L 160 25 L 165 10 L 170 30 L 175 15 L 180 25 L 185 10 L 190 30 L 195 15 L 200 25 L 205 10 L 210 30 L 215 15 L 220 25 L 225 10 L 230 30 L 235 15 L 240 25 L 245 10 L 250 30 L 255 15 L 260 25 L 265 10 L 270 30 L 275 15 L 280 25 L 285 10 L 290 30 L 295 15 L 300 25" fill="none" opacity="0.6" stroke="#BEF264" stroke-width="1"></path>
</svg>
</div>
</div>
</div>
</section>
<!-- 3D Brain Model Canvas -->
<section class="relative h-[397px] my-md flex items-center justify-center brain-perspective overflow-visible">
<div class="absolute inset-0 z-0">
<img alt="Neural Brain Model" class="w-full h-full object-contain opacity-80 mix-blend-screen" data-alt="A stylized 3D human brain model glowing with bioluminescent neural networks against a deep matte black background. The brain features crystalline structures and translucent textures in shades of deep indigo and mint green. Bright mint glowing hotspots pulse rhythmically in the frontal and parietal lobes, simulating high neural activity. The overall visual is clinical, futuristic, and high-contrast, designed like a high-tech neuro-monitoring interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUXYw4TMDjTLo5XvPmzFkJhBXqQIl_yTS3-Lprhiq_uwUeWshkubpku0Spw7OyEI_dEBFfY6QICOLhzhDuUhlT441HjwfI6CrWN3ODVfBJzj1_c31atMypY-wMvF_miTR5Qf7PtYQDvEyrHGmX9-kctdaEs6IckWOaU8H0XXZ20FMjxzUThtanahp-KjSGRzT8emNXhOtDjBU4TTmcmjhzPmj7AJ74-DpHgiRRo9KrZWgYi5lbImO9TiD0pfDXDjpQWWEhzmNU89a2"/>
</div>
<!-- HUD Overlays -->
<div class="absolute top-0 left-0 active-surface rounded-lg p-sm border border-primary-fixed/20">
<div class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest mb-xs">Focus Score</div>
<div class="font-data-lg text-data-lg text-primary-fixed">92.4%</div>
</div>
<div class="absolute bottom-10 right-0 active-surface rounded-lg p-sm border border-primary-fixed/20 text-right">
<div class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest mb-xs">Sync Quality</div>
<div class="font-data-lg text-data-lg text-primary-fixed">OPTIMAL</div>
</div>
<!-- Active Zone Markers -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-4 h-4 bg-primary-container rounded-full mint-glow animate-pulse"></div>
<div class="absolute top-1/2 left-1/3 w-3 h-3 bg-primary-container rounded-full opacity-60 mint-glow"></div>
<div class="absolute top-1/3 right-1/4 w-5 h-5 bg-primary-container rounded-full opacity-40 mint-glow animate-ping"></div>
</section>
<!-- Technical Stats Grid -->
<section class="grid grid-cols-2 gap-md mb-xl">
<div class="glass-card rounded-xl p-md">
<span class="material-symbols-outlined text-primary-fixed mb-sm">psychology_alt</span>
<div class="font-label-caps text-[10px] text-on-surface-variant uppercase">NEURAL LATENCY</div>
<div class="font-data-lg text-data-lg text-on-surface">14ms</div>
</div>
<div class="glass-card rounded-xl p-md">
<span class="material-symbols-outlined text-primary-fixed mb-sm">bolt</span>
<div class="font-label-caps text-[10px] text-on-surface-variant uppercase">PEAK VOLTAGE</div>
<div class="font-data-lg text-data-lg text-on-surface">42µV</div>
</div>
<div class="glass-card rounded-xl p-md col-span-2">
<div class="flex justify-between items-end">
<div>
<div class="font-label-caps text-[10px] text-on-surface-variant uppercase mb-xs">SESSION DURATION</div>
<div class="font-data-lg text-data-lg text-on-surface">02:14:55</div>
</div>
<button class="bg-primary-container text-on-primary-container font-label-caps text-label-caps px-lg py-sm rounded-lg mint-glow transition-all active:scale-95">
                        PAUSE MONITOR
                    </button>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container/60 backdrop-blur-lg border-t border-outline-variant/30">
<div class="flex flex-col items-center justify-center text-on-secondary-container/60 hover:text-primary-fixed transition-all duration-200">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-label-caps text-label-caps uppercase mt-1">DASHBOARD</span>
</div>
<div class="flex flex-col items-center justify-center text-on-primary-container bg-primary-container/20 rounded-full px-4 py-1 shadow-[0_0_15px_rgba(191,243,101,0.3)] scale-110">
<span class="material-symbols-outlined" data-icon="psychology" style="font-variation-settings: 'FILL' 1;">psychology</span>
<span class="font-label-caps text-label-caps uppercase mt-1">NEURAL</span>
</div>
<div class="flex flex-col items-center justify-center text-on-secondary-container/60 hover:text-primary-fixed transition-all duration-200">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-caps text-label-caps uppercase mt-1">SESSIONS</span>
</div>
<div class="flex flex-col items-center justify-center text-on-secondary-container/60 hover:text-primary-fixed transition-all duration-200">
<span class="material-symbols-outlined" data-icon="settings_accessibility">settings_accessibility</span>
<span class="font-label-caps text-label-caps uppercase mt-1">PROFILE</span>
</div>
</nav>
</body></html>
