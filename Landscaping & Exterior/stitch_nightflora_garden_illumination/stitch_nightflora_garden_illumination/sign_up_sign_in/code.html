<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

        extend: {

            "error": "#ffb4ab",
            "outline-variant": "#524535",
            "on-background": "#d4e4fa",
            "on-secondary-fixed-variant": "#3e465e",
            "secondary-fixed": "#dae2ff",
            "on-primary-fixed": "#2a1800",
            "primary-container": "#ffb347",
            "surface-dim": "#051424",
            "secondary-container": "#3e465e",
            "primary-fixed-dim": "#ffb95a",
            "surface-bright": "#2c3a4c",
            "secondary": "#bec6e3",
            "inverse-on-surface": "#233143",
            "tertiary-fixed-dim": "#c6c6cc",
            "tertiary-container": "#c1c2c7",
            "on-error": "#690005",
            "outline": "#9f8e7c",
            "primary-fixed": "#ffddb6",
            "primary": "#ffd7a9",
            "on-tertiary": "#2f3035",
            "on-surface": "#d4e4fa",
            "error-container": "#93000a",
            "inverse-surface": "#d4e4fa",
            "tertiary": "#dedee3",
            "on-primary": "#462a00",
            "surface-container-low": "#0d1c2d",
            "surface-container-highest": "#273647",
            "background": "#051424",
            "on-secondary-fixed": "#131b30",
            "surface-variant": "#273647",
            "on-tertiary-fixed-variant": "#45474b",
            "on-error-container": "#ffdad6",
            "surface-container-lowest": "#010f1f",
            "on-secondary-container": "#adb4d1",
            "surface-container": "#122131",
            "on-surface-variant": "#d6c3b0"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "stack-lg": "48px",
            "margin-mobile": "16px",
            "stack-md": "24px",
            "margin-desktop": "64px",
            "base": "8px",
            "container-max": "1280px",
            "gutter": "24px",
            "stack-sm": "12px"
          },
          "fontFamily": {
            "body-lg": ["Manrope"],
            "headline-md": ["Noto Serif"],
            "body-md": ["Manrope"],
            "label-sm": ["Manrope"],
            "display-xl": ["Noto Serif"],
            "label-md": ["Manrope"],
            "headline-lg": ["Noto Serif"]
          },
          "fontSize": {
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
            "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "400"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
            "display-xl": ["64px", {"lineHeight": "72px", "letterSpacing": "-0.02em", "fontWeight": "400"}],
            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "headline-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.01em", "fontWeight": "400"}]
          }
        },
      },
    }

<style>
    .glass-card {
      background: rgba(26, 34, 56, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(45, 52, 63, 0.5);
    }
    .amber-glow-focus:focus-within {
      box-shadow: 0 0 15px rgba(255, 179, 71, 0.2);
      border-color: #ffb347;
    }
    .nocturnal-bg {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-on-surface overflow-hidden">
<!-- Background Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-slate-950/60 z-10"></div>
<div class="w-full h-full nocturnal-bg" data-alt="A panoramic nocturnal landscape showcasing a luxury architectural estate at midnight. The scene is illuminated by subtle amber pathway lights and spotlights hitting manicured trees and stone walls. Deep indigo and charcoal shadows create a sense of mystery and quiet luxury. The sky is a gradient of deep midnight blue with faint stars, reflecting a calm and sophisticated atmosphere." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBKVmjqSANLs-7oV0ooR2XlSfPyH1Mo_sWues3ju7jLCRlthnJ-V4XEMEUX-auErZnzFDguE_D4y3-I5e7fx10Z2QySa2beGur8VyWGJqSOUzZdhxV2uJwo9VLBqll2ZUtX1F3Ag-AAhZL9Zrg8iHyxR9wpQUTV24flU2fkv_3KFbdYQg7YXqXwVfl504sp7bEy7_T3iiA6m2KOvt2ukrl3VXteeAUcmQJiCPr9l3rKXP1WiokhN2AVUI-Zs9_a0nuUBYNlXC5MdE0')">
</div>
</div>
<!-- Content Canvas -->
<main class="relative z-20 w-full max-w-md px-margin-mobile md:px-0">
<!-- Brand Anchor -->
<div class="text-center mb-stack-md">
<h1 class="font-display-xl text-primary-container tracking-[0.2em] uppercase text-2xl font-bold mb-2">Lumina Pro</h1>
<p class="font-headline-md text-on-surface-variant text-label-md uppercase tracking-widest">Architectural Console</p>
</div>
<!-- Auth Card -->
<div class="glass-card rounded-xl shadow-2xl overflow-hidden p-8">
<!-- Tabs -->
<div class="flex border-b border-outline-variant mb-stack-md">
<button class="flex-1 pb-4 text-label-md font-bold text-primary-container border-b-2 border-primary-container transition-all">
          SIGN IN
        </button>
<button class="flex-1 pb-4 text-label-md font-bold text-on-tertiary-container hover:text-on-surface transition-all">
          CREATE ACCOUNT
        </button>
</div>
<!-- Form -->
<form action="#" class="space-y-stack-md">
<div class="space-y-base">
<label class="text-label-sm uppercase tracking-widest text-on-surface-variant block">Email Address</label>
<div class="amber-glow-focus transition-all duration-300 border-b border-outline-variant bg-surface-container-lowest/30 px-3 py-3 flex items-center">
<span class="material-symbols-outlined text-outline-variant mr-3" data-icon="mail">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-body-md placeholder:text-on-tertiary-container" placeholder="arch@lumina.com" type="email"/>
</div>
</div>
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="text-label-sm uppercase tracking-widest text-on-surface-variant block">Password</label>
<a class="text-label-sm text-primary-container hover:text-primary-fixed-dim transition-colors uppercase tracking-tighter" href="#">Forgot?</a>
</div>
<div class="amber-glow-focus transition-all duration-300 border-b border-outline-variant bg-surface-container-lowest/30 px-3 py-3 flex items-center">
<span class="material-symbols-outlined text-outline-variant mr-3" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-body-md placeholder:text-on-tertiary-container" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-slate-950 border border-primary-container py-4 text-primary-container font-label-md uppercase tracking-widest hover:shadow-[0_0_20px_rgba(255,179,71,0.3)] transition-all active:scale-95" type="submit">
          Access Console
        </button>
</form>
<!-- Divider -->
<div class="relative my-stack-md">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="px-4 bg-slate-900/50 backdrop-blur-md text-on-tertiary-container uppercase tracking-widest">Or authenticate via</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center gap-2 border border-outline-variant py-3 rounded-lg hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="nest_eco_leaf">nest_eco_leaf</span>
<span class="text-label-sm uppercase tracking-widest text-on-surface-variant group-hover:text-on-surface">Ecosystem</span>
</button>
<button class="flex items-center justify-center gap-2 border border-outline-variant py-3 rounded-lg hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="fingerprint">fingerprint</span>
<span class="text-label-sm uppercase tracking-widest text-on-surface-variant group-hover:text-on-surface">Secure ID</span>
</button>
</div>
</div>
<!-- Footer Identity -->
<div class="mt-stack-md text-center">
<p class="font-body-md text-on-tertiary-container text-label-sm uppercase tracking-[0.3em]">
        © 2024 Lumina Architectural Lighting.
      </p>
</div>
</main>
<!-- Decorative Light Bloom -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-primary-container/5 blur-[120px] rounded-full pointer-events-none"></div>
</body></html>
