<body class="bg-background font-body-md text-on-background selection:bg-primary-container selection:text-on-primary-container">
<main class="min-h-screen flex flex-col md:flex-row paper-texture">
<!-- Left Side: Visual Anchor -->
<section class="relative w-full md:w-1/2 min-h-[409px] md:min-h-screen overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Zen Garden" class="w-full h-full object-cover" data-alt="A serene Japanese Zen garden at dawn with raked white sand forming circular patterns around dark, weathered moss-covered stones. Soft morning light filters through a thin mist, highlighting the delicate textures of a nearby maple tree with vibrant green leaves. The overall aesthetic is minimalist and high-end, using a palette of sand, deep moss green, and pale wood tones to create a tranquil, meditative atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuANcSb6mFcRbf6zqXstSRbQ8LU_bot76q_qt9qQq6-5UxmocRRb7isWK-NkBof06Zp-oMk9RIxTGO8IBBR5iWHRIJMYMH9wTB3eJoStpPVJ4CTJXsgo7IN4G2t8iR9QJy8BS3OizMhFwqdtp-GFSYn8ThrkqYnsaptkrddPXc4ROAiDPzBPH7NKvOFQdrSkqiHGfKZOXPhUva-WzW-gdepuGUDqv8BURmT8RmzvCWDu4aNb8DvKXuYyTIGaPaj2PHHVjyAlh-2UvQyB"/>
<div class="absolute inset-0 bg-primary/10 mix-blend-multiply"></div>
</div>
<!-- Brand Anchor in Split View -->
<div class="absolute top-12 left-12 z-10">
<h1 class="text-2xl font-headline-md tracking-[0.3em] text-white uppercase">ZENHAVEN</h1>
</div>
<div class="absolute bottom-12 left-12 right-12 z-10 text-white">
<p class="font-headline-lg mb-4">Enter the space between.</p>
<div class="w-16 h-px bg-white/40"></div>
<p class="mt-4 font-body-md text-white/80 max-w-sm italic">"Ma" is the pure space that allows the beauty of the object to breathe.</p>
</div>
</section>
<!-- Right Side: Interaction Canvas -->
<section class="w-full md:w-1/2 flex flex-col justify-center items-center px-8 md:px-24 py-16 bg-surface-container-low">
<div class="w-full max-w-md">
<!-- Authentication Toggle -->
<div class="flex gap-8 mb-16">
<button class="font-label-caps text-primary border-b-2 border-primary pb-2 uppercase tracking-widest transition-all">
                        Sign In
                    </button>
<button class="font-label-caps text-outline hover:text-primary pb-2 uppercase tracking-widest transition-all">
                        Sign Up
                    </button>
</div>
<!-- Form Heading -->
<header class="mb-12">
<h2 class="font-headline-xl text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-on-surface-variant">Continue your journey into architectural serenity.</p>
</header>
<!-- Input Fields -->
<form class="space-y-10">
<div class="relative">
<label class="block font-label-caps text-on-surface-variant uppercase mb-2" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary text-body-lg transition-colors duration-400 placeholder:text-outline-variant" id="email" name="email" placeholder="name@studio.com" type="email"/>
</div>
<div class="relative">
<div class="flex justify-between items-center mb-2">
<label class="block font-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label-caps text-tertiary-container hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary text-body-lg transition-colors duration-400" id="password" name="password" type="password"/>
</div>
<div class="flex items-center gap-3">
<input class="w-4 h-4 rounded-none border-outline-variant text-primary focus:ring-primary-container bg-transparent" id="remember" type="checkbox"/>
<label class="font-body-md text-on-surface-variant" for="remember">Keep my session active</label>
</div>
<div class="pt-6">
<button class="w-full py-5 border border-primary text-primary font-label-caps uppercase tracking-widest hover:bg-primary hover:text-surface transition-all duration-400 ease-in-out" type="submit">
                            Begin Experience
                        </button>
</div>
</form>
<!-- Social/Alternative Auth -->
<div class="mt-16 text-center">
<div class="relative flex items-center mb-10">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-caps text-outline uppercase">Or connect via</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 border border-outline-variant font-label-caps uppercase hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-sm">nest_eco_leaf</span>
                            Google
                        </button>
<button class="flex items-center justify-center gap-3 py-3 border border-outline-variant font-label-caps uppercase hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-sm">spa</span>
                            Apple
                        </button>
</div>
</div>
<footer class="mt-16 text-center">
<p class="font-body-md text-on-surface-variant">
                        Designing for the future? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Request Portfolio Access</a>
</p>
</footer>
</div>
</section>
<!-- Aesthetic Vertical Element -->
<div class="hidden md:block fixed left-1/2 top-0 h-full w-px bg-outline-variant/30 transform -translate-x-1/2 z-20"></div>
</main>
<!-- Contextual Navigation Suppression Logic applied (Login Screen - No Global Nav) -->
</body></html>
