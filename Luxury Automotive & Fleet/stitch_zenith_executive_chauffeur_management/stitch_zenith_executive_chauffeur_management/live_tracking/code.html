<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "surface-dark": "#240f1b",
                        "accent-dark": "#361728",
                        "muted-dark": "#ce8db1",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #221610;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header: Minimalist Back-to-Main Exception -->
<header class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between p-4 bg-gradient-to-b from-black/60 to-transparent">
<button class="flex size-10 items-center justify-center rounded-full bg-surface-dark/80 backdrop-blur-md text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase tracking-[0.2em] text-muted-dark font-bold">Zenith-Fleet</span>
<h1 class="text-sm font-semibold">Live Tracking</h1>
</div>
<button class="flex size-10 items-center justify-center rounded-full bg-surface-dark/80 backdrop-blur-md text-white">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<!-- Map Section -->
<div class="relative flex-1 w-full bg-background-dark">
<div class="absolute inset-0 z-0 opacity-80" data-alt="A highly detailed dark-mode satellite map visualization of a dense urban city grid at night. The streets are rendered in deep charcoal and obsidian tones with glowing neon amber and primary orange veins representing traffic flow. A sharp, minimalist aesthetic dominates the view, with high-contrast architectural outlines and a sleek digital interface overlay. The lighting is moody and cinematic, emphasizing a premium technological tracking experience." data-location="New York City" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDzzd_E5hPlchV4CXMoMD8UViWGPgbiVcIi6gHpCOtOU2fnugsZQ9FVyk6Xt7XzOuAmIBubg9fDRCTjzxCO5G8Aw116NriTBSHKEnInHctCxwpQHSIU5RyqktjqHN99tdZ9cbjcYm0jaS7B-E7_tPAAJ5N8hac7VUp3I0LKyPnAA-tKb9gSFaW8QeB_v48PUXBLCTD7JwppxDtjTU4j7fBdhtPDFcE0s1fFiHdla9fvLZYWtCoY5665t8S4cR4dJ069B5Qu-DZ5v5fT"); background-size: cover; background-position: center;'>
</div>
<!-- Map Overlays (Markers) -->
<div class="absolute inset-0 z-10 flex items-center justify-center">
<!-- Vehicle Marker -->
<div class="relative flex flex-col items-center animate-pulse" style="margin-top: -80px; margin-left: 60px;">
<div class="flex size-12 items-center justify-center rounded-full bg-primary shadow-[0_0_20px_rgba(236,91,19,0.6)] border-2 border-white/20">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<div class="mt-2 rounded-lg bg-surface-dark/90 px-2 py-1 text-[10px] font-bold text-white shadow-lg backdrop-blur-sm">
                        MOVING
                    </div>
</div>
<!-- User Location Marker -->
<div class="relative flex flex-col items-center" style="margin-top: 120px; margin-left: -100px;">
<div class="flex size-10 items-center justify-center rounded-full bg-white shadow-xl">
<div class="size-4 rounded-full bg-blue-500 border-2 border-white"></div>
</div>
</div>
</div>
<!-- Zoom Controls -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 z-20 flex flex-col gap-2">
<button class="flex size-11 items-center justify-center rounded-xl bg-surface-dark shadow-xl text-white">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex size-11 items-center justify-center rounded-xl bg-surface-dark shadow-xl text-white">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="mt-4 flex size-11 items-center justify-center rounded-xl bg-primary shadow-xl text-white">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</div>
<!-- Tracking Card Content (Reused logic from Shared Components bottom-anchor) -->
<div class="relative z-30 flex flex-col items-stretch bg-surface-dark border-t border-accent-dark rounded-t-[2.5rem] shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<!-- Pull Handle -->
<div class="flex h-8 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-accent-dark"></div>
</div>
<div class="px-6 pb-8 pt-2">
<!-- Status & ETA -->
<div class="flex items-center justify-between mb-6">
<div class="flex flex-col">
<p class="text-muted-dark text-xs font-medium tracking-wide uppercase">Arriving in</p>
<h2 class="text-3xl font-bold text-white tracking-tight">4 <span class="text-lg font-normal text-muted-dark">mins</span></h2>
</div>
<div class="flex flex-col items-end">
<div class="flex items-center gap-1.5 bg-accent-dark px-3 py-1.5 rounded-full">
<span class="size-2 rounded-full bg-green-500 animate-pulse"></span>
<span class="text-[11px] font-bold text-white uppercase tracking-wider">Live Path</span>
</div>
</div>
</div>
<!-- Chauffeur & Vehicle Info -->
<div class="flex items-center gap-4 p-4 rounded-2xl bg-accent-dark/40 border border-accent-dark">
<div class="relative">
<img alt="Chauffeur Portrait" class="size-16 rounded-2xl object-cover" data-alt="A professional close-up portrait of a chauffeur in a sharp charcoal suit and crisp white shirt. He has a warm, confident smile and groomed appearance, set against a blurred background of a luxury vehicle interior. The lighting is soft and flattering, emphasizing a premium service aesthetic with a sophisticated, high-end color palette of deep blacks and subtle silver highlights." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8V3vniZx1kAyxops_zOYJUj4UhJEoc0vlNONhTg5Gfikry6wQ-GcTmb0i1mDb-T7rODB84tGBbQcM35d6kRTZwLmBHqBHgokjEQd4QT-O2mRP8zOmEH9mQteSiWB5sTZyvwLQnoKMC1I2OGS6clMoYWUb_kmQ5j3x-rRSqLdkBmd_13fl0WqSHYE_vdv8GG8nfvDVmqmM7V7-YJsMhT7i9j_PjJ72aNaX71WbIHSEJMCl-J51wJqx3SkTu2kstelpV_S0Oth34BFv"/>
<div class="absolute -bottom-2 -right-2 flex items-center gap-0.5 bg-primary px-2 py-0.5 rounded-full border-2 border-surface-dark">
<span class="text-[10px] font-bold text-white">4.9</span>
<span class="material-symbols-outlined text-[10px] text-white" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<div class="flex-1">
<h3 class="text-lg font-bold text-white">Marcus Sterling</h3>
<p class="text-muted-dark text-sm">Black Mercedes-Benz S-Class</p>
<div class="mt-1 flex items-center">
<span class="inline-block px-2 py-0.5 rounded bg-black/40 border border-muted-dark/30 text-[11px] font-mono font-bold text-white tracking-widest uppercase">
                                ZNF 4821
                            </span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-6 flex gap-3">
<button class="flex size-14 items-center justify-center rounded-2xl bg-accent-dark text-white hover:bg-accent-dark/80 transition-colors">
<span class="material-symbols-outlined">message</span>
</button>
<button class="flex-1 flex h-14 items-center justify-center gap-2 rounded-2xl bg-primary text-white text-base font-bold tracking-tight hover:brightness-110 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">call</span>
                        Contact Chauffeur
                    </button>
</div>
<!-- Share Trip -->
<button class="mt-4 w-full py-2 text-center text-muted-dark text-sm font-medium flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">share</span>
                    Share trip status with friends
                </button>
</div>
</div>
</div>
</body></html>
