<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }

            box-shadow: 0 0 8px rgba(54, 255, 196, 0.3);
        }
        .glass-cockpit {
            background: rgba(15, 15, 18, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid #24242B;
        }
        .map-texture {
            background-image: radial-gradient(#24242B 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body-lg min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin h-16 bg-surface border-b border-surface-container-highest docked full-width top-0 z-50">
<div class="flex items-center gap-unit">
<span class="material-symbols-outlined text-secondary-fixed">monitoring</span>
<h1 class="font-headline-md text-headline-md tracking-tighter text-secondary-fixed uppercase">FLEET_COMMAND_v1.0</h1>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full border border-outline overflow-hidden">

</div>
</div>
</header>

<div class="absolute inset-0 z-0">

</div>
<!-- Floating Search & Layer Controls -->
<div class="absolute top-4 left-4 right-4 z-10 flex flex-col gap-4">
<!-- Search Bar -->
<div class="glass-cockpit rounded-lg flex items-center px-4 py-3 neon-glow">
<span class="material-symbols-outlined text-on-surface-variant mr-3">search</span>
<input class="bg-transparent border-none focus:ring-0 text-label-caps font-label-caps text-on-surface placeholder:text-outline w-full p-0" placeholder="LOCATE VEHICLE ID..." type="text"/>
<span class="material-symbols-outlined text-on-surface-variant">mic</span>
</div>
<!-- View Toggles -->
<div class="flex gap-2">
<button class="glass-cockpit px-4 py-2 rounded-full flex items-center gap-2 border-secondary-fixed">
<div class="w-2 h-2 bg-secondary-fixed rounded-sm shadow-[0_0_4px_#36ffc4]"></div>
<span class="font-label-caps text-label-caps text-secondary-fixed">TRAFFIC</span>
</button>
<button class="glass-cockpit px-4 py-2 rounded-full flex items-center gap-2 opacity-60">
<div class="w-2 h-2 bg-on-surface-variant rounded-sm"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">SATELLITE</span>
</button>
</div>
</div>
<!-- GPS Tracking Icons (Simulation) -->
<div class="absolute top-1/2 left-1/3 z-20 group">
<div class="relative flex flex-col items-center">
<div class="bg-secondary-fixed p-1 rounded-sm rotate-45 neon-glow">
<span class="material-symbols-outlined text-on-secondary -rotate-45 text-sm" style="font-variation-settings: 'FILL' 1;">navigation</span>
</div>
<div class="absolute -top-10 glass-cockpit px-2 py-1 rounded text-[10px] font-label-caps border-l-2 border-secondary-fixed whitespace-nowrap">
                    TRUCK_442 • ACTIVE
                </div>
</div>
</div>
<div class="absolute top-1/3 right-1/4 z-20">

<div class="bg-tertiary-container border border-tertiary p-1 rounded-sm rotate-45">
<span class="material-symbols-outlined text-tertiary -rotate-45 text-sm">local_shipping</span>

</div>
</div>

</div>

</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col">
<span class="text-on-surface-variant font-label-caps text-[10px] uppercase">Active Vehicles</span>
<div class="flex items-baseline gap-1">
<span class="font-headline-md text-headline-md text-secondary-fixed">142</span>
<span class="text-[10px] font-data-mono text-on-surface-variant">/ 150</span>
</div>
<div class="w-full bg-surface-container-highest h-1 mt-1">
<div class="bg-secondary-fixed h-full" style="width: 94%"></div>
</div>
</div>
<div class="flex flex-col border-l border-surface-container-highest pl-4">
<span class="text-on-surface-variant font-label-caps text-[10px] uppercase">Total Mileage</span>
<div class="flex items-baseline gap-1">
<span class="font-headline-md text-headline-md text-on-surface">12.8k</span>
<span class="text-[10px] font-data-mono text-on-surface-variant">KM</span>
</div>
<span class="text-[10px] font-data-mono text-secondary-fixed">+4.2% VS YESTERDAY</span>
</div>
</div>
</div>
</div>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">hub</span>
<span class="font-label-caps text-label-caps">FLEET</span>
</a>
<!-- HEALTH -->

</a>
<!-- METRICS -->

</a>
