<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "tertiary-container": "#bfd2ff",
                  "tertiary": "#005bc1",
                  "on-secondary-fixed": "#161c22",
                  "surface-container": "#eeeeee",
                  "outline-variant": "#c1c7ce",
                  "inverse-primary": "#9accf3",
                  "on-primary-fixed-variant": "#0c4b6c",
                  "secondary-fixed-dim": "#c1c7cf",
                  "on-secondary-fixed-variant": "#41474e",
                  "tertiary-fixed-dim": "#adc6ff",
                  "on-secondary-container": "#5f656c",
                  "inverse-on-surface": "#f0f1f1",
                  "surface-variant": "#e2e2e2",
                  "on-error": "#ffffff",
                  "surface-container-lowest": "#ffffff",
                  "on-tertiary-fixed": "#001a41",
                  "primary": "#2e6385",
                  "tertiary-fixed": "#d8e2ff",
                  "on-primary": "#ffffff",
                  "secondary-fixed": "#dde3eb",
                  "on-primary-fixed": "#001e2f",
                  "surface": "#f9f9f9",
                  "on-error-container": "#93000a",
                  "inverse-surface": "#2f3131",
                  "primary-fixed": "#c9e6ff",
                  "on-tertiary-fixed-variant": "#004493",
                  "background": "#f9f9f9",
                  "on-surface-variant": "#41484d",
                  "error-container": "#ffdad6",
                  "surface-tint": "#2e6385",
                  "error": "#ba1a1a",
                  "on-background": "#1a1c1c",
                  "surface-container-highest": "#e2e2e2",
                  "secondary": "#595f66",
                  "surface-container-high": "#e8e8e8",
                  "on-secondary": "#ffffff",
                  "on-primary-container": "#285f80",
                  "on-tertiary-container": "#0056b8",
                  "surface-container-low": "#f3f3f4",
                  "on-surface": "#1a1c1c",
                  "primary-fixed-dim": "#9accf3",
                  "outline": "#71787e",
                  "secondary-container": "#dde3eb",
                  "surface-dim": "#dadada",
                  "primary-container": "#a5d8ff",
                  "surface-bright": "#f9f9f9",
                  "on-tertiary": "#ffffff"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "sm": "12px",
                  "lg": "48px",
                  "xl": "80px",
                  "md": "24px",
                  "base": "8px",
                  "xs": "4px",
                  "margin": "32px",
                  "gutter": "24px"
          },
          "fontFamily": {
                  "title-sm": ["Geist"],
                  "headline-md": ["Geist"],
                  "label-caps": ["Geist"],
                  "body-md": ["Geist"],
                  "display-lg": ["Geist"]
          },
          "fontSize": {
                  "title-sm": ["20px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "500"}],
                  "headline-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                  "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600"}],
                  "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                  "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .noise-overlay {
      background: radial-gradient(circle at 40% 40%, rgba(165, 216, 255, 0.4) 0%, rgba(221, 227, 235, 0.2) 40%, transparent 70%),
                  radial-gradient(circle at 70% 60%, rgba(255, 255, 255, 0.5) 0%, rgba(165, 216, 255, 0.1) 50%, transparent 80%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .comet-path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: dash 5s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 z-50 w-full flex justify-between items-center px-margin h-16 bg-surface/70 backdrop-blur-lg border-b border-white/15 shadow-[0px_20px_40px_rgba(165,216,255,0.1)]">
<div class="flex items-center gap-base">
<span class="material-symbols-outlined text-primary active:scale-95 transition-transform cursor-pointer">menu</span>
</div>
<h1 class="font-display-lg text-display-lg font-semibold tracking-tight text-primary">HORIZON</h1>
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-primary-fixed overflow-hidden border border-white/20">
<img alt="User profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYw7n-GBpWmhYgqauKYRijhFrtpSFzybOlOawNehknN8q31meDWaDeBjL0Q3VuYeUvcNcM5utcBK9C6refppPE4gSqxiBzuzpZLt-d-br5L2MWyMGgPEJaqjCb-NsknKdaYPx8kpT9y0F9fdCn7uDYXomc9gDxI22-0BZXeLcsaFABikNvNDw570BHIFNW-WVkdtGYoDkvmsO9HCbJS6oya3OvLAnypVpkVP8QkS-D2Jq0NYilMN7QNLYC-Lw9HNcQLsiM6foFzsY"/>
</div>
</div>
</header>
<!-- Interactive Map Canvas -->
<main class="relative w-full h-screen pt-16 pb-20">
<!-- Map Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A high-altitude, photorealistic aerial view of a futuristic city center during a bright, clear day. The urban layout features minimalist architecture and clean streets, reflecting a sustainable-sleek aesthetic. The lighting is crisp and cool, with soft ice-blue shadows and specular highlights on glass skyscrapers, creating a sense of weightless precision and futuristic optimism." data-location="New York City" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAbJygjPQ9S_5n05UsyuDTVEtyEMid2vDFlmdLZX70TkRXnd_vjyom4cbV-eaSh3qeEmBWLU5THte88dJq-TmJgMOJk75pTs6lkjoVP1LZmN9WhSwjCxgdI7osI-03BbL_UhVRFyV6FbDRlW7DwTC7mUJUaml4kA9tCS--uqdg2YpTNOi6eGcei2-RQPs8gg3-QHn67AOmkzzrEAKOk47aLWE0lPJgTHTNxldkANARpJqeecy6uUBsdwj4STxPIq0PtKMFuEOmTRe0"/>
<!-- Noise Impact Heatmap Overlay -->
<div class="absolute inset-0 noise-overlay mix-blend-screen pointer-events-none"></div>
</div>
<!-- Map UI Elements: Flight Paths -->
<svg class="absolute inset-0 z-10 w-full h-full pointer-events-none" viewbox="0 0 1000 1000">
<path class="comet-path" d="M 200 800 Q 500 400 800 200" fill="none" stroke="url(#comet-gradient)" stroke-width="2"></path>
<path class="comet-path" d="M 100 300 Q 400 500 900 600" fill="none" stroke="url(#comet-gradient)" stroke-width="2" style="animation-delay: -2s;"></path>
<defs>
<lineargradient id="comet-gradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" stop-color="rgba(165, 216, 255, 0)"></stop>
<stop offset="100%" stop-color="rgba(46, 99, 133, 1)"></stop>
</lineargradient>
</defs>
</svg>
<!-- Legend & Map Controls -->
<div class="absolute top-margin left-margin z-20 flex flex-col gap-base">
<div class="glass-card p-md rounded-xl shadow-[0px_20px_40px_rgba(165,216,255,0.1)] max-w-xs">
<p class="font-label-caps text-label-caps text-primary mb-xs">LIVE NOISE IMPACT</p>
<div class="flex items-center gap-base mt-base">
<div class="flex-1 h-1.5 rounded-full bg-gradient-to-r from-primary-container to-secondary-fixed"></div>
</div>
<div class="flex justify-between mt-xs">
<span class="text-[10px] text-on-surface-variant">42dB (Quiet)</span>
<span class="text-[10px] text-on-surface-variant">68dB (Peak)</span>
</div>
</div>
<div class="glass-card p-sm rounded-full flex flex-col gap-sm items-center shadow-[0px_20px_40px_rgba(165,216,255,0.1)]">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-primary hover:bg-white/40 transition-colors">
<span class="material-symbols-outlined">layers</span>
</button>
<div class="w-6 h-[1px] bg-white/20"></div>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-primary hover:bg-white/40 transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-primary hover:bg-white/40 transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</div>
<!-- Active Vertiport Indicator -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20">
<div class="relative group cursor-pointer">
<div class="absolute -inset-4 bg-primary/20 rounded-full animate-ping"></div>
<div class="relative glass-card px-md py-sm rounded-full flex items-center gap-sm shadow-lg border border-primary/30">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">flight_class</span>
<div>
<p class="font-label-caps text-[10px] text-on-surface-variant leading-none">NEAREST VERTIPORT</p>
<p class="font-title-sm text-sm text-on-surface font-bold">Horizon Central Hub</p>
</div>
</div>
</div>
</div>
<!-- Floating Action Buttons -->
<div class="absolute bottom-margin right-margin z-30 flex flex-col gap-base items-end">
<button class="flex items-center gap-sm px-lg py-sm rounded-full bg-white/40 backdrop-blur-xl border border-white/30 text-primary shadow-[0px_20px_40px_rgba(165,216,255,0.1)] hover:bg-white/60 active:scale-95 transition-all">
<span class="material-symbols-outlined">map</span>
<span class="font-label-caps text-label-caps">Find Vertiport</span>
</button>
<button class="flex items-center gap-sm px-lg py-md rounded-full bg-gradient-to-br from-primary-container to-secondary-fixed text-on-primary-container shadow-[0px_20px_40px_rgba(165,216,255,0.2)] hover:shadow-[0px_20px_50px_rgba(165,216,255,0.3)] active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">electric_bolt</span>
<span class="font-label-caps text-label-caps">Book Now</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface/60 backdrop-blur-xl border-t border-white/20 shadow-[0px_-10px_30px_rgba(165,216,255,0.08)] flex justify-around items-center py-4 px-base">
<div class="flex flex-col items-center justify-center text-on-surface-variant/80 hover:bg-primary-container/40 transition-colors active:scale-90 px-5 py-1.5 cursor-pointer">
<span class="material-symbols-outlined">flight_class</span>
<span class="font-label-caps text-label-caps">Fleet</span>
</div>
<!-- Active State: Maps -->
<div class="flex flex-col items-center justify-center bg-primary-container/80 text-on-primary-container rounded-full px-5 py-1.5 active:scale-90 transition-all duration-200 cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-caps text-label-caps">Maps</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/80 hover:bg-primary-container/40 transition-colors active:scale-90 px-5 py-1.5 cursor-pointer">
<span class="material-symbols-outlined">ev_station</span>
<span class="font-label-caps text-label-caps">Charge</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/80 hover:bg-primary-container/40 transition-colors active:scale-90 px-5 py-1.5 cursor-pointer">
<span class="material-symbols-outlined">person</span>
<span class="font-label-caps text-label-caps">Profile</span>
</div>
</nav>
</body></html>
