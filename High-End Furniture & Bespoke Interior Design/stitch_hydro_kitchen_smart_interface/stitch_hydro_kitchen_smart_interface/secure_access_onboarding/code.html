</div>
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high transition-colors p-2" data-icon="help_outline">help_outline</button>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 min-h-screen flex items-center justify-center px-margin-mobile pt-16">
<div class="w-full max-w-md bg-white/60 backdrop-blur-xl brushed-steel-border shadow-2xl p-8 md:p-12">
<!-- Branding & Welcome -->
<div class="text-center mb-10">
<h1 class="font-display-lg text-display-lg text-primary mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Initialize your culinary workspace.</p>
</div>
<!-- Authentication Form -->
<form class="space-y-8">
<!-- Input Group -->
<div class="space-y-6">
<div class="relative">
<label class="font-label-caps text-[10px] text-on-surface-variant block mb-1">IDENTIFICATION</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 font-body-md text-body-md focus:outline-none focus:border-secondary-container transition-colors placeholder:text-outline-variant/50 rounded-none" placeholder="chef@hydro-kitchen.com" type="email"/>
</div>
<div class="relative">
<label class="font-label-caps text-[10px] text-on-surface-variant block mb-1">SECURE TOKEN</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 font-body-md text-body-md focus:outline-none focus:border-secondary-container transition-colors placeholder:text-outline-variant/50 rounded-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Row -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 border-outline rounded-none text-primary focus:ring-0" type="checkbox"/>
<span class="font-label-caps text-[10px] text-on-surface-variant group-hover:text-primary transition-colors">REMEMBER STATION</span>
</label>
<a class="font-label-caps text-[10px] text-on-secondary-container hover:underline" href="#">RECOVER ACCESS</a>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary text-on-primary py-4 font-label-caps text-label-caps tracking-widest hover:opacity-90 active:scale-[0.98] transition-all relative overflow-hidden group" type="submit">
<span class="relative z-10">AUTHORIZE ACCESS</span>
<div class="absolute inset-0 bg-secondary-container/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-caps text-[10px] text-outline-variant">BIOMETRIC READY</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>

<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center p-4 brushed-steel-border hover:bg-surface-container-low transition-colors group">

<p class="font-body-md text-body-md text-on-surface-variant">
