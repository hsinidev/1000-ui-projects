<!DOCTYPE html>

<html class="light" lang="en"><head>

                        "primary": "#000000",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#e2e2e2",
                        "surface-container": "#eeeeee",
                        "on-primary-fixed": "#1c1b1b",
                        "inverse-primary": "#c8c6c5",
                        "tertiary-container": "#1a1c1c",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-primary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "outline-variant": "#c4c7c7",
                        "surface-bright": "#f9f9f9",
                        "background": "#f9f9f9",
                        "on-secondary-fixed": "#2e140a",
                        "inverse-on-surface": "#f0f1f1",

                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2f3131",

                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#454747",

                        "surface-container-low": "#f3f3f4",
                        "secondary-container": "#feccba",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1440px",
                        "unit": "4px",
                        "gutter": "24px",
                        "margin-desktop": "80px",
                        "section-gap": "120px",
                        "margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Bodoni Moda"],
                        "body-md": ["Metropolis"],
                        "label-md": ["Metropolis"],
                        "data-ui": ["Metropolis"],
                        "display-md": ["Bodoni Moda"],
                        "display-lg": ["Bodoni Moda"],
                        "body-lg": ["Metropolis"],
                        "headline-lg-mobile": ["Bodoni Moda"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600"}],
                        "data-ui": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "display-md": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "display-lg": ["64px", {"lineHeight": "72px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "letterSpacing": "0.01em", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "500"}]
                    }
                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .focus-rose-gold:focus {
            outline: none;
            border-bottom-color: transparent;
            background-image: linear-gradient(white, white), linear-gradient(to right, #ecbcaa, #7b5647);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-bottom: 1px solid transparent;
        }
        .rose-gold-border {
            border-image: linear-gradient(to right, #ecbcaa, #7b5647) 1;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md antialiased overflow-x-hidden">
<main class="relative min-h-screen flex items-center justify-center">
<!-- Background Photography Layer -->
<div class="absolute inset-0 z-0 overflow-hidden">
<img alt="Luxury Interior" class="w-full h-full object-cover scale-105 filter brightness-[0.9] saturate-[0.8]" data-alt="A high-fashion editorial photograph of a minimalist, luxury walk-in closet with clean architectural lines and soft, diffused natural light. The space features premium textures of marble and dark wood, with a limited palette of charcoal, cream, and subtle rose gold accents. The mood is sophisticated, quiet, and exclusive, reflecting a high-end robotic wardrobe management system." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZmoUpbAQTqy7PYK-0f4WiLFH5sisOg8gkz1DIi8vU3Xlb2uZCD_9aB1m9zXPqtoVANvs2VyvsxKs8MbELG98yVcv3byuy_FpcDyFGdVYpbkLs0sZoMWH8289XRkPPf5biVkxRf05QkV1XGb9q4KFzPXFg3XZ5BXUlQnSrIaw9hxiuB24LklM-Baom50BSHg9hQfcoFkem3TWzlF9mkizfbtklbFFMPVuB8JcI59tUKwACA1i5D40CJsWjywyPkfaPyVym65nsATo"/>
<div class="absolute inset-0 bg-white/20 backdrop-blur-[2px]"></div>
</div>
<!-- Auth Container -->
<div class="relative z-10 w-full max-w-[480px] px-margin-mobile md:px-0">
<div class="bg-surface/90 backdrop-blur-xl p-10 md:p-16 border-[0.5px] border-outline-variant/30 flex flex-col items-center">
<!-- Brand Anchor -->
<div class="mb-12 text-center">
<h1 class="text-primary font-headline-lg text-headline-lg tracking-[0.3em] uppercase mb-2">AETERNA</h1>
<p class="text-label-md font-label-md text-outline uppercase tracking-widest">Digital Wardrobe Concierge</p>
</div>
<!-- Form Section -->
<div class="w-full space-y-10">
<div class="text-center space-y-2">
<h2 class="font-display-md text-[32px] md:text-display-md text-primary">Welcome Back</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Access your curated collection</p>
</div>
<form action="#" class="space-y-8">
<!-- Input Group -->
<div class="space-y-6">
<div class="relative">
<label class="block text-label-md font-label-md text-primary uppercase mb-2">Identification</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 px-0 text-body-md font-body-md focus:ring-0 focus-rose-gold transition-all duration-300 placeholder:text-outline-variant/60" placeholder="EMAIL ADDRESS" type="email"/>
</div>
<div class="relative">
<label class="block text-label-md font-label-md text-primary uppercase mb-2">Security Key</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 px-0 text-body-md font-body-md focus:ring-0 focus-rose-gold transition-all duration-300 placeholder:text-outline-variant/60" placeholder="PASSWORD" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="space-y-6 pt-4">
<button class="w-full bg-primary text-on-primary py-4 text-label-md font-label-md uppercase tracking-[0.2em] hover:opacity-90 active:scale-[0.98] transition-all duration-300" type="submit">
                                Enter Archive
                            </button>
<div class="flex items-center justify-between">
<button class="text-label-md font-label-md text-outline hover:text-primary transition-colors uppercase" type="button">
                                    Forgot Key
                                </button>
<button class="text-label-md font-label-md text-secondary hover:opacity-80 transition-opacity uppercase tracking-wider font-bold" type="button">
                                    Request Invite
                                </button>
</div>
</div>
</form>
</div>
<!-- Footer Note -->
<div class="mt-16 pt-8 border-t-[0.5px] border-outline-variant/30 w-full text-center">
<p class="text-[10px] font-label-md text-outline uppercase tracking-[0.2em] leading-relaxed">
                        By entering, you agree to the <br/>
<span class="text-primary cursor-pointer hover:underline">Privacy Charter</span> &amp; <span class="text-primary cursor-pointer hover:underline">Service Terms</span>
</p>
</div>
</div>
<!-- Precision Ornament -->
<div class="mt-8 flex justify-center items-center space-x-4 opacity-40">
<div class="h-[1px] w-12 bg-outline-variant"></div>
<span class="material-symbols-outlined text-[12px] text-outline">lens_blur</span>
<div class="h-[1px] w-12 bg-outline-variant"></div>
</div>
</div>
<!-- Decorative Elements (Fixed Grid Mockup) -->
<div class="fixed top-margin-desktop left-margin-desktop hidden lg:block opacity-20">
<div class="text-label-md font-label-md text-primary uppercase tracking-[0.4em] rotate-90 origin-left">
                SYSTEM.VER.2.4.0
            </div>
</div>
<div class="fixed bottom-margin-desktop right-margin-desktop hidden lg:block opacity-20">
<div class="text-label-md font-label-md text-primary uppercase tracking-[0.4em] -rotate-90 origin-right">
                SECURE_ENCRYPTION_ACTIVE
            </div>
</div>
</main>
<!-- Contextual Information Overlay (Aero Progress Mockup) -->
<div class="fixed bottom-0 left-0 w-full p-4 md:p-8 flex justify-between items-end pointer-events-none">
<div class="hidden md:block">
<div class="text-[10px] font-label-md text-outline uppercase mb-2">Automated Retrieval Unit</div>
<div class="w-48 h-[1px] bg-outline-variant relative overflow-hidden">
<div class="absolute top-0 left-0 h-full w-8 bg-secondary-fixed-dim" style="animation: shuttleMove 4s ease-in-out infinite;"></div>
</div>
</div>
<div class="text-[10px] font-label-md text-outline uppercase tracking-tighter text-right">
            01. LOGIN<br/>
            02. INVENTORY<br/>
            03. RETRIEVAL
        </div>
</div>
<style>
        @keyframes shuttleMove {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(200%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</body></html>
