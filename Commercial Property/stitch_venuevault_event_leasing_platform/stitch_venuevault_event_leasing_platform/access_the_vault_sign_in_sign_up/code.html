<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#eedbff",
                    "on-primary-fixed": "#241a00",
                    "on-secondary-fixed": "#25113e",
                    "surface-bright": "#38393a",
                    "on-secondary": "#3b2754",
                    "primary-fixed-dim": "#e9c349",
                    "inverse-primary": "#735c00",
                    "on-tertiary-fixed-variant": "#464747",
                    "on-primary-fixed-variant": "#574500",
                    "on-background": "#e2e2e2",
                    "surface-container-low": "#1a1c1c",
                    "on-surface": "#e2e2e2",
                    "on-primary-container": "#554300",
                    "tertiary-fixed": "#e3e2e2",
                    "surface-container": "#1e2020",
                    "primary": "#f2ca50",
                    "tertiary-fixed-dim": "#c7c6c6",
                    "on-tertiary": "#303031",
                    "on-error-container": "#ffdad6",
                    "primary-container": "#d4af37",
                    "secondary-fixed-dim": "#d6bcf4",
                    "on-error": "#690005",
                    "on-secondary-fixed-variant": "#523d6c",
                    "secondary-container": "#523d6c",
                    "surface-variant": "#333535",
                    "inverse-surface": "#e2e2e2",
                    "background": "#121414",
                    "outline": "#99907c",
                    "outline-variant": "#4d4635",
                    "surface": "#121414",
                    "error": "#ffb4ab",
                    "secondary": "#d6bcf4",
                    "surface-container-lowest": "#0c0f0f",
                    "surface-container-highest": "#333535",
                    "on-surface-variant": "#d0c5af",
                    "on-tertiary-fixed": "#1b1c1c",
                    "surface-tint": "#e9c349",
                    "surface-dim": "#121414",
                    "error-container": "#93000a",
                    "surface-container-high": "#282a2b",
                    "inverse-on-surface": "#2f3131",
                    "on-primary": "#3c2f00",
                    "tertiary": "#cfcece",
                    "primary-fixed": "#ffe088",
                    "on-tertiary-container": "#454545",
                    "on-secondary-container": "#c4abe1",
                    "tertiary-container": "#b3b3b3"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin": "64px",
                    "gutter": "24px",
                    "base": "8px",
                    "xl": "80px",
                    "md": "24px",
                    "xs": "4px",
                    "sm": "12px",
                    "lg": "48px"
            },
            "fontFamily": {
                    "headline-xl": ["Noto Serif"],
                    "body-sm": ["Manrope"],
                    "headline-md": ["Noto Serif"],
                    "body-md": ["Manrope"],
                    "label-caps": ["Manrope"],
                    "headline-lg": ["Noto Serif"],
                    "body-lg": ["Manrope"]
            },
            "fontSize": {
                    "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "0", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "headline-lg": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ambient-shadow {
            box-shadow: 0 24px 48px -12px rgba(26, 15, 41, 0.4);
        }
        .gold-gradient {
            background: linear-gradient(180deg, #D4AF37 0%, #B18F2B 100%);
        }
        .smoke-ghost {
            border: 1px solid rgba(153, 144, 124, 0.3);
            background: transparent;
        }
        .smoke-ghost:hover {
            background: rgba(153, 144, 124, 0.1);
        }
    </style>
</head>
<body class="bg-surface-dim text-on-surface font-body-md overflow-hidden">
<!-- Auth Container -->
<main class="flex min-h-screen">
<!-- Left Side: Visual Anchor -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-surface-dim/40 to-transparent z-10"></div>
<img alt="Luxury Gala" class="absolute inset-0 w-full h-full object-cover" data-alt="A grand ballroom gala hall illuminated by magnificent crystal chandeliers casting a warm golden glow over circular tables set with fine china and silver. The atmosphere is one of high-end prestige and exclusivity, featuring deep midnight purple shadows and luminous gold highlights. The photography is cinematic and wide-angled, capturing the vast architectural scale and the sophisticated interplay of light and shadow in a prestigious event space." src="https://lh3.googleusercontent.com/aida-public/AB6AXuApJbUnR6iBGEMBRx5W7Y2YG02q9OQjd-vZ58Th_-CX-jNs9F9K8KjSA2wOQb7OMmU7ICrU0PQLvOk1hGyRlkQ56n6uoYEVNfxRePGdYeJbTS8zG5NAw02RO2YnNsw5ryt4KAnkun2kQnOfmm7FjxheaOtbZGVi-K-QKEf2EV1XckHDcOymeyqVUCv-1GE-40yalrcuQUfpUTC35JW15VQA3DCruVtYU0ab_jOml6J_1w7SpoyqbzqcJrOGq3UyRWtzj2lNiUBKWzM"/>
<div class="relative z-20 mt-auto p-16 max-w-2xl">
<h1 class="font-headline-xl text-headline-xl text-primary mb-6">Exclusivity in Every Square Foot.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant opacity-90">Manage the world's most prestigious event spaces with our bespoke administrative suite. Designed for those who define the standard of luxury.</p>
</div>
</section>
<!-- Right Side: Interaction Canvas -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-8 md:p-16 bg-surface">
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="mb-12 text-center lg:text-left">
<span class="font-headline-lg text-headline-lg text-primary tracking-tighter uppercase">VenueVault</span>
<p class="font-label-caps text-label-caps text-outline mt-2">Authentication Gateway</p>
</div>
<!-- Toggle Navigation (Simulated) -->
<div class="flex gap-8 mb-10 border-b border-outline-variant">
<button class="pb-4 font-label-caps text-label-caps border-b-2 border-primary text-primary transition-all">Sign In</button>
<button class="pb-4 font-label-caps text-label-caps border-b-2 border-transparent text-outline hover:text-on-surface-variant transition-all">Create Account</button>
</div>
<!-- Auth Form -->
<form class="space-y-6">
<div class="grid grid-cols-1 gap-6">
<!-- Full Name (Hidden for Sign In but defined in requirement) -->
<div class="group">
<label class="block font-label-caps text-label-caps text-outline mb-2 group-focus-within:text-primary transition-colors">Name</label>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="Alexander Vanderbilt" type="text"/>
</div>
<div class="group">
<label class="block font-label-caps text-label-caps text-outline mb-2 group-focus-within:text-primary transition-colors">Email Address</label>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="concierge@venuevault.com" type="email"/>
</div>
<div class="group">
<label class="block font-label-caps text-label-caps text-outline mb-2 group-focus-within:text-primary transition-colors">Organization</label>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="Global Events Co." type="text"/>
</div>
<div class="group">
<div class="flex justify-between items-center mb-2">
<label class="block font-label-caps text-label-caps text-outline group-focus-within:text-primary transition-colors">Password</label>
<a class="text-[10px] font-label-caps text-outline hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full gold-gradient py-4 rounded-xl font-label-caps text-on-primary-fixed shadow-xl ambient-shadow hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                        Access Vault
                    </button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/30"></div></div>
<div class="relative flex justify-center text-xs"><span class="px-4 bg-surface text-outline font-label-caps">Or Continue With</span></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="smoke-ghost flex items-center justify-center gap-3 py-3 rounded-lg font-label-caps text-[10px] text-on-surface transition-all active:scale-95 border border-primary/20">
<span class="material-symbols-outlined text-primary" data-icon="hub">hub</span>
                        Google
                    </button>
<button class="smoke-ghost flex items-center justify-center gap-3 py-3 rounded-lg font-label-caps text-[10px] text-on-surface transition-all active:scale-95 border border-primary/20">
<span class="material-symbols-outlined text-primary" data-icon="corporate_fare">corporate_fare</span>
                        SSO
                    </button>
</div>
<!-- Footer Subtext -->
<footer class="mt-12 text-center">
<p class="font-body-sm text-body-sm text-outline">
                        By entering, you agree to our 
                        <a class="text-primary hover:underline underline-offset-4" href="#">Terms</a> and 
                        <a class="text-primary hover:underline underline-offset-4" href="#">Privacy Policy</a>.
                    </p>
</footer>
</div>
</section>
</main>
<!-- Global Visual Artifacts (Atmospheric depth) -->
<div class="fixed top-0 left-1/2 -translate-x-1/2 w-full h-full pointer-events-none z-0">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-secondary/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
