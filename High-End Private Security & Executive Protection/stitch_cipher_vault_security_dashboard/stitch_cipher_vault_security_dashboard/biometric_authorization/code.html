<body class="bg-background text-on-background industrial-grain min-h-screen flex flex-col font-body-base">

<header class="bg-surface-container-lowest dark:bg-surface-container-lowest border-b-border-thick border-on-surface dark:border-on-surface shadow-[inset_0_-2px_0_0_rgba(0,0,0,0.5)] flex justify-between items-center w-full px-md h-16 fixed top-0 z-50">

<span class="material-symbols-outlined text-primary" data-icon="lock">lock</span>
<h1 class="font-display-lg text-title-sm tracking-widest uppercase text-secondary dark:text-secondary">CIPHER-VAULT</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-primary" data-icon="visibility_off">visibility_off</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex items-center justify-center px-md pt-16 pb-20">
<div class="w-full max-w-lg flex flex-col items-center gap-xl">
<!-- Biometric Scanner Module -->
<div class="w-full bg-surface-container-low border-border-thick border-on-surface p-xl flex flex-col items-center mechanical-depth relative">

<div class="absolute top-0 left-0 w-full h-base bg-secondary border-b-border-standard border-on-surface flex items-center px-sm justify-between">
<div class="flex gap-xs">
<div class="w-2 h-2 bg-on-tertiary"></div>
<div class="w-2 h-2 bg-on-tertiary"></div>
</div>
<span class="font-label-caps text-[8px] text-on-tertiary tracking-tighter">SEC_MOD_882</span>
</div>
<!-- Scanner Interface -->
<div class="mt-base flex flex-col items-center gap-lg w-full">
<!-- Scanner Frame -->
<div class="relative w-48 h-64 border-border-thick border-on-surface bg-surface-container-lowest flex items-center justify-center scanner-glow">
<!-- Corner Accents -->
<div class="absolute -top-[3px] -left-[3px] w-4 h-4 border-t-border-thick border-l-border-thick border-primary"></div>
<div class="absolute -top-[3px] -right-[3px] w-4 h-4 border-t-border-thick border-r-border-thick border-primary"></div>

<div class="absolute top-1/2 left-0 w-full h-[2px] bg-primary opacity-40 shadow-[0_0_10px_rgba(194,197,224,0.5)]"></div>
</div>

<div class="flex items-center gap-base">
<div class="w-3 h-3 bg-primary"></div>

</div>

</div>
</div>
</div>
