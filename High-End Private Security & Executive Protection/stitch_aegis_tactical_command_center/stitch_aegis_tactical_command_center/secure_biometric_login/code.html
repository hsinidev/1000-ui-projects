<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#414753",
                    "on-primary": "#313030",
                    "on-background": "#dde3ee",
                    "tertiary": "#cac6c3",
                    "on-primary-container": "#7b7979",
                    "primary-fixed-dim": "#c9c6c5",
                    "surface-container-highest": "#2f353e",
                    "primary": "#c9c6c5",
                    "on-tertiary-container": "#7c7977",
                    "primary-container": "#0a0a0a",
                    "on-error": "#690005",
                    "surface-dim": "#0d141b",
                    "tertiary-fixed": "#e6e1df",
                    "on-tertiary-fixed": "#1d1b1a",
                    "secondary-fixed": "#dde2f2",
                    "background": "#0d141b",
                    "surface-bright": "#333a42",
                    "inverse-on-surface": "#2b3139",
                    "surface-tint": "#c9c6c5",
                    "on-tertiary-fixed-variant": "#484645",
                    "tertiary-container": "#0b0a09",
                    "inverse-primary": "#5f5e5e",
                    "on-primary-fixed": "#1c1b1b",
                    "error": "#ffb4ab",
                    "on-primary-fixed-variant": "#474646",
                    "surface-container-high": "#242a33",
                    "inverse-surface": "#dde3ee",
                    "on-secondary-fixed": "#161c27",
                    "surface-container-lowest": "#080f16",
                    "tertiary-fixed-dim": "#cac6c3",
                    "on-secondary": "#2b313c",
                    "outline-variant": "#444748",
                    "on-tertiary": "#32302f",
                    "on-secondary-container": "#b3b8c7",
                    "outline": "#8e9192",
                    "on-error-container": "#ffdad6",
                    "primary-fixed": "#e5e2e1",
                    "on-surface": "#dde3ee",
                    "on-surface-variant": "#c4c7c7",
                    "surface": "#0d141b",
                    "secondary-fixed-dim": "#c1c6d6",
                    "surface-container": "#1a2028",
                    "secondary-container": "#434956",
                    "surface-container-low": "#161c24",
                    "surface-variant": "#2f353e",
                    "secondary": "#c1c6d6",
                    "error-container": "#93000a",
                    "signal-red": "#CC0000"
            },
            "borderRadius": {
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "0px"
            },
            "spacing": {
                    "container-max": "1440px",
                    "unit": "4px",
                    "gutter": "16px",
                    "margin": "32px"
            },
            "fontFamily": {
                    "body-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-md": ["JetBrains Mono"],
                    "body-md": ["Inter"],
                    "headline-xl": ["JetBrains Mono"],
                    "mono-data": ["JetBrains Mono"],
                    "headline-lg": ["JetBrains Mono"],
                    "label-caps": ["JetBrains Mono"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.2", "letterSpacing": "0em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                    "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                    "mono-data": ["14px", {"lineHeight": "1", "letterSpacing": "0em", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.15em", "fontWeight": "700"}]

          },
        },
      }

<style>
        body { background-color: #0A0A0A; }
        .scanner-glow {
            box-shadow: 0 0 20px rgba(204, 0, 0, 0.3);
        }
        .scanner-active {
            border-color: #CC0000;
            box-shadow: 0 0 12px #CC0000;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface font-body-md overflow-hidden">
<!-- Top Bar Component -->
<header class="flex justify-between items-center px-gutter py-unit w-full bg-surface-container border-b border-outline-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="fingerprint">fingerprint</span>
<h1 class="font-headline-md text-headline-md uppercase tracking-tight font-bold text-primary">AEGIS-GLOBAL</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="signal_cellular_alt">signal_cellular_alt</span>
</div>
</header>
<!-- Main Content: Login Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-margin">
<!-- Tactical HUD Frame Overlay (Purely Visual) -->
<div class="fixed inset-0 pointer-events-none border-[16px] border-surface-container-lowest opacity-20"></div>
<div class="fixed top-20 left-10 w-32 h-1 bg-signal-red opacity-40"></div>
<div class="fixed bottom-20 right-10 w-32 h-1 bg-signal-red opacity-40"></div>
<div class="w-full max-w-md flex flex-col items-center">
<!-- Scanning Animation / Visual Area -->
<div class="relative w-64 h-64 border border-outline-variant mb-12 flex items-center justify-center bg-surface-container-lowest scanner-glow">
<!-- Inner Tech Borders -->
<div class="absolute top-2 left-2 w-4 h-4 border-t-2 border-l-2 border-signal-red"></div>
<div class="absolute top-2 right-2 w-4 h-4 border-t-2 border-r-2 border-signal-red"></div>
<div class="absolute bottom-2 left-2 w-4 h-4 border-b-2 border-l-2 border-signal-red"></div>
<div class="absolute bottom-2 right-2 w-4 h-4 border-b-2 border-r-2 border-signal-red"></div>
<!-- Central Fingerprint Icon -->
<div class="flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-[120px] text-signal-red" data-icon="fingerprint" style="font-variation-settings: 'FILL' 0, 'wght' 100;">fingerprint</span>
</div>
<!-- Scanning Line -->
<div class="absolute w-full h-[1px] bg-signal-red shadow-[0_0_8px_#CC0000] opacity-60 top-1/2"></div>
</div>
<!-- Status Indicator -->
<div class="mb-12 flex flex-col items-center">
<p class="font-mono-data text-mono-data text-on-surface-variant uppercase tracking-[0.2em] mb-2">IDENTITY VERIFICATION REQUIRED</p>
<div class="flex items-center gap-3">
<div class="w-2 h-2 bg-signal-red"></div>
<h2 class="font-headline-md text-headline-md text-on-surface-variant">AUTHENTICATING...</h2>
</div>
</div>
<!-- Interaction Module -->
<div class="w-full space-y-4">
<div class="border border-outline-variant bg-surface-container p-6">
<div class="flex justify-between items-center mb-6">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant opacity-60">USER_ID</span>
<span class="font-mono-data text-mono-data text-on-surface">OPERATOR_429</span>
</div>
<div class="flex flex-col items-end">
<span class="font-label-caps text-label-caps text-on-surface-variant opacity-60">LEVEL</span>
<span class="font-mono-data text-mono-data text-signal-red">TOP_SECRET</span>
</div>
</div>
<div class="space-y-4">
<div class="relative">
<label class="absolute -top-2 left-3 bg-surface-container px-1 font-label-caps text-[10px] text-on-surface-variant uppercase">Biometric Hash</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant px-4 py-3 font-mono-data text-on-surface focus:outline-none focus:border-signal-red transition-all" readonly="" type="password" value="********"/>
</div>
<button class="w-full bg-signal-red text-white py-4 font-headline-md text-label-caps uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all">
                            Initiate Protocol
                        </button>
</div>
</div>
<div class="flex justify-between px-2">
<button class="font-label-caps text-[10px] text-on-surface-variant hover:text-signal-red transition-colors uppercase">Emergency Override</button>
<button class="font-label-caps text-[10px] text-on-surface-variant hover:text-signal-red transition-colors uppercase">Device Diagnostics</button>
</div>
</div>
</div>
</main>
<!-- UI Background Texture (Technical) -->
<div class="fixed inset-0 opacity-[0.03] pointer-events-none z-[-1]" style="background-image: radial-gradient(#CC0000 0.5px, transparent 0.5px); background-size: 24px 24px;">
</div>
<!-- Data Telemetry Footer -->
<footer class="p-gutter border-t border-outline-variant bg-surface-container-lowest">
<div class="max-w-screen-xl mx-auto flex justify-between items-center font-mono-data text-[10px] text-on-surface-variant opacity-40">
<div class="flex gap-4">
<span>LAT: 40.7128° N</span>
<span>LON: 74.0060° W</span>
</div>
<div class="flex gap-4">
<span>ENC: AES-256-GCM</span>
<span>NODE: AEGIS-7</span>
</div>
</div>
</footer>
</body></html>
