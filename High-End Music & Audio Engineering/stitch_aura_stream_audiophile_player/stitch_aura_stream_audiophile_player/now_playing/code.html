<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        .spectrum-bar {
            width: 2px;
            background: #C0C0C0;
            opacity: 0.6;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary selection:text-primary-container overflow-x-hidden">
<!-- Top Navigation Anchor -->
<nav class="fixed top-0 left-0 w-full z-50 bg-background flex justify-between items-center px-margin py-md border-b border-outline-variant/10">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="Profile" class="w-full h-full object-cover" data-alt="A professional close-up portrait of a sophisticated listener with high-end headphones around their neck. The lighting is soft and editorial, focusing on clear textures and a neutral, calm expression. The background is a blurred studio environment with hints of dark wood and metallic audio equipment, maintaining a premium, minimalist aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCh2igmURzi5us0gATcYGRcwhNpKW54e93sViDnZy3Ni2tu4XwBDBGjcaQES26XCR71RccongJJFQGTZO8SLf_FIOBTRb3EIN8iyU5dPXpRl_I94cWhQjIqBoNuYSWWfab0ZjzCPCgPm-PNCuFpjhjVKmZs0abZO_YyNko6MSvnohWDSP0arUzNtgmV6MmN3Py9REy1Kw_jeywYsaQ33ZA0huNadVmkyWTgaiU2OFMwi_XKS8m5jugYSNxUjk251ZOc9D-QggJpVPYY"/>
</div>
<span class="font-headline-md text-headline-md tracking-tighter text-on-background">AURA-STREAM</span>
</div>
<div class="flex gap-md">
<span class="material-symbols-outlined text-primary cursor-pointer hover:text-on-primary transition-colors">equalizer</span>
</div>
</nav>
<!-- Main Player Canvas -->
<main class="pt-xl pb-xl px-margin flex flex-col items-center max-w-7xl mx-auto">
<!-- Album Art Focal Point -->
<div class="relative group w-full max-w-[600px] aspect-square mb-lg">
<!-- Aura Layer Glow -->
<div class="absolute -inset-8 bg-primary/5 blur-[100px] rounded-full pointer-events-none group-hover:bg-primary/10 transition-all duration-700"></div>
<div class="relative w-full h-full overflow-hidden border border-outline-variant/20 shadow-2xl">
<img alt="Now Playing Artwork" class="w-full h-full object-cover grayscale contrast-125 hover:scale-105 transition-transform duration-[2000ms] ease-out" data-alt="A macro photograph of high-fidelity audio equipment components, focusing on the intricate textures of brushed aluminum and delicate vacuum tube filaments. The scene is bathed in a deep navy and silver light, creating an atmosphere of technical precision and artistic elegance. The composition is minimalist and editorial, reminiscent of a luxury audio magazine cover." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCV5xsnxeiC0HSvjckUtDC9_Ju7ihGUuRvjBV0GdRl2UiYILzwmMZhlZ_thXmWquVoJ7zWlQL0lkz_J4ffNk6uDF0Q3riX645lumS8fo8RTSxQzM58zH7SJoTyUY9Uo-JyjVCO1TzK9bA1vhZ_v0JY223pj0qrY5RueSFSjKjrn1amDRBxyGBekAzGYj9Aqdn-lifvayB_e6RF6RlDXgMQamemazqsRoELFwx2lmRgtl0pxB74403KfTUk9YkMiqL0Wu9scDMwAJhJC"/>
</div>
<!-- Technical Metadata Overlay -->
<div class="absolute top-sm left-sm flex gap-xs">
<span class="bg-primary-container/80 backdrop-blur-md px-base py-xs border border-outline-variant/30 font-label-caps text-label-caps text-primary">MQA</span>
<span class="bg-primary-container/80 backdrop-blur-md px-base py-xs border border-outline-variant/30 font-label-caps text-label-caps text-primary">24-BIT / 192KHZ</span>
</div>
</div>
<!-- Track Info -->
<div class="text-center mb-md max-w-2xl">
<h1 class="font-headline-lg text-headline-lg mb-base text-on-background tracking-tight">Vesper Nocturne No. 4</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant font-light uppercase tracking-[0.2em]">Elias Thorne &amp; The Berlin Ensemble</p>
</div>
<!-- Frequency Spectrum Visualizer -->
<div class="w-full max-w-[600px] h-24 flex items-end justify-between gap-[2px] mb-lg px-gutter">
<!-- Mock visualizer bars with varying heights -->
<div class="spectrum-bar" style="height: 40%;"></div>
<div class="spectrum-bar" style="height: 60%;"></div>
<div class="spectrum-bar" style="height: 30%;"></div>
<div class="spectrum-bar" style="height: 80%;"></div>
<div class="spectrum-bar" style="height: 55%;"></div>
<div class="spectrum-bar" style="height: 90%;"></div>
<div class="spectrum-bar" style="height: 45%;"></div>
<div class="spectrum-bar" style="height: 70%;"></div>
<div class="spectrum-bar" style="height: 35%;"></div>
<div class="spectrum-bar" style="height: 50%;"></div>
<div class="spectrum-bar" style="height: 85%;"></div>
<div class="spectrum-bar" style="height: 65%;"></div>
<div class="spectrum-bar" style="height: 40%;"></div>
<div class="spectrum-bar" style="height: 75%;"></div>
<div class="spectrum-bar" style="height: 25%;"></div>

<div class="spectrum-bar" style="height: 50%;"></div>
<div class="spectrum-bar" style="height: 60%;"></div>
<div class="spectrum-bar" style="height: 40%;"></div>
<div class="spectrum-bar" style="height: 80%;"></div>
<div class="spectrum-bar" style="height: 55%;"></div>
<div class="spectrum-bar" style="height: 90%;"></div>
<div class="spectrum-bar" style="height: 45%;"></div>
<div class="spectrum-bar" style="height: 70%;"></div>
</div>
<!-- Playback Progress Bar (The Audio Gauge) -->
<div class="w-full max-w-[600px] mb-lg">
<div class="relative h-[1px] bg-outline-variant/30 w-full mb-base">
<div class="absolute top-0 left-0 h-full bg-primary w-[38%] transition-all duration-1000"></div>
<div class="absolute top-1/2 left-[38%] -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-primary"></div>
</div>
<div class="flex justify-between font-metadata-sm text-metadata-sm text-on-surface-variant/60">
<span>02:45</span>
<span>07:12</span>
</div>
</div>
<!-- Refined Controls -->
<div class="flex items-center gap-lg mb-xl">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[32px]">shuffle</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[48px]">skip_previous</span>
</button>
<button class="w-20 h-20 rounded-full border border-secondary-fixed flex items-center justify-center bg-secondary-fixed text-primary-container hover:bg-transparent hover:text-secondary-fixed transition-all duration-300">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[48px]">skip_next</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[32px]">repeat</span>
</button>
</div>
<!-- Output Device Selector -->
<div class="w-full max-w-[400px]">
<div class="flex flex-col gap-sm">
<span class="font-label-caps text-label-caps text-center text-on-surface-variant/50 mb-base">SIGNAL PATH: OUTPUT DEVICE</span>
<div class="flex justify-between items-center p-sm border border-outline-variant/20 bg-surface-container-low hover:border-primary/40 cursor-pointer transition-all">
<div class="flex items-center gap-base">
<span class="material-symbols-outlined text-primary">usb</span>
<span class="font-body-md text-body-md text-on-surface">External USB DAC (DSD256)</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</div>
<!-- Quick Toggle Row -->
<div class="grid grid-cols-3 gap-sm">
<button class="py-sm border border-outline-variant/10 text-on-surface-variant font-label-caps text-[10px] hover:border-primary/40 transition-all">INTERNAL DAC</button>
<button class="py-sm border border-primary text-primary font-label-caps text-[10px] bg-primary/5">EXTERNAL USB</button>
<button class="py-sm border border-outline-variant/10 text-on-surface-variant font-label-caps text-[10px] hover:border-primary/40 transition-all">AIRPLAY 2</button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-lowest border-t border-outline-variant/10 flex justify-around items-center px-gutter py-base">

</button>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">library_music</span>
<span class="font-label-caps text-label-caps mt-xs">Collection</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant/50 hover:bg-surface-container-low transition-all duration-300 px-md py-xs">
<span class="material-symbols-outlined">settings_suggest</span>
<span class="font-label-caps text-label-caps mt-xs">Settings</span>
</button>
</footer>
</body></html>
