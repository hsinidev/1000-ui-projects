<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

                      "secondary-container": "#484949",
                      "secondary-fixed": "#e3e2e2",
                      "tertiary-fixed-dim": "#c6c6c7",
                      "surface-container-high": "#2a2a2a",
                      "surface-container": "#201f1f",

              },
              "borderRadius": {

              "spacing": {
                      "margin": "48px",
                      "section-gap": "80px",
                      "unit": "8px",
                      "gutter": "24px",
                      "container-max": "1280px"
              },
              "fontFamily": {
                      "headline-md": ["Inter"],
                      "headline-lg": ["Inter"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(192, 192, 192, 0.2);
        }
        .cinematic-gradient {
            background: linear-gradient(to bottom, rgba(19, 19, 19, 0) 0%, rgba(19, 19, 19, 0.8) 70%, rgba(19, 19, 19, 1) 100%);
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Top Section: Cinematic Background & Branding -->
<section class="relative h-[309px] w-full overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Cinematic Music Studio Background" class="w-full h-full object-cover" data-alt="A moody, high-contrast cinematic shot of a professional recording studio control room at night. Deep blue and violet ambient lighting reflects off sleek hardware surfaces and faders. The atmosphere is sophisticated and authoritative, echoing a premium music licensing environment. Soft focus on the background creates a sense of depth and artistic prestige." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHF2HzHQH5E19NnmdHXCbLAy4Wgzlm-Fk1xl8lif5DlbtfM1xrf__1U7o90BNgGPlOsd-XWiz3mkWHiWiHfnHBYoAOH2eHVX40SOSHt3R8cTOIOimpb9g9Xcetzu-wcc8sHFzZz9mrYhR9cGU_i5h5Y27hjPe2Pj_L1ujsNhiGUrNA4WpBkpqNJs1-Ywol8soU8dZz3Rexsnze6Xiii-IDyuOEcfQPZkKYKejv_bszhYq4Va9Q3iWCUZt1_QXRq_53Qjh6uIxZkTY"/>
<div class="absolute inset-0 cinematic-gradient"></div>
</div>
<div class="relative z-10 flex flex-col items-center justify-center h-full px-gutter pt-8">
<h1 class="text-headline-md font-headline-md font-bold text-primary tracking-tight mb-2">Synchro-Music</h1>
<p class="text-label-sm font-label-sm uppercase tracking-[0.2em] text-secondary">Elevate Your Story</p>
</div>
</section>
<!-- Main Content: Sign-up Form Card -->
<main class="flex-grow px-gutter -mt-12 relative z-20 pb-12">
<!-- Using high-contrast inverse-surface for the "clean white card" look within dark mode context -->
<div class="bg-inverse-surface rounded-xl p-8 shadow-2xl flex flex-col gap-6 max-w-md mx-auto">
<div class="space-y-1">
<h2 class="text-headline-md font-headline-md text-inverse-on-surface">Join the Ranks</h2>
<p class="text-body-md font-body-md text-on-secondary-fixed-variant">Access the world's most elite music library.</p>
</div>
<form class="flex flex-col gap-5">
<!-- Name Field -->
<div class="flex flex-col gap-1.5">
<label class="text-label-sm font-label-sm text-on-secondary-fixed-variant ml-1">FULL NAME</label>
<input class="bg-transparent border-b border-outline/30 focus:border-primary-container focus:ring-0 text-inverse-on-surface font-body-md py-3 px-1 transition-all outline-none" placeholder="Enter your name" type="text"/>
</div>
<!-- Industry Field -->
<div class="flex flex-col gap-1.5">
<label class="text-label-sm font-label-sm text-on-secondary-fixed-variant ml-1">INDUSTRY</label>
<select class="bg-transparent border-b border-outline/30 focus:border-primary-container focus:ring-0 text-inverse-on-surface font-body-md py-3 px-1 transition-all outline-none appearance-none">
<option disabled="" selected="" value="">Select your field</option>
<option>Film Production</option>
<option>Advertising</option>
<option>Gaming</option>
<option>Television</option>
<option>Content Creation</option>
</select>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="text-label-sm font-label-sm text-on-secondary-fixed-variant ml-1">EMAIL ADDRESS</label>
<input class="bg-transparent border-b border-outline/30 focus:border-primary-container focus:ring-0 text-inverse-on-surface font-body-md py-3 px-1 transition-all outline-none" placeholder="professional@email.com" type="email"/>
</div>
<!-- Primary Button -->
<button class="mt-4 bg-primary-container text-primary-fixed font-headline-md text-body-md py-4 rounded-lg flex items-center justify-center gap-2 hover:bg-primary transition-colors active:scale-95 transition-transform" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-grow bg-outline/20"></div>
<span class="text-label-sm font-label-sm text-on-secondary-fixed-variant">OR CONTINUE WITH</span>
<div class="h-[1px] flex-grow bg-outline/20"></div>
</div>
<!-- Social Logins (Silver Ghost Style) -->
<div class="flex flex-col gap-3">
<button class="w-full border border-outline/30 rounded-lg py-3 px-4 flex items-center justify-center gap-3 text-inverse-on-surface hover:bg-black/5 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]" data-icon="google">google</span>
<span class="text-body-md font-medium">Continue with Google</span>
</button>
<button class="w-full border border-outline/30 rounded-lg py-3 px-4 flex items-center justify-center gap-3 text-inverse-on-surface hover:bg-black/5 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]" data-icon="apple">ios</span>
<span class="text-body-md font-medium">Continue with Apple</span>
</button>
</div>
<!-- Bottom Link -->
<div class="text-center mt-2">
<p class="text-label-sm font-label-sm text-on-secondary-fixed-variant">
                    ALREADY REGISTERED? 
                    <a class="text-primary-container font-bold ml-1 hover:underline" href="#">LOG IN</a>
</p>
</div>
</div>
</main>
<!-- Footer: Simple Trust Section -->
<footer class="w-full py-8 px-gutter border-t border-white/5 bg-surface-container-lowest mt-auto">
<div class="flex flex-col items-center gap-4">
<div class="flex items-center gap-2 text-secondary/60">
<span class="material-symbols-outlined text-[18px]" data-icon="verified_user">verified_user</span>
<span class="text-label-sm font-label-sm">SECURE END-TO-END ENCRYPTION</span>
</div>
<p class="text-label-sm font-label-sm text-on-surface-variant/40 text-center uppercase tracking-wider">
                © 2024 Synchro-Music Agency. High-Stakes Licensing.
            </p>
</div>
</footer>
</body></html>
