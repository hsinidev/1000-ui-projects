</button>
<span class="font-h2 text-h2 font-extrabold text-primary dark:text-primary-fixed-dim tracking-tight">StudioConnect</span>
</div>
<div class="flex items-center gap-md">

</div>
</div>

<main class="px-container-padding pt-lg space-y-lg">

<div>
<h1 class="font-h3 text-h3 text-on-surface">Book Elena Vibe</h1>
<p class="font-body-md text-secondary">Session Cellist &amp; Arranger</p>

<span class="material-symbols-outlined text-primary text-[16px]" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="font-label-caps text-label-caps text-primary">VERIFIED PRO</span>
</div>
</div>
</section>
<!-- Calendar Grid Section -->

<div class="flex items-center justify-between">

<div class="flex items-center gap-sm">
<span class="font-body-md text-primary font-bold">October 2024</span>
<div class="flex gap-xs">
<button class="p-xs rounded-full bg-surface-container hover:bg-surface-container-highest"><span class="material-symbols-outlined">chevron_left</span></button>
<button class="p-xs rounded-full bg-surface-container hover:bg-surface-container-highest"><span class="material-symbols-outlined">chevron_right</span></button>
</div>
</div>
</div>
<!-- Calendar Days -->
<div class="grid grid-cols-7 gap-sm text-center">
<span class="font-label-caps text-label-caps text-secondary">MON</span>
<span class="font-label-caps text-label-caps text-secondary">TUE</span>
<span class="font-label-caps text-label-caps text-secondary">WED</span>
<span class="font-label-caps text-label-caps text-secondary">THU</span>
<span class="font-label-caps text-label-caps text-secondary">FRI</span>
<span class="font-label-caps text-label-caps text-secondary">SAT</span>
<span class="font-label-caps text-label-caps text-secondary">SUN</span>

<button class="py-sm rounded-lg bg-surface-container-high border border-primary/20 text-on-surface font-body-md">11</button>

</div>

<button class="py-md px-sm rounded-xl border border-outline-variant bg-surface hover:border-primary text-on-surface font-body-md transition-all">07:00 PM</button>
<button class="py-md px-sm rounded-xl bg-surface-container opacity-50 cursor-not-allowed text-secondary font-body-md line-through">09:30 PM</button>

</section>

</div>

</div>
<div class="border-t border-outline-variant/50 pt-sm flex justify-between items-center">

</div>

            Confirm Booking
