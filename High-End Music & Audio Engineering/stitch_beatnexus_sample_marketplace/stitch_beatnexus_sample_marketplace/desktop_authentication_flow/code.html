<div class="absolute inset-0 bg-gradient-to-tr from-background via-transparent to-primary/20"></div>
</div>
<!-- Brand Content -->
<div class="relative z-10 text-center px-margin">
<h1 class="font-display-xl text-display-xl text-primary tracking-tighter mb-unit">
                    BEATNEXUS
                </h1>
<p class="font-label-mono text-label-mono text-secondary tracking-widest uppercase">
                    Advanced Sound Engineering Protocol
                </p>
<!-- Decorative Elements -->
<div class="mt-margin flex justify-center gap-gutter opacity-60">
<div class="w-12 h-1 bg-primary"></div>
<div class="w-12 h-1 bg-secondary"></div>
<div class="w-12 h-1 bg-tertiary-container"></div>
</div>
</div>
<!-- Bottom Left Info -->
<div class="absolute bottom-margin left-margin hidden md:block">
<div class="flex items-center gap-density-medium text-on-surface-variant">
<span class="material-symbols-outlined text-primary">graphic_eq</span>
<span class="font-label-mono text-label-mono">24-BIT LOSSLESS ECOSYSTEM</span>
</div>
</div>
</section>
<!-- Right Side: Auth Form -->

<!-- Background grid pattern -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#ffb1c4 1px, transparent 1px); background-size: 24px 24px;"></div>
<!-- Auth Card -->
<div class="glass-panel w-full max-w-[480px] p-10 rounded-xl shadow-2xl relative z-10">
<header class="mb-margin">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-unit">Welcome Back</h2>
<p class="font-body-md text-on-surface-variant">Initialize your creative session.</p>
</header>
<!-- Social Auth Cluster -->
<div class="grid grid-cols-2 gap-gutter mb-margin">
<button class="flex items-center justify-center gap-density-medium py-3 border border-outline-variant hover:bg-surface-variant/40 transition-all rounded-lg font-label-bold text-label-bold group neon-glow-blue">

                    </button>
<button class="flex items-center justify-center gap-density-medium py-3 border border-outline-variant hover:bg-surface-variant/40 transition-all rounded-lg font-label-bold text-label-bold group">
<span class="material-symbols-outlined text-xl">ios</span>
                        APPLE
                    </button>
</div>
<div class="relative flex items-center justify-center mb-margin">
<div class="w-full border-t border-outline-variant"></div>
<span class="absolute bg-surface-container-low px-4 font-label-mono text-label-mono text-on-surface-variant">OR EMAIL ARCHIVE</span>
</div>

<form class="space-y-6">
<div class="space-y-unit">
<label class="font-label-bold text-label-bold text-on-surface-variant ml-unit uppercase tracking-wider">Access ID</label>
<div class="relative group neon-glow-pink transition-all rounded-lg overflow-hidden">
<input class="w-full bg-surface-container-highest/40 border border-outline-variant focus:border-primary focus:ring-0 px-4 py-4 font-body-md text-on-surface placeholder:text-outline/50 transition-all" placeholder="producer@beatnexus.studio" type="email"/>
</div>
</div>
<div class="space-y-unit">
<div class="flex justify-between items-center px-unit">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Security Key</label>
<a class="font-label-mono text-label-mono text-secondary hover:text-secondary-container transition-colors" href="#">FORGOT?</a>
</div>
<div class="relative group neon-glow-pink transition-all rounded-lg overflow-hidden">
<input class="w-full bg-surface-container-highest/40 border border-outline-variant focus:border-primary focus:ring-0 px-4 py-4 font-body-md text-on-surface placeholder:text-outline/50 transition-all" placeholder="••••••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-headline-sm text-headline-sm py-4 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(255,74,141,0.3)] mt-margin" type="submit">
                        INITIALIZE SESSION
                    </button>
</form>
<footer class="mt-margin text-center">
<p class="font-body-sm text-on-surface-variant">
                        New to the nexus? 
                        <a class="text-primary font-label-bold hover:underline ml-unit" href="#">REGISTER ACCOUNT</a>
</p>
</footer>
</div>
<!-- Subtle Technical Specs -->
<div class="absolute bottom-margin right-margin text-right pointer-events-none opacity-20 hidden md:block">
<div class="font-label-mono text-label-mono text-on-surface-variant">
                    ENCRYPTION: AES-256-GCM<br/>
                    LATENCY: 0.12MS<br/>
                    BUILD: 4.9.0.21
                </div>
</div>
</section>
</main>

<div class="glass-panel border-secondary/30 flex items-center gap-density-medium px-gutter py-3 rounded-lg shadow-xl translate-x-[120%] md:translate-x-0">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div class="flex flex-col">
<span class="font-label-bold text-label-bold text-on-surface">SYSTEM READY</span>
<span class="font-label-mono text-[10px] text-on-surface-variant">NODE-04 CONNECTED</span>
</div>
</div>
</div>
