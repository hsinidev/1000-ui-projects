<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                  "on-primary-fixed": "#1a1c1c",
                  "background": "#121414",

                  "tertiary": "#dedcdb",
                  "on-surface": "#e3e2e2",
                  "primary-fixed": "#e3e2e2",
                  "error": "#ffb4ab",
                  "surface-tint": "#c6c6c6",
                  "on-secondary-fixed": "#261a00",
                  "surface-container-lowest": "#0d0e0f",
                  "surface-bright": "#38393a",
                  "on-secondary-container": "#6d5000",
                  "on-tertiary-fixed": "#1c1b1b",

                  "on-background": "#e3e2e2",
                  "inverse-surface": "#e3e2e2",

                  "outline-variant": "#444748",

                  "error-container": "#93000a",

                  "component-gap": "24px",
                  "screw-offset": "12px",
                  "chassis-margin": "32px",
                  "unit": "4px"

                  "headline-lg": ["Inter"],

                  "label-silk": ["Inter"]

                  "readout-mono": ["14px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "500"}],
                  "label-silk": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.02em", "fontWeight": "600"}]

        },
      },

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .brushed-aluminum {
      background: linear-gradient(135deg, #2a2c2c 0%, #1e2020 50%, #121414 100%);
      position: relative;
    }
    .brushed-aluminum::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
    }
    .vu-meter-bg {
      background: radial-gradient(circle at center, #f5f2e8 0%, #e8e4d0 100%);
    }
    .knob-bakelite {
      background: radial-gradient(circle at 35% 35%, #3a3a3a 0%, #000000 100%);
      box-shadow: 4px 4px 10px rgba(0,0,0,0.8), inset -1px -1px 2px rgba(255,255,255,0.1);
    }
    .knob-indicator {
      box-shadow: 0 0 10px #ffbf00;
    }
    .screw-head {
      background: radial-gradient(circle at 30% 30%, #555, #222);
      box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
    .needle-flutter {
      transform-origin: bottom center;
      transition: transform 0.1s ease-in-out;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface selection:bg-secondary-container selection:text-on-secondary-container min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- TopAppBar Shell -->
<header class="flex justify-between items-center px-chassis-margin w-full fixed top-0 z-50 h-16 shadow-md bg-gradient-to-b from-surface-bright to-surface-dim border-b-2 border-surface-container-highest">
<button class="text-on-surface-variant hover:brightness-125 transition-all active:translate-y-0.5">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-headline-lg font-headline-lg font-black text-on-surface uppercase tracking-tighter italic">TUBE-TECH V1</h1>
<button class="text-on-surface-variant hover:brightness-125 transition-all active:translate-y-0.5">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content Canvas: Rack Interface -->
<main class="w-full max-w-md mt-16 mb-20 px-4 py-8 flex flex-col gap-component-gap brushed-aluminum min-h-[calc(100vh-144px)] relative">
<!-- Decorative Screws -->
<div class="absolute top-screw-offset left-screw-offset w-3 h-3 rounded-full screw-head flex items-center justify-center">
<div class="w-full h-px bg-black/40 rotate-45"></div>
</div>
<div class="absolute top-screw-offset right-screw-offset w-3 h-3 rounded-full screw-head flex items-center justify-center">
<div class="w-full h-px bg-black/40 -rotate-45"></div>
</div>
<!-- VU Meter Section -->
<section class="w-full aspect-[2/1] rounded-xl p-4 bg-surface-container-lowest border-4 border-outline-variant shadow-[inset_0_4px_12px_rgba(0,0,0,1)] flex flex-col items-center justify-end relative overflow-hidden">
<div class="absolute inset-0 bg-secondary-container/10 pointer-events-none mix-blend-overlay"></div>
<!-- Meter Face -->
<div class="w-full h-[180%] vu-meter-bg rounded-[50%] absolute top-4 flex flex-col items-center pt-8 border border-black/10">
<div class="w-3/4 flex justify-between px-8 text-[10px] font-readout-mono text-black/60 font-bold">
<span>-20</span><span>-10</span><span>-5</span><span>0</span><span class="text-error font-black">+3</span>
</div>
<!-- Analog Scale Marks -->
<svg class="w-4/5 h-24 mt-2" viewbox="0 0 200 100">
<path d="M20,80 A80,80 0 0,1 180,80" fill="none" stroke="black" stroke-dasharray="2,2" stroke-width="0.5"></path>
</svg>
<!-- Needle -->
<div class="absolute bottom-12 w-1 h-32 bg-error rounded-full needle-flutter shadow-sm" style="transform: rotate(-15deg);">
<div class="w-3 h-3 bg-black rounded-full absolute -bottom-1 -left-1"></div>
</div>
</div>
<!-- Meter Label -->
<div class="z-10 bg-black/80 px-3 py-0.5 rounded-sm border border-outline/30 mb-2">
<span class="font-readout-mono text-readout-mono text-secondary-container">GAIN REDUCTION (dB)</span>
</div>
</section>
<!-- Main Control Section: The Big Knob -->
<section class="flex flex-col items-center justify-center py-6 gap-4">
<div class="relative group">
<!-- Amber Glow Ring -->
<div class="absolute -inset-4 bg-secondary-container/20 rounded-full blur-xl opacity-50 group-active:opacity-100 transition-opacity"></div>
<!-- Large Main Gain Knob -->
<div class="w-48 h-48 rounded-full knob-bakelite relative border-2 border-surface-bright flex items-center justify-center cursor-pointer active:scale-95 transition-transform">
<!-- Indicator Line -->
<div class="absolute top-4 w-1.5 h-8 bg-white rounded-full knob-indicator shadow-[0_0_12px_#ffbf00]"></div>
<!-- Grip Texture -->
<div class="absolute inset-4 rounded-full border border-white/5 pointer-events-none"></div>
</div>
</div>
<div class="flex flex-col items-center">
<h2 class="font-label-silk text-label-silk text-on-surface uppercase tracking-widest">Main Gain</h2>
<div class="mt-2 bg-surface-container-highest px-4 py-1 rounded border border-outline-variant shadow-inner">
<span class="font-readout-mono text-readout-mono text-secondary-container">+14.5 dB</span>
</div>
</div>
</section>
<!-- Secondary Controls Bento Grid -->
<section class="grid grid-cols-2 gap-4">
<!-- Threshold Knob -->
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col items-center border border-outline-variant/30 shadow-lg">
<div class="w-24 h-24 rounded-full knob-bakelite relative border border-surface-bright flex items-center justify-center mb-3">
<div class="absolute top-2 w-1 h-4 bg-white/80 rounded-full" style="transform: rotate(-45deg); transform-origin: center 48px;"></div>
</div>
<span class="font-label-silk text-label-silk uppercase text-on-surface-variant">Threshold</span>
</div>
<!-- Ratio Knob -->
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col items-center border border-outline-variant/30 shadow-lg">
<div class="w-24 h-24 rounded-full knob-bakelite relative border border-surface-bright flex items-center justify-center mb-3">
<div class="absolute top-2 w-1 h-4 bg-white/80 rounded-full" style="transform: rotate(20deg); transform-origin: center 48px;"></div>
</div>
<span class="font-label-silk text-label-silk uppercase text-on-surface-variant">Ratio</span>
</div>
</section>
<!-- Utility Controls Row -->
<section class="flex justify-between items-center bg-surface-container-high/50 p-6 rounded-xl border-t-2 border-b-2 border-outline-variant/20">
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-16 bg-surface-container-highest rounded-md border-2 border-black flex flex-col items-center justify-between p-1 shadow-[inset_0_2px_4px_rgba(0,0,0,0.8)] relative">
<!-- Toggle Switch -->
<div class="w-6 h-8 bg-gradient-to-b from-stone-400 to-stone-600 rounded shadow-md transform -translate-y-1"></div>
<div class="absolute -top-4 w-2 h-2 bg-secondary-container rounded-full shadow-[0_0_8px_#ffbf00]"></div>
</div>
<span class="font-label-silk text-label-silk uppercase text-on-surface">Power</span>
</div>
<div class="flex-1 px-8">
<div class="h-1 w-full bg-black/40 rounded-full overflow-hidden">
<div class="h-full w-2/3 bg-secondary-container shadow-[0_0_10px_#ffbf00]"></div>
</div>
<div class="mt-2 flex justify-between">
<span class="text-[8px] font-label-silk text-on-surface-variant uppercase">Input</span>
<span class="text-[8px] font-label-silk text-on-surface-variant uppercase">Peak</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-16 bg-surface-container-highest rounded-md border-2 border-black flex flex-col items-center justify-between p-1 shadow-[inset_0_2px_4px_rgba(0,0,0,0.8)] relative">
<!-- Toggle Switch -->
<div class="w-6 h-8 bg-gradient-to-b from-stone-400 to-stone-600 rounded shadow-md transform translate-y-6"></div>
<div class="absolute -top-4 w-2 h-2 bg-surface-container-low rounded-full opacity-30"></div>
</div>
<span class="font-label-silk text-label-silk uppercase text-on-surface">Bypass</span>
</div>
</section>
<!-- Detailed Technical Info Image -->
<section class="w-full rounded-lg overflow-hidden border border-outline-variant shadow-2xl">
<img class="w-full h-32 object-cover opacity-60 grayscale hover:grayscale-0 transition-all duration-700" data-alt="A macro close-up of vintage vacuum tubes glowing with a warm orange light inside a high-end audio compressor. The metallic chassis has a dark brushed aluminum texture with realistic depth and shadows. Soft studio lighting highlights the glass reflections and delicate internal filaments of the tubes, creating a mood of professional analog warmth and technical precision." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpsCUHoNwnLAArteNgZno90UQ6EGq-EtxCULIhkKHDceppsqQMpIJ_komcMsHsGnc50NiorLxXrABw1-sCT1JU0ZUOP4rKTBv0IuirFFPALkjTB5ekvn75vZpG8Y6i6Y6FNCNJfbZLN2jftEmllXSWV1gfUViZPHO8MO7fXbosozdqYELr2KM1ru6Zd4Ameifabp8LFyVLWNnPakyunY8MnpR24gaIshI7q-v5aAD_qnYTQPlzQ9cSn8GySmPcEn5K6jKQrALpbV8"/>
</section>
<!-- Decorative Screws Bottom -->
<div class="absolute bottom-screw-offset left-screw-offset w-3 h-3 rounded-full screw-head flex items-center justify-center">
<div class="w-full h-px bg-black/40 rotate-45"></div>
</div>
<div class="absolute bottom-screw-offset right-screw-offset w-3 h-3 rounded-full screw-head flex items-center justify-center">
<div class="w-full h-px bg-black/40 -rotate-45"></div>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 w-full h-20 z-50 flex justify-around items-center px-4 pb-2 border-t-2 border-outline-variant bg-gradient-to-t from-surface-container-lowest to-surface-container-high shadow-[0_-4px_10px_rgba(0,0,0,0.6)] rounded-t-xl">
<button class="flex flex-col items-center justify-center text-secondary-container drop-shadow-[0_0_8px_rgba(255,191,0,0.6)] font-bold active:scale-95 duration-75">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
<span class="font-label-silk text-label-silk uppercase mt-1">CONTROL</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant grayscale opacity-70 hover:opacity-100 transition-opacity active:scale-95 duration-75">
<span class="material-symbols-outlined" data-icon="memory">memory</span>
<span class="font-label-silk text-label-silk uppercase mt-1">CIRCUIT</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant grayscale opacity-70 hover:opacity-100 transition-opacity active:scale-95 duration-75">
<span class="material-symbols-outlined" data-icon="library_music">library_music</span>
<span class="font-label-silk text-label-silk uppercase mt-1">PRESETS</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant grayscale opacity-70 hover:opacity-100 transition-opacity active:scale-95 duration-75">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-label-silk text-label-silk uppercase mt-1">MANUAL</span>
</button>
</nav>
</body></html>
