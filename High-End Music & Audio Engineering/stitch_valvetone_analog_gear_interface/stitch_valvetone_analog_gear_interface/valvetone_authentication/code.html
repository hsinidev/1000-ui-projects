<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#e3e2e2",
                        "on-secondary": "#402d00",
                        "on-primary-fixed": "#1a1c1c",
                        "surface-dim": "#121414",
                        "on-tertiary-fixed-variant": "#474746",
                        "on-primary-fixed-variant": "#464747",
                        "secondary": "#ffe2ab",
                        "on-error-container": "#ffdad6",
                        "surface-container": "#1e2020",
                        "outline": "#8e9192",
                        "inverse-on-surface": "#2f3131",
                        "surface": "#121414",
                        "inverse-surface": "#e3e2e2",
                        "surface-container-lowest": "#0d0e0f",
                        "on-primary-container": "#4d4e4f",
                        "outline-variant": "#444748",
                        "on-error": "#690005",
                        "surface-container-highest": "#343535",
                        "tertiary-fixed": "#e5e2e1",
                        "surface-variant": "#343535",
                        "tertiary-container": "#c2c0bf",
                        "on-tertiary": "#313030",
                        "on-surface-variant": "#c4c7c7",
                        "surface-bright": "#38393a",
                        "on-tertiary-container": "#4f4e4e",
                        "surface-container-low": "#1a1c1c",
                        "surface-container-high": "#292a2a",
                        "secondary-fixed-dim": "#fbbc00",
                        "error-container": "#93000a",
                        "inverse-primary": "#5d5e5f",
                        "on-secondary-fixed-variant": "#5c4300",
                        "on-primary": "#2f3131",
                        "primary-fixed": "#e3e2e2",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "secondary-fixed": "#ffdfa0",
                        "on-tertiary-fixed": "#1c1b1b",
                        "secondary-container": "#ffbf00",
                        "primary": "#dcdcdc",
                        "background": "#121414",
                        "error": "#ffb4ab",
                        "tertiary": "#dedcdb",
                        "on-secondary-container": "#6d5000",
                        "on-background": "#e3e2e2",
                        "primary-container": "#c0c0c0",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary-fixed": "#261a00",
                        "surface-tint": "#c6c6c6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "chassis-margin": "32px",
                        "screw-offset": "12px",
                        "component-gap": "24px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-silk": ["Inter"],
                        "readout-mono": ["Space Grotesk"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-silk": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "readout-mono": ["14px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "headline-lg": ["24px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "800"}]
                    }
                }
            }
        }
    </script>
<style>.brushed-metal {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCj3CWgvCrAUag8cpY3eym4ag7E-ZkwWzCw0SZC_FPBe4GVVGutHDNifjgBc16sW4wRu5Alefu21JqxBnMElkGKwN3pyw3P8yLrsTLge50GxZD4zdFw609O3_gMJjQK-dZ_6FXIXtECiJWJLiZX8y3cbHyw-MEFC0cSnLGJ2XskJjjmn0Z4MdtylJN_llHCJ1LD7aeDO05QYMZNpxlWlXaIM_lO_apDB6XwkWmsvTXEgpotU5Ggot6t4hhQZ3albUOCl1D0gjm7nbA);
    background-color: #1a1c1c
    }
.chassis-bevel {
    box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.05), inset -1px -1px 0 rgba(0, 0, 0, 0.5)
    }
.recessed-input {
    box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.8), 0 1px 0 rgba(255, 255, 255, 0.05)
    }
.glow-active {
    box-shadow: 0 0 15px rgba(255, 191, 0, 0.4), inset 0 0 5px rgba(255, 191, 0, 0.2)
    }
.screw-head {
    background: radial-gradient(circle at 30% 30%, #444, #111);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    position: absolute
    }
.screw-slot {
    background: #000;
    width: 6px;
    height: 1px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg)
    }</style>
</head>
<body class="bg-surface-dim min-h-screen flex items-center justify-center font-label-silk text-on-surface p-6">
<div class="fixed inset-0 pointer-events-none brushed-metal opacity-30"></div>
<main class="relative w-full max-w-md z-10">
<!-- Chassis Shell -->
<div class="bg-surface-container-low border border-outline-variant p-8 chassis-bevel rounded-lg relative overflow-hidden">
<!-- Decorative Screws -->
<div class="screw-head top-3 left-3"><div class="screw-slot"></div></div>
<div class="screw-head top-3 right-3"><div class="screw-slot"></div></div>
<div class="screw-head bottom-3 left-3"><div class="screw-slot"></div></div>
<div class="screw-head bottom-3 right-3"><div class="screw-slot"></div></div>
<!-- Branding -->
<div class="mb-10 text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tighter uppercase mb-1">
                    VALVETONE
                </h1>
<p class="font-readout-mono text-[10px] text-secondary-fixed-dim tracking-[0.3em] uppercase opacity-80">
                    Analog Systems Authorization
                </p>
</div>
<!-- Auth Form -->
<form class="space-y-6">
<!-- Email Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label-silk text-label-silk text-on-surface-variant uppercase">Operator ID</label>
<span class="font-readout-mono text-[10px] text-outline italic">Required</span>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-surface-container-lowest border-none recessed-input p-4 pl-10 font-readout-mono text-readout-mono text-secondary-fixed rounded-none focus:ring-1 focus:ring-secondary-container transition-all" placeholder="EMAIL_ADDRESS" type="email"/>
</div>
</div>
<!-- License Key Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label-silk text-label-silk text-on-surface-variant uppercase">Hardware License Key</label>
<span class="material-symbols-outlined text-outline text-sm" data-icon="verified_user">verified_user</span>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="key">key</span>
</div>
<input class="w-full bg-surface-container-lowest border-none recessed-input p-4 pl-10 font-readout-mono text-readout-mono text-secondary-fixed rounded-none focus:ring-1 focus:ring-secondary-container transition-all uppercase tracking-widest" placeholder="VT-XXXX-XXXX-XXXX" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-secondary-container hover:bg-secondary-fixed text-on-secondary font-headline-lg text-sm py-4 rounded-sm transition-all duration-200 glow-active active:translate-y-0.5 uppercase tracking-widest flex items-center justify-center gap-2" type="submit">
                        Initialize System
                        <span class="material-symbols-outlined text-xl" data-icon="power_settings_new">power_settings_new</span>
</button>
</div>
</form>
<!-- Secondary Actions -->
<div class="mt-10 flex flex-col items-center gap-4">
<div class="w-full h-px bg-gradient-to-r from-transparent via-outline-variant to-transparent opacity-30"></div>
<a class="font-label-silk text-label-silk text-on-surface-variant hover:text-secondary-fixed-dim transition-colors uppercase tracking-tight" href="#">
                    Create New Operator Profile
                </a>
<div class="flex gap-6">
<a class="font-readout-mono text-[10px] text-outline hover:text-on-surface transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-xs" data-icon="help_center">help_center</span>
                        LOST KEY
                    </a>
<a class="font-readout-mono text-[10px] text-outline hover:text-on-surface transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-xs" data-icon="security">security</span>
                        ENCRYPTION PROTOCOL
                    </a>
</div>
</div>
</div>
<!-- System Status Decorative Footer -->
<div class="mt-4 flex justify-between px-2 font-readout-mono text-[9px] text-outline-variant tracking-widest uppercase">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary-container shadow-[0_0_5px_rgba(255,191,0,0.8)]"></span>
                Auth-Server: Ready
            </div>
<div>VER: 1.0.4-STABLE</div>
</div>
</main>
<!-- Background Graphics -->
<div class="fixed top-0 right-0 p-12 opacity-5 pointer-events-none select-none">
<div class="text-[120px] font-headline-lg leading-none border-r-8 border-on-surface pr-8">VT</div>
</div>
<!-- Decorative VU Meter Element (Partial) -->
<div class="fixed bottom-0 left-12 w-64 h-32 bg-surface-container border-t border-x border-outline-variant rounded-t-xl opacity-20 transform translate-y-12 chassis-bevel">
<div class="mt-4 mx-auto w-48 h-12 bg-[#fdf5e6] rounded shadow-inner flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-black/10 to-transparent"></div>
<div class="w-0.5 h-20 bg-black/80 origin-bottom transform rotate-[-45deg] mt-16"></div>
<div class="absolute bottom-1 right-2 font-readout-mono text-[8px] text-black/40">VU</div>
</div>
</div>
</body></html>
