<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed": "#1b1c1c",
                      "secondary-container": "#474746",
                      "primary": "#fafff8",
                      "background": "#131313",
                      "secondary-fixed": "#e5e2e1",
                      "tertiary-fixed-dim": "#c8c6c5",
                      "on-primary": "#00391f",
                      "primary-fixed": "#55ffa8",
                      "on-secondary-fixed": "#1c1b1b",
                      "surface-tint": "#00e38c",
                      "primary-fixed-dim": "#00e38c",
                      "primary-container": "#3dffa3",
                      "error": "#ffb4ab",
                      "tertiary": "#fafeff",
                      "on-secondary-container": "#b7b5b4",
                      "on-background": "#e5e2e1",
                      "surface-container-highest": "#353534",
                      "tertiary-fixed": "#e4e2e1",
                      "surface-variant": "#353534",
                      "surface-container-lowest": "#0e0e0e",
                      "on-primary-container": "#007244",
                      "outline-variant": "#3b4a3f",
                      "on-error": "#690005",
                      "secondary": "#c8c6c5",
                      "on-error-container": "#ffdad6",
                      "surface-container": "#201f1f",
                      "outline": "#849587",
                      "inverse-on-surface": "#313030",
                      "surface": "#131313",
                      "inverse-surface": "#e5e2e1",
                      "on-surface": "#e5e2e1",
                      "on-secondary": "#313030",
                      "on-primary-fixed": "#002110",
                      "surface-dim": "#131313",
                      "on-tertiary-fixed-variant": "#474746",
                      "on-primary-fixed-variant": "#00522f",
                      "on-secondary-fixed-variant": "#474746",
                      "secondary-fixed-dim": "#c8c6c5",
                      "error-container": "#93000a",
                      "inverse-primary": "#006d40",
                      "surface-bright": "#3a3939",
                      "on-tertiary-container": "#646363",
                      "surface-container-low": "#1c1b1b",
                      "surface-container-high": "#2a2a2a",
                      "tertiary-container": "#e3e0e0",
                      "on-tertiary": "#303030",
                      "on-surface-variant": "#bacbbc"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "xs": "4px",
                      "xl": "32px",
                      "md": "16px",
                      "lg": "24px",
                      "gutter": "1px",
                      "sm": "8px",
                      "track-height": "48px",
                      "base": "8px"
              },
              "fontFamily": {
                      "headline-lg": ["Inter"],
                      "mono-label": ["Space Grotesk"],
                      "technical-readout": ["Space Grotesk"],
                      "body-md": ["Inter"],
                      "headline-md": ["Inter"]
              },
              "fontSize": {
                      "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "mono-label": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "technical-readout": ["10px", {"lineHeight": "12px", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "headline-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .waveform-container {
            mask-image: linear-gradient(to right, black, transparent);
        }
        .matte-card {
            background-color: #131313;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05), 0 20px 50px rgba(0,0,0,0.5);
        }
        .input-focus-glow:focus {
            box-shadow: 0 0 8px rgba(0, 227, 140, 0.2);
            border-bottom-color: #00e38c;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center p-md">
<!-- Auth Container -->
<main class="w-full max-w-5xl flex flex-col md:flex-row matte-card overflow-hidden min-h-[600px] rounded-xl border border-outline-variant">
<!-- Left Side: Branding & Visuals -->
<section class="hidden md:flex flex-1 relative bg-surface-container-lowest flex-col justify-between p-xl overflow-hidden">
<!-- Branding -->
<div class="z-10">
<h1 class="font-headline-md text-headline-md font-black text-primary-fixed-dim tracking-tight">SonicCanvas</h1>
<p class="font-mono-label text-mono-label text-secondary opacity-60 uppercase tracking-widest mt-xs">Pro Audio Ecosystem</p>
</div>
<!-- 3D Waveform Graphic Placeholder Area -->
<div class="absolute inset-0 flex items-center justify-center opacity-40">
<div class="w-full h-full relative">
<img alt="Studio Waveform Visualization" class="w-full h-full object-cover grayscale mix-blend-screen" data-alt="A sophisticated high-fidelity 3D-rendered studio waveform graphic set against a deep matte black background. The waveform glows with subtle neon mint accents, resembling liquid metal or digital sound waves floating in a void. Soft, cinematic top-down lighting highlights the ridges of the peaks, creating a premium professional audio engineering aesthetic. The mood is analytical and serene, aligning with a high-performance dark-mode software interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAoYCwIW5fMIyWqGRm-6ngwlTc6Pli5K3iUpx-qwShNieEVLxqGnnfSP8J66sqHF9n29qwa57wdUruUO4Cl4cpH0nw1bZtryEl-94xJA4fk0uJFw8RPW930UnyE4tG8Vb9dsj5kQfl8v68EyN4rkPygj_OXJRvIFEUTyLc-R2Ot-SWTRKjlhZiaYkJOL7j0DiyaDQtP7Ft3S0H2LX7bSKDsDaIQoEVZAf5NDsq2HDWJBXPQ3ybwdblckxMqj8gjr4zqCL2QQnGi2w"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest via-transparent to-transparent"></div>
</div>
</div>
<!-- Footer Text -->
<div class="z-10">
<p class="font-technical-readout text-technical-readout text-on-surface-variant uppercase max-w-[240px]">
                    Engineered for precision. Built for the late-night flow of elite audio production.
                </p>
</div>
</section>
<!-- Right Side: Auth Form -->
<section class="flex-1 bg-surface-container-low p-xl md:p-24 flex flex-col justify-center">
<div class="max-w-md w-full mx-auto">
<div class="mb-xl">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Secure Access Suite</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Initialize your professional creative environment.</p>
</div>
<!-- SSO Option -->
<button class="w-full flex items-center justify-center gap-sm bg-surface-container-highest py-md px-lg rounded-lg border border-outline-variant hover:bg-surface-bright transition-all duration-200 group mb-xl">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">enterprise</span>
<span class="font-mono-label text-mono-label text-on-surface uppercase tracking-wider">Sign in with SSO</span>
</button>
<div class="relative flex py-sm items-center mb-xl">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-technical-readout text-technical-readout text-on-surface-variant uppercase">or use credentials</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Auth Form -->
<form class="space-y-lg">
<div>
<label class="font-technical-readout text-technical-readout text-on-surface-variant uppercase block mb-xs">Email Address</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant text-on-surface font-mono-label py-md focus:ring-0 input-focus-glow transition-all duration-300" placeholder="engineer@studio.com" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-xs">
<label class="font-technical-readout text-technical-readout text-on-surface-variant uppercase">Password</label>
<a class="font-technical-readout text-technical-readout text-primary-fixed-dim uppercase hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant text-on-surface font-mono-label py-md focus:ring-0 input-focus-glow transition-all duration-300" placeholder="••••••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant cursor-pointer">visibility_off</span>
</div>
</div>
<div class="pt-md">
<button class="w-full bg-primary-fixed-dim text-on-primary-fixed font-mono-label text-mono-label py-md px-xl rounded uppercase font-bold tracking-widest shadow-[0_0_15px_rgba(0,227,140,0.4)] hover:shadow-[0_0_25px_rgba(0,227,140,0.6)] active:scale-[0.98] transition-all duration-150" type="submit">
                            Create Professional Account
                        </button>
</div>
</form>
<!-- Switch Action -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Already have access? <a class="text-primary-fixed-dim font-bold hover:underline" href="#">Sign In</a>
</p>
</div>
</div>
</section>
</main>
<!-- UI Decor -->
<div class="fixed bottom-md left-md flex gap-md pointer-events-none">
<div class="flex flex-col gap-xs">
<span class="font-technical-readout text-technical-readout text-primary-fixed-dim uppercase opacity-30">Status: Secure</span>
<div class="h-gutter w-24 bg-primary-fixed-dim opacity-20"></div>
</div>
<div class="flex flex-col gap-xs">
<span class="font-technical-readout text-technical-readout text-on-surface-variant uppercase opacity-30">V. 4.12.0</span>
<div class="h-gutter w-12 bg-outline-variant"></div>
</div>
</div>
</body></html>
