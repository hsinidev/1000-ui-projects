<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#eff5ef",
                        "primary": "#006948",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#fdfcff",
                        "outline": "#6d7a72",
                        "on-secondary-container": "#663500",
                        "on-tertiary-fixed-variant": "#3a485b",
                        "secondary-container": "#fe932c",
                        "tertiary": "#4f5d71",
                        "secondary": "#904d00",
                        "surface-container-high": "#e4eae4",
                        "tertiary-container": "#67758b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2c322e",
                        "on-secondary-fixed": "#2f1500",
                        "inverse-on-surface": "#ecf2ec",
                        "error-container": "#ffdad6",
                        "on-surface": "#171d19",
                        "on-tertiary-fixed": "#0d1c2e",
                        "on-surface-variant": "#3d4a42",
                        "on-secondary-fixed-variant": "#6e3900",
                        "primary-fixed-dim": "#68dba9",
                        "surface-bright": "#f5fbf5",
                        "on-primary-container": "#f5fff7",
                        "primary-fixed": "#85f8c4",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f5fbf5",
                        "on-background": "#171d19",
                        "secondary-fixed": "#ffdcc3",
                        "surface-container-highest": "#dee4de",
                        "background": "#f5fbf5",
                        "secondary-fixed-dim": "#ffb77d",
                        "tertiary-fixed": "#d5e3fc",
                        "primary-container": "#00855d",
                        "on-error-container": "#93000a",
                        "outline-variant": "#bccac0",
                        "on-primary-fixed": "#002114",
                        "on-error": "#ffffff",
                        "surface-tint": "#006c4a",
                        "on-secondary": "#ffffff",
                        "surface-container": "#e9efe9",
                        "tertiary-fixed-dim": "#b9c7df",
                        "surface-variant": "#dee4de",
                        "inverse-primary": "#68dba9",
                        "on-primary-fixed-variant": "#005137",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d5dcd6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "24px",
                        "section-margin": "32px",
                        "keyboard-gap": "6px",
                        "grid-gap": "8px"
                    },
                    "fontFamily": {
                        "cuerpo-md": ["Manrope"],
                        "titulo-xl": ["Plus Jakarta Sans"],
                        "letra-grid": ["Plus Jakarta Sans"],
                        "titulo-lg": ["Plus Jakarta Sans"],
                        "teclado-label": ["Manrope"],
                        "etiqueta-sm": ["Manrope"]
                    },
                    "fontSize": {
                        "cuerpo-md": ["16px", {"lineHeight": "1.5", "fontWeight": "500"}],
                        "titulo-xl": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "letra-grid": ["36px", {"lineHeight": "1", "fontWeight": "800"}],
                        "titulo-lg": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "teclado-label": ["14px", {"lineHeight": "1", "fontWeight": "700"}],
                        "etiqueta-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .grid-pattern {
            background-image: linear-gradient(to right, rgba(0, 105, 72, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0, 105, 72, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .glossy-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
        }
        .shadow-soft {
            box-shadow: 0 4px 20px -2px rgba(0, 105, 72, 0.1);
        }
        .shadow-lifted {
            box-shadow: 0 10px 15px -3px rgba(0, 105, 72, 0.2), 0 4px 6px -4px rgba(0, 105, 72, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-cuerpo-md min-h-screen relative overflow-hidden flex flex-col items-center justify-center">
<!-- Background Subtle Word Grid Pattern -->
<div class="absolute inset-0 grid-pattern pointer-events-none opacity-60"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Header (Suppressed Nav, but Brand Anchor used as per requirements) -->
<header class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-4 h-16 max-w-screen-sm mx-auto bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="active:scale-95 transition-transform cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-emerald-600 dark:text-emerald-500">help</span>
</div>
<h1 class="font-titulo-xl text-emerald-600 dark:text-emerald-500 text-2xl font-black tracking-tighter">LÉXICO</h1>
<div class="active:scale-95 transition-transform cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-emerald-600 dark:text-emerald-500">leaderboard</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-container-padding flex flex-col items-center gap-12 text-center">
<!-- Logo & Branding Section -->
<div class="space-y-4">
<div class="flex justify-center gap-2 mb-8">
<!-- Decorative Tiles to hint at game mechanics -->
<div class="w-14 h-14 flex items-center justify-center bg-primary text-on-primary font-letra-grid text-letra-grid rounded-lg shadow-lifted">L</div>
<div class="w-14 h-14 flex items-center justify-center bg-secondary-container text-on-secondary-container font-letra-grid text-letra-grid rounded-lg shadow-lifted">É</div>
<div class="w-14 h-14 flex items-center justify-center bg-surface-container-highest border-2 border-outline-variant text-on-surface font-letra-grid text-letra-grid rounded-lg">X</div>
</div>
<div class="space-y-2">
<h2 class="font-titulo-xl text-primary text-5xl tracking-tightest">LÉXICO</h2>
<p class="font-cuerpo-md text-on-surface-variant max-w-[280px] mx-auto text-lg">Desafía tu mente con una palabra nueva cada día.</p>
</div>
</div>
<!-- Action Card -->
<div class="glossy-card w-full p-10 rounded-3xl space-y-8 shadow-soft">
<div class="space-y-6">
<button class="w-full py-5 px-8 bg-primary text-on-primary rounded-2xl font-titulo-lg text-titulo-lg flex items-center justify-center gap-3 shadow-lifted hover:bg-primary-container active:scale-[0.98] transition-all group">
<span>JUGAR</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">play_arrow</span>
</button>
<div class="grid grid-cols-2 gap-4">
<button class="py-4 px-4 border-2 border-outline-variant rounded-xl font-teclado-label text-teclado-label text-on-surface-variant hover:bg-surface-container-high transition-colors flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-primary">groups</span>
<span>MODO VERSUS</span>
</button>
<button class="py-4 px-4 border-2 border-outline-variant rounded-xl font-teclado-label text-teclado-label text-on-surface-variant hover:bg-surface-container-high transition-colors flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-primary">school</span>
<span>PRÁCTICA</span>
</button>
</div>
</div>
<div class="pt-6 border-t border-outline-variant/30">
<div class="flex items-center justify-center gap-6">
<div class="text-center">
<span class="block font-titulo-lg text-primary text-xl">1.2M</span>
<span class="block font-etiqueta-sm text-on-surface-variant uppercase">Jugadores</span>
</div>
<div class="w-px h-8 bg-outline-variant/50"></div>
<div class="text-center">
<span class="block font-titulo-lg text-primary text-xl">#4</span>
<span class="block font-etiqueta-sm text-on-surface-variant uppercase">Tendencias</span>
</div>
</div>
</div>
</div>
<!-- Footer / Credits -->
<div class="space-y-4">
<p class="font-etiqueta-sm text-on-surface-variant/60 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
                ESPAÑOL • RAE COMPATIBLE
            </p>
</div>
</main>
<!-- Bottom Aesthetic Detail -->
<div class="fixed bottom-12 w-full max-w-md px-container-padding flex justify-center opacity-40">
<div class="flex gap-keyboard-gap">
<div class="w-8 h-10 rounded-md bg-surface-container-highest"></div>
<div class="w-8 h-10 rounded-md bg-surface-container-highest"></div>
<div class="w-8 h-10 rounded-md bg-primary/20"></div>
<div class="w-8 h-10 rounded-md bg-surface-container-highest"></div>
<div class="w-8 h-10 rounded-md bg-surface-container-highest"></div>
</div>
</div>
<!-- Background Images for mood -->
<div class="absolute -bottom-24 -left-24 w-64 h-64 opacity-10 blur-3xl bg-primary rounded-full"></div>
<div class="absolute -top-24 -right-24 w-64 h-64 opacity-10 blur-3xl bg-secondary rounded-full"></div>
</body></html>
