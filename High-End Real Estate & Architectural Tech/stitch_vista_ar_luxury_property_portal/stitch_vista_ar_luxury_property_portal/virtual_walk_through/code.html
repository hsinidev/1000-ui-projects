<body class="bg-surface text-on-surface min-h-screen font-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding h-20 bg-surface/60 backdrop-blur-xl border-b border-white/40 dark:border-outline-variant/20 shadow-[0_10px_40px_rgba(112,128,144,0.08)]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="menu">menu</span>
<span class="font-display-xl text-headline-md tracking-tight text-primary">Vista-AR</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="support_agent">support_agent</span>
</div>
</header>
<main class="relative w-full h-[884px] pt-20">
<!-- Main Immersive Canvas -->
<section class="absolute inset-0 z-0">
<div class="w-full h-full relative">
<img class="w-full h-full object-cover" data-alt="A luxurious minimalist living room with floor-to-ceiling windows overlooking a serene coastal landscape during the golden hour. The interior features high-end Italian marble floors reflecting the soft sunlight, sleek modern furniture in neutral tones, and architecturally integrated smart lighting. The atmosphere is quiet, airy, and ultra-exclusive, maintaining a clean light-mode aesthetic with champagne and soft slate accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGfZBsjuXktvvGFsZV_-Pt6EXOFk7ZmbOkS969i7nGa11_b-OQkzHjDTq1_yTnnmrF_c95xoH_iJo4ftRypyK-7evLGH_7tXw0Ibdo92xsp3cKv4DbhYz6ISCqVGImiSgB2ZifUtHLD7KQDPbMHT9AO-YxLO84_2yHiOt9U-dpEH7VmO1BAFqsNjwvaTYuvSmD8uFCMd3L2mlTtaIDE8W5mPyEBu285zCAKJJHM1_2TnMbi74vIa3ebirwkm__5O7uCltGBL2-0Gs0"/>
<!-- AR Overlay Interaction Layer -->
<div class="absolute inset-0 bg-black/5 pointer-events-none"></div>
<!-- Floating Glassmorphism Markers -->
<!-- Marker 1: Italian Marble -->
<div class="absolute top-[65%] left-[30%] animate-bounce">
<div class="relative group cursor-pointer pointer-events-auto">
<div class="w-8 h-8 rounded-full bg-white/40 backdrop-blur-md border border-white/60 flex items-center justify-center shadow-lg">
<div class="w-2 h-2 rounded-full bg-primary"></div>
</div>
<div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<div class="bg-surface/80 backdrop-blur-xl border border-white/40 px-4 py-2 rounded-xl shadow-xl whitespace-nowrap">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest block">Italian Marble</span>
<span class="text-on-surface-variant text-sm">Calacatta Borghini finish</span>
</div>
</div>
</div>
</div>
<!-- Marker 2: Smart Lighting -->
<div class="absolute top-[25%] left-[60%]">
<div class="relative group cursor-pointer pointer-events-auto">
<div class="w-8 h-8 rounded-full bg-white/40 backdrop-blur-md border border-white/60 flex items-center justify-center shadow-lg">
<div class="w-2 h-2 rounded-full bg-primary"></div>
</div>
<div class="absolute top-full left-1/2 -translate-x-1/2 mt-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<div class="bg-surface/80 backdrop-blur-xl border border-white/40 px-4 py-2 rounded-xl shadow-xl whitespace-nowrap">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest block">Smart Lighting</span>
<span class="text-on-surface-variant text-sm">Automated circadian sync</span>
</div>
</div>
</div>
</div>
</div>
</section>
<!-- Room Navigation Controls (Glassy) -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 z-10 w-[90%] md:w-auto">
<nav class="flex items-center gap-2 p-2 bg-white/30 backdrop-blur-2xl rounded-full border border-white/40 shadow-lg overflow-x-auto no-scrollbar">
<button class="px-6 py-2 rounded-full bg-primary-container text-primary font-semibold whitespace-nowrap">Living Room</button>
<button class="px-6 py-2 rounded-full text-secondary/70 hover:bg-white/20 transition-all whitespace-nowrap">Kitchen</button>
<button class="px-6 py-2 rounded-full text-secondary/70 hover:bg-white/20 transition-all whitespace-nowrap">Master Suite</button>
<button class="px-6 py-2 rounded-full text-secondary/70 hover:bg-white/20 transition-all whitespace-nowrap">Terrace</button>
</nav>
</div>
<!-- Prominent View in AR Button -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 z-20 w-full px-6 flex flex-col items-center gap-6">
<div class="relative">
<!-- Pulse Effect Elements -->
<div class="absolute inset-0 rounded-full bg-primary/20 animate-ping"></div>
<button class="relative flex items-center gap-3 bg-primary text-on-primary px-8 py-4 rounded-full shadow-2xl hover:scale-105 transition-transform active:scale-95 group">
<span class="material-symbols-outlined" data-icon="view_in_ar">view_in_ar</span>
<span class="font-label-sm text-label-sm tracking-widest uppercase">View in AR</span>
</button>
</div>
<div class="bg-surface/40 backdrop-blur-xl border border-white/40 p-4 rounded-2xl w-full max-w-sm flex justify-between items-center">
<div class="flex flex-col">
<span class="font-headline-md text-xl text-on-surface">The Horizon Villa</span>
<span class="text-on-surface-variant/70 text-sm">Malibu, California</span>
</div>
<div class="flex items-center gap-2 bg-white/50 px-3 py-1 rounded-full border border-white/60">
<span class="material-symbols-outlined text-sm" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-sm font-semibold">4.9</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<footer class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-4 bg-surface/60 backdrop-blur-xl border-t border-white/40 dark:border-outline-variant/20 shadow-[0_-10px_40px_rgba(112,128,144,0.08)] rounded-t-xl">
<div class="flex flex-col items-center justify-center text-secondary/60 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="domain">domain</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest mt-1">Portfolio</span>
</div>
<div class="flex flex-col items-center justify-center text-primary bg-primary-container/30 rounded-full px-6 py-2 transition-all scale-105">
<span class="material-symbols-outlined" data-icon="view_in_ar">view_in_ar</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest mt-1">AR Tour</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary/60 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest mt-1">Insights</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary/60 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest mt-1">Booking</span>
</div>
</footer>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        @keyframes ping {
            75%, 100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }
        .animate-ping {
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(-15%);
                animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
            }
            50% {
                transform: translateY(0);
                animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
            }
        }
        .animate-bounce {
            animation: bounce 3s infinite;
        }
    </style>
</body></html>
