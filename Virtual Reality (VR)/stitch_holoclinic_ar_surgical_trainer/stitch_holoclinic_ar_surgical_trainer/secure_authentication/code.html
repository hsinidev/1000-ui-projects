<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c1c6d7",
                        "surface-tint": "#005bc1",
                        "on-primary-fixed": "#001a41",
                        "inverse-surface": "#2d3039",
                        "on-surface": "#181c23",
                        "on-secondary-fixed": "#1a1b1f",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "on-tertiary-container": "#fcfcfc",
                        "on-secondary-fixed-variant": "#46464b",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#e0dfe4",
                        "background": "#f9f9ff",
                        "surface-container-highest": "#e0e2ed",
                        "tertiary-container": "#737575",
                        "on-surface-variant": "#414755",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-primary-fixed-variant": "#004493",
                        "on-background": "#181c23",
                        "surface-variant": "#e0e2ed",
                        "surface-container-low": "#f1f3fe",
                        "on-primary-container": "#fefcff",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#e3e2e7",
                        "surface": "#f9f9ff",
                        "primary": "#0058bc",
                        "surface-container-high": "#e6e8f3",
                        "error": "#ba1a1a",
                        "surface-dim": "#d8d9e5",
                        "on-secondary-container": "#626267",
                        "outline": "#717786",
                        "secondary": "#5d5e63",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-container": "#ecedf9",
                        "tertiary": "#5a5c5c",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "primary-fixed": "#d8e2ff",
                        "primary-container": "#0070eb",
                        "on-error": "#ffffff",
                        "inverse-primary": "#adc6ff",
                        "tertiary-fixed": "#e2e2e2",
                        "inverse-on-surface": "#eef0fc",
                        "secondary-fixed-dim": "#c6c6cb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "40px",
                        "unit": "4px",
                        "sm": "8px",
                        "xs": "4px",
                        "margin": "32px",
                        "lg": "24px",
                        "md": "16px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-md": ["Inter"],
                        "mono-technical": ["Space Grotesk"],
                        "title-sm": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "headline-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "mono-technical": ["14px", {"lineHeight": "1.2", "letterSpacing": "0", "fontWeight": "500"}],
                        "title-sm": ["20px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(249, 249, 255, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(142, 142, 147, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 88, 188, 0.08);
        }
        .inner-shine {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin">
<!-- Background Layer -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A pristine, ultra-modern surgical operating room seen through a cinematic soft-focus lens. The environment features high-tech medical equipment, glowing blue sterile interfaces, and white clinical surfaces. Soft, diffused lighting creates a professional and trustworthy atmosphere, using a palette of clinical whites and medical blues to emphasize a sterile, high-fidelity technical finish." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAavHeJmlTVAwNhZbgnWI6yn58v3Yp-WmWSxTCQmrciMIMoGcc31alyMT67wcK2gCl1v2agzRnVP9RMqeRKa_TAabDSYxbeM5xKHn4yklgKMJgOlXjTgG4Z5o9qiXTlrkg9QQEEi_KK2pkuGWKBfJjZ-cCDav0OfVvXrKJwbJsAYOawYmepeyrUEqY8ZrVOtNckdT0jcY7_SZLycBy_M5GGurKeS9wnJVm_5rjdSVsD5HegcOSyMSH4rwhPYpTMMAzM_SPeelz8DCOu"/>
<div class="absolute inset-0 bg-surface/40 backdrop-blur-md"></div>
</div>
<!-- Auth Card -->
<main class="relative z-10 w-full max-w-[480px]">
<div class="glass-panel inner-shine rounded-xl p-xl flex flex-col gap-lg">
<!-- Brand & Header -->
<div class="flex flex-col items-center text-center gap-sm">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="clinical_notes">clinical_notes</span>
<span class="text-primary font-title-sm font-bold tracking-tight text-title-sm">HoloClinic</span>
</div>
<h1 class="text-headline-md font-headline-md text-on-surface">Secure Access</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Surgical Training Identity Provider</p>
</div>
<!-- Tabs -->
<div class="flex bg-surface-container-low rounded-lg p-xs">
<button class="flex-1 py-sm px-md text-label-caps font-label-caps bg-surface shadow-sm text-primary rounded-lg transition-all">Sign In</button>
<button class="flex-1 py-sm px-md text-label-caps font-label-caps text-on-surface-variant hover:text-on-surface transition-all">Sign Up</button>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="text-label-caps font-label-caps text-on-surface-variant ml-xs">Institutional Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="alternate_email">alternate_email</span>
<input class="w-full pl-xl pr-md py-md bg-white/50 border-b border-outline focus:border-primary focus:ring-0 transition-all text-body-md font-body-md" placeholder="surgeon.name@hospital.org" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-end px-xs">
<label class="text-label-caps font-label-caps text-on-surface-variant">Secure Password</label>
<a class="text-label-caps font-label-caps text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-xl pr-md py-md bg-white/50 border-b border-outline focus:border-primary focus:ring-0 transition-all text-body-md font-body-md" placeholder="••••••••••••" type="password"/>
</div>
</div>
<button class="w-full mt-sm py-md bg-primary text-on-primary font-title-sm text-title-sm rounded-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-md" type="submit">
                    Authenticate
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md py-xs">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-label-caps font-label-caps text-outline">Alternative Secure Login</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Secondary Actions -->
<div class="grid grid-cols-2 gap-md">
<button class="flex flex-col items-center justify-center gap-sm p-md border border-outline-variant/30 rounded-xl hover:bg-primary/5 transition-all group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" data-icon="fingerprint">fingerprint</span>
<span class="text-label-caps font-label-caps text-on-surface-variant">Biometric Sync</span>
</button>
<button class="flex flex-col items-center justify-center gap-sm p-md border border-outline-variant/30 rounded-xl hover:bg-primary/5 transition-all group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" data-icon="view_in_ar">view_in_ar</span>
<span class="text-label-caps font-label-caps text-on-surface-variant">HoloLens ID</span>
</button>
</div>
<!-- Trust / Footer -->
<div class="mt-md pt-lg border-t border-outline-variant/20 flex flex-col items-center gap-sm">
<div class="flex items-center gap-sm text-outline">
<span class="material-symbols-outlined text-[18px]" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-label-caps font-label-caps uppercase tracking-widest">Medical Grade Encryption</span>
</div>
<p class="text-body-sm font-body-sm text-on-surface-variant text-center opacity-70">
                    Compliant with HIPAA and GDPR medical data protocols.
                </p>
</div>
</div>
<!-- System Status Bar (Subtle) -->
<div class="mt-lg flex justify-between px-md">
<div class="flex items-center gap-sm">
<div class="w-sm h-sm rounded-full bg-emerald-500 animate-pulse"></div>
<span class="text-mono-technical font-mono-technical text-on-surface-variant/80 text-[12px]">HoloNode-04 Active</span>
</div>
<span class="text-mono-technical font-mono-technical text-on-surface-variant/80 text-[12px]">v4.2.0-STABLE</span>
</div>
</main>
</body></html>
