<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SynthSpace Avatar Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#6d6c70",
                    "on-secondary-fixed": "#002116",
                    "on-primary-container": "#f6ecff",
                    "on-primary-fixed-variant": "#572e99",
                    "error": "#ffb4ab",
                    "surface": "#131313",
                    "outline-variant": "#4a4452",
                    "surface-tint": "#d4bbff",
                    "background": "#131313",
                    "on-secondary": "#003828",
                    "inverse-on-surface": "#313030",
                    "surface-variant": "#353534",
                    "secondary-container": "#36ffc4",
                    "secondary-fixed": "#36ffc4",
                    "on-surface-variant": "#ccc3d3",
                    "surface-container-low": "#1c1b1b",
                    "primary-fixed-dim": "#d4bbff",
                    "on-tertiary-fixed-variant": "#47464a",
                    "on-primary-fixed": "#260058",
                    "on-error": "#690005",
                    "on-tertiary": "#303033",
                    "on-tertiary-fixed": "#1b1b1e",
                    "surface-dim": "#131313",
                    "on-primary": "#3f0f81",
                    "error-container": "#93000a",
                    "primary-container": "#7e57c2",
                    "surface-container-lowest": "#0e0e0e",
                    "on-secondary-fixed-variant": "#00513c",
                    "on-surface": "#e5e2e1",
                    "surface-bright": "#3a3939",
                    "on-background": "#e5e2e1",
                    "surface-container": "#201f1f",
                    "outline": "#958e9d",
                    "secondary": "#ffffff",
                    "secondary-fixed-dim": "#00e1ab",
                    "on-secondary-container": "#007255",
                    "surface-container-highest": "#353534",
                    "surface-container-high": "#2a2a2a",
                    "inverse-primary": "#6f48b2",
                    "on-tertiary-container": "#f1eef2",
                    "tertiary": "#c8c6ca",
                    "primary-fixed": "#ebdcff",
                    "primary": "#d4bbff",
                    "inverse-surface": "#e5e2e1",
                    "tertiary-fixed": "#e4e1e5",
                    "on-error-container": "#ffdad6",
                    "tertiary-fixed-dim": "#c8c6ca"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "container-max-width": "1440px",
                    "margin-mobile": "20px",
                    "margin-desktop": "64px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "h3": ["Space Grotesk"],
                    "h1": ["Space Grotesk"],
                    "body-lg": ["Manrope"],
                    "h2": ["Space Grotesk"],
                    "body-md": ["Manrope"],
                    "label-sm": ["Space Grotesk"]
            },
            "fontSize": {
                    "h3": ["24px", {"lineHeight": "1.3", "letterSpacing": "0em", "fontWeight": "500"}],
                    "h1": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "h2": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.08em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-panel {
            background: rgba(19, 19, 19, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-mint {
            box-shadow: 0 0 20px rgba(54, 255, 196, 0.4);
        }
        .glow-purple {
            box-shadow: 0 0 20px rgba(126, 87, 194, 0.2);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md selection:bg-secondary-fixed selection:text-on-secondary-fixed overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="bg-surface/60 backdrop-blur-xl border-b border-white/10 shadow-[0_0_20px_rgba(126,87,194,0.15)] flex justify-between items-center w-full px-5 py-4 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-h3" data-icon="chevron_left">chevron_left</span>
<h1 class="font-h3 text-h3 font-bold text-primary tracking-tight">Avatar</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 relative flex flex-col items-center justify-start overflow-hidden pt-4">
<!-- Central Avatar Preview -->
<div class="relative w-full aspect-[3/4] flex items-center justify-center group">
<!-- Background Radial Glow -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary-container/20 via-transparent to-transparent"></div>
<!-- 3D Avatar Rendering Space -->
<div class="relative w-full h-full flex flex-col items-center">
<img class="h-full w-auto object-contain z-10 filter drop-shadow-[0_0_30px_rgba(126,87,194,0.3)]" data-alt="A futuristic 3D humanoid avatar standing in a digital void, wearing a high-tech obsidian exo-suit with glowing Mint neon circuits. The lighting is dramatic and cinematic, with soft violet rim lighting against a deep matte black environment. The aesthetic is ultra-modern and polished, featuring crystal-clear digital textures and a sense of weightless presence in a virtual reality workspace." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6uIf_Yf9rM035A07OAYZieLUnhcOe01jC0spSjWuRsgfTO_qI-OjOvujl6BYJoMK8Ks8ai4cdnDwVch-QVteqVar2O161OFaJFHNuLwcTkvENgTyW4Eds_peBrV3zUo7wWuoQP7OxvdguOfHOGKKJR1FJxXR3D52dIY52xJndOwm-fqm7hYTlj2L0MWq35SjTlHM6j-0zH2wf75PtJz3rCI5ou_3AHY2ukUQyqrKc5Vj4JUUdcNVzhA3Vl21bR0keD5nZhJ9YhTFl"/>
<!-- Interaction Indicator -->
<div class="absolute bottom-12 flex flex-col items-center gap-2 opacity-60">
<div class="flex items-center gap-4 animate-pulse">
<span class="material-symbols-outlined text-secondary-fixed" data-icon="keyboard_double_arrow_left">keyboard_double_arrow_left</span>
<p class="font-label-sm text-label-sm uppercase tracking-widest text-secondary-fixed">Swipe to Rotate</p>
<span class="material-symbols-outlined text-secondary-fixed" data-icon="keyboard_double_arrow_right">keyboard_double_arrow_right</span>
</div>
</div>
</div>
</div>
<!-- Customization Drawer -->
<div class="absolute bottom-0 left-0 right-0 glass-panel rounded-t-[32px] border-t border-white/20 pt-6 pb-28 px-6 z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<!-- Scrollable Tabs -->
<div class="flex gap-4 overflow-x-auto no-scrollbar pb-6">
<button class="flex-none px-6 py-2 rounded-full glass-panel border-secondary-fixed text-secondary-fixed font-h3 text-[14px] flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="face">face</span>
                    Face
                </button>
<button class="flex-none px-6 py-2 rounded-full glass-panel text-on-surface-variant font-h3 text-[14px] flex items-center gap-2 border-transparent">
<span class="material-symbols-outlined text-[18px]" data-icon="apparel">apparel</span>
                    Suit
                </button>
<button class="flex-none px-6 py-2 rounded-full glass-panel text-on-surface-variant font-h3 text-[14px] flex items-center gap-2 border-transparent">
<span class="material-symbols-outlined text-[18px]" data-icon="memory">memory</span>
                    Tech
                </button>
<button class="flex-none px-6 py-2 rounded-full glass-panel text-on-surface-variant font-h3 text-[14px] flex items-center gap-2 border-transparent">
<span class="material-symbols-outlined text-[18px]" data-icon="palette">palette</span>
                    Color
                </button>
</div>
<!-- Preset Selection Grid -->
<div class="grid grid-cols-4 gap-4">
<div class="aspect-square glass-panel rounded-xl flex items-center justify-center border-secondary-fixed/50 border-2 glow-purple cursor-pointer">
<img class="w-full h-full object-cover rounded-lg opacity-80" data-alt="Macro close-up of a futuristic helmet design for a VR avatar. The helmet is made of polished white ceramic and tinted glass, reflecting a digital aurora of purples and mint greens. Highly detailed tech-wear aesthetic for a premium SaaS interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAq7CGzUGFCjRZZX-u7qIB1iqAl5-XpP5U7Xd8z71L2ujpbAkWcr6ymM2aw--t2VdrqzABLFawTHbxOinnu0EX2V30De6-nobTWXI_ASZJmxvU11v9DJBNO1_xAWVXm-hhuJO58r-S7vJ0caAKutVgIaGKg1JAtVFLUfjBLF3P9a1GD7LbHq1ukt5R3MV90cHSa8VKD9MFTArg9DImRyPKwAjuNBQ-pCjxr_Xetyilzn5onGvrk4lS08BPsC-YbzSgnP1H3rpDPvSCA"/>
</div>
<div class="aspect-square glass-panel rounded-xl flex items-center justify-center cursor-pointer hover:border-white/30 transition-all">
<span class="material-symbols-outlined text-primary" data-icon="visibility">visibility</span>
</div>
<div class="aspect-square glass-panel rounded-xl flex items-center justify-center cursor-pointer hover:border-white/30 transition-all">
<span class="material-symbols-outlined text-primary" data-icon="face_retouching_natural">face_retouching_natural</span>
</div>
<div class="aspect-square glass-panel rounded-xl flex items-center justify-center cursor-pointer hover:border-white/30 transition-all">
<span class="material-symbols-outlined text-primary" data-icon="auto_awesome">auto_awesome</span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full mt-8 bg-secondary-fixed text-on-secondary-fixed font-h3 py-4 rounded-xl flex items-center justify-center gap-3 glow-mint active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined font-bold" data-icon="sync" data-weight="fill">sync</span>
<span class="uppercase tracking-widest font-bold text-[14px]">Sync to VR</span>
</button>
</div>
</main>
<!-- Floating Bottom Navigation -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-auto min-w-[320px] rounded-full border border-white/15 bg-surface/40 backdrop-blur-3xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] flex justify-around items-center px-8 py-3 gap-8 z-50">
<div class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-secondary-fixed transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-label-sm text-label-sm mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary-fixed scale-110 cursor-pointer">
<span class="material-symbols-outlined" data-icon="face" style="font-variation-settings: 'FILL' 1;">face</span>
<span class="font-label-sm text-label-sm mt-1">Avatar</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-secondary-fixed transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label-sm text-label-sm mt-1">Vault</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-secondary-fixed transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
<span class="font-label-sm text-label-sm mt-1">Settings</span>
</div>
</nav>
</body></html>
