            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(19, 19, 19, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: none;
            border-bottom: 2px solid #7e57c2;
            transition: all 0.3s ease-out;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #36ffc4;
            box-shadow: 0 0 15px rgba(54, 255, 196, 0.2);
            outline: none;
        }
        .glow-purple {
            box-shadow: 0 0 40px rgba(126, 87, 194, 0.15);
        }
        .glow-mint:hover {
            box-shadow: 0 0 20px rgba(54, 255, 196, 0.4);
        }
    </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Subtle Purple Background Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[40%] h-[40%] bg-primary-container/10 blur-[100px] rounded-full pointer-events-none"></div>
<!-- Onboarding / Auth Container -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-margin-mobile relative z-10">
<!-- Branding Header -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-surface-variant border border-white/10 mb-6 glow-purple">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="cloud_done" style="font-variation-settings: 'FILL' 1;">cloud_done</span>
</div>
<h1 class="font-h1 text-h1 text-primary tracking-tighter mb-2">SynthSpace</h1>
<p class="font-body-md text-on-surface-variant max-w-[280px] mx-auto opacity-80">Your portal to the decentralized digital frontier.</p>
</div>
<!-- Auth Form -->
<div class="w-full max-w-md glass-card rounded-3xl p-8 flex flex-col gap-6">
<div class="space-y-4">
<div class="relative">
<label class="block font-label-sm text-on-surface-variant mb-2 ml-1">WORK EMAIL</label>
<input class="glass-input w-full px-4 py-4 rounded-xl text-on-surface font-body-md placeholder:text-on-surface-variant/30" placeholder="name@synthspace.io" type="email"/>
</div>
<div class="relative">
<label class="block font-label-sm text-on-surface-variant mb-2 ml-1">PASSWORD</label>
<input class="glass-input w-full px-4 py-4 rounded-xl text-on-surface font-body-md placeholder:text-on-surface-variant/30" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="bg-secondary-fixed text-on-secondary-fixed font-h3 text-h3 py-5 rounded-full glow-mint transition-all duration-300 active:scale-95">
                Enter the Metaverse
            </button>
<!-- Divider -->
<div class="flex items-center gap-4 my-2">
<div class="h-[1px] flex-grow bg-white/10"></div>
<span class="font-label-sm text-on-surface-variant/50">OR CONTINUE WITH</span>
<div class="h-[1px] flex-grow bg-white/10"></div>
</div>
<!-- Social Sign-in -->
<div class="grid grid-cols-3 gap-4">
<button class="glass-card hover:bg-surface-variant/50 h-14 rounded-xl flex items-center justify-center transition-all">
<img alt="Google" class="w-6 h-6 grayscale invert brightness-200" data-alt="A high-definition icon representing Google's brand identity, reimagined with a minimalist and futuristic aesthetic to fit a dark-mode metaverse application. The iconic colors are muted or presented in high-contrast monochromatic white to complement the matte black background. The overall style is clean, corporate, and technologically advanced." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJ6ApSc7ne7UuSeKDirxL4noaRxR0qGN-6mS1c4t3iaUw46wUJFZ3dvi0fEDBJtEcJJwMPc4FPgCr-NaRhomqYGxoW6Y7UUPe6I8pCrIZsBtkDPE0IstcqV28nyfrl_1a9fQHRUlYkcyihc4x200vruYJgYOGFsWcmoIY1GnOD6-u_VETJAOM53R7YpTdf9woZ5wo5aX2hIhYjHgB5NDM3hTIimdIcaDfS-Al3d4d6Gi2dAXceBOoKqhvFfsq1w1-7NMejqRLWQtU6"/>
</button>
<button class="glass-card hover:bg-surface-variant/50 h-14 rounded-xl flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="terminal">terminal</span>
</button>
<button class="glass-card hover:bg-surface-variant/50 h-14 rounded-xl flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="fingerprint">fingerprint</span>
</button>
</div>
</div>
<!-- Secondary Navigation -->
<footer class="mt-10 text-center">
<p class="font-body-md text-on-surface-variant">
                New to the void? <a class="text-primary font-bold hover:underline" href="#">Request Access</a>
</p>
<div class="flex justify-center gap-6 mt-8">
<a class="font-label-sm text-on-surface-variant/40 hover:text-on-surface transition-colors" href="#">Privacy</a>
<a class="font-label-sm text-on-surface-variant/40 hover:text-on-surface transition-colors" href="#">Terms</a>
<a class="font-label-sm text-on-surface-variant/40 hover:text-on-surface transition-colors" href="#">Security</a>
</div>
</footer>
</main>
<!-- Visual Accents (Bottom Decorative Element) -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-secondary-fixed to-transparent opacity-30"></div>

<div class="hidden lg:block fixed right-0 top-0 w-1/3 h-full overflow-hidden opacity-50">
<img class="w-full h-full object-cover grayscale brightness-50" data-alt="A futuristic VR workspace captured from a low angle, showing floating glass user interfaces and holograms of data structures. The scene is set in a dark, infinite void with soft purple nebula clouds in the far distance. Lighting is atmospheric and high-contrast, with neon mint accents highlighting the edges of digital panels. The overall mood is ethereal, spacious, and highly productive." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD30o1Rl0Lq635Si-C1JFWHYjMN6PuAVzS2fy-CCj__0BbtXcKM5WAKMSj40NIHpX6POEybmHOMYdi5nfgAzESaXV1O2qrvEHeGnMFAejqJi26fbQ9tBZPkSmQx9pOAaJG7UKzsM4sFY7xPXsTf-Kr-SBxMyu4VuJ_XWumb81QdMu0KwieU4nQT2vpDWv6-vb6NXzUDVgJYDulGjQzNAhaPOrQ16hWrgfiIxmBN0H6_JXKsACiy9QBXLWFst7wH67vaV-Nhh9916TkO"/>
</div>
