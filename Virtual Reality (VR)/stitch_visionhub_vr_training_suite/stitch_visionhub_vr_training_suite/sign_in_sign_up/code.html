<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .glass-glow-border {
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
        }
        .hud-scanline {
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 204, 255, 0.05) 50%);
            background-size: 100% 4px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#690005",
                        "on-background": "#dae2fd",
                        "secondary-fixed-dim": "#bfc8ce",
                        "surface": "#0b1326",
                        "primary-fixed": "#bbe9ff",
                        "inverse-surface": "#dae2fd",
                        "secondary-fixed": "#dbe4ea",
                        "error": "#ffb4ab",
                        "background": "#0b1326",
                        "on-secondary": "#293236",
                        "on-secondary-fixed": "#141d21",
                        "surface-tint": "#5ed4ff",
                        "primary-fixed-dim": "#5ed4ff",
                        "primary-container": "#00ccff",
                        "primary": "#9de2ff",
                        "on-primary-container": "#005369",
                        "tertiary": "#00effb",
                        "surface-container-high": "#222a3d",
                        "surface-container-highest": "#2d3449",
                        "on-surface-variant": "#bbc8d0",
                        "outline": "#869399",
                        "surface-container": "#171f33",
                        "on-primary-fixed": "#001f29",
                        "inverse-primary": "#006782",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#004d63",
                        "on-tertiary-container": "#005459",
                        "outline-variant": "#3c494e",
                        "on-secondary-container": "#adb6bc",
                        "on-tertiary-fixed-variant": "#004f54",
                        "surface-container-lowest": "#060e20",
                        "tertiary-container": "#00d0db",
                        "on-tertiary": "#00363a",
                        "secondary-container": "#3f484d",
                        "surface-variant": "#2d3449",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#74f5ff",
                        "on-secondary-fixed-variant": "#3f484d",
                        "surface-bright": "#31394d",
                        "inverse-on-surface": "#283044",
                        "on-surface": "#dae2fd",
                        "surface-container-low": "#131b2e",
                        "tertiary-fixed-dim": "#00dbe7",
                        "surface-dim": "#0b1326",
                        "on-tertiary-fixed": "#002022",
                        "on-primary": "#003545",
                        "secondary": "#bfc8ce"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-md": "24px",
                        "stack-lg": "48px",
                        "stack-sm": "12px",
                        "container-padding": "40px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "label-caps": ["Space Grotesk"],
                        "display-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "title-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "title-sm": ["20px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                        "headline-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container min-h-screen flex items-center justify-center overflow-hidden">
<!-- Background Layer with VR-inspired patterns -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-surface via-surface-container to-surface-container-lowest"></div>
<div class="absolute inset-0 hud-scanline opacity-20"></div>
<!-- Decorative VR Geometry -->
<div class="absolute top-[-10%] right-[-5%] w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-20%] left-[-10%] w-[800px] h-[800px] bg-tertiary/5 rounded-full blur-[160px]"></div>
<div class="absolute inset-0 overflow-hidden pointer-events-none opacity-30">
<svg class="stroke-primary/20 fill-none" height="100%" width="100%">
<pattern height="100" id="grid" patternunits="userSpaceOnUse" width="100">
<path d="M 100 0 L 0 0 0 100" fill="none" stroke-width="1"></path>
<circle cx="100" cy="100" fill="currentColor" opacity="0.5" r="2"></circle>
</pattern>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
</svg>
</div>
<img class="absolute inset-0 object-cover w-full h-full opacity-20 mix-blend-overlay" data-alt="A futuristic industrial landscape at night with glowing blue wireframe overlays of complex machinery and architectural scaffolding. The atmosphere is dense with a digital fog, illuminated by cool cyan and deep navy tones. High-tech HUD elements like floating telemetry data and geometric shards drift through the space, creating a sense of professional virtual reality depth and immersion." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBampYXunh9NARfhj4T9BwLnn44wwKG955SGyz0x8TwO-ks0aZVjuv85mfYoMsny5Od5xisf7i_5gqorUEgcG0L60YgPcH6KhSaZjOvpK2OUL4BZyxjVQZbZmKDC5n10Q1ZvYBYh-aZTpb6j0yEfi4fK4giwBfkwdO7pDUyGOz9cXeeNUptZDlc2cgG4bNSv64WsNtDutkSGUEN5SwxIP8BLS2vjuqcSXjCbWhVhUwuGv9gdPeJOQAGDZJXkO4-zE8b260ky-21qp-A"/>
</div>
<!-- Main Auth Container -->
<main class="relative z-10 w-full max-w-[480px] p-gutter">
<div class="bg-surface-container-low/60 backdrop-blur-3xl rounded-xl glass-glow-border p-container-padding flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-stack-lg text-center">
<div class="flex items-center justify-center mb-stack-sm space-x-2">
<span class="material-symbols-outlined text-primary text-headline-md" style="font-variation-settings: 'FILL' 1;">vrpano</span>
<h1 class="font-display-lg text-headline-md text-primary tracking-wider uppercase">VisionHub</h1>
</div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-[0.2em]">Enterprise Safety Ecosystem</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-stack-md" onsubmit="return false;">
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-primary/80 uppercase ml-1">Corporate Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">alternate_email</span>
<input class="w-full bg-surface-container-highest/40 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all duration-300" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-stack-sm">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-primary/80 uppercase">Password</label>
<a class="text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot Access?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock_open</span>
<input class="w-full bg-surface-container-highest/40 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-title-sm text-body-md py-4 rounded-lg flex items-center justify-center space-x-2 hover:bg-primary transition-all duration-300 shadow-[0_0_20px_rgba(0,204,255,0.3)] group">
<span>Authorize System Access</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center w-full my-stack-md">
<div class="h-[1px] flex-1 bg-white/10"></div>
<span class="px-4 font-label-caps text-label-caps text-on-surface-variant/50 uppercase">Identity Provider</span>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<!-- SSO Button -->
<button class="w-full bg-white/5 border border-white/10 text-on-surface font-title-sm text-body-md py-4 rounded-lg flex items-center justify-center space-x-3 hover:bg-white/10 transition-all duration-300 mb-stack-md">
<img class="w-5 h-5 object-contain" data-alt="A small, high-fidelity corporate logo icon representing a modern cloud technology provider, rendered in a crisp, minimalist style. The logo uses geometric blue and white shapes to convey trust, stability, and professional identity. It is set against a clean, neutral background, emphasizing its role as a secure single sign-on authentication gateway." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuVL7MOjQcK-6BIKYDYEvP-eD2z-CS0Mvm5RWqjgjLwWi-8q1cuqu_poOxToybJ9o0yENj37uJ1RZ7h6QdDzViyy53UQNJ0AGcli-29qZ3woEP-OkIP2qZ0kipgn29jlS358vHd2Zt0d-V_xYLLOcWxQaBN2CYtu7o9xWHkS5RWRCryEzg7p8fwNJ82C5BjsdV6p79Ue7opPVUwBymo-bMP542MB1OIit2gxoozjMM_08uLHwjl0AmWUGE1s-zvydIYywoSZC1dfBq"/>
<span>Login with Industrial SSO</span>
</button>
<!-- Footer Links -->
<div class="text-center">
<p class="text-on-surface-variant text-body-md">
                    New operator? <a class="text-primary font-title-sm hover:underline" href="#">Provision account</a>
</p>
<div class="mt-stack-md flex space-x-gutter justify-center opacity-60">
<a class="text-label-caps text-label-caps hover:text-on-surface transition-colors" href="#">Privacy Protocol</a>
<a class="text-label-caps text-label-caps hover:text-on-surface transition-colors" href="#">Support Node</a>
</div>
</div>
</div>
<!-- Telemetry Status Bar (Visual only) -->
<div class="mt-stack-md flex justify-between items-center px-4 font-label-caps text-[10px] text-tertiary/40 uppercase tracking-widest">
<div class="flex items-center space-x-2">
<div class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></div>
<span>Network: Encrypted_L3</span>
</div>
<div>
                Node: VH-DX-2044
            </div>
</div>
</main>
<!-- UI Interaction Tip -->
<div class="fixed bottom-gutter right-gutter z-20 pointer-events-none md:block hidden">
<div class="bg-surface-container-high/40 backdrop-blur-md border border-white/10 p-4 rounded-lg flex items-center space-x-4">
<span class="material-symbols-outlined text-primary" data-weight="fill">security</span>
<div>
<p class="font-title-sm text-label-caps text-primary">Biometric Sync Ready</p>
<p class="text-[12px] text-on-surface-variant">HMD Proximity detected</p>
</div>
</div>
</div>
</body></html>
