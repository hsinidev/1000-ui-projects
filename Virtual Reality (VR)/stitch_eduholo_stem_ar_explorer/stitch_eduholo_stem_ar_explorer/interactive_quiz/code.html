<!DOCTYPE html>

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim shadow-[0_4px_12px_rgba(21,66,18,0.08)] w-full top-0 sticky z-50">
<div class="flex justify-between items-center px-margin py-base w-full max-w-[1440px] mx-auto">
<div class="flex items-center gap-sm">
<button class="active:scale-95 duration-200 p-2 hover:bg-primary-container/10 transition-colors rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">menu</span>
</button>
<h1 class="font-headline-lg text-headline-lg text-primary dark:text-primary-fixed-dim tracking-tight">EduHolo</h1>
</div>
<!-- Quiz Progress Integrated in Top Bar -->
<div class="hidden md:flex flex-col items-center w-64 gap-xs">
<div class="flex justify-between w-full font-label-md text-label-md text-on-surface-variant">
<span>Quiz Progress</span>
<span>7/10</span>
</div>
<div class="h-3 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-[70%] bg-primary-container rounded-full"></div>
</div>
</div>
<div class="flex items-center gap-base">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden border-2 border-primary-container/20">
<img alt="Student Profile" class="w-full h-full object-cover" data-alt="A close-up professional profile avatar of a young, curious student wearing science lab safety goggles. The background is a soft-focus laboratory setting with warm, ambient lighting that emphasizes the EduHolo forest green and white brand colors. The photography is sharp with a shallow depth of field, conveying intelligence and enthusiasm for STEM education." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgJdr3_jVvjoqGOKaCLI4ROjI4pg9pdMtcEfko7WBGlm8C4ELaPaAJUS4gIykrp9LQmxUwlJWMEQXmVkNGYh4i1FhHRG6Wb3yP-NDfc4jH82Fq-2G6_4mj2cTaIdgpJo6AwG0bJc4P6yb4yHIm8SSE-Xm0xiWTaIYgN0a7Yhnv6z2D84rpjK4wdqCK1_Zj1BlsJeTEa4c4pewwa1vZgAV93INSvMH3nDzbaeX9TXzdr1k5MsYNCGACK3R7L5GL4F4LJ5gfSXqTmA"/>
</div>
</div>
</div>
</header>
<main class="flex-grow flex flex-col relative overflow-hidden">
<!-- Mobile Progress Bar -->
<div class="md:hidden px-margin py-base bg-surface-container-low">
<div class="flex justify-between font-label-sm text-label-sm text-on-surface-variant mb-xs">
<span>Quiz Progress</span>
<span>70%</span>
</div>
<div class="h-2 w-full bg-surface-container-high rounded-full">
<div class="h-full w-[70%] bg-primary-container rounded-full"></div>
</div>
</div>
<!-- AR 3D Viewport Area -->
<div class="flex-grow relative flex items-center justify-center bg-gradient-to-b from-surface-container-low to-background">
<!-- Simulated 3D Background Image -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-90" data-alt="A high-fidelity 3D exploded view of a sophisticated hydrogen combustion engine floating in a clean, minimalist white laboratory space. The mechanical parts are suspended in mid-air, separated by invisible forces, with soft ambient shadows falling on the bright white floor. One specific injector component is glowing with a vibrant orange energy highlight, while other components maintain a sleek metallic finish. The lighting is soft and cinematic, highlighting the intricate engineering details of the STEM educational model." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwQDFHnH6jTHfRRU1trTzKxpwe1b3_jqCr6E84nu7HZVih3XTKU1XUlKvYSA8CtqcC9M2XN0aNKlMeEkczjpSo5kI4hnh4lncDO2uhI86eESIDl5csgv4CG6Or6sdTYvz6SshTV1UgSUsg9GlK6NFn59l-bk3w-tDSYoUSBEkphleDsCeMiUUe_v-9a5UmPCrZMkgdwdFchkL8wEIFz0SqhbcdCjFp_ybjDyNak-D7f4Or6CrXJhWkW86XSBv4nf50NLEw-SnOZA"/>
</div>
<!-- AR Overlays / Labels -->
<div class="relative z-10 w-full h-full max-w-4xl mx-auto flex items-center justify-center pointer-events-none">
<!-- Label: Piston -->
<div class="absolute top-[30%] left-[25%] pointer-events-auto">
<div class="glass-card px-md py-xs rounded-xl shadow-lg border border-primary/10 flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<span class="font-label-md text-label-md text-primary">Cylinder Head</span>
</div>
<div class="h-16 w-px bg-primary/40 mx-auto mt-xs"></div>
</div>
<!-- Highlighted Part Overlay (Orange Pointer) -->
<div class="absolute top-[50%] right-[35%] pointer-events-auto">
<div class="bg-secondary-container text-on-secondary-container px-md py-sm rounded-xl shadow-xl border-2 border-white flex flex-col items-center">
<span class="material-symbols-outlined mb-xs" style="font-variation-settings: 'FILL' 1;">priority_high</span>
<span class="font-headline-md text-headline-md">Part X</span>
</div>
<div class="h-12 w-px bg-secondary-container/60 mx-auto mt-xs border-dashed border"></div>
</div>
<!-- Label: Valve -->
<div class="absolute bottom-[40%] left-[40%] pointer-events-auto">
<div class="glass-card px-md py-xs rounded-xl shadow-lg border border-primary/10 flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<span class="font-label-md text-label-md text-primary">Intake Valve</span>
</div>
<div class="h-12 w-px bg-primary/40 mx-auto mt-xs"></div>
</div>
</div>
<!-- Interaction Controls (Floating UI) -->
<div class="absolute right-margin top-margin flex flex-col gap-base z-20">
<button class="w-12 h-12 rounded-xl glass-card text-primary shadow-lg flex items-center justify-center hover:bg-surface-container-high active:scale-90 transition-all">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<button class="w-12 h-12 rounded-xl glass-card text-primary shadow-lg flex items-center justify-center hover:bg-surface-container-high active:scale-90 transition-all">
<span class="material-symbols-outlined">refresh</span>
</button>
<button class="w-12 h-12 rounded-xl glass-card text-primary shadow-lg flex items-center justify-center hover:bg-surface-container-high active:scale-90 transition-all">
<span class="material-symbols-outlined">view_in_ar</span>
</button>
</div>
</div>
<!-- Question Section -->
<section class="relative z-30 px-margin pb-[120px] pt-lg bg-surface-container-lowest/80 backdrop-blur-md rounded-t-[32px] shadow-[0_-8px_32px_rgba(21,66,18,0.06)]">
<div class="max-w-4xl mx-auto">
<div class="mb-lg">
<span class="text-secondary font-label-md text-label-md uppercase tracking-wider">Question 7 of 10</span>
<h2 class="font-headline-md text-headline-md text-primary mt-xs">Identify the part highlighted in orange</h2>
</div>
<!-- Options Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<button class="group flex items-center gap-md p-md bg-surface-container-low hover:bg-primary-container/10 border-2 border-transparent hover:border-primary-container/30 rounded-xl transition-all text-left active:scale-[0.98]">
<div class="w-12 h-12 rounded-full bg-white flex items-center justify-center font-bold text-primary border border-outline-variant group-hover:bg-primary-container group-hover:text-white transition-colors">A</div>
<span class="font-body-md text-body-md text-on-surface">Crankshaft Assembly</span>
</button>
<button class="group flex items-center gap-md p-md bg-surface-container-low hover:bg-primary-container/10 border-2 border-transparent hover:border-primary-container/30 rounded-xl transition-all text-left active:scale-[0.98]">
<div class="w-12 h-12 rounded-full bg-white flex items-center justify-center font-bold text-primary border border-outline-variant group-hover:bg-primary-container group-hover:text-white transition-colors">B</div>
<span class="font-body-md text-body-md text-on-surface">Spark Plug Injector</span>
</button>
<button class="group flex items-center gap-md p-md bg-primary-container/10 border-2 border-primary-container rounded-xl transition-all text-left active:scale-[0.98]">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center font-bold text-white transition-colors">C</div>
<span class="font-body-md text-body-md text-primary font-bold">Fuel Injection Port</span>
</button>
<button class="group flex items-center gap-md p-md bg-surface-container-low hover:bg-primary-container/10 border-2 border-transparent hover:border-primary-container/30 rounded-xl transition-all text-left active:scale-[0.98]">
<div class="w-12 h-12 rounded-full bg-white flex items-center justify-center font-bold text-primary border border-outline-variant group-hover:bg-primary-container group-hover:text-white transition-colors">D</div>
<span class="font-body-md text-body-md text-on-surface">Piston Connecting Rod</span>
</button>
</div>
<!-- Footer Actions -->
<div class="mt-lg flex justify-between items-center">
<button class="text-on-surface-variant font-label-md flex items-center gap-xs hover:text-primary transition-colors">
<span class="material-symbols-outlined">help_outline</span>
                        Need a hint? (Cost: 5 Energy)
                    </button>
<button class="bg-primary text-white font-headline-md px-xl py-base rounded-xl shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center gap-base">
                        Next Question
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-gutter pb-8 pt-xs bg-surface-container-lowest dark:bg-surface-container-highest shadow-[0_-4px_16px_rgba(21,66,18,0.06)] z-50 rounded-t-xl">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">science</span>
<span class="font-label-md text-label-md">Library</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">view_in_ar</span>
<span class="font-label-md text-label-md">AR Scan</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-xl px-md py-xs active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">quiz</span>
<span class="font-label-md text-label-md">Quiz</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">analytics</span>
<span class="font-label-md text-label-md">Progress</span>
</button>
