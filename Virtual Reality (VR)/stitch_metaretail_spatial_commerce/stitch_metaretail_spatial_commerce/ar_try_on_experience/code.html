<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter py-4 bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-xl border-b border-white/20 dark:border-white/10 shadow-[0_0_30px_rgba(183,110,121,0.1)]">
<div class="flex items-center gap-4">
<button class="text-primary dark:text-primary-fixed-dim hover:opacity-70 transition-opacity active:scale-95 duration-300">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-h3 text-h3 font-light tracking-[0.2em] text-primary dark:text-primary-fixed-dim">METARETAIL</h1>
</div>
<div class="flex items-center gap-6">
<nav class="hidden md:flex gap-8">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:opacity-70 transition-opacity" href="#">Catalog</a>
<a class="font-label-caps text-label-caps text-primary active-glow" href="#">Try-On</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:opacity-70 transition-opacity" href="#">Analytics</a>
</nav>
<button class="text-primary dark:text-primary-fixed-dim hover:opacity-70 transition-opacity active:scale-95 duration-300">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</div>
</header>
<!-- Main Content: Split Screen AR Interface -->
<main class="flex-1 pt-[72px] pb-[96px] relative flex overflow-hidden">
<!-- Left: Real Camera Feed -->
<section class="relative w-1/2 h-full bg-surface-dim overflow-hidden border-r border-white/10">
<div class="absolute inset-0 z-0">

</div>
<!-- Tracking Status Overlay -->
<div class="absolute top-8 left-8 z-20">
<div class="glass-panel px-4 py-2 rounded-full flex items-center gap-3">
<span class="flex h-2 w-2 relative">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="font-label-caps text-label-caps text-primary tracking-widest">Tracking: Active</span>
</div>
</div>
<!-- Reticle Placeholder (Left Side Target) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-64 h-96 border-2 border-white/20 rounded-[40px] relative">
<div class="absolute -top-1 -left-1 w-8 h-8 border-t-2 border-l-2 border-primary"></div>
<div class="absolute -top-1 -right-1 w-8 h-8 border-t-2 border-r-2 border-primary"></div>
<div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-2 border-l-2 border-primary"></div>
<div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-2 border-r-2 border-primary"></div>
</div>
</div>
<div class="absolute bottom-8 left-8 z-20 font-label-caps text-label-caps text-white/60">
                REAL-TIME SENSOR INPUT
            </div>
</section>

</div>

<div class="absolute top-8 right-8 z-30 flex flex-col gap-4">

<span class="font-label-caps text-label-caps text-on-surface-variant">Material</span>
<div class="flex gap-2">
<button class="w-10 h-10 rounded-full border-2 border-primary bg-inverse-surface active:scale-95 transition-transform"></button>
<button class="w-10 h-10 rounded-full border-1 border-white/40 bg-on-surface-variant active:scale-95 transition-transform"></button>
<button class="w-10 h-10 rounded-full border-1 border-white/40 bg-surface active:scale-95 transition-transform"></button>
</div>
</div>
<!-- Lighting Intensity -->
<div class="glass-panel p-4 rounded-xl flex flex-col gap-4">
<span class="font-label-caps text-label-caps text-on-surface-variant">Lighting</span>
<input class="accent-primary w-32 h-1 bg-white/20 rounded-full appearance-none cursor-pointer" type="range"/>
</div>
</div>

<div class="absolute inset-0 flex items-center justify-center pointer-events-none">

</div>
</div>
<div class="absolute bottom-8 right-8 z-20 font-label-caps text-label-caps text-primary tracking-widest font-bold">

            </div>
</section>
<!-- Floating Action: Capture Button -->
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 z-40 flex items-center gap-12">
<button class="glass-panel p-4 rounded-full text-white hover:bg-white/30 transition-all">
<span class="material-symbols-outlined">close</span>
</button>
<button class="relative group">
<div class="absolute inset-0 bg-primary rounded-full blur-xl opacity-40 group-hover:opacity-60 transition-opacity"></div>
<div class="relative w-20 h-20 bg-primary rounded-full border-4 border-white flex items-center justify-center text-white shadow-2xl active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl fill-icon">photo_camera</span>
</div>
</button>
<button class="glass-panel p-4 rounded-full text-white hover:bg-white/30 transition-all">
<span class="material-symbols-outlined">share</span>
</button>
</div>
<!-- Center Vertical Divider with 'Snap' Icon -->
<div class="absolute top-0 bottom-0 left-1/2 -translate-x-1/2 w-[1px] bg-white/30 z-30 flex items-center justify-center">

<span class="material-symbols-outlined">straighten</span>
<span class="font-label-caps text-label-caps mt-1">Analytics</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-on-surface-variant/60 hover:text-primary transition-colors">

<span class="font-label-caps text-label-caps text-on-surface-variant/80">Outerwear</span>
<span class="text-white/20">|</span>
<span class="font-label-caps text-label-caps text-on-surface-variant/80">Blazers</span>
<span class="text-white/20">|</span>
<span class="font-label-caps text-label-caps text-primary">Sculpted Minimalist</span>
</div>
