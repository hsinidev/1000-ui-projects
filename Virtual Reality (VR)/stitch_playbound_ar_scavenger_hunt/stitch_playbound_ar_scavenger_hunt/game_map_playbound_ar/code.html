<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "error-container": "#93000a",
                    "secondary-fixed-dim": "#ffb0d0",
                    "inverse-surface": "#e3e1e9",
                    "surface": "#121318",
                    "on-error-container": "#ffdad6",
                    "secondary": "#ffb0d0",
                    "inverse-on-surface": "#2f3036",
                    "surface-container": "#1e1f25",
                    "outline": "#839493",
                    "on-primary-fixed": "#002020",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-primary-fixed-variant": "#004f4f",
                    "surface-dim": "#121318",
                    "on-surface": "#e3e1e9",
                    "on-secondary": "#63003d",
                    "tertiary-fixed": "#e2e2e2",
                    "surface-variant": "#34343a",
                    "surface-container-highest": "#34343a",
                    "outline-variant": "#3a4a49",
                    "on-error": "#690005",
                    "on-primary-container": "#007070",
                    "surface-container-lowest": "#0d0e13",
                    "primary-container": "#00fbfb",
                    "error": "#ffb4ab",
                    "on-secondary-container": "#ff99c6",
                    "tertiary": "#ffffff",
                    "on-background": "#e3e1e9",
                    "on-secondary-fixed": "#3d0024",
                    "surface-tint": "#00dddd",
                    "primary-fixed-dim": "#00dddd",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "on-primary": "#003737",

                    "primary": "#ffffff",
                    "background": "#121318",
                    "on-tertiary-fixed": "#1a1c1c",

            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "unit": "8px",
                    "margin-mobile": "24px",
                    "safe-area-top": "64px",
                    "touch-target-min": "48px"
            },
            "fontFamily": {
                    "headline-xl": ["Space Grotesk"],
                    "headline-lg": ["Space Grotesk"],
                    "body-lg": ["Be Vietnam Pro"],
                    "headline-md": ["Space Grotesk"],
                    "label-caps": ["Space Grotesk"],
                    "body-md": ["Be Vietnam Pro"]
            },
            "fontSize": {
                    "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],

        },
      }

<style>
        body { background-color: #121318; overflow: hidden; }
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .neon-blue { drop-shadow: 0 0 12px rgba(0, 251, 251, 0.8); }
        .neon-pink { drop-shadow: 0 0 12px rgba(255, 176, 208, 0.8); }
        .ar-grid { background-image: radial-gradient(rgba(0, 251, 251, 0.1) 1px, transparent 1px); background-size: 40px 40px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface select-none">
<!-- AR MAP BACKGROUND CANVAS -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover opacity-60" data-alt="A high-contrast night view of a sprawling urban cityscape with Shibuya Crossing's neon lights blurred into a cinematic bokeh effect. The atmosphere is electric and hyper-modern, featuring deep shadows and vibrant digital overlays of blue and magenta scanning lines across the asphalt. The lighting is dominated by glowing billboards and high-tech street lamps, creating a dark yet luminous digital-physical hybrid world." data-location="Tokyo Shibuya Crossing" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1YxpOoq19xM5b7S5pTHegTlxEf7-hXQ9P_Pzcmgk2DTn3YoDjw3BL34CWXE4FFsYJxdeEL8LxnxSb9eQHrPIm67fgC2BY4WAc0Bp5kQTGyMJViCBVruH684PkZQTwikSkdn6SkpMU_DCWmhvgAoAZEpotB_L7my0VnIR3Ax7vDRptTy0q3AmsHhSMVvW6v00ntVZp4gwNfFP5xtujyd-fJ2HUhk0jbF9ek4urWZUCey3ppbH_7aGw3WeZM3CS1w-wP5zr9BPual4"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/60"></div>
<div class="absolute inset-0 ar-grid opacity-30"></div>
</div>
<!-- TOP APP BAR -->
<header class="fixed top-0 w-full z-50 bg-surface/20 backdrop-blur-xl dark:bg-surface/20 border-b border-white/10 shadow-[0_4px_20px_rgba(0,0,0,0.5)] flex justify-between items-center px-margin-mobile h-safe-area-top">
<div class="flex items-center gap-unit">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity active:scale-95" data-icon="explore">explore</span>
<span class="font-headline-xl text-headline-xl tracking-tighter text-primary dark:text-primary-fixed drop-shadow-[0_0_8px_rgba(0,221,221,0.8)]">PLAYBOUND</span>
</div>
<div class="flex items-center gap-3">
<div class="flex flex-col items-end">
<span class="font-label-caps text-[10px] text-primary-fixed opacity-70">LVL 42</span>
<div class="w-24 h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-fixed shadow-[0_0_8px_#00fbfb]" style="width: 75%;"></div>
</div>
</div>
<span class="material-symbols-outlined text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity active:scale-95" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- AR INTERFACE OVERLAY -->
<main class="relative z-10 w-full h-screen pt-safe-area-top pb-[120px] flex flex-col justify-between pointer-events-none">
<!-- COMPASS UI SECTION -->
<div class="px-margin-mobile pt-gutter flex justify-center pointer-events-auto">
<div class="glass bg-white/5 border border-white/10 rounded-xl p-4 flex items-center gap-4 shadow-2xl">
<div class="relative w-16 h-16 flex items-center justify-center">
<div class="absolute inset-0 rounded-full border-2 border-dashed border-primary/30 animate-spin-slow"></div>
<span class="material-symbols-outlined text-primary-fixed text-4xl neon-blue" data-icon="explore">explore</span>
</div>
<div>
<p class="font-label-caps text-primary-fixed text-[12px]">NEAREST TARGET</p>
<p class="font-headline-md text-headline-md text-white">120m North-East</p>
<p class="font-body-md text-on-surface-variant text-[12px]">Shibuya Sky Deck</p>
</div>
</div>
</div>
<!-- CENTER HUD / RETICLE -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="relative w-48 h-48 flex items-center justify-center">
<div class="absolute inset-0 border-[1px] border-primary/20 rounded-full"></div>
<div class="absolute inset-4 border-[2px] border-primary/40 rounded-full"></div>
<div class="w-2 h-2 bg-primary-fixed rounded-full neon-blue"></div>
<!-- Dynamic markers on reticle -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-2">
<div class="w-1 h-4 bg-primary-fixed rounded-full"></div>
</div>
</div>
</div>
<!-- FLOATING ACTION BUTTON (HUD STYLE) -->
<div class="fixed right-margin-mobile bottom-[128px] pointer-events-auto flex flex-col gap-gutter">
<button class="w-14 h-14 rounded-full glass bg-secondary-container/80 text-secondary border border-secondary/40 shadow-[0_0_15px_rgba(255,176,208,0.4)] flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="add_a_photo">add_a_photo</span>
</button>
<button class="w-14 h-14 rounded-full glass bg-primary-container/80 text-on-primary-container border border-primary/40 shadow-[0_0_15px_rgba(0,251,251,0.4)] flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="gps_fixed">gps_fixed</span>
</button>
</div>
<!-- MAP MARKERS (ABSOLUTE PLACEMENT FOR DEMO) -->
<div class="absolute top-[40%] left-[20%] pointer-events-auto">
<div class="flex flex-col items-center gap-1">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center shadow-[0_0_20px_rgba(255,153,198,0.8)] border-2 border-white animate-pulse">
<span class="material-symbols-outlined text-white text-xl" data-icon="workspace_premium">workspace_premium</span>
</div>
<span class="font-label-caps text-[10px] text-secondary-fixed bg-black/50 px-2 py-0.5 rounded backdrop-blur-sm">RANK CHALLENGE</span>
</div>
</div>
<div class="absolute bottom-[35%] right-[15%] pointer-events-auto">
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center shadow-[0_0_20px_rgba(0,251,251,0.6)] border-2 border-white">
<span class="material-symbols-outlined text-on-primary-container text-lg" data-icon="inventory_2">inventory_2</span>
</div>
<span class="font-label-caps text-[10px] text-primary-fixed bg-black/50 px-2 py-0.5 rounded backdrop-blur-sm">VAULT BOX</span>
</div>
</div>
<!-- STATS OVERLAY (BOTTOM LEFT) -->
<div class="px-margin-mobile flex justify-between items-end pointer-events-auto">
<div class="glass bg-black/40 border border-white/5 p-4 rounded-xl space-y-2 min-w-[140px]">
<div class="flex items-center justify-between gap-4">
<span class="font-label-caps text-[10px] text-on-surface-variant">NEARBY</span>
<span class="text-primary-fixed font-bold">14</span>
</div>
<div class="flex items-center justify-between gap-4">
<span class="font-label-caps text-[10px] text-on-surface-variant">EVENTS</span>
<span class="text-secondary font-bold">03</span>
</div>
<div class="pt-2 border-t border-white/10">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
<span class="font-label-caps text-[10px] text-green-500">SERVER ONLINE</span>
</div>
</div>
</div>
</div>
</main>
<!-- BOTTOM NAVIGATION BAR -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-end px-gutter pb-8 h-[96px] bg-surface-container-lowest/40 backdrop-blur-2xl dark:bg-surface-container-lowest/40 rounded-t-lg border-t border-white/10 shadow-[0_-8px_32px_rgba(0,0,0,0.6)]">
<!-- Map (Active) -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full p-unit scale-110 shadow-[0_0_15px_rgba(0,251,251,0.6)] transition-all">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-label-caps text-label-caps mt-1">Map</span>
</button>
<!-- Vault -->
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 hover:text-primary transition-all active:scale-110">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-label-caps text-label-caps mt-1">Vault</span>
</button>
<!-- Ranks -->
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 hover:text-primary transition-all active:scale-110">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label-caps text-label-caps mt-1">Ranks</span>
</button>
<!-- Events -->
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 hover:text-primary transition-all active:scale-110">
<span class="material-symbols-outlined" data-icon="event">event</span>
<span class="font-label-caps text-label-caps mt-1">Events</span>
</button>
</nav>
</body></html>
