<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Work+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#282a2b",
                        "surface-dim": "#121414",
                        "surface-container-lowest": "#0d0e0f",
                        "on-error": "#690005",
                        "on-secondary-container": "#8ec8fe",
                        "surface-container-highest": "#333535",
                        "on-primary-container": "#561d00",
                        "outline-variant": "#5a4136",
                        "on-background": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#474747",
                        "primary-fixed": "#ffdbcd",
                        "tertiary-fixed": "#e4e2e1",
                        "on-primary": "#581e00",
                        "on-secondary-fixed": "#001d32",
                        "surface-variant": "#333535",
                        "surface-container-low": "#1a1c1c",
                        "outline": "#aa8a7d",
                        "tertiary": "#c8c6c6",
                        "on-primary-fixed": "#360f00",
                        "inverse-primary": "#a33e00",
                        "inverse-on-surface": "#2f3131",
                        "primary-fixed-dim": "#ffb596",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#7c2e00",
                        "surface": "#121414",
                        "on-error-container": "#ffdad6",
                        "background": "#121414",
                        "secondary": "#96ccff",
                        "primary": "#ffb596",
                        "on-tertiary": "#303030",
                        "error": "#ffb4ab",
                        "surface-container": "#1e2020",
                        "surface-bright": "#38393a",
                        "inverse-surface": "#e2e2e2",
                        "secondary-fixed-dim": "#96ccff",
                        "on-surface": "#e2e2e2",
                        "tertiary-fixed-dim": "#c8c6c6",
                        "tertiary-container": "#989696",
                        "on-tertiary-fixed": "#1b1c1c",
                        "on-secondary-fixed-variant": "#004a75",
                        "secondary-container": "#025483",
                        "on-surface-variant": "#e3bfb1",
                        "on-secondary": "#003353",
                        "on-tertiary-container": "#2f2f2f",
                        "surface-tint": "#ffb596",
                        "primary-container": "#ff6600",
                        "secondary-fixed": "#cee5ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin": "48px",
                        "max_width": "1440px",
                        "gutter": "24px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label-caps": ["Space Grotesk"],
                        "h3": ["Space Grotesk"],
                        "h1": ["Space Grotesk"],
                        "body-md": ["Work Sans"],
                        "body-lg": ["Work Sans"],
                        "h2": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600"}],
                        "h3": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "h1": ["72px", {"lineHeight": "1.0", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h2": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.01em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hazard-stripe {
            background: repeating-linear-gradient(
                45deg,
                #ff6600,
                #ff6600 10px,
                #000 10px,
                #000 20px
            );
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary-container selection:text-on-primary-container overflow-hidden">

    <main class="flex min-h-screen">
        <!-- Visual Section: Structural Steel Background -->
        <section class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-neutral-900 border-r-2 border-neutral-700">
            <div class="absolute inset-0 z-0 opacity-40">
                <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2000&auto=format&fit=crop" 
                     class="w-full h-full object-cover" 
                     data-alt="A cinematic low-angle shot of a massive skyscraper's internal steel frame structure during construction. The intricate web of I-beams and girders is rendered in sharp detail with high-contrast shadows. The lighting is moody and industrial, emphasizing the raw metallic texture of the steel. The color palette is dominated by deep charcoals and gunmetal grays, reflecting a high-performance industrial aesthetic."
                     alt="Structural Steel Framing">
            </div>
            
            <!-- Branding Overlay -->
            <div class="relative z-10 p-16 flex flex-col justify-between w-full">
                <div class="flex flex-col gap-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-primary-container flex items-center justify-center">
                            <span class="material-symbols-outlined text-black font-black" style="font-variation-settings: 'FILL' 1;">architecture</span>
                        </div>
                        <h1 class="font-h3 text-h3 text-primary-container tracking-widest uppercase">STEELFRAME</h1>
                    </div>
                </div>

                <div class="space-y-6">
                    <h2 class="font-h1 text-h1 uppercase leading-none">Structural<br>Integrity<br>Guaranteed.</h2>
                    <div class="w-24 h-2 hazard-stripe"></div>
                    <p class="font-body-lg text-neutral-400 max-w-md">
                        Join the global standard for industrial structural management. Engineered for architects, contractors, and civil engineers.
                    </p>
                </div>

                <div class="flex justify-between items-end">
                    <div class="flex flex-col">
                        <span class="font-label-caps text-neutral-500">OPERATIONS PORTAL</span>
                        <span class="font-label-caps text-primary-container">V2.4.0-STABLE</span>
                    </div>
                    <div class="text-neutral-600 text-xs tracking-widest uppercase">
                        EST. 1984 / NORTH AMERICAN STEEL ASSOCIATION
                    </div>
                </div>
            </div>
        </section>

        <!-- Form Section -->
        <section class="w-full lg:w-1/2 flex flex-col bg-surface-container-lowest">
            <!-- Top Mobile Header -->
            <div class="lg:hidden p-6 flex justify-between items-center border-b-2 border-neutral-800">
                <h1 class="font-h3 text-2xl text-primary-container tracking-widest uppercase font-black">STEELFRAME</h1>
                <span class="material-symbols-outlined text-neutral-500">menu</span>
            </div>

            <div class="flex-1 flex flex-col justify-center px-8 sm:px-16 md:px-24 xl:px-32 py-12">
                <div class="max-w-md w-full mx-auto space-y-12">
                    <!-- Auth Tabs -->
                    <div class="flex gap-8 border-b-2 border-neutral-800">
                        <button class="font-label-caps text-primary-container border-b-2 border-primary-container pb-4">SIGN UP</button>
                        <button class="font-label-caps text-neutral-500 pb-4 hover:text-on-background transition-colors">SIGN IN</button>
                    </div>

                    <!-- Main Form -->
                    <div class="space-y-8">
                        <header class="space-y-2">
                            <h3 class="font-h2 text-h3 uppercase">Create Account</h3>
                            <p class="font-body-md text-neutral-500 uppercase tracking-tighter">Enter organizational credentials to begin deployment.</p>
                        </header>

                        <form class="space-y-6" onsubmit="return false;">
                            <!-- Company Name -->
                            <div class="space-y-2 group">
                                <label class="font-label-caps text-neutral-400 block group-focus-within:text-primary-container transition-colors">COMPANY NAME</label>
                                <div class="relative">
                                    <input type="text" placeholder="GLOBAL INDUSTRIAL CORP" 
                                           class="w-full bg-surface-container-low border-2 border-neutral-700 p-4 font-body-md focus:border-primary-container focus:ring-0 text-on-background placeholder:text-neutral-700 transition-all">
                                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-600">
                                        <span class="material-symbols-outlined text-sm">corporate_fare</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Registration ID -->
                            <div class="space-y-2 group">
                                <label class="font-label-caps text-neutral-400 block group-focus-within:text-primary-container transition-colors">REGISTRATION ID</label>
                                <div class="relative">
                                    <input type="text" placeholder="NAS-442-990-X" 
                                           class="w-full bg-surface-container-low border-2 border-neutral-700 p-4 font-body-md focus:border-primary-container focus:ring-0 text-on-background placeholder:text-neutral-700 transition-all">
                                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-600">
                                        <span class="material-symbols-outlined text-sm">verified</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="space-y-2 group">
                                <label class="font-label-caps text-neutral-400 block group-focus-within:text-primary-container transition-colors">EMAIL ADDRESS</label>
                                <div class="relative">
                                    <input type="email" placeholder="ADMIN@STEELFRAME.IO" 
                                           class="w-full bg-surface-container-low border-2 border-neutral-700 p-4 font-body-md focus:border-primary-container focus:ring-0 text-on-background placeholder:text-neutral-700 transition-all">
                                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-600">
                                        <span class="material-symbols-outlined text-sm">alternate_email</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="space-y-2 group">
                                <label class="font-label-caps text-neutral-400 block group-focus-within:text-primary-container transition-colors">SECURE PASSWORD</label>
                                <div class="relative">
                                    <input type="password" placeholder="••••••••••••" 
                                           class="w-full bg-surface-container-low border-2 border-neutral-700 p-4 font-body-md focus:border-primary-container focus:ring-0 text-on-background placeholder:text-neutral-700 transition-all">
                                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-600">
                                        <span class="material-symbols-outlined text-sm">lock</span>
                                    </div>
                                </div>
                            </div>

                            <!-- CTA -->
                            <div class="pt-4">
                                <button type="submit" class="w-full bg-primary-container text-black font-h3 py-5 px-6 flex items-center justify-between group hover:bg-white transition-all duration-200 uppercase">
                                    <span>REGISTER ACCOUNT</span>
                                    <span class="material-symbols-outlined group-hover:translate-x-2 transition-transform">arrow_forward</span>
                                </button>
                                <p class="mt-6 font-label-caps text-neutral-600 text-[10px] text-center">
                                    BY REGISTERING, YOU AGREE TO OUR <span class="text-neutral-400 underline cursor-pointer hover:text-primary-container">TERMS OF SERVICE</span> AND <span class="text-neutral-400 underline cursor-pointer hover:text-primary-container">DATA PRIVACY PROTOCOLS</span>.
                                </p>
                            </div>
                        </form>
                    </div>

                    <!-- Footer Links -->
                    <div class="flex flex-col gap-4 border-t-2 border-neutral-800 pt-8">
                        <div class="flex items-center gap-4">
                            <span class="font-label-caps text-neutral-500">SINGLE SIGN-ON</span>
                            <div class="flex-1 h-px bg-neutral-800"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button class="border-2 border-neutral-700 py-3 flex items-center justify-center gap-2 font-label-caps text-neutral-400 hover:bg-neutral-800 transition-colors">
                                <img src="https://www.google.com/favicon.ico" class="w-4 h-4 grayscale opacity-50" alt="Google">
                                GOOGLE
                            </button>
                            <button class="border-2 border-neutral-700 py-3 flex items-center justify-center gap-2 font-label-caps text-neutral-400 hover:bg-neutral-800 transition-colors">
                                <span class="material-symbols-outlined text-sm">terminal</span>
                                AZURE AD
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mandatory Footer -->
            <footer class="bg-neutral-950 border-t-2 border-neutral-800 flex justify-between items-center w-full px-8 py-4 mt-auto">
                <p class="font-['Space_Grotesk'] text-[10px] uppercase font-medium tracking-widest text-neutral-600">
                    © 2024 STEELFRAME INDUSTRIAL. ALL RIGHTS RESERVED. STRUCTURAL INTEGRITY GUARANTEED.
                </p>
                <div class="flex gap-6">
                    <a href="#" class="font-['Space_Grotesk'] text-[10px] uppercase font-medium tracking-widest text-neutral-600 hover:text-[#FF6600]">TERMS OF SERVICE</a>
                    <a href="#" class="font-['Space_Grotesk'] text-[10px] uppercase font-medium tracking-widest text-neutral-600 hover:text-[#FF6600]">SYSTEM STATUS</a>
                </div>
            </footer>
        </section>
    </main>

</body>
</html></style></head><body></body></html>
