                    },
                    "fontFamily": {
                        "headline-xl": ["Space Grotesk"],

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
        }
        .structural-glow {
            box-shadow: 0 0 40px -10px rgba(0, 251, 251, 0.15);
        }
        .input-focus-line {
            position: relative;
            overflow: hidden;
        }
        .input-focus-line::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 100%;
            height: 1px;
            background: #00fbfb;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-focus-line:focus-within::after {
            left: 0;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen relative overflow-hidden flex items-center justify-center">
<!-- Background Environment -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover opacity-30 grayscale scale-105" data-alt="A high-angle architectural photograph of a modern skyscraper's glass atrium. The image features complex steel structures and transparent glass panels reflecting a cold, blue-toned twilight sky. The lighting is low and moody, emphasizing the sharp lines and mathematical precision of the engineering. The atmosphere is elite and professional, with deep blacks and high-contrast highlights mirroring the GlassEdge design system." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAv2Uha3Akp0Prq0-Txlj9TR26d-kOVvFiQOG_6neTFmg4_xTyLwla5nagvjnZm6TDxZz57aUEbJQgq4ych1xpQKlwVExEWVR5joahyMzlxiu9uO5rXKlM1hA1zZuxUkr52_YINJgiEs8HtxyajUQfm8SIWN20E31Ds2FispVyq29kC9ZRJgXhzy7hPWD1exhB82VHhiXJ2PMVa2d-k631PcgQbXxuU1vUvyo58e2-JNwjLfEnRq21GRYN-v6-BbV-n70TKo3Z3X7FL"/>
<div class="absolute inset-0 bg-gradient-to-tr from-background via-background/80 to-transparent"></div>
</div>
<!-- Main Auth Container -->
<main class="relative z-10 w-full max-w-[480px] px-gutter">
<!-- Logo Area -->
<div class="mb-stack-lg text-center">
<h1 class="font-headline-xl text-primary-fixed uppercase tracking-tighter">
                GLAZE_ARCH
            </h1>
<p class="font-label-caps text-on-surface-variant mt-2 tracking-[0.3em]">PRECISION ENVELOPE SYSTEMS</p>
</div>
<!-- Glass Auth Card -->
<div class="glass-panel structural-glow p-stack-lg flex flex-col gap-stack-md relative">
<!-- Tabs -->
<div class="flex border-b border-white/10 mb-stack-sm">
<button class="flex-1 pb-stack-sm font-label-caps text-primary-fixed border-b border-primary-fixed text-center transition-colors">
                    Architect Login
                </button>
<button class="flex-1 pb-stack-sm font-label-caps text-on-surface-variant text-center hover:text-on-surface transition-colors">
                    New Account
                </button>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-md">
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-white/40 text-[10px]">Registry ID / Email</label>
<div class="input-focus-line border-b border-white/20 group">
<input class="w-full bg-transparent border-none py-3 px-0 text-body-md placeholder:text-white/10 focus:ring-0 text-on-surface" placeholder="architect@glaze-arch.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-white/40 text-[10px]">Security Key</label>
<div class="input-focus-line border-b border-white/20 group">
<input class="w-full bg-transparent border-none py-3 px-0 text-body-md placeholder:text-white/10 focus:ring-0 text-on-surface" placeholder="••••••••••••" type="password"/>
</div>
</div>
<div class="flex justify-between items-center mt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="w-4 h-4 border border-white/30 rounded-sm flex items-center justify-center group-hover:border-primary-fixed transition-colors">
<span class="material-symbols-outlined text-[12px] text-primary-fixed opacity-0 group-has-[:checked]:opacity-100">check</span>
</div>
<input class="hidden" type="checkbox"/>
<span class="font-label-caps text-[10px] text-on-surface-variant">Persistent Session</span>
</label>
<a class="font-label-caps text-[10px] text-primary-fixed/60 hover:text-primary-fixed transition-colors" href="#">Credential Recovery</a>
</div>
<button class="mt-stack-md w-full py-4 bg-primary-fixed/5 border border-primary-fixed text-primary-fixed font-label-caps tracking-[0.2em] hover:bg-primary-fixed/10 active:scale-[0.98] transition-all duration-300">
                    AUTHORIZE ACCESS
                </button>
</form>
<!-- Bottom Action -->
<div class="pt-stack-md border-t border-white/5 mt-stack-sm flex flex-col items-center gap-stack-sm">
<span class="font-label-caps text-[10px] text-white/20">External Verification</span>
<div class="flex gap-stack-md">
<button class="w-10 h-10 border border-white/10 flex items-center justify-center hover:border-white/40 transition-colors">
<span class="material-symbols-outlined text-white/60">architecture</span>
</button>
<button class="w-10 h-10 border border-white/10 flex items-center justify-center hover:border-white/40 transition-colors">
<span class="material-symbols-outlined text-white/60">vpn_key</span>
</button>
</div>
</div>
</div>
<!-- Footer Footer -->
<div class="mt-stack-lg flex justify-between px-stack-sm">
<p class="font-label-caps text-[10px] text-white/20">© 2024 GLAZE_ARCH INDUSTRIES</p>
<p class="font-label-caps text-[10px] text-white/20 uppercase">Structural Integrity Guaranteed</p>
</div>
</main>
<!-- Structural Decorative Elements -->
<div class="fixed top-0 left-margin-page h-full w-[0.5px] bg-white/5 z-0"></div>
<div class="fixed top-0 right-margin-page h-full w-[0.5px] bg-white/5 z-0"></div>
<div class="fixed left-0 top-20 w-full h-[0.5px] bg-white/5 z-0"></div>
<div class="fixed left-0 bottom-20 w-full h-[0.5px] bg-white/5 z-0"></div>
<!-- Scanning Line Effect Overlay -->
<div class="fixed inset-0 pointer-events-none z-20 overflow-hidden opacity-10">
<div class="w-full h-[1px] bg-primary-fixed absolute top-1/4 left-0 blur-sm"></div>
</div>
</body></html>
