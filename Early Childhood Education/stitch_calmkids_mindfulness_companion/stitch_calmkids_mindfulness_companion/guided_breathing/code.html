</div>
<h1 class="font-headline-md text-headline-md text-primary">Hello, Little One</h1>
</div>
<button class="text-primary hover:opacity-80 transition-all ease-in-out duration-500">
<span class="material-symbols-outlined text-[28px]" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Canvas -->
<main class="min-h-screen pt-xl pb-[120px] px-margin flex flex-col items-center justify-center relative overflow-hidden">
<!-- Ambient Background Element -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] breathing-blob blur-3xl -z-10"></div>
<!-- Central Breathing Guided Section -->
<div class="flex flex-col items-center gap-lg w-full max-w-lg">
<!-- Instruction Text -->
<div class="text-center">
<h2 class="font-headline-lg text-headline-lg text-primary transition-opacity duration-1000">Breathe in...</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-xs">Follow the glowing circle</p>
</div>
<!-- Breathing Circle UI -->
<div class="relative w-72 h-72 flex items-center justify-center">
<!-- Outer Glow Layer -->
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-2xl scale-125"></div>
<!-- Secondary Layer (Tactile) -->
<div class="absolute inset-0 bg-primary-container/40 rounded-full shadow-[0_12px_40px_rgba(62,98,124,0.15)] scale-110"></div>
<!-- Primary Core Circle -->
<div class="relative w-64 h-64 bg-primary-container rounded-full flex items-center justify-center border-4 border-white shadow-xl">
<span class="material-symbols-outlined text-[80px] text-on-primary-container opacity-50" data-icon="air">air</span>
</div>
<!-- Progress Cloud Path (Organic Border) -->
<svg class="absolute -inset-4 w-[calc(100%+32px)] h-[calc(100%+32px)] -rotate-90 pointer-events-none" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="48" stroke="#e2e2e2" stroke-linecap="round" stroke-width="4"></circle>
<circle cx="50" cy="50" fill="none" r="48" stroke="#3e627c" stroke-dasharray="150 301" stroke-linecap="round" stroke-width="4"></circle>
</svg>
</div>
<!-- Focus Card (Bento-style detail) -->
<div class="w-full bg-surface-container-lowest rounded-xl p-md shadow-[0_8px_30px_rgb(62,98,124,0.08)] flex items-center gap-md">
<div class="p-sm bg-secondary-container rounded-full text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="spa" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<div>
<h3 class="font-headline-md text-[18px] text-on-surface">Calm Moment</h3>
<p class="font-body-md text-on-surface-variant text-[14px]">You are doing great. Just 2 more breaths.</p>
</div>
</div>
<!-- Session Stats Chips -->
<div class="flex flex-wrap justify-center gap-gutter">
<div class="bg-primary-fixed-dim/30 text-on-primary-container px-md py-sm rounded-full font-label-md flex items-center gap-xs">
<span class="material-symbols-outlined text-[20px]" data-icon="timer">timer</span>
                    4s In / 4s Out
                </div>
<div class="bg-secondary-fixed/30 text-on-secondary-container px-md py-sm rounded-full font-label-md flex items-center gap-xs">
<span class="material-symbols-outlined text-[20px]" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>

                </div>
</div>

</div>
