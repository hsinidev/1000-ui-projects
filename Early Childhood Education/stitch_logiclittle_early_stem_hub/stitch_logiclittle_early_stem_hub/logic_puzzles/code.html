<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&amp;family=Space+Grotesk:wght@600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#131d25",
                        "surface-tint": "#004dea",
                        "primary-fixed-dim": "#b6c4ff",
                        "primary-container": "#0055ff",
                        "error": "#ba1a1a",
                        "on-background": "#191c1d",
                        "tertiary": "#00576a",
                        "on-secondary-container": "#5a646d",
                        "primary": "#0041c8",
                        "background": "#f8f9fa",
                        "on-tertiary-fixed": "#001f27",
                        "secondary-container": "#d7e1ec",
                        "secondary-fixed": "#dae4ef",
                        "tertiary-fixed-dim": "#3cd7ff",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#dce1ff",
                        "on-secondary-fixed-variant": "#3e4851",
                        "inverse-primary": "#b6c4ff",
                        "secondary-fixed-dim": "#bec8d3",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-high": "#e7e8e9",
                        "on-tertiary-container": "#c1eeff",
                        "surface-bright": "#f8f9fa",
                        "on-surface-variant": "#434656",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#007189",
                        "tertiary-fixed": "#b4ebff",
                        "surface-variant": "#e1e3e4",
                        "surface-container-highest": "#e1e3e4",
                        "outline-variant": "#c3c5d9",
                        "on-error": "#ffffff",
                        "on-primary-container": "#e3e6ff",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f8f9fa",
                        "inverse-surface": "#2e3132",
                        "secondary": "#565f69",
                        "on-error-container": "#93000a",
                        "outline": "#737688",
                        "surface-container": "#edeeef",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary-fixed": "#001551",
                        "surface-dim": "#d9dadb",
                        "on-primary-fixed-variant": "#0039b3",
                        "on-tertiary-fixed-variant": "#004e5f",
                        "on-surface": "#191c1d",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "sm": "12px",
                        "base": "8px",
                        "gutter-mobile": "16px",
                        "margin-mobile": "20px",
                        "md": "24px",
                        "lg": "40px",
                        "xl": "64px"
                    },
                    "fontFamily": {
                        "body-lg": ["Lexend"],
                        "body-md": ["Lexend"],
                        "label-bold": ["Lexend"],
                        "headline-md": ["Space Grotesk"],
                        "display-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-bold": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "headline-md": ["28px", {"lineHeight": "34px", "fontWeight": "600"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tactile-button {
            box-shadow: 0 4px 0 0 #0039b3;
        }
        .tactile-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 #0039b3;
        }
        .geometric-bg {
            background-color: #f8f9fa;
            background-image: radial-gradient(#dce1ff 1.5px, transparent 1.5px);
            background-size: 32px 32px;
        }
        .shape-slot {
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md geometric-bg min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim border-b-2 border-surface-variant dark:border-outline-variant docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-gutter-mobile py-sm">
<button class="p-2 hover:bg-secondary-container/50 dark:hover:bg-secondary-fixed/10 transition-transform duration-150 active:scale-95 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="menu">menu</span>
</button>
<h1 class="font-display-lg text-headline-md text-primary dark:text-primary-fixed-dim tracking-tight">LogicLittle</h1>
<button class="p-2 hover:bg-secondary-container/50 dark:hover:bg-secondary-fixed/10 transition-transform duration-150 active:scale-95 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow container mx-auto px-gutter-mobile py-lg max-w-4xl">
<!-- Instructional Header -->
<div class="mb-lg text-center">
<div class="inline-block px-md py-sm bg-surface-container rounded-xl border-2 border-outline-variant mb-base">
<span class="font-label-bold text-label-bold text-primary">PATTERN MASTER</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-background mb-xs">What comes next?</h2>
<p class="font-body-md text-on-surface-variant">Drag the shape into the box to finish the pattern!</p>
</div>
<!-- Progress Hexagons -->
<div class="flex justify-center gap-base mb-xl">
<div class="w-10 h-10 bg-primary flex items-center justify-center clip-hexagon" style="clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);">
<span class="material-symbols-outlined text-on-primary text-sm" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="w-10 h-10 bg-primary flex items-center justify-center clip-hexagon" style="clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);">
<span class="material-symbols-outlined text-on-primary text-sm" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="w-10 h-10 bg-primary-container flex items-center justify-center clip-hexagon" style="clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);">
<div class="w-2 h-2 bg-on-primary-container rounded-full"></div>
</div>
<div class="w-10 h-10 bg-surface-container-highest flex items-center justify-center clip-hexagon" style="clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);"></div>
<div class="w-10 h-10 bg-surface-container-highest flex items-center justify-center clip-hexagon" style="clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);"></div>
</div>
<!-- Problem Card -->
<div class="bg-surface-container-lowest rounded-xl border-2 border-outline-variant p-md md:p-xl mb-xl">
<div class="flex flex-wrap items-center justify-center gap-md py-lg">
<!-- Pattern Sequence -->
<div class="w-20 h-20 bg-primary-container flex items-center justify-center rounded-xl rotate-45 border-4 border-primary">
<span class="material-symbols-outlined text-on-primary-container -rotate-45" data-icon="pentagon" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pentagon</span>
</div>
<div class="w-20 h-20 bg-tertiary-container flex items-center justify-center rounded-full border-4 border-tertiary">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">circle</span>
</div>
<div class="w-20 h-20 bg-primary-container flex items-center justify-center rounded-xl rotate-45 border-4 border-primary">
<span class="material-symbols-outlined text-on-primary-container -rotate-45" data-icon="pentagon" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pentagon</span>
</div>
<div class="w-20 h-20 bg-tertiary-container flex items-center justify-center rounded-full border-4 border-tertiary">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">circle</span>
</div>
<!-- Drop Target Slot -->
<div class="w-20 h-20 shape-slot border-4 border-dashed border-outline rounded-xl flex items-center justify-center bg-surface-container-low">
<span class="material-symbols-outlined text-outline/30" data-icon="question_mark" style="font-size: 32px;">question_mark</span>
</div>
</div>
</div>
<!-- Interactive Tray (Selection) -->
<div class="bg-white/80 backdrop-blur-md rounded-2xl p-md border-2 border-surface-variant shadow-lg">
<div class="flex justify-center items-center gap-lg">
<button class="tactile-button bg-primary-container w-24 h-24 rounded-2xl flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-on-primary-container" data-icon="pentagon" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pentagon</span>
</button>
<button class="tactile-button bg-error-container w-24 h-24 rounded-2xl flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-on-error-container" data-icon="square" data-weight="fill" style="font-variation-settings: 'FILL' 1;">square</span>
</button>
<button class="tactile-button bg-tertiary-container w-24 h-24 rounded-2xl flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="change_history" data-weight="fill" style="font-variation-settings: 'FILL' 1;">change_history</span>
</button>
</div>
</div>
<!-- Category Chip (Stem Chip) -->
<div class="mt-xl flex justify-center">
<div class="bg-secondary-fixed text-primary px-lg py-xs rounded-full font-label-bold text-label-bold">
                Logic Activity
            </div>
</div>
</main>
<!-- Navigation Area - BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-4 pt-2 bg-surface-container-lowest dark:bg-on-secondary-fixed border-t-4 border-secondary-container dark:border-on-secondary-container shadow-[0_-4px_10px_rgba(0,77,234,0.1)] z-50 rounded-t-xl">
<div class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary-fixed-dim text-on-primary-container dark:text-on-primary-fixed rounded-xl px-4 py-2 transition-all duration-300 shadow-[inset_0_-2px_0_rgba(0,0,0,0.2)] translate-y-0.5 scale-90">
<span class="material-symbols-outlined" data-icon="extension">extension</span>
<span class="font-label-bold text-label-bold">Logic</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim px-4 py-2 hover:bg-surface-container-high dark:hover:bg-on-secondary-fixed-variant rounded-xl transition-all">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
<span class="font-label-bold text-label-bold">Coding</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim px-4 py-2 hover:bg-surface-container-high dark:hover:bg-on-secondary-fixed-variant rounded-xl transition-all">
<span class="material-symbols-outlined" data-icon="science">science</span>
<span class="font-label-bold text-label-bold">Science</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim px-4 py-2 hover:bg-surface-container-high dark:hover:bg-on-secondary-fixed-variant rounded-xl transition-all">
<span class="material-symbols-outlined" data-icon="equalizer">equalizer</span>
<span class="font-label-bold text-label-bold">Stats</span>
</div>
</nav>
<!-- FAB (Contextual for primary action) -->
<div class="fixed bottom-24 right-gutter-mobile md:hidden">
<button class="w-16 h-16 bg-primary text-on-primary rounded-full tactile-button shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="lightbulb" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</button>
</div>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none opacity-20 -z-10 overflow-hidden">
<div class="absolute top-20 -left-10 w-40 h-40 border-4 border-primary rounded-full opacity-30"></div>
<div class="absolute bottom-40 -right-20 w-80 h-80 border-4 border-tertiary rotate-45 opacity-20"></div>
</div>
</body></html>
