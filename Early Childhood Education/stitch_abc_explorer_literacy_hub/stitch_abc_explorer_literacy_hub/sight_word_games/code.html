<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=lexend:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .block-shadow-primary {
            box-shadow: 0 8px 0 0 #930005;
        }
        .block-shadow-secondary {
            box-shadow: 0 8px 0 0 #004493;
        }
        .block-shadow-tertiary {
            box-shadow: 0 8px 0 0 #584400;
        }
        .active-press {
            transform: translateY(4px);
            box-shadow: none !important;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#f9f9f9",
                    "on-primary": "#ffffff",
                    "primary-container": "#e2241f",
                    "surface-container-highest": "#e2e2e2",
                    "on-secondary-fixed-variant": "#004493",
                    "secondary-container": "#0070eb",
                    "on-tertiary-fixed-variant": "#584400",
                    "on-secondary-fixed": "#001a41",
                    "secondary": "#0058bc",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#d0a600",
                    "surface-tint": "#c0000a",
                    "surface-container-low": "#f3f3f4",
                    "on-primary-fixed-variant": "#930005",
                    "surface": "#f9f9f9",
                    "on-tertiary-container": "#4f3d00",
                    "surface-bright": "#f9f9f9",
                    "on-tertiary-fixed": "#241a00",
                    "secondary-fixed-dim": "#adc6ff",
                    "on-primary-fixed": "#410001",
                    "primary-fixed": "#ffdad5",
                    "surface-container-high": "#e8e8e8",
                    "on-primary-container": "#fffbff",
                    "on-error": "#ffffff",
                    "tertiary": "#745b00",
                    "secondary-fixed": "#d8e2ff",
                    "surface-container": "#eeeeee",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "outline": "#926f6a",
                    "inverse-primary": "#ffb4aa",
                    "outline-variant": "#e7bdb7",
                    "surface-variant": "#e2e2e2",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ffe08b",
                    "on-surface-variant": "#5d3f3b",
                    "inverse-on-surface": "#f0f1f1",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#ffb4aa",
                    "tertiary-fixed-dim": "#f1c100",
                    "on-background": "#1a1c1c",
                    "on-secondary-container": "#fefcff",
                    "surface-dim": "#dadada",
                    "primary": "#bc000a",
                    "on-surface": "#1a1c1c",
                    "inverse-surface": "#2f3131"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "card-padding": "24px",
                    "touch-target-min": "48px",
                    "unit": "8px",
                    "margin-mobile": "24px"
            },
            "fontFamily": {
                    "display-xl": ["lexend"],
                    "body-md": ["lexend"],
                    "headline-md": ["lexend"],
                    "body-lg": ["lexend"],
                    "headline-lg": ["lexend"],
                    "label-bold": ["lexend"]
            },
            "fontSize": {
                    "display-xl": ["48px", {"lineHeight": "56px", "fontWeight": "800"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "body-lg": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "label-bold": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-background flex justify-between items-center w-full px-gutter py-4 sticky top-0 z-50">
<div class="flex items-center gap-unit">
<div class="w-12 h-12 rounded-full overflow-hidden border-4 border-primary shadow-sm">
<img alt="Child profile avatar" data-alt="A vibrant and friendly digital illustration of a young child's profile avatar. The style is clean and playful with soft rounded edges, featuring a bright yellow background and a smiling character with large expressive eyes. The overall aesthetic is energetic and encouraging, matching a high-contrast educational app for early learners with primary color accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB39VEm59ragn2M_UCK3bzH8lJppEmyU0YG3lKYuxqRzLIFhLGEAoIM-nOXKX-aKpMV-IUuzrl6njpl7bHhyH3EqriwMs9EgFCNya1jazUV4WrveZ1YgigSn9Z9eCLFBcb_MHyzAs_Q-y7q561-kQoZLiaKC5sPYxQo-Ia_t897aj1_dOdf_w8p04_HdhKV53m_0br3JSL_2A_MlnlnEbX7v8h15uM5zjA93f8tmY79Tz5BCUmNySL97AgzxB9ejTodssFGbQq1dYUx"/>
</div>
<h1 class="font-display-xl text-headline-lg text-primary">ABC Explorer</h1>
</div>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-high rounded-lg text-primary hover:opacity-80 transition-all">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</button>
</header>
<!-- Main Game Content -->
<main class="flex-grow container mx-auto px-margin-mobile py-unit flex flex-col items-center max-w-2xl">
<!-- Progress Bar -->
<div class="w-full flex gap-2 mb-8 h-6">
<div class="flex-grow bg-primary rounded-full shadow-[0_4px_0_0_#930005]"></div>
<div class="flex-grow bg-primary rounded-full shadow-[0_4px_0_0_#930005]"></div>
<div class="flex-grow bg-primary rounded-full shadow-[0_4px_0_0_#930005]"></div>
<div class="flex-grow bg-secondary rounded-full shadow-[0_4px_0_0_#004493]"></div>
<div class="flex-grow bg-surface-container-highest rounded-full"></div>
<div class="flex-grow bg-surface-container-highest rounded-full"></div>
<div class="flex-grow bg-surface-container-highest rounded-full"></div>
</div>
<!-- Feedback Area -->
<div class="flex justify-center mb-4">
<div class="bg-tertiary-fixed-dim p-4 rounded-xl shadow-[0_6px_0_0_#584400] flex items-center gap-2">
<span class="material-symbols-outlined text-on-tertiary-fixed text-4xl" data-icon="sentiment_very_satisfied" style="font-variation-settings: 'FILL' 1;">sentiment_very_satisfied</span>
<span class="font-headline-md text-on-tertiary-fixed">Great Job!</span>
</div>
</div>
<!-- Central Word Card -->
<div class="w-full aspect-[4/3] bg-surface-container-lowest border-4 border-surface-container-highest rounded-lg flex flex-col items-center justify-center mb-12 shadow-xl relative overflow-hidden">
<div class="absolute top-4 left-4 text-surface-container">
<span class="material-symbols-outlined text-6xl" data-icon="draw">draw</span>
</div>
<span class="font-display-xl text-[120px] text-on-background tracking-widest">THE</span>
<div class="absolute bottom-4 right-4 text-surface-container">
<span class="material-symbols-outlined text-6xl" data-icon="auto_stories">auto_stories</span>
</div>
</div>
<!-- Choice Grid -->
<div class="grid grid-cols-2 gap-6 w-full pb-28">
<!-- Option 1 -->
<button class="bg-primary text-on-primary font-headline-md py-6 rounded-lg block-shadow-primary active:translate-y-1 active:shadow-none transition-all flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-4xl" data-icon="record_voice_over">record_voice_over</span>
                AND
            </button>
<!-- Option 2 (Correct Highlight) -->
<button class="bg-secondary text-on-primary font-headline-md py-6 rounded-lg block-shadow-secondary active:translate-y-1 active:shadow-none transition-all flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-4xl" data-icon="record_voice_over">record_voice_over</span>
                THE
            </button>
<!-- Option 3 -->
<button class="bg-tertiary-container text-on-tertiary-container font-headline-md py-6 rounded-lg block-shadow-tertiary active:translate-y-1 active:shadow-none transition-all flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-4xl" data-icon="record_voice_over">record_voice_over</span>
                FOR
            </button>
<!-- Option 4 -->
<button class="bg-primary-container text-on-primary-container font-headline-md py-6 rounded-lg block-shadow-primary active:translate-y-1 active:shadow-none transition-all flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-4xl" data-icon="record_voice_over">record_voice_over</span>
                YOU
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-margin-mobile pb-safe bg-surface-container h-24 rounded-t-lg border-t-4 border-surface-container-highest">
<a class="flex flex-col items-center justify-center text-on-surface-variant p-unit hover:bg-surface-variant transition-all" href="#">
<span class="material-symbols-outlined" data-icon="draw">draw</span>
<span class="font-label-bold text-label-bold">Letters</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-unit hover:bg-surface-variant transition-all" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="font-label-bold text-label-bold">Stories</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-lg p-unit shadow-[0_4px_0_0_#004493] -translate-y-1 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="videogame_asset" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
<span class="font-label-bold text-label-bold">Games</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-unit hover:bg-surface-variant transition-all" href="#">
<span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
<span class="font-label-bold text-label-bold">Parents</span>
</a>
</nav>
<!-- Floating Action Button Contextual (Audio Prompt) -->
<button class="fixed bottom-32 right-gutter w-20 h-20 bg-tertiary-container text-on-tertiary-container rounded-full shadow-[0_8px_0_0_#584400] flex items-center justify-center active:translate-y-1 active:shadow-none transition-all z-40">
<span class="material-symbols-outlined text-5xl" data-icon="volume_up" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</button>
</body></html>
