<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&amp;family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#a98742",
                    "on-error-container": "#93000a",
                    "background": "#fff8f5",
                    "on-error": "#ffffff",
                    "primary-container": "#4e070c",
                    "on-surface": "#1e1b18",
                    "surface-container-lowest": "#ffffff",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "outline-variant": "#dbc0be",
                    "on-primary-fixed-variant": "#7d2b2b",
                    "surface-container-high": "#efe6e2",
                    "on-tertiary-fixed-variant": "#5d4201",
                    "surface-container-low": "#fbf2ed",
                    "secondary-container": "#e2e0d5",
                    "inverse-on-surface": "#f8efea",
                    "outline": "#887270",
                    "surface-variant": "#e9e1dc",
                    "on-secondary": "#ffffff",
                    "primary-fixed": "#ffdad7",
                    "tertiary-fixed-dim": "#e9c176",
                    "on-primary-container": "#d46d6a",
                    "surface-container-highest": "#e9e1dc",
                    "secondary": "#5f5f56",
                    "surface-dim": "#e1d8d4",
                    "tertiary-container": "#322200",
                    "tertiary-fixed": "#ffdea5",
                    "primary": "#290002",
                    "secondary-fixed-dim": "#c9c7bc",
                    "primary-fixed-dim": "#ffb3af",
                    "on-secondary-container": "#64635a",
                    "surface-container": "#f5ece7",
                    "inverse-primary": "#ffb3af",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#e5e2d8",
                    "on-surface-variant": "#554241",
                    "inverse-surface": "#34302c",
                    "on-background": "#1e1b18",
                    "error": "#ba1a1a",
                    "on-secondary-fixed-variant": "#48473f",
                    "on-tertiary-fixed": "#261900",
                    "on-secondary-fixed": "#1c1c15",
                    "surface": "#fff8f5",
                    "surface-tint": "#9b4240",
                    "surface-bright": "#fff8f5",
                    "on-primary-fixed": "#410005",
                    "tertiary": "#170e00"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "24px",
                    "margin": "40px",
                    "base": "8px",
                    "container-max": "1280px"
            },
            "fontFamily": {
                    "headline-md": ["Playfair Display"],
                    "headline-lg": ["Playfair Display"],
                    "data-mono": ["Manrope"],
                    "body-md": ["Manrope"],
                    "label-caps": ["Manrope"],
                    "headline-xl": ["Playfair Display"],
                    "body-lg": ["Manrope"],
                    "body-sm": ["Manrope"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "data-mono": ["14px", {"lineHeight": "1", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        .parchment-texture {
            background-color: #fff8f5;
            background-image: radial-gradient(#dbc0be 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.4;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen overflow-hidden">
<main class="flex min-h-screen">
<!-- Left Side: Atmospheric Hero -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-primary">
<div class="absolute inset-0 z-10 bg-gradient-to-r from-primary/60 to-transparent"></div>
<img alt="Luxury Wine Cellar" class="absolute inset-0 w-full h-full object-cover opacity-80" data-alt="A cinematic, low-angle shot of a grand subterranean wine cellar with vaulted stone ceilings. Dim, warm atmospheric lighting catches the dust motes and the edges of thousands of vintage wine bottles resting in dark oak racks. The color palette is dominated by deep burgundies, burnt umbers, and antique golds, creating a sense of heritage, quiet confidence, and exclusive luxury. The mood is sophisticated and serene, evoking the feeling of a private sanctuary for a serious collector." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-9-iJPlYpWb-1VO3j7xytio_PtHlGt_RW93hC6-H3QgPc2VVFPKVgiaqQdfq1iZVm66sLRH6fbx_7SPkr9JwsVdYOcgfG5hr44BY-kpVcHqufAD10dxk8mB--0t0J1N_73pdJqJPffetAiX8abcfRLOaJHQ7EQAxLh3-F-mwD0SqdyclWSZZSHZcRxjSm50vnTtWTSCKgpmAR7X-CPOmngL-ULzAbI29dCaeXwWNVELsnXaeJ1VYV1KlDwdWr3m2GtQZFigXbLXc"/>
<div class="relative z-20 flex flex-col justify-between p-margin h-full">
<div>
<h1 class="font-headline-lg text-headline-lg text-tertiary-fixed italic tracking-tight">Reserve Vault</h1>
<p class="font-label-caps text-label-caps text-tertiary-fixed/80 mt-2 uppercase tracking-widest">The Private Ledger for Fine Spirits</p>
</div>
<div class="max-w-md">
<p class="font-headline-md text-headline-md text-surface-container-lowest leading-snug">
                        "Wine is the only artwork you can drink."
                    </p>
<p class="font-body-md text-body-md text-on-primary-container mt-4 font-medium italic">— The Curator's Circle</p>
</div>
</div>
</section>
<!-- Right Side: Authentication Form -->
<section class="w-full lg:w-1/2 flex flex-col justify-center items-center relative p-gutter md:p-margin bg-background">
<!-- Subtle Texture Overlay -->
<div class="absolute inset-0 parchment-texture pointer-events-none"></div>
<div class="w-full max-w-md relative z-10">
<div class="mb-12 text-center lg:text-left">
<h2 class="font-headline-xl text-headline-xl text-primary mb-2">Welcome Back</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Sign in to manage your private collection.</p>
</div>
<!-- Social Authentication -->
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-3 px-6 py-4 border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low transition-all duration-300 group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
</svg>
<span class="font-label-caps text-label-caps uppercase text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 px-6 py-4 border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low transition-all duration-300 group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z" fill="currentColor"></path>
</svg>
<span class="font-label-caps text-label-caps uppercase text-on-surface">Apple</span>
</button>
</div>
<div class="relative flex items-center mb-8">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-on-surface-variant uppercase">Or with Email</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Credentials Form -->
<form class="space-y-6">
<div class="relative group">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase mb-2 tracking-widest" for="email">Email Address</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body-md text-on-surface placeholder:text-outline-variant transition-colors" id="email" name="email" placeholder="sommelier@vault.com" type="email"/>
</div>
<div class="relative group">
<div class="flex justify-between items-center mb-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<a class="font-label-caps text-label-caps text-on-primary-container hover:text-primary transition-colors uppercase tracking-widest" href="#">Forgot?</a>
</div>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body-md text-on-surface placeholder:text-outline-variant transition-colors" id="password" name="password" placeholder="••••••••••••" type="password"/>
</div>
<div class="flex items-center space-x-3 pt-2">
<input class="w-4 h-4 border-outline-variant text-primary focus:ring-primary rounded-none" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="remember">Keep me signed in for 30 days</label>
</div>
<div class="pt-4">
<button class="w-full bg-primary text-tertiary-fixed py-5 font-label-caps text-label-caps uppercase tracking-[0.2em] hover:bg-primary-container transition-all duration-300 shadow-lg active:scale-[0.98]" type="submit">
                            Enter the Vault
                        </button>
</div>
</form>
<div class="mt-12 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        New to the collection? 
                        <a class="font-bold text-primary hover:underline underline-offset-4 ml-1" href="#">Join the Reserve</a>
</p>
</div>
</div>
<!-- Footer Decorative Element -->
<div class="absolute bottom-margin left-margin right-margin flex justify-between items-center opacity-40 pointer-events-none">
<span class="font-data-mono text-data-mono uppercase tracking-[0.3em] text-on-surface-variant">EST. 1924</span>
<div class="flex space-x-8">
<span class="font-data-mono text-data-mono uppercase tracking-[0.3em] text-on-surface-variant">Terms</span>
<span class="font-data-mono text-data-mono uppercase tracking-[0.3em] text-on-surface-variant">Privacy</span>
</div>
</div>
</section>
</main>
</body></html>
