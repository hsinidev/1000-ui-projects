<style>
        body {
            background-color: #fcfdc6; /* surface color from theme */
            font-family: 'Libre Caslon Text', serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }
        .input-technical {
            background-color: #f6f7c1; /* surface-container-low */
            border: 1px solid rgba(40, 54, 24, 0.2); /* slate-inspired border */
            transition: border-color 0.2s ease;
        }
        .input-technical:focus {
            outline: none;
            border-color: rgba(40, 54, 24, 0.8);
            ring: 0;
        }
    </style>

<body class="bg-background text-on-background selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="flex min-h-screen">
<!-- Left Column: Evocative Landscape -->
<section class="hidden lg:block lg:w-1/2 relative overflow-hidden">
<img alt="Vineyard Landscape" class="absolute inset-0 w-full h-full object-cover" data-alt="A wide-angle, cinematic photograph of a rolling vineyard at golden hour. The landscape is bathed in a warm, amber glow, highlighting the precise rows of grapevines following the natural curves of the earth. In the distance, misty hills are layered in shades of deep forest green and slate grey. The visual style is that of a premium archival field journal, with high clarity and a serene, professional atmosphere that evokes the historical heritage of viticulture." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0Kys4M7_2MoyBWeTlhGQdEnzutDPD_1pYTBKAGdAhnYJEY1VRDfH7pn7AUDVrAs3SVYAEoe3eyDTkkQLaYua-kQZFZMifCf_2ZBoFj0CcALAOXESWce-pLMJJXPY-HKLalLNNb6g7-QwGtnHuAYwgUoSWUr3K131wCfDHJS1GiF1ODlj61DH93imoHehoCwsilDCxWH8NXjmdrlM7_0gl45aL-c_VhjqyAYWbId5D68tYxjR6Gu__MB3KDckwI_DZcjfe2sSdMD53"/>
<!-- Overlay for text legibility -->
<div class="absolute inset-0 bg-primary/20 mix-blend-multiply"></div>
<!-- Branding Overlay -->
<div class="absolute top-12 left-12 z-10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-surface text-4xl">landscape</span>
<h1 class="font-display-xl text-display-xl text-surface tracking-tighter">VigneAtlas</h1>
</div>
</div>
<!-- Content Overlay -->
<div class="absolute bottom-16 left-12 right-12 z-10">
<p class="font-headline-md text-headline-md text-surface max-w-md leading-snug">
                    "The soil is the manuscript, the vines are the ink."
                </p>
<div class="mt-6 flex items-center gap-4">
<div class="h-[1px] w-12 bg-surface/40"></div>
<span class="font-label-sm text-label-sm text-surface/80 uppercase tracking-widest">Archive Series Vol. IV</span>
</div>
</div>
</section>
<!-- Right Column: Auth Form -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-8 md:p-16 lg:p-24 bg-surface">
<div class="w-full max-w-md">
<!-- Form Header -->
<header class="mb-stack-lg">
<h2 class="font-headline-lg text-headline-lg text-on-background mb-unit">Establish Access</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Join the botanical archive and map your vineyard's unique terroir.</p>
</header>
<!-- Auth Tabs (Simple) -->
<div class="flex gap-stack-md border-b border-outline-variant/30 mb-stack-md">
<button class="pb-2 font-label-sm text-label-sm text-primary border-b-2 border-primary">SIGN UP</button>
<button class="pb-2 font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors">LOG IN</button>
</div>
<!-- Sign-up Form -->
<form class="space-y-stack-md">
<!-- Name Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2" for="full_name">
<span class="material-symbols-outlined text-[16px]">person</span>
                            FULL NAME
                        </label>
<input class="w-full px-4 py-3 rounded-lg font-body-md text-body-md input-technical" id="full_name" name="full_name" placeholder="e.g. Julian Vigne" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-[16px]">mail</span>
                            INSTITUTIONAL EMAIL
                        </label>
<input class="w-full px-4 py-3 rounded-lg font-body-md text-body-md input-technical" id="email" name="email" placeholder="name@terroir-atlas.com" type="email"/>
</div>
<!-- Vineyard Affiliation Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2" for="vineyard">
<span class="material-symbols-outlined text-[16px]">layers</span>
                            VINEYARD AFFILIATION
                        </label>
<input class="w-full px-4 py-3 rounded-lg font-body-md text-body-md input-technical" id="vineyard" name="vineyard" placeholder="Estate or Appellation name" type="text"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-[16px]">lock</span>
                            SECURE KEY
                        </label>
<input class="w-full px-4 py-3 rounded-lg font-body-md text-body-md input-technical" id="password" name="password" placeholder="••••••••••••" type="password"/>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<div class="pt-1">
<input class="rounded border-outline-variant text-primary focus:ring-primary-container" id="terms" type="checkbox"/>
</div>
<label class="font-caption-italic text-caption-italic text-on-surface-variant" for="terms">
                            I acknowledge the terms of data curation and stewardship within the VigneAtlas network.
                        </label>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary text-surface font-label-sm text-label-sm py-4 rounded-lg hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm" type="submit">
                        INITIALIZE ARCHIVE ACCESS
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Social/External Auth -->
<div class="mt-stack-lg">
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-caption-italic text-caption-italic text-on-surface-variant">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<div class="grid grid-cols-2 gap-4 mt-4">
<button class="flex items-center justify-center gap-2 px-4 py-3 border border-outline-variant/40 rounded-lg font-label-sm text-label-sm hover:bg-surface-container-low transition-colors">
<img alt="Google" class="w-4 h-4 grayscale opacity-70" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgTYlkVkEUyWN6W0LDf8yay7uuhMp50dW3qBgH7cJ_OxQrRK9RVAMa_y5LT5tzIjWg_BiJYhFkGRP8iC_PCI_D2r7RWM2ATORkrMVxHwIAdPCCgsAWaKMqVM2qw8gIQKvjPzuO2N9kwBKndTEjzNlvAB5-Fdug7KbTS6DguOfO3I5iIzgkviymFRvCNveNtYnGjLhr0p9JKJkLZMiOEIml_yN5Be95a12LCgeo_g1gK5AZklgc996d_CukDHXIljZTr27WbTQN--O2"/>
                            GOOGLE
                        </button>
<button class="flex items-center justify-center gap-2 px-4 py-3 border border-outline-variant/40 rounded-lg font-label-sm text-label-sm hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px]">mail_outline</span>
                            ORCID
                        </button>
</div>
</div>
<!-- Footer Support -->
<footer class="mt-stack-lg pt-stack-md border-t border-outline-variant/10 text-center">
<p class="font-caption-italic text-caption-italic text-on-surface-variant">
                        Technical issues? Contact the <a class="text-primary underline decoration-primary/30 underline-offset-4" href="#">Atlas Librarian</a>
</p>
</footer>
</div>
</section>
