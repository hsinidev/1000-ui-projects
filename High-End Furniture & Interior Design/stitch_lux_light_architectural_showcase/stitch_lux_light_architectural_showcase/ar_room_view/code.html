<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-error": "#690005",
                    "on-surface": "#dee2f4",
                    "background": "#0e1320",
                    "primary-fixed-dim": "#c3c6d7",
                    "secondary-fixed-dim": "#e9c349",
                    "inverse-surface": "#dee2f4",
                    "inverse-primary": "#5a5e6d",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-tertiary-container": "#7a7c7c",
                    "on-surface-variant": "#c7c6cc",
                    "on-tertiary": "#2f3131",
                    "on-background": "#dee2f4",
                    "outline": "#909096",
                    "secondary-container": "#af8d11",
                    "primary-container": "#0a0e1a",
                    "surface-bright": "#343947",
                    "secondary": "#e9c349",
                    "on-primary-container": "#777b8a",
                    "primary": "#c3c6d7",
                    "inverse-on-surface": "#2b303e",
                    "error": "#ffb4ab",
                    "on-secondary": "#3c2f00",
                    "surface-container-lowest": "#090e1a",
                    "on-secondary-fixed-variant": "#574500",
                    "tertiary-fixed": "#e2e2e2",
                    "surface-container": "#1a1f2c",
                    "error-container": "#93000a",
                    "secondary-fixed": "#ffe088",
                    "on-primary": "#2c303d",
                    "primary-fixed": "#dfe2f3",
                    "surface-tint": "#c3c6d7",
                    "outline-variant": "#46464c",
                    "on-secondary-container": "#342800",
                    "surface": "#0e1320",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed": "#241a00",
                    "surface-variant": "#303542"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "24px",
                    "container-max": "1440px",
                    "margin": "64px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "body-md": ["Inter", "sans-serif"],
                    "headline-md": ["Noto Serif", "serif"],
                    "label-md": ["Inter", "sans-serif"],
                    "technical-sm": ["Inter", "sans-serif"],
                    "body-lg": ["Inter", "sans-serif"],
                    "display-lg": ["Noto Serif", "serif"],
                    "headline-lg": ["Noto Serif", "serif"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "500"}],
                    "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "technical-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg": ["40px", {"lineHeight": "1.2", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(14, 19, 32, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(233, 195, 73, 0.2);
        }
        .ar-overlay-gradient {
            background: linear-gradient(to bottom, rgba(14, 19, 32, 0.8) 0%, transparent 20%, transparent 80%, rgba(14, 19, 32, 0.8) 100%);
        }
        .glow-gold {
            box-shadow: 0 0 20px rgba(233, 195, 73, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden">
<!-- AR Camera Viewport -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover grayscale-[20%] brightness-75" data-alt="A POV perspective of a high-end, minimalist luxury living room with white walls, dark oak flooring, and floor-to-ceiling windows overlooking a twilight landscape. The room is mostly empty, specifically designed for an AR interior design application. The lighting is soft and cinematic, with a deep navy and warm gold color palette that feels exclusive and sophisticated. The camera angle is eye-level, showing a spacious ceiling area ready for a virtual lighting fixture installation." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9j7uDJZtoLpvjNp7rXvY-IPTt4Y5oEprZLDOivYmfvuYQUohV8M-puC5ajAaPVKHJi8r1dvFaBJPy0HnwGqwvtiK6vkp_xIndmt4utTuMSP357YTZeA9KfYpKGPM_9_DK9hZb06nSWcYZelBnRnWApxpbWXLJu-UrDRs-bb0cSuL_wAvrKszDw4CgiK5e6tFoGuGRUI4uID3MZDcj-8aYdQE5HXS-hwGi_RMP6ZJr9ycfcDjdLgaQ7d_Ok_Dt0YvguvAv5BRlPuQ"/>
<!-- Virtual 3D Chandelier Placement -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative group">
<img class="w-[400px] h-auto drop-shadow-[0_0_40px_rgba(233,195,73,0.3)] opacity-90 brightness-110" data-alt="A photorealistic 3D model of a luxury modern chandelier composed of cascading geometric gold prisms and frosted glass elements. The fixture glows with a warm 2700K light temperature, casting a soft ambient radiance. It is shown suspended mid-air in a digital AR interface, appearing integrated into the physical room environment. The golden finish of the chandelier reflects the room's twilight lighting, embodying a high-end gallery aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA98pQE0I8oGajD9B7KRlhXBC6lq5BK7ajSAYKRWQxbgsiZUhpvxvX9ZY2D-0DEhAbFDHnGc2P60FRK7ner3r6CXDkDdjWFINRxZkrDgPucofzTs_mYh9x8IyLztBco6-oPIeT_-USpMPkzuphW-8MkX9vp2Qb5wfD6iGxX-R6bOsXbw90--hbfueKsvzcE02EJb9vJloiCm5THgCTpLOwG5JJPHzTJdx7Xd3botaoQlHbE-nkAdIo3zvyA_TASDI-2zdFe7WrPW8I"/>
<!-- AR Tracking Reticle -->
<div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-48 h-12 bg-secondary/10 border border-secondary/40 rounded-full blur-xl"></div>
<div class="absolute inset-0 border-2 border-dashed border-secondary/30 rounded-xl pointer-events-none opacity-50"></div>
</div>
</div>
<!-- Ambient Overlays -->
<div class="absolute inset-0 ar-overlay-gradient pointer-events-none"></div>
</div>
<!-- Top App Bar (Shared Component Strategy) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin h-20 bg-surface-dim/40 backdrop-blur-xl border-b border-secondary/10">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-secondary/10 transition-colors">
<span class="material-symbols-outlined text-secondary">close</span>
</button>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-secondary/70 uppercase tracking-widest">AR Experience</span>
<span class="font-headline-md text-[20px] text-on-surface leading-none">AURORA PENDANT</span>
</div>
</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex gap-8">
<span class="font-label-md text-label-md text-on-surface-variant hover:text-secondary transition-colors cursor-pointer">DETAILS</span>
<span class="font-label-md text-label-md text-on-surface-variant hover:text-secondary transition-colors cursor-pointer">SPECS</span>
</div>
<div class="w-10 h-10 rounded-full border border-secondary/30 bg-surface-container overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Professional portrait of a luxury architect, mid-40s, with a clean and sophisticated look. The lighting is dramatic, high-contrast studio style that aligns with the premium brand identity. He is wearing a dark charcoal turtleneck, and the background is a blurred high-end interior. The image represents the 'Architect Profile' user within the LUX-LIGHT ecosystem." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCe8a08j_LTsysZaADcYcKJyUfB9LNjy3RmRxaoFNdz4Eidesnp79L6K4bHw1Uw-XESKP3Os982cPCJ3VDOOT_0vQ6VU3QV5--o7Gmjgw2HjtO53Lt_OEBR6rz8R7V-c538zqxqmi812CpMAp6VVYLodNVCAijdfOzqlmlioh4NfPOVB1meUDJlp3ZP_6LDCnZlfTt_qEAbNOIb7jo0wUsEPtOSs3ijohgTg9GzL-K1neImNB2ThgmyGOLCU-LcW64grKA6MpViZP0"/>
</div>
</div>
</header>
<!-- AR Controls Overlay (Left Side) -->
<div class="fixed left-gutter top-1/2 -translate-y-1/2 z-40 flex flex-col gap-6">
<div class="glass-panel p-4 rounded-full flex flex-col gap-8 glow-gold">
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">height</span>
<span class="font-technical-sm text-[10px] text-secondary/60 uppercase tracking-tighter">Height</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-secondary transition-colors">rotate_90_degrees_ccw</span>
<span class="font-technical-sm text-[10px] text-on-surface-variant uppercase tracking-tighter">Rotate</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-secondary transition-colors">zoom_in</span>
<span class="font-technical-sm text-[10px] text-on-surface-variant uppercase tracking-tighter">Scale</span>
</button>
<div class="w-px h-8 bg-secondary/20 self-center"></div>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-secondary transition-colors">palette</span>
<span class="font-technical-sm text-[10px] text-on-surface-variant uppercase tracking-tighter">Finish</span>
</button>
</div>
</div>
<!-- Right Side Contextual Info -->
<div class="fixed right-gutter top-1/2 -translate-y-1/2 z-40 w-64 hidden lg:block">
<div class="glass-panel p-6 rounded-xl space-y-6">
<div>
<h4 class="font-label-md text-secondary mb-2 uppercase text-[12px] tracking-[0.2em]">Current Configuration</h4>
<div class="space-y-3">
<div class="flex justify-between items-center border-b border-secondary/10 pb-2">
<span class="text-on-surface-variant text-[13px]">Elevation</span>
<span class="text-secondary font-technical-sm">2400 mm</span>
</div>
<div class="flex justify-between items-center border-b border-secondary/10 pb-2">
<span class="text-on-surface-variant text-[13px]">Lumen Output</span>
<span class="text-secondary font-technical-sm">3200 lm</span>
</div>
<div class="flex justify-between items-center border-b border-secondary/10 pb-2">
<span class="text-on-surface-variant text-[13px]">Temp</span>
<span class="text-secondary font-technical-sm">2700 K</span>
</div>
</div>
</div>
<div class="pt-2">
<p class="font-technical-sm text-on-surface/60 italic leading-relaxed">
                    "The Aurora Pendant creates a dramatic focal point with its interlocking gold geometry."
                </p>
</div>
</div>
</div>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 w-full z-50 px-gutter pb-margin">
<div class="max-w-screen-md mx-auto flex items-center justify-between gap-4">
<!-- Secondary Actions -->
<div class="flex gap-4">
<button class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-on-surface hover:text-secondary transition-all">
<span class="material-symbols-outlined">undo</span>
</button>
<button class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-on-surface hover:text-secondary transition-all">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Primary Capture Button -->
<div class="relative group">
<div class="absolute inset-0 bg-secondary blur-2xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
<button class="relative h-16 px-10 bg-secondary text-on-secondary rounded-full flex items-center gap-3 font-label-md uppercase tracking-widest hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
                    CAPTURE &amp; SAVE
                </button>
</div>
<!-- Help Button -->
<button class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-on-surface hover:text-secondary transition-all">
<span class="material-symbols-outlined">info</span>
</button>
</div>
</div>
<!-- Bottom Navigation Shell (Shared Component Strategy) -->
<!-- Suppression Logic: Since this is a focused AR task, the global navigation is suppressed to prioritize the AR canvas. -->
<!-- Status Tooltip -->
<div class="fixed bottom-32 left-1/2 -translate-x-1/2 z-50">
<div class="bg-surface-dim/80 backdrop-blur-md px-6 py-2 rounded-full border border-secondary/20 flex items-center gap-3">
<div class="w-2 h-2 bg-secondary rounded-full animate-pulse"></div>
<span class="font-technical-sm text-on-surface-variant uppercase tracking-widest text-[10px]">Surface Tracked • Optimized for AR</span>
</div>
</div>
</body></html>
