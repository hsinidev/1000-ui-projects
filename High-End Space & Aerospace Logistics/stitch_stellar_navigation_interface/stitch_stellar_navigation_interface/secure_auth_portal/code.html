<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#2c303d",
                    "surface-variant": "#353436",
                    "outline-variant": "#46464c",
                    "background": "#131314",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "secondary-fixed": "#ffddb6",
                    "on-secondary-fixed-variant": "#643f00",
                    "surface-bright": "#3a393a",
                    "surface-container": "#201f20",
                    "on-surface-variant": "#c7c6cc",
                    "tertiary-fixed": "#e2e2e2",
                    "on-primary-container": "#777b8a",
                    "surface": "#131314",
                    "tertiary-container": "#0d0f0f",
                    "secondary": "#ffb95a",
                    "secondary-container": "#c68315",
                    "on-tertiary-container": "#7a7c7c",
                    "primary": "#c3c6d7",
                    "secondary-fixed-dim": "#ffb95a",
                    "on-error": "#690005",
                    "inverse-surface": "#e5e2e3",
                    "tertiary": "#c6c6c7",
                    "surface-container-highest": "#353436",
                    "primary-fixed": "#dfe2f3",
                    "on-tertiary": "#2f3131",
                    "inverse-on-surface": "#313031",
                    "error": "#ffb4ab",
                    "surface-dim": "#131314",
                    "on-surface": "#e5e2e3",
                    "surface-container-low": "#1c1b1c",
                    "inverse-primary": "#5a5e6d",
                    "surface-container-lowest": "#0e0e0f",
                    "surface-tint": "#c3c6d7",
                    "primary-container": "#0a0e1a",
                    "outline": "#909096",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-primary-fixed": "#171b28",
                    "error-container": "#93000a",
                    "on-background": "#e5e2e3",
                    "on-secondary-container": "#3d2400",
                    "primary-fixed-dim": "#c3c6d7",
                    "on-secondary": "#462a00",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-secondary-fixed": "#2a1800",
                    "surface-container-high": "#2a2a2b",
                    "on-primary-fixed-variant": "#434654"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "24px",
                    "unit": "4px",
                    "panel-gap": "16px",
                    "margin-edge": "40px"
            },
            "fontFamily": {
                    "telemetry-data": ["JetBrains Mono"],
                    "label-caps": ["Space Grotesk"],
                    "body-standard": ["JetBrains Mono"],
                    "headline-md": ["Space Grotesk"],
                    "display-lg-mobile": ["Space Grotesk"],
                    "display-lg": ["Space Grotesk"]
            },
            "fontSize": {
                    "telemetry-data": ["18px", {"lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "body-standard": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md": ["32px", {"lineHeight": "40px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "display-lg-mobile": ["32px", {"lineHeight": "38px", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .amber-glow {
            box-shadow: 0 0 15px rgba(255, 185, 90, 0.3);
            border: 1px solid #ffb95a;
        }
        .nebula-bg {
            background-color: #0A0E1A;
            position: relative;
            overflow: hidden;
        }
        .nebula-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(195, 198, 215, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 185, 90, 0.05) 0%, transparent 50%);
            z-index: 0;
        }
    </style>
</head>
<body class="bg-background text-on-surface nebula-bg min-h-screen flex items-center justify-center font-body-standard p-margin-edge">
<div class="nebula-overlay"></div>
<main class="z-10 w-full max-w-md">
<!-- Brand Header -->
<header class="mb-8 text-center">
<h1 class="font-display-lg text-display-lg-mobile text-primary tracking-widest mb-2">STAR-PATH</h1>
<p class="font-label-caps text-label-caps text-secondary tracking-[0.2em]">AUTHENTICATION PORTAL NODE: VII</p>
</header>
<!-- Auth Card -->
<div class="glass-panel amber-glow rounded-xl p-8 relative">
<!-- Decorative Corner Elements -->
<div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-secondary m-[-2px]"></div>
<div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-secondary m-[-2px]"></div>
<div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-secondary m-[-2px]"></div>
<div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-secondary m-[-2px]"></div>
<!-- Login/Signup Toggle -->
<div class="flex border-b border-outline-variant/30 mb-8">
<button class="flex-1 pb-4 text-secondary border-b-2 border-secondary font-label-caps text-label-caps transition-all">
                    LOGIN
                </button>
<button class="flex-1 pb-4 text-on-surface-variant hover:text-on-surface font-label-caps text-label-caps transition-all">
                    NEW PILOT ENROLLMENT
                </button>
</div>
<!-- Auth Form -->
<form class="space-y-6" onsubmit="return false">
<!-- Vessel ID Input -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-primary/70 ml-1">VESSEL ID</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary/60">rocket_launch</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/30 rounded-lg pl-10 pr-4 py-3 font-telemetry-data text-body-standard focus:outline-none focus:border-secondary transition-colors placeholder:text-on-surface-variant/30" placeholder="AV-7-XXXXX" type="text"/>
</div>
</div>
<!-- Biometric Auth Mock -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-primary/70 ml-1">BIOMETRIC AUTH</label>
<div class="p-6 border border-dashed border-outline-variant/50 rounded-xl bg-surface-container-lowest/30 flex flex-col items-center justify-center gap-4 group cursor-pointer hover:border-secondary transition-colors">
<div class="w-16 h-16 rounded-full border-2 border-secondary/30 flex items-center justify-center group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-4xl text-secondary" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant group-hover:text-secondary transition-colors">INITIATE RETINAL SCAN</span>
</div>
</div>
<!-- Secondary Input (Security Token) -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-primary/70 ml-1">SECURITY TOKEN</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary/60">key</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/30 rounded-lg pl-10 pr-4 py-3 font-telemetry-data text-body-standard focus:outline-none focus:border-secondary transition-colors" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Submit Action -->
<button class="w-full py-4 bg-secondary/10 border border-secondary text-secondary font-headline-md text-[18px] tracking-[0.2em] rounded-lg hover:bg-secondary/20 active:scale-[0.98] transition-all duration-200 mt-4">
                    INITIATE WARP
                </button>
</form>
<!-- Forgot Details -->
<div class="mt-6 text-center">
<a class="font-label-caps text-[10px] text-on-surface-variant hover:text-secondary transition-colors tracking-widest" href="#">ENCRYPTED CREDENTIAL RECOVERY</a>
</div>
</div>
<!-- System Status Footer -->
<footer class="mt-8 flex justify-between items-center px-4">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-secondary animate-pulse shadow-[0_0_8px_#ffb95a]"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant tracking-widest uppercase">ENCRYPTION: AES-256-LEVEL-9</span>
</div>
<div class="font-telemetry-data text-[10px] text-on-surface-variant">
                STP: 04.22.91.0
            </div>
</footer>
</main>
<!-- Background Cinematic Visuals -->
<div class="fixed inset-0 z-[-1] opacity-30">
<img class="w-full h-full object-cover mix-blend-screen" data-alt="A vast, cinematic deep space nebula filled with swirling clouds of dark violet, indigo, and deep blue cosmic dust. Brilliant amber stars and distant galaxies twinkle through the atmospheric layers, creating a sense of immense depth and sci-fi mystery. The lighting is low-key and dramatic, with a focus on the contrast between the cold void and the warm energy of celestial bodies, perfectly matching the high-security futuristic cockpit aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqo5-s3Z6B5ushMUkpNaqdLE0iwhghUthfVA3Hnqnk6eBgyEtJNua7vAy4oJFFcLKv_UC7B3ZVNhT6YlZDnD8NKhU_XNWaL348GUTm-3ouMQGI0dJg4Pjr8qsGMgy5cyNOYs6RtiLlWrbIHqr0U7knokFoD6Kly_C4dSWqJZaDk8-IRvCdnAMAe3eFz2iY6WMuPFqp3rfxsamRT0l-rKtLFaJiRbj1YNTVBpXcoy2ve6AK0c1yavzGkrp5Ax7__Z4pZV0mPZM5fvdC"/>
</div>
</body></html>
