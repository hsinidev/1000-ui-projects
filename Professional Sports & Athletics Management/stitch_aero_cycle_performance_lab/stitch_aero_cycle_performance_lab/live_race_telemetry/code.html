<!DOCTYPE html>

<style>

            background-color: #131313;

        .airflow-line {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(0, 242, 255, 0.4) 50%, transparent 100%);

        .glass-panel {
            background: rgba(44, 44, 44, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cyan-glow {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .vector-overlay {
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 242, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface-dim/70 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-gutter h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">sensors</span>
<h1 class="font-display-xl text-headline-md text-primary-container uppercase italic tracking-tighter">AERO_CYCLE</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-high rounded-full">
<span class="w-2 h-2 rounded-full bg-primary-container cyan-glow"></span>
<span class="font-label-sm text-label-sm uppercase text-on-surface">Live Telemetry</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">signal_cellular_alt</span>
</div>
</header>
<!-- Main Canvas -->
<main class="pt-24 pb-28 px-gutter max-w-container-max mx-auto min-h-screen vector-overlay">
<!-- Live Visualizer Section -->
<div class="grid grid-cols-12 gap-6">
<!-- Rider Aerodynamic Silhouette -->
<div class="col-span-12 lg:col-span-8 glass-panel relative overflow-hidden rounded-xl h-[400px] flex items-center justify-center">
<!-- Airflow Lines -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="airflow-line absolute top-1/4 w-full left-[-20%] opacity-30"></div>
<div class="airflow-line absolute top-1/2 w-full left-[-10%] opacity-50"></div>
<div class="airflow-line absolute top-3/4 w-full left-[-30%] opacity-20"></div>
</div>
<img class="h-full w-auto object-contain z-10 opacity-60 mix-blend-screen" data-alt="A side-profile cinematic shot of a professional cyclist in an aerodynamic time-trial position on a high-tech carbon fiber bike. The scene is shot in a dark, clinical wind tunnel with dramatic cool-toned blue lighting and subtle cyan laser-like airflow indicators. The background is a matte dark grey with technical grid overlays, evoking an elite engineering environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZQr-QF-syyGgDVE99CkoNUc6NhA-BhvpEh2PGWeIVoRdde9YDDfUFdL5H0g8arlvWxSCaxc874IORCyAxr-u8G1zI0z-nB8cZCiBFqPiHgFiN7JDndcY-fzSvc0o9L4Vts2f-jskUVJFO3AQe_QAWV60cO5pfE88gNGr7Je2CsEyT6WuSXpMp5c-zOWRAFwW2B1Gno1MGVcjLq1onP1xA6BD_lHINILf4rc6Enuq6c5ZKdzAEx-O4WfPUKkAYbbjmkp7dBEFy55s"/>
<div class="absolute top-6 left-6">
<h2 class="font-headline-md text-headline-md text-on-surface uppercase tracking-tight">Wind Resistance</h2>
<div class="flex items-baseline gap-2">
<span class="font-display-xl text-display-xl text-primary-container">0.24</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">CdA</span>
</div>
</div>
<!-- Wind Gauge Specialty Component -->
<div class="absolute bottom-6 right-6 w-32 h-32 border border-white/10 rounded-full flex items-center justify-center">
<div class="absolute inset-0 rounded-full border-t-2 border-primary-container rotate-45 opacity-50"></div>
<div class="w-1 h-12 bg-primary-container absolute origin-bottom bottom-1/2 rounded-full cyan-glow"></div>
<div class="z-20 text-center">
<span class="block font-label-sm text-label-sm text-on-surface-variant uppercase">Yaw</span>
<span class="font-data-mono text-data-mono text-primary-container">7.2°</span>
</div>
</div>
</div>
<!-- Side Metrics Column -->
<div class="col-span-12 lg:col-span-4 space-y-6">
<!-- Speed Card -->
<div class="glass-panel p-6 rounded-xl flex flex-col justify-between h-[188px]">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-primary-container">speed</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Optimal 48.0</span>
</div>
<div class="flex items-baseline gap-2 mt-auto">
<span class="font-display-xl text-display-xl text-primary-container">46.8</span>
<span class="font-headline-md text-headline-md text-on-surface">KM/H</span>
</div>
<div class="w-full h-1 bg-surface-container-low mt-4 relative">
<div class="absolute h-full bg-gradient-to-r from-background to-primary-container w-[92%] cyan-glow"></div>
</div>
</div>
<!-- Power Card -->
<div class="glass-panel p-6 rounded-xl flex flex-col justify-between h-[188px]">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-primary-container">bolt</span>
<div class="flex items-center gap-1">
<span class="w-2 h-2 rounded-full bg-error animate-pulse"></span>
<span class="font-label-sm text-label-sm text-error uppercase">Zone 5</span>
</div>
</div>
<div class="flex items-baseline gap-2 mt-auto">
<span class="font-display-xl text-display-xl text-primary-container">412</span>
<span class="font-headline-md text-headline-md text-on-surface">WATTS</span>
</div>
<div class="airflow-line w-full mt-4"></div>
</div>
</div>
<!-- Bottom Row Metrics -->
<div class="col-span-12 md:col-span-6 glass-panel p-6 rounded-xl border-l-4 border-l-primary-container">
<div class="flex items-center justify-between mb-4">
<h3 class="font-label-sm text-label-sm uppercase text-on-surface-variant">Cadence</h3>
<span class="material-symbols-outlined text-on-surface-variant">cycle</span>
</div>
<div class="flex items-center justify-between">
<span class="font-headline-lg text-headline-lg text-primary-container font-data-mono">94</span>
<div class="text-right">
<p class="font-label-sm text-label-sm text-on-surface uppercase">RPM</p>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">In Sync</p>
</div>
</div>
</div>
<div class="col-span-12 md:col-span-6 glass-panel p-6 rounded-xl">
<div class="flex items-center justify-between mb-4">
<h3 class="font-label-sm text-label-sm uppercase text-on-surface-variant">Heart Rate</h3>
<span class="material-symbols-outlined text-error">favorite</span>
</div>
<div class="flex items-center justify-between">
<span class="font-headline-lg text-headline-lg text-on-surface font-data-mono">172</span>
<div class="text-right">
<p class="font-label-sm text-label-sm text-on-surface uppercase">BPM</p>
<p class="font-label-sm text-label-sm text-error mt-1">Max Effort</p>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 h-20 bg-surface-container-lowest/80 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center px-4 pb-safe">

<a class="flex flex-col items-center justify-center text-primary-container border-t-2 border-primary-container pt-2 hover:bg-surface-container-high/50 transition-all Active: scale-95 duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">speed</span>
<span class="font-label-sm text-label-sm uppercase mt-1">Telemetry</span>
</a>
<!-- Tuning Inactive -->
<a class="flex flex-col items-center justify-center text-on-surface-variant pt-2 hover:bg-surface-container-high/50 transition-all Active: scale-95 duration-200" href="#">
<span class="material-symbols-outlined">build_circle</span>
<span class="font-label-sm text-label-sm uppercase mt-1">Tuning</span>
</a>
<!-- Gear Inactive -->
<a class="flex flex-col items-center justify-center text-on-surface-variant pt-2 hover:bg-surface-container-high/50 transition-all Active: scale-95 duration-200" href="#">
<span class="material-symbols-outlined">pedal_bike</span>
<span class="font-label-sm text-label-sm uppercase mt-1">Gear</span>
</a>
<!-- Sim Inactive -->
<a class="flex flex-col items-center justify-center text-on-surface-variant pt-2 hover:bg-surface-container-high/50 transition-all Active: scale-95 duration-200" href="#">
<span class="material-symbols-outlined">language</span>
<span class="font-label-sm text-label-sm uppercase mt-1">Sim</span>
</a>
</nav>
