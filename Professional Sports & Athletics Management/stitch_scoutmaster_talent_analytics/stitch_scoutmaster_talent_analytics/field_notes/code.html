<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant flex justify-between items-center px-grid-margin w-full h-16 fixed top-0 z-50">
<div class="flex items-center gap-md">

<h1 class="font-h3 text-h3 font-bold text-primary">ScoutMaster</h1>
</div>
<div class="flex items-center gap-md">
<div class="h-8 w-8 rounded-full overflow-hidden border border-outline-variant">

</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 mt-16 mb-20 px-grid-margin py-lg max-w-4xl mx-auto w-full">
<div class="grid grid-cols-12 gap-grid-gutter">
<!-- Quick Context Header -->
<section class="col-span-12 flex flex-col gap-sm mb-md">
<h2 class="font-h2 text-h2 text-primary">Field Notes</h2>
<div class="flex flex-wrap gap-sm">
<span class="bg-secondary-container text-on-secondary-container px-sm py-xs rounded font-label-caps text-label-caps uppercase">Match Live</span>
<span class="bg-surface-container-high text-on-surface-variant px-sm py-xs rounded font-label-caps text-label-caps uppercase">London Stadium</span>
</div>
</section>
<!-- Quick Selection Bento Grid -->
<div class="col-span-12 md:col-span-4 bg-surface-container-lowest border border-outline-variant p-lg rounded-xl flex flex-col gap-md shadow-sm">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Target Team</label>
<div class="relative">
<select class="w-full bg-surface border-b-2 border-outline focus:border-primary px-sm py-md font-body-md appearance-none">
<option>West Ham United</option>
<option>Arsenal FC</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-3 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Primary Player</label>
<div class="relative">
<select class="w-full bg-surface border-b-2 border-outline focus:border-primary px-sm py-md font-body-md appearance-none">
<option>Declan Rice (DM)</option>
<option>Jarrod Bowen (RW)</option>
<option>Lucas Paquetá (AM)</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-3 pointer-events-none text-on-surface-variant">person_search</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Match Clock</label>
<div class="flex items-center justify-between bg-surface border-b-2 border-outline px-sm py-md">
<span class="font-data-tabular text-h2 text-primary">34:12</span>
<span class="material-symbols-outlined text-error">timer</span>
</div>
</div>
</div>
<!-- Voice Record Module -->
<div class="col-span-12 md:col-span-8 bg-surface-container-lowest border border-outline-variant p-lg rounded-xl flex flex-col items-center justify-center gap-lg shadow-sm">
<div class="text-center">
<h3 class="font-h3 text-h3 text-primary mb-xs">Voice Capture</h3>
<p class="font-body-md text-on-surface-variant">Tap to record tactical observations</p>
</div>
<!-- Record Button -->
<button class="w-32 h-32 rounded-full bg-error flex items-center justify-center shadow-lg active:scale-95 transition-transform group">
<div class="w-24 h-24 rounded-full border-4 border-on-error flex items-center justify-center animate-pulse">
<span class="material-symbols-outlined text-on-error !text-5xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</button>
<div class="w-full h-8 flex items-end justify-center gap-1 overflow-hidden">
<div class="w-1 bg-primary h-2 rounded-full"></div>
<div class="w-1 bg-primary h-4 rounded-full"></div>
<div class="w-1 bg-primary h-6 rounded-full"></div>
<div class="w-1 bg-primary h-3 rounded-full"></div>
<div class="w-1 bg-primary h-8 rounded-full"></div>
<div class="w-1 bg-primary h-5 rounded-full"></div>
<div class="w-1 bg-primary h-2 rounded-full"></div>
</div>
</div>

<div class="col-span-12 bg-surface-container-lowest border border-outline-variant p-lg rounded-xl shadow-sm">
<div class="flex items-center justify-between mb-md">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Quick Observations</label>
<div class="flex gap-sm">
<button class="bg-surface-container text-on-surface-variant px-sm py-xs rounded font-label-caps text-label-caps uppercase border border-outline-variant">Template: Defensive</button>
<button class="bg-surface-container text-on-surface-variant px-sm py-xs rounded font-label-caps text-label-caps uppercase border border-outline-variant">Template: Transition</button>
</div>
</div>
<textarea class="w-full min-h-[160px] bg-surface border-b-2 border-outline focus:border-primary p-md font-body-md resize-none focus:ring-0" placeholder="Enter observation details..."></textarea>
<div class="mt-lg flex justify-end gap-md">
<button class="px-xl py-md font-label-caps text-label-caps uppercase text-primary border border-primary rounded-xl hover:bg-primary-fixed transition-colors">Discard</button>
<button class="px-xl py-md font-label-caps text-label-caps uppercase bg-primary text-on-primary rounded-xl hover:opacity-90 transition-opacity flex items-center gap-sm">
<span class="material-symbols-outlined !text-sm">save</span>
                        Save Note
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center py-2 bg-surface border-t border-outline-variant z-50">

<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-label-caps text-label-caps mt-1">Discovery</span>
</a>
<!-- Archive -->
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">movie</span>
<span class="font-label-caps text-label-caps mt-1">Archive</span>
</a>
<!-- Tracker -->

<span class="material-symbols-outlined">handshake</span>
<span class="font-label-caps text-label-caps mt-1">Tracker</span>
</a>
<!-- Compare -->
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="font-label-caps text-label-caps mt-1">Compare</span>
</a>
<!-- Notes (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-4 py-1 scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-label-caps text-label-caps mt-1">Notes</span>
</a>
</nav>
