<style>
        .color-wheel-gradient {
            background: conic-gradient(from 0deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
        }
        .kelvin-gradient {
            background: linear-gradient(to right, #ffb56b, #fff4ea, #d8e7ff);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-warm {
            box-shadow: 0 0 60px rgba(255, 191, 105, 0.25);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 px-gutter flex justify-between items-center h-16 bg-surface/20 backdrop-blur-xl border-b border-white/10 shadow-[0_0_30px_rgba(255,191,105,0.1)]">
<div class="flex items-center gap-xs hover:opacity-80 transition-opacity active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-primary-fixed">settings_input_component</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary-fixed-dim tracking-tight">Aura-Light</h1>
<div class="w-10 h-10 rounded-full border border-primary-fixed/30 p-0.5 hover:opacity-80 transition-opacity active:scale-95 transition-transform cursor-pointer">
<img alt="User Profile" class="w-full h-full rounded-full object-cover" data-alt="A professional portrait of a tech-savvy individual in a high-end, moody architectural setting. The lighting is dramatic and warm, matching the Midnight Blue and Amber theme of the Aura-Light system. The background features blurred, glowing smart home elements, creating a sense of luxury and technological mastery in a minimalist environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAwoOTftB7zKforhgDR7E9oClsKHnfjJxjYQDlFfeNIwOjQbdkcVh5oDD8oLrwoyMOeACrxwHhJNj46A9haIpz_Gd7rdSlmq3pFhcHVlTbq0ALi6GZDvrSqILQFqOPoeK41BmmsXkGDdD5y97byBngVMbFeRpvIONNF56lS5ZaOjmLDE1CTWhCcbhG4QJOrL_lHDyhhDa_7OLXLFuxUB6geVOas0M2nNpmH1z2qPR94qU5b449U02zItrl7CF0qknSoiFsBJ0zrlhU"/>
</div>
</header>
<main class="min-h-screen pt-24 pb-32 px-gutter flex flex-col items-center max-w-4xl mx-auto">
<!-- Header Section -->
<div class="text-center mb-md">
<h2 class="font-headline-lg text-headline-lg text-primary-fixed">Living Room</h2>
<p class="font-body-md text-on-surface-variant/70 mt-xs">Circadian Mode Active • 85% Brightness</p>
</div>
<!-- Color Wheel Section -->
<div class="relative w-full aspect-square max-w-[400px] flex items-center justify-center mb-xl">
<!-- Glow Effect -->
<div class="absolute inset-0 rounded-full bg-primary-fixed/10 blur-[80px] scale-110"></div>
<!-- Outer Ring -->
<div class="absolute inset-0 rounded-full border border-white/5 bg-white/5 backdrop-blur-sm"></div>
<!-- Main Color Wheel -->
<div class="relative w-[85%] h-[85%] rounded-full color-wheel-gradient shadow-2xl p-1">
<div class="w-full h-full rounded-full border-[12px] border-surface/80 flex items-center justify-center">
<div class="w-full h-full rounded-full bg-surface shadow-inner flex items-center justify-center overflow-hidden">
<!-- Intensity Visualizer -->
<div class="absolute inset-0 bg-primary-fixed/5"></div>
<div class="z-10 text-center">
<span class="font-headline-xl text-headline-xl text-primary-fixed block">4200K</span>
<span class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-widest">Natural Day</span>
</div>
</div>
</div>
<!-- Interaction Handle (Mock Position) -->
<div class="absolute top-1/4 right-8 w-10 h-10 bg-white rounded-full shadow-[0_0_20px_rgba(255,255,255,0.6)] border-4 border-surface active:scale-90 transition-transform cursor-pointer z-20"></div>
</div>
</div>
<!-- Kelvin Control Section -->
<div class="w-full glass-card rounded-xl p-md glow-warm">
<div class="flex justify-between items-center mb-sm">
<span class="font-label-lg text-label-lg text-primary-fixed">TEMPERATURE</span>
<span class="font-label-sm text-label-sm text-on-surface-variant/60">2000K - 6500K</span>
</div>
<div class="relative h-12 w-full flex items-center">
<!-- Kelvin Track -->
<div class="h-4 w-full rounded-full kelvin-gradient opacity-90 relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 h-full w-full bg-gradient-to-r from-surface/20 to-transparent rounded-full"></div>
</div>
<!-- Kelvin Handle -->
<div class="absolute left-[60%] top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-white/20 backdrop-blur-xl border-2 border-white shadow-lg cursor-pointer active:scale-95 transition-transform flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-white"></div>
</div>
</div>
<div class="flex justify-between mt-xs px-1">
<span class="font-label-sm text-label-sm text-[#ffb56b]">Warm</span>
<span class="font-label-sm text-label-sm text-[#d8e7ff]">Cool</span>
</div>
</div>
<!-- Quick Presets -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-sm w-full mt-md">
<button class="glass-card py-sm rounded-lg flex flex-col items-center gap-xs hover:bg-white/10 transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">bedtime</span>
<span class="font-label-sm text-label-sm">NIGHT</span>
</button>
<button class="glass-card py-sm rounded-lg flex flex-col items-center gap-xs border-primary-fixed/40 bg-primary-fixed/5">
<span class="material-symbols-outlined text-primary-fixed" style="font-variation-settings: 'FILL' 1;">wb_sunny</span>
<span class="font-label-sm text-label-sm text-primary-fixed">FOCUS</span>
</button>
<button class="glass-card py-sm rounded-lg flex flex-col items-center gap-xs hover:bg-white/10 transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">coffee</span>
<span class="font-label-sm text-label-sm">RELAX</span>
</button>
<button class="glass-card py-sm rounded-lg flex flex-col items-center gap-xs hover:bg-white/10 transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">celebration</span>
<span class="font-label-sm text-label-sm">PARTY</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-margin-safe pt-2 bg-surface/40 backdrop-blur-2xl border-t border-white/5 shadow-[0_-10px_40px_rgba(0,0,0,0.4)] rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-secondary-container/60 hover:text-primary-fixed-dim active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1">wb_twilight</span>
<span class="font-label-sm text-label-sm">Scenes</span>
</a>
<a class="flex flex-col items-center justify-center text-primary-fixed bg-primary-container/20 rounded-full px-6 py-2 shadow-[0_0_20px_rgba(250,187,101,0.3)] active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">speed</span>
<span class="font-label-sm text-label-sm">Control</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container/60 hover:text-primary-fixed-dim active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1">event_repeat</span>
<span class="font-label-sm text-label-sm">Schedule</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container/60 hover:text-primary-fixed-dim active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1">insert_chart</span>
<span class="font-label-sm text-label-sm">Energy</span>
</a>
</nav>
<!-- Background Ambience -->
<div class="fixed inset-0 -z-10 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-fixed/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-surface-container-highest/20 rounded-full blur-[100px]"></div>
</div>
</body></html>
