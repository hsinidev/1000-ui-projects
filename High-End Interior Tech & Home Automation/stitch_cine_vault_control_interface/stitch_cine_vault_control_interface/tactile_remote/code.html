            background: rgba(18, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(233, 195, 73, 0.1);
        }
        .tactile-glow:active {
            transform: scale(0.96);
            box-shadow: 0 0 20px rgba(233, 195, 73, 0.3);
        }
    </style>
<style>

<body class="bg-background text-on-surface font-body-md selection:bg-secondary/30">
<!-- TopAppBar -->
<header class="bg-surface/60 dark:bg-surface/60 backdrop-blur-xl text-secondary dark:text-secondary flex justify-between items-center w-full px-container-padding h-16 fixed top-0 z-50 border-b border-outline-variant/30">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary">settings_input_component</span>
<h1 class="text-title-sm font-display-lg tracking-widest uppercase text-secondary dark:text-secondary">Cine-Vault</h1>
</div>
<div class="w-10 h-10 rounded-full border-2 border-secondary overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A sophisticated close-up of a high-end user profile avatar placeholder, featuring minimalist geometric patterns and gold accents. The lighting is low-key and dramatic, reflecting a luxury cinema environment with deep charcoal and warm metallic tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFMNh4X0ylAEJ1k342r4NpDCS_mWmFR99SbjnblZ1MRuUdw4AfagKUTTHzKETqImBsN-8FvVufHppBj_YWfXVdaT3qpdVacNFkqYEUP5mAyxG4K0kdqQZQnMKXkV2yycxmKMYV14uPu63q2bSbzGcXn_T5MYxKnkz_JHnBMEKmY5zTHmqz6juvOa6oJH8Gdc3NYyexzgGNdJ8i1pbgY22VpHUfG4p5OogcTYa9Qi-3e4JxiJaPxdLmyoFqYeibbdD_CJR81ZZ7d9Bb"/>
</div>
</header>
<!-- Main Content: Remote Interface -->
<main class="pt-20 pb-32 px-gutter min-h-screen flex flex-col gap-stack-md">
<!-- Now Playing Card -->
<section class="glass-panel rounded-xl p-stack-md flex flex-col items-center text-center gap-4 mt-4">
<div class="relative w-48 h-72 rounded-lg overflow-hidden shadow-2xl border border-outline-variant/20">
<img class="w-full h-full object-cover" data-alt="A cinematic movie poster of a sprawling space nebula with intense oranges and deep blues, framed within a sleek, glassmorphic digital interface. The image evokes high-fidelity 4K resolution and premium home theater quality, with subtle gold lens flares dancing across the cosmic subject matter." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnDA01QaT-GGiNgiKIOcOuyGglurKTZgIJRM2IlsfKmb0-9B0sc3pW923A0I9EPARwPYy4M1HX-ymdZJfWYg7OKnQrmZnfE-mkLRfVn5QqQpdLXFrg-z09KQIxIlLruqOcEG9Qx22PCCQXlnMdtBQFJuMEsfV4QPTrDLamg5SJhG6ElCFx9NeksQUII61dq7YTAPStdy-RoWObW84jvkdWxqEW0NnsVQmMNQO58gYGtN2x1ycqsXtxHB5fpX7i8yh2Vq30R_4AvtCz"/>
<div class="absolute inset-0 bg-gradient-to-t from-background/80 to-transparent"></div>
</div>
<div class="space-y-1">
<h2 class="font-headline-md text-headline-md text-on-surface">INTERSTELLAR</h2>
<p class="text-label-caps font-label-caps text-secondary opacity-80 uppercase tracking-widest">4K DOLBY ATMOS • 01:42:10</p>
</div>
</section>
<!-- Remote Controls Cluster -->
<section class="flex-1 grid grid-cols-12 gap-gutter items-stretch">
<!-- Massive Vertical Volume Slider -->
<div class="col-span-4 glass-panel rounded-xl flex flex-col items-center py-stack-md relative overflow-hidden">
<span class="material-symbols-outlined text-secondary mb-4">volume_up</span>
<div class="flex-1 w-1.5 bg-primary-container rounded-full relative">
<div class="absolute bottom-0 w-full bg-secondary rounded-full" style="height: 65%;"></div>
<!-- Tactile Handle -->
<div class="absolute bottom-[65%] left-1/2 -translate-x-1/2 w-10 h-10 bg-secondary rounded-full shadow-lg border-4 border-surface-container-highest flex items-center justify-center cursor-pointer tactile-glow">
<div class="w-1.5 h-4 bg-on-secondary/30 rounded-full flex gap-1"></div>
</div>
</div>
<span class="text-label-caps font-label-caps text-secondary mt-4">65%</span>
</div>
<!-- Transport Controls -->
<div class="col-span-8 flex flex-col gap-gutter">
<!-- Play/Pause Primary -->
<div class="flex-1 glass-panel rounded-xl flex items-center justify-center relative overflow-hidden group active:scale-95 transition-transform duration-200">
<div class="absolute inset-0 bg-secondary/5 opacity-0 group-active:opacity-100 transition-opacity"></div>
<button class="w-24 h-24 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-[0_0_40px_rgba(255,180,170,0.3)] tactile-glow">
<span class="material-symbols-outlined !text-5xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
</div>
<!-- Skip Actions -->
<div class="h-24 grid grid-cols-2 gap-gutter">
<button class="glass-panel rounded-xl flex items-center justify-center active:scale-95 transition-transform text-secondary">
<span class="material-symbols-outlined !text-3xl">fast_rewind</span>
</button>
<button class="glass-panel rounded-xl flex items-center justify-center active:scale-95 transition-transform text-secondary">
<span class="material-symbols-outlined !text-3xl">fast_forward</span>
</button>
</div>
</div>
</section>
<!-- Projector Status Toggle -->
<section class="glass-panel rounded-xl p-4 flex items-center justify-between border-l-4 border-l-secondary">
<div class="flex items-center gap-stack-sm">
<div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined">videocam</span>
</div>
<div>
<p class="text-label-caps font-label-caps text-on-surface-variant uppercase">Projector Status</p>
<p class="font-title-sm text-on-surface">Lamp: 1,240 hrs • 34°C</p>
</div>
</div>
<div class="w-12 h-6 bg-secondary/20 rounded-full p-1 flex items-center justify-end">
<div class="w-4 h-4 bg-secondary rounded-full shadow-md"></div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface-container-lowest/80 dark:bg-surface-container-lowest/80 backdrop-blur-2xl text-secondary dark:text-secondary fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-20 border-t border-outline-variant/20 shadow-lg">

</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-70 hover:opacity-100 hover:text-secondary" href="#">
<span class="material-symbols-outlined">wb_incandescent</span>
<span class="text-label-caps font-label-caps mt-1">Scenes</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-70 hover:opacity-100 hover:text-secondary" href="#">
<span class="material-symbols-outlined">equalizer</span>
<span class="text-label-caps font-label-caps mt-1">Audio</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-70 hover:opacity-100 hover:text-secondary" href="#">
<span class="material-symbols-outlined">videocam</span>
<span class="text-label-caps font-label-caps mt-1">System</span>
</a>
<!-- ACTIVE TAB: Remote -->
<a class="flex flex-col items-center justify-center text-secondary dark:text-secondary bg-primary-container/20 rounded-xl px-3 py-1 scale-90 duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings_remote</span>
<span class="text-label-caps font-label-caps mt-1">Remote</span>
</a>
</nav>
