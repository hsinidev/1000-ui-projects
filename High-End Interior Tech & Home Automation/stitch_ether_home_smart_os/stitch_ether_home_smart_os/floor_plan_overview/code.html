<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Inter:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#f0f1f1",
                        "primary-container": "#87ceeb",

                        "tertiary-container": "#c1c5c9",
                        "surface": "#f9f9f9",
                        "on-secondary-fixed": "#161c28",
                        "surface-variant": "#e2e2e2",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary-fixed-variant": "#414754",
                        "outline": "#6f787d",
                        "secondary": "#585e6d",
                        "on-primary-container": "#005870",
                        "surface-container": "#eeeeee",
                        "on-primary-fixed": "#001f29",
                        "on-primary-fixed-variant": "#004d62",
                        "primary-fixed": "#baeaff",
                        "surface-tint": "#0c6780",
                        "on-secondary-container": "#5d6371",
                        "on-surface": "#1a1c1c",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#0c6780",
                        "on-surface-variant": "#3f484c",
                        "outline-variant": "#bfc8cd",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#171c1f",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#c3c7cb",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f3f3f4",
                        "inverse-primary": "#89d0ed",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#43474b",
                        "secondary-container": "#dadff0",
                        "tertiary": "#5a5f62",
                        "surface-dim": "#dadada",
                        "on-tertiary-container": "#4d5255",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#dde2f3",
                        "secondary-fixed-dim": "#c1c6d7",
                        "on-background": "#1a1c1c",
                        "surface-container-highest": "#e2e2e2",
                        "error-container": "#ffdad6",
                        "background": "#f9f9f9",
                        "inverse-surface": "#2f3131",
                        "surface-bright": "#f9f9f9",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target": "48px",
                        "unit": "8px",
                        "container-margin": "24px",
                        "lg": "24px",
                        "md": "16px",
                        "xl": "32px",
                        "sm": "8px",
                        "xxl": "48px",
                        "xs": "4px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Manrope"],
                        "label-sm": ["Inter"],
                        "body-md": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "label-lg": ["Inter"],
                        "headline-lg": ["Manrope"],
                        "headline-sm": ["Manrope"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "headline-md": ["28px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-lg": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.04em", "fontWeight": "600"}],
                        "headline-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-sm": ["22px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .floor-plan-gradient {
            background: radial-gradient(circle at center, #ffffff 0%, #f0f4f8 100%);
        }
        .emergency-glow {
            box-shadow: 0 0 20px rgba(186, 26, 26, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/30 backdrop-blur-xl border-b border-white/10 shadow-sm flex items-center justify-between px-container-margin h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="grid_view">grid_view</span>
<h1 class="font-headline-md text-headline-md tracking-tight text-primary">Ether-Home</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-error" data-icon="warning">warning</span>
</button>
</header>
<main class="relative h-screen w-full pt-16 pb-24 floor-plan-gradient">
<!-- One-Tap Scenes Bar -->
<section class="absolute top-20 left-0 w-full z-20 px-container-margin">
<div class="flex gap-3 overflow-x-auto pb-4 no-scrollbar">
<button class="flex items-center gap-2 bg-primary text-on-primary px-5 py-3 rounded-full shadow-lg active:scale-95 transition-transform shrink-0">
<span class="material-symbols-outlined text-[20px]" data-icon="home" data-weight="fill" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-lg text-label-lg">Arriving Home</span>
</button>
<button class="flex items-center gap-2 glass-card px-5 py-3 rounded-full active:scale-95 transition-transform shrink-0">
<span class="material-symbols-outlined text-[20px]" data-icon="bedtime">bedtime</span>
<span class="font-label-lg text-label-lg">Sleep Mode</span>
</button>
<button class="flex items-center gap-2 glass-card px-5 py-3 rounded-full active:scale-95 transition-transform shrink-0">
<span class="material-symbols-outlined text-[20px]" data-icon="movie">movie</span>
<span class="font-label-lg text-label-lg">Cinema</span>
</button>
</div>
</section>
<!-- Interactive Floor Plan Visualization -->
<div class="absolute inset-0 flex items-center justify-center p-xxl">
<div class="relative w-full max-w-md aspect-[3/4] bg-white/40 rounded-[40px] border-[12px] border-white/60 shadow-2xl overflow-hidden">
<img class="w-full h-full object-cover opacity-60 mix-blend-multiply" data-alt="A clean, top-down architectural floor plan of a modern minimalist estate with soft shadows. The lighting is bright and ethereal, suggesting a light-mode interface. Every room is defined by clean white lines against a light grey background, featuring high-end digital craftsmanship and a serene atmosphere consistent with atmospheric intelligence." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlzhgLc6esP_YQQCLEAUnsF1zu31t8mE5LMlE12-FuFiVTKo2kmf72qgzDm_LPI51GMtsbOiDQGB5y_2oGmN6wKXJc38b_D-JE855wEKD2STD5r-hGWhX_NalVPDuWoATarM1oUNd3f4OMgaIZOcDgxIfcH_tuxwHOxl6YsLff65YJ8U644Y0OPRkLi8KsdbVZNCukmDjdygP85vihrrVfd3n_nWFNbEaM12PJbUaq7wk71PPt7fU36pHOiWy5ZvcA-m1Nddj0_idx"/>
<!-- Interactive Room Zones (Hotspots) -->
<div class="absolute top-[20%] left-[20%]">
<div class="glass-card p-sm rounded-xl flex items-center gap-2 animate-pulse">
<div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_#0c6780]"></div>
<span class="font-label-sm text-label-sm">Living Room: Active</span>
</div>
</div>
<div class="absolute bottom-[30%] right-[15%]">
<div class="glass-card p-sm rounded-xl flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<span class="font-label-sm text-label-sm">Kitchen: Idle</span>
</div>
</div>
<!-- Emergency Button - Floating in Canvas -->
<button class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-error text-on-error px-6 py-4 rounded-2xl flex items-center gap-3 emergency-glow active:scale-95 transition-all z-30">
<span class="material-symbols-outlined" data-icon="emergency">emergency</span>
<span class="font-headline-sm text-headline-sm uppercase tracking-tighter">Emergency</span>
</button>
</div>
</div>
<!-- Sunlight Controller -->
<section class="absolute bottom-32 left-1/2 -translate-x-1/2 w-full max-w-sm px-container-margin z-40">
<div class="glass-card p-lg rounded-3xl space-y-4 shadow-xl">
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="light_mode">light_mode</span>
<span class="font-label-lg text-label-lg">Sunlight Simulation</span>
</div>
<span class="font-headline-sm text-headline-sm text-primary">72%</span>
</div>
<div class="relative h-10 w-full bg-primary-container/30 rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-[72%] bg-primary-container"></div>
<div class="absolute top-1/2 left-[72%] -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-white rounded-full shadow-lg border-2 border-primary cursor-pointer"></div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface/30 backdrop-blur-xl border-t border-white/20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] mb-safe">
<div class="flex justify-around items-center h-touch-target px-4">
<!-- Active Tab: Floor Plan -->
<a class="flex flex-col items-center justify-center bg-primary-container/40 text-on-primary-container rounded-full px-5 py-1.5 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="layers" data-weight="fill" style="font-variation-settings: 'FILL' 1;">layers</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Floor Plan</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/70 px-5 py-1.5 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="thermostat">thermostat</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Climate</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/70 px-5 py-1.5 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="security">security</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Security</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/70 px-5 py-1.5 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Energy</span>
</a>
</div>
</nav>
</body></html>
