<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,700;6..72,800&amp;family=Work+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f6f3f2",
                        "error": "#ba1a1a",
                        "surface-tint": "#b52424",
                        "outline": "#8e706d",
                        "on-tertiary-fixed": "#1b1d0e",
                        "on-primary-container": "#ffc8c2",
                        "on-surface": "#1b1c1c",
                        "error-container": "#ffdad6",
                        "secondary": "#5e5e5e",
                        "tertiary-fixed": "#e4e4cc",
                        "on-surface-variant": "#5a403e",
                        "inverse-surface": "#303030",
                        "secondary-fixed-dim": "#c8c6c6",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#646464",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#410003",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#eae7e7",
                        "primary-fixed": "#ffdad6",
                        "background": "#fcf9f8",
                        "on-primary-fixed-variant": "#92030f",
                        "inverse-on-surface": "#f3f0f0",
                        "tertiary": "#454634",
                        "primary": "#8f000d",
                        "surface-container": "#f0eded",
                        "primary-container": "#b22222",
                        "outline-variant": "#e2beba",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#5c5e4b",
                        "surface-variant": "#e4e2e1",
                        "primary-fixed-dim": "#ffb4ac",
                        "on-error": "#ffffff",
                        "secondary-container": "#e4e2e2",
                        "surface-container-highest": "#e4e2e1",
                        "inverse-primary": "#ffb4ac",
                        "on-secondary-fixed-variant": "#474747",
                        "on-background": "#1b1c1c",
                        "secondary-fixed": "#e4e2e2",
                        "on-tertiary-fixed-variant": "#474836",
                        "surface-dim": "#dcd9d9",
                        "on-secondary": "#ffffff",
                        "surface": "#fcf9f8",
                        "surface-bright": "#fcf9f8",
                        "on-tertiary-container": "#d7d7bf",
                        "on-secondary-fixed": "#1b1c1c",
                        "tertiary-fixed-dim": "#c8c8b0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-md": "32px",
                        "margin-sm": "16px",
                        "border-width-thick": "3px",
                        "gutter": "1px",
                        "unit": "8px",
                        "container-max": "1440px",
                        "border-width-thin": "1px"
                    },
                    "fontFamily": {
                        "headline-md": ["Newsreader"],
                        "data-mono": ["Work Sans"],
                        "display-lg": ["Newsreader"],
                        "headline-sm": ["Newsreader"],
                        "body-lg": ["Work Sans"],
                        "utility-label": ["Work Sans"],
                        "body-md": ["Work Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "data-mono": ["14px", {"lineHeight": "1", "letterSpacing": "0", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-sm": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "utility-label": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .industrial-grid {
            background-image: linear-gradient(#333333 1px, transparent 1px), linear-gradient(90deg, #333333 1px, transparent 1px);
            background-size: 32px 32px;
            background-color: #EBEBD0;
        }
        .stencil-cutout {
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, 5% 5%, 5% 95%, 95% 95%, 95% 5%, 5% 5%);
        }
        .railway-border {
            border: 1px solid #333333;
        }
        .railway-border-heavy {
            border: 3px solid #333333;
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen">
<main class="flex min-h-screen">
<!-- LEFT: Heavy Branding Section -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-on-surface items-center justify-center border-r-[4px] border-[#333333]">
<img alt="Freight Locomotive" class="absolute inset-0 w-full h-full object-cover grayscale opacity-60 contrast-125" data-alt="A gritty, high-contrast black and white photograph of a massive heavy-duty freight locomotive idling in a weathered rail yard. The lighting is dramatic and moody, casting deep shadows across the metallic surfaces and rivets of the train engine. The scene evokes an industrial brutalist aesthetic, emphasizing raw power and mechanical precision. Smudges of grease and steam add to the tactile, weathered atmosphere of the scene, framed by structural steel columns in the distance." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7a-VrAqGhhvT4x-GMrCcoay97HhPNsi6fwMZIUqvceAGmIFF_8U9GPsEUfVXL3676b-V_FuMq3t4M7ZvQf3xZJvRx0DGv-opGNzPuhXJI32siJ1TW1qWmlajAis42bVn7teCNpHyjzNJlBWXHMqAtNAkoLecsSvQe1GkyU1o5JZLL6Ja5hTnYArfKLOgDplWzEQsmtTP1Gi2hrotfuQBFjle1sHEURxuMBkzIbMkxOi7Oeu0OByzzTkvuN1dFhZRY_WalNNlmAL0"/>
<div class="relative z-10 p-margin-md flex flex-col gap-4">
<div class="inline-block bg-[#B22222] px-4 py-1 text-white font-headline-md uppercase tracking-widest border-2 border-black">
                    RAILCONNECT
                </div>
<h1 class="text-white font-display-lg uppercase leading-none max-w-lg">
                    National Rail <br/>Freight Network
                </h1>
<div class="mt-8 flex gap-4">
<div class="w-12 h-1 border-t-4 border-[#B22222]"></div>
<p class="text-[#EBEBD0] font-utility-label tracking-widest uppercase">Network Operations Control</p>
</div>
</div>
<!-- Decorative Railway Coordinates -->
<div class="absolute bottom-8 left-8 flex gap-8 font-data-mono text-[#EBEBD0]/30 text-xs tracking-tighter">
<span>LAT: 41.8781° N</span>
<span>LON: 87.6298° W</span>
<span>STATION ID: CHI-YARD-7</span>
</div>
</section>
<!-- RIGHT: Authentication Form -->
<section class="w-full lg:w-1/2 flex items-center justify-center bg-[#EBEBD0] p-margin-sm md:p-margin-md">
<div class="w-full max-w-md bg-[#EBEBD0] railway-border-heavy p-8 relative">
<!-- Branding Header -->
<div class="mb-8 border-b-2 border-[#333333] pb-4">
<h2 class="font-headline-md text-primary uppercase mb-1">Station Access</h2>
<p class="font-utility-label text-secondary uppercase tracking-wider">Operator Authentication Required</p>
</div>
<!-- Tabs -->
<div class="flex mb-8 railway-border">
<button class="flex-1 py-3 font-utility-label uppercase tracking-widest bg-primary-container text-on-primary-container railway-border-heavy -m-[1px] z-10">
                        Sign In
                    </button>
<button class="flex-1 py-3 font-utility-label uppercase tracking-widest text-secondary hover:bg-[#333333]/5 transition-colors">
                        Sign Up
                    </button>
</div>
<!-- Form -->
<form class="flex flex-col gap-6">
<!-- Operator ID -->
<div class="flex flex-col gap-2">
<label class="font-utility-label uppercase tracking-wider text-secondary">Operator ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary scale-75" data-icon="badge">badge</span>
<input class="w-full pl-10 pr-4 py-3 bg-[#f2f2e4] railway-border focus:ring-0 focus:border-primary font-data-mono placeholder:opacity-30" placeholder="00-000-X" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="font-utility-label uppercase tracking-wider text-secondary">Secure Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary scale-75" data-icon="key">key</span>
<input class="w-full pl-10 pr-4 py-3 bg-[#f2f2e4] railway-border focus:ring-0 focus:border-primary font-data-mono placeholder:opacity-30" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Yard Location -->
<div class="flex flex-col gap-2">
<label class="font-utility-label uppercase tracking-wider text-secondary">Yard Location</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary scale-75" data-icon="location_on">location_on</span>
<select class="w-full pl-10 pr-4 py-3 bg-[#f2f2e4] railway-border focus:ring-0 focus:border-primary font-utility-label uppercase appearance-none">
<option>Chicago - Central Hub</option>
<option>Atlanta - Intermodal</option>
<option>Denver - West Yard</option>
<option>Sacramento - Logistics Terminal</option>
</select>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-2 cursor-pointer">
<input class="w-4 h-4 rounded-none border-2 border-[#333333] text-primary focus:ring-0" type="checkbox"/>
<span class="font-utility-label uppercase text-xs">Keep Session Active</span>
</label>
<a class="font-utility-label uppercase text-xs text-primary underline decoration-1 underline-offset-4" href="#">Forgot ID?</a>
</div>
<!-- Submit Button -->
<button class="w-full mt-4 bg-primary text-[#EBEBD0] font-headline-sm uppercase py-4 railway-border-heavy hover:bg-[#EBEBD0] hover:text-primary transition-colors active:translate-y-1">
                        Initialize Terminal
                    </button>
</form>
<!-- Footer Manifest Note -->
<div class="mt-8 pt-4 border-t border-[#333333]/20 flex justify-between items-center opacity-50">
<span class="font-data-mono text-[10px] uppercase">Manifest v4.2.0</span>
<div class="flex gap-2">
<span class="material-symbols-outlined text-sm" data-icon="lock" data-weight="fill">lock</span>
<span class="font-utility-label text-[10px] uppercase">Encrypted Connection</span>
</div>
</div>
<!-- Decorative Bolts -->
<div class="absolute -top-1.5 -left-1.5 w-3 h-3 bg-[#333333] rotate-45"></div>
<div class="absolute -top-1.5 -right-1.5 w-3 h-3 bg-[#333333] rotate-45"></div>
<div class="absolute -bottom-1.5 -left-1.5 w-3 h-3 bg-[#333333] rotate-45"></div>
<div class="absolute -bottom-1.5 -right-1.5 w-3 h-3 bg-[#333333] rotate-45"></div>
</div>
</section>
</main>
<!-- Support Overlay (Optional / Design Context) -->
<div class="fixed bottom-4 right-4">
<button class="bg-[#333333] text-[#EBEBD0] p-3 flex items-center gap-3 railway-border hover:bg-primary transition-colors">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
<span class="font-utility-label uppercase text-xs tracking-widest pr-2">System Support</span>
</button>
</div>
</body></html>
