<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#131313",
                    "secondary-fixed-dim": "#c6c6c6",
                    "surface-container-highest": "#353535",
                    "surface-container-low": "#1c1b1b",
                    "surface-container-high": "#2a2a2a",
                    "surface-tint": "#ffb595",
                    "surface-container": "#20201f",
                    "on-tertiary-container": "#303030",
                    "primary-fixed-dim": "#ffb595",
                    "primary": "#ffb595",
                    "on-surface-variant": "#e3bfb1",
                    "surface-dim": "#131313",
                    "secondary-fixed": "#e3e2e2",
                    "outline-variant": "#5a4136",
                    "tertiary-fixed": "#e5e2e1",
                    "surface-bright": "#393939",
                    "on-primary-fixed-variant": "#7c2e00",
                    "tertiary-fixed-dim": "#c9c6c5",
                    "primary-container": "#ff6700",
                    "on-secondary": "#2f3131",
                    "inverse-on-surface": "#313030",
                    "tertiary": "#c9c6c5",
                    "on-secondary-container": "#b8b8b8",
                    "inverse-primary": "#a23f00",
                    "on-tertiary-fixed-variant": "#474646",
                    "on-error-container": "#ffdad6",
                    "on-tertiary": "#313030",
                    "secondary-container": "#484949",
                    "on-error": "#690005",
                    "surface-variant": "#353535",
                    "secondary": "#c6c6c6",
                    "on-secondary-fixed-variant": "#464747",
                    "on-primary-container": "#561e00",
                    "on-tertiary-fixed": "#1c1b1b",
                    "error-container": "#93000a",
                    "outline": "#aa8a7d",
                    "inverse-surface": "#e5e2e1",
                    "background": "#131313",
                    "tertiary-container": "#999797",
                    "on-background": "#e5e2e1",
                    "primary-fixed": "#ffdbcd",
                    "on-primary-fixed": "#351000",
                    "on-surface": "#e5e2e1",
                    "error": "#ffb4ab",
                    "on-primary": "#571e00",
                    "on-secondary-fixed": "#1a1c1c",
                    "surface-container-lowest": "#0e0e0e"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "stack-md": "1rem",
                    "stack-lg": "2rem",
                    "gutter": "1.5rem",
                    "margin": "2rem",
                    "stack-sm": "0.5rem",
                    "touch-target-min": "48px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "label-bold": ["Inter"],
                    "body-lg": ["Inter"],
                    "data-display": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-xl": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}],
                    "label-bold": ["14px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "500"}],
                    "data-display": ["40px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "800"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .machined-edge {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .machined-edge:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
        }
        .safety-orange-glow:focus {
            box-shadow: 0 0 0 2px #ff6700;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen overflow-x-hidden">
<main class="flex min-h-screen w-full flex-col md:flex-row">
<!-- LEFT PANEL: High Impact Visual -->
<section class="relative w-full md:w-1/2 lg:w-3/5 h-64 md:h-auto overflow-hidden border-b-4 md:border-b-0 md:border-r-4 border-surface-container-highest">
<div class="absolute inset-0 z-0">
<img alt="Industrial Semi-Truck" class="w-full h-full object-cover grayscale brightness-50" data-alt="A powerful, modern semi-truck speeding down a desolate highway during a dramatic sunset. The atmosphere is industrial and gritty, with high-contrast lighting highlighting the metallic surfaces of the vehicle. The sky is a deep bruised purple and orange, reflecting the rugged durability of the heavy trucking industry. The visual style is professional, cinematic, and emphasizes the scale and performance of logistics machinery." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiY_f-T6OYsoOVQy564-z3EaHwYpfH5mdrzPB-N_hDUirgC3qpZVvJVSpQMMEo16l5Ci4OAyIhyaX0Doi5MJVgzTX-cCNEaWlViQ60iFnlnluxjJjDhkP5aCPpg5k5uMmCP-r9dPOTF6FtFQU3Dkmwy4f5m-ZRaZ10_V6q6W6Gr610q-t58nw23fixPDaKMH3ng06oMTWpNB7r6psG6U572frTGXttuIkzT8cANESw-PZL57XrnYg3UAPRlBIsOo2qhuFaX6wQ18w"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-80"></div>
<div class="absolute inset-0 bg-primary-container/10 mix-blend-overlay"></div>
</div>
<div class="relative z-10 h-full flex flex-col justify-end p-margin md:p-16 gap-stack-md">
<div class="flex items-center gap-stack-sm mb-stack-lg">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="local_shipping">local_shipping</span>
<span class="font-headline-md text-headline-md tracking-widest text-on-background">TITAN SYSTEMS</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-white uppercase max-w-xl leading-none">
                    JOIN THE <span class="text-primary-container">FLEET</span>
</h1>
<p class="font-body-lg text-body-lg text-secondary max-w-md">
                    Professional-grade telematics and logistics oversight for industrial-scale operations.
                </p>
<div class="mt-stack-lg flex gap-stack-md">
<div class="h-1 w-12 bg-primary-container"></div>
<div class="h-1 w-12 bg-surface-container-highest"></div>
<div class="h-1 w-12 bg-surface-container-highest"></div>
</div>
</div>
</section>
<!-- RIGHT PANEL: Authentication Canvas -->
<section class="w-full md:w-1/2 lg:w-2/5 bg-surface flex flex-col items-center justify-center p-margin md:p-12 relative">
<!-- Branding Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary-container"></div>
<div class="w-full max-w-md flex flex-col gap-stack-lg">
<header class="flex flex-col gap-stack-sm">
<h2 class="font-headline-lg text-headline-lg uppercase tracking-tighter">AUTHENTICATION GATE</h2>
<p class="font-body-md text-body-md text-secondary">V4.2 SECURE PROTOCOL TERMINAL</p>
</header>
<!-- Auth Toggle -->
<div class="flex w-full border-2 border-surface-container-highest bg-surface-container-lowest p-1">
<button class="flex-1 py-3 font-label-bold text-label-bold uppercase tracking-widest bg-primary-container text-on-primary-container machined-edge transition-all">
                        LOGIN
                    </button>
<button class="flex-1 py-3 font-label-bold text-label-bold uppercase tracking-widest text-secondary hover:text-on-surface transition-colors">
                        CREATE ACCOUNT
                    </button>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-stack-md">
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold uppercase text-secondary-fixed-dim flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="badge">badge</span>
                            FLEET ID
                        </label>
<input class="w-full bg-surface-container-low border-2 border-surface-container-highest p-4 font-headline-md text-on-surface placeholder:text-surface-container-highest focus:border-primary-container focus:ring-0 outline-none transition-all uppercase tracking-widest" placeholder="TX-4902-INDUSTRIAL" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold uppercase text-secondary-fixed-dim flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="alternate_email">alternate_email</span>
                            OPERATOR EMAIL
                        </label>
<input class="w-full bg-surface-container-low border-2 border-surface-container-highest p-4 font-body-lg text-on-surface placeholder:text-surface-container-highest focus:border-primary-container focus:ring-0 outline-none transition-all" placeholder="OPERATOR@TITAN.COM" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<label class="font-label-bold text-label-bold uppercase text-secondary-fixed-dim flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="lock">lock</span>
                                ACCESS KEY
                            </label>
<a class="text-[10px] font-label-bold text-primary hover:underline uppercase tracking-tighter" href="#">LOST ACCESS?</a>
</div>
<input class="w-full bg-surface-container-low border-2 border-surface-container-highest p-4 font-body-lg text-on-surface placeholder:text-surface-container-highest focus:border-primary-container focus:ring-0 outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center gap-stack-sm mt-stack-sm">
<input class="w-6 h-6 bg-surface-container-lowest border-2 border-surface-container-highest text-primary-container focus:ring-offset-background focus:ring-primary-container rounded-none" id="remember" type="checkbox"/>
<label class="font-label-bold text-label-bold uppercase text-secondary cursor-pointer select-none" for="remember">PERSIST SESSION ON THIS TERMINAL</label>
</div>
<!-- Submit Action -->
<button class="w-full mt-stack-lg py-5 bg-primary-container text-on-primary-container font-headline-md text-headline-md uppercase machined-edge flex items-center justify-center gap-stack-md group" type="submit">
                        INITIALIZE OVERLOOK
                        <span class="material-symbols-outlined group-hover:translate-x-2 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Technical Footer -->
<footer class="mt-stack-lg border-t-2 border-surface-container-highest pt-stack-md flex flex-col gap-4">
<div class="flex justify-between text-[10px] font-label-bold text-surface-container-highest uppercase tracking-[0.2em]">
<span>SYSTEM: ENCRYPTED</span>
<span>LATENCY: 12MS</span>
<span>V: 4.2.0-STABLE</span>
</div>
<div class="grid grid-cols-3 gap-2">
<div class="h-1 bg-primary-container"></div>
<div class="h-1 bg-primary-container/40"></div>
<div class="h-1 bg-primary-container/10"></div>
</div>
<div class="flex flex-wrap gap-stack-md justify-center mt-2">
<button class="flex items-center gap-2 px-4 py-2 border-2 border-surface-container-highest hover:bg-surface-container-high transition-colors font-label-bold text-xs uppercase tracking-widest text-secondary">
<span class="material-symbols-outlined text-sm" data-icon="shield">shield</span>
                            COMPLIANCE
                        </button>
<button class="flex items-center gap-2 px-4 py-2 border-2 border-surface-container-highest hover:bg-surface-container-high transition-colors font-label-bold text-xs uppercase tracking-widest text-secondary">
<span class="material-symbols-outlined text-sm" data-icon="public">public</span>
                            REGION: NA-WEST
                        </button>
</div>
</footer>
</div>
<!-- Corner Accents -->
<div class="absolute bottom-4 right-4 text-surface-container-highest opacity-50 select-none">
<span class="material-symbols-outlined text-6xl" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
</div>
</section>
</main>
</body></html>
