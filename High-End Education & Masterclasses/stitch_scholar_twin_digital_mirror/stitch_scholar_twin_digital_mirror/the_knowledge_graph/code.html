<!DOCTYPE html>

<style>.parchment-texture {
    background-color: #fcf9f5;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBcjiM60r0N9WmRZG1PlDvz5f_FU9-uErxC9yStQHHC85rSJBbheMFc8hAxb3qsXmju8JgvT7neTYg1wb7f6hBkSGy-58rQqbM3jDstf1tTU_qH9et-RUQppywpDJxnsECqux2fAU3l78e7ol8P-Hem1L31vhA_mftoxbmysoSz_UiGAIDwAv4CdSIJqHZYI2th9CvRrLzgpZ81Cu2WRQxTDpI7lK7wOZcRJFUP7pPhqJS38MI4kC5lfNtphEfd8p1E3ewlOkcBsIQ)
    }
.node-line {
    stroke: #24231f;
    stroke-width: 1px;
    stroke-dasharray: 2
    }
.node-glow {
    box-shadow: 0 0 15px #abc8f5, 0 0 5px #002446

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen font-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 h-16 bg-surface dark:bg-background border-b border-secondary dark:border-outline-variant flex items-center justify-between px-gutter shadow-[0_2px_15px_rgba(45,45,45,0.08)]">
<div class="flex items-center gap-sm active:scale-95 duration-150 transition-colors hover:bg-surface-variant/50 p-2 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">menu</span>
</div>
<h1 class="font-headline-sm text-headline-sm font-semibold text-primary dark:text-primary-fixed-dim">Scholar-Twin</h1>
<div class="flex items-center gap-sm active:scale-95 duration-150 transition-colors hover:bg-surface-variant/50 p-2 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">visibility_off</span>
</div>
</header>
<!-- Main Canvas -->
<main class="pt-16 pb-20 h-screen w-full relative overflow-hidden parchment-texture">
<!-- Search & Filter Overlay -->
<div class="absolute top-4 left-0 right-0 z-10 px-container-margin space-y-sm">
<div class="relative group">
<div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-body-md">search</span>
</div>
<input class="w-full h-12 pl-10 bg-surface/80 backdrop-blur-md border-b border-tertiary text-on-surface font-body-md placeholder-outline focus:ring-0 focus:border-primary transition-all" placeholder="Search academic nodes..." type="text"/>
</div>
<div class="flex gap-sm overflow-x-auto pb-2 scrollbar-hide">
<button class="px-md py-1 border border-tertiary bg-primary text-surface font-label-caps text-label-caps whitespace-nowrap active:scale-95 transition-transform">ALL DOMAINS</button>
<button class="px-md py-1 border border-tertiary bg-surface-container-low text-on-surface font-label-caps text-label-caps whitespace-nowrap hover:bg-surface-variant transition-colors">STEM</button>
<button class="px-md py-1 border border-tertiary bg-surface-container-low text-on-surface font-label-caps text-label-caps whitespace-nowrap hover:bg-surface-variant transition-colors">HUMANITIES</button>
<button class="px-md py-1 border border-tertiary bg-surface-container-low text-on-surface font-label-caps text-label-caps whitespace-nowrap hover:bg-surface-variant transition-colors">SOCIAL SCIENCES</button>
</div>
</div>
<!-- 3D Graph Simulation Container -->
<div class="w-full h-full relative perspective-1000 flex items-center justify-center">
<!-- Background Lines (SVG for crisp charcoal strokes) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-40">
<line class="node-line" x1="20%" x2="50%" y1="30%" y2="50%"></line>
<line class="node-line" x1="50%" x2="80%" y1="50%" y2="25%"></line>
<line class="node-line" x1="50%" x2="40%" y1="50%" y2="75%"></line>
<line class="node-line" x1="40%" x2="10%" y1="75%" y2="65%"></line>
<line class="node-line" x1="50%" x2="70%" y1="50%" y2="70%"></line>
<line class="node-line" x1="70%" x2="85%" y1="70%" y2="60%"></line>
</svg>
<!-- Interactive Nodes -->
<!-- Active Node (Center) -->
<div class="absolute z-20 flex flex-col items-center gap-xs">
<div class="w-12 h-12 bg-primary border-2 border-tertiary node-glow rounded-none flex items-center justify-center transform rotate-45">
<span class="material-symbols-outlined text-primary-fixed-dim -rotate-45" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<span class="font-label-caps text-label-caps text-primary mt-sm bg-surface-container/90 px-2 py-0.5 border border-tertiary">NEURAL NETWORKS</span>
</div>
<!-- Surrounding Nodes -->
<div class="absolute top-1/4 left-1/4 flex flex-col items-center gap-xs opacity-80">
<div class="w-8 h-8 bg-surface border border-tertiary flex items-center justify-center hover:bg-primary-fixed-dim transition-all">
<span class="material-symbols-outlined text-tertiary text-sm">functions</span>
</div>
<span class="font-label-caps text-[10px] tracking-wider text-secondary">CALCULUS</span>
</div>
<div class="absolute top-[20%] right-[15%] flex flex-col items-center gap-xs">
<div class="w-10 h-10 bg-surface border border-tertiary flex items-center justify-center hover:bg-primary-fixed-dim transition-all">
<span class="material-symbols-outlined text-tertiary">psychology</span>
</div>
<span class="font-label-caps text-[10px] tracking-wider text-secondary">COGNITIVE PSYCH</span>
</div>
<div class="absolute bottom-1/4 left-[10%] flex flex-col items-center gap-xs opacity-60">
<div class="w-8 h-8 bg-surface border border-tertiary flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-sm">history_edu</span>
</div>
<span class="font-label-caps text-[10px] tracking-wider text-secondary">EPISTEMOLOGY</span>
</div>
<div class="absolute bottom-[20%] right-[20%] flex flex-col items-center gap-xs">
<div class="w-9 h-9 bg-surface border border-tertiary flex items-center justify-center hover:bg-primary-fixed-dim transition-all">
<span class="material-symbols-outlined text-tertiary">database</span>
</div>
<span class="font-label-caps text-[10px] tracking-wider text-secondary">DATA ARCH</span>
</div>
<!-- Depth Layers (Decorational Nodes) -->
<div class="absolute top-[10%] left-1/2 w-4 h-4 border border-tertiary/30 opacity-20 rotate-12"></div>
<div class="absolute bottom-[10%] left-[30%] w-6 h-6 border border-tertiary/20 opacity-10 rotate-45"></div>
</div>
<!-- Node Detail Preview (Bento-style Card at bottom) -->
<div class="absolute bottom-24 left-container-margin right-container-margin">
<div class="bg-surface border border-tertiary p-md shadow-[0_4px_20px_rgba(45,45,45,0.08)] space-y-sm">
<div class="flex justify-between items-start">
<div>
<span class="font-label-caps text-label-caps text-secondary">CURRENT FOCUS</span>
<h2 class="font-headline-sm text-headline-sm text-primary">Neural Networks</h2>
</div>
<div class="px-sm py-0.5 border border-primary text-primary font-label-caps text-[10px]">92% MASTERY</div>
</div>
<p class="font-body-md text-on-surface line-clamp-2">Exploring the intersections of computational biology and deep learning architectures...</p>
<div class="flex gap-sm">
<button class="flex-1 py-2 bg-primary text-surface font-label-caps text-label-caps active:scale-95 transition-transform">RESUME STUDY</button>
<button class="flex-1 py-2 border border-tertiary text-tertiary font-label-caps text-label-caps hover:bg-surface-variant transition-colors">VIEW RELATIONS</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-4 bg-surface/95 backdrop-blur-sm border-t border-secondary dark:border-outline-variant shadow-[0_-4px_20px_rgba(45,45,45,0.08)]">
<!-- Graph (Active) -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-bold active:scale-90 transition-transform duration-200 hover:bg-surface-container-high/40 rounded-lg p-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_tree</span>
<span class="font-label-caps text-label-caps uppercase">Graph</span>
</button>
<!-- Tutor -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-on-secondary-container active:scale-90 transition-transform duration-200 hover:bg-surface-container-high/40 rounded-lg p-2">
<span class="material-symbols-outlined">auto_awesome</span>
<span class="font-label-caps text-label-caps uppercase">Tutor</span>
</button>
<!-- Library -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-on-secondary-container active:scale-90 transition-transform duration-200 hover:bg-surface-container-high/40 rounded-lg p-2">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-label-caps text-label-caps uppercase">Library</span>
</button>
<!-- Milestones -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-on-secondary-container active:scale-90 transition-transform duration-200 hover:bg-surface-container-high/40 rounded-lg p-2">
<span class="material-symbols-outlined">insights</span>
<span class="font-label-caps text-label-caps uppercase">Milestones</span>
</button>
</nav>
</body></html>
