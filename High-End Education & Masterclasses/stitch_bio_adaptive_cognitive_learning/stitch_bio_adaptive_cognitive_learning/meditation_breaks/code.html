                    "tertiary": "#5d5f5f",

            "borderRadius": {

            },
            "spacing": {
                    "margin-page": "3rem",
                    "stack-md": "2.5rem",
                    "stack-sm": "1rem",
                    "container-max": "1200px",
                    "unit": "8px",
                    "gutter": "2rem",
                    "stack-lg": "5rem"
            },
            "fontFamily": {
                    "headline-md": ["Lexend"],
                    "label-sm": ["Lexend"],
                    "display-lg": ["Lexend"],
                    "body-md": ["Lexend"],
                    "body-lg": ["Lexend"]
            },
            "fontSize": {

          },

      }

<style>
        .neumorphic-convex {
            box-shadow: 8px 8px 16px #dee6cb, -8px -8px 16px #ffffff;
        }
        .neumorphic-concave {
            box-shadow: inset 4px 4px 8px #dee6cb, inset -4px -4px 8px #ffffff;
        }
        .breathing-pulse {
            animation: pulse 3000ms ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 12px 12px 24px #dee6cb, -12px -12px 24px #ffffff; }
            50% { transform: scale(1.08); box-shadow: 18px 18px 36px #c6c8b8, -18px -18px 36px #ffffff; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="w-full top-0 sticky z-40 bg-surface shadow-[inset_2px_2px_5px_#c6c8b8,inset_-2px_-2px_5px_#ffffff]">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-container-max mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center neumorphic-convex overflow-hidden">
<img alt="User" class="w-full h-full object-cover" data-alt="A soft-focus portrait of a calm person with closed eyes, set against a diffused, organic background of sage and lavender tones. The lighting is ethereal and high-key, emphasizing a sense of peace and mental clarity within a restorative ed-tech environment. The aesthetic is clean, modern, and compassionate." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNw5eyfq05bw5xFLv03_U6B6C4HRvKCQO9Eva82-oJqWIgLTXGLPg8SYTQShVvW_wDEwi-MLsjMmBTiFfA9PHDC8rr0mwelKRK9wRAkni3vuIXeHjLZBs1C1Xws4NoEjRHP7T-GgTEE6P4iaBDvNHa1XJxJ-rTizTdMPd-9nCHVRtE64eN7QvNfo37kLteqEqOezc4HFJJYBTakgufYsWgnW3ScEGtAyuvvPBynWoIpBRIxwIrfTO5ff9W-ATI7JZfrmTon0p8TWcY"/>
</div>
<span class="font-headline-md text-headline-md font-bold text-primary">Bio-Learning</span>
</div>
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity duration-300" data-icon="monitoring">monitoring</button>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-page py-stack-lg max-w-container-max mx-auto w-full">
<!-- Breathing Guide Anchor -->
<div class="relative flex items-center justify-center mb-stack-lg">
<div class="breathing-pulse w-64 h-64 md:w-80 md:h-80 rounded-full bg-surface-container-low flex flex-col items-center justify-center neumorphic-convex">
<span class="font-display-lg text-display-lg text-primary mb-2">Breathe</span>
<span class="font-label-sm text-label-sm text-on-surface-variant tracking-widest">CENTERED</span>
</div>
<!-- Organic Vine-like progress indicator (Static representation) -->
<svg class="absolute w-72 h-72 md:w-96 md:h-96 -z-10 opacity-20" viewbox="0 0 100 100">
<circle class="text-primary" cx="50" cy="50" fill="none" r="48" stroke="currentColor" stroke-dasharray="4 4" stroke-width="0.5"></circle>
</svg>
</div>
<!-- Session Selection - Bento Style -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full max-w-3xl">
<!-- Quick De-stress -->
<button class="group p-8 rounded-xl bg-surface-container neumorphic-convex hover:translate-y-[-2px] transition-all duration-500 ease-in-out flex flex-col items-start text-left">
<div class="flex justify-between w-full mb-4">
<span class="material-symbols-outlined text-primary p-2 bg-surface rounded-full neumorphic-concave" data-icon="bolt">bolt</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">3 MIN</span>
</div>
<h3 class="font-headline-md text-headline-md text-primary mb-2">Quick De-stress</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Reset your nervous system with rhythmic pacing.</p>
</button>
<!-- Deep Focus -->
<button class="group p-8 rounded-xl bg-surface-container neumorphic-convex hover:translate-y-[-2px] transition-all duration-500 ease-in-out flex flex-col items-start text-left border-2 border-transparent hover:border-primary-fixed">
<div class="flex justify-between w-full mb-4">
<span class="material-symbols-outlined text-primary p-2 bg-surface rounded-full neumorphic-concave" data-icon="filter_vintage">filter_vintage</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">10 MIN</span>
</div>
<h3 class="font-headline-md text-headline-md text-primary mb-2">Deep Focus</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Sustained breathwork for cognitive restoration.</p>
</button>
</div>
<!-- Settings Section -->
<div class="mt-stack-lg w-full max-w-sm">
<div class="flex items-center justify-between p-6 bg-surface-container-low rounded-full neumorphic-concave">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="surround_sound">surround_sound</span>
<span class="font-body-md text-body-md text-on-surface">Immersive Audio</span>
</div>
<!-- Toggle Switch -->
<div class="w-12 h-6 bg-primary-container rounded-full relative flex items-center px-1">
<div class="w-4 h-4 bg-white rounded-full shadow-md ml-auto"></div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center py-4 bg-surface-container-low rounded-t-xl shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-50">
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-colors duration-300">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-label-sm text-label-sm">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-colors duration-300">
<span class="material-symbols-outlined mb-1" data-icon="insights">insights</span>
<span class="font-label-sm text-label-sm">Analytics</span>
</div>
<!-- Active Tab: Meditation -->
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-2 shadow-[inset_2px_2px_5px_rgba(0,0,0,0.1)] scale-105 transition-transform duration-500 ease-in-out">
<span class="material-symbols-outlined mb-1" data-icon="self_care" style="font-variation-settings: 'FILL' 1;">self_care</span>
<span class="font-label-sm text-label-sm">Meditation</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-colors duration-300">
<span class="material-symbols-outlined mb-1" data-icon="inventory_2">inventory_2</span>
<span class="font-label-sm text-label-sm">Vault</span>
</div>
</nav>
<!-- Spacing for navigation height -->
<div class="h-24 md:h-28"></div>
</body></html>
