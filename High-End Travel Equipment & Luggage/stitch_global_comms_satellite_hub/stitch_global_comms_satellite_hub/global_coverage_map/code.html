<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanning-line {
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            height: 1px;
            width: 100%;
            position: absolute;
            top: 0;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(300px); opacity: 0; }
        }
        .pulse-glow {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .glass-panel {
            background: rgba(14, 14, 14, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid #1A1A1A;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-fixed">
<!-- TopAppBar Shell -->
<header class="docked full-width top-0 sticky z-[60] flex justify-between items-center w-full px-margin h-16 bg-surface/60 dark:bg-surface/60 backdrop-blur-xl border-b border-outline-variant dark:border-outline-variant">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="satellite_alt">satellite_alt</span>
<span class="font-display-xl text-headline-md tracking-tighter text-on-surface dark:text-on-surface">GLOBAL-COMMS</span>
</div>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="signal_cellular_alt">signal_cellular_alt</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative min-h-[calc(100vh-144px)] w-full overflow-hidden">
<!-- Background Map Section -->
<div class="absolute inset-0 z-0 bg-[#050505]">
<img alt="Global Coverage Map" class="w-full h-full object-cover opacity-40 mix-blend-screen" data-alt="A high-contrast dark satellite view of Earth at night with glowing blue and neon cyan network connections spidering across the continents. The style is cinematic and technical, using deep space blacks and luminous cyan data visualizations to represent global connectivity. Vibrant points of light indicate active satellite nodes in a futuristic, spacecraft cockpit interface aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsfGCmMEEHaLbhEAiwbJchiJNNp9H_lxSrZ1WVFhlJ4fcBifzxLgoin3c6Wf4E7TpDlFgUv4jVPJ5nSft2e7xfh5yFJDujwCyZOKTtB6rghSbYmMLLkL4RZXxuOejfJooK66u7w8Vf1d9Xk5Rpp2zTHveIr_h5QdJ3s5nbGtMmaBAST9MtudQJJTxhqBq_iVR7TcvT0zTxZk4K61_T7Kz5hSlp9-9nTmZI3PsXAT_OisEOMEL64H10Eduosm1JGFTy1Zs2jCxWtnU"/>
<!-- Coverage Overlays (Simulated SVG/Glow) -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-[30%] left-[20%] w-32 h-32 bg-primary-container/20 rounded-full blur-3xl pulse-glow"></div>
<div class="absolute top-[50%] left-[60%] w-48 h-48 bg-primary-container/20 rounded-full blur-3xl pulse-glow"></div>
<div class="absolute top-[20%] left-[75%] w-24 h-24 bg-primary-container/20 rounded-full blur-3xl pulse-glow"></div>
</div>
</div>
<!-- HUD: Search Bar -->
<section class="relative z-10 px-margin pt-sm">
<div class="glass-panel rounded-xl overflow-hidden group focus-within:border-primary-container transition-all duration-300">
<div class="flex items-center px-sm py-xs">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 text-label-caps font-label-caps w-full placeholder:text-outline-variant uppercase tracking-widest px-sm h-10" placeholder="SEARCH GLOBAL DESTINATION..." type="text"/>
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-primary" data-icon="mic">mic</span>
</div>
<div class="scanning-line opacity-0 group-focus-within:opacity-100"></div>
</div>
</section>
<!-- Floating Action: Live Satellite Toggle -->
<section class="absolute top-32 right-margin z-10 flex flex-col gap-sm">
<div class="glass-panel p-xs rounded-full flex flex-col gap-xs items-center">
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-primary text-on-primary shadow-[0_0_15px_rgba(0,240,255,0.4)] transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="rocket_launch" data-weight="fill" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</button>
<div class="w-[1px] h-8 bg-outline-variant"></div>
<button class="w-12 h-12 rounded-full flex items-center justify-center text-on-surface hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
</div>
</section>
<!-- Data HUD Panels (Asymmetric Layout) -->
<section class="absolute bottom-4 left-0 w-full px-margin z-10 pointer-events-none">
<div class="flex flex-col gap-sm max-w-xs">
<!-- Connection Status Module -->
<div class="glass-panel p-sm rounded-lg pointer-events-auto border-l-2 border-l-primary-container">
<div class="flex items-center justify-between mb-xs">
<span class="font-label-caps text-label-caps text-outline uppercase">Active Link</span>
<div class="flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-primary-container pulse-glow"></div>
<span class="font-label-caps text-label-caps text-primary-container">SECURE</span>
</div>
</div>
<div class="font-mono-technical text-mono-technical text-on-surface opacity-80 leading-tight">
                        LAT: 40.7128° N<br/>
                        LONG: 74.0060° W<br/>
                        PING: 24MS [ORBIT-V]
                    </div>
</div>
<!-- Coverage Intensity Module -->
<div class="glass-panel p-sm rounded-lg pointer-events-auto">
<span class="font-label-caps text-label-caps text-outline uppercase block mb-xs">Signal Strength</span>
<div class="flex items-end gap-[2px] h-8">
<div class="bg-primary-container w-2 h-[20%]"></div>
<div class="bg-primary-container w-2 h-[40%]"></div>
<div class="bg-primary-container w-2 h-[75%]"></div>
<div class="bg-primary-container w-2 h-[90%] opacity-50"></div>
<div class="bg-primary-container w-2 h-[100%] opacity-20"></div>
<span class="ml-auto font-display-xl text-headline-md text-on-surface leading-none">94%</span>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-safe h-20 bg-surface-container-lowest/80 dark:bg-surface-container-lowest/80 backdrop-blur-lg border-t border-outline-variant dark:border-outline-variant shadow-[0_-4px_20px_rgba(0,219,233,0.15)] z-[60]">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant pt-2 hover:bg-surface-container-high/50 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-caps text-label-caps mt-1">DASHBOARD</span>
</a>
<a class="flex flex-col items-center justify-center text-primary-container dark:text-primary-container border-t-2 border-primary-container pt-2 scale-110 transition-transform duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="public" data-weight="fill" style="font-variation-settings: 'FILL' 1;">public</span>
<span class="font-label-caps text-label-caps mt-1">COVERAGE</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant pt-2 hover:bg-surface-container-high/50 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="font-label-caps text-label-caps mt-1">PLANS</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant pt-2 hover:bg-surface-container-high/50 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
<span class="font-label-caps text-label-caps mt-1">SUPPORT</span>
</a>
</nav>
<!-- Map Coordinate Overlay (Asymmetric corner) -->
<div class="fixed top-20 left-4 z-50 pointer-events-none">
<div class="font-mono-technical text-[10px] text-outline-variant tracking-widest flex items-center gap-xs">
<div class="w-1 h-1 bg-outline-variant rotate-45"></div>
            SYSTEM_STATUS: NOMINAL
        </div>
</div>
</body></html>
