<!DOCTYPE html>

<style>
        .glow-primary {
            box-shadow: 0 0 15px 0px rgba(173, 199, 255, 0.4);
        }
        .heatmap-pulse {
            animation: pulse-bg 2s infinite ease-in-out;
        }
        @keyframes pulse-bg {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-md min-h-screen pb-unit-12 overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-background flex justify-between items-center px-margin py-unit-2 border-b border-outline-variant">
<div class="flex items-center gap-unit-2">
<span class="material-symbols-outlined text-primary" data-icon="menu">menu</span>
<h1 class="text-headline-md font-display font-bold text-primary tracking-tighter">AppAnalytics</h1>
</div>
<div class="w-unit-8 h-unit-8 rounded-full bg-surface-container-highest border border-outline-variant flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJHauO5KYevYk4IhdioERdubdUxDQ6Of5nsgoehfMhPt7KC7Kx0Bi7CAHajGRs4iEpAZs0LwOpBdJh7KlIny_GC3fTJnXXvowfkdgJH2Mzsc0i8Hl3OFViZDJwa9qSAQY0grB7aDn5mreDZ9TUGHVDJKtkp4Tb7BZeRk-4zvfTEGsJrckZpo2tD2rwYwFhPNX5iTOjd_S7pPTeeVfMrBJbD2wDd_yyKKZCNJ0pRuPOHWgSlRDUoFXFLUMg1hE6Zxgaqmnd4KtKvQc"/>
</div>
</header>
<main class="mt-unit-12 pt-unit-8 px-unit-4 space-y-unit-6">
<!-- Active Sessions Counter Section -->
<section class="flex flex-col items-center justify-center py-unit-8 space-y-unit-2">
<div class="flex items-center gap-unit-1 mb-unit-1">
<div class="w-unit-2 h-unit-2 bg-primary-container rounded-sm shadow-[0_0_8px_#4a8eff]"></div>
<span class="text-label-sm font-label-sm text-primary uppercase tracking-widest">Live Now</span>
</div>
<div class="relative">
<h2 class="text-display font-display text-primary tracking-tighter glow-primary px-unit-4 rounded-lg">
                    12,842
                </h2>
<div class="absolute inset-0 bg-primary opacity-10 blur-xl rounded-full"></div>
</div>
<p class="text-label-sm font-label-sm text-outline uppercase tracking-wider">Active Sessions</p>
</section>
<!-- Metric Comparison Cards -->
<div class="grid grid-cols-2 gap-gutter">
<div class="bg-surface-container-low border border-outline-variant p-unit-4 space-y-unit-1">
<p class="text-label-sm font-label-sm text-outline uppercase">vs Prev. Hour</p>
<div class="flex items-center justify-between">
<span class="text-headline-md font-display text-primary">+14.2%</span>
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="trending_up">trending_up</span>
</div>
</div>
<div class="bg-surface-container-low border border-outline-variant p-unit-4 space-y-unit-1 border-primary glow-primary">
<p class="text-label-sm font-label-sm text-outline uppercase">Avg. Latency</p>
<div class="flex items-center justify-between">
<span class="text-headline-md font-display text-on-surface">42ms</span>
<div class="w-2 h-2 bg-primary rounded-full"></div>
</div>
</div>
</div>
<!-- Geographic Heatmap Section -->
<section class="space-y-unit-4">
<div class="flex justify-between items-center px-unit-1">
<h3 class="text-headline-md font-display text-on-surface">Geographic Density</h3>
<span class="text-label-sm font-label-sm text-outline uppercase">World View</span>
</div>
<div class="relative w-full aspect-square bg-surface-container-lowest border border-outline-variant overflow-hidden">
<!-- Map Background -->
<img class="w-full h-full object-cover opacity-40 grayscale contrast-125" data-alt="A dark, high-contrast world map visualization with stylized landmasses in deep charcoal. The oceans are represented by a solid black void. Bright electric blue glowing hotspots are scattered across major metropolitan areas, creating a technical heatmap effect. The overall aesthetic is a digital command center interface with architectural precision and a luminous, real-time data flow atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCdkes6X3Duxoc5xvilc6t_1dhRFS4F6UBXUio4vv7dZ_vH_7YA5mmr_T0CPPakTV0ymE25MIRWP6_KSq-fqCwK0sFAmjG2s0dlMDzG9nneyHiF4BZeqZWUXRhGXDclN3YrImcMG96-Km8LYLbo-9eCNwyeE9AqDRwgQsL4SvhZmfj17zgCfQuj2OD1wOcAK4CurJFn9i0CH0MCdtYbZn974S9tyjual-vKXb6fd6UyQTU0pgXpoBPpXH6EcCriv-dLpW9ZsPs2bkw"/>
<!-- Heatmap Overlay Simulation -->
<div class="absolute inset-0 pointer-events-none">
<!-- North America Hotspot -->
<div class="absolute top-[30%] left-[20%] w-16 h-16 bg-primary opacity-40 rounded-full blur-2xl heatmap-pulse"></div>
<div class="absolute top-[35%] left-[25%] w-4 h-4 bg-primary-container rounded-full border border-white shadow-[0_0_10px_white]"></div>
<!-- Europe Hotspot -->
<div class="absolute top-[25%] left-[50%] w-12 h-12 bg-primary opacity-30 rounded-full blur-xl heatmap-pulse" style="animation-delay: 0.5s"></div>
<!-- Asia Hotspot -->
<div class="absolute top-[40%] left-[75%] w-20 h-20 bg-primary opacity-50 rounded-full blur-3xl heatmap-pulse" style="animation-delay: 1.2s"></div>
</div>
<!-- HUD Elements -->
<div class="absolute bottom-unit-4 left-unit-4 bg-background/80 backdrop-blur-md border border-outline-variant p-unit-2 px-unit-3">
<div class="flex items-center gap-unit-2">
<div class="w-2 h-2 bg-primary-container"></div>
<span class="text-data-mono text-primary uppercase">High Intensity</span>
</div>
</div>
</div>
</section>
<!-- Real-time Event Stream -->
<section class="space-y-unit-2">
<h3 class="text-label-sm font-label-sm text-outline uppercase tracking-widest px-unit-1">Live Events</h3>
<div class="divide-y divide-outline-variant border-t border-outline-variant">
<div class="py-unit-3 flex justify-between items-center">
<div class="flex items-center gap-unit-3">
<span class="material-symbols-outlined text-outline" data-icon="bolt">bolt</span>
<div>
<p class="text-on-surface font-bold text-body-md">Checkout Started</p>
<p class="text-label-sm font-label-sm text-outline">San Francisco, US</p>
</div>
</div>
<span class="text-data-mono text-primary text-label-sm">JUST NOW</span>
</div>
<div class="py-unit-3 flex justify-between items-center">
<div class="flex items-center gap-unit-3">
<span class="material-symbols-outlined text-outline" data-icon="person_add">person_add</span>
<div>
<p class="text-on-surface font-bold text-body-md">New Sign-up</p>
<p class="text-label-sm font-label-sm text-outline">Berlin, DE</p>
</div>
</div>
<span class="text-data-mono text-outline text-label-sm">2s ago</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-unit-12 px-unit-4 bg-surface-container border-t border-outline-variant">
<button class="flex flex-col items-center justify-center text-outline hover:text-on-surface">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="text-label-sm font-label-sm">Retention</span>
</button>
<button class="flex flex-col items-center justify-center text-outline hover:text-on-surface">
<span class="material-symbols-outlined" data-icon="filter_list">filter_list</span>
<span class="text-label-sm font-label-sm">Funnels</span>
</button>
<button class="flex flex-col items-center justify-center text-primary-container font-bold scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-label-sm font-label-sm">Live</span>
</button>
<button class="flex flex-col items-center justify-center text-outline hover:text-on-surface">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="text-label-sm font-label-sm">Events</span>
</button>
</nav>
</body></html>
