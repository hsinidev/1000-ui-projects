<body class="font-body-md text-on-surface">
<div class="grain-overlay"></div>
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#F5DEB3] dark:bg-[#2C241E] border-b-2 border-[#333333] flex justify-between items-center px-4 h-16">
<button class="w-10 h-10 flex items-center justify-center tactile-btn text-[#333333]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-serif italic text-lg uppercase tracking-widest text-[#333333]">GRAIN &amp; HEARTH</h1>
<button class="font-label-lg px-4 py-2 bg-[#333333] text-[#F5DEB3] tactile-btn">SAVE</button>
</header>
<main class="pt-24 pb-32 px-4 max-w-md mx-auto">
<!-- Entry Header -->
<section class="mb-8">
<div class="border-b border-[#333333] pb-2 mb-4">
<label class="font-label-md text-on-surface-variant block mb-1 uppercase tracking-wider">JOURNAL ENTRY</label>
<input class="w-full bg-transparent font-headline-lg border-none focus:ring-0 p-0 text-on-surface" placeholder="First Batch of Rouge de Bordeaux" type="text" value="First Batch of Rouge de Bordeaux"/>
</div>
<div class="flex items-center gap-2 text-on-surface-variant font-label-md">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
<span>OCTOBER 24, 2023</span>
<span class="mx-2">•</span>
<span class="material-symbols-outlined text-[18px]">schedule</span>
<span>05:30 AM</span>
</div>
</section>
<!-- Photo Gallery -->
<section class="mb-8">
<label class="font-label-md text-on-surface-variant block mb-3 uppercase tracking-wider">VISUAL LOG</label>
<div class="grid grid-cols-2 gap-4">
<div class="aspect-square border-2 border-[#333333] relative overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover" data-alt="A close-up, high-detail macro shot of a sourdough bread's open crumb structure, showcasing large irregular holes and glistening gluten strands. The lighting is warm and natural, hitting the bread from the side to emphasize the tactile texture of the moist interior. The overall aesthetic is rustic and professional, using a warm wheat and charcoal palette consistent with a high-end bakery journal." src="https://lh3.googleusercontent.com/aida-public/AB6AXuABiqbmmmAAvK967ARtn3Czv2v5ZzQQ2YOWdTMEfPIcmmoMDztWN6_ub3EYXbmlqS24sXCodmyBWgXzTD1_VGavwh3L0eTFCJy8an0ILaqihkHpXaH75jGH49Rc2rONLLHo5tvHZLN-LjSd-27_w5oSMXEpgC8vNfTysDvv9_HDEPUCmO8c_cIlV9jf1wZy5AmxGaoRyJyFTZR0AlSSUUsfg7z_3LULrxdjvnppCiCzbr_Y3B-vzQCUY734J8QuLlAUe3kokXAWYMw"/>
</div>
<div class="aspect-square border-2 border-[#333333] border-dashed flex flex-col items-center justify-center bg-[#F5DEB3]/30 tactile-btn cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant mb-2">add_a_photo</span>
<span class="font-label-md text-on-surface-variant">ADD PHOTO</span>
</div>
</div>
</section>
<!-- Data Fields -->
<section class="grid grid-cols-1 gap-4 mb-8">
<div class="border-2 border-[#333333] p-4 bg-white/50">
<label class="font-label-md text-on-surface-variant block mb-2 uppercase tracking-wider">FLOUR TYPE</label>
<input class="w-full bg-transparent font-body-lg border-none focus:ring-0 p-0 text-[#333333]" type="text" value="Heritage Rouge de Bordeaux"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="border-2 border-[#333333] p-4 bg-white/50">
<label class="font-label-md text-on-surface-variant block mb-2 uppercase tracking-wider">HYDRATION %</label>
<input class="w-full bg-transparent font-body-lg border-none focus:ring-0 p-0 text-[#333333]" type="text" value="78%"/>
</div>
<div class="border-2 border-[#333333] p-4 bg-white/50">
<label class="font-label-md text-on-surface-variant block mb-2 uppercase tracking-wider">BULK FERMENT</label>
<input class="w-full bg-transparent font-body-lg border-none focus:ring-0 p-0 text-[#333333]" type="text" value="5.5 HOURS"/>
</div>
</div>
</section>
<!-- Baker's Notes -->
<section class="mb-8">
<div class="border-2 border-[#333333] p-4 bg-white min-h-[200px] relative">
<label class="font-label-md text-on-surface-variant block mb-3 uppercase tracking-wider">BAKER'S NOTES</label>
<textarea class="w-full h-full bg-transparent font-body-md border-none focus:ring-0 p-0 text-on-surface resize-none leading-relaxed" placeholder="Describe the dough feel, the aroma of the starter, and observations during folding..."></textarea>
<!-- Decorative flour-dust corner -->
<div class="absolute bottom-0 right-0 p-2 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-4xl">grain</span>
</div>
</div>
</section>
<!-- Success Toggle -->
<section class="mb-8">
<label class="font-label-md text-on-surface-variant block mb-3 uppercase tracking-wider">OVERALL SUCCESS</label>
<div class="flex border-2 border-[#333333]">
<button class="flex-1 py-3 font-label-lg bg-[#333333] text-[#F5DEB3]">GREAT</button>
<button class="flex-1 py-3 font-label-lg border-x-2 border-[#333333] hover:bg-[#333333]/10">AVERAGE</button>
<button class="flex-1 py-3 font-label-lg hover:bg-[#333333]/10">FAILED</button>
</div>
</section>
<!-- Tags -->
<section class="mb-12">
<label class="font-label-md text-on-surface-variant block mb-3 uppercase tracking-wider">TAGS</label>
<div class="flex flex-wrap gap-2">
<span class="px-3 py-1 bg-[#5D4037] text-white font-label-md">#SOURDOUGH</span>
<span class="px-3 py-1 bg-[#5D4037] text-white font-label-md">#HERITAGEGRAIN</span>
<span class="px-3 py-1 bg-[#5D4037] text-white font-label-md">#HIGHHYDRATION</span>
<button class="px-3 py-1 border border-[#333333] font-label-md tactile-btn">+ ADD TAG</button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#F5DEB3] dark:bg-[#2C241E] border-t-2 border-[#333333] flex justify-around items-center h-20 pb-safe">

<span class="material-symbols-outlined">timer</span>
<span class="font-sans font-semibold text-[10px] uppercase tracking-wider">OVEN</span>
</div>
<div class="flex flex-col items-center justify-center text-[#333333] px-4 py-1 hover:bg-[#333333]/10 transition-transform active:translate-y-0.5 cursor-pointer">
<span class="material-symbols-outlined">biotech</span>
<span class="font-sans font-semibold text-[10px] uppercase tracking-wider">STARTER</span>
</div>
<div class="flex flex-col items-center justify-center text-[#333333] px-4 py-1 hover:bg-[#333333]/10 transition-transform active:translate-y-0.5 cursor-pointer">
<span class="material-symbols-outlined">storefront</span>
<span class="font-sans font-semibold text-[10px] uppercase tracking-wider">SHOP</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#333333] text-[#F5DEB3] rounded-none px-4 py-1 transition-transform active:translate-y-0.5 cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<span class="font-sans font-semibold text-[10px] uppercase tracking-wider">JOURNAL</span>
</div>
</nav>
</body></html>
