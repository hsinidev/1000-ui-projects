<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @font-face {
            font-family: 'metropolis';
            src: url('https://fonts.cdnfonts.com/css/metropolis');
        }
        @font-face {
            font-family: 'ebGaramond';
            src: url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .sculpture-canvas {
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #e5e2e1 100%);
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 24px;
            background: #8e4e00;
            cursor: pointer;
            border-radius: 0;
        }
    </style>

                extend: {
                    "colors": {
                        "primary": "#5b5c5c",

                        "tertiary-container": "#737575",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-secondary-fixed-variant": "#6c3a00",
                        "secondary-fixed-dim": "#ffb779",
                        "on-primary-fixed-variant": "#464747",
                        "primary-fixed-dim": "#c7c6c6",
                        "on-surface": "#1c1b1b",
                        "surface-container-low": "#f6f3f2",
                        "on-tertiary-container": "#fcfcfc",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fefcfc",
                        "secondary": "#8e4e00",
                        "surface-container-high": "#eae7e7",

                        "surface-tint": "#5e5e5e",
                        "on-surface-variant": "#444748",
                        "error-container": "#ffdad6",
                        "background": "#fcf9f8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "128px",
                        "gutter": "32px",
                        "container-max": "1440px",
                        "unit": "8px",
                        "margin-edge": "64px"
                    },
                    "fontFamily": {
                        "body-lg": ["ebGaramond"],
                        "body-md": ["ebGaramond"],
                        "label-sm": ["metropolis"],
                        "headline-lg": ["metropolis"],
                        "display-xl": ["metropolis"],
                        "headline-md": ["metropolis"]
                    },
                    "fontSize": {
                        "body-lg": ["20px", {"lineHeight": "30px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.2em", "fontWeight": "600"}],
                        "headline-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "0.05em", "fontWeight": "400"}],
                        "display-xl": ["72px", {"lineHeight": "80px", "letterSpacing": "-0.02em", "fontWeight": "300"}],

            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full flex justify-between items-center px-gutter h-20 bg-surface/90 backdrop-blur-md border-b border-outline-variant dark:border-outline z-50">
<button class="text-secondary active:opacity-70 transition-opacity duration-200">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-medium text-secondary tracking-[0.2em] uppercase">SCULPT-SPACE</h1>
<button class="text-secondary active:opacity-70 transition-opacity duration-200">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</header>
<!-- Main Viewport Area -->
<main class="relative h-screen w-full pt-20 pb-20 overflow-hidden sculpture-canvas">
<!-- AR View Overlay Label -->
<div class="absolute top-24 left-gutter z-10">
<span class="font-label-sm text-label-sm uppercase text-secondary block mb-2">Currently Viewing</span>
<h2 class="font-headline-lg text-headline-lg text-on-surface">TITAN_V3</h2>
<p class="font-body-md text-on-surface-variant max-w-xs mt-2">Sintered Concrete &amp; Bronze Infusion. 3D Printed Architectural Form.</p>
</div>
<!-- 3D Model Placeholder Container -->
<div class="absolute inset-0 flex items-center justify-center p-gutter">
<div class="relative w-full max-w-4xl aspect-square md:aspect-video flex items-center justify-center">
<img alt="TITAN_V3 Sculpture" class="max-h-[618px] object-contain drop-shadow-2xl" data-alt="A high-end 3D sculpture with complex brutalist geometric forms, rendered in a mix of porous grey concrete and polished bronze accents. The sculpture is centered in a bright, minimalist studio environment with soft architectural shadows and neutral lighting. The aesthetic is clean, professional, and captures the tactile quality of 3D-printed materials for an upscale interior design audience." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCeqdSajS_K6BISmIRCr0dU_Emn7W7FEYJOU03mriKe-GQ1OWEWWi2aY9m1K1tJJ8x99ryNbKeZR0y6cG4tG8libgOFfVpRvSqxVFGY8cK0V712zV8zvg4Qde3omco7Z3XpAPDVtM_GS19KImblk2B_C8Goid1z6SRQUt1vgnQTIxWowRIY-gjvlvCrjTSx2ztLpTtdlw6AOQeGuOvA8LQgZLcMXrtgvmiyjTORBftlDV1bsNcQFfxi77j51TIkbNfTYopzmZ9qq7g"/>
<!-- Rotation Indicator Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
<span class="material-symbols-outlined text-[120px] text-primary">360</span>
</div>
</div>
</div>
<!-- Interactive Control Overlays -->
<div class="absolute right-gutter top-1/2 -translate-y-1/2 flex flex-col gap-unit">
<button class="w-12 h-12 bg-surface border border-outline-variant flex items-center justify-center text-secondary hover:border-secondary transition-colors">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<button class="w-12 h-12 bg-surface border border-outline-variant flex items-center justify-center text-secondary hover:border-secondary transition-colors">
<span class="material-symbols-outlined">zoom_out</span>
</button>
<button class="w-12 h-12 bg-surface border border-outline-variant flex items-center justify-center text-secondary hover:border-secondary transition-colors">
<span class="material-symbols-outlined">refresh</span>
</button>
</div>
<!-- Specialized Light-Source Interactive Toggle -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 w-full max-w-md px- gutter z-20">
<div class="bg-surface/80 backdrop-blur-md p-6 border border-outline-variant shadow-sm">
<div class="flex justify-between items-center mb-4">
<span class="font-label-sm text-label-sm uppercase text-on-surface">Light Source Position</span>
<span class="material-symbols-outlined text-secondary">light_mode</span>
</div>
<div class="relative w-full h-1 bg-surface-variant">
<input class="absolute top-0 left-0 w-full h-1 appearance-none bg-transparent custom-slider outline-none" max="100" min="0" type="range" value="45"/>
<div class="absolute top-1/2 -translate-y-1/2 left-0 h-1 bg-secondary w-[45%] pointer-events-none"></div>
</div>
<div class="flex justify-between mt-2">
<span class="text-[10px] uppercase font-label-sm text-on-surface-variant">West</span>
<span class="text-[10px] uppercase font-label-sm text-on-surface-variant">Zenith</span>
<span class="text-[10px] uppercase font-label-sm text-on-surface-variant">East</span>
</div>
</div>
</div>
<!-- Prominent AR Button -->
<div class="absolute bottom-gutter right-gutter z-20">
<button class="bg-secondary text-on-secondary px-8 py-4 font-label-sm text-label-sm uppercase flex items-center gap-4 active:scale-95 transition-transform duration-150">
<span>View in Your Space</span>
<span class="material-symbols-outlined">view_in_ar</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 h-20 pb-safe bg-surface/95 backdrop-blur-sm border-t border-outline-variant dark:border-outline z-50">
<a class="flex flex-col items-center justify-center text-on-surface-variant pt-2 hover:text-secondary transition-all duration-300" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-label-sm text-label-sm uppercase mt-1">COLLECTION</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant pt-2 hover:text-secondary transition-all duration-300" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-label-sm text-label-sm uppercase mt-1">SEARCH</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary border-t-2 border-secondary pt-2 -mt-[2px]" href="#">
<span class="material-symbols-outlined">view_in_ar</span>
<span class="font-label-sm text-label-sm uppercase mt-1">AR VIEW</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant pt-2 hover:text-secondary transition-all duration-300" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm uppercase mt-1">PROFILE</span>
</a>
</nav>
<!-- Structural Hairline Grid (Aesthetic) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[1]">
<div class="h-full w-full grid grid-cols-12 max-w-container-max mx-auto border-x border-on-surface">
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="border-r border-on-surface h-full"></div>
<div class="h-full"></div>
</div>
</div>
</body></html>
