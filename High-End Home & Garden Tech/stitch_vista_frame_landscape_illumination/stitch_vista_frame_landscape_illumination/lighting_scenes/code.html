<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @font-face {
            font-family: 'metropolis';
            src: url('https://fonts.cdnfonts.com/css/metropolis');
        }
        body {
            font-family: 'metropolis', sans-serif;
            background-color: #0D0D0D;
            color: #e5e2e1;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(32, 31, 31, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(233, 195, 73, 0.1);
        }
        .light-leak {
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.1) 0%, rgba(13, 13, 13, 0) 60%);
        }
        .lume-slider-track {
            background: linear-gradient(to top, #310a5d, #e9c349);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#d0bcff",
                        "primary-fixed-dim": "#d8b9ff",
                        "on-surface-variant": "#ccc3d1",
                        "surface-bright": "#3a3939",
                        "secondary-container": "#af8d11",
                        "secondary-fixed-dim": "#e9c349",
                        "surface-container-highest": "#353534",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#131313",
                        "on-tertiary-fixed": "#23005c",
                        "primary-container": "#310a5d",
                        "surface-container": "#201f1f",
                        "tertiary-fixed": "#e9ddff",
                        "on-primary-fixed-variant": "#573583",
                        "background": "#131313",
                        "on-error": "#690005",
                        "surface-variant": "#353534",
                        "surface-container-high": "#2a2a2a",
                        "primary-fixed": "#eddcff",
                        "on-tertiary": "#3b0191",
                        "surface-container-low": "#1c1b1b",
                        "tertiary-container": "#2b006f",
                        "on-primary": "#3f1d6b",
                        "inverse-surface": "#e5e2e1",
                        "secondary-fixed": "#ffe088",
                        "on-tertiary-container": "#9874f1",
                        "on-secondary-fixed": "#241a00",
                        "outline-variant": "#4a4450",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#574500",
                        "on-surface": "#e5e2e1",
                        "error": "#ffb4ab",
                        "on-secondary": "#3c2f00",
                        "on-tertiary-fixed-variant": "#522aa7",
                        "surface": "#131313",
                        "inverse-on-surface": "#313030",
                        "on-primary-fixed": "#290055",
                        "on-background": "#e5e2e1",
                        "on-primary-container": "#9d7acd",
                        "on-secondary-container": "#342800",
                        "outline": "#968e9b",
                        "inverse-primary": "#6f4e9d",
                        "surface-tint": "#d8b9ff",
                        "surface-container-lowest": "#0e0e0e",
                        "primary": "#d8b9ff",
                        "secondary": "#e9c349",
                        "tertiary": "#d0bcff"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "container-padding": "24px",
                        "section-gap": "64px",
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "unit": "8px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "display-xl": ["metropolis"],
                        "label-caps": ["metropolis"],
                        "headline-lg": ["metropolis"],
                        "headline-md": ["metropolis"],
                        "body-lg": ["metropolis"],
                        "body-md": ["metropolis"]
                    },
                    "fontSize": {
                        "display-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.15em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/20 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-container-padding py-stack-md">
<div class="flex items-center gap-2 cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-secondary" data-icon="blur_on">blur_on</span>
<h1 class="font-display-xl text-headline-md tracking-widest text-secondary">LUME CINEMATIC</h1>
</div>
<div class="cursor-pointer active:scale-95 transition-transform hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-secondary text-headline-md" data-icon="account_circle">account_circle</span>
</div>
</header>
<main class="pt-24 px-container-padding">
<!-- Hero: 3D Render Section -->
<section class="relative w-full aspect-video rounded-xl overflow-hidden mb-stack-lg group">
<img alt="Luxury Home Render" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="A hyper-realistic 3D architectural visualization of a brutalist luxury villa at twilight, nestled in a lush mountain landscape. The house is illuminated by warm gold accents and deep purple ambient glows that reflect off massive glass windows and polished concrete surfaces. The atmosphere is cinematic and high-stakes, with a moody dark obsidian sky and a sense of exclusive architectural storytelling through light." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBs8N4xHcpRzMDJcquIVDrZz1yqJcU4J-3K8ul9rXVbEBMlGAwkYOE02D_rJ2S5a2tSgs_Y3iC0Z4DsCk2gRfx71qGpNHV30-3BBP6ivnf5ZFDiZEd3FExRMYeclFgyQOy3er-TKAj1pr9lIHobOEZXFHm5pVIpVycs6iECjMVi4Ga47WcJTY_ytQ-CsUPLftpj7O-MvSVmMoH_R6xKTm1bnCZ9s3qop3ET9BK6DYN5gVHYvXhAOTzanHnygElJ26DlRFUhPL5gL0g"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-4">
<span class="bg-secondary text-on-secondary px-3 py-1 rounded-full font-label-caps text-label-caps flex items-center gap-1 shadow-lg">
<span class="material-symbols-outlined text-[14px]" data-icon="view_in_ar">view_in_ar</span>
                    LIVE RENDER
                </span>
</div>
</section>
<!-- Color Picker & Master Dimmer -->
<section class="mb-stack-lg">
<div class="glass-panel p-container-padding rounded-xl light-leak">
<div class="flex justify-between items-center mb-stack-md">
<h3 class="font-headline-md text-headline-md text-on-surface">Spatial Hue</h3>
<span class="text-secondary font-label-caps text-label-caps">GOLDEN HOUR</span>
</div>
<!-- Interactive Color Wheel Placeholder -->
<div class="relative w-full aspect-square max-w-[240px] mx-auto mb-stack-lg rounded-full p-4 border border-white/5 bg-surface-container-lowest">
<div class="w-full h-full rounded-full bg-[conic-gradient(from_0deg,#d0bcff,#e9c349,#ffb4ab,#d0bcff)] relative">
<div class="absolute top-1/4 right-1/4 w-8 h-8 rounded-full border-4 border-white shadow-xl bg-secondary cursor-grab active:scale-90 transition-transform"></div>
</div>
</div>
<!-- Lume Slider (Dimmer) -->
<div class="space-y-stack-sm">
<div class="flex justify-between font-label-caps text-label-caps text-on-surface-variant">
<span>Intensity</span>
<span>84%</span>
</div>
<div class="relative h-12 w-full bg-surface-container-highest rounded-full overflow-hidden flex items-center">
<div class="absolute top-0 left-0 h-full w-[84%] bg-gradient-to-r from-primary-container to-secondary shadow-[0_0_20px_rgba(233,195,73,0.3)]"></div>
<div class="absolute left-[84%] -translate-x-1/2 w-8 h-8 bg-on-surface rounded-full border-2 border-secondary shadow-lg"></div>
</div>
</div>
</div>
</section>
<!-- Holiday Mode Toggle -->
<section class="mb-stack-lg">
<div class="bg-secondary-container/20 border border-secondary/30 p-container-padding rounded-xl flex justify-between items-center">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-secondary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" data-icon="festival">festival</span>
</div>
<div>
<h4 class="font-headline-md text-[18px] text-secondary">Holiday Mode</h4>
<p class="font-body-md text-[14px] text-on-surface-variant">Dynamic thematic sequences</p>
</div>
</div>
<div class="w-14 h-8 bg-secondary rounded-full relative flex items-center px-1 cursor-pointer">
<div class="w-6 h-6 bg-on-secondary rounded-full ml-auto"></div>
</div>
</div>
</section>
<!-- Instant Scene Switch Chips -->
<section class="mb-stack-lg">
<h3 class="font-headline-md text-headline-md text-on-surface mb-stack-md px-2">Instant Scenes</h3>
<div class="flex overflow-x-auto gap-stack-md pb-4 no-scrollbar">
<!-- Scene 1: Sunset -->
<div class="min-w-[160px] glass-panel rounded-xl overflow-hidden cursor-pointer active:scale-95 transition-transform border border-secondary/40 ring-1 ring-secondary/20">
<div class="h-24 w-full relative">
<img alt="Sunset" class="w-full h-full object-cover grayscale-[0.2]" data-alt="A warm and evocative sunset over a modern architectural horizon. Deep oranges and soft purples blend seamlessly in the sky, casting long, cinematic shadows. The lighting is low and atmospheric, perfectly capturing the transition from day to night in a high-end luxury residential setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxUD3JCiYdGoDI98ePiwZ16yNj3SHwj5EOFpjJCQoWTgT1F-2X4qZmxMI8wbMOQ4n1x28T5AgxvxlIoeiGpg0WPK7X67JKo0wRLd66u7unzIuoPGr1-mi5_oXC_CqIVSXikTQ3zG6bXAVOVfNzqD4TtPK3wsj7Gpfbiwnqw-wzxXpUACRoiPTQfO-zl1uIjPcAetASQPRiPe4qCp-HjDhI4u2bmmAJrZuH3OnMrYi_DfvlbYvgOpI9DzU66i8rp8ZoHdeHeqS14ck"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container to-transparent"></div>
</div>
<div class="p-3 text-center">
<span class="font-label-caps text-label-caps text-secondary">SUNSET</span>
</div>
</div>
<!-- Scene 2: Starlight -->
<div class="min-w-[160px] glass-panel rounded-xl overflow-hidden cursor-pointer active:scale-95 transition-transform">
<div class="h-24 w-full relative">
<img alt="Starlight" class="w-full h-full object-cover grayscale-[0.5]" data-alt="A breathtaking night sky filled with countless stars and a faint nebular glow of deep purple and cosmic blue. The atmosphere is quiet and awe-inspiring, suggesting a moment of luxury solitude under a pristine celestial ceiling. The visual style is crisp and high-contrast, echoing the deep obsidian and gold theme of the UI." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDOMQC-jshWFcYJt9jmiXYdrIQdrSVX_F3u22NXyA1apFpYc6mO1SDoyBU7mz3enK-lQKDNKNpzSorHBxK0co4KMfMwit1fWjL_dCMY8Sli-pRt6ENAP64X3Hlncb1Z6tPyPUAeObUO-hT5PKmHbr6IkQod0KkQfr0aWc__8gs1z4WjooDjsXgKfsMqv7sezLLa0nnnXNQVaZmnLa2eBrk-zAxMv0ftVZyY_ggwfAVT4G-sR_W1ToH8zBWdIzhICA_7XfxUlCZpwgs"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container to-transparent"></div>
</div>
<div class="p-3 text-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">STARLIGHT</span>
</div>
</div>
<!-- Scene 3: Cinema -->
<div class="min-w-[160px] glass-panel rounded-xl overflow-hidden cursor-pointer active:scale-95 transition-transform">
<div class="h-24 w-full relative">
<img alt="Cinema" class="w-full h-full object-cover grayscale-[0.5]" data-alt="The interior of a private home theater with plush velvet seating and dim, dramatic accent lighting. A soft purple glow emanates from hidden LED strips along the floor and ceiling, focusing the viewer's attention. The lighting is precise and theatrical, designed for an immersive cinematic experience in a high-stakes modern home." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC50dw3obeHRL5VIPPnvD_womyHnw9eAf3wLjn1xMGTIVPiGwVxuoKnjGDqe6xc3WuWY61Cd4mh1F0h-2QDx8qgIwtaexnT_Ybm1RzKIOx5VVQIAbnv2rNWesHa3aW0pmZpTwix65k41_y1i4vmQz1PT-ZDluTw--BigQyBcrORyWvMoRFD_kBKqLbDWnE8F4cJuBdLFGQPU4qitm2PYP1QKcV9Sj8VHFlKta4PCt1p51gUVn00JHn7vZdUGnNnXrKjQuACAfLcdEI"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container to-transparent"></div>
</div>
<div class="p-3 text-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">CINEMA</span>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-surface-container/20 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center px-4 py-4 pb-8">
<!-- Scenes (Active) -->
<button class="flex flex-col items-center justify-center text-secondary font-bold active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined mb-1" data-icon="wb_iridescent" style="font-variation-settings: 'FILL' 1;">wb_iridescent</span>
<span class="font-label-caps text-label-caps">Scenes</span>
</button>
<!-- Projection -->
<button class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary/80 transition-colors active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined mb-1" data-icon="videocam">videocam</span>
<span class="font-label-caps text-label-caps">Projection</span>
</button>
<!-- Schedule -->
<button class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary/80 transition-colors active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined mb-1" data-icon="event_note">event_note</span>
<span class="font-label-caps text-label-caps">Schedule</span>
</button>
<!-- Energy -->
<button class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary/80 transition-colors active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined mb-1" data-icon="bolt">bolt</span>
<span class="font-label-caps text-label-caps">Energy</span>
</button>
</nav>
</body></html>
