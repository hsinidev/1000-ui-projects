<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flora-Security: Heatmap Control</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#293041",
                        "secondary-container": "#484949",
                        "inverse-primary": "#575e70",
                        "surface-bright": "#39393a",
                        "surface-container-high": "#2a2a2b",
                        "on-primary-fixed": "#141c2b",
                        "surface-container-lowest": "#0e0e0f",
                        "on-tertiary-fixed": "#1b1c1c",
                        "on-background": "#e4e2e3",
                        "outline": "#8f9097",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-container": "#7e7d7d",
                        "on-surface": "#e4e2e3",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#c8c6c6",
                        "surface-dim": "#131314",
                        "background": "#131314",
                        "secondary-fixed": "#e3e2e2",
                        "surface-container-highest": "#353436",
                        "primary-fixed-dim": "#bfc6db",
                        "on-surface-variant": "#c6c6cd",
                        "on-primary-container": "#767d90",
                        "tertiary-fixed": "#e4e2e1",
                        "on-primary-fixed-variant": "#3f4758",
                        "surface": "#131314",
                        "on-error": "#690005",
                        "on-tertiary-fixed-variant": "#474747",
                        "tertiary-container": "#121212",
                        "tertiary": "#c8c6c6",
                        "on-tertiary": "#303030",
                        "error-container": "#93000a",
                        "primary-container": "#0a1221",
                        "on-secondary": "#2f3131",
                        "on-secondary-fixed": "#1a1c1c",
                        "inverse-surface": "#e4e2e3",
                        "primary-fixed": "#dbe2f8",
                        "surface-tint": "#bfc6db",
                        "surface-container": "#1f1f21",
                        "surface-container-low": "#1b1b1d",
                        "primary": "#bfc6db",
                        "outline-variant": "#45474c",
                        "surface-variant": "#353436",
                        "secondary": "#c6c6c6",
                        "inverse-on-surface": "#303031",
                        "on-secondary-container": "#b8b8b8",
                        "on-secondary-fixed-variant": "#464747",
                        "secondary-fixed-dim": "#c6c6c6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "panel-padding": "20px",
                        "unit": "4px",
                        "gutter": "16px",
                        "margin": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["JetBrains Mono"],
                        "label-sm": ["JetBrains Mono"],
                        "data-display": ["JetBrains Mono"],
                        "body-md": ["Inter"],
                        "headline-xl": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}],
                        "data-display": ["14px", {"lineHeight": "1.4", "letterSpacing": "0em", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                        "headline-xl": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .heatmap-gradient {
            background: radial-gradient(circle at 40% 40%, rgba(255, 0, 0, 0.4) 0%, rgba(255, 150, 0, 0.2) 20%, rgba(0, 150, 255, 0.1) 50%, transparent 80%);
        }
        .silver-trim {
            border: 1px solid rgba(198, 198, 198, 0.2);
        }
        .glass-panel {
            background: rgba(19, 19, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen overflow-hidden select-none">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-panel-padding h-16 bg-surface-dim/80 backdrop-blur-xl border-b border-outline-variant/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="shield">shield</span>
<h1 class="font-headline-lg text-headline-lg tracking-tighter text-on-surface">FLORA-SECURITY</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="sensors">sensors</span>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative h-screen w-full bg-surface-container-lowest overflow-hidden">
<!-- Map Background Mockup -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-40 grayscale contrast-125" data-alt="An overhead satellite view of a dense forest perimeter with industrial infrastructure, styled with high-contrast tactical night-vision aesthetics. The landscape features dark graphite tones and metallic silver highlights, with subtle topographical contour lines and grid overlays indicating a secure perimeter management interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCd9nOx4xIzb8UNr039Ca4qYVEPbK1iGtflXzZygC9S_vOx_uROPbzl-sCjkM8ei4YwsP2DK_Y5soOxasA3USMWC04RY5kkZzpTozy9kGXydFNe4SdS7X9NVugijzq1IL4iSfdfARgR1FpV0mhXA2Ax4DkoZ4FVsMy-ZA0xdArRg2EPR_MwftYoa6uh0z__KuyuVZWpFJpD88eNqFQbcKyWYg0AyeCvpfdzb-OL84Po2Np325H2P08BEloBhX8AwFlyfVd3SjQBRgtY"/>
<!-- Heatmap Overlay -->
<div class="absolute inset-0 heatmap-gradient"></div>
<div class="absolute top-1/3 left-1/4 w-64 h-64 bg-error/20 rounded-full blur-[80px]"></div>
<div class="absolute bottom-1/3 right-1/4 w-96 h-96 bg-primary/20 rounded-full blur-[100px]"></div>
</div>
<!-- Float Overlays: Sensor Tooltips -->
<div class="absolute top-24 left-6 z-10">
<div class="glass-panel silver-trim rounded-lg p-3 w-48 shadow-2xl">
<div class="flex justify-between items-center mb-2">
<span class="font-label-sm text-label-sm text-primary uppercase">Zone Alpha-7</span>
<div class="w-2 h-2 rounded-full bg-error animate-pulse"></div>
</div>
<div class="font-data-display text-data-display space-y-1">
<div class="flex justify-between">
<span class="text-outline">Motion:</span>
<span class="text-on-surface">94% Freq</span>
</div>
<div class="flex justify-between">
<span class="text-outline">Temp:</span>
<span class="text-on-surface">18.4°C</span>
</div>
</div>
</div>
</div>
<div class="absolute top-1/2 right-10 z-10 translate-y-[-50%]">
<div class="glass-panel silver-trim rounded-lg p-3 w-40 shadow-2xl">
<div class="flex justify-between items-center mb-2">
<span class="font-label-sm text-label-sm text-outline uppercase">Node G-12</span>
<div class="w-2 h-2 rounded-full bg-[#00FF41]"></div>
</div>
<p class="font-data-display text-data-display text-on-surface">Nominal Status</p>
<div class="mt-2 h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-2/3 bg-primary"></div>
</div>
</div>
</div>
<!-- Controls Sidebar (Floating) -->
<div class="absolute left-6 bottom-28 z-20 flex flex-col gap-2">
<button class="glass-panel silver-trim w-12 h-12 flex items-center justify-center rounded-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="add">add</span>
</button>
<button class="glass-panel silver-trim w-12 h-12 flex items-center justify-center rounded-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="remove">remove</span>
</button>
<button class="glass-panel silver-trim w-12 h-12 flex items-center justify-center rounded-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="my_location">my_location</span>
</button>
</div>
<!-- Timeline Scrubber Panel -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 w-[92%] z-30">
<div class="glass-panel silver-trim rounded-xl p-4 shadow-2xl">
<div class="flex justify-between items-center mb-4">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-outline">ACTIVITY FREQUENCY</span>
<span class="font-headline-lg text-headline-lg text-primary tracking-tight">LAST 24 HOURS</span>
</div>
<div class="flex gap-2">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer" data-icon="history">history</span>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer" data-icon="settings_input_component">settings_input_component</span>
</div>
</div>
<!-- Visualization/Timeline -->
<div class="relative h-12 flex items-end gap-1 mb-2">
<!-- Bars indicating density -->
<div class="flex-1 bg-primary/20 h-4 rounded-t-sm"></div>
<div class="flex-1 bg-primary/30 h-6 rounded-t-sm"></div>
<div class="flex-1 bg-primary/20 h-5 rounded-t-sm"></div>
<div class="flex-1 bg-error/40 h-8 rounded-t-sm"></div>
<div class="flex-1 bg-error/60 h-10 rounded-t-sm"></div>
<div class="flex-1 bg-error h-12 rounded-t-sm"></div>
<div class="flex-1 bg-error/50 h-9 rounded-t-sm"></div>
<div class="flex-1 bg-primary/40 h-6 rounded-t-sm"></div>
<div class="flex-1 bg-primary/20 h-4 rounded-t-sm"></div>
<div class="flex-1 bg-primary/10 h-3 rounded-t-sm"></div>
<div class="flex-1 bg-primary/30 h-5 rounded-t-sm"></div>
<div class="flex-1 bg-primary/50 h-7 rounded-t-sm"></div>
</div>
<!-- Slider Hardware Gauge Mockup -->
<div class="relative h-6 flex items-center">
<div class="absolute h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-3/4 bg-primary"></div>
</div>
<!-- Handle -->
<div class="absolute left-3/4 -translate-x-1/2 w-8 h-4 bg-primary rounded shadow-[0_0_15px_rgba(191,198,219,0.5)] flex items-center justify-center border border-white/40">
<div class="w-[1px] h-2 bg-on-primary"></div>
</div>
</div>
<div class="flex justify-between mt-2 font-data-display text-label-sm text-outline px-1">
<span>-24H</span>
<span>-12H</span>
<span class="text-primary font-bold">CURRENT (0H)</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 px-4 pb-2 bg-surface-container-lowest/90 backdrop-blur-2xl border-t border-outline-variant/20 z-50">
<button class="flex flex-col items-center justify-center text-primary dark:text-primary brightness-125">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-label-sm text-label-sm uppercase mt-1">Map</span>
</button>
<button class="flex flex-col items-center justify-center text-outline dark:text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="videocam">videocam</span>
<span class="font-label-sm text-label-sm uppercase mt-1">Feeds</span>
</button>
<button class="flex flex-col items-center justify-center text-outline dark:text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="notification_important">notification_important</span>
<span class="font-label-sm text-label-sm uppercase mt-1">Alerts</span>
</button>
<button class="flex flex-col items-center justify-center text-outline dark:text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="wb_twilight">wb_twilight</span>
<span class="font-label-sm text-label-sm uppercase mt-1">Lights</span>
</button>
<button class="flex flex-col items-center justify-center text-outline dark:text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-label-sm text-label-sm uppercase mt-1">Archive</span>
</button>
</nav>
<!-- FAB Suppression Rule Active: Not present on Details/Heatmap focused screen unless required -->
<!-- Legend (Asymmetric Overlay) -->
<div class="fixed top-20 right-6 z-40 glass-panel silver-trim rounded-lg p-2 flex flex-col gap-2 items-center">
<div class="w-1 h-20 bg-gradient-to-t from-primary via-yellow-400 to-error rounded-full"></div>
<div class="flex flex-col text-[10px] font-headline-lg gap-6 text-outline">
<span>HIGH</span>
<span>LOW</span>
</div>
</div>
</body></html>
