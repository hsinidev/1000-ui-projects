<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Terra-Aqua | Access Control</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-variant": "#e0e2ed",
                        "on-secondary-container": "#4a6a6a",
                        "inverse-on-surface": "#eef0fb",
                        "primary": "#005ab7",
                        "on-tertiary-fixed": "#351000",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffdbcc",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#c6e9e9",
                        "on-primary-fixed": "#001b3f",
                        "tertiary": "#9d3f00",
                        "on-secondary-fixed": "#002020",
                        "tertiary-container": "#c45100",
                        "inverse-primary": "#abc7ff",
                        "outline-variant": "#c1c6d7",
                        "surface-container": "#ebedf8",
                        "secondary-fixed-dim": "#abcdcd",
                        "on-primary-fixed-variant": "#004590",
                        "tertiary-fixed-dim": "#ffb693",
                        "on-secondary-fixed-variant": "#2c4c4c",
                        "on-tertiary-container": "#fffbff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "surface-container-high": "#e6e8f3",
                        "secondary": "#446464",
                        "primary-fixed-dim": "#abc7ff",
                        "surface-container-low": "#f1f3fe",
                        "on-surface": "#181c23",
                        "surface-dim": "#d7dae4",
                        "secondary-container": "#c6e9e9",
                        "outline": "#717786",
                        "surface-bright": "#f9f9ff",
                        "primary-container": "#0072e5",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface": "#f9f9ff",
                        "on-tertiary-fixed-variant": "#7a2f00",
                        "primary-fixed": "#d7e2ff",
                        "inverse-surface": "#2d3039",
                        "surface-tint": "#005cbc",
                        "on-surface-variant": "#414754",
                        "error-container": "#ffdad6",
                        "background": "#f9f9ff",
                        "surface-container-highest": "#e0e2ed",
                        "on-background": "#181c23",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "1.5rem",
                        "unit": "8px",
                        "sm": "1rem",
                        "lg": "2.5rem",
                        "xl": "4rem",
                        "md": "1.5rem",
                        "xs": "0.5rem",
                        "margin": "2rem"
                    },
                    "fontFamily": {
                        "h3": ["Montserrat"],
                        "h2": ["Montserrat"],
                        "h1": ["Montserrat"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "h3": ["24px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                        "h2": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h1": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .liquid-shadow {
            box-shadow: 0 10px 40px -10px rgba(0, 90, 183, 0.15);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-background min-h-screen relative overflow-hidden flex items-center justify-center">
<!-- Background Image with Overlay -->
<div class="fixed inset-0 z-0">
<img alt="Luxury Estate Background" class="w-full h-full object-cover opacity-90 scale-105" data-alt="A cinematic, soft-focus aerial photograph of a sprawling, luxury green estate during the golden hour. The landscape features perfectly manicured lawns, circular driveway details, and sparkling water features. The lighting is warm and ethereal, creating a serene, high-end atmosphere that reflects the Intelligent Hydration brand identity with soft greens and deep azure blue hints in the shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAii19PPTz3bEHlgxcZyQos8LiMz2USDnfDxQ63PVAuZc_wWuPD7o-YcYTNfBk2L-uKFe3IE76bSj1ZwcDiZczkjgW6lohasUp9qYiwWeEFYKhLwIaG1DFi6SGX36ZLcOudmVKLJoPt8hJDtQgQAe6_V2yB14mDOVVIZSAzBFwwrAunuJhoKPKO1ByMkrRG75GD55q6Hgy9LLw-cuIYGvSwDj_0NZ8NHuu-QEHRh3cxIMA3AxKTEIbrpxCFY0PDbDI19pFDl89_aU0"/>
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-primary/5 backdrop-blur-[2px]"></div>
</div>
<!-- Main Auth Container -->
<main class="relative z-10 w-full max-w-[480px] px-gutter">
<div class="glass-panel liquid-shadow rounded-[2rem] p-lg md:p-xl flex flex-col items-center">
<!-- Branding -->
<div class="mb-lg text-center">
<div class="flex items-center justify-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-[40px]" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<h1 class="font-h2 text-h2 tracking-tighter text-primary">Terra-Aqua</h1>
</div>
<p class="font-label-sm text-on-surface-variant uppercase tracking-[0.2em]">Elite Estate Management</p>
</div>
<!-- Tabs -->
<div class="w-full grid grid-cols-2 bg-surface-container-low/50 rounded-xl p-1 mb-lg">
<button class="py-3 px-4 font-body-md font-semibold text-primary bg-white rounded-lg shadow-sm transition-all duration-300">
                    Sign In
                </button>
<button class="py-3 px-4 font-body-md font-medium text-on-surface-variant hover:text-primary transition-all duration-300">
                    Create Account
                </button>
</div>
<!-- Form -->
<form class="w-full space-y-md">
<div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-white/50 border-none rounded-xl ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none text-body-md" id="email" placeholder="owner@estate.com" type="email"/>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-end px-1">
<label class="font-label-sm text-on-surface-variant" for="password">Security Key</label>
<a class="text-[11px] font-semibold text-primary-container hover:underline uppercase tracking-wider" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-white/50 border-none rounded-xl ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none text-body-md" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline text-[20px] cursor-pointer hover:text-primary">visibility</span>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 px-1 py-1">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 cursor-pointer" id="remember" type="checkbox"/>
</div>
<label class="font-body-md text-on-surface-variant text-[14px] cursor-pointer" for="remember">Remember this device</label>
</div>
<!-- CTA -->
<div class="pt-sm space-y-md">
<button class="w-full py-4 bg-primary text-on-primary font-h3 text-body-lg rounded-xl shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-300" type="submit">
                        Request Estate Access
                    </button>
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="font-label-sm text-outline uppercase tracking-widest text-[10px]">Security Verified</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
</div>
<!-- Secondary Login Options -->
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-2 py-3 bg-white/50 border border-outline-variant/30 rounded-xl hover:bg-white hover:shadow-sm transition-all duration-200" type="button">
<span class="material-symbols-outlined text-[18px]">fingerprint</span>
<span class="font-label-sm">Biometric</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 bg-white/50 border border-outline-variant/30 rounded-xl hover:bg-white hover:shadow-sm transition-all duration-200" type="button">
<span class="material-symbols-outlined text-[18px]">qr_code</span>
<span class="font-label-sm">QR Code</span>
</button>
</div>
</div>
</form>
<!-- Footer Links -->
<footer class="mt-xl text-center space-y-sm">
<p class="font-body-md text-[14px] text-on-surface-variant/80">
                    Having trouble? <a class="text-primary font-semibold hover:underline" href="#">Contact Concierge</a>
</p>
<div class="flex items-center justify-center gap-6">
<a class="font-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">Privacy</a>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<a class="font-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">Terms</a>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<a class="font-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">v4.2.0</a>
</div>
</footer>
</div>
<!-- Decorative Water Element (Glass Bubble) -->
<div class="absolute -top-12 -right-12 w-48 h-48 rounded-full bg-gradient-to-br from-primary/10 to-secondary/5 blur-2xl -z-10 animate-pulse"></div>
<div class="absolute -bottom-16 -left-16 w-64 h-64 rounded-full bg-gradient-to-tr from-tertiary-fixed/10 to-primary/5 blur-3xl -z-10"></div>
</main>
<!-- Support FAB -->
<div class="fixed bottom-margin right-margin z-50">
<button class="flex items-center gap-3 pl-4 pr-5 py-3 glass-panel rounded-full shadow-lg border border-white/40 group hover:bg-white transition-all duration-300">
<span class="w-3 h-3 rounded-full bg-vibrant-teal animate-ping absolute" style="background-color: #2c4c4c;"></span>
<span class="w-3 h-3 rounded-full bg-secondary-container"></span>
<span class="font-label-sm text-on-surface-variant group-hover:text-primary transition-colors">Concierge Online</span>
</button>
</div>
</body></html>
