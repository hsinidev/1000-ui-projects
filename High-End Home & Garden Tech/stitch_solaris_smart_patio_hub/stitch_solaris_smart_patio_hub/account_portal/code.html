<!DOCTYPE html>

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    vertical-align: middle
    }
.glass-layer {
    background: rgba(252, 249, 245, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.3)
    }
.premium-shadow {
    box-shadow: 0 10px 30px rgba(27, 38, 59, 0.08)
    }
.bg-auth-hero {
    background-image: linear-gradient(rgba(5, 17, 37, 0.4), rgba(5, 17, 37, 0.4)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuBqgsR4dNiIv5tybeEgy8y60sj9UxkiiYtmh4vCWs5n6CwgFgHQquwNcoJz8veIqM1KmJdFvWh2SyUeyoirGzx7wKPTCJHdrVHQuzD7sYiYwUyiZuTTfcVo9KqOqX2yrCLwKm50xt7p4ccyd9g1XylrBRymxepJoAJGRiFbrQl0JniDqueJ9g2nBXgog8kv828-HhNs3nBOhkLaeRkyopO11PyKTYR7jjM_GcMPZLnyYq69AfJ1THOyAQ47cONQ-t3Xgfjt0RexIzWm);
    background-size: cover;

<body class="bg-background font-body-md text-on-surface selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Auth Background Section -->
<div class="relative min-h-screen flex items-center justify-center p-container-margin bg-auth-hero" data-alt="A sprawling luxury outdoor patio at magic hour sunset, featuring sleek minimalist furniture and built-in architectural lighting. The scene is bathed in warm terracotta and golden hues from the setting sun, contrasting with deep navy twilight shadows. Polished stone flooring and lush landscaping frame a high-end smart home environment that feels serene, warm, and exceptionally premium.">
<!-- Branding Overlay (Top Left) -->
<div class="fixed top-8 left-8 flex flex-col gap-xs z-50">
<h1 class="font-display-lg text-display-lg text-surface-container-lowest tracking-tight">Solaris Patio</h1>
<p class="font-title-sm text-title-sm text-surface-container-low opacity-90">Premium Comfort</p>
</div>
<!-- Main Auth Container -->
<main class="w-full max-w-[480px] glass-layer premium-shadow rounded-xl overflow-hidden animate-in fade-in zoom-in duration-700">
<!-- Header Section -->
<div class="p-lg pb-md border-b border-outline-variant/20 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-container text-surface mb-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="lock">lock</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary block">Welcome Back</h2>
<p class="font-body-md text-on-surface-variant mt-xs">Access your outdoor oasis with Solaris Patio</p>
</div>
<!-- Tab Switcher -->
<div class="flex border-b border-outline-variant/20">
<button class="flex-1 py-md font-label-caps text-label-caps text-secondary border-b-2 border-secondary tracking-widest transition-all">
                    SIGN IN
                </button>
<button class="flex-1 py-md font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-all tracking-widest">
                    SIGN UP
                </button>
</div>
<!-- Auth Form -->
<form class="p-lg flex flex-col gap-lg">
<div class="space-y-gutter">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs" for="email">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary focus:ring-0 transition-all rounded-t-lg font-body-lg text-body-lg placeholder:text-outline-variant/60 outline-none" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs" for="password">PASSWORD</label>
<a class="font-body-md text-body-md text-secondary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="key">key</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary focus:ring-0 transition-all rounded-t-lg font-body-lg text-body-lg placeholder:text-outline-variant/60 outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Remember Me -->
<label class="flex items-center gap-sm cursor-pointer group">
<input class="w-5 h-5 rounded border-outline-variant text-secondary focus:ring-secondary/20 bg-surface-container transition-all" type="checkbox"/>
<span class="font-body-md text-on-surface-variant group-hover:text-on-surface">Keep me signed in for 30 days</span>
</label>
<!-- Action Button -->
<button class="w-full py-md bg-secondary hover:bg-on-secondary-fixed-variant text-on-secondary font-headline-md text-title-sm rounded-lg premium-shadow transform active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    Enter My Patio
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Social Auth Separator -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-outline-variant">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Grid -->
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center gap-sm py-sm px-md rounded-lg border border-outline-variant/40 hover:bg-surface-container-low transition-all font-body-md" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="google">google</span>
                        Google
                    </button>
<button class="flex items-center justify-center gap-sm py-sm px-md rounded-lg border border-outline-variant/40 hover:bg-surface-container-low transition-all font-body-md" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="apple">ios</span>
                        Apple
                    </button>
</div>
</form>
<!-- Footer Section -->
<div class="p-md bg-surface-container-high/30 border-t border-outline-variant/10 text-center">
<p class="font-body-md text-on-surface-variant">
                    Designing your sanctuary? <a class="text-secondary font-bold hover:underline" href="#">Start for free</a>
</p>
</div>
</main>
<!-- Functional Chips (Contextual) -->
<div class="fixed bottom-8 right-8 flex flex-col items-end gap-sm">
<div class="flex items-center gap-xs px-4 py-2 rounded-full glass-layer border border-outline-variant/30 text-primary animate-pulse">
<span class="material-symbols-outlined text-[16px]" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="font-label-caps text-label-caps">SMART SAVER ENABLED</span>
</div>
<div class="flex items-center gap-xs px-4 py-2 rounded-full glass-layer border border-outline-variant/30 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="thermostat">thermostat</span>
<span class="font-label-caps text-label-caps">OUTDOOR: 72°F</span>
</div>
</div>
</div>
</body></html>
