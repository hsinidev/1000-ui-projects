<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;800;900&amp;family=Space+Grotesk:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for brutalist feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #131313; }
        ::-webkit-scrollbar-thumb { background: #c6c6c6; border: 2px solid #131313; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary": "#2f3131",
                      "primary-fixed-dim": "#c6c6c6",
                      "outline-variant": "#4c4546",
                      "on-primary-fixed": "#1b1b1b",
                      "on-tertiary": "#690100",
                      "on-surface": "#e5e2e1",
                      "on-secondary-container": "#b4b5b5",
                      "outline": "#988e90",
                      "on-error-container": "#ffdad6",
                      "error-container": "#93000a",
                      "inverse-on-surface": "#313030",
                      "on-primary-container": "#757575",
                      "tertiary-container": "#000000",
                      "inverse-primary": "#5e5e5e",
                      "error": "#ffb4ab",
                      "primary": "#c6c6c6",
                      "secondary-container": "#454747",
                      "surface-container": "#20201f",
                      "background": "#131313",
                      "surface-bright": "#393939",
                      "secondary-fixed-dim": "#c6c6c7",
                      "surface-container-lowest": "#0e0e0e",
                      "surface": "#131313",
                      "on-background": "#e5e2e1",
                      "tertiary-fixed": "#ffdad4",
                      "on-secondary-fixed-variant": "#454747",
                      "on-primary-fixed-variant": "#474747",
                      "surface-container-highest": "#353535",
                      "on-tertiary-fixed-variant": "#930100",
                      "on-tertiary-fixed": "#410000",
                      "surface-container-high": "#2a2a2a",
                      "on-primary": "#303030",
                      "primary-container": "#000000",
                      "on-tertiary-container": "#ec0000",
                      "on-surface-variant": "#cfc4c5",
                      "surface-variant": "#353535",
                      "surface-tint": "#c6c6c6",
                      "secondary-fixed": "#e2e2e2",
                      "primary-fixed": "#e2e2e2",
                      "surface-dim": "#131313",
                      "tertiary-fixed-dim": "#ffb4a8",
                      "surface-container-low": "#1c1b1b",
                      "inverse-surface": "#e5e2e1",
                      "on-secondary-fixed": "#1a1c1c",
                      "on-error": "#690005",
                      "secondary": "#c6c6c7",
                      "tertiary": "#ffb4a8"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-sm": "8px",
                      "margin-page": "32px",
                      "stack-lg": "64px",
                      "gutter": "16px",
                      "stack-md": "24px",
                      "unit": "4px"
              },
              "fontFamily": {
                      "h1": ["Epilogue"],
                      "body-lg": ["Epilogue"],
                      "h2": ["Epilogue"],
                      "body-sm": ["Epilogue"],
                      "h3": ["Epilogue"],
                      "label-mono": ["Space Grotesk"]
              },
              "fontSize": {
                      "h1": ["96px", {"lineHeight": "90%", "letterSpacing": "-0.05em", "fontWeight": "900"}],
                      "body-lg": ["20px", {"lineHeight": "150%", "letterSpacing": "0", "fontWeight": "500"}],
                      "h2": ["64px", {"lineHeight": "100%", "letterSpacing": "-0.03em", "fontWeight": "800"}],
                      "body-sm": ["16px", {"lineHeight": "160%", "letterSpacing": "0", "fontWeight": "400"}],
                      "h3": ["32px", {"lineHeight": "110%", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                      "label-mono": ["14px", {"lineHeight": "120%", "letterSpacing": "0.1em", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-sm overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 h-20 bg-black docked full-width top-0 border-b-4 border-white z-50">
<div class="flex items-center gap-4">
<button class="text-white active:translate-x-1 active:translate-y-1 transition-transform">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</div>
<h1 class="font-epilogue font-black uppercase tracking-tighter italic text-2xl text-white">SKATE_HUB</h1>
<div class="flex items-center gap-4">
<button class="text-white active:translate-x-1 active:translate-y-1 transition-transform">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
</button>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative flex-grow w-full overflow-hidden">
<!-- Mock Dark High-Contrast Map -->
<div class="absolute inset-0 bg-neutral-900" style="background-image: radial-gradient(#333 1px, transparent 1px); background-size: 40px 40px;">
<!-- Stylized Map Visual (Abstract representation of streets) -->
<div class="absolute inset-0 opacity-20" style="background-image: repeating-linear-gradient(0deg, #fff, #fff 2px, transparent 2px, transparent 40px), repeating-linear-gradient(90deg, #fff, #fff 2px, transparent 2px, transparent 40px);">
</div>
<!-- Custom Pins -->
<!-- Pin 1: Active -->
<div class="absolute top-1/4 left-1/3 group cursor-pointer">
<div class="w-8 h-8 bg-on-tertiary-container rotate-45 border-2 border-white flex items-center justify-center">
<span class="material-symbols-outlined -rotate-45 text-white text-xs" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-black border border-white px-2 py-1 whitespace-nowrap">
<span class="font-label-mono text-[10px] text-white">THE_RED_RAIL</span>
</div>
</div>
<!-- Pin 2: Inactive -->
<div class="absolute top-1/2 right-1/4 group cursor-pointer opacity-80">
<div class="w-6 h-6 bg-black rotate-45 border-2 border-white flex items-center justify-center">
<div class="w-2 h-2 bg-white -rotate-45"></div>
</div>
</div>
<!-- Pin 3: Inactive -->
<div class="absolute bottom-1/3 left-1/4 group cursor-pointer opacity-80">
<div class="w-6 h-6 bg-black rotate-45 border-2 border-white flex items-center justify-center">
<div class="w-2 h-2 bg-white -rotate-45"></div>
</div>
</div>
</div>
<!-- Floating Filter Button -->
<div class="absolute top-4 right-4 z-20">
<button class="bg-white text-black font-label-mono px-4 py-2 flex items-center gap-2 border-2 border-black active:translate-x-1 active:translate-y-1 transition-transform" style="box-shadow: 4px 4px 0px #ec0000;">
<span class="material-symbols-outlined" data-icon="filter_list">filter_list</span>
<span>FILTER</span>
</button>
</div>
<!-- Spot Preview Card (Bottom Slide-up) -->
<section class="absolute bottom-6 left-0 right-0 px-4 z-40">
<div class="bg-black border-4 border-white p-4 relative flex gap-4 items-start translate-y-0">
<!-- Preview Image -->
<div class="w-32 h-32 flex-shrink-0 border-2 border-white relative overflow-hidden bg-surface-container-highest">
<img class="w-full h-full object-cover grayscale contrast-125" data-alt="A gritty, high-contrast black and white photograph of a steep urban handrail descending a concrete staircase in an industrial district. The lighting is harsh, casting deep black shadows against the textured grey pavement, capturing the raw essence of street skateboarding culture. The composition is low-angle, emphasizing the height and danger of the skate spot, framed with a brutalist, unpolished aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPGBKhrozkWaGLYu8hzEjcLhYzFicwRwqoQ4eQgTaUX-ARD8btAst2SkQIH7Szetd2sJzf1C7ARzPqSpLQJMG7dJK3pKHCWjFdBWzAXbi9L0PedeGChlAEN6aU8CC1ofigHQIgd3FPWFwEhFjG5fA0iYFBy6s5cwP3SCjQCMskqr0eHoh4j_licJ-NhhphgLvEeFsxJiog4ezvdwVeRs57ViypSN71GigPJBKsIiqDdDFDCD42LZUC86_Zonu6yRUHwQE85DmhqrjQ"/>
<!-- Difficulty Tag -->
<div class="absolute bottom-0 left-0 bg-on-tertiary-container text-white font-label-mono px-2 text-[10px] tracking-tighter">
                        HARD
                    </div>
</div>
<!-- Info -->
<div class="flex-grow flex flex-col justify-between h-32">
<div>
<h2 class="font-h3 text-white -mt-2 break-words leading-none">THE_RED_RAIL</h2>
<p class="font-label-mono text-primary text-[10px] mt-1">DOWNTOWN_SECTOR_7</p>
</div>
<div class="flex justify-between items-end">
<div class="flex gap-2">
<span class="material-symbols-outlined text-white text-sm" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-white text-sm" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-white text-sm" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-white text-sm" data-icon="star">star</span>
</div>
<!-- GO Button with faux-3D collapse -->
<button class="bg-white text-black font-h3 px-6 py-1 border-2 border-black active:translate-x-1 active:translate-y-1 transition-all" style="box-shadow: 4px 4px 0px #fff;">
                            GO
                        </button>
</div>
</div>
<!-- Decorative corner accent -->
<div class="absolute -top-1 -right-1 w-4 h-4 bg-on-tertiary-container"></div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-stretch h-20 bg-black border-t-4 border-white">
<!-- SPOTS (Active) -->
<a class="bg-red-600 text-white flex flex-col items-center justify-center w-full h-full border-x-2 border-black active:scale-95 transition-all duration-75" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-epilogue font-bold uppercase text-[10px] tracking-widest mt-1">SPOTS</span>
</a>
<!-- SESSIONS -->
<a class="bg-black text-white flex flex-col items-center justify-center w-full h-full border-x border-white/20 hover:bg-red-600 hover:text-white active:scale-95 transition-all duration-75" href="#">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="font-epilogue font-bold uppercase text-[10px] tracking-widest mt-1">SESSIONS</span>
</a>
<!-- ADD -->
<a class="bg-black text-white flex flex-col items-center justify-center w-full h-full border-x border-white/20 hover:bg-red-600 hover:text-white active:scale-95 transition-all duration-75" href="#">
<span class="material-symbols-outlined" data-icon="add_box">add_box</span>
<span class="font-epilogue font-bold uppercase text-[10px] tracking-widest mt-1">ADD</span>
</a>
<!-- PROFILE -->
<a class="bg-black text-white flex flex-col items-center justify-center w-full h-full border-x border-white/20 hover:bg-red-600 hover:text-white active:scale-95 transition-all duration-75" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-epilogue font-bold uppercase text-[10px] tracking-widest mt-1">PROFILE</span>
</a>
</nav>
<!-- Map UI Overlays -->
<div class="absolute left-4 top-24 z-20 flex flex-col gap-2">
<button class="w-10 h-10 bg-black border-2 border-white text-white flex items-center justify-center active:bg-white active:text-black">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="w-10 h-10 bg-black border-2 border-white text-white flex items-center justify-center active:bg-white active:text-black">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<button class="w-10 h-10 bg-black border-2 border-white text-white flex items-center justify-center mt-4 active:bg-white active:text-black">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
</body></html>
