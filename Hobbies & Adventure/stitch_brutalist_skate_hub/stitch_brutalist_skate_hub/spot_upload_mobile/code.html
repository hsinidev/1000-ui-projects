<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;800;900&amp;family=Space+Grotesk:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#e5e2e1",
                    "secondary-fixed-dim": "#c6c6c7",
                    "on-error": "#690005",
                    "tertiary-container": "#000000",
                    "on-primary-fixed": "#1b1b1b",
                    "on-error-container": "#ffdad6",
                    "surface-tint": "#c6c6c6",
                    "on-secondary-container": "#b4b5b5",
                    "on-primary-container": "#757575",
                    "on-secondary": "#2f3131",
                    "secondary-fixed": "#e2e2e2",
                    "surface-container-high": "#2a2a2a",
                    "secondary-container": "#454747",
                    "inverse-primary": "#5e5e5e",
                    "surface-container-lowest": "#0e0e0e",
                    "on-secondary-fixed": "#1a1c1c",
                    "on-tertiary-fixed-variant": "#930100",
                    "surface-bright": "#393939",
                    "primary-container": "#000000",
                    "on-tertiary": "#690100",
                    "primary-fixed": "#e2e2e2",
                    "on-tertiary-container": "#ec0000",
                    "background": "#131313",
                    "secondary": "#c6c6c7",
                    "on-tertiary-fixed": "#410000",
                    "on-primary-fixed-variant": "#474747",
                    "surface": "#131313",
                    "on-surface-variant": "#cfc4c5",
                    "on-background": "#e5e2e1",
                    "surface-container-low": "#1c1b1b",
                    "primary-fixed-dim": "#c6c6c6",
                    "on-secondary-fixed-variant": "#454747",
                    "outline-variant": "#4c4546",
                    "error": "#ffb4ab",
                    "surface-dim": "#131313",
                    "surface-container": "#20201f",
                    "tertiary": "#ffb4a8",
                    "tertiary-fixed-dim": "#ffb4a8",
                    "error-container": "#93000a",
                    "surface-container-highest": "#353535",
                    "inverse-on-surface": "#313030",
                    "tertiary-fixed": "#ffdad4",
                    "on-surface": "#e5e2e1",
                    "surface-variant": "#353535",
                    "on-primary": "#303030",
                    "primary": "#c6c6c6",
                    "outline": "#988e90"
            },
            "borderRadius": {
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-sm": "8px",
                    "stack-md": "24px",
                    "margin-page": "32px",
                    "gutter": "16px",
                    "stack-lg": "64px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "h3": ["Epilogue"],
                    "body-sm": ["Epilogue"],
                    "label-mono": ["Space Grotesk"],
                    "h1": ["Epilogue"],
                    "body-lg": ["Epilogue"],
                    "h2": ["Epilogue"]
            },
            "fontSize": {
                    "h3": ["32px", {"lineHeight": "110%", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-sm": ["16px", {"lineHeight": "160%", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-mono": ["14px", {"lineHeight": "120%", "letterSpacing": "0.1em", "fontWeight": "600"}],
                    "h1": ["96px", {"lineHeight": "90%", "letterSpacing": "-0.05em", "fontWeight": "900"}],
                    "body-lg": ["20px", {"lineHeight": "150%", "letterSpacing": "0", "fontWeight": "500"}],
                    "h2": ["64px", {"lineHeight": "100%", "letterSpacing": "-0.03em", "fontWeight": "800"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .brutalist-border {
            border: 4px solid white;
        }
        .brutalist-shadow-red {
            box-shadow: 6px 6px 0px #ec0000;
        }
        .brutalist-shadow-white {
            box-shadow: 6px 6px 0px white;
        }
        .active-offset:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-sm selection:bg-on-tertiary-container selection:text-white">
<!-- TopAppBar -->
<header class="bg-black text-white font-['Epilogue'] font-black uppercase tracking-tighter docked full-width top-0 border-b-4 border-white flex justify-between items-center w-full px-4 h-16 sticky z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-white" data-icon="menu">menu</span>
<h1 class="text-2xl font-black text-white italic tracking-widest">UPLOAD_SPOT</h1>
</div>
<span class="material-symbols-outlined text-white" data-icon="sensors">sensors</span>
</header>
<main class="px-4 pt-8 pb-32 max-w-xl mx-auto">
<!-- Hero Section / Title Area -->
<section class="mb-stack-lg">
<div class="inline-block bg-on-tertiary-container text-white px-2 py-1 font-label-mono text-label-mono mb-2">
                NEW_ENTRY_LOG_01
            </div>
<h2 class="font-h2 text-h2 text-white leading-none break-all">ADD_A_SPOT</h2>
<div class="w-full h-1 bg-white mt-4"></div>
</section>
<!-- Form Canvas -->
<form class="space-y-stack-md">
<!-- Image Upload Area -->
<div class="group relative">
<div class="brutalist-border bg-surface-container h-64 flex flex-col items-center justify-center relative overflow-hidden group-hover:bg-on-tertiary-container transition-colors cursor-pointer">
<img class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale group-hover:scale-105 transition-transform" data-alt="A gritty, high-contrast black and white photograph of an industrial skate park under a concrete overpass. The lighting is harsh and direct, creating deep shadows and bright highlights. The urban setting is raw and unpolished, with visible textures of cracked pavement and rusted metal pipes. A vibrant red spray-painted arrow points toward a steep concrete ledge, adding a singular pop of color to the monochromatic scene. The mood is rebellious and authentic to underground skate culture." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxAr7gYhdDA9m21k637kI2fiT2FGene-7zGdIeYS8gcu4u3MjKBbJj2I02LTOBCqeuMPPne6QZcx_LJ1vDoeFju_XEywCckFwdnpAXn7g5krnWN-MPz4IQdQpuUo3hmU4H10OWPIUSYofK71C3nD6CqdWUxXER70el4ipdvR_ax-hef6YlIpnn9EXycynypQV7JFsM_1TbqGFa2WwFBNuEDIqI5ejpAq9-ncl-3PHHKdz0lN1ZnjxziWQbSJBXt11wFEFR_fcBlRIE"/>
<div class="z-10 flex flex-col items-center text-center px-4">
<span class="material-symbols-outlined text-white text-5xl mb-4" data-icon="add_a_photo">add_a_photo</span>
<p class="font-h3 text-h3 text-white uppercase italic">UPLOAD_SPOT_IMG</p>
</div>
</div>
<!-- Brutalist Shadow Element -->
<div class="absolute -bottom-2 -right-2 w-full h-full brutalist-border bg-white -z-10"></div>
</div>
<!-- Input Fields -->
<div class="pt-8 space-y-stack-md">
<div>
<label class="block font-label-mono text-label-mono text-white mb-2 uppercase tracking-widest">Spot Name</label>
<input class="w-full bg-black brutalist-border p-4 text-body-lg font-body-lg text-white placeholder:text-outline focus:outline-none focus:ring-0 focus:border-on-tertiary-container transition-colors" placeholder="Enter landmark or street" type="text"/>
</div>
<div>
<label class="block font-label-mono text-label-mono text-white mb-2 uppercase tracking-widest">Location/Coords</label>
<div class="relative">
<input class="w-full bg-black brutalist-border p-4 text-body-lg font-body-lg text-white placeholder:text-outline focus:outline-none focus:ring-0 focus:border-on-tertiary-container transition-colors" placeholder="Current location or GPS" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-white" data-icon="my_location">my_location</span>
</div>
</div>
<!-- Difficulty Selector -->
<div>
<label class="block font-label-mono text-label-mono text-white mb-2 uppercase tracking-widest">Difficulty</label>
<div class="grid grid-cols-3 gap-unit">
<button class="brutalist-border p-4 text-center font-h3 text-body-lg uppercase bg-white text-black active-offset hover:bg-on-tertiary-container hover:text-white transition-colors" type="button">
                            Easy
                        </button>
<button class="brutalist-border p-4 text-center font-h3 text-body-lg uppercase bg-black text-white active-offset hover:bg-on-tertiary-container transition-colors" type="button">
                            Mid
                        </button>
<button class="brutalist-border p-4 text-center font-h3 text-body-lg uppercase bg-black text-white active-offset hover:bg-on-tertiary-container transition-colors" type="button">
                            Hard
                        </button>
</div>
</div>
</div>
<!-- Submit Section -->
<div class="pt-stack-md">
<button class="w-full bg-on-tertiary-container text-white brutalist-border p-6 font-h3 text-h3 uppercase italic tracking-widest brutalist-shadow-white active-offset flex items-center justify-between hover:bg-white hover:text-black transition-all" type="submit">
                    POST SPOT
                    <span class="material-symbols-outlined text-4xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Technical Metadata -->
<div class="mt-stack-lg border-t-2 border-outline-variant pt-4 flex justify-between">
<span class="font-label-mono text-[10px] text-outline uppercase tracking-widest">System_Ready: 100%</span>
<span class="font-label-mono text-[10px] text-outline uppercase tracking-widest">Uplink: ESTABLISHED</span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-2 bg-black border-t-4 border-white font-['Epilogue'] font-bold text-[10px] uppercase text-white">
<div class="flex flex-col items-center opacity-80 hover:bg-white hover:text-black p-2 transition-transform duration-75 active:translate-y-0.5">
<span class="material-symbols-outlined text-3xl" data-icon="explore">explore</span>
</div>
<div class="flex flex-col items-center bg-red-600 text-white border-2 border-white -translate-y-1 scale-110 p-2 transition-transform duration-75 active:translate-y-0.5">
<span class="material-symbols-outlined text-3xl" data-icon="add_box" style="font-variation-settings: 'FILL' 1;">add_box</span>
</div>
<div class="flex flex-col items-center opacity-80 hover:bg-white hover:text-black p-2 transition-transform duration-75 active:translate-y-0.5">
<span class="material-symbols-outlined text-3xl" data-icon="visibility">visibility</span>
</div>
<div class="flex flex-col items-center opacity-80 hover:bg-white hover:text-black p-2 transition-transform duration-75 active:translate-y-0.5">
<span class="material-symbols-outlined text-3xl" data-icon="person">person</span>
</div>
</nav>
</body></html>
