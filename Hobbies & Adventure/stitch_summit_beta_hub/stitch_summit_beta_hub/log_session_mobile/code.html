    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-zinc-900 border-b-2 border-zinc-800 flex justify-between items-center w-full px-6 h-16 sticky top-0 z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#CCFF00] active:scale-95 transition-transform cursor-pointer">arrow_back</span>
<h1 class="font-['Space_Grotesk'] font-bold uppercase tracking-widest text-[#CCFF00] text-lg">LOG SESSION</h1>
</div>
<div class="text-xl font-black text-[#CCFF00] tracking-tighter">CLIMB_NRTV</div>
</header>
<main class="px-6 py-8 max-w-md mx-auto space-y-8">
<!-- Session Summary Section -->
<section class="space-y-4">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Session Summary</h2>
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-high p-4 border border-white/10">
<label class="block font-label-caps text-[10px] text-zinc-500 mb-1">DURATION</label>
<input class="bg-transparent border-none p-0 font-h3 text-primary-container focus:ring-0 w-full uppercase" type="text" value="2h 15m"/>
</div>
<div class="bg-surface-container-high p-4 border border-white/10">
<label class="block font-label-caps text-[10px] text-zinc-500 mb-1">LOCATION</label>
<input class="bg-transparent border-none p-0 font-h3 text-primary-container focus:ring-0 w-full uppercase" type="text" value="THE_VAULT"/>
</div>
</div>
</section>
<!-- Route Log Section -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Route Log</h2>
<span class="font-label-caps text-[10px] text-[#CCFF00]">3 ENTRIES</span>
</div>
<div class="space-y-2">
<!-- Log Entry 1 -->
<div class="bg-zinc-900 flex items-center p-4 border-l-4 border-[#CCFF00] group hover:bg-zinc-800 transition-colors">
<div class="bg-[#CCFF00] text-black font-h3 px-3 py-1 mr-4 min-w-[60px] text-center">V5</div>
<div class="flex-grow">
<div class="font-h3 text-lg leading-tight uppercase">Iron Curtain</div>
<div class="font-label-caps text-[10px] text-zinc-500 tracking-wider">RESULT: <span class="text-[#CCFF00]">FLASH</span></div>
</div>
<span class="material-symbols-outlined text-zinc-700 group-hover:text-white">chevron_right</span>
</div>
<!-- Log Entry 2 -->
<div class="bg-zinc-900 flex items-center p-4 border-l-4 border-zinc-700 group hover:bg-zinc-800 transition-colors">
<div class="bg-zinc-700 text-white font-h3 px-3 py-1 mr-4 min-w-[60px] text-center">V7</div>
<div class="flex-grow">
<div class="font-h3 text-lg leading-tight uppercase">The Void</div>
<div class="font-label-caps text-[10px] text-zinc-500 tracking-wider">RESULT: <span class="text-secondary-container">PROJECT</span></div>
</div>
<span class="material-symbols-outlined text-zinc-700 group-hover:text-white">chevron_right</span>
</div>
<!-- Log Entry 3 -->
<div class="bg-zinc-900 flex items-center p-4 border-l-4 border-[#CCFF00] group hover:bg-zinc-800 transition-colors">
<div class="bg-[#CCFF00] text-black font-h3 px-3 py-1 mr-4 min-w-[60px] text-center">V4</div>
<div class="flex-grow">
<div class="font-h3 text-lg leading-tight uppercase">Slab Queen</div>
<div class="font-label-caps text-[10px] text-zinc-500 tracking-wider">RESULT: <span class="text-[#CCFF00]">SEND</span></div>
</div>
<span class="material-symbols-outlined text-zinc-700 group-hover:text-white">chevron_right</span>
</div>
</div>
<!-- Add Climb Button -->
<button class="w-full py-4 border-2 border-dashed border-primary-container text-primary-container font-button uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-primary-container hover:text-black transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">add_box</span>
                Add Climb
            </button>
</section>
<!-- Notes Section -->
<section class="space-y-4">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Notes</h2>
<div class="bg-surface-container p-4 border border-white/5 rock-texture">
<textarea class="bg-transparent border-none w-full p-0 font-body-md text-zinc-400 focus:ring-0 resize-none uppercase text-sm tracking-tight" placeholder="SESSION DETAILS, FEELINGS, TECHNIQUE FOCUS..." rows="3"></textarea>
</div>
</section>
<!-- Visual Anchor -->
<div class="relative h-48 overflow-hidden">
<img class="w-full h-full object-cover grayscale contrast-125 opacity-40" data-alt="A gritty, high-contrast close-up of a rock climber's chalk-covered hands gripping an industrial indoor climbing hold. The lighting is dramatic and moody with deep shadows and sharp highlights, emphasizing the raw physical effort. The scene uses a monochromatic palette of dark greys and blacks, accented by a subtle neon green light reflecting off the climbing surface to maintain brand cohesion." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxYcek6tXCdZ6Nuqog8AvYKiK5B9aM8K24QF0KPJN7oXLAEWDBBR2oD98UC2r1zBFFszn8Tx9HFbVWP058qTjsAYnmtUEtco4d4c_eAcc9qREUZ4_40BYAuTWqHibxZOj_PAdYsaiOUjy81VDXeFaWPAdLbNBfatZq7r2NjZsNygUF7_5ArSE8-CPKu9CFpG6uThMHC-EHqC8I_Mx1FCa98YeUDkqyiYRHlS0z-hQ2jEvwuecxjnJ8TvK0prHO5aQSxTz7sqiCJ3M"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
<div class="absolute bottom-4 left-4">
<div class="text-primary-container font-h1 text-4xl leading-none opacity-20 font-black">CRUSH IT.</div>
</div>
</div>
<!-- Complete Session Button -->
<button class="w-full bg-primary-container text-on-primary-fixed font-button text-xl py-6 uppercase tracking-tighter hover:bg-white transition-colors active:scale-95 duration-100 flex items-center justify-center gap-3">
            COMPLETE_SESSION
            <span class="material-symbols-outlined font-bold">check_circle</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 bg-zinc-950 px-4 pb-safe border-t-2 border-zinc-800">
<!-- Feed -->
<a class="flex flex-col items-center justify-center text-zinc-600 pt-2 hover:text-white transition-colors active:opacity-80 duration-75" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-['Space_Grotesk'] font-bold text-[10px] uppercase tracking-wider">Feed</span>
</a>
<!-- Log (Active) -->
<a class="flex flex-col items-center justify-center text-[#CCFF00] border-t-4 border-[#CCFF00] pt-1 active:opacity-80 duration-75" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_box</span>
<span class="font-['Space_Grotesk'] font-bold text-[10px] uppercase tracking-wider">Log</span>
</a>
<!-- Routes -->
<a class="flex flex-col items-center justify-center text-zinc-600 pt-2 hover:text-white transition-colors active:opacity-80 duration-75" href="#">
<span class="material-symbols-outlined">terrain</span>
<span class="font-['Space_Grotesk'] font-bold text-[10px] uppercase tracking-wider">Routes</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-zinc-600 pt-2 hover:text-white transition-colors active:opacity-80 duration-75" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Space_Grotesk'] font-bold text-[10px] uppercase tracking-wider">Profile</span>
</a>
</nav>
</body></html>
