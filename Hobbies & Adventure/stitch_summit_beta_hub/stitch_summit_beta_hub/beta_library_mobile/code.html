<!DOCTYPE html>

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {

<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Shell -->
<header class="bg-stone-950 border-b-2 border-stone-800 flex justify-between items-center w-full px-4 h-16 sticky top-0 z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#CCFF00]" data-icon="menu">menu</span>
<h1 class="font-['Space_Grotesk'] font-bold tracking-tighter uppercase text-[#CCFF00] text-xl">BETA LIBRARY</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#CCFF00]" data-icon="search">search</span>
</div>
</header>
<main class="pb-24">
<!-- Search Section -->
<section class="px-4 py-6">
<div class="relative flex items-center">
<input class="w-full bg-surface-container border-b-2 border-outline-variant py-4 px-4 font-body-md text-on-surface placeholder:text-stone-600 focus:outline-none focus:border-primary-container transition-colors" placeholder="Search routes or climbers" type="text"/>
<span class="material-symbols-outlined absolute right-4 text-stone-500" data-icon="filter_list">filter_list</span>
</div>
</section>
<!-- Filter Tags -->
<section class="overflow-x-auto no-scrollbar flex gap-3 px-4 pb-4">
<button class="flex-none bg-primary-container text-on-primary-container px-6 py-2 font-label-caps border border-primary-container">V4</button>
<button class="flex-none bg-stone-900 text-stone-400 px-6 py-2 font-label-caps border border-stone-800 hover:border-primary-container hover:text-primary-container transition-all">V5</button>
<button class="flex-none bg-stone-900 text-stone-400 px-6 py-2 font-label-caps border border-stone-800 hover:border-primary-container hover:text-primary-container transition-all">OVERHANG</button>
<button class="flex-none bg-stone-900 text-stone-400 px-6 py-2 font-label-caps border border-stone-800 hover:border-primary-container hover:text-primary-container transition-all">DYNO</button>
<button class="flex-none bg-stone-900 text-stone-400 px-6 py-2 font-label-caps border border-stone-800 hover:border-primary-container hover:text-primary-container transition-all">STATIC</button>
</section>
<!-- Beta Feed -->
<section class="px-4 flex flex-col gap-8 mt-4">
<!-- Card 1 -->
<article class="bg-surface-container border border-stone-800 group overflow-hidden">
<div class="relative aspect-video">

<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-primary-container/90 p-4 rounded-full group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="play_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_circle</span>
</div>
</div>
<div class="absolute top-4 right-4 bg-secondary-container text-on-secondary-container px-3 py-1 font-label-caps text-xs">V7</div>
</div>
<div class="p-6">
<div class="flex justify-between items-start mb-2">
<h2 class="font-h3 text-primary text-2xl uppercase tracking-tight">CYBER_PUNK</h2>
<span class="material-symbols-outlined text-stone-500" data-icon="more_vert">more_vert</span>
</div>
<div class="flex items-center gap-2">
<div class="w-6 h-6 bg-stone-800 border border-stone-700 flex items-center justify-center text-[10px] font-bold text-primary-container">J.D.</div>
<p class="font-label-caps text-xs text-stone-400">SETTER: <span class="text-primary">JON_DOE</span></p>
</div>
</div>
</article>
<!-- Card 2 -->
<article class="bg-surface-container border border-stone-800 group overflow-hidden">
<div class="relative aspect-video">
<img class="w-full h-full object-cover grayscale brightness-75 group-hover:grayscale-0 group-hover:brightness-100 transition-all duration-500" data-alt="A high-angle view of a rock climber scaling a steep overhang on a dark granite cliff face during twilight. The scene is illuminated by the cool blue of dusk and the warm orange glow of a headlamp. The aesthetic is raw and aggressive, emphasizing the physical strain and verticality of the climb with sharp contrast and minimal color." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcikKIxFUf_-TChGZLA16Bm6QwyGEjuMA1NqKXd3molNRmdE7FaH734xyaUeVvx0LPv9u7PcqzvVmBJzogN1doDeDLiqTvwj5j_dirM82be5u5HYXTQ80RlnprA6EUX9oOEvQIp53uldS3XgeNvIOpNYZ1WgNzfWo4pg_4QUE08TKQRa-s_k2NED9JAwgz5WnaUjAtPmr_9UwTUhch5QTy2_tmRgsLJ0HgXnjGqN8F01oB6jdetN_pGjIGtZDeLtyIcFYF59Taa1s"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-primary-container/90 p-4 rounded-full group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="play_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_circle</span>
</div>
</div>
<div class="absolute top-4 right-4 bg-primary-container text-on-primary-container px-3 py-1 font-label-caps text-xs">V4</div>
</div>
<div class="p-6">
<div class="flex justify-between items-start mb-2">
<h2 class="font-h3 text-primary text-2xl uppercase tracking-tight">NEON_DRIFT</h2>
<span class="material-symbols-outlined text-stone-500" data-icon="more_vert">more_vert</span>
</div>
<div class="flex items-center gap-2">
<div class="w-6 h-6 bg-stone-800 border border-stone-700 flex items-center justify-center text-[10px] font-bold text-primary-container">S.K.</div>
<p class="font-label-caps text-xs text-stone-400">SETTER: <span class="text-primary">SAM_KERR</span></p>
</div>
</div>
</article>
</section>
</main>
<!-- FAB -->
<button class="fixed bottom-20 right-6 z-[60] bg-[#CCFF00] text-black w-14 h-14 flex items-center justify-center shadow-2xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-stretch h-16 bg-stone-950 border-t-2 border-stone-800">

<span class="material-symbols-outlined mb-1" data-icon="explore">explore</span>
<span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-widest uppercase">EXPLORE</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#CCFF00] text-black px-4 py-1 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="play_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_circle</span>
<span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-widest uppercase">BETA</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-500 px-4 py-1 hover:text-[#CCFF00]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="edit_note">edit_note</span>
<span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-widest uppercase">LOGS</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-500 px-4 py-1 hover:text-[#CCFF00]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-widest uppercase">PROFILE</span>
