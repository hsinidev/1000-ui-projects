<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#0e0e0e",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#abd600",
                        "surface-variant": "#353535",
                        "tertiary-container": "#e2e2e2",
                        "surface-container-highest": "#353535",
                        "inverse-primary": "#506600",
                        "secondary-container": "#fa5c1c",
                        "primary": "#ffffff",
                        "surface-container": "#1f2020",
                        "primary-container": "#c3f400",
                        "outline-variant": "#444933",
                        "surface": "#131313",
                        "on-tertiary-container": "#636565",
                        "surface-bright": "#393939",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-secondary-fixed": "#390c00",
                        "on-secondary-fixed-variant": "#832700",
                        "on-background": "#e4e2e1",
                        "surface-dim": "#131313",
                        "on-secondary": "#5c1900",
                        "on-tertiary-fixed-variant": "#454747",
                        "secondary-fixed": "#ffdbcf",
                        "on-surface": "#e4e2e1",
                        "error-container": "#93000a",
                        "secondary": "#ffb59c",
                        "inverse-surface": "#e4e2e1",
                        "on-surface-variant": "#c4c9ac",
                        "tertiary-fixed": "#e2e2e2",
                        "surface-container-low": "#1b1c1c",
                        "error": "#ffb4ab",
                        "surface-tint": "#abd600",
                        "on-primary-container": "#556d00",
                        "outline": "#8e9379",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed": "#161e00",
                        "surface-container-high": "#2a2a2a",
                        "primary-fixed": "#c3f400",
                        "background": "#131313",
                        "tertiary": "#ffffff",
                        "inverse-on-surface": "#303030",
                        "on-primary-fixed-variant": "#3c4d00",
                        "on-tertiary": "#2f3131",
                        "secondary-fixed-dim": "#ffb59c",
                        "on-secondary-container": "#511500",
                        "on-primary": "#283500"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "stack-md": "32px",
                        "gutter": "24px",
                        "margin-page": "40px",
                        "stack-sm": "16px",
                        "stack-lg": "64px"
                    },
                    "fontFamily": {
                        "body-lg": ["Lexend"],
                        "body-md": ["Lexend"],
                        "h3": ["Space Grotesk"],
                        "h2": ["Space Grotesk"],
                        "label-caps": ["Space Grotesk"],
                        "h1": ["Space Grotesk"],
                        "button": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                        "h3": ["32px", {"lineHeight": "1.2", "letterSpacing": "0em", "fontWeight": "600"}],
                        "h2": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-caps": ["14px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "h1": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "button": ["16px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">

    <!-- TopAppBar -->
    <header class="bg-black text-[#CCFF00] font-['Space_Grotesk'] uppercase font-bold tracking-tighter fixed top-0 w-full z-50 border-b-2 border-[#333333] flex justify-between items-center px-6 py-4">
        <div class="text-3xl font-black text-[#CCFF00] italic">CRUX_CLIMB</div>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex gap-8">
                <a href="#" class="text-[#CCFF00] border-b-2 border-[#CCFF00] hover:bg-[#CCFF00] hover:text-black transition-colors duration-100 px-2 py-1">Gym Feed</a>
                <a href="#" class="text-white hover:bg-[#CCFF00] hover:text-black transition-colors duration-100 px-2 py-1">Route Map</a>
                <a href="#" class="text-white hover:bg-[#CCFF00] hover:text-black transition-colors duration-100 px-2 py-1">Beta Vault</a>
            </div>
            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined cursor-pointer hover:text-white">notifications</span>
                <span class="material-symbols-outlined cursor-pointer hover:text-white">account_circle</span>
            </div>
        </div>
    </header>

    <!-- SideNavBar (Desktop Only) -->
    <aside class="hidden md:flex fixed left-0 top-0 h-full w-64 bg-[#111111] border-r-2 border-[#333333] pt-24 flex-col px-4 z-40">
        <div class="mb-8 px-2">
            <div class="text-[#CCFF00] font-black uppercase text-xs mb-1">OPERATOR_01</div>
            <div class="text-white font-['Space_Grotesk'] font-medium text-xs opacity-60">V8 | LEAD CERTIFIED</div>
        </div>
        
        <nav class="flex flex-col flex-grow">
            <a href="#" class="bg-[#CCFF00] text-black font-black p-3 mb-1 flex items-center gap-3 font-['Space_Grotesk'] text-sm uppercase">
                <span class="material-symbols-outlined">sensors</span> Gym Feed
            </a>
            <a href="#" class="text-white p-3 mb-1 hover:border-l-4 hover:border-[#CCFF00] hover:bg-[#333333] transition-all flex items-center gap-3 font-['Space_Grotesk'] text-sm uppercase">
                <span class="material-symbols-outlined">route</span> Route Map
            </a>
            <a href="#" class="text-white p-3 mb-1 hover:border-l-4 hover:border-[#CCFF00] hover:bg-[#333333] transition-all flex items-center gap-3 font-['Space_Grotesk'] text-sm uppercase">
                <span class="material-symbols-outlined">video_library</span> Beta Vault
            </a>
            <a href="#" class="text-white p-3 mb-1 hover:border-l-4 hover:border-[#CCFF00] hover:bg-[#333333] transition-all flex items-center gap-3 font-['Space_Grotesk'] text-sm uppercase">
                <span class="material-symbols-outlined">fitness_center</span> Training
            </a>
            <a href="#" class="text-white p-3 mb-1 hover:border-l-4 hover:border-[#CCFF00] hover:bg-[#333333] transition-all flex items-center gap-3 font-['Space_Grotesk'] text-sm uppercase">
                <span class="material-symbols-outlined">settings</span> Settings
            </a>
        </nav>

        <button class="mb-8 w-full bg-[#CCFF00] text-black font-black py-4 uppercase tracking-widest hover:bg-white transition-colors cursor-crosshair">
            LOG_SESSION
        </button>
    </aside>

    <!-- Main Content Canvas -->
    <main class="pt-24 pb-20 md:pb-8 md:pl-72 px-6">
        
        <!-- Hero Stats Bento -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-stack-lg">
            <div class="md:col-span-8 bg-[#333333] border-2 border-[#444444] p-8 flex flex-col justify-end min-h-[300px] relative overflow-hidden">
                <div class="absolute inset-0 opacity-10 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
                <div class="relative z-10">
                    <h2 class="font-h2 text-h2 text-[#CCFF00] uppercase mb-2 italic">SECTOR_DELTA_ACTIVE</h2>
                    <p class="font-body-lg text-body-lg text-white max-w-xl">14 new routes set in the last 48 hours. Primary focus: Dynamic overhangs and technical crimps.</p>
                </div>
            </div>
            <div class="md:col-span-4 bg-[#CCFF00] p-8 flex flex-col justify-between">
                <div class="font-label-caps text-black">WEEKLY_SESSIONS</div>
                <div class="text-8xl font-black text-black italic leading-none">05</div>
                <div class="flex justify-between items-end">
                    <span class="text-black font-bold uppercase text-xs">Total Sends: 42</span>
                    <span class="material-symbols-outlined text-black text-4xl">trending_up</span>
                </div>
            </div>
        </div>

        <!-- Dashboard Sections -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-stack-md">
            
            <!-- NEW ROUTES FEED -->
            <div class="lg:col-span-2 space-y-gutter">
                <div class="flex items-center justify-between border-b-4 border-[#CCFF00] pb-2">
                    <h3 class="font-h3 text-h3 text-white uppercase italic">NEW_ROUTES</h3>
                    <span class="font-label-caps text-[#CCFF00]">UPDATED_NOW</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
                    <!-- Route Card 1 -->
                    <div class="bg-[#1b1c1c] border-2 border-[#333333] group hover:border-[#fa5c1c] transition-colors cursor-pointer relative overflow-hidden">
                        <div class="h-48 overflow-hidden relative">
                            <img src="https://images.unsplash.com/photo-1522163182402-834f871fd851?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                                 class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" 
                                 data-alt="A close-up shot of technical climbing holds on a dark grey textured plywood bouldering wall. The lighting is harsh and dramatic, highlighting the chalk dust on the grips and the sharp angles of the wall. The aesthetic is industrial and high-performance, with deep shadows and high contrast. Vibrant neon orange accents are visible in the distance, tying back to the brand colors." />
                            <div class="absolute top-0 right-0 bg-[#fa5c1c] text-black px-4 py-2 font-black text-2xl italic">V7</div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h4 class="font-h3 text-xl text-white uppercase mb-1">CYBER_PUNK</h4>
                                    <div class="font-label-caps text-[#CCFF00] text-xs">WALL: THE PROW</div>
                                </div>
                                <div class="text-right">
                                    <div class="font-label-caps text-white text-[10px] opacity-50 uppercase">Setter</div>
                                    <div class="font-bold text-white text-sm uppercase">AXEL_VANE</div>
                                </div>
                            </div>
                            <div class="bg-black p-4 border-l-4 border-[#fa5c1c]">
                                <div class="font-label-caps text-[#fa5c1c] text-[10px] mb-1">BETA_TIP</div>
                                <p class="text-xs text-on-surface-variant italic">High heel-hook required on the initial move. Watch for the sharp crimp on the second bolt line.</p>
                            </div>
                        </div>
                        <div class="absolute bottom-0 left-0 w-0 h-1 bg-[#fa5c1c] group-hover:w-full transition-all duration-300"></div>
                    </div>

                    <!-- Route Card 2 -->
                    <div class="bg-[#1b1c1c] border-2 border-[#333333] group hover:border-[#fa5c1c] transition-colors cursor-pointer relative overflow-hidden">
                        <div class="h-48 overflow-hidden relative">
                            <img src="https://images.unsplash.com/photo-1564769662533-4f00a87b4056?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                                 class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" 
                                 data-alt="A dramatic vertical shot of a climbing wall sector featuring large, geometric yellow and orange slopers. The background is a dark, industrial gym setting with high ceilings and industrial lighting fixtures. The mood is intense and focused, capturing the physical challenge of route-setting. The overall style is rugged and modern with high visual tension." />
                            <div class="absolute top-0 right-0 bg-[#CCFF00] text-black px-4 py-2 font-black text-2xl italic text-on-primary">V4</div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h4 class="font-h3 text-xl text-white uppercase mb-1">SLAB_REVENGE</h4>
                                    <div class="font-label-caps text-[#CCFF00] text-xs">WALL: NORTH_FACE</div>
                                </div>
                                <div class="text-right">
                                    <div class="font-label-caps text-white text-[10px] opacity-50 uppercase">Setter</div>
                                    <div class="font-bold text-white text-sm uppercase">NORA_STRAND</div>
                                </div>
                            </div>
                            <div class="bg-black p-4 border-l-4 border-[#CCFF00]">
                                <div class="font-label-caps text-[#CCFF00] text-[10px] mb-1">SETTER_NOTES</div>
                                <p class="text-xs text-on-surface-variant italic">Balance-heavy movement. Smear with confidence on the textured surface. No dynamic moves.</p>
                            </div>
                        </div>
                        <div class="absolute bottom-0 left-0 w-0 h-1 bg-[#CCFF00] group-hover:w-full transition-all duration-300"></div>
                    </div>
                </div>
            </div>

            <!-- MY SENDS & STATS -->
            <div class="space-y-gutter">
                <div class="flex items-center justify-between border-b-4 border-white pb-2">
                    <h3 class="font-h3 text-h3 text-white uppercase italic">MY_SENDS</h3>
                    <span class="material-symbols-outlined text-white">history</span>
                </div>

                <div class="bg-[#2a2a2a] p-6 border-2 border-[#333333]">
                    <div class="space-y-4">
                        <!-- Send Item 1 -->
                        <div class="flex items-center justify-between group">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-[#333333] flex items-center justify-center font-black text-[#CCFF00] border border-[#444444] group-hover:bg-[#CCFF00] group-hover:text-black transition-colors">V6</div>
                                <div>
                                    <div class="text-white font-bold uppercase text-sm">Neon Shadow</div>
                                    <div class="text-[10px] text-on-surface-variant uppercase">Sent: 2 hours ago</div>
                                </div>
                            </div>
                            <span class="material-symbols-outlined text-[#CCFF00]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        </div>
                        <hr class="border-[#333333]">
                        <!-- Send Item 2 -->
                        <div class="flex items-center justify-between group">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-[#333333] flex items-center justify-center font-black text-[#CCFF00] border border-[#444444] group-hover:bg-[#CCFF00] group-hover:text-black transition-colors">V5</div>
                                <div>
                                    <div class="text-white font-bold uppercase text-sm">Granite Grip</div>
                                    <div class="text-[10px] text-on-surface-variant uppercase">Sent: Yesterday</div>
                                </div>
                            </div>
                            <span class="material-symbols-outlined text-[#CCFF00]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        </div>
                        <hr class="border-[#333333]">
                        <!-- Send Item 3 -->
                        <div class="flex items-center justify-between group">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-[#333333] flex items-center justify-center font-black text-[#CCFF00] border border-[#444444] group-hover:bg-[#CCFF00] group-hover:text-black transition-colors">V8</div>
                                <div>
                                    <div class="text-white font-bold uppercase text-sm">Void Walker</div>
                                    <div class="text-[10px] text-on-surface-variant uppercase">Flash: 3 days ago</div>
                                </div>
                            </div>
                            <span class="material-symbols-outlined text-[#fa5c1c]" style="font-variation-settings: 'FILL' 1;">bolt</span>
                        </div>
                    </div>
                    
                    <button class="mt-8 w-full border-2 border-[#CCFF00] text-[#CCFF00] py-3 font-bold uppercase tracking-widest hover:bg-[#CCFF00] hover:text-black transition-all">VIEW_FULL_LOG</button>
                </div>

                <!-- Specialized Component - The Grade Scale -->
                <div class="bg-[#131313] border-2 border-[#fa5c1c] p-6">
                    <div class="font-label-caps text-white mb-6 uppercase text-center">SESSION_GRADE_INTENSITY</div>
                    <div class="flex justify-between items-end h-32 gap-1">
                        <div class="bg-[#333333] w-full h-[20%]"></div>
                        <div class="bg-[#333333] w-full h-[35%]"></div>
                        <div class="bg-[#333333] w-full h-[50%]"></div>
                        <div class="bg-[#CCFF00] w-full h-[75%]"></div>
                        <div class="bg-[#fa5c1c] w-full h-[95%] relative">
                            <div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[#fa5c1c] font-black text-[10px]">PEAK</div>
                        </div>
                        <div class="bg-[#333333] w-full h-[40%]"></div>
                        <div class="bg-[#333333] w-full h-[25%]"></div>
                    </div>
                    <div class="flex justify-between text-[10px] font-bold text-on-surface-variant mt-2 uppercase">
                        <span>V0</span>
                        <span>V4</span>
                        <span>V8</span>
                        <span>V12</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- BottomNavBar (Mobile Only) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-stretch h-16 bg-black border-t-4 border-[#CCFF00]">
        <a href="#" class="flex flex-col items-center justify-center bg-[#CCFF00] text-black w-full h-full py-2">
            <span class="material-symbols-outlined">home</span>
            <span class="font-['Space_Grotesk'] text-[10px] font-black tracking-widest">HOME</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center text-white w-full h-full py-2 hover:bg-[#333333] active:scale-90">
            <span class="material-symbols-outlined">terrain</span>
            <span class="font-['Space_Grotesk'] text-[10px] font-black tracking-widest">ROUTES</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center text-white w-full h-full py-2 hover:bg-[#333333] active:scale-90">
            <span class="material-symbols-outlined">play_arrow</span>
            <span class="font-['Space_Grotesk'] text-[10px] font-black tracking-widest">BETA</span>
        </a>
    </nav>

</body>
</html></style></head><body></body></html>
