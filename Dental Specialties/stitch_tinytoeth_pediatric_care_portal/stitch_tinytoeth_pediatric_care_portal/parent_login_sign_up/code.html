<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TinyTeeth - Parent Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#4e4800",
                    "secondary-fixed": "#f3e56c",
                    "on-tertiary-fixed-variant": "#633f00",
                    "surface-dim": "#d6dade",
                    "on-secondary": "#ffffff",
                    "on-background": "#171c1f",
                    "surface": "#f6fafe",
                    "on-secondary-fixed": "#1f1c00",
                    "tertiary-fixed-dim": "#ffb954",
                    "surface-bright": "#f6fafe",
                    "on-tertiary-container": "#7d5000",
                    "surface-container": "#eaeef2",
                    "primary": "#2e6385",
                    "outline-variant": "#c1c7ce",
                    "primary-container": "#a5d8ff",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#f0e269",
                    "surface-container-highest": "#dfe3e7",
                    "inverse-primary": "#9accf3",
                    "tertiary-container": "#ffc87f",
                    "surface-variant": "#dfe3e7",
                    "primary-fixed-dim": "#9accf3",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#d6c953",
                    "on-tertiary": "#ffffff",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#6d6400",
                    "surface-container-high": "#e4e9ed",
                    "primary-fixed": "#c9e6ff",
                    "on-primary-fixed": "#001e2f",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#0c4b6c",
                    "inverse-on-surface": "#edf1f5",
                    "tertiary": "#835500",
                    "background": "#f6fafe",
                    "surface-tint": "#2e6385",
                    "surface-container-low": "#f0f4f8",
                    "error": "#ba1a1a",
                    "outline": "#71787e",
                    "on-tertiary-fixed": "#291800",
                    "on-primary-container": "#285f80",
                    "secondary": "#686000",
                    "on-surface": "#171c1f",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#ffddb4",
                    "on-surface-variant": "#41484d",
                    "inverse-surface": "#2c3134"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-desktop": "48px",
                    "gutter": "24px",
                    "section-gap": "80px",
                    "margin-mobile": "16px",
                    "unit": "8px",
                    "container-max": "1200px"
            },
            "fontFamily": {
                    "label-md": ["Plus Jakarta Sans"],
                    "headline-sm": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "headline-sm": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bubble-bg {
            background: radial-gradient(circle at 10% 20%, rgba(165, 216, 255, 0.2) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(240, 226, 105, 0.2) 0%, transparent 40%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-surface min-h-screen overflow-x-hidden bubble-bg">
<main class="min-h-screen flex items-stretch">
<!-- Brand Illustration Side -->
<section class="hidden lg:flex w-1/2 relative flex-col items-center justify-center p-20 overflow-hidden bg-primary-container/30">
<div class="absolute top-12 left-12">
<span class="text-2xl font-black text-sky-500 tracking-tighter font-headline-md">TinyTeeth</span>
</div>
<div class="relative z-10 w-full max-w-lg">
<!-- Mascot Illustration Container -->
<div class="aspect-square bg-white rounded-full shadow-[0_20px_50px_rgba(165,216,255,0.4)] flex items-center justify-center p-12 overflow-hidden border-8 border-white">
<img alt="TinyTeeth Mascot" class="w-full h-full object-contain" data-alt="A friendly, smiling cartoon tooth character with large, expressive eyes and a gentle blue cape, floating in a soft, dreamy sky filled with pastel bubbles. The character is waving a small sparkle wand that emits soft yellow light. The background features a serene gradient of sky blue and lemon yellow, maintaining a clean, minimalist, and playful light-mode aesthetic suitable for a pediatric dental clinic portal." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMnaD4pd-d2h8Mf9avq2X7XcJPfl3YaaAxyOZ6ys1-ui5om8sTeryFW3v8HaFAP7tw0Z3HzLxiRwUEgqu2UBb24eGTZhl3yL8RimPCUF9L0g-pwFZyTsa2NUcamJS3_AxhheTh2zu2JPcAoCqfRBuZ7hYLI4wSVSSZUmYCQYr5XMxdATp_4UKi87EuwBuk8QNT1BHyMXroeQVrzpyHEZBCO6BZC170bgAla7hvgiGI7WVL2ZsKTLJTR9KrGyikPQRBdNtckIUF9t_-"/>
</div>
<div class="mt-12 text-center">
<h2 class="font-headline-lg text-primary mb-4">Welcome Back, Explorer!</h2>
<p class="font-body-lg text-on-primary-container/80 max-w-sm mx-auto">
                        Your smile's favorite clubhouse is just a quick sign-in away. Let's make today bubble with joy!
                    </p>
</div>
</div>
<!-- Decorative Bubbles -->
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-secondary-container/40 rounded-full blur-3xl"></div>
<div class="absolute -top-20 -right-20 w-80 h-80 bg-primary-container/40 rounded-full blur-3xl"></div>
</section>
<!-- Auth Form Side -->
<section class="w-full lg:w-1/2 flex flex-col items-center justify-center p-6 md:p-12 lg:p-24 bg-white/40 backdrop-blur-sm">
<div class="w-full max-w-md">
<!-- Mobile Logo -->
<div class="lg:hidden flex justify-center mb-12">
<span class="text-3xl font-black text-sky-500 tracking-tighter">TinyTeeth</span>
</div>
<div class="mb-10">
<h1 class="font-headline-md text-on-background mb-2">Sign In</h1>
<p class="font-body-md text-outline">Manage your little one's dental journey with ease.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant px-2" for="email">Parent Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary-fixed-dim group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-14 pl-14 pr-6 bg-surface-container-lowest border-2 border-transparent focus:border-secondary-container focus:ring-0 rounded-full font-body-md transition-all shadow-sm" id="email" placeholder="hello@parent.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-2">
<label class="font-label-md text-on-surface-variant" for="password">Password</label>
<a class="text-primary font-label-md hover:underline decoration-2 underline-offset-4" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary-fixed-dim group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-14 pl-14 pr-6 bg-surface-container-lowest border-2 border-transparent focus:border-secondary-container focus:ring-0 rounded-full font-body-md transition-all shadow-sm" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-3 px-2">
<input class="w-6 h-6 rounded-lg border-primary-container text-primary focus:ring-primary/20 bg-surface-container" id="remember" type="checkbox"/>
<label class="font-label-md text-outline" for="remember">Keep me bubble-signed in</label>
</div>
<div class="pt-4 space-y-4">
<button class="w-full h-16 bg-secondary-container hover:bg-secondary-fixed text-on-secondary-container font-headline-sm rounded-full shadow-[0_8px_20px_rgba(240,226,105,0.4)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined" data-weight="fill">arrow_forward</span>
</button>
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-surface-container-highest"></div>
<span class="flex-shrink mx-4 text-outline font-label-md">or new here?</span>
<div class="flex-grow border-t border-surface-container-highest"></div>
</div>
<button class="w-full h-16 border-2 border-primary-container text-primary font-headline-sm rounded-full hover:bg-primary-container/10 active:scale-95 transition-all" type="button">
                            Sign Up
                        </button>
</div>
</form>
<footer class="mt-20 flex flex-col items-center gap-4">
<div class="flex gap-6">
<a class="text-outline font-label-md hover:text-primary transition-colors" href="#">Help</a>
<a class="text-outline font-label-md hover:text-primary transition-colors" href="#">Privacy</a>
<a class="text-outline font-label-md hover:text-primary transition-colors" href="#">Contact</a>
</div>
<p class="font-body-md text-outline/60 text-sm">© 2024 TinyTeeth. Bubbling with joy!</p>
</footer>
</div>
</section>
</main>
<!-- Floating Bubble Elements -->
<div class="fixed top-20 right-[45%] w-12 h-12 rounded-full bg-primary-container/20 blur-sm pointer-events-none"></div>
<div class="fixed bottom-40 left-[10%] w-24 h-24 rounded-full bg-secondary-container/10 blur-md pointer-events-none"></div>
<div class="fixed top-[60%] right-10 w-16 h-16 rounded-full bg-primary-container/15 blur-sm pointer-events-none"></div>
</body></html>
