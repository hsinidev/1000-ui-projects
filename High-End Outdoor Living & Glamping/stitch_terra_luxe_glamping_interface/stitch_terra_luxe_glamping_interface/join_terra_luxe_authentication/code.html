<body class="font-body-md text-on-background min-h-screen flex items-center justify-center">
<!-- Auth Container -->
<main class="w-full max-w-[1440px] h-screen md:h-[921px] bg-surface flex flex-col md:flex-row overflow-hidden md:rounded-xl md:shadow-2xl md:mx-10 relative">
<!-- Left Side: Visual Experience -->
<section class="hidden md:flex md:w-1/2 relative overflow-hidden group">
<img alt="Terra-Luxe Landscape" class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" data-alt="A breathtaking high-altitude landscape of jagged, misty mountains during the golden hour. The peaks are bathed in a soft, warm terracotta light while deep slate shadows fill the valleys. The atmosphere is serene and luxurious, evoking a sense of grounded tranquility and high-end outdoor adventure. Soft natural paper textures appear to float over the sharp details of the craggy rocks, consistent with a minimalist and sophisticated editorial travel aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBB4ocCYi7doMinCm0YgEOG4Bo5UFaLjTceylRKbx__QgLuovodCx3l5gG_aXHrD-lU1jTUKV9oO9wAbXUgzxNabySzmjyCxgM28_m6ztzUODjfAankR_CSFJXyWghv4NaiPion4YWHEAJAyxMIOBWNEnyDz6ljEcUFuRP09jtlDw8vcp413UfyTCiaX5dQ8YMgciEMiZ5ZA2vRKZnMXwQ8pfAbiTbqv2gx3NSYI_Ot-jmJig-DOorbNCKrlxcfkAElekEN0Mw4oI"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
<!-- Brand Overlay -->
<div class="absolute top-12 left-12">
<h1 class="font-headline-lg text-headline-lg text-white tracking-tight">Terra-Luxe</h1>
<p class="font-label-md text-label-md text-white/80 mt-2 uppercase tracking-widest">Rooted in Nature</p>
</div>
<!-- Contextual Quote -->
<div class="absolute bottom-12 left-12 right-12">
<p class="font-headline-md text-headline-md text-white italic max-w-md">
                    "The soul finds its breath where the horizon meets the earth."
                </p>
<div class="mt-6 flex items-center gap-4 text-white/90">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Discover the Wild</span>
</div>
</div>
</section>
<!-- Right Side: Authentication Form -->
<section class="flex-1 bg-surface-container-lowest flex flex-col justify-center items-center px-6 py-12 md:px-24 paper-texture">
<!-- Mobile Brand -->
<div class="md:hidden mb-12 text-center">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Terra-Luxe</h1>
</div>
<div class="w-full max-w-sm">
<!-- Toggle Header -->
<div class="flex justify-between items-end mb-12">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Join the Collective</h2>
<p class="font-body-md text-secondary mt-2">Begin your curated journey.</p>
</div>
</div>
<!-- Auth Form -->
<form class="space-y-8">
<!-- Name Input -->
<div class="relative group">
<label class="font-label-md text-label-md text-secondary group-focus-within:text-primary transition-colors" for="full-name">Full Name</label>
<input class="w-full bg-transparent border-b border-outline/30 py-3 focus:outline-none focus:border-primary transition-all font-body-md placeholder:text-secondary/30" id="full-name" placeholder="Elias Thorne" type="text"/>
</div>
<!-- Email Input -->
<div class="relative group">
<label class="font-label-md text-label-md text-secondary group-focus-within:text-primary transition-colors" for="email">Email Address</label>
<input class="w-full bg-transparent border-b border-outline/30 py-3 focus:outline-none focus:border-primary transition-all font-body-md placeholder:text-secondary/30" id="email" placeholder="elias@terraluxe.com" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<label class="font-label-md text-label-md text-secondary group-focus-within:text-primary transition-colors" for="password">Password</label>
<input class="w-full bg-transparent border-b border-outline/30 py-3 focus:outline-none focus:border-primary transition-all font-body-md placeholder:text-secondary/30" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary text-white py-5 px-8 rounded-full font-label-md text-label-md uppercase tracking-widest shadow-lg shadow-primary/20 hover:bg-primary-container transition-all active:scale-95 flex justify-between items-center group" type="submit">
<span>Create My Account</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Social/Alternate Login -->
<div class="mt-12 space-y-6">
<div class="relative flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline/10"></div>
</div>
<span class="relative px-4 bg-surface-container-lowest font-label-md text-label-md text-secondary/60">OR CONNECT VIA</span>
</div>
<div class="flex gap-4">
<button class="flex-1 flex justify-center items-center py-4 rounded-full border border-outline/20 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-secondary" data-icon="fingerprint">fingerprint</span>
</button>
<button class="flex-1 flex justify-center items-center py-4 rounded-full border border-outline/20 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-secondary" data-icon="key">key</span>
</button>
</div>
</div>
<!-- Sign In Toggle -->
<div class="mt-12 text-center">
<p class="font-body-md text-secondary">
                        Already a member? 
                        <a class="font-label-md text-primary hover:underline ml-1" href="#">Member Sign-In</a>
</p>
</div>
</div>
<!-- Security Footer -->
<div class="mt-auto pt-12 flex items-center gap-2 opacity-40">
<span class="material-symbols-outlined text-[16px]" data-icon="lock">lock</span>
<span class="text-[12px] font-label-md uppercase tracking-tighter">End-to-End Encrypted Concierge Access</span>
</div>
</section>
<!-- Close/Back Action (Suppresses Nav according to rule) -->
<a class="absolute top-8 right-8 text-on-surface hover:text-primary transition-colors p-2 md:bg-surface-container-low/50 md:rounded-full md:backdrop-blur-sm" href="#">
<span class="material-symbols-outlined" data-icon="close">close</span>
</a>
</main>

<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/3 bg-primary/5 blur-[120px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/4 bg-tertiary/5 blur-[100px] rounded-full"></div>
