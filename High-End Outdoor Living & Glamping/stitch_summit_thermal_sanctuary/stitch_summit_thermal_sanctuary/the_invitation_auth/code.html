<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom soft-glow focus state for inputs */
        .input-glow-focus:focus {
            outline: none;
            border-color: #f4bb92; /* secondary / Warm Wood */
            box-shadow: 0 4px 20px -5px rgba(244, 187, 146, 0.2);
        }
        .misty-overlay {
            background: linear-gradient(to right, rgba(19, 19, 19, 0.8) 0%, rgba(19, 19, 19, 0) 100%);
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#c4c7ca",
                    "secondary": "#f4bb92",
                    "on-tertiary": "#2d3134",
                    "on-secondary-container": "#e1aa82",
                    "tertiary-container": "#000000",
                    "on-tertiary-fixed": "#191c1f",
                    "on-error": "#690005",
                    "on-surface-variant": "#cfc4c5",
                    "surface-container-lowest": "#0e0e0e",
                    "on-surface": "#e5e2e1",
                    "error-container": "#93000a",
                    "surface-container-low": "#1c1b1b",
                    "on-primary-fixed": "#1b1b1b",
                    "inverse-on-surface": "#313030",
                    "background": "#131313",
                    "surface-tint": "#c6c6c6",
                    "surface-container-highest": "#353535",
                    "primary-fixed": "#e2e2e2",
                    "on-primary-container": "#757575",
                    "on-tertiary-container": "#737579",
                    "on-tertiary-fixed-variant": "#44474a",
                    "on-primary-fixed-variant": "#474747",
                    "tertiary-fixed": "#e0e2e6",
                    "on-primary": "#303030",
                    "secondary-container": "#653d1e",
                    "surface": "#131313",
                    "surface-bright": "#393939",
                    "on-background": "#e5e2e1",
                    "on-secondary-fixed": "#301400",
                    "secondary-fixed-dim": "#f4bb92",
                    "surface-variant": "#353535",
                    "outline-variant": "#4c4546",
                    "primary": "#c6c6c6",
                    "inverse-primary": "#5e5e5e",
                    "surface-container-high": "#2a2a2a",
                    "error": "#ffb4ab",
                    "surface-dim": "#131313",
                    "primary-fixed-dim": "#c6c6c6",
                    "on-secondary": "#4a280a",
                    "primary-container": "#000000",
                    "tertiary": "#c4c7ca",
                    "outline": "#988e90",
                    "surface-container": "#20201f",
                    "on-secondary-fixed-variant": "#653d1e",
                    "inverse-surface": "#e5e2e1",
                    "secondary-fixed": "#ffdcc5",
                    "on-error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-edge": "64px",
                    "gutter": "32px",
                    "section-gap": "160px",
                    "container-max": "1280px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "h2": ["Playfair Display"],
                    "h1": ["Playfair Display"],
                    "body-lg": ["Inter"],
                    "h3": ["Playfair Display"],
                    "label-caps": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "h2": ["3rem", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                    "h1": ["4.5rem", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                    "body-lg": ["1.125rem", {"lineHeight": "1.7", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "h3": ["2rem", {"lineHeight": "1.3", "fontWeight": "400"}],
                    "label-caps": ["0.75rem", {"lineHeight": "1.4", "letterSpacing": "0.2em", "fontWeight": "600"}],
                    "body-md": ["1rem", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
</head>
<body class="bg-background text-on-surface selection:bg-secondary selection:text-on-secondary overflow-hidden">
<!-- Split Screen Layout -->
<main class="flex min-h-screen w-full">
<!-- Left Side: Cinematic Background (Simulated Video) -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A cinematic, high-altitude mountain landscape at dawn, where sharp granite peaks emerge from a dense, ethereal sea of mist and low-hanging clouds. The lighting is soft and diffused, casting a serene blue and silver hue across the landscape, perfectly capturing the quiet luxury of the Summit Sauna brand. The composition is expansive and minimalist, emphasizing the 'Ma' or negative space of the atmosphere, with a palette of deep blacks, cool Steam Greys, and a faint hint of warm sunrise light touching the highest ridges." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAchOItK3aq8J_jU_5G9wmBST731Z_BAwe0P6Oldkp0J5gB_A7zhxcioiPEQV4ZpSgwkqurZAMy4sMuq0RUJMEgV7VI3HkbAWLmwzcEumTQOasg2g39euSVrHJrwY-OymYhei3a2Q2xlxwk4TChmjTZJBkjgkLo6kDdefmBNP1BDfBQB1Li7A5mQq4mCNW1kVw5sNp7PDbnqpKEh1AP4RLtMn6Tfu4zPz8uJa_C6_B_hlXTGY-9ct14GBQJZlTsUg3AMsLOw0H-DhtI"/>
</div>
<!-- Misty Gradient Overlay for Text Readability & Brand Feel -->
<div class="absolute inset-0 z-10 bg-gradient-to-t from-background/80 via-transparent to-transparent"></div>
<div class="relative z-20 flex flex-col justify-between p-margin-edge w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary text-h3" data-icon="spa">spa</span>
<span class="font-label-caps text-label-caps tracking-[0.3em] text-on-surface">SUMMIT SAUNA</span>
</div>
<div class="max-w-md">
<p class="font-label-caps text-label-caps text-secondary mb-4">ESTABLISHED IN STILLNESS</p>
<h2 class="font-h2 text-h2 text-on-surface leading-tight">The altitude of your wellbeing starts here.</h2>
</div>
</div>
</section>
<!-- Right Side: Minimal Form -->
<section class="w-full lg:w-1/2 flex flex-col items-center justify-center p-6 md:p-margin-edge bg-surface relative">
<div class="w-full max-w-[420px] space-y-12">
<!-- Branding for Mobile -->
<div class="lg:hidden flex justify-center mb-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary" data-icon="spa">spa</span>
<span class="font-label-caps text-label-caps tracking-[0.3em] text-on-surface">SUMMIT SAUNA</span>
</div>
</div>
<!-- Header Section -->
<header class="space-y-4">
<h1 class="font-h1 text-h3 md:text-h1 text-on-surface tracking-tight">Joining the Summit</h1>
<p class="font-body-lg text-body-lg text-tertiary opacity-80">Securing Stillness</p>
</header>
<!-- Form Section -->
<form class="space-y-10">
<div class="space-y-8">
<!-- Email Input -->
<div class="relative group">
<input class="peer block w-full bg-transparent border-0 border-b border-outline-variant py-4 px-0 text-on-surface placeholder-transparent transition-all duration-300 input-glow-focus font-body-md" id="email" name="email" placeholder=" " type="email"/>
<label class="absolute left-0 top-4 -translate-y-6 scale-75 cursor-text font-label-caps text-label-caps text-tertiary transition-all duration-300 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-6 peer-focus:scale-75 peer-focus:text-secondary" for="email">
                                MEMBER EMAIL
                            </label>
</div>
<!-- Password Input -->
<div class="relative group">
<input class="peer block w-full bg-transparent border-0 border-b border-outline-variant py-4 px-0 text-on-surface placeholder-transparent transition-all duration-300 input-glow-focus font-body-md" id="password" name="password" placeholder=" " type="password"/>
<label class="absolute left-0 top-4 -translate-y-6 scale-75 cursor-text font-label-caps text-label-caps text-tertiary transition-all duration-300 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-6 peer-focus:scale-75 peer-focus:text-secondary" for="password">
                                SECRET KEY
                            </label>
<button class="absolute right-0 top-4 text-tertiary hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-4 space-y-6">
<button class="w-full bg-secondary text-on-secondary font-label-caps text-label-caps py-6 rounded-none hover:opacity-90 transition-all duration-500 flex items-center justify-center gap-3" type="submit">
                            ASCEND TO CABINET
                            <span class="material-symbols-outlined text-[16px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center justify-between">
<button class="font-label-caps text-[10px] tracking-widest text-tertiary hover:text-secondary transition-colors uppercase" type="button">
                                Recover Access
                            </button>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<button class="font-label-caps text-[10px] tracking-widest text-tertiary hover:text-secondary transition-colors uppercase" type="button">
                                Apply for Membership
                            </button>
</div>
</div>
</form>
<!-- Footer/Legal -->
<footer class="pt-12 text-center">
<p class="font-body-md text-[12px] text-tertiary-fixed-dim/40 leading-relaxed">
                        By entering the Summit, you acknowledge our commitment to digital silence and physical restoration.
                    </p>
</footer>
</div>
<!-- Background Decorative Element (Atmospheric Depth) -->
<div class="absolute -bottom-20 -right-20 w-96 h-96 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -top-20 -left-20 w-64 h-64 bg-tertiary/5 rounded-full blur-[80px] pointer-events-none"></div>
</section>
</main>
</body></html>
