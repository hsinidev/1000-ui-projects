        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);

        }

</div>
<h1 class="text-xl font-bold text-emerald-600 dark:text-emerald-300 uppercase tracking-widest font-headline-md">BioLiving</h1>
<button class="hover:scale-105 transition-transform duration-500 text-zinc-400">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>

<main class="pt-24 pb-32 min-h-screen px-margin-page bg-gradient-to-b from-surface-container-lowest via-surface to-surface-container-low overflow-hidden">
<!-- Breathing Central Display -->
<section class="relative flex flex-col items-center justify-center min-h-[442px] section-gap">
<!-- Background Biomorphic Glow -->
<div class="absolute inset-0 flex items-center justify-center -z-10">
<div class="w-80 h-80 bg-primary-container/20 rounded-full blur-[80px] animate-breathing"></div>
</div>
<!-- Central Breathing Sensor -->
<div class="biomorphic-blob w-72 h-80 bg-white/40 border border-white/60 shadow-[0_40px_80px_rgba(152,255,152,0.12)] flex flex-col items-center justify-center animate-breathing relative overflow-hidden group transition-all duration-700">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/10 to-transparent opacity-50"></div>
<span class="material-symbols-outlined text-primary text-5xl mb-4 font-variation-fill" style="font-variation-settings: 'FILL' 1;">air</span>
<div class="text-center z-10">
<span class="text-display-lg font-display-lg text-on-surface block">98</span>
<span class="text-label-sm font-label-sm text-on-secondary-container uppercase tracking-[0.2em]">Purity Score</span>
</div>
<!-- Floating Micro Metrics -->
<div class="absolute top-8 right-8 flex flex-col items-end">
<span class="text-primary font-bold text-body-lg">82%</span>
<span class="text-[10px] uppercase font-bold tracking-tighter text-outline opacity-70">Optimal</span>
</div>

<span class="text-headline-md font-headline-md text-on-surface">12</span>
<div class="h-1 w-8 bg-primary rounded-full"></div>
</div>
<div class="glass-card p-cell-padding rounded-lg shadow-[0_20px_40px_rgba(0,0,0,0.02)] border border-white/40 flex flex-col items-center gap-2">
<span class="text-label-sm font-label-sm text-on-secondary-container">CO2</span>
<span class="text-headline-md font-headline-md text-on-surface">412</span>
<div class="h-1 w-8 bg-primary-container rounded-full"></div>
</div>
<div class="glass-card p-cell-padding rounded-lg shadow-[0_20px_40px_rgba(0,0,0,0.02)] border border-white/40 flex flex-col items-center gap-2">
<span class="text-label-sm font-label-sm text-on-secondary-container">Humid</span>
<span class="text-headline-md font-headline-md text-on-surface">48%</span>
<div class="h-1 w-8 bg-primary-fixed-dim rounded-full"></div>
</div>
</div>
</section>
<!-- Mode Toggles -->
<section class="section-gap max-w-md mx-auto">
<h3 class="text-label-sm font-label-sm text-outline uppercase tracking-widest mb-4 ml-2">Health Modes</h3>
<div class="space-y-4">
<!-- Air Purify Toggle -->
<div class="flex items-center justify-between p-6 bg-white/50 border border-white rounded-xl shadow-[0_15px_30px_rgba(0,0,0,0.03)] group hover:scale-[1.02] transition-all duration-300">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined">filter_alt</span>
</div>
<div>
<p class="font-headline-md text-lg text-on-surface">Air Purify</p>
<p class="text-label-sm text-on-secondary-container">HEPA-9 Filtration</p>

</div>
<button class="w-14 h-8 bg-primary rounded-full relative p-1 flex items-center justify-end">
<div class="w-6 h-6 bg-white rounded-full shadow-lg"></div>
</button>
</div>

<div class="flex items-center justify-between p-6 bg-white/50 border border-white rounded-xl shadow-[0_15px_30px_rgba(0,0,0,0.03)] group hover:scale-[1.02] transition-all duration-300">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined">bolt</span>
</div>
<div>
<p class="font-headline-md text-lg text-on-surface">Ionize</p>
<p class="text-label-sm text-on-secondary-container">Negative Ion Flux</p>
</div>
</div>
<button class="w-14 h-8 bg-surface-container-highest rounded-full relative p-1 flex items-center">
<div class="w-6 h-6 bg-white rounded-full shadow-md"></div>
</button>
</div>
</div>

<div class="absolute inset-0 bg-gradient-to-t from-zinc-950/60 to-transparent flex flex-col justify-end p-6">
<span class="text-white font-headline-md text-xl">Forest Simulation Active</span>
<span class="text-white/80 text-label-sm uppercase">Optimized for Deep Sleep</span>
</div>
</div>

<nav class="fixed bottom-0 left-0 w-full h-24 flex justify-around items-center px-8 pb-4 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-2xl rounded-t-[40px] z-50 shadow-[0_-15px_40px_rgba(152,255,152,0.08)] border-t border-emerald-50 dark:border-zinc-800">
<!-- Air (Active) -->
<a class="flex flex-col items-center justify-center bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-300 rounded-[24px] px-5 py-2 animate-pulse scale-110 duration-700 ease-in-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">air</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-tighter">Air</span>
</a>
