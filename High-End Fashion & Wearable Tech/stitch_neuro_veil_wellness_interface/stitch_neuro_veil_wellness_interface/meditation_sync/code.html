<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error-container": "#93000a",
                    "secondary-fixed": "#dfe3e7",
                    "inverse-surface": "#313036",
                    "on-secondary-fixed-variant": "#43474b",
                    "surface-container": "#f0ecf5",
                    "outline": "#787583",
                    "tertiary": "#586062",
                    "primary-container": "#a29bfe",
                    "on-secondary": "#ffffff",
                    "primary-fixed-dim": "#c5c0ff",
                    "surface-dim": "#dcd8e1",
                    "error": "#ba1a1a",
                    "surface-container-high": "#ebe6ef",
                    "inverse-primary": "#c5c0ff",
                    "primary": "#5952af",
                    "outline-variant": "#c8c4d3",
                    "surface-variant": "#e5e1ea",
                    "secondary-fixed-dim": "#c3c7cb",
                    "on-secondary-fixed": "#171c1f",
                    "on-background": "#1c1b21",
                    "surface-bright": "#fcf8ff",
                    "surface": "#fcf8ff",
                    "secondary-container": "#dce0e4",
                    "on-primary": "#ffffff",
                    "tertiary-fixed": "#dde4e6",
                    "on-primary-fixed-variant": "#413996",
                    "on-tertiary-fixed-variant": "#41484a",
                    "on-tertiary-container": "#363d3f",
                    "on-primary-container": "#362d8a",
                    "primary-fixed": "#e3dfff",
                    "surface-container-highest": "#e5e1ea",
                    "surface-tint": "#5952af",
                    "background": "#fcf8ff",
                    "inverse-on-surface": "#f3eff8",
                    "on-primary-fixed": "#140067",
                    "surface-container-low": "#f6f2fb",
                    "surface-container-lowest": "#ffffff",
                    "on-surface": "#1c1b21",
                    "error-container": "#ffdad6",
                    "on-surface-variant": "#474552",
                    "on-error": "#ffffff",
                    "tertiary-container": "#a1a8aa",
                    "on-tertiary-fixed": "#161d1f",
                    "on-secondary-container": "#5e6367",
                    "secondary": "#5a5f62",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#c1c8ca"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "12px",
                    "unit": "8px",
                    "xs": "4px",
                    "lg": "48px",
                    "xl": "80px",
                    "gutter": "24px",
                    "md": "24px",
                    "margin": "32px"
            },
            "fontFamily": {
                    "display-xl": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "headline-lg": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "body-md": ["Manrope"]
            },
            "fontSize": {
                    "display-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.02em", "fontWeight": "400"}],
                    "label-sm": ["13px", {"lineHeight": "1.0", "letterSpacing": "0.08em", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0.02em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        @keyframes breathe {
            0%, 100% { transform: scale(0.95); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.9; }
        }
        @keyframes pulse-soft {
            0%, 100% { box-shadow: 0 0 40px rgba(162, 155, 254, 0.2); }
            50% { box-shadow: 0 0 80px rgba(162, 155, 254, 0.5); }
        }
        .animate-breathe {
            animation: breathe 8s ease-in-out infinite;
        }
        .animate-pulse-glow {
            animation: pulse-soft 8s ease-in-out infinite;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(162, 155, 254, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container min-h-screen overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-xl border-b border-primary/10 flex items-center justify-between px-margin py-sm">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-primary-container/20 overflow-hidden border border-primary/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A serene close-up portrait of a woman with a peaceful expression, illuminated by soft morning sunlight that filters through a sheer curtain. The color palette is composed of ethereal whites and soft lavender hues, creating a calming medical-wellness aesthetic. The photography is high-key and minimalist, emphasizing clean skin textures and a tranquil atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCpz3xAYztKnCmy6_Mflh2wvvWnpRLs-kIcjRuP9bSHG5O3t4iBOUwj9RjaeqD6d6XVhxVWYtipv3bgBzadEeodxoTQORcGa_I00_E2ndGOJ95lX8O6JRi6JpEQ0AW0Gpk7WKth1f7nBY4-bKR7iTiTMS7RQXt5wsfNsiMP1QvdHGC1Vl3JoP5pf14VgTKU4xUOzgFSO1GAZ9_xoDURZ53x8LgW3MnFeXnbtiz5zn0rr-jYUL42V7Mxg0CtMPBMaGs2XRyWNS6HA7E"/>
</div>
<h1 class="font-display-xl text-display-xl text-primary tracking-tight text-xl md:text-display-xl">Neuro-Veil</h1>
</div>
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity">notifications_active</button>
</div>
</header>
<main class="pt-32 pb-40 px-margin flex flex-col items-center justify-center min-h-screen">
<!-- Guided-Calm Section -->
<section class="w-full max-w-4xl flex flex-col items-center">
<!-- Scarf Sync Status -->
<div class="glass-panel px-md py-xs rounded-full flex items-center gap-xs mb-xl animate-pulse">
<span class="w-2 h-2 rounded-full bg-primary animate-ping"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Sync with Scarf: Active</span>
</div>
<!-- Breathing Circle (Central Hub) -->
<div class="relative flex items-center justify-center mb-xl">
<!-- Outer Ring -->
<div class="absolute w-[320px] h-[320px] md:w-[480px] md:h-[480px] rounded-full border border-primary/10 animate-breathe"></div>
<!-- Inner Glow -->
<div class="absolute w-[260px] h-[260px] md:w-[400px] md:h-[400px] rounded-full bg-primary-container/10 blur-3xl animate-pulse-glow"></div>
<!-- Main Breathing Sphere -->
<div class="relative w-[220px] h-[220px] md:w-[340px] md:h-[340px] rounded-full glass-panel flex flex-col items-center justify-center text-center p-xl animate-breathe">
<span class="font-label-sm text-label-sm text-primary mb-xs">INHALING</span>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Guided-Calm</h2>
<p class="font-body-md text-body-md text-on-surface-variant/70 mt-xs">Syncing with biological tempo</p>
</div>
</div>
<!-- Audio Player Controls -->
<div class="w-full max-w-md glass-panel rounded-xl p-md flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-end">
<div>
<p class="font-label-sm text-label-sm text-primary">CURRENT SOUNDSCAPE</p>
<h3 class="font-headline-md text-headline-md">Misty Lavender Fields</h3>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">2:45 / 10:00</span>
</div>
<!-- Progress Bar -->
<div class="w-full h-1 bg-surface-container rounded-full overflow-hidden">
<div class="w-1/3 h-full bg-primary rounded-full"></div>
</div>
</div>
<div class="flex items-center justify-center gap-xl">
<button class="material-symbols-outlined text-secondary-fixed-dim text-3xl hover:text-primary transition-colors">skip_previous</button>
<button class="w-16 h-16 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-lg hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-4xl" data-weight="fill">pause</span>
</button>
<button class="material-symbols-outlined text-secondary-fixed-dim text-3xl hover:text-primary transition-colors">skip_next</button>
</div>
</div>
<!-- Contextual Insight Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md w-full mt-xl">
<div class="glass-panel p-md rounded-xl flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">monitor_heart</span>
</div>
<div>
<h4 class="font-label-sm text-label-sm text-on-surface-variant">HEART RATE</h4>
<p class="font-headline-md text-headline-md text-primary">64 BPM</p>
</div>
</div>
<div class="glass-panel p-md rounded-xl flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">air</span>
</div>
<div>
<h4 class="font-label-sm text-label-sm text-on-surface-variant">RESPIRATION</h4>
<p class="font-headline-md text-headline-md text-primary">12 BPM</p>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface/60 dark:bg-inverse-surface/60 backdrop-blur-2xl shadow-xl flex justify-around items-center px-gutter pb-8 pt-4">
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-colors">
<span class="material-symbols-outlined">science</span>
<span class="font-label-sm text-label-sm mt-1">Science</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-colors">
<span class="material-symbols-outlined">analytics</span>
<span class="font-label-sm text-label-sm mt-1">History</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container/40 text-on-primary-container rounded-full px-lg py-xs transition-all duration-500 ease-in-out scale-105">
<span class="material-symbols-outlined" data-weight="fill">self_improvement</span>
<span class="font-label-sm text-label-sm mt-1">Meditation</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-colors">
<span class="material-symbols-outlined">shopping_bag</span>
<span class="font-label-sm text-label-sm mt-1">Shop</span>
</button>
</nav>
<!-- Background Decoration -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
</body></html>
