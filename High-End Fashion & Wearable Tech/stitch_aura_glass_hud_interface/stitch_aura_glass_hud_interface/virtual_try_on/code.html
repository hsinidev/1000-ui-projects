<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scan-line {
            background: linear-gradient(to bottom, transparent, #00dbe7, transparent);
            height: 2px;
            width: 100%;
            position: absolute;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(11, 17, 46, 0.4);
        }
        .hud-bracket {
            border: 1px solid rgba(0, 219, 231, 0.3);
            position: relative;
        }
        .hud-bracket::before, .hud-bracket::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: #00dbe7;
            border-style: solid;
        }
        .bracket-tl::before { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
        .bracket-tr::after { top: -2px; right: -2px; border-width: 2px 2px 0 0; }
        .bracket-bl::before { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; }
        .bracket-br::after { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }
