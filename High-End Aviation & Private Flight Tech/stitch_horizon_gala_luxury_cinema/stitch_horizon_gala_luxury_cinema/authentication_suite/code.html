<!-- Email Field -->
<div class="group">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-2 uppercase" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 font-body-lg text-body-lg text-on-surface focus:ring-0 focus:border-secondary transition-all gold-glow placeholder:text-outline-variant" id="email" placeholder="alexander.vane@executive.com" type="email"/>
<span class="material-symbols-outlined absolute right-0 top-3 text-outline-variant group-focus-within:text-secondary transition-colors">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-2 uppercase" for="password">Password</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 font-body-lg text-body-lg text-on-surface focus:ring-0 focus:border-secondary transition-all gold-glow placeholder:text-outline-variant" id="password" placeholder="••••••••••••" type="password"/>

</div>
</div>

<div class="group">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-2 uppercase" for="passenger-id">Passenger ID</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 font-body-lg text-body-lg text-on-surface focus:ring-0 focus:border-secondary transition-all gold-glow placeholder:text-outline-variant" id="passenger-id" placeholder="HG-992-KLU" type="text"/>
<span class="material-symbols-outlined absolute right-0 top-3 text-outline-variant group-focus-within:text-secondary transition-colors">verified_user</span>
</div>
</div>
<div class="flex items-center justify-between pt-2">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-secondary transition-colors duration-300" href="#">FORGOT PASSWORD?</a>
