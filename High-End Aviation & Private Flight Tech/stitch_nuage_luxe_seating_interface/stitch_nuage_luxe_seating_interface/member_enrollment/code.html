<style>
        .neumorphic-card {
            background: #fcf8f8;
            box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff;
        }
        .neumorphic-inset {
            background: #fcf8f8;
            box-shadow: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
        }
        .neumorphic-button {
            background: #fcf8f8;
            box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            transition: all 0.3s ease;
        }
        .neumorphic-button:active {
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            transform: scale(0.98);
        }
        .neumorphic-tab-active {
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }
        .glass-background {
            background: rgba(252, 248, 248, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex items-center justify-center overflow-hidden relative">
<!-- Background Image with Blur -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover blur-md scale-105" data-alt="A serene and luxurious private jet first-class cabin with plush cream leather seats and soft ambient lighting. The atmosphere is quiet and exclusive, featuring refined wooden accents and expansive windows showing a soft sunset above the clouds. The visual style is high-fashion and minimalist, emphasizing biological calm and understated luxury through a palette of soft whites and warm greys." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCdg70i26rWEvEWFzLAgPzLcOGHJqzTNuZA6xSN_zw3dbuHp01SAANWNnCv9apzs_35KWuBjd4bDVPrnRKIKLClLKFsscbwDo7cBuDwcwQ0sXYFpqTj8OIGMMNI685rCm3TO2GeC4Fb3dCWxTuV_NgaStSDlpZCsh02bCUw_fp71MoWZd73MiLppv8-xc63P-qP8M_oKUVokmoc6Ey26xuZcke9VyEJsTgprf7wGFUeZ4AVu4DkCToAqgo2hJFwys71T7dL9b7TqrY"/>
<div class="absolute inset-0 bg-surface/40"></div>
</div>
<!-- Main Branding Header (Floating) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-center items-center h-24">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Nuage-Luxe</h1>
</header>
<!-- Enrollment Card -->
<main class="relative z-10 w-full max-w-[480px] px-container-padding-mobile md:px-0">
<div class="neumorphic-card rounded-3xl p-gutter md:p-12 border border-white/20">
<!-- Tabs -->
<div class="flex p-2 neumorphic-inset rounded-2xl mb-10">
<button class="flex-1 py-3 px-4 rounded-xl font-label-caps text-label-caps text-primary neumorphic-tab-active">
                    Join the Fleet
                </button>
<button class="flex-1 py-3 px-4 rounded-xl font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors">
                    Member Access
                </button>
</div>
<!-- Form Content -->
<div class="space-y-8">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-3 px-2">Full Legal Name</label>
<div class="neumorphic-inset rounded-2xl overflow-hidden">
<input class="w-full bg-transparent border-none py-4 px-6 focus:ring-0 text-primary font-body-lg placeholder:text-outline-variant" placeholder="ALEXANDER VANCE" type="text"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-3 px-2">Membership ID</label>
<div class="neumorphic-inset rounded-2xl overflow-hidden flex items-center pr-4">
<input class="w-full bg-transparent border-none py-4 px-6 focus:ring-0 text-primary font-data-point placeholder:text-outline-variant" placeholder="NL-8829-QX" type="text"/>
<span class="material-symbols-outlined text-outline" data-icon="fingerprint">fingerprint</span>
</div>
</div>
<!-- Biometric Consent Toggle -->
<div class="flex items-center justify-between px-2 pt-2">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-primary">Biometric Consent</span>
<span class="text-[10px] text-on-surface-variant mt-1">Enable secure pulse-sync login</span>
</div>
<button class="w-12 h-6 neumorphic-inset rounded-full relative p-1 flex items-center transition-all duration-300">
<div class="absolute left-1 w-4 h-4 bg-secondary rounded-full shadow-[0_0_8px_rgba(115,92,0,0.4)]"></div>
</button>
</div>
<!-- Call to Action -->
<div class="pt-4">
<button class="w-full py-5 rounded-2xl font-label-caps text-label-caps tracking-[0.2em] neumorphic-button text-secondary flex items-center justify-center group">
<span>Initialize Experience</span>
<span class="material-symbols-outlined ml-3 text-[18px] group-hover:translate-x-1 transition-transform" data-icon="east">east</span>
</button>
</div>
</div>
<!-- Security Footer -->
<div class="mt-12 flex items-center justify-center gap-4 opacity-40">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-outline to-transparent"></div>
<span class="material-symbols-outlined text-[16px]" data-icon="shield_with_heart">shield_with_heart</span>
<div class="h-[1px] flex-1 bg-gradient-to-r from-outline via-outline to-transparent"></div>
</div>
<p class="text-center font-label-caps text-[10px] text-on-surface-variant mt-4 uppercase tracking-widest">Encrypted Aerospace Protocol v.4.0</p>
</div>
</main>
<!-- Aesthetic Decorative Element -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 text-center opacity-30 pointer-events-none">
<span class="font-label-caps text-[12px] tracking-[0.5em] text-on-surface uppercase">biological calm ⋅ technological mastery</span>
</div>
</body></html>
