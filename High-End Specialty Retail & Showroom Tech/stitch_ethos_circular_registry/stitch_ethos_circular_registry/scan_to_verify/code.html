.scanner-frame {

    width: 280px;
    height: 280px
    }
.scanner-corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border-color: #B87333;
    /* Copper */
    border-width: 2px
    }
.top-left {
    top: 0;
    left: 0;
    border-right: 0;
    border-bottom: 0
    }
.top-right {
    top: 0;
    right: 0;
    border-left: 0;
    border-bottom: 0
    }
.bottom-left {
    bottom: 0;
    left: 0;
    border-right: 0;
    border-top: 0
    }
.bottom-right {
    bottom: 0;
    right: 0;
    border-left: 0;
    border-top: 0
    }
.scan-line {
    position: absolute;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #B87333, transparent);
    top: 0;
    animation: scan 3s linear infinite
    }
@keyframes scan {
    0% {
        top: 0;
        } 50% {
        top: 100%;
        } 100% {
        top: 0;
        }

<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-background dark:bg-background border-b border-secondary/20 dark:border-secondary-fixed/20 paper-texture">
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-primary">menu</span>
</button>
<h1 class="font-display-lg-mobile text-display-lg-mobile tracking-widest text-primary dark:text-primary-fixed-dim">ETHOS</h1>
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-primary">verified</span>
</button>
</header>
<!-- Main Content: Camera Viewport -->
<main class="flex-grow flex flex-col items-center justify-center relative pt-16 pb-20">
<!-- Background "Camera" Layer -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover grayscale-[0.2] contrast-[0.9]" data-alt="A high-end, shallow depth-of-field photograph of a luxury product's packaging with a subtle QR code in focus. The scene is lit with soft, warm morning sunlight creating gentle shadows. The color palette is composed of soft creams, sage greens, and metallic copper accents. The aesthetic is clean, professional, and minimalist, emphasizing tactile quality and authenticity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD9LCRl6tBfvTYmG6eDKhvcrtAWpkUSPFjXUQ6W22DRgv743WgDjUC5sv_v8R-mUth73zrIchs2B6_O8VG8DpKWNt-j8xeeFlY17wsGk6-jpzodMwB0qOeEa7a51OdvZ71ABbPfg7wiwU_YWW8cvkR_Gstjvwq0Hn_jhoUkETnDerX-nGaelxmzdy-r0VsX2O5G_c5Gj5aAprM1S2ddHNfNUiBgfpIggGQ9EolhWnltM81cXF-_fkS4_zrDRs8hkG2c2a4VgNbl6kc"/>
<div class="absolute inset-0 bg-primary/20 backdrop-blur-[2px]"></div>
</div>
<!-- Scanner Overlay -->
<div class="relative z-10 flex flex-col items-center gap-12">
<!-- Instructions -->
<div class="text-center space-y-2 bg-surface/80 backdrop-blur-md py-4 px-8 border border-secondary/20 paper-texture shadow-lg">
<span class="font-label-caps text-label-caps text-secondary block">AUTHENTICITY CHECK</span>
<h2 class="font-title-sm text-title-sm text-primary">Scanning...</h2>
</div>
<!-- Minimalist Copper Frame -->
<div class="scanner-frame">
<div class="scanner-corner top-left"></div>
<div class="scanner-corner top-right"></div>
<div class="scanner-corner bottom-left"></div>
<div class="scanner-corner bottom-right"></div>
<div class="scan-line"></div>
<!-- Subtle UI indicators within frame -->
<div class="absolute inset-0 flex items-center justify-center opacity-30">
<span class="material-symbols-outlined text-white text-6xl">filter_center_focus</span>
</div>
</div>
<!-- Camera Controls -->
<div class="flex gap-gutter">
<button class="w-14 h-14 rounded-full flex items-center justify-center bg-surface/90 border border-secondary/30 paper-texture shadow-lg hover:opacity-80 transition-opacity active:scale-90">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">flashlight_on</span>
</button>
<button class="w-14 h-14 rounded-full flex items-center justify-center bg-surface/90 border border-secondary/30 paper-texture shadow-lg hover:opacity-80 transition-opacity active:scale-90">
<span class="material-symbols-outlined text-secondary">zoom_in</span>
</button>
</div>
</div>
<!-- Feedback Card (Floating) -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-sm bg-surface/95 backdrop-blur-md p-6 border border-secondary/20 shadow-xl paper-texture z-20">
<div class="flex items-start gap-4">
<div class="bg-primary-container p-2">
<span class="material-symbols-outlined text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">info</span>
</div>
<div class="flex-grow">
<p class="font-label-caps text-label-caps text-secondary mb-1">PRO-TIP</p>
<p class="font-body-md text-on-surface leading-tight">Align the copper markers with the QR code on your Ethos certificate.</p>
</div>
</div>
</div>
</main>
