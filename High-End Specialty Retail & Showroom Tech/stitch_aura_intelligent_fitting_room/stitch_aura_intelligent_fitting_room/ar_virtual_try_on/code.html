<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "outline-variant": "#cec5ba",
                  "on-secondary": "#ffffff",
                  "surface-container": "#f0eded",
                  "secondary-fixed": "#d4e4f6",
                  "surface-dim": "#dcd9d9",
                  "tertiary": "#5d5e64",
                  "surface-container-highest": "#e5e2e1",
                  "on-primary-container": "#726753",
                  "on-tertiary-fixed": "#191c20",
                  "primary-fixed-dim": "#d3c5ad",
                  "on-error-container": "#93000a",
                  "on-tertiary-fixed-variant": "#45474c",
                  "primary-fixed": "#f0e0c8",
                  "inverse-on-surface": "#f3f0ef",
                  "on-primary-fixed": "#221b0b",
                  "surface": "#fcf9f8",
                  "surface-container-high": "#eae7e7",
                  "surface-variant": "#e5e2e1",
                  "inverse-primary": "#d3c5ad",
                  "on-background": "#1c1b1b",
                  "error": "#ba1a1a",
                  "outline": "#7d766c",
                  "secondary": "#50606f",
                  "secondary-container": "#d1e1f4",
                  "surface-container-lowest": "#ffffff",
                  "surface-tint": "#685d4a",
                  "surface-container-low": "#f6f3f2",
                  "inverse-surface": "#313030",
                  "on-surface": "#1c1b1b",
                  "tertiary-fixed-dim": "#c5c6cd",
                  "primary": "#685d4a",
                  "on-tertiary": "#ffffff",
                  "on-primary-fixed-variant": "#4f4533",
                  "on-secondary-container": "#556474",
                  "on-error": "#ffffff",
                  "on-primary": "#ffffff",
                  "on-surface-variant": "#4b463d",
                  "surface-bright": "#fcf9f8",
                  "tertiary-fixed": "#e2e2e9",
                  "secondary-fixed-dim": "#b8c8da",
                  "background": "#fcf9f8",
                  "primary-container": "#f7e7ce",
                  "error-container": "#ffdad6",
                  "tertiary-container": "#e8e8ef",
                  "on-secondary-fixed-variant": "#394857",
                  "on-tertiary-container": "#66686e",
                  "on-secondary-fixed": "#0d1d2a"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "container-margin-desktop": "80px",
                  "container-margin-mobile": "24px",
                  "glass-padding": "32px",
                  "gutter": "24px",
                  "unit": "8px"
          },
          "fontFamily": {
                  "display-lg": ["Playfair Display"],
                  "gesture-indicator": ["Inter"],
                  "display-lg-mobile": ["Playfair Display"],
                  "label-caps": ["Inter"],
                  "headline-sm": ["Playfair Display"],
                  "headline-md": ["Playfair Display"],
                  "body-lg": ["Inter"],
                  "body-md": ["Inter"]
          },
          "fontSize": {
                  "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                  "gesture-indicator": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}],
                  "display-lg-mobile": ["40px", {"lineHeight": "1.2", "fontWeight": "400"}],
                  "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}],
                  "headline-sm": ["24px", {"lineHeight": "1.4", "fontWeight": "500"}],
                  "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "400"}],
                  "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                  "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(252, 249, 248, 0.2);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(206, 197, 186, 0.3);
      box-shadow: 0 4px 30px rgba(112, 128, 144, 0.05);
    }
    .inner-sheen {
      box-shadow: inset 1px 1px 0px rgba(255, 255, 255, 0.4);
    }
    .gesture-ring {
      border: 2px solid rgba(240, 224, 200, 0.8);
      box-shadow: 0 0 15px rgba(240, 224, 200, 0.4);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden">
<!-- Main AR Canvas Container -->
<main class="relative h-screen w-full flex items-center justify-center bg-surface-dim">
<!-- AR Background Model -->
<div class="absolute inset-0 z-0">
<img alt="AR Virtual Try-on Model" class="w-full h-full object-cover" data-alt="A high-end editorial fashion shot of a slender model wearing a luxurious, flowing silk evening gown in champagne gold. The garment has intricate draping that catches the soft, diffused studio lighting. The background is a minimalist, ethereal space with subtle reflections that mimic a smart mirror surface. The color palette is composed of soft creams, metallic silks, and muted slate tones, creating a calm and sophisticated luxury atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBz_0zb_dDDq8iv5hMFJdYm1oAmu7e0aIqw9wAqysDJKSjQKhknM_cwCyRRMLofk92oRZXZVXXIR1tF_5zy3szEKh4oLSd1HBHiMojSNZutxasAQndcGp5gvRvPSghMH9nMj-2LitAo8qTO_1Sp2hV4yX08b0ChBP014xNsjApV0nRPIbKsV3lXyYoV07ooZ9cPRtoDqKbrPo0Wyd8oqEIyHgtPd5ak5hs34F7TmtOOlX32DFP5Ra18gndIVprcmT6kwtoT_BdOMIo"/>
</div>
<!-- UI Layer: TopAppBar Shell -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin-desktop py-4 bg-surface/30 backdrop-blur-2xl dark:bg-background/30 border-b border-outline-variant/10">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary scale-95 duration-200 ease-out hover:backdrop-blur-3xl hover:bg-surface-container-high/40 transition-all p-2 rounded-full" data-icon="menu_open">menu_open</button>
</div>
<h1 class="font-display-lg text-display-lg-mobile tracking-widest text-primary">AURA-MIRROR</h1>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary scale-95 duration-200 ease-out hover:backdrop-blur-3xl hover:bg-surface-container-high/40 transition-all p-2 rounded-full" data-icon="shopping_bag">shopping_bag</button>
</div>
</header>
<!-- UI Layer: Floating Gesture Indicators -->
<div class="absolute top-[30%] left-[20%] z-40 pointer-events-none">
<div class="gesture-ring w-12 h-12 rounded-full flex items-center justify-center bg-primary-fixed/20 backdrop-blur-sm">
<div class="w-2 h-2 bg-primary rounded-full"></div>
</div>
<span class="font-gesture-indicator text-gesture-indicator text-primary bg-white/40 px-2 py-1 rounded mt-2 block backdrop-blur-md">SWIPE TO ROTATE</span>
</div>
<!-- UI Layer: Product Details Glass Card -->
<section class="absolute left-container-margin-desktop bottom-32 z-40 w-80 glass-card inner-sheen rounded-xl p-glass-padding">
<div class="flex flex-col gap-unit">
<span class="font-label-caps text-label-caps text-primary opacity-80">NEW COLLECTION</span>
<h2 class="font-headline-md text-headline-md text-on-surface">Luminous Silk Slip</h2>
<div class="flex justify-between items-center mt-2">
<span class="font-body-lg text-body-lg text-on-surface-variant">$1,240</span>
<span class="font-label-caps text-label-caps text-secondary px-2 py-1 bg-secondary-container/30 rounded">SILK / CHAMPAGNE</span>
</div>
<div class="mt-6 flex flex-col gap-4">
<button class="w-full flex items-center justify-center gap-3 py-4 bg-white/20 border border-outline-variant/30 rounded-full hover:bg-white/40 transition-all duration-300 group">
<span class="material-symbols-outlined text-primary" data-icon="play_circle">play_circle</span>
<span class="font-label-caps text-label-caps text-primary">DRAPE PERFORMANCE</span>
</button>
<button class="w-full flex items-center justify-center gap-3 py-4 bg-primary text-on-primary rounded-full hover:bg-primary/90 transition-all duration-300 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-label-caps text-label-caps">SAVE TO WISHLIST</span>
</button>
</div>
</div>
</section>
<!-- UI Layer: Gesture Control Right Panel -->
<aside class="absolute right-container-margin-desktop top-1/2 -translate-y-1/2 z-40 flex flex-col gap-8">
<div class="flex flex-col items-center gap-4">
<span class="font-label-caps text-label-caps text-primary rotate-90 mb-8 w-24">COLOR_WAY</span>
<button class="w-10 h-10 rounded-full border-2 border-primary p-0.5"><div class="w-full h-full rounded-full bg-[#F0E0C8]"></div></button>
<button class="w-10 h-10 rounded-full border border-outline-variant/30 p-0.5"><div class="w-full h-full rounded-full bg-[#1C1B1B]"></div></button>
<button class="w-10 h-10 rounded-full border border-outline-variant/30 p-0.5"><div class="w-full h-full rounded-full bg-[#50606F]"></div></button>
</div>
<div class="h-px w-full bg-outline-variant/20 my-4"></div>
<div class="flex flex-col items-center gap-4">
<span class="font-label-caps text-label-caps text-primary rotate-90 mb-8 w-24">SIZE_SELECT</span>
<button class="font-label-caps text-label-caps w-10 h-10 flex items-center justify-center rounded-full border border-outline-variant/30 hover:border-primary transition-colors">XS</button>
<button class="font-label-caps text-label-caps w-10 h-10 flex items-center justify-center rounded-full border-2 border-primary text-primary">S</button>
<button class="font-label-caps text-label-caps w-10 h-10 flex items-center justify-center rounded-full border border-outline-variant/30 hover:border-primary transition-colors">M</button>
<button class="font-label-caps text-label-caps w-10 h-10 flex items-center justify-center rounded-full border border-outline-variant/30 hover:border-primary transition-colors">L</button>
</div>
</aside>
<!-- UI Layer: BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-container-margin-desktop pb-8 pt-4 bg-surface/20 backdrop-blur-3xl border-t border-outline-variant/10 shadow-[0_-4px_20px_rgba(112,128,144,0.05)] rounded-t-xl">
<div class="flex flex-col items-center justify-center text-primary border-t-2 border-primary pt-2 scale-110">
<span class="material-symbols-outlined mb-1" data-icon="accessibility_new">accessibility_new</span>
<span class="font-label-caps text-label-caps">TRY-ON</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/70 pt-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label-caps text-label-caps">STYLIST</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/70 pt-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="wb_sunny">wb_sunny</span>
<span class="font-label-caps text-label-caps">LIGHTS</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/70 pt-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="payments">payments</span>
<span class="font-label-caps text-label-caps">CHECKOUT</span>
</div>
</nav>
<!-- Background Decoration: Subtle Blur Spots -->
<div class="absolute top-1/4 right-1/4 w-96 h-96 bg-primary-container/20 blur-[120px] pointer-events-none rounded-full"></div>
<div class="absolute bottom-1/4 left-1/4 w-64 h-64 bg-secondary-container/10 blur-[100px] pointer-events-none rounded-full"></div>
</main>
</body></html>
