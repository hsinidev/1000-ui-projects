<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#d3c5ad",
                        "on-tertiary-fixed": "#191c20",
                        "tertiary": "#5d5e64",
                        "surface-container-highest": "#e5e2e1",
                        "on-primary-container": "#726753",
                        "surface-dim": "#dcd9d9",
                        "surface-container": "#f0eded",
                        "secondary-fixed": "#d4e4f6",
                        "outline-variant": "#cec5ba",
                        "on-secondary": "#ffffff",
                        "outline": "#7d766c",
                        "error": "#ba1a1a",
                        "on-background": "#1c1b1b",
                        "surface-variant": "#e5e2e1",
                        "inverse-primary": "#d3c5ad",
                        "surface-container-high": "#eae7e7",
                        "surface": "#fcf9f8",
                        "on-primary-fixed": "#221b0b",
                        "primary-fixed": "#f0e0c8",
                        "inverse-on-surface": "#f3f0ef",
                        "on-tertiary-fixed-variant": "#45474c",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#556474",
                        "primary": "#685d4a",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#4f4533",
                        "tertiary-fixed-dim": "#c5c6cd",
                        "on-surface": "#1c1b1b",
                        "surface-tint": "#685d4a",
                        "surface-container-low": "#f6f3f2",
                        "inverse-surface": "#313030",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#d1e1f4",
                        "secondary": "#50606f",
                        "on-secondary-fixed": "#0d1d2a",
                        "on-tertiary-container": "#66686e",
                        "tertiary-container": "#e8e8ef",
                        "on-secondary-fixed-variant": "#394857",
                        "primary-container": "#f7e7ce",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#b8c8da",
                        "background": "#fcf9f8",
                        "tertiary-fixed": "#e2e2e9",
                        "surface-bright": "#fcf9f8",
                        "on-surface-variant": "#4b463d",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin-mobile": "24px",
                        "container-margin-desktop": "80px",
                        "gutter": "24px",
                        "glass-padding": "32px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Playfair Display"],
                        "label-caps": ["Inter"],
                        "gesture-indicator": ["Inter"],
                        "display-lg": ["Playfair Display"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Playfair Display"],
                        "headline-md": ["Playfair Display"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["40px", {"lineHeight": "1.2", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}],
                        "gesture-indicator": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-sm": ["24px", {"lineHeight": "1.4", "fontWeight": "500"}],
                        "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-surface {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(48px);
            -webkit-backdrop-filter: blur(48px);
            border: 1px solid rgba(211, 197, 173, 0.3);
        }
        .inner-sheen {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }
        .biometric-pulse {
            box-shadow: 0 0 0 0 rgba(211, 197, 173, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(211, 197, 173, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(211, 197, 173, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(211, 197, 173, 0); }
        }
    </style>
</head>
<body class="bg-background min-h-screen font-body-md text-on-surface overflow-hidden">
<!-- Background Layer (Luxury Boutique Image) -->
<div class="fixed inset-0 z-0">
<img alt="Luxury Boutique Background" class="w-full h-full object-cover brightness-[0.8]" data-alt="A high-end luxury fashion boutique interior with soft, ambient architectural lighting illuminating minimalist marble floors and polished brass accents. The setting is serene and opulent, with hints of designer garments on ethereal glass displays. The overall atmosphere is airy and light-mode focused, utilizing a palette of soft champagnes, whites, and subtle slate shadows to convey an avant-garde retail experience." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBUlgPHm2-VxrZGLU-d-jPZ_N2qEWvoUZ_VJrlJAE4ZZkkGf4XBqmmts6wK_qAa_pwa8NSXfQD1kYZWRcbxn71ClNbAsD0G1DphjyEwX1dB5PdXjZjoJEdsdyP0CkPZ0A3tIvpw-eYwgQ-YziPxxh1RXVMAK958YUX5YbCUUcIHm8Zusd6Qu181xZcpZtSMOkSy7ikWnKpsyUB2vephrNN4EJxuGhkn_NyYFoz5k2a_Ippf3RExgn1fiDR1611Foo2r_GoT9w4ywhs"/>
<div class="absolute inset-0 bg-white/10 backdrop-blur-sm"></div>
</div>
<!-- Main Content Shell -->
<main class="relative z-10 flex min-h-screen items-center justify-center p-container-margin-mobile md:p-container-margin-desktop">
<!-- Auth Modal -->
<div class="glass-surface inner-sheen w-full max-w-lg rounded-[2rem] p-glass-padding flex flex-col items-center gap-10 shadow-xl shadow-secondary/10">
<!-- Branding -->
<div class="text-center space-y-2">
<h1 class="font-display-lg text-headline-md tracking-widest text-primary uppercase">Aura-ID</h1>
<p class="font-label-caps text-label-caps text-primary/60">The Digital Atelier Authentication</p>
</div>
<!-- Form Section -->
<div class="w-full space-y-8">
<div class="space-y-6">
<!-- Email Field -->
<div class="relative group">
<label class="font-label-caps text-[10px] text-primary mb-1 block">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary transition-all duration-500 placeholder:text-outline-variant text-on-surface-variant font-body-md italic" placeholder="couture@atelier.com" type="email"/>
</div>
<!-- Password Field -->
<div class="relative group">
<div class="flex justify-between items-end mb-1">
<label class="font-label-caps text-[10px] text-primary block">Security Key</label>
<span class="text-[10px] font-label-caps text-primary/40 cursor-pointer hover:text-primary transition-colors">Forgot?</span>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary transition-all duration-500 placeholder:text-outline-variant text-on-surface-variant font-body-md" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary py-5 rounded-full text-on-primary font-label-caps text-label-caps tracking-widest hover:bg-on-surface-variant transition-all duration-500 active:scale-95 shadow-lg shadow-primary/20">
                    Enter the Atelier
                </button>
</div>
<!-- Biometric Divider -->
<div class="flex items-center gap-4 w-full">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-caps text-[10px] text-primary/40">Secure Biometric</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Biometric Interaction Area -->
<div class="flex flex-col items-center gap-6">
<div class="relative flex items-center justify-center">
<!-- Pulse Effect Rings -->
<div class="absolute w-32 h-32 biometric-pulse rounded-full border border-primary-fixed-dim/20"></div>
<div class="absolute w-24 h-24 biometric-pulse rounded-full border border-primary-fixed-dim/40" style="animation-delay: 0.5s"></div>
<!-- Fingerprint Icon -->
<div class="relative z-20 w-20 h-20 glass-surface flex items-center justify-center rounded-full cursor-pointer hover:scale-105 transition-transform duration-500 active:scale-95 group">
<span class="material-symbols-outlined text-primary-fixed-dim text-4xl group-hover:text-primary transition-colors duration-500" data-icon="fingerprint">fingerprint</span>
</div>
</div>
<p class="font-label-caps text-[11px] text-on-surface-variant/70 tracking-[0.2em]">Hold for Palm Recognition</p>
</div>
<!-- Footer Links -->
<div class="flex justify-between w-full pt-4">
<button class="font-label-caps text-[10px] text-primary/60 hover:text-primary transition-colors">Join the Circle</button>
<button class="font-label-caps text-[10px] text-primary/60 hover:text-primary transition-colors">Guest Access</button>
</div>
</div>
</main>
<!-- Visual Gesture Indicator (Bottom Right) -->
<div class="fixed bottom-container-margin-desktop right-container-margin-desktop z-[100] hidden md:flex items-center gap-4">
<div class="flex flex-col items-end">
<span class="font-label-caps text-[10px] text-primary-fixed-dim">Gesture Nav</span>
<span class="font-gesture-indicator text-gesture-indicator text-primary italic">Enabled</span>
</div>
<div class="w-12 h-12 rounded-full border border-primary-fixed-dim flex items-center justify-center glass-surface">
<span class="material-symbols-outlined text-primary text-xl" data-icon="front_hand">front_hand</span>
</div>
</div>
<!-- Decorative Soft Champagne Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/20 blur-[120px] rounded-full z-0 pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-primary-fixed/20 blur-[100px] rounded-full z-0 pointer-events-none"></div>
</body></html>
