<p class="font-body-md text-body-md text-on-surface-variant">Enter your credentials to access your private collection and curated archives.</p>

</div>
<div class="relative">
<label class="font-label-md text-label-md uppercase block mb-2 text-on-surface-variant">Secret Key</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 transition-all" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Action Buttons -->
<div class="space-y-4">
<button class="w-full py-4 border-[0.5px] border-outline text-on-surface font-label-md text-label-md uppercase tracking-widest hover:bg-primary hover:text-on-primary hover:border-primary transition-all duration-300" type="submit">

<span class="font-label-md text-label-md">Web3</span>
