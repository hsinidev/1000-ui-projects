<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.15);
            backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(144, 143, 160, 0.3);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            border-bottom-color: #8083ff;
            box-shadow: 0 4px 12px -4px rgba(128, 131, 255, 0.2);
            outline: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "surface-container-low": "#191c1e",
                        "surface-tint": "#c0c1ff",
                        "on-tertiary-fixed": "#001f28",
                        "outline": "#908fa0",
                        "on-primary-container": "#0d0096",
                        "error-container": "#93000a",
                        "on-surface": "#e0e3e5",
                        "secondary": "#bec6e0",
                        "inverse-surface": "#e0e3e5",
                        "on-surface-variant": "#c7c4d7",
                        "tertiary-fixed": "#b7eaff",
                        "secondary-fixed-dim": "#bec6e0",
                        "on-tertiary": "#003543",
                        "on-secondary-container": "#adb4ce",
                        "on-primary": "#1000a9",
                        "on-primary-fixed": "#07006c",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#e1e0ff",
                        "surface-container-high": "#272a2c",
                        "background": "#101415",
                        "tertiary": "#4cd6ff",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "inverse-on-surface": "#2d3133",
                        "primary": "#c0c1ff",
                        "surface-container": "#1d2022",
                        "primary-container": "#8083ff",
                        "outline-variant": "#464554",
                        "surface-container-lowest": "#0b0f10",
                        "tertiary-container": "#009dc1",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#c0c1ff",
                        "surface-variant": "#323537",
                        "inverse-primary": "#494bd6",
                        "surface-container-highest": "#323537",
                        "secondary-container": "#3f465c",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-background": "#e0e3e5",
                        "on-secondary": "#283044",
                        "surface-dim": "#101415",
                        "secondary-fixed": "#dae2fd",
                        "on-tertiary-fixed-variant": "#004e60",
                        "surface": "#101415",
                        "surface-bright": "#363a3b",
                        "on-tertiary-container": "#002e3a",
                        "tertiary-fixed-dim": "#4cd6ff",
                        "on-secondary-fixed": "#131b2e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "xl": "40px",
                        "unit": "4px",
                        "sm": "8px",
                        "lg": "24px",
                        "md": "16px",
                        "gutter": "20px",
                        "margin-edge": "32px"
                    },
                    "fontFamily": {
                        "data-mono": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "label-caps": ["Space Grotesk"],
                        "body-base": ["Inter"],
                        "display-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "data-mono": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "body-base": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-base min-h-screen overflow-x-hidden">
<!-- TopAppBar -->
<header class="bg-slate-950/40 backdrop-blur-2xl fixed top-0 w-full z-50 border-b border-white/10 flex justify-between items-center px-6 py-4 shadow-[0_4px_20px_rgba(0,0,0,0.4)]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border border-primary/30 flex items-center justify-center overflow-hidden">
<img alt="Pilot Profile" class="w-full h-full object-cover" data-alt="A professional close-up portrait of a drone pilot wearing a sleek tech-wear uniform and a tactical headset. The background is a dark, futuristic mission control room with glowing indigo holographic displays. The lighting is low-key with sharp cyan and indigo rim lights, emphasizing a focused and authoritative technological mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2eZrIdKTWOy35vfbTFTREIMcqmEEr6nTj0a2phjO9stq5KKEqbarrUksy1qQyoNj4ZBOHokHJbiadR1rGAjYyb137kruzm5oh6x3aFYiCnkscVYwBlM2lM7C_nTbz86D0UE5qMv7pmUVI5auPsywAgUdv29BpG7Ea8K3naT5lLspxMvcKb_7r2c6f5L_AAzc9Yl1Hcywh9z4fvTUCK8Z_rIponA61I_T9E1aBmyXuUjWEkXu8xMkNajD5xCJ8tB8OYD5oC98_GF1_"/>
</div>
<span class="text-xl font-black text-white tracking-widest uppercase font-['Space_Grotesk']">SkyTraffic</span>
</div>
<button class="text-indigo-500 hover:bg-white/5 transition-colors p-2 rounded-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined">notifications_active</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Weather Status Chip -->
<div class="flex justify-center mb-8">
<div class="glass-panel px-4 py-2 rounded-full flex items-center gap-3 border-indigo-500/20">
<span class="material-symbols-outlined text-tertiary text-sm" style="font-variation-settings: 'FILL' 1;">wb_sunny</span>
<span class="font-data-mono text-data-mono text-tertiary uppercase">Clear / Wind 5kts</span>
</div>
</div>
<!-- Multi-step Form Container -->
<div class="space-y-8">
<!-- Step Header -->
<div class="flex items-center justify-between">
<div>
<h1 class="font-headline-md text-headline-md text-white">New Mission</h1>
<p class="text-on-surface-variant text-sm mt-1">Configure your flight parameters</p>
</div>
<div class="text-right">
<span class="font-data-mono text-primary text-sm">Step 01/03</span>
<div class="w-24 h-1 bg-white/10 rounded-full mt-2 overflow-hidden">
<div class="w-1/3 h-full bg-primary shadow-[0_0_8px_#c0c1ff]"></div>
</div>
</div>
</div>
<!-- Form Content -->
<div class="glass-panel p-6 rounded-2xl space-y-6">
<!-- UAS ID Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-outline uppercase">UAS ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-primary text-lg">radar</span>
<input class="w-full glass-input bg-transparent py-3 pl-8 text-white font-data-mono focus:ring-0" placeholder="Enter Registration Number" type="text"/>
</div>
</div>
<!-- Mission Type Field (Grid Select) -->
<div class="flex flex-col gap-3">
<label class="font-label-caps text-label-caps text-outline uppercase">Mission Type</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-3 rounded-xl border border-white/10 hover:bg-primary/10 transition-all group active:scale-95">
<span class="material-symbols-outlined text-outline group-hover:text-primary mb-2">monitoring</span>
<span class="text-[10px] font-label-caps text-outline group-hover:text-primary">Survey</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border border-indigo-500/40 bg-indigo-500/10 active:scale-95">
<span class="material-symbols-outlined text-primary mb-2" style="font-variation-settings: 'FILL' 1;">package_2</span>
<span class="text-[10px] font-label-caps text-primary">Delivery</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border border-white/10 hover:bg-primary/10 transition-all group active:scale-95">
<span class="material-symbols-outlined text-outline group-hover:text-primary mb-2">security</span>
<span class="text-[10px] font-label-caps text-outline group-hover:text-primary">Patrol</span>
</button>
</div>
</div>
<!-- Destination Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-outline uppercase">Destination</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-primary text-lg">location_on</span>
<input class="w-full glass-input bg-transparent py-3 pl-8 text-white font-data-mono focus:ring-0" placeholder="Lat, Long or Waypoint" type="text"/>
</div>
</div>
<!-- Duration Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-outline uppercase">Duration (EST)</label>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">schedule</span>
<input class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-primary" type="range"/>
<span class="font-data-mono text-white min-w-[40px]">45m</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-5 rounded-2xl bg-primary-container text-on-primary-container font-headline-md text-lg shadow-[0_0_20px_rgba(128,131,255,0.4)] flex items-center justify-center gap-3 active:scale-95 transition-transform">
<span>Submit Flight Plan</span>
<span class="material-symbols-outlined">send</span>
</button>
<!-- Mission Preview Card (Subtle Backdrop) -->
<div class="rounded-2xl overflow-hidden relative h-40 border border-white/5">
<img class="w-full h-full object-cover opacity-40" data-alt="A cinematic aerial view of a futuristic smart city at twilight, featuring glowing transit lines and geometric skyscrapers. The color palette is dominated by deep midnight blues and electric indigo neon lights. The atmosphere is sharp and high-tech, with a subtle digital overlay representing flight corridors and navigation telemetry in a clean, professional aesthetic." data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDu17UJnZsLE1Vz8n64HfHC2GWQE58Du0jkZG2GXkJIZiDjNZ1biRBr4oXJ_WIf3EsJHxEeUe_2nXtBoz8O9SuucVue-Yf8HjWExMzSRieNpsm1QHjnAt1fHGoqYMbm4fbnAdHiiiowkmKFWm2-msX5d2o66YQsAyOkaRSh9EkHBnZMl6dQ1rdQoztU8DcO9-mpp3WWrYc-t22T4sgzEdD_YbJ31_NuDf_zPpHUHKEeqT5G9iyCioN3HurRObR4rZQoh83YG6_iLO7G"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-4">
<span class="font-label-caps text-[10px] text-primary bg-primary/10 px-2 py-1 rounded border border-primary/20">PREVIEW TRAJECTORY</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-slate-950/60 backdrop-blur-3xl border-t border-indigo-500/30 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] rounded-t-2xl">
<button class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:text-indigo-200 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">explore</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase tracking-tighter mt-1">Airspace</span>
</button>
<button class="flex flex-col items-center justify-center bg-indigo-500/20 text-indigo-300 rounded-xl px-4 py-1 border border-indigo-500/40 shadow-[0_0_10px_rgba(99,102,241,0.3)] active:scale-90 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase tracking-tighter mt-1">Plans</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:text-indigo-200 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">warning</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase tracking-tighter mt-1">Alerts</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:text-indigo-200 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">radar</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase tracking-tighter mt-1">Fleet</span>
</button>
</nav>
</body></html>
