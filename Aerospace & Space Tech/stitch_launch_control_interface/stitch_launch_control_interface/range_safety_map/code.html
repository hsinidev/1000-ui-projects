<span class="material-symbols-outlined" data-icon="sensors">sensors</span>
</div>

<div>

</div>

</div>
</div>

<text fill="#fe5f00" font-family="monospace" font-size="12" text-anchor="middle" x="100" y="700">LC-39A IMPACT ZONE</text>

<text fill="#fe5f00" font-family="monospace" font-size="12" text-anchor="middle" x="750" y="450">ATLANTIC RANGE B</text>
<!-- Current Position Marker -->
<circle cx="650" cy="450" fill="#fe5f00" r="6">
<animate attributename="r" dur="2s" repeatcount="indefinite" values="6;10;6"></animate>
