<body class="bg-background text-on-background font-body-sm overflow-hidden h-screen flex flex-col">

  <!-- TopNavBar Implementation -->

        <a href="#" class="px-4 h-12 flex items-center text-cyan-400 border-b border-cyan-400 bg-cyan-950/20 shadow-[0_0_2px_#00F2FF]">NAV</a>

  <div class="flex flex-1 overflow-hidden">
    
    <!-- SideNavBar Implementation -->
    <aside class="bg-black text-cyan-400 font-['Space_Grotesk'] text-[10px] tracking-widest uppercase docked h-full left-0 border-r border-cyan-900/50 flex flex-col w-20 py-4 items-center gap-6 z-40">

      <nav class="flex flex-col w-full gap-2">

        </button>

      <div class="mt-auto flex flex-col w-full gap-4 pb-4">

            <span class="bg-cyan-950 text-cyan-400 border border-cyan-400/50 px-2 py-1 text-[10px] font-bold animate-pulse">ACTIVE</span>

                <div class="w-1 h-3 bg-cyan-400"></div>
                <div class="w-1 h-3 bg-cyan-900"></div>
              </div>
            </div>
            <div class="text-[10px] text-cyan-600 font-mono">ENCRYPTED // CHANNEL 8A</div>
          </div>

        <!-- Bottom Center: Horizontal Situational Indicator (Partial) -->
        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
          <div class="flex items-end gap-1 mb-2">
            <div class="w-[1px] h-4 bg-cyan-900"></div>
            <div class="w-[1px] h-6 bg-cyan-900"></div>

          </button>
          <button class="px-4 h-10 border border-cyan-400/30 bg-black/60 flex items-center gap-2 text-cyan-400 font-label-caps text-[10px] hover:border-cyan-400 hover:bg-cyan-950/20">
            <span class="material-symbols-outlined !text-[16px]">location_on</span>

      <span class="text-[9px] font-mono text-cyan-800 uppercase">SERVER CLUSTER: NA-WEST-4</span>
