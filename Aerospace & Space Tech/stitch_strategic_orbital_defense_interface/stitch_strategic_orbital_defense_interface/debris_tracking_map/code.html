<body class="bg-background text-on-background font-body-md selection:bg-tertiary selection:text-on-tertiary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 border-b border-outline-variant bg-surface-container-lowest/80 backdrop-blur-xl flex justify-between items-center px-margin py-unit h-16 max-w-full">

<div class="relative w-[600px] h-[600px] rounded-full border border-outline-variant/30 flex items-center justify-center">

<div class="absolute top-1/2 right-1/4 w-1.5 h-1.5 bg-error rounded-full animate-pulse"></div>
<div class="absolute bottom-1/3 left-1/2 w-2 h-2 bg-tertiary rounded-full shadow-[0_0_8px_#e9c400]"></div>
<div class="absolute top-1/2 left-1/4 w-1.5 h-1.5 bg-primary rounded-full"></div>

<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 600 600">
<path d="M 150 150 Q 300 50 450 150" fill="none" stroke="#e9c400" stroke-dasharray="4 4" stroke-width="1"></path>
<path d="M 100 400 Q 300 550 500 400" fill="none" stroke="#45474a" stroke-width="1"></path>
</svg>
</div>
</div>
</div>

<div class="absolute top-24 left-margin space-y-gutter hidden md:block">
<div class="glass-panel p-panel_padding tactical-border rounded-lg w-64">

<div class="space-y-1">
<span class="font-label-caps text-label-caps text-on-surface-variant opacity-60">OBJECT_NAME</span>
<p class="font-data-mono text-body-lg text-on-surface">SL-12_DEB</p>
</div>
