<!DOCTYPE html>

<style>
        .glass-card {
            background: rgba(30, 32, 32, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.05);
        }
        .step-inactive { opacity: 0.3; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body-md min-h-screen">
<!-- Top App Bar -->
<header class="bg-surface/60 backdrop-blur-xl fixed top-0 w-full z-50 border-b border-primary/10">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-container-max mx-auto">
<span class="material-symbols-outlined text-primary-container cursor-pointer">menu</span>
<h1 class="font-h3 text-h3 text-primary-container tracking-widest uppercase text-xl">CHRONOS-ELITE</h1>
<span class="material-symbols-outlined text-primary-container cursor-pointer">account_circle</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Hero Context -->
<div class="mb-12 text-center">
<p class="font-label-caps text-label-caps text-primary mb-2 uppercase">Service Concierge</p>
<h2 class="font-h2 text-h2 text-2xl leading-tight">Mastery for Your Timepiece</h2>
</div>
<!-- Step Progress Indicator -->
<div class="flex items-center justify-between mb-12 px-4">
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-bold text-sm">1</div>
<span class="font-label-caps text-[10px] text-primary uppercase">Service</span>
</div>
<div class="flex-1 h-[1px] bg-primary-container/30 mx-2 mb-6"></div>
<div class="flex flex-col items-center gap-2 step-inactive">
<div class="w-8 h-8 rounded-full border border-outline text-on-surface-variant flex items-center justify-center font-bold text-sm">2</div>
<span class="font-label-caps text-[10px] uppercase">Details</span>
</div>
<div class="flex-1 h-[1px] bg-outline-variant/30 mx-2 mb-6"></div>
<div class="flex flex-col items-center gap-2 step-inactive">
<div class="w-8 h-8 rounded-full border border-outline text-on-surface-variant flex items-center justify-center font-bold text-sm">3</div>
<span class="font-label-caps text-[10px] uppercase">Concierge</span>
</div>
</div>
<!-- Step 1: Select Service -->
<div class="space-y-4">
<h3 class="font-label-caps text-label-caps text-on-surface-variant mb-6 uppercase">Select Your Service Path</h3>
<!-- Service Card 1 -->
<button class="glass-card w-full p-6 text-left flex items-center gap-6 group hover:border-primary/40 transition-all duration-300">
<div class="w-16 h-16 bg-surface-container flex items-center justify-center border border-primary/20">
<span class="material-symbols-outlined text-primary text-3xl">build_circle</span>
</div>
<div class="flex-1">
<h4 class="font-h3 text-lg text-primary mb-1">Maintenance</h4>
<p class="text-on-surface-variant text-sm font-body-md opacity-80 leading-snug">Full movement overhaul, lubrication, and precision calibration.</p>
</div>
<span class="material-symbols-outlined text-primary-container opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward_ios</span>
</button>
<!-- Service Card 2 -->
<button class="glass-card w-full p-6 text-left flex items-center gap-6 group hover:border-primary/40 transition-all duration-300">
<div class="w-16 h-16 bg-surface-container flex items-center justify-center border border-primary/20">
<span class="material-symbols-outlined text-primary text-3xl">auto_fix_high</span>
</div>
<div class="flex-1">
<h4 class="font-h3 text-lg text-primary mb-1">Restoration</h4>
<p class="text-on-surface-variant text-sm font-body-md opacity-80 leading-snug">Case polishing, crystal replacement, and dial rejuvenation.</p>
</div>
<span class="material-symbols-outlined text-primary-container opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward_ios</span>
</button>
<!-- Service Card 3 -->
<button class="glass-card w-full p-6 text-left flex items-center gap-6 group hover:border-primary/40 transition-all duration-300">
<div class="w-16 h-16 bg-surface-container flex items-center justify-center border border-primary/20">
<span class="material-symbols-outlined text-primary text-3xl">verified</span>
</div>
<div class="flex-1">
<h4 class="font-h3 text-lg text-primary mb-1">Authentication</h4>
<p class="text-on-surface-variant text-sm font-body-md opacity-80 leading-snug">Multi-point master certification and valuation appraisal.</p>
</div>
<span class="material-symbols-outlined text-primary-container opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward_ios</span>
</button>
</div>
<!-- Form Context Image -->
<div class="mt-12 rounded-lg overflow-hidden glass-card border border-primary/5 p-1">
<img alt="Luxury Watch Movement" class="w-full h-48 object-cover opacity-60" data-alt="A macro photograph of an intricate luxury watch movement, showcasing the polished brass gears, ruby bearings, and delicate springs. The lighting is cinematic with golden highlights hitting the metallic surfaces against a deep, dark navy background. The mood is sophisticated and technical, emphasizing precision-luxe horology and craftsmanship." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlXvCbbg5CGvncO-A8dC4_MkrE9b-ayGgibtdwauYsiDOU0Y4qb9JOv78IqIWo3bpclURDdBtQ0UwnoDsRt7XbgXXb0INTBRYc8Vp2U7iBH8e15pc13y2vwB3P9h22fQSwfLqwk3DSzDwtyD14Se59RjOOQIDuHa590NPuowDkCMLRlgSB80Wp7dPlYYJjHqQVTRvJ3frlYGSbGO59HjpdJxATnZEKPG46uZW-9SAK9Wd6th-ebQ_cvdq4yzovCaCwCp4ObQGwkOrE"/>
</div>
<!-- Step 2 Preview (Inactive State Visual) -->
<div class="mt-12 opacity-40">
<h3 class="font-label-caps text-label-caps text-on-surface-variant mb-6 uppercase">Timepiece Information</h3>
<div class="space-y-6">
<div class="border-b border-outline-variant/30 py-2">
<span class="font-label-caps text-[10px] text-primary uppercase block">Model Reference</span>
<p class="text-on-surface-variant mt-1">Select after service choice...</p>
</div>
<div class="border-b border-outline-variant/30 py-2">
<span class="font-label-caps text-[10px] text-primary uppercase block">Serial Number</span>
<p class="text-on-surface-variant mt-1">Pending...</p>
</div>
</div>
</div>
</main>
<!-- Bottom Action Navigation -->
<footer class="fixed bottom-0 w-full z-50 bg-surface-container/40 backdrop-blur-2xl border-t border-outline-variant/20 rounded-t-full">
<div class="max-w-lg mx-auto flex justify-around items-center px-8 py-6">
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">close</span>
<span class="font-label-caps text-[10px] mt-1 uppercase">Cancel</span>
</button>
<button class="bg-primary-container text-on-primary font-label-caps px-8 py-3 rounded-full flex items-center gap-2 hover:scale-105 active:scale-95 transition-all shadow-lg shadow-primary-container/20">
                Continue <span class="material-symbols-outlined text-lg">chevron_right</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">help</span>
<span class="font-label-caps text-[10px] mt-1 uppercase">Support</span>
</button>
</div>
</footer>
<!-- Overlay Background Texture -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-20">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_#d4af3722_0%,_transparent_50%)]"></div>
</div>
