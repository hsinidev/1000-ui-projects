<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Urban Dermis | Routine Finder</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neumorphic-flat {
            background: #f7f9fb;
            box-shadow: 4px 4px 10px #d1d9e6, -4px -4px 10px #ffffff;
        }
        .neumorphic-inset {
            background: #f7f9fb;
            box-shadow: inset 4px 4px 10px #d1d9e6, inset -4px -4px 10px #ffffff;
        }
        .glass-cyan {
            background: rgba(161, 239, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eff1f3",
                        "secondary-fixed-dim": "#b4cbce",

                        "primary": "#003461",
                        "on-background": "#191c1e",
                        "primary-fixed-dim": "#a3c9ff",
                        "secondary": "#4d6265",
                        "tertiary-fixed": "#a1efff",
                        "on-tertiary-container": "#2fcbe3",
                        "tertiary": "#003942",
                        "outline": "#727781",
                        "on-tertiary-fixed": "#001f25",
                        "on-secondary-container": "#53686b",
                        "secondary-fixed": "#d0e7ea",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#424750",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container": "#eceef0",
                        "surface": "#f7f9fb",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "element-gap": "16px",
                        "gutter": "32px",
                        "section-gap": "80px",
                        "unit": "8px",
                        "container-padding": "48px"
                    },
                    "fontFamily": {
                        "h3": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "body-md": ["Manrope"],
                        "label-caps": ["Manrope"],
                        "h1": ["Manrope"],
                        "h2": ["Manrope"]
                    },
                    "fontSize": {
                        "h3": ["24px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],

                }
            }
        }

</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter h-16 bg-background/80 backdrop-blur-xl shadow-[inset_0_-1px_0_0_rgba(255,255,255,0.1)]">
<div class="flex items-center">
<span class="material-symbols-outlined text-primary text-[24px]">menu</span>
</div>
<h1 class="font-label-caps text-label-caps tracking-[0.2em] text-primary">URBAN DERMIS</h1>
<div class="w-8 h-8 rounded-full overflow-hidden neumorphic-flat p-0.5">
<img alt="Urban-Dermis Logo" class="w-full h-full object-cover rounded-full" data-alt="A highly detailed close-up of a premium, minimalist skincare brand logo named Urban-Dermis. The logo is rendered in a sharp clinical blue font against a sterile white background. Soft glass-cyan highlights dance across the edges of the vector, suggesting a laboratory-grade precision. The lighting is bright and high-key, emphasizing a luxury dermatological clinic aesthetic that is clean, professional, and sophisticated." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqyYAfQWORwTE4NkipWUcFe2j9-aXFYGVu42XzPhfVdfx1B8gvtmRamH-_RvrGSm_-nnvMODMyB4NWcOIWvmoQIXQQQAYHeBMeI5_vr6NyAH93cY4HfH3J_fWBIAOj3C84OOyQIfHGeS26PVXqIPAPx-LB5_-74i-l5SR7qiLtgUyS2EM1Lx7S1357-pDZpLLCLpO6QrJ0GleHnqgM3mLY9i1PSKYs9R44z1nRq01ZITSKC1Dfkv8992LqbwBXRBBo2ewAE78tbCkH"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-gutter overflow-y-auto">
<!-- Progress Bar Section -->
<div class="mb-10">
<div class="flex justify-between items-end mb-3">
<span class="font-label-caps text-label-caps text-outline">CONSULTATION</span>
<span class="font-label-caps text-label-caps text-primary">STEP 01 / 05</span>
</div>
<div class="h-2 w-full neumorphic-inset rounded-full overflow-hidden">
<div class="h-full w-1/5 bg-tertiary-fixed-dim shadow-[0_0_15px_rgba(68,216,241,0.5)] rounded-full transition-all duration-500"></div>
</div>
</div>
<!-- Quiz Header -->
<section class="mb-12">
<h2 class="font-h2 text-h2 text-primary mb-4">What is your primary skin concern?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Select the most prominent condition you wish to address with your custom Urban-Dermis routine.</p>
</section>
<!-- Quiz Options Grid -->
<div class="grid grid-cols-1 gap-6">
<!-- Option: Hydration (Active/Selected State Example) -->
<button class="w-full text-left p-6 rounded-xl neumorphic-inset border-2 border-tertiary-fixed-dim/30 flex items-center justify-between group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-lg glass-cyan text-primary">
<span class="material-symbols-outlined">water_drop</span>
</div>
<div>
<p class="font-h3 text-[18px] text-primary">Hydration</p>
<p class="font-label-caps text-[10px] text-outline">DRYNESS &amp; FLAKING</p>
</div>
</div>
<div class="w-6 h-6 rounded-full bg-tertiary-fixed-dim flex items-center justify-center text-on-tertiary shadow-[0_0_10px_rgba(68,216,241,0.6)]">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</button>
<!-- Option: Aging -->
<button class="w-full text-left p-6 rounded-xl neumorphic-flat flex items-center justify-between group active:scale-95 transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container text-primary opacity-60">
<span class="material-symbols-outlined">hourglass_empty</span>
</div>
<div>
<p class="font-h3 text-[18px] text-primary">Aging</p>
<p class="font-label-caps text-[10px] text-outline">FINE LINES &amp; ELASTICITY</p>
</div>
</div>
<div class="w-6 h-6 rounded-full neumorphic-inset flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</button>
<!-- Option: Texture -->
<button class="w-full text-left p-6 rounded-xl neumorphic-flat flex items-center justify-between group active:scale-95 transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container text-primary opacity-60">
<span class="material-symbols-outlined">grain</span>
</div>
<div>
<p class="font-h3 text-[18px] text-primary">Texture</p>
<p class="font-label-caps text-[10px] text-outline">UNEVEN TONE &amp; PORES</p>
</div>
</div>
<div class="w-6 h-6 rounded-full neumorphic-inset flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</button>
<!-- Option: Sensitivity -->
<button class="w-full text-left p-6 rounded-xl neumorphic-flat flex items-center justify-between group active:scale-95 transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container text-primary opacity-60">
<span class="material-symbols-outlined">shield_with_heart</span>
</div>
<div>
<p class="font-h3 text-[18px] text-primary">Sensitivity</p>
<p class="font-label-caps text-[10px] text-outline">REDNESS &amp; REACTIVITY</p>
</div>
</div>
<div class="w-6 h-6 rounded-full neumorphic-inset flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</button>
</div>
<!-- Navigation Buttons -->
<div class="mt-12 flex gap-4">
<button class="flex-1 py-4 rounded-xl neumorphic-flat font-label-caps text-primary active:scale-95 transition-all">BACK</button>
<button class="flex-[2] py-4 rounded-xl bg-primary text-white font-label-caps tracking-widest shadow-lg shadow-primary/20 active:scale-95 transition-all">NEXT STEP</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-background/90 backdrop-blur-2xl rounded-t-xl border-t border-white/20 shadow-[0_-10px_20px_rgba(209,217,230,0.5)]">
<!-- Routine is active for the Routine Finder -->
<a class="flex flex-col items-center justify-center text-outline px-4 py-2 hover:text-primary-container transition-opacity" href="#">
<span class="material-symbols-outlined mb-1">science</span>
<span class="font-label-caps text-label-caps">Library</span>
</a>
<a class="flex flex-col items-center justify-center text-primary shadow-[inset_2px_2px_5px_#d1d9e6,inset_-2px_-2px_5px_#ffffff] rounded-xl px-4 py-2 transition-opacity" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">auto_fix</span>
<span class="font-label-caps text-label-caps">Routine</span>
</a>
<a class="flex flex-col items-center justify-center text-outline px-4 py-2 hover:text-primary-container transition-opacity" href="#">
<span class="material-symbols-outlined mb-1">rebase_edit</span>
<span class="font-label-caps text-label-caps">Refill</span>
</a>
<a class="flex flex-col items-center justify-center text-outline px-4 py-2 hover:text-primary-container transition-opacity" href="#">
<span class="material-symbols-outlined mb-1">menu_book</span>
<span class="font-label-caps text-label-caps">Research</span>
</a>
</nav>
</body></html>
