</div>
<div>

<label class="block text-xs font-label uppercase tracking-widest text-secondary" for="password">Password</label>
<a class="text-xs font-label text-primary/60 hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-surface-container-low border-transparent focus:border-primary focus:ring-0 rounded-lg p-4 transition-all text-sm" id="password" placeholder="••••••••" type="password"/>
</div>

<div class="pt-4">
<button class="w-full shimmer-button text-white font-label py-4 rounded-lg text-sm tracking-widest uppercase transition-all shadow-xl shadow-primary/20" type="submit">
