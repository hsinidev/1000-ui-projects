<style>
    .neumorphic-convex {
      background: #f7faf8;
      box-shadow: 12px 12px 24px #d7dbd9, -12px -12px 24px #ffffff;
    }
    .neumorphic-concave {
      background: #f7faf8;
      box-shadow: inset 6px 6px 12px #d7dbd9, inset -6px -6px 12px #ffffff;
    }
    .neumorphic-btn {
      background: #f7faf8;
      box-shadow: 6px 6px 12px #d7dbd9, -6px -6px 12px #ffffff;
      transition: all 0.2s ease-in-out;
    }
    .neumorphic-btn:active {
      box-shadow: inset 4px 4px 8px #d7dbd9, inset -4px -4px 8px #ffffff;
      transform: scale(0.98);
    }
    .neumorphic-primary {
      background: linear-gradient(145deg, #006a64, #00504b);
      box-shadow: 6px 6px 15px rgba(0, 106, 100, 0.25), -6px -6px 15px rgba(255, 255, 255, 0.8);
    }
  </style>

<body class="bg-surface font-body-md text-on-surface min-h-screen flex items-center justify-center p-lg">
<!-- Main Auth Container -->
<main class="w-full max-w-[480px]">
<!-- Branding Header (Suppressed Shell per instructions, but kept brand identity) -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 rounded-2xl neumorphic-convex flex items-center justify-center mb-md text-primary">
<span class="material-symbols-outlined !text-[40px]" style="font-variation-settings: 'FILL' 1;">support_agent</span>
</div>
<h1 class="font-h1 text-h1 text-primary tracking-tight">SupportZen</h1>
<p class="font-body-md text-on-surface-variant mt-xs">Empathetic Support for Modern Teams</p>
</div>
<!-- The Elegant Neumorphic Card -->
<div class="neumorphic-convex p-xl rounded-[32px] border border-white/40">
<!-- Toggle Switch (Neumorphic) -->
<div class="neumorphic-concave p-xs rounded-full flex mb-xl">
<button class="flex-1 py-sm rounded-full font-h3 text-body-md bg-surface text-primary shadow-[4px_4px_10px_#d7dbd9,-4px_-4px_10px_#ffffff]">
          Sign In
        </button>
<button class="flex-1 py-sm rounded-full font-h3 text-body-md text-on-surface-variant hover:text-primary transition-colors">
          Sign Up
        </button>
</div>
<!-- Authentication Form -->
<form class="space-y-lg">
<!-- Email Field -->
<div class="space-y-sm">
<label class="font-label-caps text-on-surface-variant block px-sm">Work Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full h-14 pl-[52px] pr-md neumorphic-concave border-none rounded-xl focus:ring-2 focus:ring-primary/20 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="agent@supportzen.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center px-sm">
<label class="font-label-caps text-on-surface-variant">Password</label>
<a class="text-[12px] font-semibold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full h-14 pl-[52px] pr-md neumorphic-concave border-none rounded-xl focus:ring-2 focus:ring-primary/20 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline-variant cursor-pointer hover:text-primary">visibility</span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 neumorphic-primary rounded-xl text-on-primary font-h3 text-body-lg flex items-center justify-center gap-sm hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md my-xl">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-caps text-outline-variant">OR CONTINUE WITH</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-lg">
<button class="neumorphic-btn h-14 rounded-xl flex items-center justify-center gap-md hover:text-primary">
<img alt="Google" class="w-5 h-5" data-alt="A clean, isolated Google 'G' logo presented in its classic four-color palette of blue, red, yellow, and green. The icon is centered perfectly against a soft white background that matches the serene, light-mode neumorphic design of the application. The lighting is diffused and professional, creating no harsh shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAbhmJfM8f8XB_vEexkjeP98p8sJSuJ_Df4-zgMRw_zzxTZJanuZTbII0ZiznJrt9XW6t7hAzZVCZ99PhfjdKL58953H_-jtgo9tYcHPhjCYLnxF689v2QQ0zM49eBAst2K-7z_oOQ7rLUfVnssQPnMNoxvIQdfjrA-KjH1OuafQxwiOtpISGyUGa21rLQ1TBJIgYjhozyqC810ECZae0fIclGvGjI1kCiC6z0ACXf_AeaQoa7UfELirlMr7--OKPZHUNrfmqg5r4fm"/>
<span class="font-body-md font-semibold">Google</span>
</button>
<button class="neumorphic-btn h-14 rounded-xl flex items-center justify-center gap-md hover:text-primary">
<img alt="Microsoft" class="w-5 h-5" data-alt="A high-resolution Microsoft logo featuring the iconic four colored squares in orange-red, green, blue, and yellow. The logo is displayed with precise geometry and sits elegantly in a minimalist interface environment. The surrounding space reflects the soft-UI aesthetic of the SupportZen platform with subtle depth and composed lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJKr06TkGbEdvKJ7tmLnaG85XlUlLCRrZWQiGIZWbYwTKeCksKtFuRDecPmAwe66kMGSXB5Y1Rumta-QjR44pvXjH3b9jgVTRVaTAfT3ohOFdSApLfyTg2WMTW3tGfxWgQipLwOQAhEwzT-gKgZQGGmCrm9Tv2kLUxeFYHLOHbRES7_vplLsZhjR0vhsex63PYcZztUx75oP9y8bkOt1dcFE0P-deMRKxgXdSHnp-MnGj7pxPiLDkJjR_j2RJBIaP6fxYII-F9LOQb"/>
<span class="font-body-md font-semibold">Microsoft</span>
</button>
</div>
</div>
<!-- Footer Trust Info -->
<div class="mt-xl flex flex-col items-center gap-md">
<div class="flex items-center gap-sm text-outline-variant">
<span class="material-symbols-outlined !text-[18px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[12px] font-label-caps">Enterprise Grade Security &amp; Encryption</span>
</div>
<div class="w-full max-w-[320px] h-[160px] rounded-2xl overflow-hidden neumorphic-convex grayscale hover:grayscale-0 transition-all duration-500 opacity-60">
<img class="w-full h-full object-cover" data-alt="A serene and minimalist office setting for a customer support professional, featuring a clean desk with a single laptop and a small succulent plant. The lighting is soft and natural, pouring in from a large window to create a calm, productive atmosphere. The color palette is dominated by soft teals and warm greys, reflecting the empathetic and composed brand identity of SupportZen." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCs8XoCXRJKcs733CpSA48jjL5sRcjpGeCD5-EBw0JnhhUET8xnmZTZyxGC5y3V3HvuF66jhiAueDHTrF49bYLVJ6IhGstmHgMzkzsNi86s6mhjxSG5GEGdR4oFe4RNjQ0QJK8CNFxQGJpIRFONsALeJkH1rLqRhpMk6fbrWdi8WNsNslfrIdnQKzV5ZjgG_ooTJxqpCLE_YE5kMdnaOnUBEexSHn8eJd4045ikbG4W_F3dLFu8gHWBUNETVKbK9k4dmDwmJUrrfaey"/>
</div>
</div>
</main>
<!-- Decorative Abstract Background Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary-container/20 rounded-full blur-[100px] -z-10"></div>
</body></html>
