</button>
<button class="w-12 h-12 rounded-full bg-surface/20 glass-overlay text-white flex items-center justify-center shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="thumb_down">thumb_down</span>

</div>
</div>
