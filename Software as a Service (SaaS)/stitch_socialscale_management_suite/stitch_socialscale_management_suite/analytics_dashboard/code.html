<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            background-color: #000000;

    body {

<body class="bg-black text-on-background font-body-md min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-black border-b border-gray-900 flex justify-between items-center px-5 h-16 w-full fixed top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-highest flex items-center justify-center border border-outline-variant">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A close-up professional portrait of a tech-savvy individual with soft studio lighting. The background is a dark, out-of-focus modern office space with subtle hints of electric blue illumination. The aesthetic is sharp, high-contrast, and aligns with a premium dark-mode dashboard interface designed for social media professionals." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBNVw4vlbJt_oRelu2Eph8PNx9Hg-CkJwhDvzt-ATO3H1RsWlyj1Cd-ftPxEo3Tj4gyrZF90saZqjrlCGXL8y2h5iIb0GdHUEumKLSFl7MN5MIhz0xYSvPSAiVGuyExFb3Ot-0Uwr_Gc0U3g0iY4zJrGG-CORAJxP64HzR1TRbkUT6GE00-VJ6zQlHgdRm_uG7k2CV5LjqWwEv0boTvyv6PS-KnwIP9dfgRN5_4tepWHsgzAfpQUU5opjE1JNFsQ14Dtz_nd5tUsCw"/>
</div>
<span class="text-2xl font-black text-primary-container italic tracking-widest font-spline-sans uppercase tracking-tighter">SocialScale</span>
</div>
<button class="text-gray-500 hover:text-primary-container transition-colors active:scale-95 duration-75">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 px-5 max-w-md mx-auto">
<!-- Platform Filters -->
<div class="flex overflow-x-auto gap-xs pb-md no-scrollbar">
<button class="flex-none px-sm py-xs bg-primary-container text-white rounded-full font-label-caps text-label-caps">ALL</button>
<button class="flex-none px-sm py-xs bg-surface-container-high border border-outline-variant text-on-surface-variant rounded-full font-label-caps text-label-caps">INSTAGRAM</button>
<button class="flex-none px-sm py-xs bg-surface-container-high border border-outline-variant text-on-surface-variant rounded-full font-label-caps text-label-caps">TIKTOK</button>
<button class="flex-none px-sm py-xs bg-surface-container-high border border-outline-variant text-on-surface-variant rounded-full font-label-caps text-label-caps">TWITTER</button>
</div>
<!-- Bento Grid -->
<div class="grid grid-cols-2 gap-bento-gap">
<!-- Total Reach (Large Card) -->
<div class="col-span-2 bg-surface-container-low border border-outline-variant rounded-xl p-md flex flex-col gap-sm">
<div class="flex justify-between items-start">
<div>
<p class="text-label-caps font-label-caps text-on-surface-variant">TOTAL REACH</p>
<h2 class="text-display-xl font-display-xl text-on-surface mt-1">1.2M</h2>
</div>
<span class="text-primary-container font-data-point text-data-point">+12.5%</span>
</div>
<!-- Line Chart Visualization (Simplified SVG) -->
<div class="h-32 w-full mt-base">
<svg class="w-full h-full" viewbox="0 0 400 100">
<defs>
<lineargradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#0046ff" stop-opacity="0.3"></stop>
<stop offset="100%" stop-color="#0046ff" stop-opacity="0"></stop>
</lineargradient>
</defs>
<path d="M0 80 Q 50 70, 100 85 T 200 40 T 300 60 T 400 20" fill="none" stroke="#0046ff" stroke-width="3"></path>
<path d="M0 80 Q 50 70, 100 85 T 200 40 T 300 60 T 400 20 V 100 H 0 Z" fill="url(#chartGradient)"></path>
</svg>
</div>
</div>
<!-- Engagement Rate (Medium Card) -->
<div class="col-span-1 bg-surface-container-low border border-outline-variant rounded-xl p-md flex flex-col justify-between aspect-square">
<p class="text-label-caps font-label-caps text-on-surface-variant">ENGAGEMENT</p>
<div>
<h3 class="text-headline-lg font-headline-lg text-primary-container">4.8%</h3>
<p class="text-label-caps font-label-caps text-on-surface-variant mt-1 text-[10px]">AVG PER POST</p>
</div>
</div>
<!-- Best Time to Post (Small Card) -->
<div class="col-span-1 bg-surface-container-low border border-outline-variant rounded-xl p-md flex flex-col justify-between aspect-square">
<p class="text-label-caps font-label-caps text-on-surface-variant">BEST TIME</p>
<div class="flex flex-col items-start gap-1">
<span class="material-symbols-outlined text-primary-container" data-icon="schedule">schedule</span>
<h3 class="text-headline-md font-headline-md text-on-surface">19:30</h3>
<p class="text-label-caps font-label-caps text-on-surface-variant text-[10px]">TUESDAYS</p>
</div>
</div>
<!-- Platform Breakdown (Medium Card) -->
<div class="col-span-2 bg-surface-container-low border border-outline-variant rounded-xl p-md">
<p class="text-label-caps font-label-caps text-on-surface-variant mb-md">PLATFORM BREAKDOWN</p>
<div class="flex items-center gap-lg">
<!-- Doughnut Chart (Simplified SVG) -->
<div class="relative w-24 h-24">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 36 36">
<circle cx="18" cy="18" fill="transparent" r="15.9" stroke="#222222" stroke-width="4"></circle>
<circle cx="18" cy="18" fill="transparent" r="15.9" stroke="#0046ff" stroke-dasharray="60 40" stroke-width="4"></circle>
<circle cx="18" cy="18" fill="transparent" r="15.9" stroke="#00228a" stroke-dasharray="25 75" stroke-dashoffset="-60" stroke-width="4"></circle>
</svg>
</div>
<div class="flex flex-col gap-xs flex-1">
<div class="flex justify-between items-center">
<span class="text-label-caps font-label-caps text-on-surface text-[10px]">INSTAGRAM</span>
<span class="text-data-point font-data-point text-primary-container text-sm">60%</span>
</div>
<div class="flex justify-between items-center">
<span class="text-label-caps font-label-caps text-on-surface text-[10px]">TIKTOK</span>
<span class="text-data-point font-data-point text-primary-container text-sm">25%</span>
</div>
<div class="flex justify-between items-center">
<span class="text-label-caps font-label-caps text-on-surface text-[10px]">OTHER</span>
<span class="text-data-point font-data-point text-on-surface-variant text-sm">15%</span>
</div>
</div>
</div>
</div>
<!-- Library / Asset Preview (Medium/Wide) -->
<div class="col-span-2 bg-surface-container-low border border-outline-variant rounded-xl overflow-hidden">
<div class="p-md pb-xs">
<p class="text-label-caps font-label-caps text-on-surface-variant">TOP PERFORMING CONTENT</p>
</div>
<div class="grid grid-cols-3 gap-1">
<div class="aspect-square relative group">
<img alt="Content 1" class="w-full h-full object-cover" data-alt="A cinematic, high-energy close-up of a futuristic sneaker glowing with neon blue LED lights against a dark, rainy urban street. The scene is saturated with deep blacks and sharp reflections, emphasizing a high-contrast aesthetic. The mood is fast-paced and hyper-connected, fitting for a viral social media post." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBc6sE6X7DLH729V_Z3--ATcsNvT7-Py5pDXJRw0IXAuk_ZdFBnGIS2ObGLPCzkV0ocays2zgsa8kgwcm6QSAD9g2gHSyYsiP-K-ypfNFkalcSLj0iidyMS5TKXYdo2PVdipRujbFHUkL78uWuVIa9GyZcfC5lNZrgisQQeN6SNFO5757qzWryq83dGtouZaCbZjuzcuJWJuY-KDYA3bHaoV0guFk9h_LuC6dlzUw08F0ZKCQEEcP0c87gxlOaykf_X9Ey6sBe5jmI"/>
<div class="absolute inset-0 bg-primary-container/20 opacity-0 group-active:opacity-100 transition-opacity"></div>
</div>
<div class="aspect-square relative group">
<img alt="Content 2" class="w-full h-full object-cover" data-alt="An abstract 3D digital art composition featuring flowing liquid metal shapes in shades of deep indigo and electric blue. The surface is glossy and reflective, set against a void-like black background. The lighting is focused and dramatic, creating a sense of luxury and technical precision suitable for professional social analytics content." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAeh-IyUSfFRJhID-vFsvdVaopFK4dIj1R8LTYqzXuZmBr2wT4WY0oANeUcAn8Dol7UKo3vOZquh-RTQox2a2IB67FuWDSnpo_qD-nyBCiyHVaFgD8tI8lStlLNdWXpaQq5qDKMss0YSiX_O95_mZBEcR4HqaIHHqWc59f-k9uBGsojvpVYjBc0hN109X_c1SMLUoMrt5VLdZ90C6p7panujNG5w7MomNoCu3zV0mwmxrxgPO3YfKMUoOFVImTje9tlp14FBYUs390"/>
</div>
<div class="aspect-square relative group">
<img alt="Content 3" class="w-full h-full object-cover" data-alt="A minimalist, top-down shot of a high-end laptop on a black marble surface, illuminated by a single streak of blue light. The composition is clean and aggressive, with sharp lines and high-contrast shadows. The aesthetic is professional yet edgy, mirroring the high-performance analytics interface of the SocialScale dashboard." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmXF5LYomxmrQYP-rERzhanDZovl0vwOTBvfuqido2_I5N6cCm1wk8QsTF9ieXIhv4tKVkGh6IpBx79hKj76DeEz-ti2ierGNe9ErbfPewPnjXL7e9dB3EM8lhj8wCSq17CFDlhBUg7O0DR5_9f9PVNCFZ2fZdFOhbGPJdwUUWVmxPyzBOLqiwSh_YEuYwnSvRctYKdesI7UjFW1gNNdn1eyHEuiSnqnQHVm4esWOM6LICbU6nlUfkr3DSXd-wWLagExO9MdTZqPE"/>
</div>
</div>
</div>
</div>
</main>
<!-- Quick Post FAB -->
<button class="fixed bottom-24 right-5 w-14 h-14 bg-primary-container text-white rounded-full shadow-[0_0_20px_rgba(0,70,255,0.4)] flex items-center justify-center active:scale-90 transition-transform z-40 border border-white/20">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-safe px-4 bg-black/95 backdrop-blur-md border-t border-gray-900 z-50">
<a class="flex flex-col items-center justify-center text-gray-400 pt-1 hover:bg-gray-900 transition-colors tap-highlight-none active:bg-blue-600/10" href="#">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-label-caps mt-1">Calendar</span>
</a>
<a class="flex flex-col items-center justify-center text-primary-container border-t-2 border-primary-container pt-1 hover:bg-gray-900 transition-colors tap-highlight-none active:bg-blue-600/10" href="#">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-label-caps mt-1">Analytics</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 pt-1 hover:bg-gray-900 transition-colors tap-highlight-none active:bg-blue-600/10" href="#">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-label-caps mt-1">Inbox</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 pt-1 hover:bg-gray-900 transition-colors tap-highlight-none active:bg-blue-600/10" href="#">
<span class="material-symbols-outlined" data-icon="folder_special">folder_special</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-label-caps mt-1">Library</span>
</a>
</nav>
</body></html>
