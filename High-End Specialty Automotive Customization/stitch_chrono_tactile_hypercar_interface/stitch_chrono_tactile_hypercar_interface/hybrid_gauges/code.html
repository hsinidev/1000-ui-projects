<style>
        .milled-bezel {
            box-shadow: 
                inset 1px 1px 0px rgba(255,255,255,0.1),

        }

            background: linear-gradient(135deg, #353436 0%, #1c1b1c 50%, #353436 100%);
            position: relative;
        }
        .brushed-metal::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 1px, rgba(255,255,255,0.03) 1px, rgba(255,255,255,0.03) 2px);
            pointer-events: none;
        }
        .dial-radial-grid {
            background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.4) 100%);
        }
        .mechanical-shadow {
            filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.6));
        }
        .tick-segment {
            transform-origin: bottom center;
        }

<body class="bg-background text-on-background min-h-screen selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Top Navigation Bar -->
<header class="flex justify-between items-center w-full px-margin-edge h-24 bg-surface-container shadow-md docked full-width top-0 border-b-2 border-outline-variant z-50">

</div>
<div class="flex items-center gap-6">
<div class="flex flex-col items-end">

<span class="font-data-mono text-data-mono text-primary">02:45:12.08</span>
</div>
<div class="w-12 h-12 rounded-full border-2 border-primary-container bg-surface-container-high flex items-center justify-center overflow-hidden">

</div>
</div>
</header>

<div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
<div class="w-[800px] h-[800px] border-[20px] border-outline-variant rounded-full dial-radial-grid"></div>
</div>
<!-- Central Gauge Cluster (Radial Instrument Grid) -->
<div class="relative w-full max-w-6xl grid grid-cols-12 gap-gutter items-center">
<!-- Left Pod: Temp & Fluids -->
<div class="col-span-3 space-y-component-gap">
<div class="p-6 bg-surface-container-low border-2 border-outline-variant rounded-lg milled-bezel">
<span class="font-telemetry-label text-telemetry-label text-on-surface-variant block mb-2">OIL TEMP</span>
<div class="flex items-baseline gap-2">
<span class="font-telemetry-num text-telemetry-num text-primary">102</span>
<span class="font-data-mono text-data-mono text-on-surface-variant">°C</span>
</div>
<div class="mt-4 flex gap-1 h-2">
<div class="flex-1 bg-primary"></div>
<div class="flex-1 bg-primary"></div>
<div class="flex-1 bg-primary"></div>
<div class="flex-1 bg-primary"></div>
<div class="flex-1 bg-primary"></div>
<div class="flex-1 bg-primary"></div>
<div class="flex-1 bg-outline-variant"></div>
<div class="flex-1 bg-outline-variant"></div>
</div>
</div>

</div>
</div>
</div>
</div>

<div class="absolute inset-0 p-8">
<div class="relative w-full h-full rounded-full border border-outline-variant/30">

</div>
</div>

<span class="font-heritage-display text-6xl text-primary">4</span>

</div>
</div>

<div class="w-32 h-32 rounded-full border border-outline-variant relative flex items-center justify-center">
<div class="w-full h-[1px] bg-outline-variant/30 absolute"></div>

</div>
