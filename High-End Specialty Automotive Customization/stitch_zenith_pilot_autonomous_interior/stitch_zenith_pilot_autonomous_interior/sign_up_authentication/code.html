<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zenith-Pilot | Access Your Journey</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&amp;family=Inter:wght@400;600&amp;family=Be+Vietnam+Pro:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#afc8f0",
                        "on-tertiary-fixed-variant": "#004f58",
                        "on-primary-container": "#6f88ad",
                        "surface-variant": "#263647",

                        "surface-dim": "#041424",
                        "on-primary-fixed-variant": "#2f486a",
                        "surface-container-low": "#0c1d2c",
                        "on-secondary-fixed-variant": "#454748",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#2e3132",
                        "secondary-container": "#494c4d",
                        "secondary": "#c5c7c8",
                        "tertiary": "#00daf3",
                        "surface": "#041424",
                        "surface-container-lowest": "#000f1e",
                        "secondary-fixed-dim": "#c5c7c8",
                        "on-tertiary": "#00363d",
                        "on-primary-fixed": "#001c3a",
                        "on-background": "#d3e4fa",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#9cf0ff",
                        "surface-bright": "#2b3b4b",
                        "primary": "#afc8f0",
                        "outline-variant": "#43474e",
                        "on-secondary-container": "#babcbd",
                        "surface-container": "#102130",
                        "primary-fixed": "#d4e3ff",
                        "primary-container": "#001f3f",
                        "surface-container-highest": "#263647",
                        "outline": "#8e9198",
                        "inverse-surface": "#d3e4fa",
                        "secondary-fixed": "#e1e3e4",
                        "on-secondary-fixed": "#191c1d",
                        "on-primary": "#163152",
                        "inverse-primary": "#476083",
                        "on-tertiary-fixed": "#001f24",
                        "primary-fixed-dim": "#afc8f0",
                        "error": "#ffb4ab",
                        "background": "#041424",
                        "on-surface-variant": "#c4c6cf",
                        "on-error": "#690005",
                        "on-tertiary-container": "#0094a6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "3rem",
                        "margin-page": "4rem",
                        "gutter-grid": "2rem",
                        "stack-md": "1.5rem",
                        "stack-sm": "0.5rem"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Montserrat"],
                        "display-lg": ["Montserrat"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-cyan-blur {
            background: rgba(0, 229, 255, 0.05);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .silk-white-tint {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
        }
        .neon-glow:focus-within {
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            border-color: #00daf3 !important;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden">
<!-- Background Layer: Immersive Vehicle Interior -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover opacity-40 brightness-50" data-alt="A cinematic, low-angle view of a futuristic autonomous vehicle interior at night. The cabin features minimalist silk-white leather seats and glowing cyan ambient lighting accents. Large panoramic windows reveal a blurred, high-speed cityscape with streaks of light. The overall mood is serene, elite, and technologically advanced, dominated by deep navy and electric cyan tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuChVQ2BYR3BZ-Hg1s7Eoxuqc9MSBWC_-Dl2OsU7y1ndaLh0PH8rf-EK5IcvtmkL21DKTDthAKjz4X35fzbZJ8AoCma5lxNFgIQSfzxSl-_Eh755s-1LDbEuxbxIWMvr43YVBPl1sHRPCPY8a4BftHztK8xIRM0WG2z2uEzvft_G6T043DusDUQ37o9U_sroxHaJlD7FUdvMhMEJI9eEezxDfprorqxYTJ6NoteDDNP6xLirh9vaKd8QRvkeBbPDhAqea36R-s39cw"/>
<div class="absolute inset-0 bg-gradient-to-b from-surface-container-lowest/20 via-surface/80 to-surface"></div>
</div>
<!-- Main Content Area -->
<div class="relative z-10 flex flex-col min-h-screen items-center justify-center px-margin-page">
<!-- Header / Logo -->
<div class="absolute top-10 left-10 flex items-center gap-4 text-primary">
<div class="size-8">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M12.0799 24L4 19.2479L9.95537 8.75216L18.04 13.4961L18.0446 4H29.9554L29.96 13.4961L38.0446 8.75216L44 19.2479L35.92 24L44 28.7521L38.0446 39.2479L29.96 34.5039L29.9554 44H18.0446L18.04 34.5039L9.95537 39.2479L4 28.7521L12.0799 24Z" fill-rule="evenodd"></path>
</svg>
</div>
<h1 class="text-white text-2xl font-bold tracking-tight">Zenith-Pilot</h1>
</div>
<!-- Minimalist Back Button (Rule 3) -->
<button class="absolute top-10 right-10 flex items-center gap-2 text-primary hover:text-tertiary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
<span class="font-label-caps">Return to Fleet</span>
</button>
<!-- Authentication Card -->
<div class="w-full max-w-[500px] silk-white-tint p-10 rounded-xl border border-white/10 shadow-2xl">
<div class="flex flex-col gap-8">
<!-- Toggle Navigation (Sign In / Sign Up) -->
<div class="flex h-12 w-full items-center justify-center rounded-lg bg-surface-container p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-surface-container-high has-[:checked]:text-tertiary text-on-surface-variant text-sm font-medium leading-normal transition-all">
<span class="truncate">Sign In</span>
<input checked="" class="invisible w-0" name="auth-mode" type="radio" value="signin"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-surface-container-high has-[:checked]:text-tertiary text-on-surface-variant text-sm font-medium leading-normal transition-all">
<span class="truncate">Create Account</span>
<input class="invisible w-0" name="auth-mode" type="radio" value="signup"/>
</label>
</div>
<div class="space-y-2 text-center">
<h2 class="font-display-lg text-white text-3xl">Welcome Back</h2>
<p class="text-on-surface-variant font-body-md opacity-80">Authenticate to resume your autonomous journey.</p>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<div class="space-y-4">
<div class="group border-b border-outline-variant focus-within:border-tertiary transition-all duration-300">
<label class="block text-[10px] uppercase tracking-widest text-tertiary font-bold mb-1">Elite ID</label>
<input class="w-full bg-transparent border-none p-0 pb-2 text-white placeholder:text-on-secondary/50 focus:ring-0 text-lg" placeholder="pilot@zenith-pilot.com" type="email"/>
</div>
<div class="group border-b border-outline-variant focus-within:border-tertiary transition-all duration-300 relative">
<label class="block text-[10px] uppercase tracking-widest text-tertiary font-bold mb-1">Access Protocol</label>
<div class="flex items-center">
<input class="w-full bg-transparent border-none p-0 pb-2 text-white placeholder:text-on-secondary/50 focus:ring-0 text-lg" placeholder="••••••••" type="password"/>
<button class="text-on-surface-variant hover:text-white pb-2" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Biometric / Social Grid -->
<div class="grid grid-cols-3 gap-4 pt-4">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-lg bg-surface-container-low border border-white/5 hover:bg-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-tertiary group-hover:scale-110 transition-transform" data-icon="fingerprint">fingerprint</span>
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tighter">Biometric</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-lg bg-surface-container-low border border-white/5 hover:bg-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-white/80" data-icon="face_retouching_natural">face_retouching_natural</span>
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tighter">Face ID</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-lg bg-surface-container-low border border-white/5 hover:bg-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-white/80" data-icon="key">key</span>
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tighter">Passkey</span>
</button>
</div>
<!-- Primary Action -->
<button class="w-full py-5 glass-cyan-blur text-surface-container-lowest font-bold text-lg rounded-xl flex items-center justify-center gap-3 hover:brightness-110 transition-all shadow-[0_0_20px_rgba(0,229,255,0.2)]">
                        Initialize Session
                        <span class="material-symbols-outlined" data-icon="east">east</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center justify-center">
<div class="flex-grow border-t border-white/10"></div>
<span class="mx-4 text-on-surface-variant text-xs font-label-caps opacity-50">Luxe Network Auth</span>
<div class="flex-grow border-t border-white/10"></div>
</div>
<!-- Social-First Links -->
<div class="flex justify-between items-center px-2">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-white transition-colors text-sm">
<span class="material-symbols-outlined text-lg" data-icon="help">help</span>
                        Need Assistance?
                    </button>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-white transition-colors text-sm">
<span class="material-symbols-outlined text-lg" data-icon="shield">shield</span>
                        Privacy Shield
                    </button>
</div>
</div>
</div>
<!-- Social Status Footer (Floating) -->
<div class="absolute bottom-10 flex gap-4">
<div class="flex items-center gap-2 bg-tertiary-container/40 px-4 py-2 rounded-full border border-tertiary/20">
<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
<span class="text-tertiary text-xs font-bold tracking-widest uppercase">System: Secure</span>
</div>
<div class="flex items-center gap-2 bg-surface-container-high px-4 py-2 rounded-full border border-white/5">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="public">public</span>
<span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">Global Node: Active</span>
</div>
</div>
</div>
</body></html>
