<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#0043eb",
                    "surface-variant": "#353436",
                    "primary-container": "#7d3cff",
                    "secondary-fixed-dim": "#b8c3ff",
                    "on-error": "#690005",
                    "on-secondary-fixed-variant": "#0035be",
                    "outline-variant": "#4a4456",
                    "surface": "#131314",
                    "error": "#ffb4ab",
                    "inverse-surface": "#e5e2e3",
                    "background": "#131314",
                    "outline": "#958da2",
                    "surface-container-highest": "#353436",
                    "on-surface-variant": "#cbc3d9",
                    "on-tertiary-fixed": "#002021",
                    "secondary": "#b8c3ff",
                    "surface-container-lowest": "#0e0e0f",
                    "primary-fixed": "#e9ddff",
                    "tertiary": "#00dce5",
                    "on-tertiary-container": "#b3fbff",
                    "on-secondary-container": "#c6ceff",
                    "tertiary-container": "#00787d",
                    "surface-dim": "#131314",
                    "surface-tint": "#d0bcff",
                    "error-container": "#93000a",
                    "surface-container-high": "#2a2a2b",
                    "inverse-on-surface": "#313031",
                    "on-primary": "#3b0091",
                    "secondary-fixed": "#dde1ff",
                    "on-primary-fixed": "#23005c",
                    "primary-fixed-dim": "#d0bcff",
                    "inverse-primary": "#6f27f1",
                    "on-secondary-fixed": "#001356",
                    "on-secondary": "#002388",
                    "surface-bright": "#3a393a",
                    "on-primary-fixed-variant": "#5600ca",
                    "on-tertiary-fixed-variant": "#004f53",
                    "on-background": "#e5e2e3",
                    "on-error-container": "#ffdad6",
                    "on-primary-container": "#f3eaff",
                    "surface-container-low": "#1c1b1c",
                    "on-surface": "#e5e2e3",
                    "primary": "#d0bcff",
                    "surface-container": "#201f20",
                    "tertiary-fixed": "#63f7ff",
                    "on-tertiary": "#003739",
                    "tertiary-fixed-dim": "#00dce5"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "md": "16px",
                    "xl": "40px",
                    "sm": "8px",
                    "lg": "24px",
                    "xs": "4px",
                    "unit": "4px",
                    "gutter": "12px",
                    "container-margin": "20px"
            },
            "fontFamily": {
                    "body-base": ["Inter"],
                    "mono-code": ["JetBrains Mono"],
                    "label-caps": ["JetBrains Mono"],
                    "headline-md": ["Inter"],
                    "headline-xl": ["Inter"]
            },
            "fontSize": {
                    "body-base": ["14px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                    "mono-code": ["13px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-caps": ["11px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "headline-md": ["20px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-xl": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .node-active {
            box-shadow: 0 0 15px rgba(125, 60, 255, 0.4), inset 0 0 10px rgba(125, 60, 255, 0.2);
        }
        .pulse-glow {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.2); }
        }
        .map-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#050505] text-on-background font-body-base antialiased overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-[#050505]/80 backdrop-blur-md border-b border-white/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-purple-500" style="font-variation-settings: 'FILL' 1;">bubble_chart</span>
<h1 class="text-xl font-black tracking-widest text-purple-500 uppercase font-headline-md">AgentLogic</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400 hover:bg-white/5 transition-colors p-2 rounded-full cursor-pointer">account_circle</span>
</div>
</header>
<!-- Main Canvas: Ecosystem Map -->
<main class="relative w-full h-screen pt-16 pb-24 overflow-hidden map-grid">
<!-- SVG Connections Layer -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-40" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="grad1" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#7d3cff;stop-opacity:0.8"></stop>
<stop offset="100%" style="stop-color:#0043eb;stop-opacity:0.8"></stop>
</lineargradient>
</defs>
<!-- Data Flow Lines -->
<path d="M 100 250 Q 200 150 300 220" fill="none" stroke="url(#grad1)" stroke-dasharray="8 4" stroke-width="2"></path>
<path d="M 300 220 Q 250 400 150 450" fill="none" opacity="0.4" stroke="#0043eb" stroke-width="2"></path>
<path class="opacity-60" d="M 300 220 L 350 550" fill="none" stroke="#7d3cff" stroke-width="3"></path>
<path d="M 50 450 C 150 550 250 500 350 550" fill="none" stroke="url(#grad1)" stroke-width="1.5"></path>
</svg>
<!-- Nodes (Agents) -->
<div class="absolute top-[20%] left-[15%] group">
<div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center node-active border-primary border-2 relative cursor-pointer active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">psychology</span>
<div class="absolute -top-1 -right-1 w-3 h-3 bg-tertiary rounded-full pulse-glow"></div>
</div>
<p class="mt-2 text-center font-mono-code text-[10px] text-primary uppercase tracking-tighter">Neuro_Core</p>
</div>
<div class="absolute top-[25%] right-[10%] group">
<div class="w-10 h-10 rounded-full glass-panel flex items-center justify-center border-slate-700 border opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-slate-400 text-lg">database</span>
</div>
<p class="mt-2 text-center font-mono-code text-[10px] text-slate-500 uppercase tracking-tighter">Mem_Vault</p>
</div>
<div class="absolute bottom-[30%] left-[20%] group">
<div class="w-14 h-14 rounded-full glass-panel flex items-center justify-center border-secondary-container border-2 node-active cursor-pointer">
<span class="material-symbols-outlined text-secondary text-2xl" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<p class="mt-2 text-center font-mono-code text-[10px] text-secondary uppercase tracking-tighter">Exec_Node_01</p>
</div>
<div class="absolute bottom-[15%] right-[25%] group">
<div class="w-10 h-10 rounded-full glass-panel flex items-center justify-center border-slate-700 border opacity-40">
<span class="material-symbols-outlined text-slate-600 text-lg">shield_with_heart</span>
</div>
<p class="mt-2 text-center font-mono-code text-[10px] text-slate-600 uppercase tracking-tighter">Safe_Guard</p>
</div>
<!-- Selected Agent Overlay Card (Status Overlay) -->
<div class="absolute bottom-28 left-5 right-5 z-40">
<div class="glass-panel rounded-xl p-4 shadow-2xl border-t-white/20">
<div class="flex justify-between items-start mb-4">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="text-label-caps font-mono-code text-primary uppercase tracking-widest">Active Agent</span>
<span class="w-1.5 h-1.5 rounded-full bg-tertiary shadow-[0_0_8px_#00dce5]"></span>
</div>
<h2 class="font-headline-md text-on-surface text-lg">Neuro_Core_Alpha</h2>
</div>
<div class="bg-primary/10 px-3 py-1 rounded-full border border-primary/20">
<span class="text-[10px] font-mono-code text-primary font-bold">EXECUTING</span>
</div>
</div>
<div class="grid grid-cols-3 gap-3 mb-4">
<div class="bg-white/5 p-2 rounded-lg border border-white/5">
<p class="text-[9px] font-mono-code text-slate-500 uppercase">Latency</p>
<p class="text-sm font-mono-code text-tertiary">24ms</p>
</div>
<div class="bg-white/5 p-2 rounded-lg border border-white/5">
<p class="text-[9px] font-mono-code text-slate-500 uppercase">Load</p>
<p class="text-sm font-mono-code text-on-surface">62%</p>
</div>
<div class="bg-white/5 p-2 rounded-lg border border-white/5">
<p class="text-[9px] font-mono-code text-slate-500 uppercase">Uptime</p>
<p class="text-sm font-mono-code text-on-surface">14d</p>
</div>
</div>
<div class="flex gap-2">
<button class="flex-1 bg-primary-container text-on-primary-container py-2 rounded-lg font-label-caps text-[10px] active:scale-95 transition-transform uppercase tracking-widest">Intervene</button>
<button class="flex-1 border border-outline-variant text-on-surface-variant py-2 rounded-lg font-label-caps text-[10px] active:scale-95 transition-transform uppercase tracking-widest">Logs</button>
</div>
</div>
</div>
<!-- Visual Noise/Background Decoration -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] pointer-events-none z-0">
<div class="w-full h-full opacity-20" style="background: radial-gradient(circle at 50% 50%, rgba(125,60,255,0.15) 0%, transparent 70%);"></div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-3 pb-8 bg-[#050505]/60 backdrop-blur-2xl border-t border-white/10 rounded-t-3xl shadow-[0_-10px_40px_rgba(125,60,255,0.1)]">
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-slate-300 transition-all group" href="#">
<span class="material-symbols-outlined mb-1 group-active:scale-90 duration-150">science</span>
<span class="font-inter text-[10px] uppercase tracking-widest font-semibold">Lab</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-slate-300 transition-all group" href="#">
<span class="material-symbols-outlined mb-1 group-active:scale-90 duration-150">receipt_long</span>
<span class="font-inter text-[10px] uppercase tracking-widest font-semibold">Queue</span>
</a>
<!-- ACTIVE TAB: Map -->
<a class="flex flex-col items-center justify-center text-purple-400 bg-purple-500/10 rounded-2xl px-3 py-1.5 shadow-[inset_0_0_10px_rgba(125,60,255,0.2)] transition-all" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">hub</span>
<span class="font-inter text-[10px] uppercase tracking-widest font-semibold">Map</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-slate-300 transition-all group" href="#">
<span class="material-symbols-outlined mb-1 group-active:scale-90 duration-150">monitoring</span>
<span class="font-inter text-[10px] uppercase tracking-widest font-semibold">Stats</span>
</a>
</nav>
<!-- FAB (Contextual for Map) -->
<button class="fixed bottom-32 right-6 w-14 h-14 rounded-full bg-primary shadow-[0_0_20px_rgba(125,60,255,0.5)] flex items-center justify-center text-white z-50 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</body></html>
