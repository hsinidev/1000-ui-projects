<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
    }
    .knurled-dial {
      background: conic-gradient(from 0deg, #222, #444, #222, #444, #222);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 4px 12px rgba(0,0,0,0.5);
    }
    .wave-line {
      mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    }
    .brushed-metal {
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      position: relative;
    }
    .brushed-metal::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    .recessed-groove {
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.9);
      background: #0e0e0e;
    }
  </style>
<style>
    body {

<body class="bg-background text-on-background font-body-md selection:bg-primary/30">
<!-- TopAppBar Component -->
<header class="fixed top-0 left-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-outline-variant/30 flex justify-between items-center px-margin-mobile h-16">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity cursor-pointer active:scale-95 duration-150" data-icon="menu">menu</span>
<h1 class="font-display-lg text-headline-md tracking-tighter text-on-background">AUDIO-PRIME</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity cursor-pointer active:scale-95 duration-150" data-icon="bluetooth_connected">bluetooth_connected</span>
</div>
</header>
<main class="pt-16 pb-24 min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Macro Visual -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<img class="w-full h-full object-cover mix-blend-luminosity" data-alt="A high-fidelity macro photograph of a professional studio headphone's ear cup mesh, showing incredible detail of the silver metallic weave and deep charcoal leather textures. The lighting is moody and directional, highlighting the technical precision of the hardware. The atmosphere is quiet, dark, and immersive, reflecting a premium audiophile aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZMYG4ds1NHWb3X8lgpATaSouUNaA4x_lAVqKcA92vDnli4n9rd4m4jjYV4Gjo7ahwhEYTqjNoJzyCc9K_scf-J4xcvxd7FstynqYmBBelnN7OJqWj2ibh7x2lciEa66lt5chNdLtH7nbeyxEDGg5h1FAhIeV5jdlg3dmbXIs3ghQrZUPF9ihkLc2zmEbtgvnZTqYToWha2tfybzr3hD1WEmUBWe0q7Dpr74IXTA3AEqf1xG_XocLCV_QWGwXg7A6cdZnnFW_Ei7Y"/>
</div>
<!-- Central UI Container -->
<div class="relative z-10 w-full max-w-container-max px-margin-mobile flex flex-col items-center">
<!-- Screen Identity -->
<div class="text-center mb-12">
<p class="font-label-caps text-label-caps text-primary mb-2 tracking-[0.2em]">PRECISION ANC MODULE</p>
<h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background">The Silence</h2>
</div>
<!-- ANC Visualizer Module -->
<div class="w-full max-w-2xl brushed-metal rounded-xl p-8 border-t border-white/10 shadow-2xl">
<!-- Wave Visualization Canvas -->
<div class="h-48 w-full recessed-groove rounded-lg mb-10 relative overflow-hidden flex items-center justify-center">
<!-- External Noise Wave (Subtle Silver) -->
<svg class="absolute w-full h-full wave-line opacity-30" preserveaspectratio="none" viewbox="0 0 800 200">
<path d="M0,100 Q100,20 200,100 T400,100 T600,100 T800,100" fill="none" stroke="#c6c6c6" stroke-width="1"></path>
</svg>
<!-- Anti-Phase Wave (Glowing Copper) -->
<svg class="absolute w-full h-full wave-line" preserveaspectratio="none" viewbox="0 0 800 200">
<path d="M0,100 Q100,180 200,100 T400,100 T600,100 T800,100" fill="none" stroke="#ffb77b" stroke-width="2" style="filter: drop-shadow(0 0 8px #ffb77b);"></path>
</svg>
<div class="absolute bottom-4 left-4 font-data-viz text-data-viz text-secondary/40">AMBIENT: 42dB</div>
<div class="absolute bottom-4 right-4 font-data-viz text-data-viz text-primary">REDUCTION: -32dB</div>
</div>
<!-- Main Quiet Interaction -->
<div class="flex flex-col items-center gap-8">
<div class="relative group">
<!-- Dial Glow -->
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full opacity-50 transition-opacity duration-1000 group-hover:opacity-80"></div>
<!-- Technical Dial -->
<button class="relative w-40 h-40 rounded-full knurled-dial border-4 border-surface-container flex items-center justify-center active:scale-90 transition-all duration-200">
<div class="w-full h-full rounded-full border-t border-primary/40 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="graphic_eq" data-weight="fill">graphic_eq</span>
</div>
<!-- Indicator -->
<div class="absolute top-4 w-1.5 h-4 bg-primary rounded-full shadow-[0_0_10px_rgba(255,183,123,0.8)]"></div>
</button>
</div>
<div class="text-center">
<span class="font-label-caps text-label-caps text-on-surface-variant block mb-4">ANC INTENSITY</span>
<div class="flex items-center gap-6">
<span class="font-data-viz text-data-viz text-secondary">OFF</span>
<div class="w-48 h-1.5 recessed-groove rounded-full relative">
<div class="absolute top-0 left-0 h-full w-3/4 bg-primary rounded-full shadow-[0_0_8px_rgba(255,183,123,0.5)]"></div>
<div class="absolute top-1/2 left-3/4 -translate-y-1/2 -translate-x-1/2 w-4 h-6 bg-primary rounded-sm border border-black/20 cursor-pointer shadow-lg"></div>
</div>
<span class="font-data-viz text-data-viz text-primary">MAX</span>
</div>
</div>
</div>
</div>
<!-- Technical Specs Grid (Bento style) -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter w-full max-w-4xl mt-12">
<div class="brushed-metal p-6 rounded-lg border-t border-white/5 flex flex-col justify-between h-32">
<span class="font-label-caps text-label-caps text-on-surface-variant">ISOLATION MODE</span>
<div class="flex justify-between items-end">
<span class="font-headline-md text-headline-md text-on-background">Studio Deep</span>
<span class="material-symbols-outlined text-primary" data-icon="shield">shield</span>
</div>
</div>
<div class="brushed-metal p-6 rounded-lg border-t border-white/5 flex flex-col justify-between h-32">
<span class="font-label-caps text-label-caps text-on-surface-variant">TRANSPARENCY</span>
<div class="flex justify-between items-end">
<span class="font-headline-md text-headline-md text-secondary">Inactive</span>
<span class="material-symbols-outlined text-secondary/40" data-icon="hearing">hearing</span>
</div>
</div>
<div class="brushed-metal p-6 rounded-lg border-t border-white/5 flex flex-col justify-between h-32">
<span class="font-label-caps text-label-caps text-on-surface-variant">WIND NOISE RED.</span>
<div class="flex justify-between items-end">
<span class="font-headline-md text-headline-md text-on-background">Adaptive</span>
<span class="material-symbols-outlined text-primary" data-icon="air">air</span>
</div>
</div>
</div>
</div>
</main>

<span class="material-symbols-outlined mb-1" data-icon="support_agent">support_agent</span>
