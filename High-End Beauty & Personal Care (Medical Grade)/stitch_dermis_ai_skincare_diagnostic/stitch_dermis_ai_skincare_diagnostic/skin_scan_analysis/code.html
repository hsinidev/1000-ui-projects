<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#221610",
            },
            fontFamily: {
              "display": ["Public Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #ec5b13, transparent);
            box-shadow: 0 0 15px #ec5b13;
            width: 80%;
            position: absolute;
            left: 10%;
            top: 20%;
        }
        .frosted-control {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .face-guide {
            border: 2px dashed rgba(236, 91, 19, 0.5);
            border-radius: 120px 120px 150px 150px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white overflow-hidden">
<!-- Main Camera Viewport -->
<div class="relative h-screen w-full flex flex-col overflow-hidden">
<!-- Live Camera Feed (Background Image Placeholder) -->
<div class="absolute inset-0 z-0">
<img class="h-full w-full object-cover grayscale-[0.2]" data-alt="A detailed close-up of a person's face positioned for a medical skin scan. The subject's complexion is clear and well-lit by soft, natural studio lighting that highlights skin texture. The background is a clean, clinical white environment. The overall aesthetic is professional, modern, and health-focused, using a warm primary orange accent to highlight diagnostic areas. The mood is calm and technologically advanced." src="https://lh3.googleusercontent.com/aida-public/AB6AXuChn5sd6A19w_EhjMPSjAii5Qdgv89DNfwG-h0TsiXNrwRbtueW-dZX6Ibmkn8BXDgs41IuJELcyCgaotidJuTYDMYwH2n76lwFD58z3I6nbYIigN0PcricHIzXw5GdWvKUyVIuUZVzXnH4hK-WcxdpViI6ePdh-4Pa2vHOl4IMN_jD8gjgFDbtBf_wjGohfxnyKOstuaz7ZlvPe9kiCaPGVYmdPXii4PK_wsxUG_ZzD2ZVX2GImtShmVbUxZD5lYyltQswdjvXX6e8"/>
<!-- Scan-line Overlay -->
<div class="scan-line"></div>
<!-- Face Positioning Guide -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="face-guide w-[280px] h-[380px] mt-[-60px]"></div>
</div>
</div>
<!-- Top Navigation (Shared Component Style - Modified for Context) -->
<div class="relative z-10 flex items-center bg-black/20 backdrop-blur-md p-4 justify-between">
<div class="text-white flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Skin Analysis</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 bg-transparent text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined">help</span>
</button>
</div>
</div>
<!-- Lighting Guide Indicators -->
<div class="relative z-10 flex flex-col gap-3 p-4 bg-gradient-to-b from-black/40 to-transparent">
<div class="flex gap-6 justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">wb_sunny</span>
<p class="text-white text-base font-medium leading-normal">Lighting Guide</p>
</div>
<p class="text-white text-sm font-bold leading-normal px-2 py-0.5 rounded bg-primary">PERFECT</p>
</div>
<div class="rounded-full bg-white/20 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 85%;"></div>
</div>
<p class="text-white/80 text-xs font-normal leading-normal">Position your face within the guide for optimal results</p>
</div>
<!-- Texture-Zoom Circular Inset -->
<div class="absolute top-40 right-4 z-10">
<div class="relative size-32 rounded-full border-4 border-primary overflow-hidden shadow-2xl">
<img class="h-full w-full object-cover scale-[2.5]" data-alt="An extreme macro close-up of human skin texture showing pores and fine details in high definition. The lighting is harsh and directional to emphasize surface topography for dermatological analysis. The color palette is natural skin tones with clinical clarity. The image reflects a high-tech medical imaging style used for deep diagnostic purposes in a modern skincare app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqPZmM65UkCTqkX8zWPmpulbllsqhMBHdjLIksFklQYl7B2hIz1ZZqP4yphtrealti3eA-gKNxKyPwu4zpqSY4ZyXtCrsX3pFAbcLTSkqID9EFyxKiQGe908os32hKQ4JJThHrB841Wx_xsOuvM6UOa6THtURTxwIP9sWcwv6uL1KqFx2q-RM4ZenxVtqojYliVojUtFvBxcXLvS1Dm_99B7prDlM9PgpeyynzfBmZHiQ3qKPBsXJV29QQDDlL-VH3jeLWFqyqPMw7"/>
<div class="absolute inset-0 bg-primary/10 flex items-center justify-center pointer-events-none">
<div class="size-1 bg-primary rounded-full"></div>
</div>
</div>
<p class="text-center text-[10px] font-bold mt-2 bg-black/60 rounded-full py-1 backdrop-blur-sm">2.5x ZOOM</p>
</div>
<!-- Bottom Controls -->
<div class="mt-auto relative z-10 p-8 flex flex-col gap-8">
<!-- Settings Toggles -->
<div class="flex items-center justify-between frosted-control px-4 py-3 rounded-xl">
<div class="flex items-center gap-3">
<div class="text-white flex items-center justify-center rounded-lg bg-primary/20 shrink-0 size-10">
<span class="material-symbols-outlined text-primary">zoom_in</span>
</div>
<p class="text-white text-sm font-medium">Texture-Zoom</p>
</div>
<label class="relative flex h-[28px] w-[48px] cursor-pointer items-center rounded-full border-none bg-white/20 p-0.5 has-[:checked]:justify-end has-[:checked]:bg-primary transition-all">
<div class="h-full w-[24px] rounded-full bg-white shadow-md"></div>
<input checked="" class="invisible absolute" type="checkbox"/>
</label>
</div>
<!-- Main Shutter Bar -->
<div class="flex items-center justify-center gap-8">
<!-- Flash Toggle -->
<button class="flex shrink-0 items-center justify-center rounded-full size-12 frosted-control text-white hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined">flash_auto</span>
</button>
<!-- Main Shutter Button -->
<button class="relative flex shrink-0 items-center justify-center rounded-full size-24 border-4 border-white/30 p-1">
<div class="size-full bg-white rounded-full flex items-center justify-center hover:scale-95 transition-transform">
<div class="size-16 rounded-full border-2 border-primary"></div>
</div>
</button>
<!-- Gallery/History -->
<button class="flex shrink-0 items-center justify-center rounded-full size-12 frosted-control text-white hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined">history</span>
</button>
</div>
<!-- Capture Tips -->
<div class="flex justify-center">
<div class="flex items-center gap-2 px-4 py-2 bg-black/40 backdrop-blur-md rounded-full border border-white/10">
<span class="size-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[10px] uppercase tracking-widest font-bold">Ready to capture</span>
</div>
</div>
</div>
<!-- Device Notch Safe Area Spacer -->
<div class="h-6 bg-background-dark"></div>
</div>
</body></html>
