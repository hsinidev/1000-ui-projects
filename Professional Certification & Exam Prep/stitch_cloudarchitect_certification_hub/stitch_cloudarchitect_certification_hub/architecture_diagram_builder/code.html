<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

                  "secondary-fixed": "#7df4ff",

      },
    }

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    .grid-canvas {
      background-image: 
        linear-gradient(to right, rgba(144, 144, 150, 0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(144, 144, 150, 0.1) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .neon-glow-active {
      box-shadow: 0 0 10px rgba(0, 219, 233, 0.3);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-20">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-surface-dim dark:bg-surface-dim border-b border-outline-variant">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary-fixed-dim" data-icon="terminal">terminal</span>
<h1 class="font-headline-md text-headline-md font-bold text-secondary-fixed-dim uppercase tracking-tighter">CloudArchitect</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary-fixed-dim" data-icon="sensors">sensors</span>
</div>
</header>
<main class="pt-16 px-4">
<!-- Solution Architect Scenario Selector -->
<section class="mt-6">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant opacity-70">ACTIVE SCENARIO</label>
<div class="relative">
<select class="w-full bg-surface-container border border-outline-variant text-on-surface font-headline-md text-headline-md px-4 py-3 appearance-none focus:outline-none focus:border-secondary-fixed-dim rounded-none">
<option>Multi-Region High Availability</option>
<option>Serverless Data Pipeline</option>
<option>Kubernetes Hybrid Cluster</option>
<option>Disaster Recovery Hub</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-secondary-fixed-dim">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Technical Toolbar -->
<section class="mt-6 overflow-x-auto">
<div class="flex gap-2 pb-2 scrollbar-hide">
<button class="flex flex-col items-center justify-center min-w-[72px] h-20 bg-surface-container-high border border-outline-variant hover:border-secondary-fixed-dim transition-colors group">
<span class="material-symbols-outlined text-secondary-fixed-dim group-hover:scale-110 transition-transform" data-icon="dns">dns</span>
<span class="font-code-sm text-code-sm mt-1 text-on-surface-variant">EC2</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[72px] h-20 bg-surface-container-high border border-outline-variant hover:border-secondary-fixed-dim transition-colors group">
<span class="material-symbols-outlined text-secondary-fixed-dim group-hover:scale-110 transition-transform" data-icon="database">database</span>
<span class="font-code-sm text-code-sm mt-1 text-on-surface-variant">RDS</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[72px] h-20 bg-surface-container-high border border-outline-variant hover:border-secondary-fixed-dim transition-colors group">
<span class="material-symbols-outlined text-secondary-fixed-dim group-hover:scale-110 transition-transform" data-icon="cloud_queue">cloud_queue</span>
<span class="font-code-sm text-code-sm mt-1 text-on-surface-variant">VPC</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[72px] h-20 bg-surface-container-high border border-outline-variant hover:border-secondary-fixed-dim transition-colors group">
<span class="material-symbols-outlined text-secondary-fixed-dim group-hover:scale-110 transition-transform" data-icon="storage">storage</span>
<span class="font-code-sm text-code-sm mt-1 text-on-surface-variant">S3</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[72px] h-20 bg-surface-container-high border border-outline-variant hover:border-secondary-fixed-dim transition-colors group">
<span class="material-symbols-outlined text-secondary-fixed-dim group-hover:scale-110 transition-transform" data-icon="hub">hub</span>
<span class="font-code-sm text-code-sm mt-1 text-on-surface-variant">LB</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[72px] h-20 bg-surface-container-high border border-outline-variant hover:border-secondary-fixed-dim transition-colors group">
<span class="material-symbols-outlined text-secondary-fixed-dim group-hover:scale-110 transition-transform" data-icon="javascript">javascript</span>
<span class="font-code-sm text-code-sm mt-1 text-on-surface-variant">LAMBDA</span>
</button>
</div>
</section>
<!-- Canvas Area -->
<section class="mt-6 relative">
<div class="w-full aspect-[4/5] bg-surface-container-lowest border border-outline-variant grid-canvas relative overflow-hidden">
<!-- Floating Schematic Elements -->
<div class="absolute top-10 left-10 p-4 bg-surface-container border border-secondary-fixed-dim neon-glow-active flex flex-col items-center gap-1 z-10">
<span class="material-symbols-outlined text-secondary-fixed-dim" data-icon="dns">dns</span>
<span class="font-code-sm text-code-sm">WEB_SRV_01</span>
</div>
<div class="absolute top-10 right-10 p-4 bg-surface-container border border-outline-variant flex flex-col items-center gap-1 opacity-60">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="dns">dns</span>
<span class="font-code-sm text-code-sm">WEB_SRV_02</span>
</div>
<div class="absolute bottom-20 left-1/2 -translate-x-1/2 p-4 bg-surface-container border border-outline-variant flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-secondary-fixed-dim" data-icon="database">database</span>
<span class="font-code-sm text-code-sm">PROD_DB_CLUSTER</span>
</div>
<!-- Connection Lines -->
<svg class="absolute inset-0 w-full h-full pointer-events-none">
<path d="M 64 80 L 190 320" fill="none" stroke="#00dbe9" stroke-dasharray="4 2" stroke-width="1"></path>
<path d="M 310 80 L 190 320" fill="none" stroke="#909096" stroke-dasharray="4 2" stroke-width="1"></path>
</svg>
<!-- Tooltip -->
<div class="absolute bottom-4 left-4 right-4 bg-surface-container-highest/90 p-3 border border-outline-variant backdrop-blur-md">
<p class="font-code-sm text-code-sm text-secondary-fixed-dim flex items-center gap-2">
<span class="material-symbols-outlined text-sm">info</span>
            DRAG COMPONENTS TO CANVAS
          </p>
</div>
</div>
<!-- Canvas Controls -->
<div class="absolute top-4 right-4 flex flex-col gap-2">
<button class="w-10 h-10 bg-surface-container-highest border border-outline-variant flex items-center justify-center hover:bg-secondary-fixed-dim hover:text-background transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<button class="w-10 h-10 bg-surface-container-highest border border-outline-variant flex items-center justify-center hover:bg-secondary-fixed-dim hover:text-background transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="w-10 h-10 bg-surface-container-highest border border-outline-variant flex items-center justify-center hover:bg-secondary-fixed-dim hover:text-background transition-colors">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
</section>
<!-- Component Properties (Bento-ish Mobile Section) -->
<section class="mt-8 mb-12">
<h3 class="font-label-caps text-label-caps text-on-surface-variant mb-4">ENTITY CONFIGURATION</h3>
<div class="grid grid-cols-2 gap-3">
<div class="col-span-2 bg-surface-container p-4 border border-outline-variant">
<span class="font-label-caps text-[10px] text-secondary-fixed-dim">INSTANCE_TYPE</span>
<p class="font-headline-md text-headline-md">t3.xlarge</p>
</div>
<div class="bg-surface-container p-4 border border-outline-variant">
<span class="font-label-caps text-[10px] text-on-surface-variant">VCPU</span>
<p class="font-headline-md text-headline-md">4.0</p>
</div>
<div class="bg-surface-container p-4 border border-outline-variant">
<span class="font-label-caps text-[10px] text-on-surface-variant">RAM</span>
<p class="font-headline-md text-headline-md">16GB</p>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 bg-surface-container-lowest dark:bg-surface-container-lowest border-t border-outline-variant">
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 p-1 hover:text-secondary-fixed transition-all" href="#">
<span class="material-symbols-outlined" data-icon="biotech">biotech</span>
<span class="font-label-caps text-label-caps mt-1">Labs</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary-fixed-dim bg-secondary-container/20 p-1 ring-1 ring-secondary-fixed-dim duration-300" href="#">
<span class="material-symbols-outlined" data-icon="architecture">architecture</span>
<span class="font-label-caps text-label-caps mt-1">Builder</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 p-1 hover:text-secondary-fixed transition-all" href="#">

<span class="font-label-caps text-label-caps mt-1">Exams</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 p-1 hover:text-secondary-fixed transition-all" href="#">
<span class="material-symbols-outlined" data-icon="route">route</span>
<span class="font-label-caps text-label-caps mt-1">Roadmap</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 p-1 hover:text-secondary-fixed transition-all" href="#">
<span class="material-symbols-outlined" data-icon="description">description</span>
<span class="font-label-caps text-label-caps mt-1">Papers</span>
</a>
</nav>
</body></html>
