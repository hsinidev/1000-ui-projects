<!DOCTYPE html>

<title>Member Portal | STUDIO NORDIC</title>

                        "margin-page": "64px"

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Top Header (Minimal) -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-sm border-b border-surface-container-highest/30">
<div class="max-w-[1440px] mx-auto px-8 md:px-16 py-6 flex justify-center">
<span class="text-2xl font-light tracking-[0.2em] text-on-background font-display-lg uppercase">STUDIO NORDIC</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-6 pt-32 pb-16">
<div class="grid grid-cols-1 md:grid-cols-12 max-w-[1200px] w-full gap-gutter">
<!-- Left Imagery (Editorial Feel) -->
<div class="hidden md:flex md:col-span-7 h-[700px] bg-surface-container overflow-hidden items-center justify-center">
<img class="w-full h-full object-cover grayscale opacity-90 transition-opacity duration-700 hover:opacity-100" data-alt="A serene Scandinavian architectural interior with vast white walls, a single minimalist wooden chair, and soft natural morning light streaming through a tall window. The image captures a sense of stillness and clarity, using a monochromatic color palette of soft whites and charcoal accents. The photography is high-key and editorial, emphasizing clean lines and breathable negative space." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCR_MZA5AeCP-7ssm5s4QBJFfBRKjqNAjMxeUHqG_pEz1zCP0hwg2Y6JefaxJ9c-FbRZcmSGhHQEalL_T0cQFY3SgAP5fsTq_NE8SSDSSR4f5uLFTqJXzvW7ACPRPmXZe6tSkirsf2Em11cy0Ej_RRllcgsBZVpCYZuXwhgmfljRwJdAidCLFfnXeaxmn-N-xlBiHyBZgoF9Vp4H1ktDbr0EVSwdZ6J1558fn3gp1Edy5HqwCBCmzxo9sxwGHfS0uJzBByBBi3Mpsw"/>
</div>
<!-- Authentication Card -->
<div class="md:col-span-5 flex flex-col justify-center py-8">
<div class="max-w-[400px] w-full mx-auto">
<div class="mb-stack-lg">
<h1 class="font-headline-md text-on-background mb-unit italic">The Member Portal</h1>
<p class="font-body-md text-on-surface-variant leading-relaxed">Enter your credentials to access the private archives and project dashboards.</p>
</div>
<!-- Sign In Form -->
<form class="space-y-stack-md">
<div class="group">
<label class="block font-label-caps text-on-surface-variant uppercase mb-2" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-outline-variant" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 pl-8 focus:ring-0 focus:border-primary transition-colors text-body-md placeholder-outline-variant/50" id="email" name="email" placeholder="hello@nordic.com" type="email"/>
</div>
</div>
<div class="group">
<label class="block font-label-caps text-on-surface-variant uppercase mb-2" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-outline-variant" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 pl-8 focus:ring-0 focus:border-primary transition-colors text-body-md placeholder-outline-variant/50" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between pt-2">
<div class="flex items-center">
<input class="w-4 h-4 border-outline-variant rounded-none text-primary focus:ring-0" id="remember" type="checkbox"/>
<label class="ml-2 font-caption text-on-surface-variant" for="remember">Stay signed in</label>
</div>
<a class="font-caption text-primary hover:underline underline-offset-4" href="#">Forgot password?</a>
</div>
<div class="pt-stack-md">
<button class="w-full bg-primary text-white font-label-caps py-4 transition-all hover:bg-on-background/90 uppercase tracking-widest" type="submit">
                                Sign In
                            </button>
</div>
</form>
<!-- Request Access Section -->
<div class="mt-section-gap border-t border-outline-variant/20 pt-stack-md">
<div class="space-y-unit">
<p class="font-caption text-on-surface-variant">New to Studio Nordic?</p>
<a class="inline-flex items-center group" href="#">
<span class="font-label-caps text-primary border-b border-primary pb-1 group-hover:border-transparent transition-all">Request Access</span>
<span class="material-symbols-outlined ml-2 transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</a>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Minimal Footer -->
<footer class="w-full bg-surface py-12 border-t border-surface-container-highest/30">
<div class="max-w-[1440px] mx-auto px-8 md:px-16 flex flex-col md:flex-row justify-between items-center gap-6">
<span class="font-label-caps text-[11px] text-on-primary-container tracking-[0.15em] uppercase">© 2024 Studio Nordic. Designed for Stillness.</span>
<div class="flex gap-8">
<a class="font-label-caps text-[11px] text-on-primary-container hover:text-primary transition-colors uppercase tracking-widest" href="#">Privacy Policy</a>
<a class="font-label-caps text-[11px] text-on-primary-container hover:text-primary transition-colors uppercase tracking-widest" href="#">Terms</a>
<a class="font-label-caps text-[11px] text-on-primary-container hover:text-primary transition-colors uppercase tracking-widest" href="#">Support</a>
</div>
</div>
</footer>
</body></html>
