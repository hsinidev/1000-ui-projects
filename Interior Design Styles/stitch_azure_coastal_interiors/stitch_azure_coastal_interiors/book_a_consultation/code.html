<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-white">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-lg dark:bg-slate-950/80 shadow-sm shadow-blue-900/5 border-b border-blue-50/20">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-7xl mx-auto">
<button class="text-[#0047AB] hover:opacity-70 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-serif italic text-xl text-[#0047AB] tracking-wide">Mediterranean Breeze</h1>
<button class="text-[#0047AB] hover:opacity-70 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="min-h-screen pt-16 pb-32">
<!-- Hero Background Section -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-white/20"></div>
<img class="w-full h-full object-cover brightness-110 saturate-[0.85]" data-alt="A sun-drenched coastal architectural office with high ceilings and floor-to-ceiling windows overlooking the azure Mediterranean sea. The interior features minimalist white oak furniture, scattered architectural blueprints, and a soft golden hour light filtering through sheer linen curtains, creating a serene and aspirational atmosphere in a clean daylight-mode aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqOAi5F0dxAcj6kPhrr-ZQ21Am0eUMEzzEVYVyrYhFLJQ_IXReufZXlG-lAFWqtSRffJEC-vtM_t96qlRcXPZIXwrVjh_EszmzfFjwwX1tBNNu5UfkL4LqmgAOuJOVXRDAwYsC8hxxj83GRChFmL7a0Ce8frU64wInoJQL8Mg1SrDalCvPqPF8Z3xq2jletNvSC7MWHP3saoyAiR_ubFFwXI1WHLGAPl2wp8QMPrHjPlk2vFY4KILfXIu5WhJ88mi5Vk1303k1"/>
</div>
<!-- Consultation Form Content -->
<section class="relative z-10 px-container-margin py-section-gap flex flex-col items-center justify-center min-h-[calc(100vh-128px)]">
<div class="w-full max-w-lg animate-fade-in">
<div class="text-center mb-unit*6">
<h2 class="font-headline-lg text-headline-lg text-primary mb-unit italic">Consultation</h2>
<p class="font-body-lg text-body-lg text-secondary">Begin your architectural journey with us.</p>
</div>
<div class="form-glass p-10 rounded-xl shadow-[0_8px_32px_rgba(0,71,171,0.08)]">
<form class="space-y-unit*4">
<!-- Name Field -->
<div class="space-y-unit">
<label class="font-label-caps text-label-caps text-outline uppercase tracking-widest block">Full Name</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:ring-0 focus:border-primary px-0 py-2 transition-colors font-body-md placeholder:text-outline-variant" placeholder="ALEXANDROS GEORGIOU" type="text"/>
</div>
<!-- Project Type Field (Custom Styled Select) -->
<div class="space-y-unit*2 pt-unit">
<label class="font-label-caps text-label-caps text-outline uppercase tracking-widest block">Project Type</label>
<div class="grid grid-cols-3 gap-2">
<button class="border border-primary bg-primary/5 text-primary rounded-full py-2 font-label-caps text-center transition-all" type="button">Villas</button>
<button class="border border-outline-variant hover:border-primary text-secondary rounded-full py-2 font-label-caps text-center transition-all" type="button">Patios</button>
<button class="border border-outline-variant hover:border-primary text-secondary rounded-full py-2 font-label-caps text-center transition-all" type="button">Materials</button>
</div>
</div>
<!-- Date Field -->
<div class="space-y-unit pt-unit">
<label class="font-label-caps text-label-caps text-outline uppercase tracking-widest block">Preferred Date</label>
<div class="relative">
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:ring-0 focus:border-primary px-0 py-2 transition-colors font-body-md appearance-none" type="date"/>
<span class="material-symbols-outlined absolute right-0 bottom-2 text-outline-variant pointer-events-none" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<!-- Notes -->
<div class="space-y-unit pt-unit">
<label class="font-label-caps text-label-caps text-outline uppercase tracking-widest block">Project Vision (Optional)</label>
<textarea class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:ring-0 focus:border-primary px-0 py-2 transition-colors font-body-md placeholder:text-outline-variant resize-none" placeholder="Briefly describe your dream coastal space..." rows="2"></textarea>
</div>
<!-- Primary Action Button -->
<div class="pt-unit*4">
<button class="w-full bg-[#0047AB] text-on-primary py-touch-target rounded-lg font-label-caps text-sm tracking-[0.2em] uppercase hover:bg-primary transition-all shadow-lg shadow-blue-900/10 active:scale-[0.98]" type="submit">
                                Request Consultation
                            </button>
</div>
</form>
</div>
<div class="mt-section-gap text-center space-y-unit">
<p class="font-label-caps text-[10px] text-outline uppercase tracking-[0.3em]">Excellence in Craftsmanship</p>
<div class="flex justify-center space-x-unit*2">
<span class="material-symbols-outlined text-primary/40 text-sm" data-icon="verified">verified</span>
<span class="material-symbols-outlined text-primary/40 text-sm" data-icon="diamond">diamond</span>
<span class="material-symbols-outlined text-primary/40 text-sm" data-icon="architecture">architecture</span>
</div>
</div>
</div>
</section>

<nav class="fixed bottom-0 left-0 w-full h-20 bg-white/95 dark:bg-slate-900/95 flex justify-around items-center px-4 pb-safe z-50 rounded-t-3xl border-t border-blue-50/30 shadow-[0_-4px_20px_rgba(0,71,171,0.05)]">
<!-- Villas -->
<a class="flex flex-col items-center text-slate-400 hover:text-[#0047AB] transition-colors group" href="#">
<span class="material-symbols-outlined" data-icon="villa">villa</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Villas</span>
</a>
<!-- Patios -->
<a class="flex flex-col items-center text-slate-400 hover:text-[#0047AB] transition-colors group" href="#">
<span class="material-symbols-outlined" data-icon="deck">deck</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Patios</span>
</a>
<!-- Materials -->
<a class="flex flex-col items-center text-slate-400 hover:text-[#0047AB] transition-colors group" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Materials</span>
</a>
<!-- Consult (ACTIVE) -->
<a class="flex flex-col items-center text-[#0047AB] after:content-[''] after:w-1 after:h-1 after:bg-[#E2725B] after:rounded-full after:mt-1 transform -translate-y-1 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="event_available">event_available</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Consult</span>
</a>
</nav>
