<!DOCTYPE html>

<body class="bg-background font-body-md text-on-background overflow-hidden">
<!-- Hero Background Wrapper -->
<div class="relative min-h-screen w-full flex items-center justify-center p-container-margin bg-cover bg-center" data-alt="A sun-drenched Mediterranean villa terrace overlooking a calm, deep turquoise sea at golden hour. The architecture features crisp white limestone walls and elegant arches, with a soft daylight filter creating a warm, airy atmosphere. A hint of blurred bougainvillea in the foreground adds a touch of color, perfectly embodying a high-end luxury lifestyle and serene coastal aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBLGMDZBXGE2sHFSv0H0iENkBYgho542S7agDiRxXk6LtLec8Wr3HllDieXpD4HyJQlr2PXe6R5wQnqTd1TVZZf-oQh-8gJ7DWFwN2iO06sNW6SjovOmiqb-wp87HAlJG3BcQvTw2pX_JGstla5uTTH148JZube30FIUBzUAO8hJpjMUu-dq262PWoH0Cxheu46qRdTcRkjLh2xh0SLowgC_OF3WxlpeB4KI1RxX9-NTlFe-Llih-Z-2j--DGdiF4YfLWddtX0g');">
<!-- Overlay Scrim -->
<div class="absolute inset-0 bg-white/20 backdrop-blur-[2px]"></div>
<!-- Header (Contextual Suppression of Full Nav) -->
<header class="fixed top-0 left-0 right-0 h-20 flex justify-center items-center px-8 z-50">
<div class="text-2xl font-headline-lg font-bold text-primary tracking-tighter">LUXE MEDITERRANEAN</div>
</header>
<!-- Auth Card Container -->
<div class="relative z-10 w-full max-w-[480px]">
<div class="glass-panel p-10 shadow-2xl shadow-primary-container/10 border border-white/40">
<!-- Auth Header -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Welcome Back</h1>
<p class="font-body-md text-secondary">Continue your architectural journey.</p>
</div>
<!-- Social SSO Section -->
<div class="grid grid-cols-1 gap-3 mb-8">
<button class="w-full h-touch-target flex items-center justify-center gap-3 bg-white border border-outline-variant hover:border-primary transition-all duration-300 text-on-surface font-label-caps">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCx4NfRzUJ6BiP7gCts4scsFUqH9SS9Cg5xEnK8u2eyheYLqtc7lqoWaKHs7LK8nyHlLAvGeIQE1ri4_WvCmRmTW-jD8OanPd1NA8n7RnRa-AzfpB4DuBOZR7_1-VNh988qfZHLxVRYQUxIFhBxzVq0gBlqf_k_YSvaVi6AGPsZoMaZAzHDZNFuNEgmqy5dvPsqmd8pIn9X7h5rFIZt7hD_gfkN8abDP9OAwImMurKmlTeeb9WZ7yzJA1pXfxzMFNJsLApMRXsL"/>
                        Continue with Google
                    </button>
<button class="w-full h-touch-target flex items-center justify-center gap-3 bg-[#1877F2] hover:bg-primary transition-all duration-300 text-white font-label-caps">
<span class="material-symbols-outlined text-lg" data-icon="facebook">social_leaderboard</span>
                        Continue with Facebook
                    </button>
</div>
<div class="relative flex items-center mb-8">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label-caps text-[10px] text-outline">OR EMAIL</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Email Form -->
<form class="space-y-6">
<div class="relative">
<label class="block font-label-caps text-on-surface-variant mb-1 uppercase tracking-widest text-[10px]">Email Address</label>
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary-container outline-none py-2 transition-colors duration-300 placeholder:text-outline-variant/60 font-body-md" placeholder="concierge@luxe-med.com" type="email"/>
</div>
<div class="relative">
<div class="flex justify-between items-end mb-1">
<label class="block font-label-caps text-on-surface-variant uppercase tracking-widest text-[10px]">Password</label>
<a class="font-label-caps text-[10px] text-primary-container hover:underline underline-offset-4" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary-container outline-none py-2 transition-colors duration-300 placeholder:text-outline-variant/60 font-body-md" placeholder="••••••••" type="password"/>
</div>
<button class="w-full h-touch-target bg-primary-container text-white font-label-caps tracking-widest hover:bg-primary transition-all duration-300 shadow-lg shadow-primary-container/20" type="submit">
                        SIGN IN
                    </button>
</form>
<!-- Auth Footer -->
<div class="mt-10 text-center">
<p class="font-body-md text-secondary text-sm">
                        New to the collection? 
                        <a class="text-primary-container font-semibold hover:underline underline-offset-4 ml-1" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Design Accents -->
<div class="mt-6 flex justify-center gap-8">
<div class="flex items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-primary text-sm" data-icon="verified">verified</span>
<span class="font-label-caps text-[10px] text-on-surface uppercase">Exclusive Access</span>
</div>
<div class="flex items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-primary text-sm" data-icon="lock">lock</span>
<span class="font-label-caps text-[10px] text-on-surface uppercase">Secure Portal</span>
</div>
</div>
</div>
<!-- Footer (Contextual Shell) -->
<footer class="fixed bottom-8 left-0 right-0 flex justify-center items-center px-8 z-50">
<div class="flex gap-6">
<a class="font-label-caps text-[10px] text-secondary hover:text-primary transition-colors tracking-widest uppercase" href="#">Privacy Policy</a>
<a class="font-label-caps text-[10px] text-secondary hover:text-primary transition-colors tracking-widest uppercase" href="#">Concierge Support</a>
<a class="font-label-caps text-[10px] text-secondary hover:text-primary transition-colors tracking-widest uppercase" href="#">Terms of Service</a>
</div>
</footer>
</div>
