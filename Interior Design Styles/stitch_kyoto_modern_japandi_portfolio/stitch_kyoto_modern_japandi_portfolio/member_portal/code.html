<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400;700&amp;family=Manrope:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#e4e2dd",
                    "inverse-primary": "#edbe8e",
                    "secondary-container": "#e2dfde",
                    "tertiary-container": "#95938e",
                    "surface-variant": "#e4e2dd",
                    "primary-fixed-dim": "#edbe8e",
                    "on-error": "#ffffff",
                    "surface-container": "#f0eee9",
                    "primary": "#7b5730",
                    "outline-variant": "#d3c4b7",
                    "primary-container": "#b58b5f",
                    "surface": "#fbf9f4",
                    "tertiary-fixed-dim": "#c9c6c0",
                    "on-secondary-fixed": "#1c1b1b",
                    "surface-bright": "#fbf9f4",
                    "on-tertiary-container": "#2d2c28",
                    "on-secondary-fixed-variant": "#474746",
                    "surface-dim": "#dbdad5",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#e5e2e1",
                    "on-tertiary-fixed-variant": "#484743",
                    "on-background": "#1b1c19",
                    "secondary": "#5f5e5e",
                    "on-surface": "#1b1c19",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#30312e",
                    "tertiary-fixed": "#e5e2dc",
                    "on-surface-variant": "#4f453b",
                    "surface-tint": "#7b5730",
                    "surface-container-low": "#f5f3ee",
                    "error": "#ba1a1a",
                    "outline": "#81756a",
                    "on-tertiary-fixed": "#1c1c18",
                    "on-primary-container": "#412603",
                    "surface-container-high": "#eae8e3",
                    "primary-fixed": "#ffdcbc",
                    "on-primary-fixed": "#2c1700",
                    "on-error-container": "#93000a",
                    "tertiary": "#605e5a",
                    "on-primary-fixed-variant": "#60401b",
                    "inverse-on-surface": "#f2f1ec",
                    "background": "#fbf9f4",
                    "secondary-fixed-dim": "#c8c6c5",
                    "on-tertiary": "#ffffff",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#636262"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "ma-md": "64px",
                    "ma-sm": "32px",
                    "ma-lg": "128px",
                    "ma-xs": "16px",
                    "gutter": "24px",
                    "margin": "48px"
            },
            "fontFamily": {
                    "h1": ["Noto Serif"],
                    "label-caps": ["Manrope"],
                    "h2": ["Noto Serif"],
                    "h3": ["Noto Serif"],
                    "body-md": ["Manrope"],
                    "body-lg": ["Manrope"]
            },
            "fontSize": {
                    "h1": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600"}],
                    "h2": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                    "h3": ["24px", {"lineHeight": "1.3", "letterSpacing": "0em", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .washi-bg {
            background-color: #fbf9f4;
            background-image: radial-gradient(#d3c4b7 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            background-position: 0 0;
        }
    </style>
</head>
<body class="bg-surface washi-bg min-h-screen flex flex-col font-body-md text-on-surface">
<!-- TopNavBar: Ported from JSON Source of Truth -->
<!-- The "Destination" Rule suppression: This is a transactional page, but the user explicitly requested TopNavBar for exit. Customizing for "Back/Close" intent. -->
<nav class="flex justify-between items-center w-full px-12 py-8 max-w-[1920px] mx-auto docked full-width top-0 border-b border-[#D1D1D1] dark:border-[#333333] bg-[#F2F2F2] dark:bg-[#1A1A1A]">
<div class="text-2xl font-light tracking-[0.2em] text-black dark:text-white">Kyoto Modern</div>
<div class="hidden md:flex gap-ma-sm items-center font-['Noto_Serif'] text-sm tracking-widest uppercase">
<!-- Non-active links use style_inactive_navigation -->
<a class="text-[#757575] dark:text-[#A0A0A0] hover:text-black dark:hover:text-white transition-colors duration-300" href="#">Portfolio</a>
<a class="text-[#757575] dark:text-[#A0A0A0] hover:text-black dark:hover:text-white transition-colors duration-300" href="#">Philosophy</a>
<!-- Members is semantically closest to Login/SignUp context -->
<a class="text-black dark:text-white border-b border-black dark:border-white pb-1" href="#">Members</a>
</div>
<button class="bg-primary text-on-primary px-8 py-2 font-label-caps uppercase text-[10px] tracking-widest hover:opacity-80 transition-all duration-300">
            Exit
        </button>
</nav>
<!-- Main Content: Centered Transactional Portal -->
<main class="flex-grow flex items-center justify-center px-gutter py-ma-lg">
<div class="w-full max-w-[480px] bg-surface-container-lowest border border-outline-variant p-ma-md md:p-ma-lg relative overflow-hidden">
<!-- Architectural Accent Line -->
<div class="absolute top-0 left-0 w-2 h-full bg-primary-container"></div>
<header class="mb-ma-sm">
<h1 class="font-h2 text-h2 text-on-surface mb-2">Welcome</h1>
<p class="font-body-md text-on-surface-variant">Entrance to the modern sanctuary.</p>
</header>
<!-- Auth Form -->
<form class="space-y-ma-sm">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline py-2 px-0 focus:ring-0 focus:border-on-surface transition-colors duration-300 font-body-md placeholder:text-surface-dim" id="email" name="email" placeholder="design@kyotomodern.com" type="email"/>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="password">Security Token</label>
<input class="w-full bg-transparent border-0 border-b border-outline py-2 px-0 focus:ring-0 focus:border-on-surface transition-colors duration-300 font-body-md placeholder:text-surface-dim" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="pt-ma-xs flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 border-outline rounded-none text-primary focus:ring-0" type="checkbox"/>
<span class="font-label-caps text-[10px] text-on-surface-variant group-hover:text-on-surface transition-colors">REMEMBER IDENTITY</span>
</label>
<a class="font-label-caps text-[10px] text-primary hover:underline transition-all" href="#">RECOVER ACCESS</a>
</div>
<div class="pt-ma-sm">
<button class="w-full bg-on-background text-surface py-4 px-ma-sm font-label-caps uppercase tracking-[0.2em] hover:bg-primary transition-all duration-500 flex justify-between items-center group" type="submit">
<span>Continue Access</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
</button>
</div>
</form>
<!-- Switcher -->
<footer class="mt-ma-md pt-ma-sm border-t border-outline-variant flex flex-col gap-4">
<p class="font-body-md text-sm text-center text-on-surface-variant">New to the studio?</p>
<button class="w-full border border-on-background text-on-background py-4 px-ma-sm font-label-caps uppercase tracking-[0.2em] hover:bg-surface-container-high transition-all duration-300">
                    Create Account
                </button>
</footer>
</div>
</main>
<!-- Side Graphic (Desktop Only) - Zen Asymmetry -->
<div class="hidden lg:block fixed bottom-margin left-margin pointer-events-none opacity-20">
<div class="flex flex-col gap-2">
<div class="w-16 h-[1px] bg-on-surface"></div>
<div class="w-32 h-[1px] bg-on-surface"></div>
<div class="w-8 h-[1px] bg-on-surface"></div>
<span class="font-label-caps text-[10px] tracking-widest text-on-surface mt-4">K M 2 0 2 4</span>
</div>
</div>
<!-- Footer: Ported from JSON Source of Truth -->
<footer class="w-full py-16 px-12 flex flex-col md:flex-row justify-between items-start gap-8 full-width border-t border-[#D1D1D1] dark:border-[#333333] bg-[#F2F2F2] dark:bg-[#1A1A1A]">
<div class="flex flex-col gap-4">
<div class="text-lg font-light tracking-widest text-black dark:text-white">Kyoto Modern</div>
<p class="font-['Noto_Serif'] text-[10px] tracking-tighter text-[#757575]">© 2024 Kyoto Modern. Silence in Design.</p>
</div>
<div class="flex flex-wrap gap-ma-sm font-['Noto_Serif'] text-[10px] tracking-tighter">
<a class="text-[#757575] hover:text-[#B58B5F] underline transition-all" href="#">Sustainability</a>
<a class="text-[#757575] hover:text-[#B58B5F] underline transition-all" href="#">Shipping</a>
<a class="text-[#757575] hover:text-[#B58B5F] underline transition-all" href="#">FAQ</a>
<a class="text-[#757575] hover:text-[#B58B5F] underline transition-all" href="#">Press</a>
<a class="text-[#757575] hover:text-[#B58B5F] underline transition-all" href="#">Privacy</a>
</div>
</footer>
<!-- Decorative Material Element -->
<div class="fixed top-1/2 -right-12 -translate-y-1/2 rotate-90 pointer-events-none hidden xl:block">
<div class="bg-surface-container-high border border-outline-variant p-4 flex gap-4">
<div class="w-8 h-8 bg-[#7b5730]"></div>
<div class="w-8 h-8 bg-[#e4e2dd]"></div>
<div class="w-8 h-8 bg-[#30312e]"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant flex items-center px-4">STUDIO PALETTE — 01</span>
</div>
</div>
</body></html>
