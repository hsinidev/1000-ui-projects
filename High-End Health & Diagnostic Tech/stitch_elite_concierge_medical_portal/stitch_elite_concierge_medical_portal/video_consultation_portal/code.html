<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#444749",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#f2f0f0",
                    "surface": "#fbf9f8",
                    "on-primary-fixed": "#00174a",
                    "on-secondary-fixed": "#241a00",
                    "outline-variant": "#c5c6d2",
                    "on-surface": "#1b1c1c",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#574500",
                    "error": "#ba1a1a",
                    "secondary": "#735c00",
                    "primary": "#00113a",
                    "tertiary": "#121516",
                    "on-background": "#1b1c1c",
                    "outline": "#757682",
                    "on-secondary-container": "#745c00",
                    "on-primary-container": "#758dd5",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#435b9f",
                    "inverse-primary": "#b3c5ff",
                    "surface-container-highest": "#e4e2e2",
                    "on-error-container": "#93000a",
                    "primary-container": "#002366",
                    "surface-container-highest": "#e4e2e2",
                    "on-surface-variant": "#444650",
                    "secondary-container": "#fed65b",
                    "surface-bright": "#fbf9f8",
                    "secondary-fixed-dim": "#e9c349",
                    "surface-container-high": "#eae8e7",
                    "on-tertiary": "#ffffff",
                    "primary-fixed": "#dbe1ff",
                    "surface-container-low": "#f5f3f3",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#303030",
                    "on-tertiary-container": "#8e9092",
                    "secondary-fixed": "#ffe088",
                    "tertiary-container": "#26292b",
                    "background": "#fbf9f8",
                    "on-error": "#ffffff",
                    "surface-variant": "#e4e2e2"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "32px",
                    "container-max": "1280px",
                    "section-padding": "80px",
                    "margin-mobile": "24px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "headline-md": ["Playfair Display"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "title-sm": ["Inter"],
                    "label-caps": ["Inter"],
                    "display-lg": ["Playfair Display"]
            },
            "fontSize": {
                    "headline-md": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "title-sm": ["20px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .neumorphic-raised {
            box-shadow: 5px 5px 15px rgba(203,213,225,0.5), -5px -5px 10px rgba(255,255,255,0.8);
        }
        .neumorphic-recessed {
            box-shadow: inset 5px 5px 10px rgba(203,213,225,0.4), inset -5px -5px 10px rgba(255,255,255,0.8);
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vitals-gradient {
            background: linear-gradient(135deg, #fbf9f8 0%, #f5f3f3 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface antialiased overflow-hidden">
<!-- Top Navigation Bar (Shared Component Context) -->
<header class="fixed top-0 left-0 w-full z-50 px-margin-mobile py-4 flex justify-between items-center bg-transparent">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden neumorphic-raised">
<img alt="Family Head Profile" class="w-full h-full object-cover" data-alt="A professional, high-end portrait of a refined man in his 50s, looking directly at the camera with a calm and confident expression. He is wearing a tailored navy suit in a brightly lit, minimalist office setting. The lighting is soft and flattering, emphasizing a clean, luxury healthcare aesthetic with soft whites and deep blues." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHg_t4yrhLMVbfE2coGKMBZir8slXnnZzRE_8xOFKguVkwKEZv4txrxYFvQAOfObE0A1bnAhS1WdxtMazuDgel5q1NkZXtNAJe3ab9MIH28oIzujPz13hdMzYCy0D_H24-lA61odsyMPDx6AaFkINu5-o_hYv5YL3sYYIhXrGv_0ZzIVK0HVBE-8x1T_jposRJ1u4LqA7bfGmgDb5sSRqUUVG3qRWn9Wtjle7XHP5Ye7PQ4wiYrM5lqqBATnl-lN2iTgPAtqVfRxQ"/>
</div>
<span class="font-headline-md text-headline-md font-bold tracking-tight text-white drop-shadow-md">Bio-Portal</span>
</div>
<div class="flex items-center gap-2">
<div class="flex items-center gap-1.5 bg-secondary-container/90 px-3 py-1 rounded-full border border-secondary/20 shadow-sm">
<span class="material-symbols-outlined text-[14px] text-secondary" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-secondary">Encrypted Connection</span>
</div>
</div>
</header>
<main class="h-screen w-full flex flex-col">
<!-- Video Feed Section (Top Half) -->
<section class="relative h-[530px] w-full overflow-hidden">
<img alt="Dr. Aris Thorne" class="w-full h-full object-cover" data-alt="A high-definition, professional video call frame of a male doctor in his late 40s with a kind and intelligent face, wearing a crisp white medical coat and a stethoscope around his neck. He is sitting in a modern, ultra-luxury medical office with soft-focus medical technology in the background. The lighting is bright and clinically clean, utilizing a palette of soft whites and calm blues." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwLRd9oWyQwes7f0GK0-amFV1KS6S3EQFKtahzhIgx7uFBOeX1gQ9O_UdctFxjSyRR8WFGsw2eVB33Mz1dR8cV8XjSBWQ6VldZ0ENVsPyYkcwbi9jyLgBDLqRg1j-pAhHfnZzSrW9-YZ_vM7309AKexa2Kwzz9RCUfARaEg4NK4HhWUpUHNR3PaWCkQFSk8wBm9u3IjghsnSgxeuyJEPW_N4tLaZYUx13Kgax5qKlSYz5EtsA3UWx6h0dRWpkf8_rxR22QgwAUPss"/>
<!-- Dr. Info Overlay -->
<div class="absolute bottom-10 left-margin-mobile">
<div class="glass-panel px-4 py-2 rounded-lg border border-white/40 neumorphic-raised inline-flex flex-col">
<span class="font-headline-md text-title-sm text-primary">Dr. Aris Thorne</span>
<span class="text-label-caps text-on-surface-variant">Senior Cardiologist • Private Suite 04</span>
</div>
</div>
<!-- Self Preview -->
<div class="absolute bottom-10 right-margin-mobile w-24 h-32 rounded-xl overflow-hidden neumorphic-raised border-2 border-white">
<img alt="Self Preview" class="w-full h-full object-cover" data-alt="A small inset video preview showing the patient, a middle-aged man in a high-end casual shirt, sitting in a sunlit modern living room. The lighting is warm and natural, creating a serene and private atmosphere that complements the luxury medical portal aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5V6VAn3mokalU70HsyvMEpPl0RrBaCF2who2lgnoDxbWH2j7OI99HDc1jRUDdxZSBcPRC4L5bxhooma8c0IcFHvL2ASZ0KodrK82OTR-SQgOz-qeHNUyaR08Eu2aFWv6i0M00wbuW3Ih2bH0Cqj6BBWIzJcQR62alv6XNCCVZWWm1EB9o46hzAdCpz3LPZ-e_9EttL6wjy7UJJl06tBUl77Z-Dp7CqRFUN9W6hNzNjOtpxNlIWvpe_EB9ZW5aSnmAIZOCkDv2q4Q"/>
</div>
</section>
<!-- Interaction & Data Section (Bottom Half) -->
<section class="flex-1 bg-surface rounded-t-lg -mt-4 relative z-10 px-margin-mobile pt-8 pb-32 overflow-y-auto">
<!-- Vitals Grid -->
<div class="grid grid-cols-2 gap-gutter mb-8">
<!-- Heart Rate -->
<div class="neumorphic-raised p-6 rounded-lg bg-surface flex flex-col items-center justify-center">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-error" data-icon="monitoring">monitoring</span>
<span class="text-label-caps text-on-surface-variant">Heart Rate</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-headline-md text-display-lg text-primary">72</span>
<span class="text-label-caps text-on-surface-variant">BPM</span>
</div>
</div>
<!-- SpO2 -->
<div class="neumorphic-raised p-6 rounded-lg bg-surface flex flex-col items-center justify-center">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary" data-icon="medical_services">medical_services</span>
<span class="text-label-caps text-on-surface-variant">SpO2</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-headline-md text-display-lg text-primary">98</span>
<span class="text-label-caps text-on-surface-variant">%</span>
</div>
</div>
</div>
<!-- Signature Separator -->
<div class="h-[1px] w-full bg-secondary-fixed-dim/30 mb-8"></div>
<!-- Chat Entry Point -->
<div class="neumorphic-recessed rounded-xl p-4 flex items-center gap-4 bg-surface-container-low mb-12">
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center neumorphic-raised">
<span class="material-symbols-outlined text-primary" data-icon="folder_managed">folder_managed</span>
</div>
<div class="flex-1">
<p class="text-body-md text-on-surface font-semibold">Secure Messages</p>
<p class="text-label-caps text-on-surface-variant">Dr. Thorne: "I've reviewed your latest labs..."</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Action Controls Floating Shell -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-8 pt-4 bg-surface/80 backdrop-blur-md">
<div class="max-w-md mx-auto flex items-center justify-between gap-4">
<!-- Mute -->
<button class="w-14 h-14 rounded-full flex items-center justify-center neumorphic-raised bg-surface-container-high text-primary hover:scale-95 transition-transform active:scale-90">
<span class="material-symbols-outlined" data-icon="mic_off">mic_off</span>
</button>
<!-- End Call -->
<button class="flex-1 h-16 rounded-full bg-primary text-white flex items-center justify-center gap-3 shadow-[0_10px_20px_rgba(0,17,58,0.2)] hover:brightness-110 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="call_end" style="font-variation-settings: 'FILL' 1;">call_end</span>
<span class="text-label-caps tracking-widest">End Consultation</span>
</button>
<!-- Toggle Camera -->
<button class="w-14 h-14 rounded-full flex items-center justify-center neumorphic-raised bg-surface-container-high text-primary hover:scale-95 transition-transform active:scale-90">
<span class="material-symbols-outlined" data-icon="videocam">videocam</span>
</button>
</div>
</div>
</section>
</main>
<!-- Modal Background Filter -->
<div class="hidden fixed inset-0 z-40 bg-white/70 backdrop-blur-xl"></div>
</body></html>
