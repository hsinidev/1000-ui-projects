<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }
        .breathing-circle {
            animation: breathe 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(0, 174, 239, 0.3));
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }
        .liquid-fill {
            background: linear-gradient(180deg, #00aeef 0%, #00658d 100%);
            position: relative;
            overflow: hidden;
        }
        .liquid-fill::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 38%;
            animation: wave 10s linear infinite;
        }
        @keyframes wave {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body-md min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-surface/60 backdrop-blur-xl border-b border-white/40 h-20 flex justify-between items-center px-margin-mobile z-50 shadow-[0_20px_40px_rgba(0,0,0,0.1)]">

<div class="w-10 h-10 rounded-full bg-primary-container/20 overflow-hidden border border-primary/20">

</div>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary">Breathe-Ease</h1>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-white/20 transition-colors active:scale-95 duration-200 text-primary">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</button>
</header>
<main class="pt-24 px-margin-mobile flex flex-col gap-gutter">
<!-- Breathing Rhythm Hero -->
<section class="flex flex-col items-center justify-center py-12 relative overflow-hidden">
<div class="absolute inset-0 flex items-center justify-center -z-10">
<div class="w-72 h-72 rounded-full bg-primary-container/10 blur-3xl"></div>
</div>
<div class="relative flex items-center justify-center">
<!-- Glowing Outer Pulse -->
<div class="breathing-circle w-64 h-64 rounded-full bg-primary-container/20 flex items-center justify-center border border-primary-container/30">
<!-- Middle Ring -->
<div class="w-48 h-48 rounded-full bg-primary-container/40 flex items-center justify-center border border-primary-container/50">
<!-- Core -->
<div class="w-32 h-32 rounded-full bg-primary-container shadow-[0_0_30px_rgba(0,174,239,0.5)] flex flex-col items-center justify-center text-white">
<span class="font-display-lg text-display-lg">12</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">BPM</span>
</div>
</div>
</div>
</div>
<div class="mt-8 text-center">
<h2 class="font-headline-md text-headline-md text-primary">Breathing-Rhythm</h2>
<p class="text-on-surface-variant font-body-md mt-1">Deep, steady inhalation active</p>
</div>
</section>
<!-- Quick Indicators Grid -->
<section class="grid grid-cols-2 gap-4">
<div class="glass-card rounded-lg p-card-padding flex flex-col gap-2">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="air" style="font-variation-settings: 'FILL' 1;">air</span>
<span class="font-label-md text-label-md">O2 Sat</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-headline-lg text-headline-lg text-on-surface">98</span>
<span class="text-on-surface-variant font-label-sm">%</span>
</div>

<div class="h-full bg-primary w-[98%]"></div>
</div>
</div>

</div>
<div class="flex items-baseline gap-1">
<span class="font-headline-lg text-headline-lg text-on-surface">72</span>
<span class="text-on-surface-variant font-label-sm">BPM</span>
</div>
<div class="w-full h-1 bg-surface-container rounded-full mt-2 overflow-hidden">
<div class="h-full bg-error w-[72%]"></div>
</div>
</div>
</section>
<!-- Daily Air Quality Card -->

<div class="flex justify-between items-start mb-6">
<div>

<p class="text-on-surface-variant font-body-md">Your current location: Excellent</p>
</div>
<div class="bg-primary-container/20 p-3 rounded-full text-primary">
<span class="material-symbols-outlined" data-icon="cloud">cloud</span>
</div>
</div>
<div class="flex items-center gap-6">
<div class="relative w-24 h-24 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-surface-container" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary-container" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="62.8" stroke-width="8"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">

</div>
</div>
<div class="flex-1 space-y-3">
<div class="flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface-variant">Pollen</span>

</div>
</div>

</div>
</div>

                Log Medication
            </button>
</section>
</main>
